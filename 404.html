<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost? | WoopKid World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FFF6E9;color:#2B2350;font-family:'Nunito',sans-serif;text-align:center;padding:20px}
.face{font-size:90px;animation:bob 2s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-14px) rotate(6deg)}}
h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(34px,8vw,60px);margin-top:10px}
p{font-weight:900;opacity:.7;margin-top:10px;font-size:18px}
a{display:inline-block;margin-top:24px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;text-decoration:none;color:#2B2350;background:#FFD23F;border:3px solid #2B2350;border-radius:16px;padding:13px 26px;box-shadow:4px 4px 0 #2B2350}
a:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #2B2350}
</style>
</head>
<body>
<main>
  <div class="face">🙃</div>
  <h1>Whoops! Wrong warp pipe.</h1>
  <p>This page does not exist. The games definitely do.</p>
  <a href="/">Back to WoopKid World</a>
</main>
</body>

<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var hudEl = document.getElementById('hud');
var scoreEl = document.getElementById('score');
var rankChipEl = document.getElementById('rankChip');
var comboChipEl = document.getElementById('comboChip');
var panelStatsEl = document.getElementById('panelStats');
var lbEl = document.getElementById('lb');
var crownBannerEl = document.getElementById('crownBanner');
var toastEl = document.getElementById('toast');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelTitleEl = document.getElementById('panelTitle');
var panelKillerEl = document.getElementById('panelKiller');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var panelRankEl = document.getElementById('panelRank');
var panelKillsEl = document.getElementById('panelKills');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_noodle-arena';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};
var THRESHOLDS = { bronze: 50, silver: 150, gold: 400 };

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}
function angDiff(a, b) {
    var d = a - b;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return d;
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

var eatStreak = 0;
var lastEatSfxT = 0;
/* Eat pop: short blip, pitch climbs with your munching streak */
function sfxEat() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar() * (1 + Math.min(12, eatStreak) * 0.045);
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(620 * p, t);
    o.frequency.exponentialRampToValueAtTime(940 * p, t + 0.06);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);

/* ================= Constants ================= */
var WORLD = 3000;
var PT_SPACE = 5;          /* px between recorded spine points */
var CAP = 1400;            /* spine points per snake (circular buffer) */
var K2 = CAP * 2;
var START_LEN = 10;
var MIN_LEN = 15;          /* boost length floor */
var BOOST_COST = 10;       /* length per second while boosting */
var BASE_SPEED = 155;
var BOOST_SPEED = 262;
var BOT_SPEED = 148;
var BOT_BOOST = 244;
var GRID_CELL = 100;
var GRID_DIM = 30;         /* 3000 / 100 */
var ORB_POOL = 900;

var ORB_COLORS = ['#FFD93D', '#7DF9FF', '#FF7BD5', '#9CFF57', '#FF9F40', '#B388FF'];
var COMBO_WINDOW = 2.2;      /* seconds between eats to keep the combo alive */
var DIFF_RAMP = 150;         /* seconds until the arena reaches full spice */
var SAFE_TIME = 20;          /* hunters leave a fresh player alone this long */
var MILESTONES = [25, 50, 100, 150, 200, 300, 400, 550];
var MILE_NAMES = ['BIG NOODLE!', 'SUPER NOODLE!', 'MEGA NOODLE!', 'ULTRA NOODLE!', 'GIGA NOODLE!', 'COSMIC NOODLE!', 'LEGEND NOODLE!', 'INFINITE NOODLE!'];

/* ================= Snakes ================= */
/* tier: 0 grazer (wander and eat), 1 hunter (chase smaller snakes), 2 coward (flee bigger ones) */
var BOT_DEFS = [
    ['Captain Wiggles', 1, 60, 140],
    ['Sir Slurp', 2, 25, 70],
    ['Noodle McDoodle', 0, 20, 60],
    ['Spaghetti Betty', 0, 30, 90],
    ['Wormzilla', 1, 120, 220],
    ['Doodle Noodle', 2, 20, 60],
    ['Sneaky Beaky', 1, 70, 150],
    ['Baron von Boop', 0, 40, 100],
    ['Slippy', 2, 15, 50],
    ['Miss Twist', 0, 30, 80],
    ['The Big Ramen', 1, 340, 430],
    ['Jiggly', 2, 20, 55]
];
var PALETTES = [
    ['#FF6B6B', '#FFD93D'],  /* player: coral / gold */
    ['#3DFFB4', '#FFFFFF'],
    ['#B36BFF', '#FF7BD5'],
    ['#40E0FF', '#C6FF4D'],
    ['#FF9F40', '#2EE6D6'],

    ['#D0FF3D', '#FF6BE0']
];

function radiusOf(len) { return Math.min(26, 6.5 + Math.sqrt(len) * 0.85); }
function bodyPx(len) { return Math.min(6500, 70 + len * 3.2); }
function turnRateOf(len) { return 4.3 - Math.min(1.7, Math.sqrt(len) * 0.055); }

function makeSnake(id, isBot, name, tier, pi) {
    return {
        id: id, isBot: isBot, name: name, tier: tier, pi: pi,
        c1: PALETTES[pi][0], c2: PALETTES[pi][1],
        x: 0, y: 0, heading: 0, len: START_LEN, r: radiusOf(START_LEN),
        dead: true, respawnT: 0, grace: 0,
        boosting: false, dropT: 0, sparkT: 0,
        thinkT: rand(0, 0.25), desired: 0, prevLen: 0,
        tongueT: 0, blinkT: rand(1.5, 4.5),
        ptsX: new Float64Array(CAP), ptsY: new Float64Array(CAP),
        headIdx: 0, ptCount: 0, distSince: 0
    };
}

var snakes = [];
var player = makeSnake(0, false, 'YOU', -1, 0);
snakes.push(player);
for (var bi = 0; bi < BOT_DEFS.length; bi++) {
    var def = BOT_DEFS[bi];
    snakes.push(makeSnake(bi + 1, true, def[0], def[1], bi + 1));
}

function pIdx(s, k) { return (s.headIdx - k + K2) % CAP; }

function addPoint(s, x, y) {
    s.headIdx = (s.headIdx + 1) % CAP;
    s.ptsX[s.headIdx] = x;
    s.ptsY[s.headIdx] = y;
    if (s.ptCount < CAP) s.ptCount++;
}

/* Lay the whole body out behind the head with a gentle curl (used on spawn) */
function fillBody(s) {
    var n = Math.min(CAP, Math.ceil(bodyPx(s.len) / PT_SPACE) + 4);
    var ang = s.heading + Math.PI;
    var curl = (Math.random() < 0.5 ? -1 : 1) * 0.03;
    var ax = s.x, ay = s.y;
    s.headIdx = 0;
    for (var k = 0; k < n; k++) {
        var idx = pIdx(s, k);
        s.ptsX[idx] = ax;
        s.ptsY[idx] = ay;
        ax += Math.cos(ang) * PT_SPACE;
        ay += Math.sin(ang) * PT_SPACE;
        ang += curl;
    }
    s.ptCount = n;
    s.distSince = 0;
}

/* Distance along the spine that is actually backed by recorded points */
function availPx(s) {
    if (s.ptCount === 0) return 0;
    return s.distSince + (s.ptCount - 1) * PT_SPACE;
}
function usedPx(s) { return Math.min(bodyPx(s.len), availPx(s)); }

var tmpPt = { x: 0, y: 0 };
/* Point d pixels behind the head, interpolated along the spine */
function pointAt(s, d, out) {
    if (s.ptCount === 0) { out.x = s.x; out.y = s.y; return out; }
    if (d <= s.distSince) {
        var i0 = pIdx(s, 0);
        var t0 = s.distSince > 0.0001 ? d / s.distSince : 0;
        out.x = s.x + (s.ptsX[i0] - s.x) * t0;
        out.y = s.y + (s.ptsY[i0] - s.y) * t0;
        return out;
    }
    var d2 = d - s.distSince;
    var i = Math.floor(d2 / PT_SPACE);
    var t = (d2 - i * PT_SPACE) / PT_SPACE;
    if (i >= s.ptCount - 1) { i = s.ptCount - 1; t = 0; }
    var a = pIdx(s, i);
    if (t <= 0 || i + 1 >= s.ptCount) { out.x = s.ptsX[a]; out.y = s.ptsY[a]; return out; }
    var b = pIdx(s, i + 1);
    out.x = s.ptsX[a] + (s.ptsX[b] - s.ptsX[a]) * t;
    out.y = s.ptsY[a] + (s.ptsY[b] - s.ptsY[a]) * t;
    return out;
}

function turnToward(s, target, dt) {
    var mx = turnRateOf(s.len) * dt;
    var d = angDiff(target, s.heading);
    s.heading += clamp(d, -mx, mx);
    if (s.heading > Math.PI) s.heading -= Math.PI * 2;
    if (s.heading < -Math.PI) s.heading += Math.PI * 2;
}

function advanceSnake(s, dt) {
    /* bots quicken as the run heats up, but a boosting player always stays a hair faster */
    var base = s.isBot ? BOT_SPEED * (1 + 0.16 * diffCur) : BASE_SPEED;
    var boostV = s.isBot ? Math.min(BOOST_SPEED - 5, BOT_BOOST * (1 + 0.16 * diffCur)) : BOOST_SPEED;
    if (s.boosting && s.len <= MIN_LEN) s.boosting = false;
    var spd = s.boosting ? boostV : base;

    if (s.boosting) {
        s.len = Math.max(MIN_LEN, s.len - BOOST_COST * dt);
        s.dropT -= dt;
        if (s.dropT <= 0) {
            s.dropT = 0.18;
            pointAt(s, usedPx(s), tmpPt);
            spawnOrb(tmpPt.x + rand(-4, 4), tmpPt.y + rand(-4, 4), 1, true);
        }
        s.sparkT -= dt;
        if (s.sparkT <= 0 && inView(s.x, s.y, 120)) {
            s.sparkT = 0.035;
            var bA = s.heading + Math.PI + rand(-0.5, 0.5);
            spawnPart(1, s.x + Math.cos(bA) * s.r, s.y + Math.sin(bA) * s.r,
                Math.cos(bA) * rand(40, 130), Math.sin(bA) * rand(40, 130),
                rand(0.25, 0.5), rand(2, 4), Math.random() < 0.5 ? '#FFFFFF' : s.c2);
        }
    }

    var moved = spd * dt;
    var nx = s.x + Math.cos(s.heading) * moved;
    var ny = s.y + Math.sin(s.heading) * moved;
    /* soft arena wall: you slide along it, only noodle bodies are dangerous */
    nx = clamp(nx, s.r + 4, WORLD - s.r - 4);
    ny = clamp(ny, s.r + 4, WORLD - s.r - 4);
    var dx = nx - s.x, dy = ny - s.y;
    var real = Math.sqrt(dx * dx + dy * dy);
    if (real > 0.0001) {
        var ux = dx / real, uy = dy / real;
        var px = s.x, py = s.y;
        var remaining = real;
        while (s.distSince + remaining >= PT_SPACE) {
            var need = PT_SPACE - s.distSince;
            px += ux * need;
            py += uy * need;
            addPoint(s, px, py);
            remaining -= need;
            s.distSince = 0;
        }
        s.distSince += remaining;
    }
    s.x = nx;
    s.y = ny;
    s.r = radiusOf(s.len);
}

function safeSpawnPos(out) {
    for (var tries = 0; tries < 24; tries++) {
        var x = rand(450, WORLD - 450);
        var y = rand(450, WORLD - 450);
        var ok = true;
        for (var i = 0; i < snakes.length; i++) {
            var o = snakes[i];
            if (o.dead) continue;
            var dx = o.x - x, dy = o.y - y;
            if (dx * dx + dy * dy < 450 * 450) { ok = false; break; }
        }
        if (ok) { out.x = x; out.y = y; return; }
    }
    out.x = rand(450, WORLD - 450);
    out.y = rand(450, WORLD - 450);
}

function spawnBot(b, len) {
    safeSpawnPos(tmpPt);
    b.x = tmpPt.x;
    b.y = tmpPt.y;
    b.heading = rand(-Math.PI, Math.PI);
    b.desired = b.heading;
    b.len = len;
    b.prevLen = len;
    b.r = radiusOf(len);
    b.dead = false;
    b.grace = 2.2;
    b.boosting = false;
    b.thinkT = rand(0, 0.2);
    fillBody(b);
}

function initBots() {
    for (var i = 1; i < snakes.length; i++) {
        var def = BOT_DEFS[i - 1];
        spawnBot(snakes[i], rand(def[2], def[3]));
    }
}

/* ================= Orbs (pooled) ================= */
var orbs = [];
var freeOrbs = [];
var ambientCount = 0;
for (var oi = 0; oi < ORB_POOL; oi++) {
    orbs.push({ active: false, x: 0, y: 0, r: 4, val: 2, ci: 0, phase: 0, burst: false, ttl: 0 });
    freeOrbs.push(oi);
}
function spawnOrb(x, y, val, burst) {
    if (freeOrbs.length === 0) return false;
    var o = orbs[freeOrbs.pop()];
    o.active = true;
    o.x = clamp(x, 12, WORLD - 12);
    o.y = clamp(y, 12, WORLD - 12);
    o.val = val;
    o.r = val >= 4 ? 7 : (val >= 3 ? 5.8 : (val >= 2 ? 4.6 : 3.8));
    o.ci = (Math.random() * ORB_COLORS.length) | 0;
    o.phase = rand(0, Math.PI * 2);
    o.burst = !!burst;
    o.ttl = burst ? 22 : 0;
    if (!burst) ambientCount++;
    return true;
}
function despawnOrb(o) {
    if (!o.active) return;
    o.active = false;
    if (!o.burst) ambientCount--;
    freeOrbs.push(orbs.indexOf(o));
}
/* Faster despawn without indexOf: orbs keep their index */
for (var oj = 0; oj < ORB_POOL; oj++) orbs[oj].idx = oj;
function killOrb(o) {
    if (!o.active) return;
    o.active = false;
    if (!o.burst) ambientCount--;
    freeOrbs.push(o.idx);
}
function spawnAmbientOrbs() {
    var deficit = ORB_TARGET - ambientCount;
    var n = Math.min(4, deficit);
    for (var i = 0; i < n; i++) {
        spawnOrb(rand(30, WORLD - 30), rand(30, WORLD - 30), Math.random() < 0.8 ? 2 : 3, false);
    }
}

function eatOrb(s, o) {
    killOrb(o);
    s.tongueT = 0.3;
    if (s === player) {
        /* quick consecutive munches build a combo worth bonus length */
        if (time - lastEatSfxT > 1) eatStreak = 0;
        eatStreak++;
        lastEatSfxT = time;
        combo++;
        comboT = COMBO_WINDOW;
        if (combo > bestCombo) bestCombo = combo;
        var bonus = combo >= 3 ? Math.min(3, (combo / 3) | 0) : 0;
        player.len += o.val + bonus;
        player.maxLen = Math.max(player.maxLen || player.len, player.len);
        if (combo >= 3) {
            sfxCombo(combo);
            comboChipEl.textContent = '🔥 x' + combo;
            comboChipEl.style.display = 'inline-block';
        } else {
            sfxEat();
        }
        if (inView(o.x, o.y, 40)) spawnEatFX(o.x, o.y, ORB_COLORS[o.ci], o.val + bonus, combo >= 5);
    } else {
        s.len += o.val;
        if (inView(o.x, o.y, 40)) {
            var a = rand(0, Math.PI * 2);
            spawnPart(1, o.x, o.y, Math.cos(a) * rand(30, 110), Math.sin(a) * rand(30, 110),
                rand(0.2, 0.4), rand(1.6, 3), ORB_COLORS[o.ci]);
        }
    }
}

function updateOrbs(dt) {
    for (var i = 0; i < ORB_POOL; i++) {
        var o = orbs[i];
        if (!o.active) continue;
        if (o.ttl > 0) {
            o.ttl -= dt;
            if (o.ttl <= 0) { killOrb(o); continue; }
        }
        for (var j = 0; j < snakes.length; j++) {
            var s = snakes[j];
            if (s.dead) continue;
            var hasMag = s === player && magnetT > 0;
            var box = hasMag ? 176 : 64;
            var dx = s.x - o.x, dy = s.y - o.y;
            if (dx > box || dx < -box || dy > box || dy < -box) continue;
            var d2 = dx * dx + dy * dy;
            var eatR = s.r + o.r + 2;
            if (d2 < eatR * eatR) { eatOrb(s, o); break; }
            var mag = s.r + (hasMag ? 160 : 36);
            if (d2 < mag * mag) {
                var d = Math.sqrt(d2) || 1;
                var pull = hasMag ? 520 : 300;
                o.x += (dx / d) * pull * dt;
                o.y += (dy / d) * pull * dt;
            }
        }
    }
}

/* type 1: spark circle, type 2: confetti rect */
var parts = [];
for (var qi = 0; qi < 120; qi++) {
    parts.push({ active: false, type: 1, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1, size: 4, color: '#fff' });
}
function spawnPart(type, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.type = type;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, Math.PI * 2);
            p.vr = rand(-8, 8);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;

        }

}
var CONFETTI_COLORS = ['#FF5FA2', '#FFD93D', '#7DF9FF', '#9CFF57', '#B388FF', '#FF9F40'];

        spawnPart(2, x, y, Math.cos(a) * sp, Math.sin(a) * sp - 40, rand(0.6, 1.2), rand(4, 8), CONFETTI_COLORS[i % CONFETTI_COLORS.length]);
    }

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 2) p.vy = Math.min(260, p.vy + 320 * dt);
        else { p.vx *= (1 - Math.min(1, 3.5 * dt)); p.vy *= (1 - Math.min(1, 3.5 * dt)); }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

var gridCells = [];
for (var gi = 0; gi < GRID_DIM * GRID_DIM; gi++) gridCells.push([]);
var usedCells = [];

function gridInsert(x, y, id) {
    var cx = clamp((x / GRID_CELL) | 0, 0, GRID_DIM - 1);
    var cy = clamp((y / GRID_CELL) | 0, 0, GRID_DIM - 1);
    var ci = cy * GRID_DIM + cx;
    var cell = gridCells[ci];
    if (cell.length === 0) usedCells.push(ci);
    cell.push(x, y, id);
}

function rebuildGrid() {
    for (var u = 0; u < usedCells.length; u++) gridCells[usedCells[u]].length = 0;
    usedCells.length = 0;
    for (var i = 0; i < snakes.length; i++) {
        var s = snakes[i];
        if (s.dead) continue;
        gridInsert(s.x, s.y, s.id);
        var n = Math.min(s.ptCount, Math.ceil(usedPx(s) / PT_SPACE));
        for (var k = 0; k < n; k += 3) {
            var idx = pIdx(s, k);
            gridInsert(s.ptsX[idx], s.ptsY[idx], s.id);
        }
    }
}

var deathList = [];
var deathKiller = [];
function checkCollisions() {
    deathList.length = 0;
    deathKiller.length = 0;
    for (var i = 0; i < snakes.length; i++) {
        var s = snakes[i];
        if (s.dead || s.grace > 0) continue;
        if (!s.isBot && (currentState !== State.PLAYING || shieldT > 0)) continue;
        var isP = !s.isBot;
        var nearD2 = Infinity, nearThr = 0;
        var cx = clamp((s.x / GRID_CELL) | 0, 0, GRID_DIM - 1);
        var cy = clamp((s.y / GRID_CELL) | 0, 0, GRID_DIM - 1);
        var hit = -1;
        for (var gy = Math.max(0, cy - 1); gy <= Math.min(GRID_DIM - 1, cy + 1) && hit < 0; gy++) {
            for (var gx = Math.max(0, cx - 1); gx <= Math.min(GRID_DIM - 1, cx + 1) && hit < 0; gx++) {
                var cell = gridCells[gy * GRID_DIM + gx];
                for (var e = 0; e < cell.length; e += 3) {
                    var oid = cell[e + 2];
                    if (oid === s.id) continue;
                    var other = snakes[oid];
                    if (other.dead) continue;
                    var dx = s.x - cell[e], dy = s.y - cell[e + 1];
                    var d2v = dx * dx + dy * dy;
                    var thr = (s.r + other.r) * 0.7;
                    if (d2v < thr * thr) { hit = oid; break; }
                    if (isP && d2v < nearD2) { nearD2 = d2v; nearThr = thr; }
                }
            }
        }
        if (hit >= 0) {
            deathList.push(s);
            deathKiller.push(hit);
        } else if (isP && s.boosting && nearMissCd <= 0) {
            /* boosting a whisker past another noodle pays out: risk = reward */
            var nz = nearThr + 22;
            if (nearD2 < nz * nz) {
                nearMissCd = 1.6;
                player.len += 2;
                spawnLabel(s.x, s.y - s.r - 14, 'CLOSE ONE! +2', '#7DF9FF', 15);
                spawnRing(s.x, s.y, 34, 0.35, '#7DF9FF', 3);
                sfxCombo(8);
            }
        }
    }
    for (var d = 0; d < deathList.length; d++) {
        if (!deathList[d].dead) killSnake(deathList[d], deathKiller[d]);
    }
}

/* ================= Death and respawn ================= */
function killSnake(victim, killerId) {
    /* the loser bursts into a trail of glowing food orbs */
    var total = usedPx(victim);
    var dropped = 0;
    for (var d = 0; d < total && dropped < 120; d += 24) {
        pointAt(victim, d, tmpPt);
        if (!spawnOrb(tmpPt.x + rand(-7, 7), tmpPt.y + rand(-7, 7), 4, true)) break;
        dropped++;
    }
    burstConfetti(victim.x, victim.y, victim.isBot ? 16 : 28);
    victim.dead = true;
    victim.boosting = false;
    if (inView(victim.x, victim.y, 300)) {
        sfxKill();
        trauma = Math.min(0.6, trauma + 0.22);
        /* layered kid-safe pop: double shockwave + star glints */
        spawnRing(victim.x, victim.y, 90, 0.5, victim.c1, 5);
        spawnRing(victim.x, victim.y, 55, 0.4, '#FFFFFF', 3);
        for (var gl = 0; gl < 4; gl++) {
            spawnPart(3, victim.x + rand(-26, 26), victim.y + rand(-26, 26),
                rand(-30, 30), rand(-50, -10), rand(0.35, 0.6), rand(6, 11), '#FFFFFF');
        }
    }
    var killer = (killerId >= 0 && killerId < snakes.length) ? snakes[killerId] : null;
    if (victim.isBot) {
        victim.respawnT = rand(1.6, 3);
        if (killer === player && currentState === State.PLAYING) {
            runKills++;
            player.len += 6;
            spawnLabel(victim.x, victim.y - 20, 'NOODLED! +6', '#9CFF57', 18);
            showToast('You noodled ' + victim.name + '!');
        }
    } else {
        playerDie(killer ? killer.name : 'The arena');
    }
}

/* ================= Bot AI ================= */
function botThink(b) {
    /* bots think faster and get bolder as the run heats up */
    b.thinkT = rand(0.12, 0.28) * (1 - 0.4 * diffCur);
    var wantBoost = false;
    /* wall avoidance always wins, but late-game hunters dare closer to the edge
       so wall-hugging stops being a free sanctuary */
    var margin = b.tier === 1 ? 240 - 140 * diffCur : 240;
    if (b.x < margin || b.x > WORLD - margin || b.y < margin || b.y > WORLD - margin) {
        b.desired = Math.atan2(WORLD / 2 - b.y, WORLD / 2 - b.x) + rand(-0.4, 0.4);
        b.boosting = false;
        return;
    }
    var i, o, dx, dy, d2;
    var target = null, targetD2 = Infinity;
    var playerSafe = currentState === State.PLAYING && runTime < SAFE_TIME;
    if (b.tier === 1) {
        /* hunter: seek a smaller snake and aim ahead of its head to cut it off.
           Late game they chase near-equals, prefer the player, and see further. */
        var sight = 700 + 500 * diffCur;
        var preyFactor = 0.75 + 0.3 * diffCur;
        for (i = 0; i < snakes.length; i++) {
            o = snakes[i];
            if (o === b || o.dead || o.grace > 0) continue;
            if (!o.isBot && (playerSafe || shieldT > 0)) continue;
            if (o.len >= b.len * preyFactor) continue;
            dx = o.x - b.x; dy = o.y - b.y;
            d2 = (dx * dx + dy * dy) * (o.isBot ? 1 : 1 - 0.45 * diffCur);
            if (d2 < sight * sight && d2 < targetD2) { target = o; targetD2 = d2; }
        }
        /* late game: even a giant player gets cut-off runs from hunters */
        if (!target && diffCur > 0.45 && !playerSafe && shieldT <= 0 && !player.dead && currentState === State.PLAYING) {
            dx = player.x - b.x; dy = player.y - b.y;
            d2 = dx * dx + dy * dy;
            if (d2 < 520 * 520 && player.len > b.len) {
                b.desired = Math.atan2(
                    player.y + Math.sin(player.heading) * 120 - b.y,
                    player.x + Math.cos(player.heading) * 120 - b.x);
                b.boosting = b.len > 30 && d2 < 400 * 400;
                return;
            }
        }
        if (target) {
            var lead = 0.55 + 0.25 * diffCur;
            var tsp = target.boosting ? BOT_BOOST : BOT_SPEED;
            var ax = target.x + Math.cos(target.heading) * tsp * lead;
            var ay = target.y + Math.sin(target.heading) * tsp * lead;
            b.desired = Math.atan2(ay - b.y, ax - b.x);
            dx = target.x - b.x; dy = target.y - b.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            wantBoost = b.len > 40 && d < 420 + 180 * diffCur && d > 110;
            b.boosting = wantBoost;
            return;
        }
    } else if (b.tier === 2) {
        /* coward: flee anything clearly bigger */
        for (i = 0; i < snakes.length; i++) {
            o = snakes[i];
            if (o === b || o.dead) continue;
            if (o.len <= b.len * 1.3) continue;
            dx = o.x - b.x; dy = o.y - b.y;
            d2 = dx * dx + dy * dy;
            if (d2 < 380 * 380 && d2 < targetD2) { target = o; targetD2 = d2; }
        }
        if (target) {
            b.desired = Math.atan2(b.y - target.y, b.x - target.x) + rand(-0.3, 0.3);
            b.boosting = b.len > 30 && targetD2 < 220 * 220;
            return;
        }
    }
    /* graze: drift to the nearest orb, otherwise wander */
    b.boosting = false;
    var best = null, bestD2 = 450 * 450;
    for (i = 0; i < ORB_POOL; i += 2) {
        o = orbs[i];
        if (!o.active) continue;
        dx = o.x - b.x; dy = o.y - b.y;
        d2 = dx * dx + dy * dy;
        if (d2 < bestD2) { best = o; bestD2 = d2; }
    }
    if (best) {
        b.desired = Math.atan2(best.y - b.y, best.x - b.x);
    } else {
        b.desired = b.heading + rand(-0.7, 0.7);
    }
}

/* ================= Input ================= */
var pointer = { x: 0, y: 0, down: false, active: false };
var keys = {};
var keyBoost = false;

function steerPlayer(dt) {
    var kx = 0, ky = 0;
    if (keys.ArrowLeft || keys.KeyA) kx -= 1;
    if (keys.ArrowRight || keys.KeyD) kx += 1;
    if (keys.ArrowUp || keys.KeyW) ky -= 1;
    if (keys.ArrowDown || keys.KeyS) ky += 1;
    playerAim = player.heading;
    if (kx !== 0 || ky !== 0) {
        playerAim = Math.atan2(ky, kx);
        turnToward(player, playerAim, dt);
    } else if (pointer.active) {
        var dx = pointer.x - cw / 2;
        var dy = pointer.y - ch / 2;
        if (dx * dx + dy * dy > 22 * 22) {
            playerAim = Math.atan2(dy, dx);
            turnToward(player, playerAim, dt);
        }
    }
    player.boosting = (pointer.down || keyBoost) && player.len > MIN_LEN;
}

/* ================= Canvas sizing + prerendered sprites ================= */
var cw = 0, ch = 0, dpr = 1;
var VS = 1;
var hexPat = null;
var orbSprs = [];
var segSprs = [];          /* [paletteIdx][0|1] gradient body segment sprites */
var powSprs = [];          /* magnet, star */
var vigCanvas = null;      /* screen-space vignette, rebuilt on resize */
var SPR_SCALE = 2 * (32 / 26.5);   /* sprite px per body radius */

/* Biomes: each run gets a fresh floor + edge palette */
var BIOMES = [
    { bg: '#12122a', voidBg: '#0B0B1E', line: 'rgba(140,150,255,0.10)', freck: ['#1d1d48', '#191940', '#23234f'], edge: '#FF5FA2', edgeGlow: 'rgba(255,95,162,0.22)' },
    { bg: '#0e2026', voidBg: '#081418', line: 'rgba(110,255,220,0.10)', freck: ['#14343a', '#102b31', '#1a3f42'], edge: '#2EE6D6', edgeGlow: 'rgba(46,230,214,0.22)' },
    { bg: '#1e1430', voidBg: '#120b1e', line: 'rgba(255,170,255,0.10)', freck: ['#2c1d46', '#26183c', '#342252'], edge: '#B388FF', edgeGlow: 'rgba(179,136,255,0.24)' }
];
var biomeIdx = 0;

/* Ambient drifting motes for a floor that feels alive */
var motes = [];
for (var mi2 = 0; mi2 < 64; mi2++) {
    motes.push({ x: rand(20, WORLD - 20), y: rand(20, WORLD - 20), r: rand(1.2, 3.2), ph: rand(0, Math.PI * 2), sp: rand(0.25, 0.7) });
}

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function hexPath(c, x, y, R) {
    c.moveTo(x + R * Math.sin(0), y - R * Math.cos(0));
    for (var i = 1; i < 6; i++) {
        var a = i * Math.PI / 3;
        c.lineTo(x + R * Math.sin(a), y - R * Math.cos(a));
    }
    c.closePath();
}

/* mix a hex color toward white (f>0) or black (f<0), at build time only */
function shade(hex, f) {
    var n = parseInt(hex.slice(1), 16);
    var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    if (f >= 0) { r += (255 - r) * f; g += (255 - g) * f; b += (255 - b) * f; }
    else { r *= 1 + f; g *= 1 + f; b *= 1 + f; }
    return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';
}

/* textured floor tile: hex grid + soft baked freckles, repeats in world space */
function buildFloor() {
    var biome = BIOMES[biomeIdx];
    var hw = 60, hh = 104;
    var TW = hw * 3, TH = hh * 3;
    var R = hw / Math.sqrt(3);
    var tile = makeCanvas(TW, TH);
    var tc = tile.getContext('2d');
    tc.fillStyle = biome.bg;
    tc.fillRect(0, 0, TW, TH);
    /* soft freckle blobs under the grid (baked, cheap at runtime) */
    for (var f = 0; f < 16; f++) {
        var fx = rand(0, TW), fy = rand(0, TH), fr = rand(14, 46);
        var fg = tc.createRadialGradient(fx, fy, 1, fx, fy, fr);
        var col = biome.freck[f % biome.freck.length];
        fg.addColorStop(0, col);
        fg.addColorStop(1, biome.bg);
        tc.globalAlpha = 0.8;
        tc.fillStyle = fg;
        /* draw wrapped so the tile seams stay invisible */
        for (var wx = -1; wx <= 1; wx++) {
            for (var wy = -1; wy <= 1; wy++) {
                tc.beginPath();
                tc.arc(fx + wx * TW, fy + wy * TH, fr, 0, Math.PI * 2);
                tc.fill();
            }
        }
    }
    tc.globalAlpha = 1;
    /* tiny star specks */
    tc.fillStyle = 'rgba(255,255,255,0.06)';
    for (var sd = 0; sd < 26; sd++) {
        tc.fillRect((rand(0, TW) | 0), (rand(0, TH) | 0), 2, 2);
    }
    /* hex grid on top */
    tc.strokeStyle = biome.line;
    tc.lineWidth = 1.5;
    tc.beginPath();
    for (var gx2 = 0; gx2 <= 3; gx2++) {
        for (var gy2 = 0; gy2 <= 3; gy2++) {
            hexPath(tc, gx2 * hw, gy2 * hh, R);
            hexPath(tc, gx2 * hw + hw / 2, gy2 * hh + hh / 2, R);
        }
    }
    tc.stroke();
    hexPat = ctx.createPattern(tile, 'repeat');
}

/* one glossy gradient segment sprite: dark rim, candy body, sheen highlight */
function makeSegSprite(color) {
    var s = makeCanvas(64, 64);
    var c = s.getContext('2d');
    c.beginPath();
    c.arc(32, 32, 30, 0, Math.PI * 2);
    c.fillStyle = 'rgba(8, 8, 26, 0.9)';
    c.fill();
    var g = c.createRadialGradient(25, 23, 3, 32, 33, 28);
    g.addColorStop(0, shade(color, 0.5));
    g.addColorStop(0.45, color);
    g.addColorStop(1, shade(color, -0.32));
    c.beginPath();
    c.arc(32, 32, 26.5, 0, Math.PI * 2);
    c.fillStyle = g;
    c.fill();
    c.beginPath();
    c.ellipse(24, 19, 10, 5.5, -0.65, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255, 255, 255, 0.4)';
    c.fill();
    return s;
}

function starPath(c, x, y, R, r0, rot) {
    for (var i = 0; i < 10; i++) {
        var a = rot + i * Math.PI / 5;
        var rr2 = i % 2 === 0 ? R : r0;
        var px = x + Math.cos(a) * rr2, py = y + Math.sin(a) * rr2;
        if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath();
}

function buildSprites() {
    buildFloor();

    /* glowing food orbs, one sprite per color, drawn scaled */
    orbSprs = [];
    for (var c = 0; c < ORB_COLORS.length; c++) {
        var s = makeCanvas(48, 48);
        var sc = s.getContext('2d');
        var g = sc.createRadialGradient(24, 24, 2, 24, 24, 24);
        g.addColorStop(0, ORB_COLORS[c]);
        g.addColorStop(0.35, ORB_COLORS[c] + 'AA');
        g.addColorStop(1, ORB_COLORS[c] + '00');
        sc.fillStyle = g;
        sc.fillRect(0, 0, 48, 48);
        sc.fillStyle = '#FFFFFF';
        sc.globalAlpha = 0.9;
        sc.beginPath();
        sc.arc(24, 24, 5, 0, Math.PI * 2);
        sc.fill();
        orbSprs.push(s);
    }

    /* glossy body segments per palette */
    segSprs = [];
    for (var p = 0; p < PALETTES.length; p++) {
        segSprs.push([makeSegSprite(PALETTES[p][0]), makeSegSprite(PALETTES[p][1])]);
    }

    /* powerup icons: magnet + star */
    powSprs = [];
    var m = makeCanvas(56, 56);
    var mc = m.getContext('2d');
    mc.lineWidth = 11;
    mc.lineCap = 'butt';
    mc.strokeStyle = '#FF4D6D';
    mc.beginPath();
    mc.arc(28, 26, 15, Math.PI, Math.PI * 2);
    mc.stroke();
    mc.strokeStyle = '#FF8FA9';
    mc.lineWidth = 4;
    mc.beginPath();
    mc.arc(28, 26, 18.5, Math.PI * 1.15, Math.PI * 1.85);
    mc.stroke();
    mc.fillStyle = '#FF4D6D';
    mc.fillRect(7.5, 26, 11, 12);
    mc.fillRect(37.5, 26, 11, 12);
    mc.fillStyle = '#EAF2FF';
    mc.fillRect(7.5, 38, 11, 9);
    mc.fillRect(37.5, 38, 11, 9);
    powSprs.push(m);
    var st = makeCanvas(56, 56);
    var stc = st.getContext('2d');
    stc.beginPath();
    starPath(stc, 28, 29, 24, 11, -Math.PI / 2);
    stc.fillStyle = 'rgba(140, 90, 0, 0.85)';
    stc.fill();
    var sg = stc.createRadialGradient(23, 22, 2, 28, 28, 24);
    sg.addColorStop(0, '#FFF3B0');
    sg.addColorStop(0.6, '#FFD93D');
    sg.addColorStop(1, '#FF9F40');
    stc.beginPath();
    starPath(stc, 28, 28, 21, 9.5, -Math.PI / 2);
    stc.fillStyle = sg;
    stc.fill();
    powSprs.push(st);

    /* screen-space vignette (rebuilt with the canvas size) */
    if (cw > 0 && ch > 0) {
        vigCanvas = makeCanvas(cw, ch);
        var vc = vigCanvas.getContext('2d');
        var vg = vc.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.42, cw / 2, ch / 2, Math.max(cw, ch) * 0.75);
        vg.addColorStop(0, 'rgba(4, 4, 16, 0)');
        vg.addColorStop(1, 'rgba(4, 4, 16, 0.42)');
        vc.fillStyle = vg;
        vc.fillRect(0, 0, cw, ch);
    }
}

function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    cw = window.innerWidth;
    ch = window.innerHeight;
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    VS = clamp(Math.min(cw, ch) / 560, 0.65, 1.25);
    buildSprites();
}
window.addEventListener('resize', resize);

/* ================= Camera ================= */
var viewL = 0, viewT = 0, viewR = 0, viewB = 0;
function inView(x, y, pad) {
    return x > viewL - pad && x < viewR + pad && y > viewT - pad && y < viewB + pad;
}
function updateCamera(dt) {
    var tz;
    if (currentState === State.MENU) {
        camX += (WORLD / 2 + Math.cos(time * 0.07) * 650 - camX) * Math.min(1, 0.6 * dt);
        camY += (WORLD / 2 + Math.sin(time * 0.09) * 650 - camY) * Math.min(1, 0.6 * dt);
        tz = 0.82;
    } else {
        camX += (player.x - camX) * Math.min(1, 8 * dt);
        camY += (player.y - camY) * Math.min(1, 8 * dt);
        tz = clamp(1.12 - Math.sqrt(player.len) * 0.009, 0.78, 1.12);
    }
    zoom += (tz - zoom) * Math.min(1, 2 * dt);
    var k = VS * zoom;
    viewL = camX - cw / (2 * k);
    viewR = camX + cw / (2 * k);
    viewT = camY - ch / (2 * k);
    viewB = camY + ch / (2 * k);
}

/* ================= HUD ================= */
function updateHud() {
    var shown = Math.floor(player.len);
    if (shown !== lastShownLen) {
        var crossed = Math.floor(shown / 25) > Math.floor(Math.max(0, lastShownLen) / 25);
        lastShownLen = shown;
        scoreEl.textContent = shown;
        if (crossed) {
            scoreEl.classList.remove('pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('pop');
        }
    }
}

/* ================= Update ================= */
function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 1.8 * dt);
    if (currentState === State.PAUSED) return;

    /* difficulty ramp: easy first half-minute, spicy by minute three */
    if (currentState === State.PLAYING) {
        runTime += dt;
        diffCur = clamp(runTime / DIFF_RAMP, 0, 1);
    } else if (currentState === State.MENU) {
        diffCur = 0.25;
    }

    /* combo + powerup + bonus timers */
    if (comboT > 0) {
        comboT -= dt;
        if (comboT <= 0) {
            combo = 0;
            comboChipEl.style.display = 'none';
        }
    }
    if (nearMissCd > 0) nearMissCd -= dt;
    if (magnetT > 0) magnetT -= dt;
    if (shieldT > 0) {
        shieldT -= dt;
        if (shieldT <= 0) player.grace = Math.max(player.grace, 1); /* fair exit if shield ends mid-crowd */
    }

    spawnAmbientOrbs();
    if (currentState === State.PLAYING) steerPlayer(dt);

    for (var i = 0; i < snakes.length; i++) {
        var s = snakes[i];
        if (s.dead) {
            if (s.isBot) {
                s.respawnT -= dt;
                if (s.respawnT <= 0) respawnBot(s);
            }
            continue;
        }
        if (s.grace > 0) s.grace -= dt;
        if (s.tongueT > 0) s.tongueT -= dt;
        s.blinkT -= dt;
        if (s.blinkT <= -0.13) s.blinkT = rand(1.8, 4.8);
        if (s.isBot) {
            s.thinkT -= dt;
            if (s.thinkT <= 0) botThink(s);
            turnToward(s, s.desired, dt);
        }
        advanceSnake(s, dt);
    }

    rebuildGrid();
    checkCollisions();
    updateOrbs(dt);
    updatePows(dt);
    updateParticles(dt);
    updateRings(dt);
    updateLabels(dt);

    if (currentState === State.PLAYING) {
        player.maxLen = Math.max(player.maxLen, player.len);
        /* size milestone celebrations */
        while (mileIdx < MILESTONES.length && player.len >= MILESTONES[mileIdx]) {
            showToast('🎉 ' + MILE_NAMES[mileIdx] + ' Length ' + MILESTONES[mileIdx]);
            spawnRing(player.x, player.y, 110, 0.6, '#FFD93D', 6);
            spawnRing(player.x, player.y, 70, 0.5, '#FFFFFF', 3);
            burstConfetti(player.x, player.y, 14);
            spawnLabel(player.x, player.y - player.r - 20, MILE_NAMES[mileIdx], '#FFD93D', 20);
            trauma = Math.min(0.6, trauma + 0.12);
            sfxFanfare();
            mileIdx++;
        }
        updateHud();
    }

    lbT -= dt;
    if (lbT <= 0) {
        lbT = 0.25;
        updateLeaderboard();
    }
    if (currentState === State.DYING) {
        deathT += dt;
        if (deathT > 1.05) showPanel();
    }
    updateCamera(dt);
}

/* ================= Render ================= */
var SEG_MAX = 460;
var segXs = new Float64Array(SEG_MAX);
var segYs = new Float64Array(SEG_MAX);
var dashPat = [26, 42];
var emptyDash = [];

function drawSnake(s) {
    var r = s.r;
    var segSpace = Math.max(6, r * 0.85);
    var total = usedPx(s);
    var nSegs = Math.min(SEG_MAX - 1, Math.floor(total / segSpace));
    if (nSegs < 2) nSegs = 2;
    var anyVisible = false;
    for (var i = 0; i < nSegs; i++) {
        pointAt(s, i * segSpace, tmpPt);
        segXs[i] = tmpPt.x;
        segYs[i] = tmpPt.y;
        if (!anyVisible && inView(tmpPt.x, tmpPt.y, r + 30)) anyVisible = true;
    }
    if (!anyVisible) return;

    if (s.grace > 0) ctx.globalAlpha = 0.55 + 0.25 * Math.sin(time * 12);

    var j, x, y;
    var sprPair = segSprs[s.pi];
    var ds = r * SPR_SCALE;
    /* glossy gradient segments, gently tapered toward the tail */
    for (j = nSegs - 1; j >= 1; j--) {
        x = segXs[j]; y = segYs[j];
        if (!inView(x, y, r + 10)) continue;
        var tp = j > nSegs - 8 ? Math.max(0.5, 1 - (j - (nSegs - 8)) * 0.06) : 1;
        var dss = ds * tp;
        var spr = ((j / 3) | 0) % 2 ? sprPair[1] : sprPair[0];
        ctx.drawImage(spr, (x - dss / 2) | 0, (y - dss / 2) | 0, Math.max(2, dss | 0), Math.max(2, dss | 0));
    }
    /* boost glow */
    if (s.boosting) {
        ctx.beginPath();
        for (j = nSegs - 1; j >= 0; j -= 2) {
            x = segXs[j]; y = segYs[j];
            if (!inView(x, y, r + 14)) continue;
            ctx.moveTo(x + r + 4, y);
            ctx.arc(x, y, r + 4, 0, Math.PI * 2);
        }
        ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.1 + 0.07 * Math.sin(time * 16)) + ')';
        ctx.fill();
    }

    /* head */
    var hx = s.x, hy = s.y;
    if (inView(hx, hy, r + 40)) {
        var hr = r * 1.12;
        var aim = s.isBot ? s.desired : (s === player && currentState === State.PLAYING ? playerAim : s.heading);
        var turnAmt = clamp(Math.abs(angDiff(aim, s.heading)) / 1.6, 0, 1);
        /* squash and stretch: stretch when boosting, squash into turns */
        var st = 1 + (s.boosting ? 0.14 : 0.03 * Math.sin(time * 6 + s.id)) - turnAmt * 0.1;
        var sq = 1 + (s.boosting ? -0.1 : -0.03 * Math.sin(time * 6 + s.id)) + turnAmt * 0.14;
        var hd = hr * SPR_SCALE;
        ctx.save();
        ctx.translate(hx | 0, hy | 0);
        ctx.rotate(s.heading);
        ctx.scale(st, sq);
        ctx.drawImage(sprPair[0], -hd / 2, -hd / 2, hd, hd);
        ctx.restore();

        var fa = s.heading;
        var fx = Math.cos(fa), fy = Math.sin(fa);
        var px2 = -fy, py2 = fx;

        /* tongue flick while munching */
        if (s.tongueT > 0) {
            var tp2 = s.tongueT / 0.3;
            var tl = r * (0.6 + 0.9 * Math.sin(tp2 * Math.PI));
            var mx2 = hx + fx * hr * 0.92, my2 = hy + fy * hr * 0.92;
            var tx = mx2 + fx * tl, ty = my2 + fy * tl;
            ctx.strokeStyle = '#FF4D6D';
            ctx.lineWidth = Math.max(2, r * 0.17);
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(mx2, my2);
            ctx.lineTo(tx, ty);
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx + (fx * 0.5 + px2 * 0.55) * r * 0.32, ty + (fy * 0.5 + py2 * 0.55) * r * 0.32);
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx + (fx * 0.5 - px2 * 0.55) * r * 0.32, ty + (fy * 0.5 - py2 * 0.55) * r * 0.32);
            ctx.stroke();
        }

        /* googly eyes that look where the player is steering, with blinks */
        var eyeR = Math.max(3.2, r * 0.42);
        var pupR = eyeR * 0.52;
        var blink = s.blinkT <= 0 ? 0.16 : 1;
        var lookX = Math.cos(aim), lookY = Math.sin(aim);
        var wob = Math.sin(time * 9 + s.id * 2.1) * eyeR * 0.12;
        for (var e = -1; e <= 1; e += 2) {
            var ex = hx + fx * r * 0.38 + px2 * r * 0.48 * e;
            var ey = hy + fy * r * 0.38 + py2 * r * 0.48 * e;
            ctx.beginPath();
            ctx.ellipse(ex, ey, eyeR, eyeR * blink, fa, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            if (blink === 1) {
                ctx.beginPath();
                ctx.arc(ex + lookX * eyeR * 0.42 + px2 * wob, ey + lookY * eyeR * 0.42 + py2 * wob, pupR, 0, Math.PI * 2);
                ctx.fillStyle = '#151530';
                ctx.fill();
                /* eye sparkle */
                ctx.beginPath();
                ctx.arc(ex + lookX * eyeR * 0.42 - pupR * 0.3, ey + lookY * eyeR * 0.42 - pupR * 0.35, pupR * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFFFF';
                ctx.fill();
            }
        }

        /* star shield + magnet auras */
        if (s === player) {
            if (shieldT > 0 && (shieldT > 1.5 || Math.sin(time * 18) > -0.2)) {
                ctx.lineWidth = 3.5;
                ctx.strokeStyle = '#FFD93D';
                var sa = time * 3;
                for (var arc = 0; arc < 3; arc++) {
                    ctx.beginPath();
                    ctx.arc(hx, hy, hr + 9, sa + arc * (Math.PI * 2 / 3), sa + arc * (Math.PI * 2 / 3) + 1.5);
                    ctx.stroke();
                }
            }
            if (magnetT > 0) {
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(125, 249, 255, ' + (0.14 + 0.1 * Math.sin(time * 5)) + ')';
                ctx.beginPath();
                ctx.arc(hx, hy, s.r + 150 + 8 * Math.sin(time * 5), 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        /* crown for the reigning number one */
        if ((s === player && wearingCrown) || (s.isBot && lbSorted.length > 0 && lbSorted[0] === s)) {
            var cy2 = hy - hr - 4;
            var cs = Math.max(7, r * 0.7);
            ctx.beginPath();
            ctx.moveTo(hx - cs, cy2);
            ctx.lineTo(hx - cs, cy2 - cs * 0.8);
            ctx.lineTo(hx - cs * 0.5, cy2 - cs * 0.35);
            ctx.lineTo(hx, cy2 - cs * 1.05);
            ctx.lineTo(hx + cs * 0.5, cy2 - cs * 0.35);
            ctx.lineTo(hx + cs, cy2 - cs * 0.8);
            ctx.lineTo(hx + cs, cy2);
            ctx.closePath();
            ctx.fillStyle = '#FFD93D';
            ctx.fill();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#B8860B';
            ctx.stroke();
        }

        /* name tag */
        var fs = Math.max(11, r * 0.85);
        ctx.font = '800 ' + fs.toFixed(0) + 'px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.82)';
        ctx.fillText(s.isBot ? s.name : 'YOU', hx | 0, (hy - hr - (r * 0.9) - 6) | 0);
    }
    ctx.globalAlpha = 1;
}

function drawMinimap() {
    var size = 110;
    var mx = 14, my = ch - size - 14;
    var sc = size / WORLD;
    ctx.globalAlpha = 0.85;
    rr(ctx, mx, my, size, size, 12);
    ctx.fillStyle = 'rgba(10, 10, 28, 0.75)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
    ctx.stroke();
    ctx.globalAlpha = 1;
    for (var i = snakes.length - 1; i >= 0; i--) {
        var s = snakes[i];
        if (s.dead) continue;
        var dotR = s === player ? 4 : 2.6;
        ctx.beginPath();
        ctx.arc(mx + s.x * sc, my + s.y * sc, dotR, 0, Math.PI * 2);
        ctx.fillStyle = s === player ? '#FFFFFF' : s.c1;
        ctx.fill();
    }
}

function render() {
    var biome = BIOMES[biomeIdx];
    /* letterbox base */
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = biome.voidBg;
    ctx.fillRect(0, 0, cw, ch);

    /* world transform with a hint of trauma shake */
    var k = VS * zoom;
    var sx = camX, sy = camY;
    if (trauma > 0) {
        var amp = trauma * trauma * 14;
        sx += (Math.random() * 2 - 1) * amp;
        sy += (Math.random() * 2 - 1) * amp;
    }
    var a = dpr * k;
    ctx.setTransform(a, 0, 0, a, dpr * (cw / 2 - sx * k), dpr * (ch / 2 - sy * k));

    /* arena floor: baked texture tile (freckles + hex grid) */
    var wl = Math.max(0, viewL - 20), wt = Math.max(0, viewT - 20);
    var wr = Math.min(WORLD, viewR + 20), wb = Math.min(WORLD, viewB + 20);
    if (wr > wl && wb > wt) {
        ctx.fillStyle = biome.bg;
        ctx.fillRect(wl, wt, wr - wl, wb - wt);
        if (hexPat) {
            ctx.fillStyle = hexPat;
            ctx.fillRect(wl, wt, wr - wl, wb - wt);
        }
    }
    /* ambient drifting motes */
    ctx.globalAlpha = 0.16;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    for (var mm = 0; mm < motes.length; mm++) {
        var mo = motes[mm];
        if (!inView(mo.x, mo.y, 30)) continue;
        var mdx = mo.x + Math.sin(time * mo.sp + mo.ph) * 14;
        var mdy = mo.y + Math.cos(time * mo.sp * 0.8 + mo.ph) * 10;
        ctx.moveTo(mdx + mo.r, mdy);
        ctx.arc(mdx, mdy, mo.r, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.globalAlpha = 1;

    /* glowing arena edge with marching dashes */
    ctx.lineWidth = 16;
    ctx.strokeStyle = biome.edgeGlow;
    ctx.strokeRect(0, 0, WORLD, WORLD);
    ctx.lineWidth = 5;
    ctx.strokeStyle = biome.edge;
    ctx.strokeRect(0, 0, WORLD, WORLD);
    ctx.setLineDash(dashPat);
    ctx.lineDashOffset = -time * 60;
    ctx.lineWidth = 9;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.strokeRect(0, 0, WORLD, WORLD);
    ctx.setLineDash(emptyDash);

    /* food orbs */
    for (var i = 0; i < ORB_POOL; i++) {
        var o = orbs[i];
        if (!o.active) continue;
        if (!inView(o.x, o.y, 30)) continue;
        var pr = o.r * (1 + 0.14 * Math.sin(time * 4 + o.phase));
        var gs = pr * 3.8;
        ctx.drawImage(orbSprs[o.ci], (o.x - gs / 2) | 0, (o.y - gs / 2) | 0, gs | 0, gs | 0);
    }

    /* powerups: bobbing icon + pulsing pickup ring */
    for (var pw = 0; pw < pows.length; pw++) {
        var w = pows[pw];
        if (!w.active || !inView(w.x, w.y, 60)) continue;
        var bob = Math.sin(time * 3 + w.phase) * 5;
        var pulse = 1 + 0.1 * Math.sin(time * 5 + w.phase);
        var fade = w.ttl < 3 ? (Math.sin(time * 12) > 0 ? 1 : 0.35) : 1;
        ctx.globalAlpha = fade;
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = w.type === 0 ? 'rgba(125, 249, 255, 0.6)' : 'rgba(255, 217, 61, 0.6)';
        ctx.beginPath();
        ctx.arc(w.x, w.y + bob * 0.3, 26 * pulse, 0, Math.PI * 2);
        ctx.stroke();
        var iw = 38 * pulse;
        ctx.drawImage(powSprs[w.type], (w.x - iw / 2) | 0, (w.y - iw / 2 + bob) | 0, iw | 0, iw | 0);
        ctx.globalAlpha = 1;
    }

    /* snakes: bots first, player on top */
    for (var b = 1; b < snakes.length; b++) {
        if (!snakes[b].dead) drawSnake(snakes[b]);
    }
    if (!player.dead) drawSnake(player);

    /* particles */
    for (var p = 0; p < parts.length; p++) {
        var pt = parts[p];
        if (!pt.active) continue;
        if (!inView(pt.x, pt.y, 20)) continue;
        var al = 1 - pt.life / pt.ttl;
        ctx.globalAlpha = al;
        ctx.fillStyle = pt.color;
        if (pt.type === 1) {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, pt.size * al, 0, Math.PI * 2);
            ctx.fill();
        } else if (pt.type === 3) {
            /* star glint: slim rotating four-point cross */
            ctx.save();
            ctx.translate(pt.x, pt.y);
            ctx.rotate(pt.rot);
            var gs2 = pt.size * (0.5 + 0.5 * al);
            ctx.fillRect(-gs2, -gs2 * 0.16, gs2 * 2, gs2 * 0.32);
            ctx.fillRect(-gs2 * 0.16, -gs2, gs2 * 0.32, gs2 * 2);
            ctx.restore();
        } else {
            ctx.save();
            ctx.translate(pt.x, pt.y);
            ctx.rotate(pt.rot);
            ctx.fillRect(-pt.size / 2, -pt.size * 0.75, pt.size, pt.size * 1.5);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;

    /* shockwave rings */
    for (var rg = 0; rg < rings.length; rg++) {
        var ring = rings[rg];
        if (!ring.active) continue;
        var rp = ring.life / ring.ttl;
        var re = 1 - (1 - rp) * (1 - rp); /* ease out */
        if (!inView(ring.x, ring.y, ring.maxR + 20)) continue;
        ctx.globalAlpha = 1 - rp;
        ctx.lineWidth = ring.lw * (1 - rp * 0.6);
        ctx.strokeStyle = ring.color;
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, Math.max(1, ring.maxR * re), 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    /* floating score labels */
    ctx.textAlign = 'center';
    for (var lb2 = 0; lb2 < labels.length; lb2++) {
        var l = labels[lb2];
        if (!l.active) continue;
        if (!inView(l.x, l.y, 80)) continue;
        var lp = l.life / l.ttl;
        var pop = lp < 0.18 ? 0.6 + (lp / 0.18) * 0.5 : 1.1 - (lp - 0.18) * 0.12;
        ctx.globalAlpha = lp > 0.6 ? 1 - (lp - 0.6) / 0.4 : 1;
        ctx.font = '800 ' + ((l.size * pop) | 0) + 'px Nunito, sans-serif';
        ctx.strokeStyle = 'rgba(8, 8, 26, 0.8)';
        ctx.lineWidth = 3;
        ctx.strokeText(l.text, l.x | 0, l.y | 0);
        ctx.fillStyle = l.color;
        ctx.fillText(l.text, l.x | 0, l.y | 0);
    }
    ctx.globalAlpha = 1;

    /* screen space UI */
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (vigCanvas) ctx.drawImage(vigCanvas, 0, 0);
    drawMinimap();
}

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
initBots();
setMuteIcon();
showMenu();
updateLeaderboard();
requestAnimationFrame(loop);

/* ================= Headless test hooks (harmless in production) ================= */
window.__noodleTest = {
    update: update,
    render: render,
    startRun: startRun,
    snakes: snakes,
    player: player,
    orbs: orbs,
    killSnake: killSnake,
    getLeaderboard: getLeaderboard,
    updateLeaderboard: updateLeaderboard,
    bodyPoint: function (s, d) { pointAt(s, d, tmpPt); return { x: tmpPt.x, y: tmpPt.y }; },
    state: function () { return currentState; },
    data: function () { return data; },
    profile: function () { return WoopProfile.load(); },
    bestRank: function () { return bestRank; },
    crowned: function () { return crownedOnce; },
    combo: function () { return combo; },
    bestCombo: function () { return bestCombo; },
    diff: function () { return diffCur; },
    pows: pows,
    spawnPow: spawnPow,
    shield: function () { return shieldT; },
    magnet: function () { return magnetT; }
};

})();
</script>
</body>

<script>
(function () {
'use strict';

/* ================= Environment (browser or headless Node test harness) ================= */
var IS_NODE = (typeof document === 'undefined');

function stubEl() {
    var o = new Proxy(function () {}, {
        get: function (t, k) {
            if (k === Symbol.toPrimitive) return function () { return 0; };
            return o;
        },
        set: function () { return true; },
        apply: function () { return o; }
    });
    return o;
}
var doc, win;
if (IS_NODE) {
    doc = { getElementById: function () { return stubEl(); }, createElement: function () { return stubEl(); }, addEventListener: function () {}, hidden: false };
    win = { innerWidth: 420, innerHeight: 860, devicePixelRatio: 1, addEventListener: function () {} };
} else {
    doc = document;
    win = window;
}

/* Storage wrapper: real localStorage in the browser, in-memory shim under Node */
var LS;
if (IS_NODE) {
    LS = {
        _s: {},
        getItem: function (k) { return Object.prototype.hasOwnProperty.call(this._s, k) ? this._s[k] : null; },
        setItem: function (k, v) { this._s[k] = String(v); },
        removeItem: function (k) { delete this._s[k]; }
    };
} else {
    LS = window.localStorage;
}

/* ================= DOM handles ================= */
var canvas = doc.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var titleEl = doc.getElementById('title');
var menuLevelEl = doc.getElementById('menuLevel');
var resetBtn = doc.getElementById('resetBtn');
var muteBtn = doc.getElementById('muteBtn');
var pauseBtn = doc.getElementById('pauseBtn');
var pauseOverlay = doc.getElementById('pauseOverlay');
var toastEl = doc.getElementById('toast');
var rewardPanel = doc.getElementById('rewardPanel');
var winCoinsEl = doc.getElementById('winCoins');
var winTitleEl = doc.getElementById('winTitle');
var chestEls = [doc.getElementById('chest0'), doc.getElementById('chest1'), doc.getElementById('chest2')];
var losePanel = doc.getElementById('losePanel');
var pityRowEl = doc.getElementById('pityRow');
var tryBtn = doc.getElementById('tryBtn');
var confirmPanel = doc.getElementById('confirmPanel');
var yesBtn = doc.getElementById('yesBtn');
var noBtn = doc.getElementById('noBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_merge-squad';
var defaultData = {
    army: [],
    coins: 300,
    campaignLevel: 1,
    totalMerges: 0,
    bestLevel: 1,
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(LS.getItem(STORAGE_KEY));
        if (!d) return Object.assign({}, defaultData);
        d = Object.assign({}, defaultData, d);
        /* v1 saves had no bestLevel, backfill it from campaign progress */
        d.bestLevel = Math.max(d.bestLevel || 1, d.campaignLevel || 1);
        return d;
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
var data = loadData();
function saveNow() {
    try {
        var clean = {
            army: data.army.map(function (u) { return { slot: u.slot, cls: u.cls, level: u.level }; }),
            coins: data.coins,
            campaignLevel: data.campaignLevel,
            totalMerges: data.totalMerges,
            bestLevel: data.bestLevel,
            muted: data.muted,
            lastPlayed: new Date().toISOString()
        };
        LS.setItem(STORAGE_KEY, JSON.stringify(clean));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(LS.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { LS.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};
var STICKER_TH = { bronze: 5, silver: 15, gold: 30 };

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function r10(v) { return Math.round(v / 10) * 10; }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (win.AudioContext || win.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Coin clink: two bright short pings */
function sfxCoin() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1568 * p, t);
    o.frequency.setValueAtTime(2093 * p, t + 0.06);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.2);
}

/* Merge fuse chime: rising two note chime, pitch climbs with the new level */
function sfxMerge(level) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar() * Math.pow(2, Math.min(24, level) / 24);
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.exponentialRampToValueAtTime(784 * p, t + 0.12);
    o.frequency.exponentialRampToValueAtTime(1047 * p, t + 0.24);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.setValueAtTime(0.2, t + 0.24);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.47);
}

/* Foam bonk: soft low thump of filtered noise */
function sfxBonk() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(420 * p, t);
    lp.frequency.exponentialRampToValueAtTime(120 * p, t + 0.12);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.24, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.16);
}

/* Dart pop: tiny bright pop */
function sfxPop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(700 * p, t);
    o.frequency.exponentialRampToValueAtTime(1400 * p, t + 0.05);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.11);
}

/* Water balloon splash: noise burst through a falling bandpass */
function sfxSplash() {
    if (!canPlay()) return;

function unitCost(campLevel) {
    return r10(100 * Math.pow(1.12, campLevel - 1));
}
function shopSpawnLevel(campLevel) {
    /* level 2 toys from campaign level 8, level 3 from 16, then every 5 levels after */
    if (campLevel >= 16) return 3 + Math.floor((campLevel - 16) / 5);
    if (campLevel >= 8) return 2;
    return 1;
}
function unitVal(level) { return 100 * Math.pow(2, level - 1); }
function statsFor(cls, level) {
    var b = CLASSES[cls];
    var m = Math.pow(2, level - 1);
    return { hp: b.hp * m, dmg: b.dmg * m };
}
function eraOf(level) { return Math.min(5, Math.floor((level - 1) / 4)); }
var ERA_NAMES = ['Sock', 'Wooden', 'Wind-Up', 'Blaster', 'Robo', 'Cosmic Plush'];
function winPayout(level) {
    var p = 150 + 25 * level;
    /* from mid campaign the payout tracks the enemy budget so income keeps pace
       with the 1.19 difficulty curve (factor 0.40 tuned via the headless autopilot:
       a smart player clears level 25 in <=3 tries, a lazy-merge player stalls in 6-25) */
    p = Math.max(p, r10(250 * Math.pow(1.19, level - 1) * 0.4));
    return (level % 5 === 0) ? p * 2 : p;
}
function backdropEra(campLevel) { return Math.min(5, Math.floor((campLevel - 1) / 5)); }

function slotXY(slot) {
    var col = slot % COLS, row = Math.floor(slot / COLS);
    return { x: GRID_X + col * CELL + CELL / 2, y: GRID_Y + row * CELL + CELL / 2 };
}
function slotAt(x, y) {
    if (x < GRID_X || x >= GRID_X + COLS * CELL || y < GRID_Y || y >= GRID_Y + ROWS * CELL) return -1;
    var col = Math.floor((x - GRID_X) / CELL);
    var row = Math.floor((y - GRID_Y) / CELL);
    return row * COLS + col;
}
function unitAt(slot) {
    for (var i = 0; i < data.army.length; i++) if (data.army[i].slot === slot) return data.army[i];
    return null;
}
function freeSlot() {
    for (var s = 0; s < COLS * ROWS; s++) if (!unitAt(s)) return s;
    return -1;
}

/* ================= Army operations (buy, merge, swap, sell) ================= */
function buyUnit(cls) {
    if (state !== 'buy' && state !== 'menu') return null;
    if (!CLASSES[cls]) return null;
    var cost = unitCost(data.campaignLevel);
    if (data.coins < cost) return null;
    var s = freeSlot();
    if (s === -1) return null;
    data.coins -= cost;
    var u = { slot: s, cls: cls, level: shopSpawnLevel(data.campaignLevel), popT: 0.001 };
    data.army.push(u);
    var p = slotXY(s);
    /* drop-in: squash pop, a ring of dust at the feet, a sparkle */
    burstSparks(p.x, p.y, 8, '#FFFFFF');
    burstRing(p.x, p.y + 18, 'rgba(214,180,126,0.9)');
    for (var d = 0; d < 6; d++) {
        var da = d * Math.PI / 3;
        spawnPart(8, p.x + Math.cos(da) * 14, p.y + 20, Math.cos(da) * 40, -rand(6, 20), rand(0.3, 0.5), rand(5, 8), 'rgba(214,180,126,0.85)');
    }
    /* shop card press-bounce (index of the class in the shop row) */
    cardBounce[CLASS_LIST.indexOf(cls)] = 0.001;
    sfxSpawn();
    saveNow();
    return u;
}
/* per-card press bounce timers + eased coin-counter display value */
var cardBounce = [0, 0, 0];
var coinCountShown = null; /* null until first render; then eases toward data.coins */

/* Drop the unit from one slot onto another. Returns 'merge' | 'swap' | 'move' | 'none'. */
function dropUnit(fromSlot, toSlot) {
    var a = unitAt(fromSlot);
    if (!a || fromSlot === toSlot || toSlot < 0 || toSlot >= COLS * ROWS) return 'none';
    var b = unitAt(toSlot);
    var p = slotXY(toSlot);
    if (b && b.cls === a.cls && b.level === a.level) {
        /* merge: one unit of level + 1 with a big fuse */
        var prevEra = eraOf(b.level);
        data.army.splice(data.army.indexOf(a), 1);
        b.level++;
        b.popT = 0.001;
        b.flexT = 0.001; /* new unit strikes a pose for ~300ms */
        data.totalMerges++;
        /* bigger fuse: double ring burst + radial rays of sparks */
        burstRing(p.x, p.y, TEAM_COL[0].main);
        burstRing(p.x, p.y, '#FFE14D');
        burstShock(p.x, p.y, 14, '#FFFFFF');
        for (var ray = 0; ray < 10; ray++) {
            var ra = ray * Math.PI / 5;
            spawnPart(2, p.x, p.y, Math.cos(ra) * 200, Math.sin(ra) * 200, rand(0.3, 0.55), rand(3, 5.5), '#FFE14D');
        }
        burstConfettiAt(p.x, p.y, 22);
        sfxMerge(b.level);
        /* era celebration when a merge crosses into a new era band (lvl 5,9,13,17,21) */
        var newEra = eraOf(b.level);
        if (newEra > prevEra) {
            triggerEraCelebration(newEra);
            backdropFlashT = 0.9; /* backdrop strip flashes to the new era backdrop */
        }
        saveNow();
        return 'merge';
    }
    if (b) {
        b.slot = fromSlot;
        a.slot = toSlot;
        saveNow();
        return 'swap';
    }
    a.slot = toSlot;
    saveNow();
    return 'move';
}

function sellRefund(u) {

/* ================= Enemy generation ================= */
function pickWeighted(w) {
    var r = Math.random() * (w[0] + w[1] + w[2]);
    if (r < w[0]) return 'bonker';
    if (r < w[0] + w[1]) return 'popper';
    return 'lobber';
}
var FORM_WEIGHTS = {
    turtle: [0.55, 0.3, 0.15],
    spread: [0.34, 0.33, 0.33],
    artillery: [0.16, 0.2, 0.64],
    rush: [0.74, 0.16, 0.1],
    tanks: [0.86, 0.09, 0.05]
};
/* Player army value split by class, used to pick a counter wave */
function armyProfile() {
    var v = { bonker: 0, popper: 0, lobber: 0 };
    for (var i = 0; i < data.army.length; i++) {
        v[data.army[i].cls] += unitVal(data.army[i].level);
    }
    return v;
}
/* Levels 1 to 5 stay gentle onboarding. From level 6 the wave usually counters
   the player's heaviest class: tank walls outlast dart spam, rush swarms punish
   back heavy boards, artillery punishes melee clumps. Every third level runs a
   fixed rotation instead so no single board layout wins everything. */
function pickForm(level) {
    if (level < 6) return ['spread', 'turtle', 'spread', 'rush', 'spread'][(level - 1) % 5];
    var rot = ['artillery', 'rush', 'tanks', 'spread'];
    if (level % 3 === 0) return rot[Math.floor(level / 3) % 4];
    var v = armyProfile();
    if (v.popper >= v.bonker && v.popper >= v.lobber) return 'tanks';
    if (v.lobber >= v.bonker) return 'rush';
    return 'artillery';
}
function generateEnemies(level) {
    var budget = 250 * Math.pow(1.19, level - 1);
    var out = [];
    var isBossLv = level % 5 === 0;
    if (isBossLv) budget *= 1.5; /* boss levels spike well above the curve */
    var form = pickForm(level);
    var weights = FORM_WEIGHTS[form];

    if (isBossLv) {
        var bossVal = budget * 0.62;
        budget -= bossVal;
        var mult = bossVal / 100;
        out.push({
            cls: 'bonker', isBoss: true,
            level: Math.max(1, Math.floor(Math.log2(mult)) + 1),
            hp: Math.round(CLASSES.bonker.hp * mult * 1.5),
            dmg: Math.round(CLASSES.bonker.dmg * mult * 0.55),
            x: 210, y: 200
        });
    }
    /* unit sizing per formation: tank walls are few and huge, rushes are a swarm,
       everything else caps level so at least 4 escorts fit */
    var per = (form === 'tanks') ? 3 : (form === 'rush' ? 6 : 4);
    var maxL = 1;
    while (unitVal(maxL + 1) <= budget / per && maxL < 39) maxL++;
    var maxCount = isBossLv ? 6 : (form === 'tanks' ? 6 : 12);
    var count = 0;
    while (budget >= 100 && count < maxCount) {
        var lvl = Math.min(maxL, Math.floor(Math.log2(budget / 100)) + 1);
        if (lvl < 1) break;
        out.push({ cls: pickWeighted(weights), level: lvl, isBoss: false });
        budget -= unitVal(lvl);
        count++;
    }
    /* positions: bonkers up front (closest to the player), poppers mid, lobbers back */
    var rows = [[], [], []];
    var PREF = { bonker: 0, popper: 1, lobber: 2 };
    for (var i = 0; i < out.length; i++) {
        var e = out[i];
        if (e.isBoss) continue;
        var pref = PREF[e.cls];
        var order = [pref, (pref + 1) % 3, (pref + 2) % 3];
        for (var o = 0; o < 3; o++) {
            if (rows[order[o]].length < 4) { rows[order[o]].push(e); break; }
        }
    }
    for (var r = 0; r < 3; r++) {
        var row = rows[r];
        for (var k = 0; k < row.length; k++) {
            var n = row.length;
            var spacing = Math.min(88, 352 / Math.max(1, n));
            row[k].x = 210 + (k - (n - 1) / 2) * spacing;
            row[k].y = ENEMY_ROW_Y[r];
        }
    }
    return out;
}

/* ================= FX pools (never allocate during gameplay) ================= */
var parts = [];
for (var qi = 0; qi < 340; qi++) {
    parts.push({ active: false, type: 0, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1, size: 4, color: '#fff', seed: 0 });
}
/* types: 1 confetti rect, 2 spark dot, 3 stuffing puff, 4 water droplet, 5 expanding ring,
   6 coin, 7 shockwave flash ring (thick, quick), 8 dust puff (ground), 9 trail dot */
function spawnPart(type, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.type = type;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, Math.PI * 2);
            p.vr = rand(-7, 7);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;
            p.seed = rand(0, 10);
            return;
        }
    }
}

/* ================= Battle ================= */
function makeFighter(team, cls, level, x, y, slot, isBoss, hpOverride, dmgOverride) {
    var b = CLASSES[cls];
    var st = statsFor(cls, level);
    return {
        team: team, cls: cls, level: level, slot: slot, isBoss: !!isBoss,
        x: x, y: y, vx: 0, vy: 0,
        hp: hpOverride || st.hp, maxHp: hpOverride || st.hp,
        dmg: dmgOverride || st.dmg,
        range: isBoss ? 40 : b.range,
        speed: isBoss ? 42 : b.speed,
        cdMax: isBoss ? 2.2 : b.cd,
        cd: rand(0.2, 0.7),
        r: isBoss ? 52 : b.r,
        splash: b.splash || 0,
        alive: true,
        atkAnim: 0
    };
}

function startBattle() {
    if (state !== 'buy' && state !== 'menu') return false;
    fighters = [];
    var i;
    for (i = 0; i < data.army.length; i++) {
        var u = data.army[i];
        var p = slotXY(u.slot);
        fighters.push(makeFighter(0, u.cls, u.level, p.x, p.y, u.slot, false));
    }
    for (i = 0; i < pendingEnemies.length; i++) {
        var e = pendingEnemies[i];
        fighters.push(makeFighter(1, e.cls, e.level, e.x, e.y, -1, e.isBoss, e.hp, e.dmg));
    }
    var tot = [0, 0];
    for (i = 0; i < fighters.length; i++) tot[fighters[i].team] += fighters[i].maxHp;
    battleMaxHp = [Math.max(1, tot[0]), Math.max(1, tot[1])];
    battleT = 0;
    timeScale = 1;
    slowmoT = 0; zoomPunchT = 0; /* clear any leftover cinematic state */
    state = 'battle';
    if (!IS_NODE) pauseBtn.style.display = 'flex';
    return true;
}

/* damage tier by fraction of target maxHp: 0 pip, 1 solid, 2 heavy/boss */
function dmgTier(t, amt) {
    var frac = amt / Math.max(1, t.maxHp);
    if (t.isBoss || frac >= 0.5) return 2;
    if (frac >= 0.18) return 1;
    return 0;
}
function damage(t, amt, splashy) {
    if (!t.alive) return;
    amt = Math.round(amt);
    t.hp -= amt;
    spawnDmg(t.x, t.y - t.r - 8, String(amt), t.team === 0 ? '#F35BAE' : '#FFFFFF');
    /* impact shockwave + flash + screen shake scaled to the hit's weight */
    var tier = dmgTier(t, amt);
    burstShock(t.x, t.y, 8 + tier * 5, tier >= 2 ? '#FFE14D' : '#FFFFFF');
    addTrauma(tier === 0 ? 0.08 : (tier === 1 ? 0.16 : 0.34));
    if (t.hp <= 0) {
        t.alive = false;
        burstStuffing(t.x, t.y, t.r);
        spawnChute(t.x, t.y, t.team);
        sfxPoof();
        if (t.isBoss) { addTrauma(0.6); burstConfettiAt(t.x, t.y, 30); }
        checkFinalKO(t);
    }
}
/* If this death empties a team, punch a 400ms slow-mo + zoom on the last KO */
function checkFinalKO(justKilled) {
    if (slowmoT > 0) return;
    var aliveSame = 0;
    for (var i = 0; i < fighters.length; i++) {
        var o = fighters[i];
        if (o.alive && o.team === justKilled.team) aliveSame++;
    }
    if (aliveSame === 0) triggerFinalKO(justKilled.x, justKilled.y);
}

function nearestFoe(f) {
    var best = null, bd = 1e18;
    for (var i = 0; i < fighters.length; i++) {
        var o = fighters[i];
        if (!o.alive || o.team === f.team) continue;
        var dx = o.x - f.x, dy = o.y - f.y;
        var d = dx * dx + dy * dy;
        if (d < bd) { bd = d; best = o; }
    }
    return best;
}

function doAttack(f, t, mul) {
    f.atkAnim = 0.28;
    if (f.cls === 'popper' && !f.isBoss) {
        spawnDart(f, t, f.dmg * mul);
        sfxPop();
    } else if (f.cls === 'lobber' && !f.isBoss) {
        /* lead the target a little so balloons connect */
        var lead = 0.75 * clamp(Math.sqrt((t.x - f.x) * (t.x - f.x) + (t.y - f.y) * (t.y - f.y)) / 300, 0.45, 0.95);
        spawnBalloon(f, t.x + t.vx * lead, t.y + t.vy * lead, f.dmg * mul, f.splash);
    } else {
        var hit = f.dmg * mul;
        var tier = dmgTier(t, hit);
        damage(t, hit);
        burstSparks(t.x, t.y - t.r * 0.4, 6, '#FFFFFF');
        sfxBonk();
        sfxImpact(f.isBoss ? 2 : tier);
        /* wobble word on big bonks only (pooled + capped) */
        if (f.isBoss || tier >= 2) spawnWord(t.x, t.y - t.r - 22, 'BONK!', '#FFD93D');
        if (f.isBoss) {
            addTrauma(0.4);
            for (var i = 0; i < fighters.length; i++) {
                var o = fighters[i];
                if (!o.alive || o.team === f.team || o === t) continue;
                var dx = o.x - t.x, dy = o.y - t.y;
                if (dx * dx + dy * dy < 55 * 55) damage(o, f.dmg * mul * 0.5);
            }
        }
    }
}

function updateBattle(dt) {
    battleT += dt;
    /* gentle sudden death ramp so battles always resolve */
    var mul = 1 + Math.max(0, battleT - 40) / 10;
    var i, f;
    for (i = 0; i < fighters.length; i++) {
        f = fighters[i];
        if (!f.alive) continue;
        if (f.atkAnim > 0) f.atkAnim -= dt;
        f.cd -= dt;
        var t = nearestFoe(f);
        f.vx = 0; f.vy = 0;
        if (!t) continue;
        var dx = t.x - f.x, dy = t.y - f.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var reach = f.range + f.r + t.r;
        if (dist > reach) {
            var inv = 1 / Math.max(0.001, dist);
            f.vx = dx * inv * f.speed;
            f.vy = dy * inv * f.speed;
            f.x += f.vx * dt;
            f.y += f.vy * dt;
            /* kick up a dust puff under the feet at a throttled rate */
            f.dustT = (f.dustT || 0) - dt;
            if (f.dustT <= 0) { burstDust(f.x, f.y + f.r * 0.7, f.vx >= 0 ? 1 : -1); f.dustT = 0.16; }
        } else if (f.cd <= 0) {
            doAttack(f, t, mul);
            f.cd = f.cdMax * rand(0.92, 1.08);
        }
    }
    /* soft separation so toys do not stack */
    for (i = 0; i < fighters.length; i++) {
        f = fighters[i];
        if (!f.alive) continue;
        for (var j = i + 1; j < fighters.length; j++) {
            var o = fighters[j];
            if (!o.alive) continue;
            var ddx = o.x - f.x, ddy = o.y - f.y;
            var min = (f.r + o.r) * 0.82;
            var d2 = ddx * ddx + ddy * ddy;
            if (d2 > 0.0001 && d2 < min * min) {
                var d = Math.sqrt(d2);
                var push = (min - d) / d * 0.5;
                f.x -= ddx * push; f.y -= ddy * push;
                o.x += ddx * push; o.y += ddy * push;
            }
        }
        f.x = clamp(f.x, 24 + f.r, W - 24 - f.r);
        f.y = clamp(f.y, 96 + f.r, GRID_Y + ROWS * CELL - 8);
    }
    /* projectiles */
    for (i = 0; i < projs.length; i++) {
        var p = projs[i];
        if (!p.active) continue;
        p.t += dt;
        if (p.kind === 1) {
            var tgt = p.target;
            if (tgt && tgt.alive) { p.tx = tgt.x; p.ty = tgt.y; }
            var pdx = p.tx - p.x, pdy = p.ty - p.y;
            var pd = Math.sqrt(pdx * pdx + pdy * pdy);
            var step = 460 * dt;
            /* motion trail behind the dart */
            p.trailT = (p.trailT || 0) - dt;
            if (p.trailT <= 0) { spawnTrail(p.x, p.y, 3.5, '#FF8A3D'); p.trailT = 0.03; }
            if (pd <= step || p.t > p.dur) {
                p.active = false;
                if (tgt && tgt.alive) {
                    var dtier = dmgTier(tgt, p.dmg);
                    damage(tgt, p.dmg);
                    if (dtier >= 2) spawnWord(tgt.x, tgt.y - tgt.r - 20, 'POP!', '#FF8A3D');
                }
                burstSparks(p.tx, p.ty, 4, '#FFE14D');
            } else {
                p.x += pdx / pd * step;
                p.y += pdy / pd * step;
            }
        } else {
            var k = p.t / p.dur;
            /* arcing balloon leaves a soft blue trail */
            p.trailT = (p.trailT || 0) - dt;
            if (p.trailT <= 0 && k < 1) { spawnTrail(p.x, p.y, 4.5, '#6FCBFF'); p.trailT = 0.035; }
            if (k >= 1) {
                p.active = false;
                burstSplash(p.tx, p.ty);
                sfxSplash();
                var splashHits = 0;
                for (var m = 0; m < fighters.length; m++) {
                    var o2 = fighters[m];
                    if (!o2.alive || o2.team === p.team) continue;
                    var sdx = o2.x - p.tx, sdy = o2.y - p.ty;
                    var sr = p.splash + o2.r;
                    if (sdx * sdx + sdy * sdy < sr * sr) { damage(o2, p.dmg); splashHits++; }
                }
                /* SPLAT on a multi-target soak, capped by the word pool */
                if (splashHits >= 2) spawnWord(p.tx, p.ty - 20, 'SPLAT!', '#6FCBFF');
            } else {
                p.x = p.sx + (p.tx - p.sx) * k;
                p.y = p.sy + (p.ty - p.sy) * k - Math.sin(k * Math.PI) * 90;
            }
        }
    }
    /* outcome */
    var alive = [0, 0];
    for (i = 0; i < fighters.length; i++) if (fighters[i].alive) alive[fighters[i].team]++;
    if (alive[0] === 0) endBattle(false);
    else if (alive[1] === 0) endBattle(true);
}

function buildChests(payout) {
    var lvl = shopSpawnLevel(data.campaignLevel) + 1;
    var opts = [
        { type: 'coins', amt: Math.max(20, r10(payout * 0.4)) },
        { type: 'coins', amt: Math.max(40, r10(payout * 0.8)) },
        { type: 'unit', cls: CLASS_LIST[Math.floor(Math.random() * 3)], level: lvl }
    ];
    /* shuffle */
    for (var i = opts.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = opts[i]; opts[i] = opts[j]; opts[j] = tmp;
    }
    return opts;
}

function endBattle(won) {
    for (var i = 0; i < projs.length; i++) projs[i].active = false;
    timeScale = 1;
    if (!IS_NODE) pauseBtn.style.display = 'none';
    var lvl = data.campaignLevel;
    if (won) {
        var payout = winPayout(lvl);
        data.coins += payout;
        coinFlashT = 0.6;
        /* surviving army kept, back to slots, full HP */
        var kept = [];
        for (var k = 0; k < fighters.length; k++) {
            var f = fighters[k];
            if (f.team === 0 && f.alive) kept.push({ slot: f.slot, cls: f.cls, level: f.level });
        }
        data.army = kept;
        data.campaignLevel = lvl + 1;
        if (data.campaignLevel > data.bestLevel) data.bestLevel = data.campaignLevel;
        chests = buildChests(payout);
        state = 'reward';
        /* confetti storm + a stream of coins flying one-by-one into the counter */
        burstConfettiSky();
        burstConfettiSky();
        launchVictoryCoins(data.coins, 16);
        sfxFanfare();
        if (!IS_NODE) showRewardPanel(payout, lvl);
    } else {
        /* army kept exactly as it stood before the battle, small pity coins so a retry is always possible */
        var pity = Math.max(20, r10(winPayout(lvl) * 0.4));
        data.coins += pity;
        state = 'lose';
        /* bigger, floatier stuffing puffs drifting up as the squad flops */
        for (var sp = 0; sp < 5; sp++) {

        }

            losePanel.classList.add('show');
        }
    }
    saveNow();

    if (earned.length > 0 && !IS_NODE) {
        var labels = { bronze: 'BRONZE', silver: 'SILVER', gold: 'GOLD' };

}

function getChestOptions() { return chests; }

function pickChest(i) {
    if (state !== 'reward' || !chests) return null;
    var opt = chests[i];
    if (!opt) return null;
    if (opt.type === 'coins') {
        data.coins += opt.amt;
        coinFlashT = 0.6;
        burstCoins(W / 2, H / 2, 10);
        sfxCoin();
    } else {
        var s = freeSlot();
        if (s !== -1) {
            var u = { slot: s, cls: opt.cls, level: opt.level, popT: 0.001 };
            data.army.push(u);
            var p = slotXY(s);
            burstSparks(p.x, p.y, 10, '#FFFFFF');
            sfxSpawn();
        } else {
            /* board is full: the toy hops back in the chest and leaves coins instead */
            opt = { type: 'coins', amt: r10(unitVal(opt.level) * 0.5), was: 'unit' };
            data.coins += opt.amt;
            sfxCoin();
        }
    }
    chests = null;
    sfxChest();
    enterBuy();
    saveNow();
    return opt;
}

/* ================= Master update ================= */
function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 1.8 * dt);
    if (coinFlashT > 0) coinFlashT -= dt;
    if (eraBanner.ttl > 0) { eraBanner.t += dt; if (eraBanner.t >= eraBanner.ttl) eraBanner.ttl = 0; }
    if (zoomPunchT > 0) zoomPunchT = Math.max(0, zoomPunchT - dt);
    if (backdropFlashT > 0) backdropFlashT = Math.max(0, backdropFlashT - dt);
    for (var cb = 0; cb < cardBounce.length; cb++) {
        if (cardBounce[cb]) { cardBounce[cb] += dt; if (cardBounce[cb] > 0.28) cardBounce[cb] = 0; }
    }
    /* ease the displayed coin counter toward the real balance */
    if (coinCountShown === null) coinCountShown = data.coins;
    else {
        var diff = data.coins - coinCountShown;
        if (Math.abs(diff) < 1) coinCountShown = data.coins;
        else coinCountShown += diff * Math.min(1, 12 * dt);
    }
    var i;
    for (i = 0; i < data.army.length; i++) {
        if (data.army[i].popT) {
            data.army[i].popT += dt;
            if (data.army[i].popT > 0.4) data.army[i].popT = 0;
        }
        if (data.army[i].flexT) {
            data.army[i].flexT += dt;
            if (data.army[i].flexT > 0.3) data.army[i].flexT = 0;
        }
    }
    updateParticles(dt);
    updateDmgNums(dt);
    updateWords(dt);
    updateChutes(dt);
    updateFlyCoins(dt);
    if (state === 'battle') {
        /* final-KO slow motion: run the battle sim at reduced speed for a beat */
        var bScale = timeScale;
        if (slowmoT > 0) { slowmoT = Math.max(0, slowmoT - dt); bScale *= 0.3; }
        updateBattle(dt * bScale);
    } else if (state === 'buy') {
        if (!bonusCoin) {
            nextCoinIn -= dt;
            if (nextCoinIn <= 0) {
                var spots = [
                    { x: 22, y: rand(GRID_Y + 20, GRID_Y + ROWS * CELL - 20) },
                    { x: W - 22, y: rand(GRID_Y + 20, GRID_Y + ROWS * CELL - 20) },
                    { x: rand(70, W - 70), y: GRID_Y - 22 },
                    { x: rand(70, W - 70), y: GRID_Y + ROWS * CELL + 6 }
                ];
                var sp = spots[Math.floor(Math.random() * spots.length)];
                bonusCoin = { x: sp.x, y: sp.y, t: 0, ttl: 6, amt: Math.max(10, r10(unitCost(data.campaignLevel) * 0.15)) };
            }
        } else {
            bonusCoin.t += dt;
            if (bonusCoin.t > bonusCoin.ttl) { bonusCoin = null; nextCoinIn = rand(7, 13); }
        }
    }
}

var S = 1, OX = 0, OY = 0, DPR = 1;
var spriteCache = {};
var floorTile = null, backdropCache = {};

function makeCanvas(w, h) {
    var c = doc.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function resize() {
    DPR = Math.min(2, win.devicePixelRatio || 1);
    canvas.width = Math.floor(win.innerWidth * DPR);
    canvas.height = Math.floor(win.innerHeight * DPR);
    canvas.style.width = win.innerWidth + 'px';
    canvas.style.height = win.innerHeight + 'px';
    S = Math.min(canvas.width / W, canvas.height / H);
    OX = (canvas.width - W * S) / 2;
    OY = (canvas.height - H * S) / 2;
    spriteCache = {};
    backdropCache = {};
    floorTile = null;
}

function buildFloorTile() {
    var TW = 140, TH = 96;
    floorTile = makeCanvas(TW * S, TH * S);
    var g = floorTile.getContext('2d');
    g.scale(S, S);
    g.fillStyle = '#F0D2A0';
    g.fillRect(0, 0, TW, TH);
    var rowsY = [0, 32, 64];
    for (var r = 0; r < 3; r++) {
        var y = rowsY[r];
        g.fillStyle = r % 2 ? '#EDCB94' : '#F3D7A8';
        g.fillRect(0, y, TW, 32);
        g.fillStyle = '#D9B47E';
        g.fillRect(0, y + 30, TW, 2);
        var seam = (r % 2) ? 40 : 100;
        g.fillRect(seam, y, 2, 32);
    }
    g.fillStyle = 'rgba(180,130,70,0.35)';
    g.beginPath(); g.arc(58, 18, 3.5, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(112, 78, 3, 0, Math.PI * 2); g.fill();
}

function drawStarShape(g, x, y, r, rot) {
    g.beginPath();
    for (var i = 0; i < 10; i++) {
        var a = rot + i * Math.PI / 5 - Math.PI / 2;
        var rr2 = (i % 2 === 0) ? r : r * 0.45;
        var px = x + Math.cos(a) * rr2;
        var py = y + Math.sin(a) * rr2;
        if (i === 0) g.moveTo(px, py); else g.lineTo(px, py);
    }
    g.closePath();
}

        /* round plush body */
        g.fillStyle = e.body;
        g.beginPath(); g.arc(0, 0, 30, 0, Math.PI * 2); g.fill(); g.stroke();
        g.fillStyle = 'rgba(255,255,255,0.28)';
        g.beginPath(); g.ellipse(0, 12, 17, 12, 0, 0, Math.PI * 2); g.fill();
        /* pillow weapon at the side, becomes a foam bat in later eras */
        g.save();
        g.translate(30, 2);
        g.rotate(0.5);
        g.fillStyle = tc.main;
        if (era >= 3) { rr(g, -7, -26, 14, 34, 7); } else { rr(g, -10, -22, 20, 30, 9); }
        g.fill(); g.stroke();
        g.fillStyle = 'rgba(255,255,255,0.4)';
        rr(g, era >= 3 ? -4 : -6, -20, 5, 14, 2.5);
        g.fill();
        g.restore();
        paintEraTrim(g, era, cls, team);
        /* team ribbon */
        g.fillStyle = tc.main;
        g.beginPath();
        g.ellipse(0, 22, 16, 5.5, 0, 0, Math.PI * 2);
        g.fill();
        paintFace(g, era, 0, -6, team);
    } else if (cls === 'popper') {
        var by = dir < 0 ? -50 : 28; /* barrel toward the enemy */
        /* feet */
        g.fillStyle = e.body2;
        g.beginPath(); g.ellipse(-10, 30, 8, 5, 0, 0, Math.PI * 2); g.ellipse(10, 30, 8, 5, 0, 0, Math.PI * 2); g.fill();
        /* slim body */
        g.fillStyle = e.body;
        rr(g, -20, -28, 40, 58, 17);
        g.fill(); g.stroke();
        /* dart barrel */
        g.fillStyle = e.body2;
        rr(g, -8, by, 16, 24, 6);
        g.fill(); g.stroke();
        g.fillStyle = tc.main;
        g.beginPath(); g.arc(0, dir < 0 ? by + 2 : by + 22, 6, 0, Math.PI * 2); g.fill(); g.stroke();
        paintEraTrim(g, era, cls, team);
        g.fillStyle = tc.main;
        rr(g, -20, 12, 40, 8, 4);
        g.fill();
        paintFace(g, era, 0, -10, team);
    } else {
        /* squat lobber with a bucket of water balloons on top */
        g.fillStyle = e.body;
        g.beginPath(); g.ellipse(0, 10, 31, 22, 0, 0, Math.PI * 2); g.fill(); g.stroke();
        /* stubby arms */
        g.fillStyle = e.body2;
        g.beginPath(); g.arc(-30, 10, 7, 0, Math.PI * 2); g.fill(); g.stroke();
        g.beginPath(); g.arc(30, 10, 7, 0, Math.PI * 2); g.fill(); g.stroke();
        /* bucket */
        g.fillStyle = e.body2;
        g.beginPath();
        g.moveTo(-18, -30); g.lineTo(18, -30); g.lineTo(13, -8); g.lineTo(-13, -8);
        g.closePath(); g.fill(); g.stroke();
        /* balloons peeking out */
        g.fillStyle = tc.main;
        g.beginPath(); g.arc(-7, -30, 7, 0, Math.PI * 2); g.fill(); g.stroke();
        g.fillStyle = tc.lite;
        g.beginPath(); g.arc(7, -32, 6, 0, Math.PI * 2); g.fill(); g.stroke();
        paintEraTrim(g, era, cls, team);
        g.fillStyle = tc.main;
        g.beginPath(); g.ellipse(0, 26, 14, 4.5, 0, 0, Math.PI * 2); g.fill();
        paintFace(g, era, 0, 6, team);
    }
}

function getSprite(cls, era, team, box) {
    var key = cls + '|' + era + '|' + team + '|' + box;
    var spr = spriteCache[key];
    if (spr) return spr;
    spr = makeCanvas(box * S, box * S);
    var g = spr.getContext('2d');
    g.scale(box * S / 128, box * S / 128);
    g.translate(64, 64);
    paintToy(g, cls, era, team, team === 0 ? -1 : 1);
    spriteCache[key] = spr;
    return spr;
}

function drawToy(x, y, cls, level, team, scale, isBoss, withBars, hpFrac, idKey) {
    var era = eraOf(level);
    var base = isBoss ? 220 : 116;
    var box = base * scale;
    ctx.drawImage(getSprite(cls, era, team, base), (x - box / 2) | 0, (y - box / 2) | 0, box, box);
    /* level 13+ toys get little spark accents twinkling around them */
    if (level >= 13 && !isBoss) {
        var sk = (idKey || 0) * 2.1;
        for (var s3 = 0; s3 < 2; s3++) {
            var sa = time * 2 + sk + s3 * Math.PI;
            var sr2 = box * 0.42;
            var tw = 0.5 + 0.5 * Math.sin(time * 6 + sk + s3);
            ctx.globalAlpha = tw;
            ctx.fillStyle = '#FFE14D';
            drawStarShape(ctx, x + Math.cos(sa) * sr2, y - box * 0.28 + Math.sin(sa) * sr2 * 0.4, 2.6 + tw * 1.4, sa);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    /* idle blink: a quick eyelid dash over the eyes every few seconds (skip bosses) */
    if (!isBoss && idKey != null) {
        var blinkPhase = (time * 0.9 + idKey * 0.7) % 3.4;
        if (blinkPhase < 0.12) {
            var sc = box / 128;
            var faceY = (cls === 'bonker' ? -6 : (cls === 'popper' ? -10 : 6));
            var ey = y + faceY * sc;
            ctx.strokeStyle = INK;
            ctx.lineWidth = 3 * sc;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - 15 * sc, ey); ctx.lineTo(x - 5 * sc, ey);
            ctx.moveTo(x + 5 * sc, ey); ctx.lineTo(x + 15 * sc, ey);
            ctx.stroke();
        }
    }
    /* cosmic aura, drawn live so it rotates (star shapes, not alpha compositing) */
    if (era === 5) {
        ctx.fillStyle = 'rgba(255,225,77,0.9)';
        for (var a = 0; a < 3; a++) {
            var ang = time * 1.6 + a * Math.PI * 2 / 3;
            var ar = box * 0.46;
            drawStarShape(ctx, x + Math.cos(ang) * ar, y + Math.sin(ang) * ar * 0.8, 4.5, ang);
            ctx.fill();
        }
    }
    if (withBars) {
        var bw = isBoss ? 76 : 44;
        var by = y - box / 2 - 10;
        ctx.fillStyle = 'rgba(43,35,80,0.3)';
        rr(ctx, x - bw / 2, by, bw, 6, 3);
        ctx.fill();
        ctx.fillStyle = hpFrac > 0.35 ? '#58C24A' : '#E45B5B';
        rr(ctx, x - bw / 2, by, Math.max(2, bw * hpFrac), 6, 3);
        ctx.fill();
        /* orange level badge */
        var bx = x - bw / 2 - 4;
        ctx.fillStyle = '#FF8A3D';
        ctx.beginPath(); ctx.arc(bx, by + 3, 10, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(bx, by + 3, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '800 12px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(level), bx, by + 4);
    }
}

function drawCoinIcon(x, y, r) {
    ctx.fillStyle = '#FFD93D';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#C79212';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = '#FFF3B0';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, r * 0.55, -2.2, -0.7); ctx.stroke();
}

        ctx.fillStyle = '#F35BAE';

       balance, so purchases count down and victory payouts count up coin-by-coin. */

function drawGrid() {

function drawBattleBars() {

    ctx.beginPath();

}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        if (p.type === 5) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 4 * a;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size + (1 - a) * 46, 0, Math.PI * 2);
            ctx.stroke();
            continue;
        }
        if (p.type === 7) {
            /* impact shockwave: fast thick flash ring + white core flash */
            var g7 = p.life / p.ttl;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 7 * (1 - g7);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size + g7 * (p.size * 2.6), 0, Math.PI * 2);
            ctx.stroke();
            if (g7 < 0.4) {
                ctx.globalAlpha = a * 0.9;
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (1 - g7 / 0.4) * 0.9, 0, Math.PI * 2);
                ctx.fill();
            }
            continue;
        }
        if (p.type === 9) {
            /* motion trail dot: soft round, fades fast */
            ctx.globalAlpha = a * 0.5;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.4 + 0.6 * a), 0, Math.PI * 2);
            ctx.fill();
            continue;
        }
        ctx.fillStyle = p.color;
        if (p.type === 1) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        } else if (p.type === 3) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.6 + 0.4 * a), 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 6) {
            ctx.fillStyle = '#FFD93D';
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, p.size, p.size * (0.55 + 0.45 * Math.abs(Math.sin(p.life * 9))), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#C79212';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawDmgNums() {
    ctx.font = '800 17px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < dmgNums.length; i++) {
        var d = dmgNums[i];
        if (!d.active) continue;
        ctx.globalAlpha = 1 - Math.max(0, d.t - 0.4) / 0.4;
        ctx.strokeStyle = INK;
        ctx.lineWidth = 3.5;
        ctx.strokeText(d.txt, d.x, d.y);
        ctx.fillStyle = d.color;
        ctx.fillText(d.txt, d.x, d.y);
    }
    ctx.globalAlpha = 1;
}

function drawWords() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < words.length; i++) {
        var w = words[i];
        if (!w.active) continue;
        var k = w.t / w.ttl;
        var pop = k < 0.25 ? easeOutBack(k / 0.25) : 1;
        var wob = Math.sin(w.t * 22 + w.seed) * 0.14 * (1 - k);
        ctx.save();
        ctx.translate(w.x, w.y);
        ctx.rotate(wob);
        ctx.scale(pop * 1.1, pop * 1.1);
        ctx.globalAlpha = k > 0.7 ? 1 - (k - 0.7) / 0.3 : 1;
        ctx.font = '800 26px Nunito, sans-serif';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = INK;
        ctx.lineWidth = 5;
        ctx.strokeText(w.txt, 0, 0);
        ctx.fillStyle = w.color;
        ctx.fillText(w.txt, 0, 0);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawFlyCoins() {
    for (var i = 0; i < flyCoins.length; i++) {
        var f = flyCoins[i];
        if (!f.active || f.delay > 0) continue;
        drawCoinIcon(f.x, f.y, 8);
    }
    ctx.globalAlpha = 1;
}

function drawChutes() {
    for (var i = 0; i < chutes.length; i++) {
        var c = chutes[i];
        if (!c.active) continue;
        var a = c.t > 1.9 ? 1 - (c.t - 1.9) / 0.5 : 1;
        ctx.globalAlpha = a;
        var sway = Math.sin(c.t * 2.4 + c.seed) * 6;
        /* parachute canopy */
        ctx.fillStyle = TEAM_COL[c.team].lite;
        ctx.beginPath();
        ctx.arc(c.x + sway, c.y - 20, 16, Math.PI, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = INK;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(c.x + sway - 15, c.y - 19); ctx.lineTo(c.x + sway - 5, c.y + 2);
        ctx.moveTo(c.x + sway + 15, c.y - 19); ctx.lineTo(c.x + sway + 5, c.y + 2);
        ctx.stroke();
        /* smiling stuffing ball */
        ctx.fillStyle = '#FFFDF5';
        ctx.beginPath(); ctx.arc(c.x + sway, c.y + 8, 9, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = INK;
        ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.arc(c.x + sway, c.y + 8, 9, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = INK;
        ctx.beginPath();
        ctx.arc(c.x + sway - 3, c.y + 6, 1.2, 0, Math.PI * 2);
        ctx.arc(c.x + sway + 3, c.y + 6, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(c.x + sway, c.y + 9, 3.4, 0.4, Math.PI - 0.4);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawProjs() {
    for (var i = 0; i < projs.length; i++) {
        var p = projs[i];
        if (!p.active) continue;
        if (p.kind === 1) {
            /* foam dart */
            var ang = Math.atan2(p.ty - p.y, p.tx - p.x);
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(ang);
            ctx.fillStyle = TEAM_COL[p.team].main;
            rr(ctx, -9, -3.5, 14, 7, 3.5);
            ctx.fill();
            ctx.fillStyle = '#FF8A3D';
            ctx.beginPath(); ctx.arc(6, 0, 4, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        } else {
            var k = clamp(p.t / p.dur, 0, 1);
            var sc = 1 + Math.sin(k * Math.PI) * 0.35;
            ctx.fillStyle = '#6FCBFF';
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, 8 * sc, 9.5 * sc, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#3E8EF7';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.arc(p.x - 3 * sc, p.y - 3.5 * sc, 2.4 * sc, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function drawBonusCoin() {
    if (!bonusCoin) return;
    var b = bonusCoin;
    var blink = b.ttl - b.t < 1.6 ? (Math.sin(b.t * 14) > 0 ? 1 : 0.35) : 1;
    ctx.globalAlpha = blink;
    var bob = Math.sin(b.t * 4) * 3;
    drawCoinIcon(b.x, b.y + bob, 15);
    ctx.fillStyle = '#FFFFFF';
    for (var i = 0; i < 3; i++) {
        var ang = b.t * 2.4 + i * Math.PI * 2 / 3;
        drawStarShape(ctx, b.x + Math.cos(ang) * 24, b.y + bob + Math.sin(ang) * 24, 3.4, ang);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function render() {
    /* cream page frame behind the letterboxed arena */
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = CREAM;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    var shx = 0, shy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 9;
        shx = (Math.random() * 2 - 1) * amp;
        shy = (Math.random() * 2 - 1) * amp;
    }
    /* final-KO zoom punch: briefly scale up around the KO point, then settle */
    var zs = 1;
    if (zoomPunchT > 0) {
        var zk = zoomPunchT / 0.4;
        zs = 1 + 0.12 * Math.sin(zk * Math.PI);
    }
    var effS = S * zs;
    var pivotX = OX + zoomCX * S, pivotY = OY + zoomCY * S;
    ctx.setTransform(effS, 0, 0, effS, pivotX - zoomCX * effS + shx * S, pivotY - zoomCY * effS + shy * S);

    /* playroom floor */
    if (!floorTile) buildFloorTile();
    for (var fy = WALL_BOT; fy < H; fy += 96) {
        for (var fx = 0; fx < W; fx += 140) {
            ctx.drawImage(floorTile, fx, fy, 140, 96);
        }
    }
    /* era backdrop wall behind the enemy half */
    ctx.drawImage(getBackdrop(backdropEra(data.campaignLevel)), 0, WALL_TOP, W, WALL_BOT - WALL_TOP);
    /* backdrop flash on an era jump */
    if (backdropFlashT > 0) {
        ctx.globalAlpha = (backdropFlashT / 0.9) * 0.7;
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, WALL_TOP, W, WALL_BOT - WALL_TOP);
        ctx.globalAlpha = 1;
    }
    /* top frame band */
    ctx.fillStyle = CREAM;
    ctx.fillRect(0, 0, W, WALL_TOP);
    ctx.fillStyle = 'rgba(43,35,80,0.08)';
    ctx.fillRect(0, WALL_TOP - 3, W, 3);

    drawGrid();

    var i, u, p2, hpf;
    if (state === 'battle') {
        /* fighters, painter sorted by y */
        var sorted = [];
        for (i = 0; i < fighters.length; i++) if (fighters[i].alive) sorted.push(fighters[i]);
        sorted.sort(function (a, b) { return a.y - b.y; });
        for (i = 0; i < sorted.length; i++) {
            var f = sorted[i];
            var squish = f.atkAnim > 0 ? 1 + Math.sin(f.atkAnim / 0.28 * Math.PI) * 0.12 : 1;
            drawToy(f.x, f.y, f.cls, f.level, f.team, squish, f.isBoss, true, clamp(f.hp / f.maxHp, 0, 1), f.slot + f.team * 13);
        }
        drawProjs();
        drawBattleBars();
    } else {
        /* enemy formation preview, idle bobbing */
        for (i = 0; i < pendingEnemies.length; i++) {
            var e = pendingEnemies[i];
            var eb = Math.sin(time * 2.2 + i * 1.3) * 3;
            drawToy(e.x, e.y + eb, e.cls, e.level, 1, 1, e.isBoss, true, 1, 100 + i);
        }
        /* player army in slots, idle bob + merge flex pose */
        for (i = 0; i < data.army.length; i++) {
            u = data.army[i];
            if (dragging && dragging.u === u) continue;
            p2 = slotXY(u.slot);
            var bob = Math.sin(time * 2.2 + u.slot) * 2.5;
            var pop = u.popT ? (u.popT < 0.4 ? 0.5 + 0.5 * easeOutBack(u.popT / 0.4) : 1) : 1;
            /* fresh-merge flex: a quick springy overshoot pose for ~300ms */
            var flex = 1;
            if (u.flexT && u.flexT < 0.3) flex = 1 + Math.sin(u.flexT / 0.3 * Math.PI) * 0.16;
            drawToy(p2.x, p2.y + bob, u.cls, u.level, 0, pop * flex, false, true, 1, u.slot);
        }
        if (state === 'buy' || state === 'menu') {
            drawFightButton();
            drawShopBar();
            drawBonusCoin();
        }
        /* dragged toy lifts and enlarges under the finger */
        if (dragging) {
            ctx.fillStyle = 'rgba(43,35,80,0.18)';
            ctx.beginPath();
            ctx.ellipse(dragging.x, dragging.y - 6, 30, 9, 0, 0, Math.PI * 2);
            ctx.fill();
            drawToy(dragging.x, dragging.y - 36, dragging.u.cls, dragging.u.level, 0, 1.28, false, true, 1, dragging.fromSlot);
        }
    }

    drawParticles();
    drawChutes();
    drawFlyCoins();
    drawDmgNums();
    drawWords();

    /* defeat: gentle gray wash + a single sad deflating balloon (stay friendly) */
    if (state === 'lose') drawDefeatWash();
    /* era celebration banner over everything */
    if (eraBanner.ttl > 0) drawEraBanner();

    drawHud();
}

/* Gentle gray wash and one sad balloon slowly deflating on defeat */
var sadBalloon = { t: 0 };
function drawDefeatWash() {
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#6B6394';
    ctx.fillRect(0, WALL_TOP, W, H - WALL_TOP);
    ctx.globalAlpha = 1;
    sadBalloon.t += 0.016;
    var t = (time % 6);
    var deflate = clamp(t / 3, 0, 1);
    var bx = W / 2, by = 300 + deflate * 40;
    var rx = 26 * (1 - deflate * 0.7), ry = 32 * (1 - deflate * 0.55);
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#8ABDE8';
    ctx.beginPath(); ctx.ellipse(bx, by, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = INK; ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.ellipse(bx, by, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
    /* knot + string */
    ctx.beginPath(); ctx.moveTo(bx, by + ry); ctx.lineTo(bx, by + ry + 3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx, by + ry + 3);
    ctx.quadraticCurveTo(bx + 10, by + ry + 20, bx - 6, by + ry + 34); ctx.stroke();
    /* small sad face */
    ctx.fillStyle = INK;
    ctx.beginPath(); ctx.arc(bx - 7, by - 3, 2, 0, Math.PI * 2); ctx.arc(bx + 7, by - 3, 2, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by + 12, 6, Math.PI + 0.4, -0.4); ctx.stroke();
    ctx.globalAlpha = 1;
}

/* Bold era celebration banner sliding in and out */
function drawEraBanner() {
    var k = eraBanner.t / eraBanner.ttl;
    var slide = k < 0.15 ? easeOutBack(k / 0.15) : (k > 0.85 ? 1 - (k - 0.85) / 0.15 : 1);
    var alpha = k > 0.85 ? (1 - (k - 0.85) / 0.15) : 1;
    var ec = ERAS[eraBanner.era] || ERAS[0];
    var by = 250, bh = 74;
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(W / 2, by);
    ctx.scale(slide, slide);
    ctx.fillStyle = ec.body2;
    rr(ctx, -170, -bh / 2, 340, bh, 18); ctx.fill();
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 4;
    rr(ctx, -170, -bh / 2, 340, bh, 18); ctx.stroke();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '800 30px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = ec.detail; ctx.lineWidth = 5;
    ctx.strokeText(eraBanner.name, 0, 2);
    ctx.fillText(eraBanner.name, 0, 2);
    ctx.font = '800 13px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('NEW TOYS UNLOCKED', 0, 26);
    ctx.restore();
    ctx.globalAlpha = 1;
}
function easeOutBack(t) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ================= Input (browser only) ================= */
function toLogical(e) {
    return { x: (e.clientX * DPR - OX) / S, y: (e.clientY * DPR - OY) / S };
}
function inRect(p, r) { return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h; }

function onDown(e) {
    ensureAudio();
    var p = toLogical(e);
    if (state === 'menu') {
        startGame();
        return;
    }
    if (state === 'paused') { resumeGame(); return; }
    if (state === 'battle') {
        if (inRect(p, FF_RECT)) timeScale = timeScale > 1 ? 1 : 2;
        return;
    }
    if (state !== 'buy') return;
    /* bonus coin */
    if (bonusCoin) {
        var dx = p.x - bonusCoin.x, dy = p.y - bonusCoin.y;
        if (dx * dx + dy * dy < 30 * 30) {
            data.coins += bonusCoin.amt;
            coinFlashT = 0.5;
            spawnDmg(bonusCoin.x, bonusCoin.y - 18, '+' + bonusCoin.amt, '#FFD93D');
            burstCoins(bonusCoin.x, bonusCoin.y, 7);
            sfxCoin();
            bonusCoin = null;
            nextCoinIn = rand(7, 13);
            saveNow();
            return;
        }
    }
    if (inRect(p, FIGHT_RECT)) {
        if (data.army.length > 0) startBattle();
        return;
    }
    /* shop cards */
    if (p.y >= SHOP_Y) {
        var idx = Math.floor((p.x - 20) / ((W - 40) / 3));
        if (idx >= 0 && idx < 3) buyUnit(CLASS_LIST[idx]);
        return;
    }
    /* pick up a toy for dragging */
    var s = slotAt(p.x, p.y);
    if (s !== -1) {
        var u = unitAt(s);
        if (u) {
            dragging = { u: u, x: p.x, y: p.y, fromSlot: s, overSlot: s, overSell: false };
        }
    }
}
function onMove(e) {
    if (!dragging) return;
    var p = toLogical(e);
    dragging.x = p.x;
    dragging.y = p.y;
    dragging.overSlot = slotAt(p.x, p.y);
    dragging.overSell = p.y >= SHOP_Y - 8;
}
function onUp() {
    if (!dragging) return;
    var d = dragging;
    dragging = null;
    if (d.overSell) {
        var refund = sellUnit(d.u.slot);
        if (refund > 0) spawnDmg(W / 2, SHOP_Y - 10, '+' + refund, '#FFD93D');
        return;
    }
    if (d.overSlot !== -1 && d.overSlot !== d.fromSlot) {
        dropUnit(d.fromSlot, d.overSlot);
    }
}

function pauseGame() {
    if (state !== 'battle') return;
    state = 'paused';
    if (!IS_NODE) pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (state !== 'paused') return;
    state = 'battle';
    if (!IS_NODE) pauseOverlay.style.display = 'none';
}

/* ================= DOM wiring + boot (browser only) ================= */
function showRewardPanel(payout, beatenLevel) {
    winTitleEl.textContent = (beatenLevel % 5 === 0) ? 'BOSS BEATEN!' : 'YOU WIN!';
    winCoinsEl.textContent = '+' + payout + ' coins';
    for (var i = 0; i < 3; i++) {
        chestEls[i].className = 'chest';
        chestEls[i].textContent = '?';
    }
    rewardPanel.classList.add('show');
}
function pickChestUI(i) {
    if (state !== 'reward' || !chests) return;
    ensureAudio();
    var opt = pickChest(i); /* applies the reward and moves to the next buy phase */
    if (!opt) return;
    chestEls[i].classList.add('opened');
    chestEls[i].textContent = (opt.type === 'coins' || opt.was === 'unit') ? '+' + opt.amt + ' COINS' : 'FREE ' + CLASSES[opt.cls].label + '!';
    for (var k = 0; k < 3; k++) if (k !== i) chestEls[k].classList.add('faded');
    setTimeout(function () { rewardPanel.classList.remove('show'); }, 1100);
}

if (!IS_NODE) {
    canvas.addEventListener('pointerdown', function (e) { e.preventDefault(); onDown(e); });
    canvas.addEventListener('pointermove', function (e) { e.preventDefault(); onMove(e); });
    canvas.addEventListener('pointerup', function (e) { e.preventDefault(); onUp(); });
    canvas.addEventListener('pointercancel', function () { onUp(); });
    document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

    window.addEventListener('keydown', function (e) {
        if (e.code === 'Space' || e.code === 'Enter') {
            e.preventDefault();
            ensureAudio();
            if (state === 'menu') startGame();
            else if (state === 'buy' && data.army.length > 0) startBattle();
            else if (state === 'paused') resumeGame();
        } else if (e.code === 'KeyP' || e.code === 'Escape') {
            if (state === 'battle') pauseGame();
            else if (state === 'paused') resumeGame();
        } else if (e.code === 'KeyF') {
            if (state === 'battle') timeScale = timeScale > 1 ? 1 : 2;
        } else if (e.code === 'KeyM') {
            toggleMute();
        }
    });

    pauseBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        ensureAudio();
        if (state === 'battle') pauseGame();
    });
    pauseOverlay.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        resumeGame();
    });
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
            saveNow();
            if (state === 'battle') pauseGame();
        }
    });
    muteBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        ensureAudio();
        toggleMute();
    });
    chestEls[0].addEventListener('pointerdown', function (e) { e.preventDefault(); pickChestUI(0); });
    chestEls[1].addEventListener('pointerdown', function (e) { e.preventDefault(); pickChestUI(1); });
    chestEls[2].addEventListener('pointerdown', function (e) { e.preventDefault(); pickChestUI(2); });
    tryBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        ensureAudio();
        closeLose();
    });
    resetBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        e.stopPropagation();
        confirmPanel.classList.add('show');
    });
    yesBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        confirmPanel.classList.remove('show');
        resetProgress();
    });
    noBtn.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        confirmPanel.classList.remove('show');
    });
    window.addEventListener('resize', resize);
}

function toggleMute() {
    data.muted = !data.muted;
    saveNow();
    setMuteIcon();
}
function setMuteIcon() {
    if (!IS_NODE) muteBtn.textContent = data.muted ? '🔇' : '🔊';
}

/* ================= Main loop ================= */
if (!IS_NODE) {
    resize();
    setMuteIcon();
    showMenuScreen();
    var last = performance.now();
    var loop = function (now) {
        var dt = Math.min(0.05, (now - last) / 1000);
        last = now;
        update(dt);
        render();
        requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
} else {
    showMenuScreen();
    /* Headless test API: drives the exact same game code with no DOM */
    module.exports = {
        LS: LS,
        WoopProfile: WoopProfile,
        STICKER_TH: STICKER_TH,
        unitCost: unitCost,
        unitVal: unitVal,
        shopSpawnLevel: shopSpawnLevel,
        statsFor: statsFor,
        eraOf: eraOf,
        winPayout: winPayout,
        getData: function () { return data; },
        getState: function () { return state; },
        getFighters: function () { return fighters; },
        getPendingEnemies: function () { return pendingEnemies; },
        getChestOptions: getChestOptions,
        startGame: startGame,
        enterBuy: enterBuy,
        buyUnit: buyUnit,
        dropUnit: dropUnit,
        sellUnit: sellUnit,
        sellRefund: sellRefund,
        unitAt: unitAt,
        freeSlot: freeSlot,
        generateEnemies: generateEnemies,
        startBattle: startBattle,
        pickChest: pickChest,
        closeLose: closeLose,
        step: update,
        saveNow: saveNow,
        loadGame: loadGame,
        resetProgress: resetProgress
    };
}

})();
</script>
</body>
</html>

<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var comboEl = document.getElementById('combo');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var medalRow = document.getElementById('medalRow');
var medalIcon = document.getElementById('medalIcon');
var medalName = document.getElementById('medalName');
var panelStarsEl = document.getElementById('panelStars');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_wing-it';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Soft flap whoosh: bandpassed noise sweeping up */
function sfxFlap() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.4;
    bp.frequency.setValueAtTime(650 * p, t);
    bp.frequency.exponentialRampToValueAtTime(1700 * p, t + 0.09);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.16);
}

/* Score ding: bright two note ping */
function sfxScore() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(988 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.24);
}

/* Coin pickup: quick ping that climbs with the combo */
function sfxCoin(mult) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var base = 1175 * (1 + 0.14 * (mult - 1)) * pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(base, t);
    o.frequency.setValueAtTime(base * 1.33, t + 0.05);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.18);
}

/* Graze: a zippy little whoosh-zing */
function sfxGraze() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(740 * p, t);
    o.frequency.exponentialRampToValueAtTime(1760 * p, t + 0.11);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.13, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.2);
}

/* Star pickup: rising sparkle chime */
function sfxStar() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1047 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    o.frequency.setValueAtTime(1568 * p, t + 0.14);
    o.frequency.setValueAtTime(2093 * p, t + 0.21);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.015);
    g.gain.setValueAtTime(0.15, t + 0.22);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.44);
}

/* Powerup: bubbly upward arpeggio */
function sfxPower() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(784 * p, t + 0.08);
    o.frequency.setValueAtTime(1047 * p, t + 0.16);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 2400;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.1, t + 0.02);
    g.gain.setValueAtTime(0.1, t + 0.22);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.42);
}

/* Shield pop: soft bloop, never harsh */
function sfxShieldPop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(880 * p, t);
    o.frequency.exponentialRampToValueAtTime(220 * p, t + 0.22);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.26);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.28);
}

/* Death: descending sad trombone style blip, never harsh */
function sfxDeath() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.13);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.26);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.58);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.55);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.62);
}

/* Little fanfare for milestones, new best or sticker */

    o.frequency.setValueAtTime(784 * p, t + 0.2);

    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.32);

}

/* Difficulty curve: gentle first 30 seconds, real challenge by minute 2-3 */
function gapFor(s) {
    if (s < 25) return 245 - 55 * (s / 25);           /* 245 -> 190 */
    return Math.max(163, 190 - 27 * ((s - 25) / 45)); /* 190 -> 163 by ~70 */
}
function speedFor(s) {
    if (s < 25) return 165 + 60 * (s / 25);           /* 165 -> 225 */
    return Math.min(272, 225 + 47 * ((s - 25) / 50)); /* 225 -> 272 by ~75 */
}
function spacingFor(s) { return 300 - 34 * Math.min(1, s / 40); }
function moverChance(s) { return s < 12 ? 0 : Math.min(0.55, (s - 12) * 0.04); }

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildPipeSet(main, light, edge) {
    var ts = S;
    var bodyH = 64;
    var body = makeCanvas(PIPE_W * ts, bodyH * ts);
    var bc = body.getContext('2d');
    bc.scale(ts, ts);
    var nStripes = 6;
    var sw = PIPE_W / nStripes;
    for (var i = 0; i < nStripes; i++) {
        bc.fillStyle = (i % 2 === 0) ? main : light;
        bc.fillRect(i * sw, 0, sw + 0.5, bodyH);
    }
    var shade = bc.createLinearGradient(0, 0, PIPE_W, 0);
    shade.addColorStop(0, 'rgba(255,255,255,0.38)');
    shade.addColorStop(0.22, 'rgba(255,255,255,0)');
    shade.addColorStop(0.72, 'rgba(0,0,0,0)');
    shade.addColorStop(1, 'rgba(0,0,0,0.2)');
    bc.fillStyle = shade;
    bc.fillRect(0, 0, PIPE_W, bodyH);
    bc.fillStyle = 'rgba(0,0,0,0.22)';
    bc.fillRect(0, 0, 2.5, bodyH);
    bc.fillRect(PIPE_W - 2.5, 0, 2.5, bodyH);

    var capW = PIPE_W + CAP_OVER * 2;
    var cap = makeCanvas(capW * ts, CAP_H * ts);
    var cc = cap.getContext('2d');
    cc.scale(ts, ts);
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.fillStyle = main;
    cc.fill();
    var cshade = cc.createLinearGradient(0, 0, capW, 0);
    cshade.addColorStop(0, 'rgba(255,255,255,0.4)');
    cshade.addColorStop(0.25, 'rgba(255,255,255,0.05)');
    cshade.addColorStop(0.75, 'rgba(0,0,0,0)');
    cshade.addColorStop(1, 'rgba(0,0,0,0.2)');
    cc.fillStyle = cshade;
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.fill();
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.lineWidth = 3;
    cc.strokeStyle = edge;
    cc.stroke();
    cc.fillStyle = 'rgba(255,255,255,0.45)';
    rr(cc, 8, 5, capW - 30, 6, 3);
    cc.fill();
    return { body: body, cap: cap };
}

function buildSprites() {
    var ts = S;
    var i, j;

    var setA = buildPipeSet('#FF8A3D', '#FFB169', '#E06B1F');
    var setB = buildPipeSet('#A66BFF', '#C9A4FF', '#7E45D8');
    pipeBody[0] = setA.body; pipeCap[0] = setA.cap;
    pipeBody[1] = setB.body; pipeCap[1] = setB.cap;

    /* Skies: pre-rendered vertical gradients, one per biome */
    var skyDefs = [
        [[0, '#54BCF5'], [0.55, '#8FD8FF'], [1, '#C8EFFF']],
        [[0, '#5E4A9E'], [0.42, '#C96FA0'], [0.74, '#FF9A66'], [1, '#FFD9A0']],
        [[0, '#101A3E'], [0.6, '#263069'], [1, '#4A4E96']]
    ];
    skySprs = [];
    for (i = 0; i < 3; i++) {
        var sk = makeCanvas(4, 512);
        var skc = sk.getContext('2d');
        var gsky = skc.createLinearGradient(0, 0, 0, 512);
        for (j = 0; j < skyDefs[i].length; j++) gsky.addColorStop(skyDefs[i][j][0], skyDefs[i][j][1]);
        skc.fillStyle = gsky;
        skc.fillRect(0, 0, 4, 512);
        skySprs.push(sk);
    }

    /* Celestial bodies: day sun, sunset sun, moon */
    celestSprs = [];
    var cel, cctx2, cg;

    cel = makeCanvas(200 * ts, 200 * ts);
    cctx2 = cel.getContext('2d');
    cctx2.scale(ts, ts);
    cg = cctx2.createRadialGradient(100, 100, 8, 100, 100, 100);
    cg.addColorStop(0, 'rgba(255,246,190,0.95)');
    cg.addColorStop(0.35, 'rgba(255,240,160,0.55)');
    cg.addColorStop(1, 'rgba(255,240,160,0)');
    cctx2.fillStyle = cg;
    cctx2.fillRect(0, 0, 200, 200);
    cctx2.fillStyle = '#FFF3B0';
    cctx2.beginPath(); cctx2.arc(100, 100, 34, 0, Math.PI * 2); cctx2.fill();
    celestSprs.push(cel);
    /* sunset sun: bigger, warmer */
    cel = makeCanvas(240 * ts, 240 * ts);
    cctx2 = cel.getContext('2d');
    cctx2.scale(ts, ts);
    cg = cctx2.createRadialGradient(120, 120, 10, 120, 120, 120);
    cg.addColorStop(0, 'rgba(255,214,140,0.95)');
    cg.addColorStop(0.4, 'rgba(255,170,90,0.5)');
    cg.addColorStop(1, 'rgba(255,150,80,0)');
    cctx2.fillStyle = cg;
    cctx2.fillRect(0, 0, 240, 240);
    cctx2.fillStyle = '#FFCE7A';
    cctx2.beginPath(); cctx2.arc(120, 120, 46, 0, Math.PI * 2); cctx2.fill();
    celestSprs.push(cel);
    /* moon */
    cel = makeCanvas(200 * ts, 200 * ts);
    cctx2 = cel.getContext('2d');
    cctx2.scale(ts, ts);
    cg = cctx2.createRadialGradient(100, 100, 8, 100, 100, 100);
    cg.addColorStop(0, 'rgba(220,230,255,0.7)');
    cg.addColorStop(0.4, 'rgba(200,215,255,0.28)');
    cg.addColorStop(1, 'rgba(200,215,255,0)');
    cctx2.fillStyle = cg;
    cctx2.fillRect(0, 0, 200, 200);
    cctx2.fillStyle = '#F2F5FF';
    cctx2.beginPath(); cctx2.arc(100, 100, 32, 0, Math.PI * 2); cctx2.fill();
    cctx2.fillStyle = '#D6DDF5';
    cctx2.beginPath(); cctx2.arc(90, 92, 8, 0, Math.PI * 2); cctx2.fill();
    cctx2.beginPath(); cctx2.arc(110, 112, 5.5, 0, Math.PI * 2); cctx2.fill();
    cctx2.beginPath(); cctx2.arc(106, 88, 3.6, 0, Math.PI * 2); cctx2.fill();
    celestSprs.push(cel);

    /* Clouds: three puffy variants x three biome tints */
    var variants = [
        [[38, 46, 24], [72, 32, 28], [108, 44, 24], [72, 50, 32]],
        [[32, 48, 20], [62, 36, 26], [96, 34, 22], [124, 46, 18], [78, 50, 30]],
        [[42, 44, 26], [84, 38, 30], [120, 48, 20]]
    ];
    var cloudTints = [null, 'rgba(255,180,130,0.4)', 'rgba(80,90,150,0.55)'];
    cloudSprs = [];
    for (var b = 0; b < 3; b++) {
        var arr = [];
        for (var v = 0; v < variants.length; v++) {
            var cs = makeCanvas(170 * ts, 80 * ts);
            var cctx = cs.getContext('2d');
            cctx.scale(ts, ts);
            var puffs = variants[v];
            cctx.fillStyle = '#D8EFFB';
            for (j = 0; j < puffs.length; j++) {
                cctx.beginPath();
                cctx.arc(puffs[j][0], puffs[j][1] + 6, puffs[j][2], 0, Math.PI * 2);
                cctx.fill();
            }
            cctx.fillStyle = '#FFFFFF';
            for (j = 0; j < puffs.length; j++) {
                cctx.beginPath();
                cctx.arc(puffs[j][0], puffs[j][1], puffs[j][2], 0, Math.PI * 2);
                cctx.fill();
            }
            if (cloudTints[b]) {
                cctx.globalCompositeOperation = 'source-atop';
                cctx.fillStyle = cloudTints[b];
                cctx.fillRect(0, 0, 170, 80);
                cctx.globalCompositeOperation = 'source-over';
            }
            arr.push(cs);
        }
        cloudSprs.push(arr);
    }

    /* Grass tile */
    var TW = 120;
    grassSpr = makeCanvas(TW * ts, GROUND_H * ts);

    gc.fillStyle = '#7ED957';

    for (var b2 = 0; b2 < 4; b2++) {
        gc.arc(b2 * 30 + 15, 16, 15, Math.PI, 0, false);

    gc.lineTo(TW, 0);
    gc.lineTo(0, 0);
    gc.closePath();
    gc.fill();
    gc.fillStyle = '#5FBF3F';
    gc.fillRect(0, GROUND_H - 10, TW, 10);
    gc.strokeStyle = '#69CC44';
    gc.lineWidth = 3;
    gc.lineCap = 'round';
    var blades = [[14, 40], [40, 58], [66, 36], [92, 52], [106, 70]];
    for (var g2 = 0; g2 < blades.length; g2++) {
        gc.beginPath();
        gc.moveTo(blades[g2][0], blades[g2][1] + 12);
        gc.quadraticCurveTo(blades[g2][0] + 3, blades[g2][1] + 4, blades[g2][0] + 1, blades[g2][1]);
        gc.stroke();
    }
    gc.fillStyle = '#FFFFFF';
    gc.beginPath(); gc.arc(28, 74, 4, 0, Math.PI * 2); gc.fill();
    gc.fillStyle = '#FF9EC4';
    gc.beginPath(); gc.arc(84, 82, 4, 0, Math.PI * 2); gc.fill();
    gc.fillStyle = '#FFD93D';
    gc.beginPath(); gc.arc(28, 74, 1.8, 0, Math.PI * 2); gc.arc(84, 82, 1.8, 0, Math.PI * 2); gc.fill();

    /* Soft round glow (star halo / coin sheen) */
    glowSpr = makeCanvas(64 * ts, 64 * ts);
    var glc = glowSpr.getContext('2d');
    glc.scale(ts, ts);
    var gg = glc.createRadialGradient(32, 32, 2, 32, 32, 32);
    gg.addColorStop(0, 'rgba(255,255,255,0.85)');
    gg.addColorStop(0.5, 'rgba(255,255,255,0.25)');
    gg.addColorStop(1, 'rgba(255,255,255,0)');
    glc.fillStyle = gg;
    glc.fillRect(0, 0, 64, 64);

    /* Coin */
    coinSpr = makeCanvas(40 * ts, 40 * ts);
    var coc = coinSpr.getContext('2d');
    coc.scale(ts, ts);
    coc.fillStyle = '#F1A62B';
    coc.beginPath(); coc.arc(20, 20, 15, 0, Math.PI * 2); coc.fill();
    coc.fillStyle = '#FFD93D';
    coc.beginPath(); coc.arc(20, 19, 13, 0, Math.PI * 2); coc.fill();
    coc.fillStyle = '#FFC61A';
    coc.beginPath(); coc.arc(20, 19, 8.6, 0, Math.PI * 2); coc.fill();
    coc.fillStyle = '#FFE9A8';
    coc.beginPath(); coc.arc(15, 14, 3.4, 0, Math.PI * 2); coc.fill();

    /* Shield bubble */
    bubbleSpr = makeCanvas(96 * ts, 96 * ts);
    var bbc = bubbleSpr.getContext('2d');
    bbc.scale(ts, ts);
    var bg2 = bbc.createRadialGradient(48, 48, 20, 48, 48, 46);
    bg2.addColorStop(0, 'rgba(127,232,255,0)');
    bg2.addColorStop(0.72, 'rgba(127,232,255,0.1)');
    bg2.addColorStop(0.95, 'rgba(127,232,255,0.55)');
    bg2.addColorStop(1, 'rgba(127,232,255,0)');
    bbc.fillStyle = bg2;
    bbc.beginPath(); bbc.arc(48, 48, 46, 0, Math.PI * 2); bbc.fill();
    bbc.strokeStyle = 'rgba(255,255,255,0.75)';
    bbc.lineWidth = 2.4;
    bbc.beginPath(); bbc.arc(48, 48, 43, -2.2, -1.1); bbc.stroke();

    /* Balloons: two colorways */
    balloonSprs = [];
    var balloonCols = [['#FF6FA5', '#E04B84'], ['#6FC7FF', '#4B9FE0']];
    for (i = 0; i < 2; i++) {
        var bl = makeCanvas(44 * ts, 72 * ts);

        blc.quadraticCurveTo(18, 58, 22, 66);

        spawnPart(1, x + rand(-4, 4), y + rand(-3, 6), rand(-90, -30), rand(10, 80), rand(0.4, 0.7), rand(3.5, 6), FEATHER_COLORS[i % FEATHER_COLORS.length]);
    }
}
var SPARK_COLORS = ['#FFFFFF', '#FFF3B0', '#FFE14D'];
function burstSparks(x, y, n) {

}
var CONFETTI_COLORS = ['#FF8A3D', '#7ED957', '#4FC3F7', '#FFD93D', '#FF5FA2', '#B388FF'];
function burstConfetti() {

/* Clouds: 2 parallax layers, always drifting (even on game over) */
var cloudsFar = [], cloudsNear = [];
function initClouds() {
    cloudsFar = [];
    cloudsNear = [];
    var i;
    for (i = 0; i < 6; i++) {
        cloudsFar.push({ x: rand(0, VW), y: rand(30, 260), s: rand(0.45, 0.7), spr: i % 3, a: 0.65 });
    }
    for (i = 0; i < 4; i++) {
        cloudsNear.push({ x: rand(0, VW), y: rand(60, 380), s: rand(0.85, 1.25), spr: i % 3, a: 0.95 });
    }
}
function worldSpeed() {
    return (currentState === State.PLAYING) ? speedFor(score) * worldMul() : 0;
}
function updateClouds(dt) {
    var ws = worldSpeed();
    var i, c;
    for (i = 0; i < cloudsFar.length; i++) {
        c = cloudsFar[i];
        c.x -= (9 + ws * 0.1) * dt;
        if (c.x < -180 * c.s) { c.x = VW + rand(10, 140); c.y = rand(30, 260); }
    }
    for (i = 0; i < cloudsNear.length; i++) {
        c = cloudsNear[i];
        c.x -= (22 + ws * 0.28) * dt;
        if (c.x < -180 * c.s) { c.x = VW + rand(10, 200); c.y = rand(60, 380); }
    }
}

/* Ambient life: balloons + a tiny far-off flock */
var balloons = [
    { active: false, x: 0, y: 0, spr: 0, ph: 0 },
    { active: false, x: 0, y: 0, spr: 1, ph: 0 }
];
var balloonT = rand(6, 10);
var flock = { active: false, x: 0, y: 0, t: 0 };
var flockT = rand(8, 14);
var nightStars = [];
for (var ni = 0; ni < 30; ni++) nightStars.push({ x: Math.random(), y: Math.random() * 0.55, ph: rand(0, 6.28), s: rand(1.2, 2.6) });

function updateAmbient(dt) {
    var ws = worldSpeed();
    var i, b;
    balloonT -= dt;
    if (balloonT <= 0) {
        for (i = 0; i < balloons.length; i++) {
            if (!balloons[i].active) {
                b = balloons[i];
                b.active = true;
                b.x = VW + 60;
                b.y = rand(H * 0.2, H * 0.55);
                b.ph = rand(0, 6.28);
                break;
            }
        }
        balloonT = rand(9, 17);
    }
    for (i = 0; i < balloons.length; i++) {
        b = balloons[i];
        if (!b.active) continue;
        b.x -= (16 + ws * 0.16) * dt;
        b.y -= 5 * dt;
        if (b.x < -70 || b.y < -80) b.active = false;
    }
    flockT -= dt;
    if (flockT <= 0 && !flock.active && BIOME[biomeCur].flock) {
        flock.active = true;
        flock.x = VW + 50;
        flock.y = rand(70, 240);
        flock.t = 0;
        flockT = rand(11, 18);
    }
    if (flock.active) {
        flock.t += dt;
        flock.x -= (34 + ws * 0.22) * dt;
        if (flock.x < -90) flock.active = false;
    }
}

/* ================= Combo HUD ================= */
function updateComboDom() {
    if (comboMult > 1 && currentState === State.PLAYING) {
        comboEl.textContent = 'COIN COMBO x' + comboMult;
        comboEl.style.display = 'block';
        if (comboMult !== lastComboShown) {
            comboEl.classList.remove('pop');
            void comboEl.offsetWidth;
            comboEl.classList.add('pop');
        }
    } else {
        comboEl.style.display = 'none';
    }
    lastComboShown = comboMult;
}

/* ================= Run control ================= */
function resetRun() {
    var i;
    for (i = 0; i < pipes.length; i++) pipes[i].active = false;
    for (i = 0; i < stars.length; i++) stars[i].active = false;
    for (i = 0; i < coins.length; i++) coins[i].active = false;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    for (i = 0; i < labels.length; i++) labels[i].active = false;
    for (i = 0; i < rings.length; i++) rings[i].active = false;
    score = 0;
    runStars = 0;
    runCoins = 0;
    coinCombo = 0;
    comboMult = 1;
    grazes = 0;
    newBest = false;
    earnedTiers = [];
    hasLastGap = false;
    gatesSpawned = 0;
    nextStarGate = 8;
    patternQueue.length = 0;
    deathT = 0;
    landedT = -1;
    landBounced = false;
    panelShown = false;
    trauma = 0;
    power.type = null;
    power.t = 0;
    invulnT = 0;
    bird.y = H * 0.42;
    bird.vy = 0;
    bird.rot = 0;
    bird.squash = 0;
    bird.wingT = 9;
    scoreEl.textContent = '0';
    updateComboDom();
}

function showMenu(quick) {

}

function startRun() {

function flap() {

function addScore(n) {

    scoreEl.textContent = score;
    scoreEl.classList.remove('pop');

/* Powerups */
function givePower() {
    var kinds = ['shield', 'slow', 'mini'];
    var pick;
    do { pick = kinds[Math.floor(rand(0, 3)) % 3]; } while (pick === lastPower && Math.random() < 0.8);
    lastPower = pick;
    power.type = pick;
    power.dur = POWER_INFO[pick].dur;
    power.t = 0;
    spawnLabel(bird.x + 30, bird.y - 44, POWER_INFO[pick].name, POWER_INFO[pick].color, 32);
    spawnRing(bird.x, bird.y, 16, 300, POWER_INFO[pick].color, 5, 0.5);
    sfxPower();
}
function endPower() {
    power.type = null;
    power.t = 0;
}
/* returns true if the hit was absorbed */
function shieldSave() {
    if (invulnT > 0) return true;
    if (power.type === 'shield') {
        endPower();
        invulnT = 1.2;
        trauma = Math.max(trauma, 0.35);
        bird.vy = FLAP_VY * 0.9;
        spawnRing(bird.x, bird.y, 20, 380, '#7FE8FF', 6, 0.5);
        spawnLabel(bird.x, bird.y - 46, 'SAVED!', '#37B6E8', 28);
        burstSparks(bird.x, bird.y, 14);
        sfxShieldPop();
        return true;
    }
    return false;
}

function die() {
    if (currentState !== State.PLAYING) return;
    currentState = State.DYING;
    deathT = 0;
    landedT = -1;
    landBounced = false;
    trauma = 0.5;
    bird.squash = 1;
    bird.vy = Math.min(bird.vy, -170); /* cartoon hop before the tumble */
    endPower();
    burstFeathers(bird.x, bird.y);
    sfxDeath();
    pauseBtn.style.display = 'none';
    comboEl.style.display = 'none';

    /* record the run immediately */
    newBest = score > prevBest;
    data.totalPlays++;
    data.totalCoins += runCoins + runStars;
    if (score > data.highScore) data.highScore = score;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('wing-it', score, { bronze: 10, silver: 25, gold: 50 });
}

/* ================= Spawning ================= */
function spawnPipe(x) {
    var p = null;
    for (var i = 0; i < pipes.length; i++) {
        if (!pipes[i].active) { p = pipes[i]; break; }
    }
    if (!p) return;
    var gapH = gapFor(score);
    var mover = Math.random() < moverChance(score);
    if (mover) gapH += 22; /* moving gates get a friendlier gap */
    var minC = 64 + gapH / 2;
    var maxC = GROUND_Y - 64 - gapH / 2;
    var c, prevC;
    if (!hasLastGap) {
        c = clamp(H * 0.42 + rand(-40, 40), minC, maxC);
        prevC = c;
    } else {
        prevC = lastGapC;
        /* keep every jump physically reachable: climbing is slower than falling */
        var tBetween = spacingFor(score) / speedFor(score);
        var up = Math.min(175, 110 * tBetween);
        var down = Math.min(215, 185 * tBetween);
        var want = patternQueue.length ? patternQueue.shift() : lastGapC + rand(-up, down);
        c = clamp(want, lastGapC - up, lastGapC + down);
    }
    c = clamp(c, minC, maxC);

    var amp = 0, spd = 0;
    if (mover) {
        amp = Math.min(rand(24, 34 + Math.min(44, score * 0.8)), c - minC, maxC - c);
        spd = rand(1.3, 2.1);
        if (amp < 16) { mover = false; amp = 0; }
    }

    lastGapC = c;
    hasLastGap = true;
    gatesSpawned++;
    p.active = true;
    p.x = x;
    p.cBase = c;
    p.gap = gapH;
    p.mover = mover;
    p.amp = amp;
    p.spd = spd;
    p.ph = rand(0, Math.PI * 2);
    p.top = c - gapH / 2;
    p.bot = c + gapH / 2;
    p.passed = false;
    p.grazed = false;

    /* queue a fun pattern for the next few gates once flying well */
    if (!patternQueue.length && score >= 6 && Math.random() < 0.32) {
        var k;
        if (Math.random() < 0.5) {
            /* gentle wave */
            var ampW = rand(70, 130) * (Math.random() < 0.5 ? -1 : 1);
            for (k = 1; k <= 3; k++) patternQueue.push(c + ampW * Math.sin(k * 1.5));
        } else {
            /* staggered zig-zag */
            var d = rand(85, 135);
            patternQueue.push(c - d, c + d, c - d * 0.8);
        }
    }

    /* pickups threading the path from the previous gap into this one */
    var spacing = spacingFor(score);
    if (gatesSpawned === nextStarGate) {
        for (var j = 0; j < stars.length; j++) {
            if (!stars[j].active) {
                stars[j].active = true;
                stars[j].x = x - spacing * 0.5;
                stars[j].y = clamp(lerp(prevC, c, 0.5) - 20, 120, GROUND_Y - 110);
                stars[j].phase = rand(0, Math.PI * 2);
                break;
            }
        }
        nextStarGate += 8 + Math.floor(rand(0, 5));
    } else if (gatesSpawned > 1 && Math.random() < 0.55) {
        var ts2 = [0.3, 0.5, 0.7];
        for (var q = 0; q < 3; q++) {
            for (var w = 0; w < coins.length; w++) {
                if (!coins[w].active) {
                    coins[w].active = true;
                    coins[w].x = x - spacing * (1 - ts2[q]);
                    coins[w].y = clamp(lerp(prevC, c, ts2[q]) - Math.sin(ts2[q] * Math.PI) * 26, 110, GROUND_Y - 90);
                    coins[w].phase = rand(0, Math.PI * 2);
                    break;
                }
            }
        }
    }
}

function manageSpawns() {
    var rightmost = -1e9;
    var any = false;
    for (var i = 0; i < pipes.length; i++) {
        if (pipes[i].active) { any = true; if (pipes[i].x > rightmost) rightmost = pipes[i].x; }
    }
    if (!any) {
        spawnPipe(VW + 260);
        return;
    }
    var spacing = spacingFor(score);
    while (rightmost < VW + 60) {
        rightmost += spacing;
        spawnPipe(rightmost);
    }
}

/* ================= Update ================= */
function hitRect(cx, cy, r, rx, ry, rw, rh) {
    var nx = Math.max(rx, Math.min(cx, rx + rw));
    var ny = Math.max(ry, Math.min(cy, ry + rh));
    var dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
}

function updateBirdCosmetics(dt) {
    if (bird.squash > 0) bird.squash = Math.max(0, bird.squash - bird.squash * 9 * dt - 0.4 * dt);
    bird.wingT += dt;
    if (bird.blinkT > 0) {
        bird.blinkT -= dt;
    } else {
        bird.blinkIn -= dt;
        if (bird.blinkIn <= 0) {
            bird.blinkT = 0.12;
            bird.blinkIn = rand(1.6, 4.5);
        }
    }
}

function updateMenu(dt) {
    groundX -= 60 * dt;
    hillNearX -= 30 * dt;
    hillFarX -= 15 * dt;
    bird.y = H * 0.42 + Math.sin(time * 2.4) * 12;
    bird.vy = 0;
    bird.rot += (0 - bird.rot) * Math.min(1, 10 * dt);
    updateBirdCosmetics(dt);
    updateParticles(dt);
    updateFx(dt);
}

function passGate(p) {
    p.passed = true;
    var gapC = (p.top + p.bot) / 2;
    addScore(1);
    spawnRing(p.x + PIPE_W / 2, gapC, 14, 220, '#FFFFFF', 4, 0.4);
    spawnLabel(p.x + PIPE_W / 2, gapC - 20, '+1', '#FFFFFF', 24);
    sfxScore();
    if (p.grazed) {
        grazes++;
        addScore(1);
        spawnLabel(bird.x + 8, bird.y - 40, 'GRAZE +1', '#FF5FA2', 26);
        spawnRing(bird.x, bird.y, 12, 260, '#FF9EC4', 4, 0.4);
        burstSparks(bird.x, bird.y - 8, 8);
        sfxGraze();
    }
    if (score % 10 === 0) {
        /* milestone fanfare */
        spawnLabel(VW / 2, H * 0.3, score + '!', '#FFD93D', 52);
        spawnRing(VW / 2, H * 0.3, 30, 420, '#FFD93D', 6, 0.6);
        spawnRing(VW / 2, H * 0.3, 12, 300, '#FFFFFF', 4, 0.55);
        burstSparks(VW / 2, H * 0.3, 16);
        trauma = Math.max(trauma, 0.22);
        sfxFanfare();
    }
}

function updateGame(dt) {
    var sp = speedFor(score) * worldMul();
    groundX -= sp * dt;
    hillNearX -= sp * 0.45 * dt;
    hillFarX -= sp * 0.22 * dt;

    /* bird physics */
    bird.vy = Math.min(MAX_FALL, bird.vy + GRAVITY * dt);
    bird.y += bird.vy * dt;
    if (bird.y < BIRD_R) { bird.y = BIRD_R; bird.vy = Math.max(bird.vy, 0); }
    bird.x += (birdTargetX() - bird.x) * Math.min(1, 3 * dt);

    /* tilt with velocity: -25deg climbing to +70deg falling */
    var targetDeg = -25 + ((bird.vy - FLAP_VY) / (MAX_FALL - FLAP_VY)) * 95;
    targetDeg = clamp(targetDeg, -25, 70);
    var targetRot = targetDeg * Math.PI / 180;
    var ease = bird.vy < 0 ? 14 : 6;
    bird.rot += (targetRot - bird.rot) * Math.min(1, ease * dt);

    updateBirdCosmetics(dt);

    /* powerup timers */
    if (power.type) {
        power.t += dt;
        if (power.t >= power.dur) endPower();
    }
    if (invulnT > 0) invulnT -= dt;
    if (power.type === 'mini') {
        miniTrailT -= dt;
        if (miniTrailT <= 0) {
            spawnPart(2, bird.x - BIRD_R, bird.y + rand(-6, 6), -40, rand(-20, 20), 0.35, 3, '#FF9EC4');
            miniTrailT = 0.07;
        }
    }

    /* pipes */
    var i, p;
    var hr = hitR();
    var grazeR = hr + 13;
    for (i = 0; i < pipes.length; i++) {
        p = pipes[i];
        if (!p.active) continue;
        p.x -= sp * dt;
        if (p.mover) {
            var cNow = p.cBase + Math.sin(time * p.spd + p.ph) * p.amp;
            p.top = cNow - p.gap / 2;
            p.bot = cNow + p.gap / 2;
        }
        if (p.x < -PIPE_W - 30) { p.active = false; continue; }
        if (!p.passed && p.x + PIPE_W < bird.x - hr) passGate(p);
        if (!p.passed && bird.x + grazeR > p.x && bird.x - grazeR < p.x + PIPE_W) {
            var hitTop = hitRect(bird.x, bird.y, hr, p.x, 0, PIPE_W, p.top);
            var hitBot = hitRect(bird.x, bird.y, hr, p.x, p.bot, PIPE_W, GROUND_Y - p.bot);
            if (hitTop || hitBot) {
                if (!shieldSave()) { die(); return; }
            } else if (invulnT <= 0 &&
                       (hitRect(bird.x, bird.y, grazeR, p.x, 0, PIPE_W, p.top) ||
                        hitRect(bird.x, bird.y, grazeR, p.x, p.bot, PIPE_W, GROUND_Y - p.bot))) {
                p.grazed = true;
            }
        }
    }

    /* coins */
    for (i = 0; i < coins.length; i++) {
        var cn = coins[i];
        if (!cn.active) continue;
        cn.x -= sp * dt;
        if (cn.x < bird.x - 70) {
            /* missed: the combo cools off */
            cn.active = false;
            if (coinCombo > 0) {
                coinCombo = 0;
                comboMult = 1;
                updateComboDom();
            }
            continue;
        }
        var cy = cn.y + Math.sin(time * 3 + cn.phase) * 5;
        var dxc = bird.x - cn.x, dyc = bird.y - cy;
        var radC = hr + 16;
        if (dxc * dxc + dyc * dyc < radC * radC) {
            cn.active = false;
            coinCombo++;
            comboMult = coinCombo >= 8 ? 3 : (coinCombo >= 4 ? 2 : 1);
            runCoins++;
            addScore(comboMult);
            spawnLabel(cn.x, cy - 22, '+' + comboMult, '#FFD93D', 22 + comboMult * 3);
            spawnPart(2, cn.x, cy, rand(-40, 40), rand(-60, 0), 0.4, 4, '#FFE14D');
            spawnPart(2, cn.x, cy, rand(-40, 40), rand(-60, 0), 0.4, 3, '#FFFFFF');
            updateComboDom();
            sfxCoin(comboMult);
        }
    }

    /* stars: powerup pickups */
    for (i = 0; i < stars.length; i++) {
        var st = stars[i];
        if (!st.active) continue;
        st.x -= sp * dt;
        if (st.x < -40) { st.active = false; continue; }
        var dx = bird.x - st.x, dy = bird.y - (st.y + Math.sin(time * 3 + st.phase) * 7);
        var rad = hr + 18;
        if (dx * dx + dy * dy < rad * rad) {
            st.active = false;
            runStars++;
            addScore(2);
            spawnLabel(st.x, st.y - 26, '+2', '#FFE14D', 26);
            burstSparks(st.x, st.y, 14);
            sfxStar();
            givePower();
        }
    }

    manageSpawns();
    updateParticles(dt);
    updateFx(dt);

    /* floor */
    if (bird.y + hr >= GROUND_Y) {
        if (shieldSave()) {
            bird.y = GROUND_Y - hr - 2;
            bird.vy = -400;
        } else {
            bird.y = GROUND_Y - hr;
            die();
        }
    }
}

function updateDying(dt) {
    /* slow motion for the first 250ms, then normal speed tumble */
    var scale = deathT < 0.25 ? 0.3 : 1;
    var dts = dt * scale;
    deathT += dt;

    bird.vy = Math.min(MAX_FALL, bird.vy + GRAVITY * dts);
    bird.y += bird.vy * dts;
    bird.rot += 7.5 * dts; /* cartoon spin */
    if (bird.squash > 0) bird.squash = Math.max(0, bird.squash - 2.2 * dts);

    var floorY = GROUND_Y - BIRD_R * 0.55;
    if (bird.y >= floorY) {
        bird.y = floorY;
        if (!landBounced && Math.abs(bird.vy) > 260) {
            landBounced = true;
            bird.vy = -Math.abs(bird.vy) * 0.32; /* one cute bounce */
            bird.squash = 0.9;
            puffFeathers(bird.x, bird.y + 10);
        } else {
            bird.vy = 0;
            if (landedT < 0) landedT = deathT;
        }
    }
    updateParticles(dts);
    updateFx(dt);

    if ((landedT >= 0 && deathT - landedT > 0.3) || deathT > 1.8) showPanel();
}

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 1) {
            p.vy = Math.min(95, p.vy + 300 * dt);
            p.vx *= (1 - Math.min(1, 2.5 * dt));
            p.x += Math.sin(p.life * 13 + p.seed) * 34 * dt;
        } else if (p.type === 2) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else {
            p.vy = Math.min(240, p.vy + 220 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

/* labels + rings tick at real time in every state */
function updateFx(dt) {
    var i;
    for (i = 0; i < labels.length; i++) {
        var l = labels[i];
        if (!l.active) continue;
        l.life += dt;
        if (l.life >= l.ttl) { l.active = false; continue; }
        l.y += l.vy * dt;
        l.vy *= (1 - Math.min(1, 2 * dt));
    }
    for (i = 0; i < rings.length; i++) {
        var g = rings[i];
        if (!g.active) continue;
        g.life += dt;
        if (g.life >= g.ttl) { g.active = false; continue; }
        g.r += g.vr * dt;
    }
}

function update(dt) {
    time += dt;
    updateClouds(dt);
    updateAmbient(dt);
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);

    /* biome transitions follow the score */
    var tb = biomeFor(score);
    if (tb !== biomeCur) {
        biomePrev = biomeMix < 1 ? biomePrev : biomeCur;
        biomeCur = tb;
        biomeMix = 0;
    }
    if (biomeMix < 1) {
        biomeMix = Math.min(1, biomeMix + dt * 0.55);
        if (biomeMix >= 1) biomePrev = biomeCur;
    }

    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateParticles(dt); updateFx(dt); break;
    }
}

/* ================= Render ================= */
function drawSkyAndCelestial() {
    var mixing = biomePrev !== biomeCur;
    ctx.drawImage(skySprs[biomePrev], 0, 0, VW + 1, H);
    if (mixing) {
        ctx.globalAlpha = biomeMix;
        ctx.drawImage(skySprs[biomeCur], 0, 0, VW + 1, H);
        ctx.globalAlpha = 1;
    }
    drawCelestial(biomePrev, mixing ? 1 - biomeMix : 1);
    if (mixing) drawCelestial(biomeCur, biomeMix);
}

function drawCelestial(b, alpha) {
    if (alpha <= 0.02) return;
    ctx.globalAlpha = alpha;
    if (b === 0) {
        ctx.drawImage(celestSprs[0], (VW - 210) | 0, 30, 180, 180);
    } else if (b === 1) {
        ctx.drawImage(celestSprs[1], (VW - 300) | 0, (GROUND_Y - 320) | 0, 260, 260);
    } else {
        ctx.drawImage(celestSprs[2], (VW - 200) | 0, 36, 160, 160);
        for (var i = 0; i < nightStars.length; i++) {
            var s = nightStars[i];
            var tw = 0.35 + 0.4 * (0.5 + 0.5 * Math.sin(time * 2 + s.ph));
            ctx.globalAlpha = alpha * tw;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect((s.x * VW) | 0, (s.y * H) | 0, s.s, s.s);
        }
    }
    ctx.globalAlpha = 1;
}

function drawAmbient() {
    var i;
    for (i = 0; i < balloons.length; i++) {
        var b = balloons[i];
        if (!b.active) continue;
        var by = b.y + Math.sin(time * 1.4 + b.ph) * 6;
        ctx.globalAlpha = biomeCur === 2 ? 0.75 : 0.95;
        ctx.drawImage(balloonSprs[b.spr], b.x | 0, by | 0, 44, 72);
        ctx.globalAlpha = 1;
    }
    var fc = BIOME[biomeCur].flock;
    if (flock.active && fc) {
        ctx.strokeStyle = fc;
        ctx.lineWidth = 2.4;
        ctx.lineCap = 'round';
        for (i = 0; i < 3; i++) {
            var fx = flock.x + i * 26;
            var fy = flock.y + (i === 1 ? -10 : 6) + Math.sin(time * 3 + i) * 3;
            var w = 3 + 3.5 * Math.abs(Math.sin(time * 7 + i * 1.7));
            ctx.beginPath();
            ctx.moveTo(fx - 8, fy);
            ctx.quadraticCurveTo(fx - 3, fy - w, fx, fy);
            ctx.quadraticCurveTo(fx + 3, fy - w, fx + 8, fy);
            ctx.stroke();
        }
    }
}

function drawClouds() {
    var i, c;
    var mixing = biomePrev !== biomeCur;
    for (i = 0; i < cloudsFar.length; i++) {
        c = cloudsFar[i];
        ctx.globalAlpha = c.a * (mixing ? 1 - biomeMix : 1);
        if (!mixing || biomeMix < 1) ctx.drawImage(cloudSprs[biomePrev][c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
        if (mixing) {
            ctx.globalAlpha = c.a * biomeMix;
            ctx.drawImage(cloudSprs[biomeCur][c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
        }
    }
    for (i = 0; i < cloudsNear.length; i++) {
        c = cloudsNear[i];
        ctx.globalAlpha = c.a * (mixing ? 1 - biomeMix : 1);
        if (!mixing || biomeMix < 1) ctx.drawImage(cloudSprs[biomePrev][c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
        if (mixing) {
            ctx.globalAlpha = c.a * biomeMix;
            ctx.drawImage(cloudSprs[biomeCur][c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
        }
    }
    ctx.globalAlpha = 1;
}

function hillBand(scrollX, hw, amp, color, alpha) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    var hx = ((scrollX % hw) + hw) % hw - hw;
    ctx.beginPath();
    ctx.moveTo(hx, GROUND_Y);
    for (var x = hx; x < VW + hw; x += hw) {
        ctx.quadraticCurveTo(x + hw / 2, GROUND_Y - amp, x + hw, GROUND_Y);
    }
    ctx.lineTo(VW, GROUND_Y + 4);
    ctx.lineTo(hx, GROUND_Y + 4);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
}

function drawHills() {
    var mixing = biomePrev !== biomeCur;
    hillBand(hillFarX, 380, 62, BIOME[biomePrev].hillFar, 1);
    if (mixing) hillBand(hillFarX, 380, 62, BIOME[biomeCur].hillFar, biomeMix);
    hillBand(hillNearX, 260, 34, BIOME[biomePrev].hillNear, 1);
    if (mixing) hillBand(hillNearX, 260, 34, BIOME[biomeCur].hillNear, biomeMix);
}

function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        if (!p.active) continue;
        var x = p.x | 0;
        var set = p.mover ? 1 : 0;
        if (p.top > 0) {
            var th = Math.max(0, (p.top - CAP_H + 2) | 0);
            if (th > 0) ctx.drawImage(pipeBody[set], x, 0, PIPE_W, th);
            ctx.drawImage(pipeCap[set], x - CAP_OVER, (p.top - CAP_H) | 0, PIPE_W + CAP_OVER * 2, CAP_H);
        }
        var botH = GROUND_Y - p.bot;
        if (botH > 0) {
            var bh = Math.max(0, (botH - CAP_H + 4) | 0);
            if (bh > 0) ctx.drawImage(pipeBody[set], x, (p.bot + CAP_H - 2) | 0, PIPE_W, bh);
            ctx.drawImage(pipeCap[set], x - CAP_OVER, p.bot | 0, PIPE_W + CAP_OVER * 2, CAP_H);
        }
    }
}

function drawStarShape(x, y, r, rot) {
    ctx.beginPath();
    for (var i = 0; i < 10; i++) {
        var a = rot + i * Math.PI / 5 - Math.PI / 2;
        var rr2 = (i % 2 === 0) ? r : r * 0.45;
        var px = x + Math.cos(a) * rr2;
        var py = y + Math.sin(a) * rr2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
}

function drawPickups() {
    var i;
    for (i = 0; i < coins.length; i++) {
        var cn = coins[i];
        if (!cn.active) continue;
        var cy = cn.y + Math.sin(time * 3 + cn.phase) * 5;
        var wob = Math.abs(Math.cos(time * 4 + cn.phase)) * 0.85 + 0.15;
        var cw = 34 * wob;
        ctx.drawImage(coinSpr, (cn.x - cw / 2) | 0, (cy - 17) | 0, cw | 0 || 1, 34);
    }
    for (i = 0; i < stars.length; i++) {
        var st = stars[i];
        if (!st.active) continue;
        var y = st.y + Math.sin(time * 3 + st.phase) * 7;
        var pulse = 1 + 0.12 * Math.sin(time * 5 + st.phase);
        ctx.drawImage(glowSpr, (st.x - 34) | 0, (y - 34) | 0, 68, 68);
        drawStarShape(st.x, y, 16 * pulse, time * 1.6 + st.phase);
        ctx.fillStyle = '#FFE14D';
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#F1A62B';
        ctx.stroke();
    }
}

function drawGround() {
    var TW = 120;
    var off = ((groundX % TW) + TW) % TW - TW;
    for (var gx = off; gx < VW; gx += TW) {
        ctx.drawImage(grassSpr, gx | 0, GROUND_Y, TW, GROUND_H);
    }
    /* biome tint over the grass (single cheap rect) */
    var mixing = biomePrev !== biomeCur;
    var tp = BIOME[biomePrev], tc = BIOME[biomeCur];
    if (tp.tint) {
        ctx.globalAlpha = mixing ? 1 - biomeMix : 1;
        ctx.fillStyle = tp.tint;
        ctx.fillRect(0, GROUND_Y, VW, GROUND_H);
    }
    if (mixing && tc.tint) {
        ctx.globalAlpha = biomeMix;
        ctx.fillStyle = tc.tint;
        ctx.fillRect(0, GROUND_Y, VW, GROUND_H);
    }
    ctx.globalAlpha = 1;
}

function drawChick() {
    var b = bird;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    var ss = sizeScale();
    var sx = (1 + 0.16 * b.squash) * ss;
    var sy = (1 - 0.22 * b.squash) * ss;
    ctx.scale(sx, sy);
    if (invulnT > 0 && Math.floor(time * 16) % 2 === 0) ctx.globalAlpha = 0.55;
    var R = BIRD_R;

    /* wing animation: strong down flap right after a tap, gentle flutter otherwise */
    var flutterSpeed = currentState === State.MENU ? 6 : 9;
    var flapKick = b.wingT < 0.28 ? Math.sin((b.wingT / 0.28) * Math.PI) : 0;
    var wingAng = Math.sin(time * flutterSpeed) * 0.3 - flapKick * 1.15;

    /* tail feathers */
    ctx.fillStyle = '#F2B70A';
    ctx.save();
    ctx.translate(-R + 3, -2);
    ctx.rotate(-0.5);
    ctx.beginPath();
    ctx.ellipse(-7, 0, 10, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.rotate(0.65);
    ctx.beginPath();
    ctx.ellipse(-7, 0, 9, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    /* body */
    ctx.fillStyle = '#FFD93D';
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#E8A20C';
    ctx.stroke();

    /* belly patch */
    ctx.fillStyle = '#FFEDA3';
    ctx.beginPath();
    ctx.ellipse(4, 9, R * 0.58, R * 0.44, 0.2, 0, Math.PI * 2);
    ctx.fill();

    /* crest tufts */
    ctx.fillStyle = '#FFC61A';
    ctx.save();
    ctx.translate(-3, -R + 1);
    ctx.rotate(-0.35);
    ctx.beginPath();
    ctx.ellipse(0, -4, 3.4, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.rotate(0.75);
    ctx.beginPath();
    ctx.ellipse(4, -3, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    /* wing */
    ctx.save();
    ctx.translate(-5, 2);
    ctx.rotate(wingAng);
    ctx.fillStyle = '#F2B70A';
    ctx.beginPath();
    ctx.ellipse(-8, 4, 13.5, 8, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#DA9A06';
    ctx.stroke();
    ctx.restore();

    /* beak */
    ctx.fillStyle = '#FF8A3D';
    ctx.beginPath();
    ctx.moveTo(R - 7, -4);
    ctx.lineTo(R + 12, 0);
    ctx.lineTo(R - 7, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#F07420';
    ctx.beginPath();
    ctx.moveTo(R - 7, 3);
    ctx.lineTo(R + 8, 1.5);
    ctx.lineTo(R - 7, 7);
    ctx.closePath();
    ctx.fill();

    /* blush cheek */
    ctx.fillStyle = 'rgba(255,138,110,0.55)';
    ctx.beginPath();
    ctx.arc(R * 0.42, 7, 4.6, 0, Math.PI * 2);
    ctx.fill();

    if (currentState === State.DYING || currentState === State.GAME_OVER) {
        /* dizzy cartoon eyes: little X, kid-safe silly */
        ctx.strokeStyle = '#7A5C00';
        ctx.lineWidth = 2.8;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(5, -12); ctx.lineTo(13, -4);
        ctx.moveTo(13, -12); ctx.lineTo(5, -4);
        ctx.stroke();
    } else {
        /* expressive eye: pupil leans into the motion, blinks occasionally */
        var blink = bird.blinkT > 0;
        if (blink) {
            ctx.strokeStyle = '#7A5C00';
            ctx.lineWidth = 2.6;
            ctx.beginPath();
            ctx.arc(9, -7, 5, 0.15, Math.PI - 0.15);
            ctx.stroke();
        } else {
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(9, -8, 7.2, 0, Math.PI * 2);
            ctx.fill();
            var lean = clamp(bird.vy / MAX_FALL, -0.6, 1);
            ctx.fillStyle = '#2B2350';
            ctx.beginPath();
            ctx.arc(10.6, -8 + lean * 2.4, 3.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(11.8, -9.4 + lean * 2, 1.3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.restore();

    /* powerup auras drawn around the (unrotated) bird */
    if (power.type === 'shield') {
        var bs = 96 + Math.sin(time * 5) * 5;
        ctx.drawImage(bubbleSpr, (b.x - bs / 2) | 0, (b.y - bs / 2) | 0, bs | 0, bs | 0);
    } else if (power.type === 'slow') {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(time * 1.8);
        ctx.strokeStyle = 'rgba(155,107,255,0.65)';
        ctx.lineWidth = 3;
        ctx.setLineDash([9, 11]);
        ctx.beginPath();
        ctx.arc(0, 0, BIRD_R + 14, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 1) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else if (p.type === 2) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;
}

function drawRings() {
    for (var i = 0; i < rings.length; i++) {
        var g = rings[i];
        if (!g.active) continue;
        var a = 1 - g.life / g.ttl;
        ctx.globalAlpha = a * 0.9;
        ctx.strokeStyle = g.color;
        ctx.lineWidth = Math.max(1, g.lw * a);
        ctx.beginPath();
        ctx.arc(g.x | 0, g.y | 0, g.r, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawLabels() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < labels.length; i++) {
        var l = labels[i];
        if (!l.active) continue;
        var t = l.life / l.ttl;
        var a = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
        var sc = t < 0.15 ? 0.4 + 0.75 * (t / 0.15) : (t < 0.3 ? 1.15 - 0.15 * ((t - 0.15) / 0.15) : 1);
        ctx.globalAlpha = a;
        ctx.font = '800 ' + Math.round(l.size * sc) + 'px Nunito, sans-serif';
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(43,35,80,0.5)';
        ctx.strokeText(l.text, l.x | 0, l.y | 0);
        ctx.fillStyle = l.color;
        ctx.fillText(l.text, l.x | 0, l.y | 0);
    }
    ctx.globalAlpha = 1;
}

function drawPowerPill() {
    if (!power.type || currentState !== State.PLAYING) return;
    var info = POWER_INFO[power.type];
    var frac = 1 - power.t / power.dur;
    var blink = frac < 0.25 ? (0.55 + 0.45 * Math.sin(time * 12)) : 1;
    var w = 156, x = (VW / 2 - w / 2) | 0, y = 140;
    ctx.globalAlpha = 0.92 * blink;
    rr(ctx, x, y, w, 38, 19);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();
    ctx.font = '800 16px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = info.color;
    ctx.fillText(info.name, VW / 2, y + 14);
    rr(ctx, x + 12, y + 27, (w - 24) * frac, 5, 2.5);
    ctx.fill();
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 8;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(S, 0, 0, S, ox * S, oy * S);

    drawSkyAndCelestial();
    drawClouds();
    drawAmbient();
    drawHills();
    drawPipes();
    drawPickups();
    drawGround();
    drawChick();
    drawParticles();
    drawRings();
    drawLabels();
    drawPowerPill();
}

/* ================= Input ================= */
function primaryAction() {
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
        flap(); /* the first tap starts AND flaps */
    } else if (currentState === State.PLAYING) {
        flap();
    }
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    primaryAction();
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        primaryAction();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    showMenu(true); /* instant: next tap flaps you right back into the run */
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* tiny read-only hook for automated testing, exposes no controls */
window.__wingDebug = function () {
    var gaps = [];
    for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        if (p.active) gaps.push({ x: p.x, top: p.top, bot: p.bot, w: PIPE_W, passed: p.passed });
    }
    return { state: currentState, x: bird.x, y: bird.y, vy: bird.vy, score: score, panel: panelShown, gaps: gaps };
};

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu(false);
requestAnimationFrame(loop);

})();
</script>
</body>

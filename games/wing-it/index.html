<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var panelStarsEl = document.getElementById('panelStars');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_wing-it';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Soft flap whoosh: bandpassed noise sweeping up */
function sfxFlap() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.4;
    bp.frequency.setValueAtTime(650 * p, t);
    bp.frequency.exponentialRampToValueAtTime(1700 * p, t + 0.09);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.16);
}

/* Score ding: bright two note ping */
function sfxScore() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(988 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.24);
}

/* Star pickup: rising sparkle chime */
function sfxStar() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1047 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    o.frequency.setValueAtTime(1568 * p, t + 0.14);
    o.frequency.setValueAtTime(2093 * p, t + 0.21);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.015);
    g.gain.setValueAtTime(0.15, t + 0.22);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.44);
}

/* Death: descending sad trombone style blip, never harsh */
function sfxDeath() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.13);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.26);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.58);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.55);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.62);
}

/* Little fanfare for new best or sticker */
function sfxFanfare() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(659 * p, t + 0.1);
    o.frequency.setValueAtTime(784 * p, t + 0.2);
    o.frequency.setValueAtTime(1047 * p, t + 0.3);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.32);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.64);
}

/* ================= Constants ================= */
var H = 720;                     /* logical world height */
var GROUND_H = 96;
var GROUND_Y = H - GROUND_H;
var FLAP_VY = -320;
var GRAVITY = 1100;
var MAX_FALL = 620;
var PIPE_W = 78;
var PIPE_SPACING = 300;
var CAP_H = 30;
var CAP_OVER = 8;
var BIRD_R = 25;
var HIT_R = BIRD_R * 0.78;       /* forgiving hitbox */

function gapFor(s) { return 235 - 45 * Math.min(1, s / 30); }   /* 235 shrinking to 190 by score 30 */
function speedFor(s) { return 175 + 65 * Math.min(1, s / 50); } /* 175 rising to 240 by score 50 */

var State = {
    MENU: 'menu',
    PLAYING: 'playing',
    PAUSED: 'paused',
    DYING: 'dying',
    GAME_OVER: 'gameOver'
};
var currentState = State.MENU;

/* ================= Canvas sizing + prerendered sprites ================= */
var S = 1;    /* device pixels per logical unit */
var VW = 400; /* logical view width */
var pipeBodySpr = null, pipeCapSpr = null, cloudSprs = [], grassSpr = null, glowSpr = null, sunSpr = null;

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildSprites() {
    var ts = S;

    /* Candy striped pipe body tile (vertical stripes, stretch-safe along y) */
    var bodyH = 64;
    pipeBodySpr = makeCanvas(PIPE_W * ts, bodyH * ts);
    var bc = pipeBodySpr.getContext('2d');
    bc.scale(ts, ts);
    var stripeColors = ['#FF8A3D', '#FFB169'];
    var nStripes = 6;
    var sw = PIPE_W / nStripes;
    for (var i = 0; i < nStripes; i++) {
        bc.fillStyle = stripeColors[i % 2];
        bc.fillRect(i * sw, 0, sw + 0.5, bodyH);
    }
    /* subtle cylinder shading, prerendered so no gradients in the game loop */
    var shade = bc.createLinearGradient(0, 0, PIPE_W, 0);
    shade.addColorStop(0, 'rgba(255,255,255,0.38)');
    shade.addColorStop(0.22, 'rgba(255,255,255,0)');
    shade.addColorStop(0.72, 'rgba(0,0,0,0)');
    shade.addColorStop(1, 'rgba(0,0,0,0.2)');
    bc.fillStyle = shade;
    bc.fillRect(0, 0, PIPE_W, bodyH);
    bc.fillStyle = 'rgba(190,80,10,0.35)';
    bc.fillRect(0, 0, 2.5, bodyH);
    bc.fillRect(PIPE_W - 2.5, 0, 2.5, bodyH);

    /* Rounded pipe cap */
    var capW = PIPE_W + CAP_OVER * 2;
    pipeCapSpr = makeCanvas(capW * ts, CAP_H * ts);
    var cc = pipeCapSpr.getContext('2d');
    cc.scale(ts, ts);
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.fillStyle = '#FF8A3D';
    cc.fill();
    var cshade = cc.createLinearGradient(0, 0, capW, 0);
    cshade.addColorStop(0, 'rgba(255,255,255,0.4)');
    cshade.addColorStop(0.25, 'rgba(255,255,255,0.05)');
    cshade.addColorStop(0.75, 'rgba(0,0,0,0)');
    cshade.addColorStop(1, 'rgba(0,0,0,0.2)');
    cc.fillStyle = cshade;
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.fill();
    rr(cc, 1.5, 1.5, capW - 3, CAP_H - 3, 11);
    cc.lineWidth = 3;
    cc.strokeStyle = '#E06B1F';
    cc.stroke();
    cc.fillStyle = 'rgba(255,255,255,0.45)';
    rr(cc, 8, 5, capW - 30, 6, 3);
    cc.fill();

    /* Clouds: three puffy variants, shaded once */
    var variants = [
        [[38, 46, 24], [72, 32, 28], [108, 44, 24], [72, 50, 32]],
        [[32, 48, 20], [62, 36, 26], [96, 34, 22], [124, 46, 18], [78, 50, 30]],
        [[42, 44, 26], [84, 38, 30], [120, 48, 20]]
    ];
    cloudSprs = [];
    for (var v = 0; v < variants.length; v++) {
        var cs = makeCanvas(170 * ts, 80 * ts);
        var cctx = cs.getContext('2d');
        cctx.scale(ts, ts);
        var puffs = variants[v];
        var j;
        cctx.fillStyle = '#D8EFFB';
        for (j = 0; j < puffs.length; j++) {
            cctx.beginPath();
            cctx.arc(puffs[j][0], puffs[j][1] + 6, puffs[j][2], 0, Math.PI * 2);
            cctx.fill();
        }
        cctx.fillStyle = '#FFFFFF';
        for (j = 0; j < puffs.length; j++) {
            cctx.beginPath();
            cctx.arc(puffs[j][0], puffs[j][1], puffs[j][2], 0, Math.PI * 2);
            cctx.fill();
        }
        cloudSprs.push(cs);
    }

    /* Grass tile */
    var TW = 120;
    grassSpr = makeCanvas(TW * ts, GROUND_H * ts);
    var gc = grassSpr.getContext('2d');
    gc.scale(ts, ts);
    gc.fillStyle = '#7ED957';
    gc.fillRect(0, 0, TW, GROUND_H);
    /* scalloped bright top edge */
    gc.fillStyle = '#96E874';
    gc.beginPath();
    gc.moveTo(0, 16);
    for (var b = 0; b < 4; b++) {
        gc.arc(b * 30 + 15, 16, 15, Math.PI, 0, false);
    }
    gc.lineTo(TW, 0);
    gc.lineTo(0, 0);
    gc.closePath();
    gc.fill();
    gc.fillStyle = '#5FBF3F';
    gc.fillRect(0, GROUND_H - 10, TW, 10);
    /* little grass blades */
    gc.strokeStyle = '#69CC44';
    gc.lineWidth = 3;
    gc.lineCap = 'round';
    var blades = [[14, 40], [40, 58], [66, 36], [92, 52], [106, 70]];
    for (var g2 = 0; g2 < blades.length; g2++) {
        gc.beginPath();
        gc.moveTo(blades[g2][0], blades[g2][1] + 12);
        gc.quadraticCurveTo(blades[g2][0] + 3, blades[g2][1] + 4, blades[g2][0] + 1, blades[g2][1]);
        gc.stroke();
    }
    /* tiny flowers */
    gc.fillStyle = '#FFFFFF';
    gc.beginPath(); gc.arc(28, 74, 4, 0, Math.PI * 2); gc.fill();
    gc.fillStyle = '#FF9EC4';
    gc.beginPath(); gc.arc(84, 82, 4, 0, Math.PI * 2); gc.fill();
    gc.fillStyle = '#FFD93D';
    gc.beginPath(); gc.arc(28, 74, 1.8, 0, Math.PI * 2); gc.arc(84, 82, 1.8, 0, Math.PI * 2); gc.fill();

    /* Soft round glow (used for star halo and sun core) */
    glowSpr = makeCanvas(64 * ts, 64 * ts);
    var glc = glowSpr.getContext('2d');
    glc.scale(ts, ts);
    var gg = glc.createRadialGradient(32, 32, 2, 32, 32, 32);
    gg.addColorStop(0, 'rgba(255,255,255,0.85)');
    gg.addColorStop(0.5, 'rgba(255,255,255,0.25)');
    gg.addColorStop(1, 'rgba(255,255,255,0)');
    glc.fillStyle = gg;
    glc.fillRect(0, 0, 64, 64);

    /* Sun */
    sunSpr = makeCanvas(200 * ts, 200 * ts);
    var sc = sunSpr.getContext('2d');
    sc.scale(ts, ts);
    var sg = sc.createRadialGradient(100, 100, 8, 100, 100, 100);
    sg.addColorStop(0, 'rgba(255,246,190,0.95)');
    sg.addColorStop(0.35, 'rgba(255,240,160,0.55)');
    sg.addColorStop(1, 'rgba(255,240,160,0)');
    sc.fillStyle = sg;
    sc.fillRect(0, 0, 200, 200);
    sc.fillStyle = '#FFF3B0';
    sc.beginPath();
    sc.arc(100, 100, 34, 0, Math.PI * 2);
    sc.fill();
}

function resize() {
    var dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    S = canvas.height / H;
    VW = canvas.width / S;
    buildSprites();
    initClouds();
}
window.addEventListener('resize', resize);

/* ================= World state ================= */
var time = 0;
var score = 0;
var runStars = 0;
var prevBest = 0;
var newBest = false;
var earnedTiers = [];
var groundX = 0;
var hillX = 0;
var quickRestart = false;
var deathT = 0;
var landedT = -1;
var panelShown = false;
var trauma = 0;
var lastGapC = 0;
var hasLastGap = false;

var bird = {
    x: 200, y: H * 0.42, vy: 0, rot: 0,
    squash: 0, wingT: 9, blinkIn: rand(1.5, 4), blinkT: 0
};
function birdTargetX() { return clamp(VW * 0.33, 90, 420); }

/* Pools: never allocate during gameplay */
var pipes = [];
for (var pi = 0; pi < 8; pi++) pipes.push({ active: false, x: 0, top: 0, bot: 0, passed: false });
var stars = [];
for (var si = 0; si < 4; si++) stars.push({ active: false, x: 0, y: 0, phase: 0 });
var parts = [];
for (var qi = 0; qi < 160; qi++) {
    parts.push({ active: false, type: 0, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1, size: 4, color: '#fff', seed: 0 });
}
/* particle types: 1 feather, 2 spark, 3 confetti */
function spawnPart(type, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.type = type;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, Math.PI * 2);
            p.vr = rand(-7, 7);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;
            p.seed = rand(0, 10);
            return;
        }
    }
}

var FEATHER_COLORS = ['#FFD93D', '#FFC61A', '#FFE9A8', '#FF8A3D'];
function burstFeathers(x, y) {
    for (var i = 0; i < 16; i++) {
        var a = rand(0, Math.PI * 2);
        var sp = rand(60, 280);
        spawnPart(1, x, y, Math.cos(a) * sp, Math.sin(a) * sp - 60, rand(0.7, 1.3), rand(5, 9), FEATHER_COLORS[i % FEATHER_COLORS.length]);
    }
}
var SPARK_COLORS = ['#FFFFFF', '#FFF3B0', '#FFE14D'];
function burstSparks(x, y) {
    for (var i = 0; i < 12; i++) {
        var a = rand(0, Math.PI * 2);
        var sp = rand(40, 220);
        spawnPart(2, x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.35, 0.7), rand(2.5, 5), SPARK_COLORS[i % SPARK_COLORS.length]);
    }
}
var CONFETTI_COLORS = ['#FF8A3D', '#7ED957', '#4FC3F7', '#FFD93D', '#FF5FA2', '#B388FF'];
function burstConfetti() {
    for (var i = 0; i < 70; i++) {
        spawnPart(3, rand(VW * 0.15, VW * 0.85), rand(-60, -10), rand(-70, 70), rand(50, 190), rand(2, 3.2), rand(5, 9), CONFETTI_COLORS[i % CONFETTI_COLORS.length]);
    }
}

/* Clouds: 2 parallax layers, always drifting (even on game over) */
var cloudsFar = [], cloudsNear = [];
function initClouds() {
    cloudsFar = [];
    cloudsNear = [];
    var i;
    for (i = 0; i < 6; i++) {
        cloudsFar.push({ x: rand(0, VW), y: rand(30, 260), s: rand(0.45, 0.7), spr: i % 3, a: 0.65 });
    }
    for (i = 0; i < 4; i++) {
        cloudsNear.push({ x: rand(0, VW), y: rand(60, 380), s: rand(0.85, 1.25), spr: i % 3, a: 0.95 });
    }
}
function updateClouds(dt) {
    var ws = (currentState === State.PLAYING) ? speedFor(score) : 0;
    var i, c;
    for (i = 0; i < cloudsFar.length; i++) {
        c = cloudsFar[i];
        c.x -= (9 + ws * 0.1) * dt;
        if (c.x < -180 * c.s) { c.x = VW + rand(10, 140); c.y = rand(30, 260); }
    }
    for (i = 0; i < cloudsNear.length; i++) {
        c = cloudsNear[i];
        c.x -= (22 + ws * 0.28) * dt;
        if (c.x < -180 * c.s) { c.x = VW + rand(10, 200); c.y = rand(60, 380); }
    }
}

/* ================= Run control ================= */
function resetRun() {
    var i;
    for (i = 0; i < pipes.length; i++) pipes[i].active = false;
    for (i = 0; i < stars.length; i++) stars[i].active = false;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    score = 0;
    runStars = 0;
    newBest = false;
    earnedTiers = [];
    hasLastGap = false;
    deathT = 0;
    landedT = -1;
    panelShown = false;
    trauma = 0;
    bird.y = H * 0.42;
    bird.vy = 0;
    bird.rot = 0;
    bird.squash = 0;
    bird.wingT = 9;
    scoreEl.textContent = '0';
}

function showMenu(quick) {
    quickRestart = quick;
    currentState = State.MENU;
    resetRun();
    bird.x = quick ? birdTargetX() : VW / 2;
    titleEl.style.display = quick ? 'none' : 'block';
    tapHintEl.style.display = 'block';
    scoreEl.style.display = 'none';
    pauseBtn.style.display = 'none';
    overPanel.classList.remove('show');
    if (!quick && data.highScore > 0) {
        menuBestEl.textContent = 'BEST: ' + data.highScore;
        menuBestEl.style.display = 'inline-block';
    }
}

function startRun() {
    currentState = State.PLAYING;
    prevBest = data.highScore;
    titleEl.style.display = 'none';
    tapHintEl.style.display = 'none';
    scoreEl.style.display = 'block';
    pauseBtn.style.display = 'flex';
    spawnPipe(VW + 260);
}

function flap() {
    bird.vy = FLAP_VY;
    bird.wingT = 0;
    bird.squash = 0.8;
    sfxFlap();
}

function die() {
    if (currentState !== State.PLAYING) return;
    currentState = State.DYING;
    deathT = 0;
    landedT = -1;
    trauma = 0.5;
    bird.squash = 1;
    bird.vy = Math.min(bird.vy, -170); /* cartoon hop before the tumble */
    burstFeathers(bird.x, bird.y);
    sfxDeath();
    pauseBtn.style.display = 'none';

    /* record the run immediately */
    newBest = score > prevBest;
    data.totalPlays++;
    data.totalCoins += runStars;
    if (score > data.highScore) data.highScore = score;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('wing-it', score, { bronze: 10, silver: 25, gold: 50 });
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };
function showPanel() {
    if (panelShown) return;
    panelShown = true;
    currentState = State.GAME_OVER;
    scoreEl.style.display = 'none';
    panelScoreEl.textContent = score;
    panelBestEl.textContent = data.highScore;
    newBestEl.style.display = newBest ? 'block' : 'none';
    document.getElementById('panelTitle').textContent = newBest ? 'AMAZING!' : 'NICE FLIGHT!';
    if (runStars > 0) {
        panelStarsEl.textContent = '⭐ ' + runStars + ' star' + (runStars === 1 ? '' : 's') + ' collected';
        panelStarsEl.style.display = 'block';
    } else {
        panelStarsEl.style.display = 'none';
    }
    var diff = prevBest - score;
    if (!newBest && prevBest >= 5 && score < prevBest && diff <= prevBest * 0.2) {
        nearMissEl.textContent = 'SO CLOSE! ' + diff + ' away from your best';
        nearMissEl.style.display = 'block';
    } else {
        nearMissEl.style.display = 'none';
    }
    if (earnedTiers.length > 0) {
        var labels = [];
        for (var i = 0; i < earnedTiers.length; i++) labels.push(TIER_LABELS[earnedTiers[i]]);
        stickerBanner.textContent = 'STICKER EARNED! ' + labels.join(' + ');
        stickerBanner.style.display = 'block';
    } else {
        stickerBanner.style.display = 'none';
    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti();
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

/* ================= Spawning ================= */
function spawnPipe(x) {
    var p = null;
    for (var i = 0; i < pipes.length; i++) {
        if (!pipes[i].active) { p = pipes[i]; break; }
    }
    if (!p) return;
    var gapH = gapFor(score);
    var minC = 70 + gapH / 2;
    var maxC = GROUND_Y - 70 - gapH / 2;
    var c;
    if (!hasLastGap) {
        c = rand(minC, maxC);
    } else {
        /* keep every jump physically reachable: climbing is slower than falling */
        var tBetween = PIPE_SPACING / speedFor(score);
        var up = Math.min(170, 105 * tBetween);
        var down = Math.min(210, 180 * tBetween);
        c = clamp(lastGapC + rand(-up, down), lastGapC - up, lastGapC + down);
    }
    c = clamp(c, minC, maxC);
    lastGapC = c;
    hasLastGap = true;
    p.active = true;
    p.x = x;
    p.top = c - gapH / 2;
    p.bot = c + gapH / 2;
    p.passed = false;

    /* occasional star pickup floating between gaps, pure juice */
    if (Math.random() < 0.45) {
        for (var j = 0; j < stars.length; j++) {
            if (!stars[j].active) {
                stars[j].active = true;
                stars[j].x = x + PIPE_SPACING / 2;
                stars[j].y = clamp(c + rand(-110, 110), 130, GROUND_Y - 130);
                stars[j].phase = rand(0, Math.PI * 2);
                break;
            }
        }
    }
}

function manageSpawns() {
    var rightmost = -1e9;
    var any = false;
    for (var i = 0; i < pipes.length; i++) {
        if (pipes[i].active) { any = true; if (pipes[i].x > rightmost) rightmost = pipes[i].x; }
    }
    if (!any) {
        spawnPipe(VW + 260);
        return;
    }
    while (rightmost < VW + 60) {
        rightmost += PIPE_SPACING;
        spawnPipe(rightmost);
    }
}

/* ================= Update ================= */
function hitRect(cx, cy, r, rx, ry, rw, rh) {
    var nx = Math.max(rx, Math.min(cx, rx + rw));
    var ny = Math.max(ry, Math.min(cy, ry + rh));
    var dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
}

function updateBirdCosmetics(dt) {
    if (bird.squash > 0) bird.squash = Math.max(0, bird.squash - bird.squash * 9 * dt - 0.4 * dt);
    bird.wingT += dt;
    if (bird.blinkT > 0) {
        bird.blinkT -= dt;
    } else {
        bird.blinkIn -= dt;
        if (bird.blinkIn <= 0) {
            bird.blinkT = 0.12;
            bird.blinkIn = rand(1.6, 4.5);
        }
    }
}

function updateMenu(dt) {
    groundX -= 60 * dt;
    hillX -= 30 * dt;
    bird.y = H * 0.42 + Math.sin(time * 2.4) * 12;
    bird.vy = 0;
    bird.rot += (0 - bird.rot) * Math.min(1, 10 * dt);
    updateBirdCosmetics(dt);
    updateParticles(dt);
}

function updateGame(dt) {
    var sp = speedFor(score);
    groundX -= sp * dt;
    hillX -= sp * 0.45 * dt;

    /* bird physics */
    bird.vy = Math.min(MAX_FALL, bird.vy + GRAVITY * dt);
    bird.y += bird.vy * dt;
    if (bird.y < BIRD_R) { bird.y = BIRD_R; bird.vy = Math.max(bird.vy, 0); }
    bird.x += (birdTargetX() - bird.x) * Math.min(1, 3 * dt);

    /* tilt with velocity: -25deg climbing to +70deg falling */
    var targetDeg = -25 + ((bird.vy - FLAP_VY) / (MAX_FALL - FLAP_VY)) * 95;
    targetDeg = clamp(targetDeg, -25, 70);
    var targetRot = targetDeg * Math.PI / 180;
    var ease = bird.vy < 0 ? 14 : 6;
    bird.rot += (targetRot - bird.rot) * Math.min(1, ease * dt);

    updateBirdCosmetics(dt);

    /* pipes */
    var i, p;
    for (i = 0; i < pipes.length; i++) {
        p = pipes[i];
        if (!p.active) continue;
        p.x -= sp * dt;
        if (p.x < -PIPE_W - 30) { p.active = false; continue; }
        if (!p.passed && p.x + PIPE_W < bird.x - HIT_R) {
            p.passed = true;
            score++;
            scoreEl.textContent = score;
            scoreEl.classList.remove('pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('pop');
            sfxScore();
        }
        if (hitRect(bird.x, bird.y, HIT_R, p.x, 0, PIPE_W, p.top) ||
            hitRect(bird.x, bird.y, HIT_R, p.x, p.bot, PIPE_W, GROUND_Y - p.bot)) {
            die();
            return;
        }
    }

    /* stars */
    for (i = 0; i < stars.length; i++) {
        var st = stars[i];
        if (!st.active) continue;
        st.x -= sp * dt;
        if (st.x < -40) { st.active = false; continue; }
        var dx = bird.x - st.x, dy = bird.y - (st.y + Math.sin(time * 3 + st.phase) * 7);
        var rad = HIT_R + 17;
        if (dx * dx + dy * dy < rad * rad) {
            st.active = false;
            runStars++;
            burstSparks(st.x, st.y);
            sfxStar();
        }
    }

    manageSpawns();
    updateParticles(dt);

    /* floor */
    if (bird.y + HIT_R >= GROUND_Y) {
        bird.y = GROUND_Y - HIT_R;
        die();
    }
}

function updateDying(dt) {
    /* slow motion for the first 250ms, then normal speed tumble */
    var scale = deathT < 0.25 ? 0.3 : 1;
    var dts = dt * scale;
    deathT += dt;

    bird.vy = Math.min(MAX_FALL, bird.vy + GRAVITY * dts);
    bird.y += bird.vy * dts;
    bird.rot += (1.35 - bird.rot) * Math.min(1, 5 * dts);
    if (bird.squash > 0) bird.squash = Math.max(0, bird.squash - 2.2 * dts);

    var floorY = GROUND_Y - BIRD_R * 0.55;
    if (bird.y >= floorY) {
        bird.y = floorY;
        bird.vy = 0;
        if (landedT < 0) landedT = deathT;
    }
    updateParticles(dts);

    if ((landedT >= 0 && deathT - landedT > 0.25) || deathT > 1.6) showPanel();
}

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 1) {
            p.vy = Math.min(95, p.vy + 300 * dt);
            p.vx *= (1 - Math.min(1, 2.5 * dt));
            p.x += Math.sin(p.life * 13 + p.seed) * 34 * dt;
        } else if (p.type === 2) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else {
            p.vy = Math.min(240, p.vy + 220 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

function update(dt) {
    time += dt;
    updateClouds(dt);
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateParticles(dt); break;
    }
}

/* ================= Render ================= */
function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
        var p = pipes[i];
        if (!p.active) continue;
        var x = p.x | 0;
        /* top pipe */
        if (p.top > 0) {
            ctx.drawImage(pipeBodySpr, x, 0, PIPE_W, (p.top - CAP_H + 2) | 0);
            ctx.drawImage(pipeCapSpr, x - CAP_OVER, (p.top - CAP_H) | 0, PIPE_W + CAP_OVER * 2, CAP_H);
        }
        /* bottom pipe */
        var botH = GROUND_Y - p.bot;
        if (botH > 0) {
            ctx.drawImage(pipeBodySpr, x, (p.bot + CAP_H - 2) | 0, PIPE_W, (botH - CAP_H + 4) | 0);
            ctx.drawImage(pipeCapSpr, x - CAP_OVER, p.bot | 0, PIPE_W + CAP_OVER * 2, CAP_H);
        }
    }
}

function drawStarShape(x, y, r, rot) {
    ctx.beginPath();
    for (var i = 0; i < 10; i++) {
        var a = rot + i * Math.PI / 5 - Math.PI / 2;
        var rr2 = (i % 2 === 0) ? r : r * 0.45;
        var px = x + Math.cos(a) * rr2;
        var py = y + Math.sin(a) * rr2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
}

function drawStars() {
    for (var i = 0; i < stars.length; i++) {
        var st = stars[i];
        if (!st.active) continue;
        var y = st.y + Math.sin(time * 3 + st.phase) * 7;
        var pulse = 1 + 0.12 * Math.sin(time * 5 + st.phase);
        ctx.drawImage(glowSpr, (st.x - 30) | 0, (y - 30) | 0, 60, 60);
        drawStarShape(st.x, y, 15 * pulse, time * 1.6 + st.phase);
        ctx.fillStyle = '#FFE14D';
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#F1A62B';
        ctx.stroke();
    }
}

function drawGround() {
    /* distant hill band for depth */
    ctx.fillStyle = '#A9E77F';
    var hw = 260;
    var hx = ((hillX % hw) + hw) % hw - hw;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    for (var x = hx; x < VW + hw; x += hw) {
        ctx.quadraticCurveTo(x + hw / 2, GROUND_Y - 34, x + hw, GROUND_Y);
    }
    ctx.lineTo(VW, GROUND_Y + 4);
    ctx.lineTo(0, GROUND_Y + 4);
    ctx.closePath();
    ctx.fill();

    var TW = 120;
    var off = ((groundX % TW) + TW) % TW - TW;
    for (var gx = off; gx < VW; gx += TW) {
        ctx.drawImage(grassSpr, gx | 0, GROUND_Y, TW, GROUND_H);
    }
}

function drawChick() {
    var b = bird;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    var sx = 1 + 0.16 * b.squash;
    var sy = 1 - 0.22 * b.squash;
    ctx.scale(sx, sy);
    var R = BIRD_R;

    /* wing animation: strong down flap right after a tap, gentle flutter otherwise */
    var flutterSpeed = currentState === State.MENU ? 6 : 9;
    var flapKick = b.wingT < 0.28 ? Math.sin((b.wingT / 0.28) * Math.PI) : 0;
    var wingAng = Math.sin(time * flutterSpeed) * 0.3 - flapKick * 1.15;

    /* tail feathers */
    ctx.fillStyle = '#F2B70A';
    ctx.save();
    ctx.translate(-R + 3, -2);
    ctx.rotate(-0.5);
    ctx.beginPath();
    ctx.ellipse(-7, 0, 10, 4.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.rotate(0.65);
    ctx.beginPath();
    ctx.ellipse(-7, 0, 9, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    /* body */
    ctx.fillStyle = '#FFD93D';
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#E8A20C';
    ctx.stroke();

    /* belly patch */
    ctx.fillStyle = '#FFEDA3';
    ctx.beginPath();
    ctx.ellipse(4, 9, R * 0.58, R * 0.44, 0.2, 0, Math.PI * 2);
    ctx.fill();

    /* crest tufts */
    ctx.fillStyle = '#FFC61A';
    ctx.save();
    ctx.translate(-3, -R + 1);
    ctx.rotate(-0.35);
    ctx.beginPath();
    ctx.ellipse(0, -4, 3.4, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.rotate(0.75);
    ctx.beginPath();
    ctx.ellipse(4, -3, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    /* wing */
    ctx.save();
    ctx.translate(-5, 2);
    ctx.rotate(wingAng);
    ctx.fillStyle = '#F2B70A';
    ctx.beginPath();
    ctx.ellipse(-8, 4, 13.5, 8, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#DA9A06';
    ctx.stroke();
    ctx.restore();

    /* beak */
    ctx.fillStyle = '#FF8A3D';
    ctx.beginPath();
    ctx.moveTo(R - 7, -4);
    ctx.lineTo(R + 12, 0);
    ctx.lineTo(R - 7, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#F07420';
    ctx.beginPath();
    ctx.moveTo(R - 7, 3);
    ctx.lineTo(R + 8, 1.5);
    ctx.lineTo(R - 7, 7);
    ctx.closePath();
    ctx.fill();

    /* blush cheek */
    ctx.fillStyle = 'rgba(255,138,110,0.55)';
    ctx.beginPath();
    ctx.arc(R * 0.42, 7, 4.6, 0, Math.PI * 2);
    ctx.fill();

    /* expressive eye: pupil leans into the motion, blinks occasionally */
    var blink = bird.blinkT > 0;
    if (blink) {
        ctx.strokeStyle = '#7A5C00';
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        ctx.arc(9, -7, 5, 0.15, Math.PI - 0.15);
        ctx.stroke();
    } else {
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(9, -8, 7.2, 0, Math.PI * 2);
        ctx.fill();
        var lean = clamp(bird.vy / MAX_FALL, -0.6, 1);
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(10.6, -8 + lean * 2.4, 3.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(11.8, -9.4 + lean * 2, 1.3, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 1) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else if (p.type === 2) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 8;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(S, 0, 0, S, ox * S, oy * S);

    /* warm day sky */
    ctx.fillStyle = '#8FD8FF';
    ctx.fillRect(-10, -10, VW + 20, H + 20);

    /* sun */
    ctx.drawImage(sunSpr, (VW - 210) | 0, 30, 180, 180);

    /* parallax clouds, two layers */
    var i, c;
    for (i = 0; i < cloudsFar.length; i++) {
        c = cloudsFar[i];
        ctx.globalAlpha = c.a;
        ctx.drawImage(cloudSprs[c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
    }
    for (i = 0; i < cloudsNear.length; i++) {
        c = cloudsNear[i];
        ctx.globalAlpha = c.a;
        ctx.drawImage(cloudSprs[c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
    }
    ctx.globalAlpha = 1;

    drawPipes();
    drawStars();
    drawGround();
    drawChick();
    drawParticles();
}

/* ================= Input ================= */
function primaryAction() {
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
        flap(); /* the first tap starts AND flaps */
    } else if (currentState === State.PLAYING) {
        flap();
    }
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    primaryAction();
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        primaryAction();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    showMenu(true); /* instant: next tap flaps you right back into the run */
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu(false);
requestAnimationFrame(loop);

})();
</script>
</body>
</html>

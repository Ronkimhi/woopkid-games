<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var scoreNumEl = document.getElementById('scoreNum');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var steerHintEl = document.getElementById('steerHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelTitleEl = document.getElementById('panelTitle');
var panelScoreNumEl = document.getElementById('panelScoreNum');
var panelBestEl = document.getElementById('panelBest');
var panelStatsEl = document.getElementById('panelStats');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_speed-slope';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
var TAU = Math.PI * 2;
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.4);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Run start: quick rising zip */
function sfxStart() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(300 * p, t);
    o.frequency.exponentialRampToValueAtTime(720 * p, t + 0.18);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.26);
}

/* Milestone ding: bright two note ping every 100 meters */
function sfxTick() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(988 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.24);
}

/* Near miss: airy whoosh, bandpassed noise sweeping down */
function sfxWhoosh() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(1500 * p, t);
    bp.frequency.exponentialRampToValueAtTime(380 * p, t + 0.16);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.22);
}

/* Shatter: glassy noise burst plus a soft falling tone, sad not scary */
function sfxShatter() {
    if (!canPlay()) return;
    activeVoices += 2;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.setValueAtTime(2400 * p, t);
    hp.frequency.linearRampToValueAtTime(700, t + 0.35);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    src.connect(hp); hp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.42);

    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(330 * p, t);
    o.frequency.exponentialRampToValueAtTime(80 * p, t + 0.55);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1000, t);
    lp.frequency.linearRampToValueAtTime(360, t + 0.5);
    var g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.0001, t);
    g2.gain.exponentialRampToValueAtTime(0.17, t + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.58);
    o.connect(lp); lp.connect(g2); g2.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.6);
}

/* Little fanfare for new best or sticker */
function sfxFanfare() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(659 * p, t + 0.1);
    o.frequency.setValueAtTime(784 * p, t + 0.2);
    o.frequency.setValueAtTime(1047 * p, t + 0.3);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.32);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.64);
}

/* ================= Constants ================= */
var SEG_LEN = 3;          /* meters per road segment */
var DRAW_SEG = 60;        /* segments drawn ahead of the camera */
var NSEG = 160;           /* ring buffer size, > DRAW_SEG + slack */
var ROAD_HALF = 6;        /* road half width in meters */
var BALL_Z = 12;          /* ball distance ahead of the camera */
var BALL_R = 1.0;         /* ball radius in meters */
var CAM_H = 3.6;          /* camera height above the road */
var START_SPEED = 14;
var SPEED_RAMP = 0.35;    /* speed gained per second */
var MAX_SPEED = 40;
var STEER_ACC = 60;       /* lateral acceleration, units per second squared */
var STEER_FRICTION = 4.2; /* pull back to straight when not steering */
var MAX_VX = 16;
var CENTRI = 6;           /* how hard curves push the ball outward */
var GAP_W = 3.6;          /* guaranteed dodge gap width in every block row */
var BLOCK_H = 1.7;
var BLOCK_D = 1.6;
var MENU_DRIFT = 8;

var State = {
    MENU: 'menu',
    PLAYING: 'playing',
    PAUSED: 'paused',
    DYING: 'dying',
    GAME_OVER: 'gameOver'
};
var currentState = State.MENU;

/* ================= Canvas sizing + prerendered sprites ================= */
var W = 0, H = 0, W2 = 0, dpr = 1;
var HOR = 0, PROJX = 0, PROJY = 0;
var skySpr = null, ballSpr = null;
var BALL_SPR_R = 46; /* ball radius inside the 128px sprite */

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildSky() {
    skySpr = makeCanvas(W, H);
    var c = skySpr.getContext('2d');
    /* deep space gradient, prerendered once so no gradients in the game loop */
    var g = c.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a1a3e');
    g.addColorStop(0.55, '#12122e');
    g.addColorStop(1, '#0a0a22');
    c.fillStyle = g;
    c.fillRect(0, 0, W, H);
    /* soft nebula blobs */
    var n1 = c.createRadialGradient(W * 0.22, HOR * 0.4, 10, W * 0.22, HOR * 0.4, W * 0.5);
    n1.addColorStop(0, 'rgba(255,53,211,0.13)');
    n1.addColorStop(1, 'rgba(255,53,211,0)');
    c.fillStyle = n1;
    c.fillRect(0, 0, W, H);
    var n2 = c.createRadialGradient(W * 0.82, HOR * 0.62, 10, W * 0.82, HOR * 0.62, W * 0.45);
    n2.addColorStop(0, 'rgba(61,246,255,0.1)');
    n2.addColorStop(1, 'rgba(61,246,255,0)');
    c.fillStyle = n2;
    c.fillRect(0, 0, W, H);
    /* horizon glow band */
    var hb = c.createLinearGradient(0, HOR - 60, 0, HOR + 40);
    hb.addColorStop(0, 'rgba(61,246,255,0)');
    hb.addColorStop(0.62, 'rgba(61,246,255,0.2)');
    hb.addColorStop(1, 'rgba(61,246,255,0)');
    c.fillStyle = hb;
    c.fillRect(0, HOR - 60, W, 100);
    c.fillStyle = 'rgba(150,248,255,0.4)';
    c.fillRect(0, HOR - 1, W, 2);
}

function buildBallSprite() {
    ballSpr = makeCanvas(128, 128);
    var c = ballSpr.getContext('2d');
    /* outer cool glow */
    var glow = c.createRadialGradient(64, 64, 30, 64, 64, 64);
    glow.addColorStop(0, 'rgba(140,240,255,0.5)');
    glow.addColorStop(1, 'rgba(140,240,255,0)');
    c.fillStyle = glow;
    c.fillRect(0, 0, 128, 128);
    /* glossy sphere */
    var s = c.createRadialGradient(52, 46, 6, 60, 60, 52);
    s.addColorStop(0, '#FFFFFF');
    s.addColorStop(0.5, '#EDF1FC');
    s.addColorStop(0.82, '#B6C0E2');
    s.addColorStop(1, '#8791C4');
    c.fillStyle = s;
    c.beginPath();
    c.arc(64, 64, BALL_SPR_R, 0, TAU);
    c.fill();
    /* rim light */
    c.strokeStyle = 'rgba(255,255,255,0.55)';
    c.lineWidth = 2.5;
    c.beginPath();
    c.arc(64, 64, BALL_SPR_R - 1.5, 0, TAU);
    c.stroke();
    /* hot highlight */
    c.fillStyle = 'rgba(255,255,255,0.92)';
    c.beginPath();
    c.ellipse(48, 42, 13, 8.5, -0.6, 0, TAU);
    c.fill();
}

function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    W2 = W / 2;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    HOR = H * 0.36;
    PROJX = 0.8 * Math.min(W, H * 0.9);
    PROJY = 1.47 * H;
    buildSky();
    buildBallSprite();
    initStars();
}
window.addEventListener('resize', resize);

/* ================= Star field (parallax sky) ================= */
var STAR_COLORS = ['#FFFFFF', '#BFE9FF', '#FFD5F4'];
var starList = [];
function initStars() {
    starList = [];
    var count = 110;
    for (var ci = 0; ci < STAR_COLORS.length; ci++) {
        var per = Math.floor(count / STAR_COLORS.length);
        for (var i = 0; i < per; i++) {
            starList.push({
                x: rand(0, W),
                y: rand(0, HOR + 20),
                l: ci === 0 ? rand(0.6, 1) : rand(0.25, 0.6), /* near layer drifts faster */
                r: rand(1, 2.4),
                ph: rand(0, TAU),
                tw: rand(1.5, 4),
                c: ci
            });
        }
    }
}
function updateStars(dt) {
    var base = Math.floor(pos / SEG_LEN);
    var curveNow = segs[base % NSEG].curve;
    var drift = -(curveNow * worldSpeed * 46);
    for (var i = 0; i < starList.length; i++) {
        var s = starList[i];
        s.x += drift * s.l * dt + 1.5 * s.l * dt;
        if (s.x < -4) s.x += W + 8;
        if (s.x > W + 4) s.x -= W + 8;
    }
}
function drawStarsBg() {
    var lastC = -1;
    for (var i = 0; i < starList.length; i++) {
        var s = starList[i];
        if (s.c !== lastC) { ctx.fillStyle = STAR_COLORS[s.c]; lastC = s.c; }
        var a = 0.35 + 0.6 * (0.5 + 0.5 * Math.sin(time * s.tw + s.ph));
        ctx.globalAlpha = a;
        ctx.fillRect(s.x | 0, s.y | 0, s.r, s.r);
    }
    ctx.globalAlpha = 1;
}

/* ================= Track (ring buffer of road segments) ================= */
var segs = [];
for (var sgi = 0; sgi < NSEG; sgi++) segs.push({ n: -1, curve: 0, el: -ROAD_HALF, er: ROAD_HALF });
var genNext = 0;
var gen = {
    curve: 0, curveTarget: 0, curveHold: 0,
    gapRemain: 0, gapTotal: 0, gapSide: 1, gapW: 0, sinceGap: 999,
    nextRowZ: 1e9, lastRowZ: 0, prevGapC: 0
};

function genSegment(n) {
    var s = segs[n % NSEG];
    s.n = n;
    /* smoothed random curvature: ease toward a target that re-rolls now and then */
    if (gen.curveHold <= 0) {
        gen.curveTarget = rand(-0.034, 0.034);
        gen.curveHold = 30 + ((Math.random() * 45) | 0);
    }
    gen.curveHold--;
    gen.curve += (gen.curveTarget - gen.curve) * 0.05;
    s.curve = (n < 16) ? 0 : gen.curve;

    /* edge gaps: at higher speeds one side of the road falls away for a stretch */
    var el = -ROAD_HALF, er = ROAD_HALF;
    if (gen.gapRemain > 0) {
        var done = gen.gapTotal - gen.gapRemain;
        var f = Math.min(1, Math.min(done + 1, gen.gapRemain) / 2.5); /* ramp in and out */
        var shift = gen.gapW * f;
        if (gen.gapSide < 0) el = -ROAD_HALF + shift; else er = ROAD_HALF - shift;
        gen.gapRemain--;
        gen.sinceGap = 0;
    } else {
        gen.sinceGap++;
        if (currentState === State.PLAYING && speed >= 20 && gen.sinceGap > 50 && Math.random() < 0.05) {
            gen.gapTotal = 10 + ((Math.random() * 8) | 0);
            gen.gapRemain = gen.gapTotal;
            gen.gapSide = Math.random() < 0.5 ? -1 : 1;
            gen.gapW = rand(2.6, 4.2);
            /* fairness: keep block rows away from the gap stretch */
            var gapEnd = (n + gen.gapTotal + 8) * SEG_LEN;
            if (gen.nextRowZ < gapEnd) gen.nextRowZ = gapEnd;
        }
    }
    s.el = el;
    s.er = er;
}

function ensureTrack() {
    var need = Math.floor(pos / SEG_LEN) + DRAW_SEG + 6;
    while (genNext < need) genSegment(genNext++);
}

/* ================= Obstacle blocks (pooled) ================= */
var blocks = [];
for (var bi = 0; bi < 24; bi++) blocks.push({ active: false, z: 0, x0: 0, x1: 0, passed: false });
var blockScratch = new Array(24);

function spawnBlock(z, x0, x1) {
    for (var i = 0; i < blocks.length; i++) {
        var b = blocks[i];
        if (!b.active) {
            b.active = true;
            b.z = z;
            b.x0 = x0;
            b.x1 = x1;
            b.passed = false;
            return;
        }
    }
}

/* One row of blocks with a guaranteed reachable gap. */
function spawnRowAt(z) {
    var s = segs[Math.floor(z / SEG_LEN) % NSEG];
    var el = s.el, er = s.er;
    if (er - el < GAP_W + 1.2) return; /* road too narrow here, skip */
    var tBetween = Math.max(0.6, (z - gen.lastRowZ) / Math.max(speed, 1));
    var reach = clamp(12 * tBetween * 0.5, 2.2, 6.5); /* what the player can laterally cover in time */
    var lo = el + GAP_W / 2 + 0.4;
    var hi = er - GAP_W / 2 - 0.4;
    if (hi <= lo) return;
    var pc = clamp(gen.prevGapC, lo, hi);
    var gapC = clamp(pc + rand(-reach, reach), lo, hi);
    gen.prevGapC = gapC;
    gen.lastRowZ = z;
    var lSpan = (gapC - GAP_W / 2) - el;
    if (lSpan > 0.9) spawnBlock(z, el - 0.6, gapC - GAP_W / 2);
    var rSpan = er - (gapC + GAP_W / 2);
    if (rSpan > 0.9) spawnBlock(z, gapC + GAP_W / 2, er + 0.6);
}

/* Row spacing = minimum reaction distance, scales with speed. */
function manageRows() {
    var ahead = Math.max(120, speed * 4);
    while (gen.nextRowZ < pos + ahead) {
        var z = gen.nextRowZ;
        if (z - startPos > 55) spawnRowAt(z);
        gen.nextRowZ += Math.max(30, speed * 1.35) + rand(0, 12);
    }
}

/* ================= Particles (pooled: trail, shards, confetti, sparks) ================= */
var parts = [];
for (var qi = 0; qi < 150; qi++) {
    parts.push({ active: false, type: 0, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1, size: 4, color: '#fff', seed: 0 });
}
function spawnPart(type, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.type = type;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, TAU);
            p.vr = rand(-9, 9);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;
            p.seed = rand(0, 10);
            return;
        }
    }
}

var SHARD_COLORS = ['#FFFFFF', '#D6FBFF', '#9BEBFF', '#FFD1F6'];
function spawnShards(x, y, r) {
    for (var i = 0; i < 26; i++) {
        var a = rand(0, TAU);
        var sp = rand(120, 520);
        spawnPart(2, x + Math.cos(a) * r * 0.4, y + Math.sin(a) * r * 0.4,
            Math.cos(a) * sp, Math.sin(a) * sp - 220, rand(0.7, 1.3), rand(4, 11),
            SHARD_COLORS[i % SHARD_COLORS.length]);
    }
}
var CONFETTI_COLORS = ['#FF35D3', '#3DF6FF', '#FFE14D', '#B06CFF', '#7ED957', '#FF7CE4'];
function burstConfetti() {
    for (var i = 0; i < 70; i++) {
        spawnPart(3, rand(W * 0.15, W * 0.85), rand(-60, -10), rand(-70, 70), rand(50, 190), rand(2, 3.2), rand(5, 9), CONFETTI_COLORS[i % CONFETTI_COLORS.length]);
    }
}
function burstSparks(x, y) {
    for (var i = 0; i < 7; i++) {
        var a = rand(0, TAU);
        var sp = rand(60, 260);
        spawnPart(4, x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.25, 0.5), rand(2, 4.5), i % 2 === 0 ? '#FFFFFF' : '#9BEBFF');
    }
}

/* ================= World state ================= */
var time = 0;
var pos = 0;            /* camera distance down the slope, meters */
var startPos = 0;       /* pos at run start, meters = pos - startPos */
var speed = START_SPEED;
var topSpeed = START_SPEED;
var worldSpeed = 0;     /* how fast the world is scrolling right now (drifts after death) */
var playerX = 0;        /* ball lateral offset from road center, meters */
var vx = 0;             /* ball lateral velocity */
var camX = 0;           /* camera lateral position, follows the ball */
var shownMeters = 0;
var nextMilestone = 100;
var runTime = 0;
var prevBest = 0;
var newBest = false;
var finalMeters = 0;
var earnedTiers = [];
var deathT = 0;
var deathCause = '';
var panelShown = false;
var ballGone = false;
var trauma = 0;
var shockOn = false;
var shockT = 0;
var steerHintOn = false;
var lastBallX = 0, lastBallY = 0, lastBallR = 24;

/* projection scratch, preallocated */
var projArr = [];
for (var pji = 0; pji <= DRAW_SEG; pji++) projArr.push({ x: 0, y: 0, pw: 0, el: 0, er: 0, alt: 0, dash: false });
var renderFrac = 0;

/* ================= Run control ================= */
function resetRun() {
    var i;
    for (i = 0; i < blocks.length; i++) { blocks[i].active = false; blocks[i].passed = false; }
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    pos = 0;
    startPos = 0;
    speed = START_SPEED;
    topSpeed = START_SPEED;
    worldSpeed = 0;
    playerX = 0;
    vx = 0;
    camX = 0;
    shownMeters = 0;
    nextMilestone = 100;
    runTime = 0;
    newBest = false;
    finalMeters = 0;
    earnedTiers = [];
    deathT = 0;
    deathCause = '';
    panelShown = false;
    ballGone = false;
    trauma = 0;
    shockOn = false;
    shockT = 0;
    genNext = 0;
    gen.curve = 0;
    gen.curveTarget = 0;
    gen.curveHold = 0;
    gen.gapRemain = 0;
    gen.gapTotal = 0;
    gen.sinceGap = 999;
    gen.nextRowZ = 1e9;
    gen.lastRowZ = 0;
    gen.prevGapC = 0;
    scoreNumEl.textContent = '0';
    overPanel.classList.remove('show');
    ensureTrack();
}

function showMenuUI() {
    currentState = State.MENU;
    titleEl.style.display = 'block';
    tapHintEl.style.display = 'block';
    steerHintEl.style.display = 'none';
    scoreEl.style.display = 'none';
    pauseBtn.style.display = 'none';
    if (data.highScore > 0) {
        menuBestEl.textContent = 'BEST: ' + data.highScore + 'm';
        menuBestEl.style.display = 'inline-block';
    }
}

function startRun() {
    currentState = State.PLAYING;
    prevBest = data.highScore;
    startPos = pos;
    speed = START_SPEED;
    topSpeed = speed;
    runTime = 0;
    shownMeters = 0;
    nextMilestone = 100;
    playerX = 0;
    vx = 0;
    gen.nextRowZ = pos + 65;
    gen.lastRowZ = pos;
    titleEl.style.display = 'none';
    tapHintEl.style.display = 'none';
    scoreEl.style.display = 'block';
    scoreNumEl.textContent = '0';
    pauseBtn.style.display = 'flex';
    steerHintEl.style.display = 'block';
    steerHintOn = true;
    sfxStart();
}

function hideSteerHint() {
    steerHintOn = false;
    steerHintEl.style.display = 'none';
}

function popScore() {
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
}

function die(cause) {
    if (currentState !== State.PLAYING) return;
    currentState = State.DYING;
    deathCause = cause;
    deathT = 0;
    trauma = 0.8;
    ballGone = true;
    shockOn = true;
    shockT = 0;
    spawnShards(lastBallX, lastBallY, lastBallR);
    sfxShatter();
    pauseBtn.style.display = 'none';
    if (steerHintOn) hideSteerHint();

    /* record the run immediately */
    finalMeters = Math.floor(pos - startPos);
    newBest = finalMeters > prevBest;
    data.totalPlays++;
    if (finalMeters > data.highScore) data.highScore = finalMeters;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('speed-slope', finalMeters, { bronze: 200, silver: 600, gold: 1500 });
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };
function showPanel() {
    if (panelShown) return;
    panelShown = true;
    currentState = State.GAME_OVER;
    scoreEl.style.display = 'none';
    panelScoreNumEl.textContent = finalMeters;
    panelBestEl.textContent = data.highScore;
    newBestEl.style.display = newBest ? 'block' : 'none';
    panelTitleEl.textContent = newBest ? 'UNSTOPPABLE!' : (deathCause === 'edge' ? 'OFF THE EDGE!' : 'WIPEOUT!');
    panelStatsEl.textContent = '⚡ Top speed ' + Math.round(topSpeed);
    panelStatsEl.style.display = 'block';
    var diff = prevBest - finalMeters;
    if (!newBest && prevBest >= 100 && finalMeters < prevBest && diff <= prevBest * 0.2) {
        nearMissEl.textContent = 'SO CLOSE! ' + diff + 'm away from your best';
        nearMissEl.style.display = 'block';
    } else {
        nearMissEl.style.display = 'none';
    }
    if (earnedTiers.length > 0) {
        var labels = [];
        for (var i = 0; i < earnedTiers.length; i++) labels.push(TIER_LABELS[earnedTiers[i]]);
        stickerBanner.textContent = 'STICKER EARNED! ' + labels.join(' + ');
        stickerBanner.style.display = 'block';
    } else {
        stickerBanner.style.display = 'none';
    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti();
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

function restart() {
    resetRun();
    startRun();
}

/* ================= Update ================= */
function nearMissJuice() {
    trauma = Math.max(trauma, 0.18);
    burstSparks(lastBallX, lastBallY);
    sfxWhoosh();
}

function updateMenu(dt) {
    worldSpeed = MENU_DRIFT;
    pos += MENU_DRIFT * dt;
    ensureTrack();
    playerX += (0 - playerX) * Math.min(1, 2 * dt);
    camX += (playerX * 0.92 - camX) * Math.min(1, 10 * dt);
    updateParticles(dt);
}

function updateGame(dt) {
    runTime += dt;
    speed = Math.min(MAX_SPEED, speed + SPEED_RAMP * dt);
    if (speed > topSpeed) topSpeed = speed;
    worldSpeed = speed;
    pos += speed * dt;
    ensureTrack();
    manageRows();

    /* steering */
    var steer = (keys.right ? 1 : 0) - (keys.left ? 1 : 0) + touchSteer;
    steer = clamp(steer, -1, 1);
    if (steer !== 0) {
        vx += steer * STEER_ACC * dt;
        if (steerHintOn && runTime > 0.4) hideSteerHint();
    } else {
        vx -= vx * Math.min(1, STEER_FRICTION * dt);
    }
    vx = clamp(vx, -MAX_VX, MAX_VX);
    if (steerHintOn && runTime > 3) hideSteerHint();

    var ballZ = pos + BALL_Z;
    var sb = segs[Math.floor(ballZ / SEG_LEN) % NSEG];
    /* curves push the ball outward, the player fights back */
    playerX += (vx - speed * sb.curve * CENTRI) * dt;
    camX += (playerX * 0.92 - camX) * Math.min(1, 10 * dt);

    /* death: rolling off the road edge (or into an edge gap) */
    if (playerX < sb.el - BALL_R * 0.35 || playerX > sb.er + BALL_R * 0.35) {
        die('edge');
        return;
    }

    /* death: hitting a block. Also near miss detection when squeaking past. */
    for (var i = 0; i < blocks.length; i++) {
        var b = blocks[i];
        if (!b.active) continue;
        if (b.z < pos - 4) { b.active = false; continue; }
        var dz = b.z - ballZ;
        if (Math.abs(dz) < 1.4 && playerX > b.x0 - BALL_R * 0.55 && playerX < b.x1 + BALL_R * 0.55) {
            die('block');
            return;
        }
        if (!b.passed && dz < -1.4) {
            b.passed = true;
            var clear = playerX < b.x0 ? b.x0 - playerX : (playerX > b.x1 ? playerX - b.x1 : 0);
            if (clear > 0 && clear < 1.6) nearMissJuice();
        }
    }

    /* score = meters traveled */
    var m = Math.floor(pos - startPos);
    if (m !== shownMeters) {
        shownMeters = m;
        scoreNumEl.textContent = m;
    }
    if (m >= nextMilestone) {
        nextMilestone += 100;
        popScore();
        sfxTick();
    }

    updateParticles(dt);
}

function updateDying(dt) {
    /* slow motion for the first 300ms, then the world keeps drifting */
    deathT += dt;
    var ts = deathT < 0.3 ? 0.18 : 1;
    speed = Math.max(7, speed - 26 * ts * dt);
    worldSpeed = speed * ts;
    pos += worldSpeed * dt;
    ensureTrack();
    camX += (0 - camX) * Math.min(1, 0.8 * dt);
    updateParticles(dt * (deathT < 0.3 ? 0.35 : 1));
    if (deathT > 1.2) showPanel();
}

function updateGameOver(dt) {
    /* the world keeps drifting behind the panel */
    worldSpeed = speed;
    pos += speed * dt;
    ensureTrack();
    camX += (0 - camX) * Math.min(1, 0.8 * dt);
    updateParticles(dt);
}

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 2) {
            p.vy += 1500 * dt;
            p.vx *= (1 - Math.min(1, 1.2 * dt));
        } else if (p.type === 3) {
            p.vy = Math.min(240, p.vy + 220 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        } else if (p.type === 4) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    if (shockOn) {
        shockT += dt * (currentState === State.DYING && deathT < 0.3 ? 0.5 : 1);
        if (shockT > 0.6) shockOn = false;
    }
    updateStars(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateGameOver(dt); break;
    }
}

/* ================= Render ================= */
function strip(p1, a1, b1, p2, a2, b2, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(p1.x + a1 * p1.pw, p1.y);
    ctx.lineTo(p1.x + b1 * p1.pw, p1.y);
    ctx.lineTo(p2.x + b2 * p2.pw, p2.y);
    ctx.lineTo(p2.x + a2 * p2.pw, p2.y);
    ctx.closePath();
    ctx.fill();
}

function drawRoad() {
    var base = Math.floor(pos / SEG_LEN);
    renderFrac = (pos - base * SEG_LEN) / SEG_LEN;
    var frac = renderFrac;
    var xAcc = 0;
    var dxAcc = -segs[base % NSEG].curve * frac;
    var i, s, z, sc, p;
    for (i = 0; i <= DRAW_SEG; i++) {
        s = segs[(base + i) % NSEG];
        z = Math.max((i - frac) * SEG_LEN, 1.0);
        sc = 1 / z;
        p = projArr[i];
        p.x = W2 + (xAcc - camX) * PROJX * sc;
        p.y = HOR + CAM_H * PROJY * sc;
        p.pw = PROJX * sc;
        p.el = s.el;
        p.er = s.er;
        p.alt = (base + i) & 1;
        p.dash = ((base + i) % 4) < 2;
        xAcc += dxAcc;
        dxAcc += s.curve;
    }
    /* draw strips far to near */
    for (i = DRAW_SEG - 1; i >= 0; i--) {
        var p1 = projArr[i], p2 = projArr[i + 1];
        if (p2.y >= p1.y) continue;
        if (p2.y > H + 4) continue;
        var fade = i > DRAW_SEG - 10 ? (DRAW_SEG - i) / 10 : 1;
        ctx.globalAlpha = fade;
        /* edge glow spilling into the void (skip when subpixel far away) */
        if (i < 44) {
            strip(p1, p1.el - 0.9, p1.el + 0.9, p2, p2.el - 0.9, p2.el + 0.9, 'rgba(61,246,255,0.14)');
            strip(p1, p1.er - 0.9, p1.er + 0.9, p2, p2.er - 0.9, p2.er + 0.9, 'rgba(61,246,255,0.14)');
        }
        /* road surface */
        strip(p1, p1.el, p1.er, p2, p2.el, p2.er, p1.alt ? '#17173C' : '#111132');
        /* bright cyan edge lines */
        strip(p1, p1.el, p1.el + 0.42, p2, p2.el, p2.el + 0.42, '#3DF6FF');
        strip(p1, p1.er - 0.42, p1.er, p2, p2.er - 0.42, p2.er, '#3DF6FF');
        /* center lane dashes */
        if (p1.dash && p1.el < -0.5 && p1.er > 0.5) {
            strip(p1, -0.16, 0.16, p2, -0.16, 0.16, 'rgba(150,245,255,0.28)');
        }
    }
    ctx.globalAlpha = 1;
}

function drawBlocks() {
    var frac = renderFrac;
    var maxZ = (DRAW_SEG - 2) * SEG_LEN;
    var vn = 0;
    var i, b;
    for (i = 0; i < blocks.length; i++) {
        b = blocks[i];
        if (!b.active) continue;
        var zr = b.z - pos;
        if (zr < 2 || zr > maxZ) continue;
        blockScratch[vn++] = b;
    }
    /* insertion sort far to near */
    for (i = 1; i < vn; i++) {
        var bb = blockScratch[i];
        var j = i - 1;
        while (j >= 0 && blockScratch[j].z < bb.z) {
            blockScratch[j + 1] = blockScratch[j];
            j--;
        }
        blockScratch[j + 1] = bb;
    }
    for (i = 0; i < vn; i++) {
        b = blockScratch[i];
        var zRel = b.z - pos;
        var fi = zRel / SEG_LEN + frac;
        var i0 = clamp(Math.floor(fi), 0, DRAW_SEG - 1);
        var t = clamp(fi - i0, 0, 1);
        var p1 = projArr[i0], p2 = projArr[i0 + 1];
        var x = lerp(p1.x, p2.x, t);
        var y = lerp(p1.y, p2.y, t);
        var pw = lerp(p1.pw, p2.pw, t);
        var zb = Math.max(zRel, 1.5);
        var cw = (x - W2) / pw; /* road center offset in world meters at this depth */
        var scb = 1 / (zb + BLOCK_D);
        var pwb = PROJX * scb;
        var x0f = x + b.x0 * pw, x1f = x + b.x1 * pw;
        if (x1f < -60 || x0f > W + 60) continue;
        var hpx = BLOCK_H * PROJY / zb;
        var yTopF = y - hpx;
        var yB = HOR + CAM_H * PROJY * scb;
        var yTopB = yB - BLOCK_H * PROJY * scb;
        var x0b = W2 + (cw + b.x0) * pwb, x1b = W2 + (cw + b.x1) * pwb;
        var fade = i0 > DRAW_SEG - 10 ? (DRAW_SEG - i0) / 10 : 1;
        /* magenta glow */
        ctx.globalAlpha = 0.22 * fade;
        ctx.fillStyle = '#FF35D3';
        ctx.fillRect((x0f - 6) | 0, (yTopF - 6) | 0, (x1f - x0f + 12) | 0, (hpx + 12) | 0);
        ctx.globalAlpha = fade;
        /* top face */
        ctx.fillStyle = '#C21FAB';
        ctx.beginPath();
        ctx.moveTo(x0f, yTopF);
        ctx.lineTo(x1f, yTopF);
        ctx.lineTo(x1b, yTopB);
        ctx.lineTo(x0b, yTopB);
        ctx.closePath();
        ctx.fill();
        /* front face */
        ctx.fillStyle = '#FF35D3';
        ctx.fillRect(x0f | 0, yTopF | 0, (x1f - x0f) | 0 || 1, hpx | 0 || 1);
        /* neon rim */
        ctx.lineWidth = clamp(pw * 0.05, 1, 3);
        ctx.strokeStyle = '#FFB1F0';
        ctx.strokeRect(x0f | 0, yTopF | 0, (x1f - x0f) | 0 || 1, hpx | 0 || 1);
    }
    ctx.globalAlpha = 1;
}

function drawBall() {
    var frac = renderFrac;
    var p1 = projArr[BALL_Z / SEG_LEN], p2 = projArr[BALL_Z / SEG_LEN + 1];
    var pw = lerp(p1.pw, p2.pw, frac);
    var roadY = lerp(p1.y, p2.y, frac);
    var x = lerp(p1.x, p2.x, frac) + playerX * pw;
    var r = BALL_R * pw;
    var bcy = roadY - r;
    lastBallX = x;
    lastBallY = bcy;
    lastBallR = r;

    /* colored trail streaming behind the ball */
    if (currentState === State.PLAYING && worldSpeed > 10) {
        var hue = (pos * 3) % 360;
        var col = 'hsl(' + (hue | 0) + ', 100%, 66%)';
        spawnPart(1, x + rand(-r * 0.3, r * 0.3), bcy + rand(0, r * 0.4), -vx * 4, 260 + worldSpeed * 6, 0.3, r * 0.55, col);
        spawnPart(1, x + rand(-r * 0.3, r * 0.3), bcy + rand(0, r * 0.4), -vx * 4, 260 + worldSpeed * 6, 0.3, r * 0.4, col);
    }

    /* shadow on the road */
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(x, roadY - 1, r * 0.95, r * 0.26, 0, 0, TAU);
    ctx.fill();

    /* glossy sphere sprite (includes glow margin) */
    var dw = r * (128 / BALL_SPR_R);
    ctx.drawImage(ballSpr, (x - dw / 2) | 0, (bcy - dw / 2) | 0, dw | 0 || 1, dw | 0 || 1);

    /* rolling stripes, clipped to the sphere */
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, bcy, r * 0.92, 0, TAU);
    ctx.clip();
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#1B2150';
    var spacing = r * 0.85;
    var off = ((pos % 4) / 4) * spacing;
    for (var yy = bcy - r + off; yy < bcy + r; yy += spacing) {
        var dy = (yy - bcy) / r;
        var ww = Math.sqrt(Math.max(0, 1 - dy * dy)) * r;
        if (ww < 1) continue;
        ctx.beginPath();
        ctx.ellipse(x, yy, ww, Math.max(1.5, r * 0.09), 0, 0, TAU);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
}

/* trail dots render under the ball so the sphere stays glossy */
function drawTrail() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active || p.type !== 1) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a * 0.85;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.size * a), 0, TAU);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active || p.type === 1) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 2) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            var s = p.size;
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s * 0.8, s * 0.6);
            ctx.lineTo(-s * 0.7, s * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        } else if (p.type === 3) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, TAU);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawShock() {
    if (!shockOn) return;
    var t = shockT / 0.6;
    var a = 1 - t;
    var rr = 20 + t * 900;
    ctx.globalAlpha = a * 0.85;
    ctx.lineWidth = 8 * a + 1;
    ctx.strokeStyle = '#B7FBFF';
    ctx.beginPath();
    ctx.arc(lastBallX, lastBallY, rr, 0, TAU);
    ctx.stroke();
    ctx.globalAlpha = a * 0.5;
    ctx.strokeStyle = '#FF35D3';
    ctx.beginPath();
    ctx.arc(lastBallX, lastBallY, rr * 0.7, 0, TAU);
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 10;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(dpr, 0, 0, dpr, ox * dpr, oy * dpr);
    ctx.drawImage(skySpr, 0, 0, W, H);
    drawStarsBg();
    drawRoad();
    drawBlocks();
    drawTrail();
    if (!ballGone) drawBall();
    drawParticles();
    drawShock();
}

/* ================= Input ================= */
var keys = { left: false, right: false };
var touchSteer = 0;
var activePointer = null;

function setSteerFromEvent(e) {
    touchSteer = e.clientX < W / 2 ? -1 : 1;
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
        setSteerFromEvent(e);
        activePointer = e.pointerId;
    } else if (currentState === State.PLAYING) {
        setSteerFromEvent(e);
        activePointer = e.pointerId;
    } else if (currentState === State.PAUSED) {
        resumeGame();
    }
});
canvas.addEventListener('pointermove', function (e) {
    if (e.pointerId === activePointer && currentState === State.PLAYING) setSteerFromEvent(e);
});
function releasePointer(e) {
    if (e.pointerId === activePointer) {
        activePointer = null;
        touchSteer = 0;
    }
}
window.addEventListener('pointerup', releasePointer);
window.addEventListener('pointercancel', releasePointer);
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        e.preventDefault();
        keys.left = true;
        if (currentState === State.MENU) { ensureAudio(); startRun(); }
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        e.preventDefault();
        keys.right = true;
        if (currentState === State.MENU) { ensureAudio(); startRun(); }
    } else if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        ensureAudio();
        if (currentState === State.MENU) startRun();
        else if (currentState === State.PAUSED) resumeGame();
        else if (currentState === State.GAME_OVER && panelShown) restart();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});
window.addEventListener('keyup', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    else if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart(); /* instant: shattered to rolling in well under a second */
});

/* ================= Test hook (headless harness drives update directly) ================= */
window.__SpeedSlope = {
    update: update,
    startRun: startRun,
    restart: restart,
    keys: keys,
    setTouchSteer: function (v) { touchSteer = v; },
    getState: function () { return currentState; },
    getMeters: function () { return pos - startPos; },
    getPlayerX: function () { return playerX; },
    getVX: function () { return vx; },
    getSpeed: function () { return speed; },
    getBallZ: function () { return pos + BALL_Z; },
    getBlocks: function () { return blocks; },
    edgesAt: function (ahead) {
        var z = pos + BALL_Z + (ahead || 0);
        var s = segs[Math.floor(z / SEG_LEN) % NSEG];
        return { el: s.el, er: s.er };
    },
    getDeathCause: function () { return deathCause; },
    isPanelShown: function () { return panelShown; },
    debugBlock: function (ahead, x0, x1) { spawnBlock(pos + BALL_Z + ahead, x0, x1); }
};

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.max(0, Math.min(0.05, (now - last) / 1000));
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
resetRun();
showMenuUI();
requestAnimationFrame(loop);



/* ================= WoopKid High Score Leaderboard (verbatim contract module) =================
   Per-device top-10 board shared with the Hall of Fame page.
   Hooks WoopProfile.reportRun so every finished run is recorded under the
   current player name. Storage: 'woopkid_leaderboard' = { slug: [{n,s,d},...] },
   'woopkid_player_name' = current player. No network, everything stays local. */
(function () {
'use strict';
var LB = { slug: 'speed-slope', title: 'SPEED SLOPE', unit: 'meters' };
var LB_KEY = 'woopkid_leaderboard';
var NAME_KEY = 'woopkid_player_name';
var LB_MAX = 10;

function lbLoadAll() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || {}; } catch (e) { return {}; } }
function lbSaveAll(all) { try { localStorage.setItem(LB_KEY, JSON.stringify(all)); } catch (e) {} }
function lbBoard() { return lbLoadAll()[LB.slug] || []; }
function lbName() {
    try { var n = localStorage.getItem(NAME_KEY); return (n && n.trim()) ? n.trim().slice(0, 10).toUpperCase() : 'WOOP'; }
    catch (e) { return 'WOOP'; }
}
function lbSetName(n) { try { localStorage.setItem(NAME_KEY, n); } catch (e) {} }
function lbToday() { var d = new Date(); return d.toISOString().slice(0, 10); }
function lbFmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function lbRankOf(list, name) {
    for (var i = 0; i < list.length; i++) if (list[i].n === name) return i + 1;
    return 0;
}

/* Record a finished run. One row per player name; only improvements count. */
function lbRecord(score, quiet) {
    score = Math.floor(Number(score) || 0);
    if (score <= 0) return;
    var all = lbLoadAll();
    var list = all[LB.slug] || (all[LB.slug] = []);
    var name = lbName();
    var prevRank = lbRankOf(list, name);
    var mine = prevRank ? list[prevRank - 1] : null;
    if (mine) {
        if (score <= mine.s) return;
        mine.s = score; mine.d = lbToday();
    } else {
        list.push({ n: name, s: score, d: lbToday() });
    }
    list.sort(function (a, b) { return b.s - a.s; });
    if (list.length > LB_MAX) list.length = LB_MAX;
    lbSaveAll(all);
    var newRank = lbRankOf(list, name);
    if (!quiet && newRank && (!prevRank || newRank < prevRank)) lbToast(newRank);
    if (lbPanelEl && lbPanelEl.classList.contains('wklb-show')) lbRenderRows();
}

/* Hook the shared profile module: every reported run also hits the board. */
if (typeof WoopProfile !== 'undefined' && WoopProfile && typeof WoopProfile.reportRun === 'function') {
    var lbOrigReport = WoopProfile.reportRun;
    WoopProfile.reportRun = function (slug, score, thresholds) {
        try { lbRecord(score); } catch (e) {}
        return lbOrigReport.call(WoopProfile, slug, score, thresholds);
    };
    /* Seed an empty board from this device's existing personal best. */
    try {
        if (lbBoard().length === 0) {
            var p = WoopProfile.load();
            var g = p && p.games && p.games[LB.slug];
            if (g && g.best > 0) lbRecord(g.best, true);
        }
    } catch (e) {}
}

'text-transform:uppercase;text-align:center;background:#fff;color:#241d4d;outline:none;',
"font-family:'Nunito',-apple-system,sans-serif}",
'#wklbToast{position:fixed;top:16px;left:50%;transform:translate(-50%,-72px);z-index:9100;',
'background:#FFD23F;color:#241d4d;font-weight:800;font-size:16px;padding:12px 20px;border-radius:999px;',
'box-shadow:0 6px 20px rgba(0,0,0,.35);white-space:nowrap;pointer-events:none;',
"font-family:'Nunito',-apple-system,sans-serif;transition:transform .3s cubic-bezier(.2,1.6,.4,1)}",
'#wklbToast.wklb-show{transform:translate(-50%,0)}'
].join('');

var lbPanelEl = null, lbScrimEl = null, lbBtnEl = null, lbToastEl = null, lbToastT = null, lbEditing = false;

function lbStop(e) { e.stopPropagation(); }
function lbGuard(el) {
    ['pointerdown', 'touchstart', 'touchend', 'mousedown', 'mouseup', 'click', 'keydown'].forEach(function (t) {
        el.addEventListener(t, lbStop);
    });
}

function lbBuildUI() {
    var st = document.createElement('style');
    st.textContent = lbCSS;
    document.head.appendChild(st);

    lbBtnEl = document.createElement('button');
    lbBtnEl.id = 'wklbBtn';
    lbBtnEl.type = 'button';
    lbBtnEl.setAttribute('aria-label', 'High scores');
    lbBtnEl.textContent = '🏆';
    lbGuard(lbBtnEl);
    lbBtnEl.addEventListener('click', lbToggle);
    document.body.appendChild(lbBtnEl);

    lbScrimEl = document.createElement('div');
    lbScrimEl.id = 'wklbScrim';
    lbGuard(lbScrimEl);
    lbScrimEl.addEventListener('click', lbClose);
    document.body.appendChild(lbScrimEl);

    lbPanelEl = document.createElement('div');
    lbPanelEl.id = 'wklbPanel';
    lbPanelEl.setAttribute('role', 'dialog');
    lbPanelEl.setAttribute('aria-label', 'High score leaderboard');
    lbGuard(lbPanelEl);
    document.body.appendChild(lbPanelEl);

    lbToastEl = document.createElement('div');
    lbToastEl.id = 'wklbToast';
    document.body.appendChild(lbToastEl);

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lbPanelEl.classList.contains('wklb-show')) lbClose();
    });
}

function lbRenderRows() {
    var list = lbBoard();
    var me = lbName();
    var medals = ['🥇', '🥈', '🥉'];
    var html = '<button id="wklbClose" type="button" aria-label="Close">✕</button>' +
        '<h2>🏆 HIGH SCORES</h2>' +
        '<div class="wklb-sub">' + LB.title + ' · best ' + LB.unit + '</div>';
    if (list.length === 0) {
        html += '<div class="wklb-zero">No scores yet.<br>Finish a run and be #1!</div>';
    } else {
        for (var i = 0; i < LB_MAX; i++) {
            var e = list[i];
            if (e) {
                html += '<div class="wklb-row' + (e.n === me ? ' wklb-me' : '') + '">' +
                    '<span class="wklb-rank">' + (i < 3 ? medals[i] : (i + 1)) + '</span>' +
                    '<span class="wklb-name"></span>' +
                    '<span class="wklb-score">' + lbFmt(e.s) + '</span></div>';
            } else {
                html += '<div class="wklb-row wklb-empty"><span class="wklb-rank">' + (i + 1) +
                    '</span><span class="wklb-name">- - -</span><span class="wklb-score">·</span></div>';
            }
        }
    }
    html += '<div id="wklbNameRow"><span class="wklb-who">Who’s playing?</span>';
    if (lbEditing) {
        html += '<input id="wklbNameInput" maxlength="10" autocomplete="off" spellcheck="false">' +
            '<button id="wklbSaveBtn" type="button">SAVE</button>';
    } else {
        html += '<span id="wklbCurName"></span><button id="wklbEditBtn" type="button">CHANGE</button>';
    }
    html += '</div>';
    lbPanelEl.innerHTML = html;

    /* names go in via textContent so typed characters can never become markup */
    var nameEls = lbPanelEl.querySelectorAll('.wklb-row:not(.wklb-empty) .wklb-name');
    for (var j = 0; j < nameEls.length; j++) nameEls[j].textContent = list[j].n;

    lbPanelEl.querySelector('#wklbClose').addEventListener('click', lbClose);
    if (lbEditing) {
        var inp = lbPanelEl.querySelector('#wklbNameInput');
        inp.value = me;
        var save = function () {
            var v = inp.value.replace(/[^\w !\-À-ɏ֐-׿]/g, '').trim().slice(0, 10).toUpperCase();
            if (v) lbSetName(v);
            lbEditing = false;
            lbRenderRows();
        };
        lbPanelEl.querySelector('#wklbSaveBtn').addEventListener('click', save);
        inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') save(); });
        setTimeout(function () { inp.focus(); inp.select(); }, 50);
    } else {
        lbPanelEl.querySelector('#wklbCurName').textContent = me;
        lbPanelEl.querySelector('#wklbEditBtn').addEventListener('click', function () {
            lbEditing = true;
            lbRenderRows();
            });
    }
}

function lbOpen() {
    lbEditing = false;
    lbRenderRows();
    lbScrimEl.classList.add('wklb-show');
    lbPanelEl.classList.add('wklb-show');
    requestAnimationFrame(function () { lbPanelEl.classList.add('wklb-in'); });
}
function lbClose() {
    lbScrimEl.classList.remove('wklb-show');
    lbPanelEl.classList.remove('wklb-show', 'wklb-in');
}
function lbToggle() {
    if (lbPanelEl.classList.contains('wklb-show')) lbClose(); else lbOpen();
}
function lbToast(rank) {
    if (!lbToastEl) return;
    var tag = rank === 1 ? '👑 #1 HIGH SCORE!' : '🏆 #' + rank + ' ON THE BOARD!';
    lbToastEl.textContent = lbName() + ' — ' + tag;
    lbToastEl.classList.add('wklb-show');
    clearTimeout(lbToastT);
    lbToastT = setTimeout(function () { lbToastEl.classList.remove('wklb-show'); }, 2600);
}

if (document.body) lbBuildUI();
else document.addEventListener('DOMContentLoaded', lbBuildUI);

/* tiny debug/automation handle (used by the QA harness) */
try {
    window.WKLB = { slug: LB.slug, record: lbRecord, open: lbOpen, close: lbClose, board: lbBoard, name: lbName, hooked: typeof lbOrigReport === 'function' };
} catch (e) {}
})();

})();
</script>
</body>
</html>

<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var scoreNumEl = document.getElementById('scoreNum');
var hudPillsEl = document.getElementById('hudPills');
var multPillEl = document.getElementById('multPill');
var gemPillEl = document.getElementById('gemPill');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var steerHintEl = document.getElementById('steerHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelTitleEl = document.getElementById('panelTitle');
var panelScoreNumEl = document.getElementById('panelScoreNum');
var panelBestEl = document.getElementById('panelBest');
var panelStatsEl = document.getElementById('panelStats');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game, same key + shape as always) ================= */
var STORAGE_KEY = 'woopkid_speed-slope';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
var TAU = Math.PI * 2;
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOutBack(t) { var c = 1.70158; var u = t - 1; return 1 + (c + 1) * u * u * u + c * u * u; }

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); }
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.4);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

function tone(type, f0, f1, dur, vol, slideT) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(f0 * p, t);
    if (f1) o.frequency.exponentialRampToValueAtTime(f1 * p, t + (slideT || dur));
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + dur + 0.02);
}

function sfxStart() { tone('triangle', 300, 720, 0.24, 0.16, 0.18); }
function sfxLaunch() {
    tone('triangle', 240, 980, 0.3, 0.15, 0.26);
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.Q.value = 1.4;
    bp.frequency.setValueAtTime(500, t);
    bp.frequency.exponentialRampToValueAtTime(2400, t + 0.24);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.1, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t); src.stop(t + 0.3);
}
function sfxLand(perfect) {
    tone('sine', 150, 55, 0.18, 0.2, 0.14);
    if (perfect) tone('sine', 1047, 1568, 0.2, 0.14, 0.08);
}
function sfxGem(combo) {
    var st = Math.min(combo || 0, 14);
    var f = 660 * Math.pow(2, st / 12);
    tone('sine', f, f * 1.5, 0.16, 0.14, 0.05);
}
function sfxCombo() { tone('triangle', 523, 1047, 0.24, 0.16, 0.16); }
function sfxBiome() {
    tone('sine', 784, 0, 0.22, 0.12);
    tone('sine', 1175, 0, 0.34, 0.1);
}
function sfxTick() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(988 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.07);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.24);
}
function sfxWhoosh() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(1500 * p, t);
    bp.frequency.exponentialRampToValueAtTime(380 * p, t + 0.16);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.22);
}
function sfxShatter() {
    if (!canPlay()) return;
    activeVoices += 2;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';

/* two wrapping mountain silhouette layers, biome-neutral so tinted sky shows through */
function ridge(c, w, h, baseY, amp, step, seed, fill, glow) {
    c.fillStyle = fill;
    c.beginPath();
    c.moveTo(0, h);
    var pts = [];
    var y0 = 0;
    for (var x = 0; x <= w + step; x += step) {
        var t = x * 0.011 + seed;
        var y = baseY - amp * (0.55 + 0.45 * Math.sin(t * 1.7)) * (0.6 + 0.4 * Math.sin(t * 0.53 + seed));
        if (x === 0) y0 = y;
        /* force ends to match so the layer wraps seamlessly */
        if (x >= w) y = y0;
        pts.push(x, y);
        c.lineTo(x, y);
    }
    c.lineTo(w + step, h);
    c.closePath();
    c.fill();
    c.strokeStyle = glow;
    c.lineWidth = 1.5;
    c.beginPath();
    for (var i = 0; i < pts.length; i += 2) {
        if (i === 0) c.moveTo(pts[i], pts[i + 1]);
        else c.lineTo(pts[i], pts[i + 1]);
    }
    c.stroke();
}

/* ================= Track (ring buffer of road segments) ================= */
var segs = [];
for (var sgi = 0; sgi < NSEG; sgi++) segs.push({ n: -1, curve: 0, el: -ROAD_HALF, er: ROAD_HALF });
var genNext = 0;
var gen = {
    curve: 0, curveTarget: 0, curveHold: 0,
    gapRemain: 0, gapTotal: 0, gapSide: 1, gapW: 0, sinceGap: 999,
    nextRowZ: 1e9, lastRowZ: 0, prevGapC: 0, patCount: 0
};

function genSegment(n) {
    var s = segs[n % NSEG];
    s.n = n;
    var rd = Math.max(0, n * SEG_LEN - startPos); /* distance into current run */
    var cm = 0.022 + 0.02 * Math.min(1, rd / 2500);
    if (gen.curveHold <= 0) {
        gen.curveTarget = rand(-cm, cm);
        gen.curveHold = 26 + ((Math.random() * 42) | 0);
    }
    gen.curveHold--;
    gen.curve += (gen.curveTarget - gen.curve) * 0.05;
    s.curve = (n < 16) ? 0 : gen.curve;

    var half = currentState === State.MENU ? ROAD_HALF : roadHalfAt(rd);
    var el = -half, er = half;
    if (gen.gapRemain > 0) {
        var done = gen.gapTotal - gen.gapRemain;
        var f = Math.min(1, Math.min(done + 1, gen.gapRemain) / 2.5);
        var shift = gen.gapW * f;
        if (gen.gapSide < 0) el = -half + shift; else er = half - shift;
        gen.gapRemain--;
        gen.sinceGap = 0;
    } else {
        gen.sinceGap++;
        var gapChance = 0.05 + 0.045 * Math.min(1, rd / 2400);
        var gapGate = Math.max(26, 52 - rd / 90);
        if (currentState === State.PLAYING && rd > 240 && gen.sinceGap > gapGate && Math.random() < gapChance) {
            gen.gapTotal = 10 + ((Math.random() * 8) | 0);
            gen.gapRemain = gen.gapTotal;
            gen.gapSide = Math.random() < 0.5 ? -1 : 1;
            gen.gapW = rand(2.6, 4.2 + Math.min(1.4, rd / 1800));
            var gapEnd = (n + gen.gapTotal + 8) * SEG_LEN;
            if (gen.nextRowZ < gapEnd) gen.nextRowZ = gapEnd;
        }
    }
    s.el = el;
    s.er = er;
}

function ensureTrack() {
    var need = Math.floor(pos / SEG_LEN) + DRAW_SEG + 6;
    while (genNext < need) genSegment(genNext++);
}

/* ================= Obstacles / ramps / gems (pooled) ================= */
var blocks = [];
for (var bi = 0; bi < 30; bi++) {
    blocks.push({ active: false, z: 0, x0: 0, x1: 0, passed: false, mv: false, cx: 0, hw: 0, amp: 0, spd: 0, ph: 0 });
}
var blockScratch = new Array(30);

function spawnBlock(z, x0, x1) {
    for (var i = 0; i < blocks.length; i++) {
        var b = blocks[i];
        if (!b.active) {
            b.active = true;
            b.z = z; b.x0 = x0; b.x1 = x1;
            b.passed = false; b.mv = false;
            return b;
        }
    }
    return null;
}
function spawnSlider(z, hw, amp, spd) {
    var b = spawnBlock(z, -hw, hw);
    if (!b) return;
    b.mv = true; b.cx = 0; b.hw = hw; b.amp = amp; b.spd = spd; b.ph = rand(0, TAU);
}

var ramps = [];
for (var ri = 0; ri < 6; ri++) ramps.push({ active: false, z: 0, x: 0, w: 3 });
function spawnRamp(z, x, w) {
    for (var i = 0; i < ramps.length; i++) {
        var r = ramps[i];
        if (!r.active) { r.active = true; r.z = z; r.x = x; r.w = w; return; }
    }
}

var gems = [];
for (var gi = 0; gi < 48; gi++) gems.push({ active: false, z: 0, x: 0, h: 0 });
function spawnGem(z, x, h) {
    for (var i = 0; i < gems.length; i++) {
        var g = gems[i];
        if (!g.active) { g.active = true; g.z = z; g.x = x; g.h = h || 0; return; }
    }
}
/* a line of gems from (z0,x0) to (z0+n*dz, x1) — teaches the racing line */
function spawnGemLine(z0, x0, x1, n, dz) {
    for (var i = 0; i < n; i++) spawnGem(z0 + i * dz, lerp(x0, x1, n === 1 ? 0 : i / (n - 1)), 0);
}
/* arc of gems over a ramp jump */
function spawnGemArc(z0, x, n, dz, hMax) {
    for (var i = 0; i < n; i++) {
        var t = i / (n - 1);
        spawnGem(z0 + i * dz, x, hMax * Math.sin(t * Math.PI));
    }
}

/* One row of blocks with a guaranteed reachable gap. Returns gap center or null. */
function spawnRowAt(z, forcedGapC) {
    var s = segs[Math.floor(z / SEG_LEN) % NSEG];
    var el = s.el, er = s.er;
    var rd = z - startPos;
    var GAP_W = gapWAt(rd);
    if (er - el < GAP_W + 1.2) return null;
    var tBetween = Math.max(0.6, (z - gen.lastRowZ) / Math.max(speed, 1));
    var reach = clamp(12 * tBetween * 0.5, 2.2, 6.5);
    var lo = el + GAP_W / 2 + 0.4;
    var hi = er - GAP_W / 2 - 0.4;
    if (hi <= lo) return null;
    var gapC;
    if (forcedGapC !== undefined) {
        gapC = clamp(forcedGapC, lo, hi);
    } else {
        var pc = clamp(gen.prevGapC, lo, hi);
        gapC = clamp(pc + rand(-reach, reach), lo, hi);
    }
    gen.prevGapC = gapC;
    gen.lastRowZ = z;
    var lSpan = (gapC - GAP_W / 2) - el;
    if (lSpan > 0.9) spawnBlock(z, el - 0.6, gapC - GAP_W / 2);
    var rSpan = er - (gapC + GAP_W / 2);
    if (rSpan > 0.9) spawnBlock(z, gapC + GAP_W / 2, er + 0.6);
    return gapC;
}

/* Pattern spawner: escalating variety with distance. */
function spawnPattern(z) {
    var rd = z - startPos;
    gen.patCount++;
    var roll = Math.random();
    /* ramps: every so often from 140m, gems arc over the jump */
    if (rd > 140 && gen.patCount % 5 === 2) {
        var s = segs[Math.floor(z / SEG_LEN) % NSEG];
        var rx = clamp(gen.prevGapC + rand(-3, 3), s.el + 2, s.er - 2);
        spawnRamp(z, rx, 3.2);
        spawnGemArc(z + 6, rx, 5, 7, 2.6);
        gen.prevGapC = rx;
        gen.lastRowZ = z + 20;
        return 30; /* extra spacing after a ramp */
    }
    /* slider: a moving wall from 650m */
    if (rd > 650 && roll < 0.16) {
        var s2 = segs[Math.floor(z / SEG_LEN) % NSEG];
        var half2 = Math.min(-s2.el, s2.er);
        var hw = 1.5;
        var amp = Math.max(0, half2 - hw - 0.4);
        spawnSlider(z, hw, amp, rand(1.0, 1.5 + Math.min(0.9, rd / 4000)));
        gen.lastRowZ = z;
        return 26;
    }
    /* double stagger from 380m: two rows, offset gaps, gems thread the path */
    if (rd > 380 && roll < 0.42) {
        var g1 = spawnRowAt(z);
        if (g1 !== null) {
            var dz2 = Math.max(16, speed * 0.75);
            var g2 = spawnRowAt(z + dz2, g1 + (Math.random() < 0.5 ? -3.2 : 3.2));
            if (g2 !== null && Math.random() < 0.75) spawnGemLine(z + 3, g1, g2, 4, (dz2 - 4) / 3);
        }
        return 18;
    }
    /* basic row, often with a gem line through the gap */
    var gc = spawnRowAt(z);
    if (gc !== null && Math.random() < 0.55) spawnGemLine(z - 14, clamp(gc + rand(-2, 2), -4, 4), gc, 4, 5);
    return 0;
}

/* Row spacing shrinks with distance; always >= reaction distance for current speed. */
function manageRows() {
    var ahead = Math.max(130, speed * 4);
    while (gen.nextRowZ < pos + ahead) {
        var z = gen.nextRowZ;
        var rd = z - startPos;
        var extra = 0;
        if (rd > 55) extra = spawnPattern(z);
        var tGap = 1.5 - 0.55 * Math.min(1, rd / 2600);
        gen.nextRowZ += Math.max(26, speed * tGap) + rand(0, 10) + extra;
    }
}

    for (var k = 0; k < parts.length; k++) {

function landJump(sb) {
    airborne = false;
    airH = 0;
    airVy = 0;
    if (airT > bestAir) bestAir = airT;
    /* landed off the road? that's a fall */
    if (playerX < sb.el - BALL_R * 0.35 || playerX > sb.er + BALL_R * 0.35) {
        die('edge');
        return;
    }
    var bonus = Math.max(2, Math.round(airT * speed * 0.3));
    var perfect = Math.abs(vx) < 5.5;
    if (perfect) {
        bonus += 5;
        perfectLands++;
        spawnLabel('PERFECT! +' + bonus, '#FFE14D', 26, lastBallX, lastBallY - lastBallR * 2.4);
        spawnRing(lastBallX, lastBallY, 80, '#FFE14D', 4, 0.45);
    } else {
        spawnLabel('AIR +' + bonus, '#7ED9FF', 22, lastBallX, lastBallY - lastBallR * 2.2);
    }
    bonusMeters += bonus;
    squash = -0.45; /* squash on landing */
    trauma = Math.max(trauma, 0.28);
    burstSparks(lastBallX, lastBallY + lastBallR * 0.5, 9, BIOMES[biomeIdx].py);
    sfxLand(perfect);

function updateMenu(dt) {
    worldSpeed = MENU_DRIFT;
    pos += MENU_DRIFT * dt;
    ensureTrack();
    /* lazy demo sway so the menu feels alive */
    playerX += (Math.sin(time * 0.55) * 2.6 - playerX) * Math.min(1, 1.6 * dt);
    camX += (playerX * 0.92 - camX) * Math.min(1, 10 * dt);
    updateParticles(dt);
}

function updateGame(dt) {
    runTime += dt;
    var rd = pos - startPos;
    /* speed: eases toward a distance-based target; boost (gems, near misses, ramps) rides on top and decays */
    boost *= (1 - Math.min(1, 0.5 * dt));
    var target = Math.min(MAX_SPEED, targetSpeedAt(rd) + boost);
    speed += (target - speed) * Math.min(1, 1.6 * dt);
    if (speed > topSpeed) topSpeed = speed;
    worldSpeed = speed;
    pos += speed * dt;
    ensureTrack();
    manageRows();

    /* biome shifts with distance */
    var bi = (Math.floor(rd / BIOME_LEN)) % BIOMES.length;
    if (bi !== biomeIdx) {
        prevBiomeIdx = biomeIdx;
        biomeIdx = bi;
        biomeFade = 0;
        var B = BIOMES[bi];
        spawnLabel(B.icon + ' ' + B.name, '#FFFFFF', 26, W2, H * 0.3);
        sfxBiome();
    }
    if (biomeFade < 1) biomeFade = Math.min(1, biomeFade + dt / 1.1);

    /* combo window */
    if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }

    /* steering (weighty: accelerate toward input, friction back to straight) */
    var steer = (keys.right ? 1 : 0) - (keys.left ? 1 : 0) + touchSteer;
    steer = clamp(steer, -1, 1);
    var airCtl = airborne ? 0.55 : 1;
    if (steer !== 0) {
        vx += steer * STEER_ACC * airCtl * dt;
        if (steerHintOn && runTime > 0.4) hideSteerHint();
    } else {
        vx -= vx * Math.min(1, STEER_FRICTION * dt);
    }
    vx = clamp(vx, -MAX_VX, MAX_VX);
    if (steerHintOn && runTime > 3) hideSteerHint();

    var ballZ = pos + BALL_Z;
    var sb = segs[Math.floor(ballZ / SEG_LEN) % NSEG];
    playerX += (vx - speed * sb.curve * CENTRI * (airborne ? 0.4 : 1)) * dt;
    camX += (playerX * 0.92 - camX) * Math.min(1, 10 * dt);

    /* squash & stretch spring back */
    squash += (0 - squash) * Math.min(1, 9 * dt);

    /* jump physics */
    if (airborne) {
        airT += dt;
        airH += airVy * dt;
        airVy -= AIR_G * dt;
        if (airH <= 0 && airVy < 0) {
            landJump(sb);
            if (currentState !== State.PLAYING) return;
        }
    } else {
        /* death: rolling off the road edge (or into an edge gap) */
        if (playerX < sb.el - BALL_R * 0.35 || playerX > sb.er + BALL_R * 0.35) {
            die('edge');
            return;
        }
        /* ramps launch the ball */
        for (var r = 0; r < ramps.length; r++) {
            var rp = ramps[r];
            if (!rp.active) continue;
            if (rp.z < pos - 4) { rp.active = false; continue; }
            if (Math.abs(rp.z - ballZ) < 1.6 && Math.abs(playerX - rp.x) < rp.w / 2 + BALL_R * 0.4) {
                launchRamp();
                break;
            }
        }
    }

    /* carve spray on hard turns */
    if (!airborne && Math.abs(vx) > 8 && speed > 20 && Math.random() < 0.6) {
        spawnPart(4, lastBallX - (vx > 0 ? lastBallR : -lastBallR) * 0.7, lastBallY + lastBallR * 0.6,
            -vx * 14 + rand(-40, 40), rand(-30, 90), rand(0.2, 0.4), rand(2, 4), BIOMES[biomeIdx].py);
    }

    /* blocks: sliders move, collisions kill (unless airborne), squeaking past = near miss */
    for (var i = 0; i < blocks.length; i++) {
        var b = blocks[i];
        if (!b.active) continue;
        if (b.z < pos - 4) { b.active = false; continue; }
        if (b.mv) {
            var osc = Math.sin(time * b.spd + b.ph) * b.amp;
            b.x0 = b.cx - b.hw + osc;
            b.x1 = b.cx + b.hw + osc;
        }
        var dz = b.z - ballZ;
        if (!airborne && Math.abs(dz) < 1.4 && playerX > b.x0 - BALL_R * 0.55 && playerX < b.x1 + BALL_R * 0.55) {
            die('block');
            return;
        }
        if (!b.passed && dz < -1.4) {
            b.passed = true;
            if (!airborne) {
                var clear = playerX < b.x0 ? b.x0 - playerX : (playerX > b.x1 ? playerX - b.x1 : 0);
                if (clear > 0 && clear < 1.6) nearMissJuice();
            }
        }
    }

    /* gems */
    for (var gI = 0; gI < gems.length; gI++) {
        var g = gems[gI];
        if (!g.active) continue;
        if (g.z < pos - 2) { g.active = false; continue; }
        if (Math.abs(g.z - ballZ) < 1.6 && Math.abs(g.x - playerX) < 1.25 && Math.abs(g.h - airH) < 1.4) {
            collectGem(g);
        }
    }

    /* score = meters + bonuses */
    var m = scoreNow();
    if (m !== shownMeters) {
        shownMeters = m;
        scoreNumEl.textContent = m;
    }
    if (m >= nextMilestone) {
        nextMilestone += 100;
        popScore();
        sfxTick();
    }
    updateHud();
    updateParticles(dt);
}

function updateDying(dt) {
    deathT += dt;
    var ts = deathT < 0.3 ? 0.18 : 1;
    speed = Math.max(7, speed - 26 * ts * dt);
    worldSpeed = speed * ts;
    pos += worldSpeed * dt;
    ensureTrack();
    camX += (0 - camX) * Math.min(1, 0.8 * dt);
    /* cartoon tumble */
    if (crash.on) {
        var cdt = dt * (deathT < 0.3 ? 0.35 : 1);
        crash.vy += 1300 * cdt;
        crash.x += crash.vx * cdt;
        crash.y += crash.vy * cdt;
        crash.rot += crash.vr * cdt;
        if (deathCause === 'edge') crash.s = Math.max(0.1, crash.s - 1.4 * cdt);
        /* one cartoon bounce off the bottom of the screen */
        if (crash.y > H + 80 || crash.s <= 0.12) crash.on = false;
    }
    updateParticles(dt * (deathT < 0.3 ? 0.35 : 1));
    if (deathT > 1.25) showPanel();
}

function updateGameOver(dt) {
    worldSpeed = speed;
    pos += speed * dt;
    ensureTrack();
    camX += (0 - camX) * Math.min(1, 0.8 * dt);
    updateParticles(dt);
}

function updateParticles(dt) {
    var i, p;
    for (i = 0; i < parts.length; i++) {
        p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 2) {
            p.vy += 1500 * dt;
            p.vx *= (1 - Math.min(1, 1.2 * dt));
        } else if (p.type === 3) {
            p.vy = Math.min(240, p.vy + 220 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        } else if (p.type === 4 || p.type === 5) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
    for (i = 0; i < rings.length; i++) {
        var rg = rings[i];
        if (!rg.active) continue;
        rg.life += dt;
        if (rg.life >= rg.ttl) rg.active = false;
    }
    for (i = 0; i < labels.length; i++) {
        var lb = labels[i];
        if (!lb.active) continue;
        lb.life += dt;
        if (lb.life >= lb.ttl) { lb.active = false; continue; }
        lb.y -= 55 * dt * (1 - lb.life / lb.ttl * 0.5);
    }
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    if (shockOn) {
        shockT += dt * (currentState === State.DYING && deathT < 0.3 ? 0.5 : 1);
        if (shockT > 0.6) shockOn = false;
    }
    /* FOV stretch with speed: wider spread + lower camera = visceral rush */
    var fTarget = clamp((worldSpeed - START_SPEED) / (MAX_SPEED - START_SPEED), 0, 1);
    fov += (fTarget - fov) * Math.min(1, 3 * dt);
    fPROJX = PROJX * (1 + fov * 0.16);
    fPROJY = PROJY * (1 + fov * 0.05);
    fCAMH = CAM_H * (1 - fov * 0.14);
    fHOR = HOR - fov * H * 0.025;
    updateStars(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateGameOver(dt); break;
    }
}

/* ================= Render ================= */
function strip(p1, a1, b1, p2, a2, b2, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(p1.x + a1 * p1.pw, p1.y);
    ctx.lineTo(p1.x + b1 * p1.pw, p1.y);
    ctx.lineTo(p2.x + b2 * p2.pw, p2.y);
    ctx.lineTo(p2.x + a2 * p2.pw, p2.y);
    ctx.closePath();
    ctx.fill();
}

function drawRoad() {
    var B = BIOMES[biomeIdx];
    var base = Math.floor(pos / SEG_LEN);
    renderFrac = (pos - base * SEG_LEN) / SEG_LEN;
    var frac = renderFrac;
    var xAcc = 0;
    var dxAcc = -segs[base % NSEG].curve * frac;
    var i, s, z, sc, p;
    for (i = 0; i <= DRAW_SEG; i++) {
        s = segs[(base + i) % NSEG];
        z = Math.max((i - frac) * SEG_LEN, 1.0);
        sc = 1 / z;
        p = projArr[i];
        p.x = W2 + (xAcc - camX) * fPROJX * sc;
        p.y = fHOR + fCAMH * fPROJY * sc;
        p.pw = fPROJX * sc;
        p.el = s.el;
        p.er = s.er;
        p.alt = (base + i) & 1;
        p.dash = ((base + i) % 4) < 2;
        xAcc += dxAcc;
        dxAcc += s.curve;
    }
    for (i = DRAW_SEG - 1; i >= 0; i--) {
        var p1 = projArr[i], p2 = projArr[i + 1];
        if (p2.y >= p1.y) continue;
        if (p2.y > H + 4) continue;
        var fade = i > DRAW_SEG - 10 ? (DRAW_SEG - i) / 10 : 1;
        ctx.globalAlpha = fade;
        if (i < 44) {
            strip(p1, p1.el - 0.9, p1.el + 0.9, p2, p2.el - 0.9, p2.el + 0.9, B.edgeGlow);
            strip(p1, p1.er - 0.9, p1.er + 0.9, p2, p2.er - 0.9, p2.er + 0.9, B.edgeGlow);
        }
        strip(p1, p1.el, p1.er, p2, p2.el, p2.er, p1.alt ? B.roadA : B.roadB);
        strip(p1, p1.el, p1.el + 0.42, p2, p2.el, p2.el + 0.42, B.edge);
        strip(p1, p1.er - 0.42, p1.er, p2, p2.er - 0.42, p2.er, B.edge);
        if (p1.dash && p1.el < -0.5 && p1.er > 0.5) {
            strip(p1, -0.16, 0.16, p2, -0.16, 0.16, B.dash);
        }
    }
    /* glowing pylons streaming past = strong speed cue */
    ctx.globalAlpha = 1;
    ctx.fillStyle = B.py;
    for (i = 1; i < 46 && i < DRAW_SEG; i++) {
        var pp = projArr[i];
        if (((base + i) % 6) !== 0) continue;
        if (pp.y >= H || pp.y <= fHOR) continue;
        var ph = pp.pw * 1.5;
        var pwid = Math.max(2, pp.pw * 0.14);
        var fd = i > 36 ? (46 - i) / 10 : 1;
        ctx.globalAlpha = 0.85 * fd;
        ctx.fillRect((pp.x + (pp.el - 0.8) * pp.pw - pwid / 2) | 0, (pp.y - ph) | 0, pwid | 0 || 1, ph | 0 || 1);
        ctx.fillRect((pp.x + (pp.er + 0.8) * pp.pw - pwid / 2) | 0, (pp.y - ph) | 0, pwid | 0 || 1, ph | 0 || 1);
    }
    ctx.globalAlpha = 1;
}

/* interpolated projection at a world z ahead of camera; writes into out {x,y,pw} */
var projTmp = { x: 0, y: 0, pw: 0 };
function projAt(z) {
    var fi = (z - pos) / SEG_LEN + renderFrac;
    var i0 = clamp(Math.floor(fi), 0, DRAW_SEG - 1);
    var t = clamp(fi - i0, 0, 1);
    var p1 = projArr[i0], p2 = projArr[i0 + 1];
    projTmp.x = lerp(p1.x, p2.x, t);
    projTmp.y = lerp(p1.y, p2.y, t);
    projTmp.pw = lerp(p1.pw, p2.pw, t);
    return projTmp;
}

function drawRamps() {
    for (var i = 0; i < ramps.length; i++) {
        var r = ramps[i];
        if (!r.active) continue;
        var zRel = r.z - pos;
        if (zRel < 2 || zRel > (DRAW_SEG - 3) * SEG_LEN) continue;
        var pf = projAt(r.z);
        var xf = pf.x, yf = pf.y, pwf = pf.pw;
        var pb = projAt(r.z + 3);
        var cw = (xf - W2) / pwf;
        var xb = pb.x + 0 * pb.pw, pwb = pb.pw;
        var lift = 1.15 * fPROJY * (pwb / fPROJX); /* raised back edge */
        var x0f = xf + (r.x - r.w / 2) * pwf, x1f = xf + (r.x + r.w / 2) * pwf;
        var x0b = pb.x + (r.x - r.w / 2) * 0.86 * pwb, x1b = pb.x + (r.x + r.w / 2) * 0.86 * pwb;
        var yb = pb.y - lift;
        if (x1f < -40 || x0f > W + 40) continue;
        /* glow pad hugs the ramp shape */
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#FFD24A';
        ctx.lineWidth = clamp(pwf * 0.16, 3, 10);
        ctx.beginPath();
        ctx.moveTo(x0f, yf);
        ctx.lineTo(x1f, yf);
        ctx.lineTo(x1b, yb);
        ctx.lineTo(x0b, yb);
        ctx.closePath();
        ctx.stroke();
        ctx.globalAlpha = 1;
        /* ramp face */
        ctx.fillStyle = '#F5B93A';
        ctx.beginPath();
        ctx.moveTo(x0f, yf);
        ctx.lineTo(x1f, yf);
        ctx.lineTo(x1b, yb);
        ctx.lineTo(x0b, yb);
        ctx.closePath();
        ctx.fill();
        /* animated chevrons climbing the ramp */
        var ct = (time * 1.6) % 1;
        ctx.fillStyle = '#FFF3C8';
        for (var k = 0; k < 2; k++) {
            var tt = (ct + k * 0.5) % 1;
            var cy = lerp(yf - 2, yb + 3, tt);
            var half = lerp((x1f - x0f) / 2, (x1b - x0b) / 2, tt) * 0.6;
            var cx = lerp((x0f + x1f) / 2, (x0b + x1b) / 2, tt);
            var ah = Math.max(2, 6 * (1 - tt * 0.5));
            ctx.globalAlpha = 0.9 * (1 - tt * 0.6);
            ctx.beginPath();
            ctx.moveTo(cx - half, cy + ah);
            ctx.lineTo(cx, cy - ah);
            ctx.lineTo(cx + half, cy + ah);
            ctx.lineTo(cx, cy + ah * 0.3);
            ctx.closePath();
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        /* rim */
        ctx.strokeStyle = '#FFE9A8';
        ctx.lineWidth = clamp(pwf * 0.04, 1, 3);
        ctx.beginPath();
        ctx.moveTo(x0f, yf);
        ctx.lineTo(x0b, yb);
        ctx.lineTo(x1b, yb);
        ctx.lineTo(x1f, yf);
        ctx.stroke();
    }
}

function drawGems() {
    var spr = gemSprs[biomeIdx];
    for (var i = 0; i < gems.length; i++) {
        var g = gems[i];
        if (!g.active) continue;
        var zRel = g.z - pos;
        if (zRel < 2 || zRel > (DRAW_SEG - 3) * SEG_LEN) continue;
        var p = projAt(g.z);
        var bob = 0.18 * Math.sin(time * 3 + g.z * 0.7);
        var sc = p.pw / fPROJX;
        var gx = p.x + g.x * p.pw;
        var gy = p.y - (0.9 + g.h + bob) * fPROJY * sc;
        var s = clamp(p.pw * 1.35, 5, 44);
        if (gx < -30 || gx > W + 30) continue;
        var fd = zRel > (DRAW_SEG - 13) * SEG_LEN ? 1 - (zRel - (DRAW_SEG - 13) * SEG_LEN) / (10 * SEG_LEN) : 1;
        ctx.globalAlpha = fd;
        ctx.drawImage(spr, (gx - s / 2) | 0, (gy - s / 2) | 0, s | 0 || 1, s | 0 || 1);
        /* twinkle */
        var tw = Math.sin(time * 5 + g.z);
        if (tw > 0.82 && s > 9) {
            ctx.globalAlpha = fd * (tw - 0.82) / 0.18;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect((gx - 1) | 0, (gy - s * 0.75) | 0, 2, (s * 1.5) | 0);
            ctx.fillRect((gx - s * 0.75) | 0, (gy - 1) | 0, (s * 1.5) | 0, 2);
        }
    }
    ctx.globalAlpha = 1;
}

function drawBlocks() {
    var B = BIOMES[biomeIdx];
    var frac = renderFrac;
    var maxZ = (DRAW_SEG - 2) * SEG_LEN;
    var vn = 0;
    var i, b;
    for (i = 0; i < blocks.length; i++) {
        b = blocks[i];
        if (!b.active) continue;
        var zr = b.z - pos;
        if (zr < 2 || zr > maxZ) continue;
        blockScratch[vn++] = b;
    }
    for (i = 1; i < vn; i++) {
        var bb = blockScratch[i];
        var j = i - 1;
        while (j >= 0 && blockScratch[j].z < bb.z) {
            blockScratch[j + 1] = blockScratch[j];
            j--;
        }
        blockScratch[j + 1] = bb;
    }
    for (i = 0; i < vn; i++) {
        b = blockScratch[i];
        var zRel = b.z - pos;
        var fi = zRel / SEG_LEN + frac;
        var i0 = clamp(Math.floor(fi), 0, DRAW_SEG - 1);
        var t = clamp(fi - i0, 0, 1);
        var p1 = projArr[i0], p2 = projArr[i0 + 1];
        var x = lerp(p1.x, p2.x, t);
        var y = lerp(p1.y, p2.y, t);
        var pw = lerp(p1.pw, p2.pw, t);
        var zb = Math.max(zRel, 1.5);
        var cw = (x - W2) / pw;
        var scb = 1 / (zb + BLOCK_D);
        var pwb = fPROJX * scb;
        var x0f = x + b.x0 * pw, x1f = x + b.x1 * pw;
        if (x1f < -60 || x0f > W + 60) continue;
        var hpx = BLOCK_H * fPROJY / zb;
        var yTopF = y - hpx;
        var yB = fHOR + fCAMH * fPROJY * scb;
        var yTopB = yB - BLOCK_H * fPROJY * scb;
        var x0b = W2 + (cw + b.x0) * pwb, x1b = W2 + (cw + b.x1) * pwb;
        var fade = i0 > DRAW_SEG - 10 ? (DRAW_SEG - i0) / 10 : 1;
        ctx.globalAlpha = 0.22 * fade;
        ctx.fillStyle = B.blockGlow;
        ctx.fillRect((x0f - 6) | 0, (yTopF - 6) | 0, (x1f - x0f + 12) | 0, (hpx + 12) | 0);
        ctx.globalAlpha = fade;
        ctx.fillStyle = B.blockB;
        ctx.beginPath();
        ctx.moveTo(x0f, yTopF);
        ctx.lineTo(x1f, yTopF);
        ctx.lineTo(x1b, yTopB);
        ctx.lineTo(x0b, yTopB);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = B.blockA;
        ctx.fillRect(x0f | 0, yTopF | 0, (x1f - x0f) | 0 || 1, hpx | 0 || 1);
        /* warning stripes on sliders so they read as "moving" */
        if (b.mv && pw > 14) {
            ctx.globalAlpha = fade * 0.35;
            ctx.fillStyle = '#FFFFFF';
            var sw = (x1f - x0f) / 5;
            for (var st = 0; st < 5; st += 2) {
                ctx.fillRect((x0f + st * sw) | 0, yTopF | 0, sw | 0 || 1, hpx | 0 || 1);
            }
            ctx.globalAlpha = fade;
        }
        ctx.lineWidth = clamp(pw * 0.05, 1, 3);
        ctx.strokeStyle = B.blockRim;
        ctx.strokeRect(x0f | 0, yTopF | 0, (x1f - x0f) | 0 || 1, hpx | 0 || 1);
    }
    ctx.globalAlpha = 1;
}

function drawBall() {
    var frac = renderFrac;
    var p1 = projArr[BALL_Z / SEG_LEN], p2 = projArr[BALL_Z / SEG_LEN + 1];
    var pw = lerp(p1.pw, p2.pw, frac);
    var roadY = lerp(p1.y, p2.y, frac);
    var x = lerp(p1.x, p2.x, frac) + playerX * pw;
    var r = BALL_R * pw;
    var liftPx = airH * fPROJY * (pw / fPROJX);
    var bcy = roadY - r - liftPx;
    lastBallX = x;
    lastBallY = bcy;
    lastBallR = r;

    /* trail streaming behind the ball; doubles up at high multiplier */
    if (currentState === State.PLAYING && worldSpeed > 10) {
        var hue = (pos * 3) % 360;
        var col = 'hsl(' + (hue | 0) + ', 100%, 66%)';
        spawnPart(1, x + rand(-r * 0.3, r * 0.3), bcy + rand(0, r * 0.4), -vx * 4, 260 + worldSpeed * 6, 0.3, r * 0.55, col);
        spawnPart(1, x + rand(-r * 0.3, r * 0.3), bcy + rand(0, r * 0.4), -vx * 4, 260 + worldSpeed * 6, 0.3, r * 0.4, col);
        if (curMult() > 2.2) spawnPart(1, x + rand(-r * 0.5, r * 0.5), bcy + rand(0, r * 0.5), -vx * 4, 300 + worldSpeed * 6, 0.34, r * 0.5, col);
    }

    /* shadow: shrinks and fades while airborne — sells the jump */
    var shScale = 1 / (1 + airH * 0.4);
    ctx.globalAlpha = 0.45 * shScale + 0.08;
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.ellipse(x, roadY - 1, r * 0.95 * shScale, r * 0.26 * shScale, 0, 0, TAU);
    ctx.fill();
    ctx.globalAlpha = 1;

    /* squash & stretch + lean into the carve */
    var sx = 1 - squash * 0.5;
    var sy = 1 + squash;
    var tilt = clamp(vx * 0.022, -0.34, 0.34);
    var dw = r * (128 / BALL_SPR_R);
    ctx.save();
    ctx.translate(x | 0, bcy | 0);
    ctx.rotate(tilt);
    ctx.scale(sx, sy);
    ctx.drawImage(ballSpr, (-dw / 2) | 0, (-dw / 2) | 0, dw | 0 || 1, dw | 0 || 1);
    /* rolling stripes, clipped to the sphere */
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.92, 0, TAU);
    ctx.clip();
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#1B2150';
    var spacing = r * 0.85;
    var off = ((pos % 4) / 4) * spacing;
    for (var yy = -r + off; yy < r; yy += spacing) {
        var dy = yy / r;
        var ww = Math.sqrt(Math.max(0, 1 - dy * dy)) * r;
        if (ww < 1) continue;
        ctx.beginPath();
        ctx.ellipse(0, yy, ww, Math.max(1.5, r * 0.09), 0, 0, TAU);
        ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
}

function drawCrash() {
    if (!crash.on) return;
    var dw = lastBallR * (128 / BALL_SPR_R) * crash.s;
    ctx.save();
    ctx.translate(crash.x | 0, crash.y | 0);
    ctx.rotate(crash.rot);
    ctx.drawImage(ballSpr, (-dw / 2) | 0, (-dw / 2) | 0, dw | 0 || 1, dw | 0 || 1);
    ctx.restore();
    /* dizzy stars orbiting the tumbling ball */
    ctx.fillStyle = '#FFE14D';
    ctx.font = '800 16px Nunito, sans-serif';
    ctx.textAlign = 'center';
    for (var k = 0; k < 3; k++) {
        var a = time * 6 + k * (TAU / 3);
        var rr = dw * 0.75 + 8;
        ctx.globalAlpha = 0.9;
        ctx.fillText('✦', (crash.x + Math.cos(a) * rr) | 0, (crash.y + Math.sin(a) * rr * 0.5) | 0);
    }
    ctx.globalAlpha = 1;
}

function drawTrail() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active || p.type !== 1) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a * 0.85;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.size * a), 0, TAU);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active || p.type === 1) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 2) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            var s = p.size;
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s * 0.8, s * 0.6);
            ctx.lineTo(-s * 0.7, s * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        } else if (p.type === 3) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        } else if (p.type === 5) {
            /* 4-point glint */
            var g = p.size * a;
            ctx.fillRect((p.x - g) | 0, (p.y - 1) | 0, (g * 2) | 0 || 1, 2);
            ctx.fillRect((p.x - 1) | 0, (p.y - g) | 0, 2, (g * 2) | 0 || 1);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, TAU);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawRings() {
    for (var i = 0; i < rings.length; i++) {
        var rg = rings[i];
        if (!rg.active) continue;
        var t = rg.life / rg.ttl;
        ctx.globalAlpha = (1 - t) * 0.9;
        ctx.lineWidth = rg.lw * (1 - t) + 1;
        ctx.strokeStyle = rg.color;
        ctx.beginPath();
        ctx.arc(rg.x, rg.y, rg.r0 + (rg.r1 - rg.r0) * easeOutBack(Math.min(1, t * 1.1)), 0, TAU);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawLabels() {
    ctx.textAlign = 'center';
    for (var i = 0; i < labels.length; i++) {
        var lb = labels[i];
        if (!lb.active) continue;
        var t = lb.life / lb.ttl;
        var sIn = t < 0.22 ? easeOutBack(t / 0.22) : 1;
        var a = t > 0.68 ? 1 - (t - 0.68) / 0.32 : 1;
        ctx.globalAlpha = a;
        ctx.font = '800 ' + Math.max(8, lb.size * sIn) + 'px Nunito, sans-serif';
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(8,8,26,0.85)';
        ctx.strokeText(lb.txt, lb.x | 0, lb.y | 0);
        ctx.fillStyle = lb.color;
        ctx.fillText(lb.txt, lb.x | 0, lb.y | 0);
    }
    ctx.globalAlpha = 1;
}

function drawSpeedLines() {
    var n = Math.min(14, Math.floor((worldSpeed - 19) / 2));
    if (n <= 0) return;
    ctx.fillStyle = '#FFFFFF';
    for (var k = 0; k < n; k++) {
        var side = k & 1;
        var band = side ? W * (0.86 + 0.12 * ((k * 37) % 10) / 10) : W * (0.02 + 0.12 * ((k * 53) % 10) / 10);
        var spd = 700 + worldSpeed * 16 * (0.7 + ((k * 29) % 10) / 14);
        var len = 26 + worldSpeed * 1.6;
        var y = ((time * spd + k * 517) % (H + len + 60)) - len - 30;
        ctx.globalAlpha = 0.08 + 0.12 * ((k * 41) % 10) / 10;
        ctx.fillRect(band | 0, y | 0, 2, len | 0);
    }
    ctx.globalAlpha = 1;
}

function drawShock() {
    if (!shockOn) return;
    var t = shockT / 0.6;
    var a = 1 - t;
    var rr = 20 + t * 900;
    ctx.globalAlpha = a * 0.85;
    ctx.lineWidth = 8 * a + 1;
    ctx.strokeStyle = '#B7FBFF';
    ctx.beginPath();
    ctx.arc(lastBallX, lastBallY, rr, 0, TAU);
    ctx.stroke();
    ctx.globalAlpha = a * 0.5;
    ctx.strokeStyle = '#FF35D3';
    ctx.beginPath();
    ctx.arc(lastBallX, lastBallY, rr * 0.7, 0, TAU);
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 10;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(dpr, 0, 0, dpr, ox * dpr, oy * dpr);
    /* sky with biome crossfade (all skies prerendered at resize) */
    if (biomeFade < 1) {
        ctx.drawImage(skySprs[prevBiomeIdx], 0, 0, W, H);
        ctx.globalAlpha = biomeFade;
        ctx.drawImage(skySprs[biomeIdx], 0, 0, W, H);
        ctx.globalAlpha = 1;
    } else {
        ctx.drawImage(skySprs[biomeIdx], 0, 0, W, H);
    }
    drawStarsBg();
    drawMountains();
    drawRoad();
    drawRamps();
    drawGems();
    drawBlocks();
    drawTrail();
    if (!ballGone) drawBall();
    drawCrash();
    drawParticles();
    drawRings();
    drawSpeedLines();
    drawLabels();
    drawShock();
}

/* ================= Input ================= */
var keys = { left: false, right: false };
var touchSteer = 0;
var activePointer = null;

function setSteerFromEvent(e) {
    touchSteer = e.clientX < W / 2 ? -1 : 1;
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
        setSteerFromEvent(e);
        activePointer = e.pointerId;
    } else if (currentState === State.PLAYING) {
        setSteerFromEvent(e);
        activePointer = e.pointerId;
    } else if (currentState === State.PAUSED) {
        resumeGame();
    }
});
canvas.addEventListener('pointermove', function (e) {
    if (e.pointerId === activePointer && currentState === State.PLAYING) setSteerFromEvent(e);
});
function releasePointer(e) {
    if (e.pointerId === activePointer) {
        activePointer = null;
        touchSteer = 0;
    }
}
window.addEventListener('pointerup', releasePointer);
window.addEventListener('pointercancel', releasePointer);
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        e.preventDefault();
        keys.left = true;
        if (currentState === State.MENU) { ensureAudio(); startRun(); }
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        e.preventDefault();
        keys.right = true;
        if (currentState === State.MENU) { ensureAudio(); startRun(); }
    } else if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        ensureAudio();
        if (currentState === State.MENU) startRun();
        else if (currentState === State.PAUSED) resumeGame();
        else if (currentState === State.GAME_OVER && panelShown) restart();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});
window.addEventListener('keyup', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
    else if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Test hook (headless harness drives update directly) ================= */
window.__SpeedSlope = {
    update: update,
    startRun: startRun,
    restart: restart,
    keys: keys,
    setTouchSteer: function (v) { touchSteer = v; },
    getState: function () { return currentState; },
    getMeters: function () { return pos - startPos; },
    getScore: function () { return scoreNow(); },
    getPlayerX: function () { return playerX; },
    getVX: function () { return vx; },
    getSpeed: function () { return speed; },
    getBallZ: function () { return pos + BALL_Z; },
    getBlocks: function () { return blocks; },
    getRamps: function () { return ramps; },
    getGems: function () { return runGems; },
    isAirborne: function () { return airborne; },
    edgesAt: function (ahead) {
        var z = pos + BALL_Z + (ahead || 0);
        var s = segs[Math.floor(z / SEG_LEN) % NSEG];
        return { el: s.el, er: s.er };
    },
    getDeathCause: function () { return deathCause; },
    isPanelShown: function () { return panelShown; },
    debugBlock: function (ahead, x0, x1) { spawnBlock(pos + BALL_Z + ahead, x0, x1); }
};

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.max(0, Math.min(0.05, (now - last) / 1000));
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
resetRun();
showMenuUI();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>

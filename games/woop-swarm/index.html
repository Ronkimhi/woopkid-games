<script>
'use strict';

/* =====================================================================
   WOOP SWARM — kid-safe bullet heaven (survivors-like)
   You only move. Toys auto-fire. The whole game is the escalation
   rhythm: tension (swarm grows) → power spike (level-up / evolution)
   → bigger tension. 6 minutes to the Mega-Goober.
   Performance is the product: everything pooled, spatial-hash grid,
   hard entity caps. Target: 60fps with 200+ enemies on screen.
   ===================================================================== */

/* ================= Storage ================= */
const STORAGE_KEY = 'woopkid_woop-swarm';
const defaultData = {
    highScore: 0,        /* best bops (kills) in one run */
    bestTime: 0,
    totalPlays: 0,
    wins: 0,
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { /* fail silently */ }
}
const data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned;
  }
};
const SLUG = 'woop-swarm';
const STICKER_THRESHOLDS = { bronze: 200, silver: 700, gold: 1500 }; /* bops in one run */

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(a, b) { return a + Math.random() * (b - a); }
function fmtClock(s) {
    s = Math.max(0, Math.floor(s));
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

/* ================= Audio (procedural, Web Audio only) ================= */
let audioCtx = null;
let noiseBuf = null;
let activeVoices = 0;
const MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); }
function getNoise() {
    if (!noiseBuf) {
        const len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const ch = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}
/* soft pop for a bopped goober */
function sfxPop() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(560 * p, t);
    o.frequency.exponentialRampToValueAtTime(190 * p, t + 0.09);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.13);
}
/* gem collect: rising ping, pitch climbs with combo */
let gemCombo = 0, gemComboT = 0;
function sfxGem() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime;
    const p = pitchVar() * (1 + Math.min(gemCombo, 12) * 0.05);
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(880 * p, t);
    o.frequency.setValueAtTime(1174 * p, t + 0.05);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.18);
}
/* player hurt: soft thud */
function sfxHurt() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(150 * p, t);
    o.frequency.exponentialRampToValueAtTime(70 * p, t + 0.14);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.18);
}
/* level-up chord */
function sfxLevel() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(659 * p, t + 0.09);
    o.frequency.setValueAtTime(784 * p, t + 0.18);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.015);
    g.gain.setValueAtTime(0.16, t + 0.26);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.52);
}
/* evolution: big fanfare */
function sfxEvolve() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(262 * p, t);
    o.frequency.setValueAtTime(392 * p, t + 0.11);
    o.frequency.setValueAtTime(523 * p, t + 0.22);
    o.frequency.setValueAtTime(784 * p, t + 0.33);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 2600;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.setValueAtTime(0.18, t + 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.75);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.77);
}
/* boss horn */
function sfxBoss() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(98, t);
    o.frequency.setValueAtTime(131, t + 0.25);
    o.frequency.setValueAtTime(98, t + 0.5);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 900;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.03);
    g.gain.setValueAtTime(0.22, t + 0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 1.02);
}
/* defeat: sad-trombone-ish, gentle */
function sfxLose() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.14);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.28);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.6);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.58);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.64);
}
/* victory fanfare */
function sfxWin() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    const notes = [523, 659, 784, 1047, 784, 1047, 1319];
    notes.forEach((f, i) => o.frequency.setValueAtTime(f * p, t + i * 0.12));
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.setValueAtTime(0.18, t + notes.length * 0.12);
    g.gain.exponentialRampToValueAtTime(0.0001, t + notes.length * 0.12 + 0.4);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + notes.length * 0.12 + 0.42);
}

/* ================= Pools ================= */
function makePool(n, proto) {
    const arr = [];
    for (let i = 0; i < n; i++) arr.push(Object.assign({ on: false }, proto));
    return arr;
}
/* enemies */
const enemies = makePool(ENEMY_CAP + 1, { x: 0, y: 0, r: 14, hp: 10, maxHp: 10, spd: 60, dmg: 8, flash: 0, kind: 0, elite: false, boss: false, wob: 0 });

/* particles */

/* damage numbers */
const dnums = makePool(44, { x: 0, y: 0, t: 0, v: 0, crit: false });

function poolGet(pool) {
    for (let i = 0; i < pool.length; i++) if (!pool[i].on) return pool[i];
    return null;
}
function burst(x, y, n, cols, speed, life) {

        const p = poolGet(parts);
        if (!p) return;
        const a = rand(0, Math.PI * 2), s = rand(speed * 0.3, speed);
        p.on = true; p.x = x; p.y = y;
        p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
        p.t = 0; p.life = rand(life * 0.6, life);
        p.r = rand(2.5, 5.5); p.col = cols[(Math.random() * cols.length) | 0];
    }
}
function dmgNum(x, y, v, crit) {
    const d = poolGet(dnums);
    if (!d) return;
    d.on = true; d.x = x + rand(-8, 8); d.y = y - 10; d.t = 0; d.v = Math.round(v); d.crit = !!crit;
}

/* ================= Spatial hash (uniform grid) ================= */
const CELL = 84;
const grid = new Map();
function gridKey(cx, cy) { return cx * 100000 + cy; }
function gridRebuild() {
    grid.clear();
    for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.on) continue;
        const cx = Math.floor(e.x / CELL), cy = Math.floor(e.y / CELL);
        const k = gridKey(cx, cy);
        let cell = grid.get(k);
        if (!cell) { cell = []; grid.set(k, cell); }
        cell.push(e);
    }
}
/* visit enemies near (x,y) within radius r */
function gridNear(x, y, r, fn) {
    const c0x = Math.floor((x - r) / CELL), c1x = Math.floor((x + r) / CELL);
    const c0y = Math.floor((y - r) / CELL), c1y = Math.floor((y + r) / CELL);
    for (let cx = c0x; cx <= c1x; cx++) {
        for (let cy = c0y; cy <= c1y; cy++) {
            const cell = grid.get(gridKey(cx, cy));
            if (!cell) continue;
            for (let i = 0; i < cell.length; i++) {
                if (fn(cell[i]) === true) return;   /* early exit */
            }
        }
    }
}
function nearestEnemy(x, y, maxR) {
    let best = null, bd = maxR * maxR;
    /* expanding ring search over the grid */
    for (let ring = 0; ring <= Math.ceil(maxR / CELL); ring++) {
        const r = (ring + 1) * CELL;
        gridNear(x, y, r, (e) => {
            const dx = e.x - x, dy = e.y - y;
            const d = dx * dx + dy * dy;
            if (d < bd) { bd = d; best = e; }
        });
        if (best) return best;
    }
    return best;
}

/* ================= Enemy kinds & spawn director ================= */
const KINDS = [
    /* 0 goober  */ { r: 15, hp: 14, spd: 62,  dmg: 8,  col: '#7ED957', col2: '#5CB83F', xp: 1 },
    /* 1 wobbler */ { r: 11, hp: 8,  spd: 96,  dmg: 6,  col: '#4FC3F7', col2: '#2E9FD6', xp: 1 },
    /* 2 puff    */ { r: 22, hp: 46, spd: 40,  dmg: 12, col: '#FF8A3D', col2: '#E56F24', xp: 3 },
    /* 3 zipper  */ { r: 9,  hp: 6,  spd: 150, dmg: 5,  col: '#FF5FA2', col2: '#E0447F', xp: 1 }
];
let spawnT = 0, eliteT = 30, bossSpawned = false, boss = null;

function spawnEnemy(kind, elite) {
    if (enemyCount >= ENEMY_CAP) {
        /* cull the furthest enemy to make room (never the boss) */
        let far = null, fd = 0;
        for (const e of enemies) {
            if (!e.on || e.boss) continue;
            const d = (e.x - player.x) ** 2 + (e.y - player.y) ** 2;
            if (d > fd) { fd = d; far = e; }
        }
        if (far && fd > 900 * 900) { far.on = false; enemyCount--; }
        else return null;
    }
    const e = poolGet(enemies);
    if (!e) return null;
    const K = KINDS[kind];
    const a = rand(0, Math.PI * 2);
    const dist = Math.max(cw, ch) * 0.62 + 60;
    const mul = 1 + player.time / 150;          /* difficulty ramp */
    e.on = true; e.boss = false;
    e.x = player.x + Math.cos(a) * dist;
    e.y = player.y + Math.sin(a) * dist;
    e.kind = kind;
    e.r = K.r * (elite ? 1.7 : 1);
    e.hp = e.maxHp = K.hp * mul * (elite ? 7 : 1);
    e.spd = K.spd * (elite ? 0.85 : 1) * rand(0.9, 1.1);
    e.dmg = K.dmg;
    e.elite = !!elite;
    e.flash = 0;
    e.wob = rand(0, Math.PI * 2);
    enemyCount++;
    return e;
}
function spawnBoss() {
    bossSpawned = true;
    const e = poolGet(enemies) || enemies[0];
    if (e.on) enemyCount--;   /* recycled a live slot */
    const a = rand(0, Math.PI * 2);
    e.on = true; e.boss = true; e.elite = false;
    e.x = player.x + Math.cos(a) * Math.max(cw, ch) * 0.6;
    e.y = player.y + Math.sin(a) * Math.max(cw, ch) * 0.6;
    e.kind = 0;
    e.r = 64;
    e.hp = e.maxHp = 2600 + player.level * 120;
    e.spd = 55;
    e.dmg = 22;
    e.flash = 0;
    e.wob = 0;
    enemyCount++;
    boss = e;
    sfxBoss();
    addTrauma(0.5);
    document.getElementById('bosswrap').style.display = 'block';
}
function director(dt) {
    const t = player.time;
    if (!bossSpawned && t >= RUN_LENGTH) { spawnBoss(); return; }
    /* spawn rate: gentle first minute, then climbs; waves via sin */
    let rate = 0.9 + t / 45 + Math.sin(t / 9) * 0.5;         /* enemies per second */
    if (bossSpawned) rate *= 0.5;
    spawnT += dt * rate;
    while (spawnT >= 1) {
        spawnT -= 1;
        const roll = Math.random();
        let kind = 0;
        if (t > 40 && roll < 0.3) kind = 1;
        if (t > 100 && roll < 0.14) kind = 2;
        if (t > 170 && roll > 0.86) kind = 3;
        spawnEnemy(kind, false);
    }
    /* elites every ~30s after 45s */
    eliteT -= dt;
    if (t > 45 && eliteT <= 0) {
        eliteT = 30;
        spawnEnemy(2, true);
    }
}

                const s = poolGet(shots);

                s.hitId = -1;
            }
        } else if (w.key === 'ring') {
            w.cd = (evolved ? 1.6 : WEAPONS.ring.base.cd - 0.2 * (w.lv - 1)) * player.cdMul;
            const n = evolved ? 2 : 1;

            s.x = player.x; s.y = player.y;
            s.vx = Math.cos(a) * WEAPONS.disc.base.speed;

            s.dmg = (WEAPONS.disc.base.dmg + 5 * (w.lv - 1)) * player.dmgMul * (evolved ? 1.5 : 1);
            s.life = 5;
            s.bounces = evolved ? 12 : WEAPONS.disc.base.bounces + (w.lv - 1);
            s.hitId = -1;
        } else if (w.key === 'puddle') {
            w.cd = (evolved ? 2.4 : WEAPONS.puddle.base.cd) * player.cdMul;
            const pd = poolGet(puddles);
            if (!pd) continue;
            const tgt = nearestEnemy(player.x, player.y, 460);
            const a = tgt ? Math.atan2(tgt.y - player.y, tgt.x - player.x) : rand(0, Math.PI * 2);
            const d = tgt ? Math.min(300, Math.hypot(tgt.x - player.x, tgt.y - player.y)) : 160;
            pd.on = true;
            pd.x = player.x + Math.cos(a) * d;
            pd.y = player.y + Math.sin(a) * d;
            pd.r = (WEAPONS.puddle.base.radius + 14 * (w.lv - 1)) * player.areaMul * (evolved ? 1.6 : 1);
            pd.life = WEAPONS.puddle.base.life * (evolved ? 1.5 : 1);
            pd.dmg = (WEAPONS.puddle.base.dmg + 3 * (w.lv - 1)) * player.dmgMul * (evolved ? 1.4 : 1);
            pd.tick = 0;
        }

/* ================= Combat helpers ================= */

/* Build the 3 upgrade offers. An evolution card (if available) always shows. */
function buildOffers() {
    const offers = [];
    /* evolutions ready? */
    for (const w of player.weapons) {
        const W = WEAPONS[w.key];
        if (w.lv === W.maxLv && (player.passives[W.partner] || 0) > 0) {
            offers.push({ type: 'evo', key: w.key });
            break;   /* one evo card max per level-up */
        }
    }
    const pool = [];
    /* weapon upgrades */
    for (const w of player.weapons) {
        if (w.lv < WEAPONS[w.key].maxLv) pool.push({ type: 'wup', key: w.key });
    }
    /* new weapons (max 4 slots) */
    if (player.weapons.length < 4) {
        for (const key in WEAPONS) {
            if (!weaponOf(key)) pool.push({ type: 'wnew', key });
        }
    }
    /* passives (max 3 owned kinds) */
    const ownedP = Object.keys(player.passives).filter(k => player.passives[k] > 0);
    for (const key in PASSIVES) {
        const lv = player.passives[key] || 0;
        if (lv >= PASSIVES[key].maxLv) continue;
        if (lv === 0 && ownedP.length >= 3) continue;
        pool.push({ type: 'pas', key });
    }
    /* shuffle */
    for (let i = pool.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    while (offers.length < 3 && pool.length) offers.push(pool.pop());
    if (!offers.length) offers.push({ type: 'heal' });
    return offers;
}
function offerCard(o) {
    if (o.type === 'evo') {
        const E = EVOLUTIONS[WEAPONS[o.key].evoKey];
        return { cls: 'card evo', ico: E.ico, nm: E.name, lv: 'EVOLUTION!', ds: E.desc };
    }
    if (o.type === 'wup') {
        const W = WEAPONS[o.key], w = weaponOf(o.key);
        return { cls: 'card', ico: W.ico, nm: W.name, lv: 'LV ' + (w.lv + 1), ds: W.desc };
    }
    if (o.type === 'wnew') {
        const W = WEAPONS[o.key];
        return { cls: 'card', ico: W.ico, nm: W.name, lv: 'NEW TOY!', ds: W.desc };
    }
    if (o.type === 'pas') {
        const P = PASSIVES[o.key];
        return { cls: 'card', ico: P.ico, nm: P.name, lv: 'LV ' + ((player.passives[o.key] || 0) + 1), ds: P.desc };
    }
    return { cls: 'card', ico: '🍩', nm: 'Snack Break', lv: 'HEAL', ds: 'Munch! Restore 40 HP.' };
}
function applyOffer(o) {
    if (o.type === 'evo') {
        const w = weaponOf(o.key);
        w.lv = WEAPONS[o.key].maxLv + 1;   /* evolved marker */
        sfxEvolve();
        addTrauma(0.4);
        burst(player.x, player.y, 40, ['#FFE14D', '#FF5FA2', '#4DFFDF', '#FFFFFF'], 480, 1);
    } else if (o.type === 'wup') {
        weaponOf(o.key).lv++;
    } else if (o.type === 'wnew') {
        player.weapons.push({ key: o.key, lv: 1, cd: 0 });
    } else if (o.type === 'pas') {
        player.passives[o.key] = (player.passives[o.key] || 0) + 1;
        applyPassives();
    } else {
        player.hp = Math.min(player.maxHp, player.hp + 40);
    }
    refreshWeaponRow();
}
let pendingOffers = null;
function openLevelUp(fromElite) {
    if (state !== State.PLAYING) return;
    state = State.LEVELUP;
    sfxLevel();
    pendingOffers = buildOffers();
    const cardsEl = document.getElementById('cards');

        div.addEventListener('click', () => pickOffer(i));
        cardsEl.appendChild(div);
    });
    document.getElementById('levelPanel').classList.add('show');
}
function pickOffer(i) {
    if (state !== State.LEVELUP || !pendingOffers) return;
    applyOffer(pendingOffers[i]);
    pendingOffers = null;
    document.getElementById('levelPanel').classList.remove('show');
    state = State.PLAYING;
}
function refreshWeaponRow() {
    const el = document.getElementById('weaponRow');
    el.innerHTML = player.weapons.map(w => {

    player.speed = 220;
    player.level = 1; player.xp = 0; player.xpNext = 10;
    player.kills = 0; player.time = 0;
    player.hurtT = 0; player.regenT = 0;

    player.dmgMul = 1; player.cdMul = 1; player.areaMul = 1;

/* ================= Screen shake ================= */
let trauma = 0;
function addTrauma(v) { trauma = Math.min(1, trauma + v); }

/* ================= Input ================= */
const keys = {};
let joyOn = false, joyBx = 0, joyBy = 0, joyDx = 0, joyDy = 0;
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space' && state === State.MENU) { e.preventDefault(); startRun(); }
    if (e.code === 'Space' && state === State.OVER) { e.preventDefault(); startRun(); }
    if ((e.code === 'KeyP' || e.code === 'Escape')) {
        if (state === State.PLAYING) pauseGame();
        else if (state === State.PAUSED) resumeGame();
    }
    if (state === State.LEVELUP && (e.code === 'Digit1' || e.code === 'Digit2' || e.code === 'Digit3')) {
        pickOffer(Number(e.code.slice(-1)) - 1);
    }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

function joyStart(e) {
    if (e.target.closest && e.target.closest('.btn, .bigbtn, .card, a')) return;
    if (e.cancelable) e.preventDefault();
    ensureAudio();
    const t = e.touches ? e.touches[0] : e;
    joyOn = true;
    joyBx = t.clientX; joyBy = t.clientY;
    joyDx = 0; joyDy = 0;
}
function joyMove(e) {
    if (!joyOn) return;
    if (e.cancelable) e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    joyDx = t.clientX - joyBx;
    joyDy = t.clientY - joyBy;
    /* trailing base: the stick follows so direction changes feel instant */
    const d = Math.hypot(joyDx, joyDy);
    if (d > 74) {
        const k = 74 / d;
        joyBx = t.clientX - joyDx * k;
        joyBy = t.clientY - joyDy * k;
        joyDx = t.clientX - joyBx;
        joyDy = t.clientY - joyBy;
    }
}
function joyEnd() { joyOn = false; joyDx = 0; joyDy = 0; }
canvas.addEventListener('touchstart', joyStart, { passive: false });
canvas.addEventListener('touchmove', joyMove, { passive: false });
canvas.addEventListener('touchend', joyEnd, { passive: false });
canvas.addEventListener('touchcancel', joyEnd, { passive: false });
canvas.addEventListener('mousedown', joyStart);
window.addEventListener('mousemove', joyMove);
window.addEventListener('mouseup', joyEnd);

function moveInput() {
    let mx = 0, my = 0;
    if (keys.KeyW || keys.ArrowUp) my -= 1;
    if (keys.KeyS || keys.ArrowDown) my += 1;
    if (keys.KeyA || keys.ArrowLeft) mx -= 1;
    if (keys.KeyD || keys.ArrowRight) mx += 1;
    if (joyOn) {
        const d = Math.hypot(joyDx, joyDy);
        if (d > 10) {
            mx = joyDx / Math.max(d, 40);
            my = joyDy / Math.max(d, 40);
        }
    }
    const d = Math.hypot(mx, my);
    if (d > 1) { mx /= d; my /= d; }
    return [mx, my];
}

/* ================= Update ================= */
function update(dt) {
    trauma = Math.max(0, trauma - dt * 1.8);
    gemComboT -= dt;
    if (gemComboT <= 0) gemCombo = 0;

    if (state !== State.PLAYING) {
        /* particles keep drifting on the over screen for the confetti */
        stepParts(dt);
        return;
    }

    player.time += dt;
    player.hurtT = Math.max(0, player.hurtT - dt);
    if (player.giantT > 0) player.giantT = Math.max(0, player.giantT - dt);
    if (giantBannerT > 0) giantBannerT = Math.max(0, giantBannerT - dt);

    /* free firepower on a steady clock so it never feels like one toy */
    player.firepowerT -= dt;
    if (player.firepowerT <= 0) { player.firepowerT = FIREPOWER_EVERY; grantFirepower(); }

    /* regen from Big Heart */
    if ((player.passives.heart || 0) > 0) {
        player.regenT += dt;
        if (player.regenT >= 3) {
            player.regenT = 0;
            player.hp = Math.min(player.maxHp, player.hp + 2 * player.passives.heart);
        }
    }

    /* movement (a touch faster while giant, to chase down the swarm) */
    const [mx, my] = moveInput();
    const moveSpeed = player.speed * (isGiant() ? 1.3 : 1);
    player.x += mx * moveSpeed * dt;
    player.y += my * moveSpeed * dt;

    director(dt);
    gridRebuild();
    fireWeapons(dt);

    /* --- enemies chase + touch damage + separation-lite --- */
    const giant = isGiant();
    const eatR = playerR();
    for (const e of enemies) {
        if (!e.on) continue;
        const dx = player.x - e.x, dy = player.y - e.y;
        const d = Math.hypot(dx, dy) || 0.001;
        e.x += (dx / d) * e.spd * dt;
        e.y += (dy / d) * e.spd * dt;
        e.wob += dt * 6;
        e.flash = Math.max(0, e.flash - dt);
        if (giant) {
            if (d < e.r + eatR) {
                if (e.boss) hurtEnemy(e, 300 * dt);   /* chomp the boss, don't swallow it whole */
                else { burst(e.x, e.y, 6, ['#FFE14D', '#FFFFFF'], 260, 0.5); killEnemy(e); }
            }
        } else if (d < e.r + player.r) {
            hurtPlayer(e.dmg);
        }
    }

    /* --- orbit buddies (continuous) --- */
    const ow = weaponOf('orbit');
    if (ow) {
        const W = WEAPONS.orbit;
        const evolved = ow.lv > W.maxLv;
        const count = (evolved ? 5 : W.base.count + Math.floor((ow.lv - 1) / 2));
        const radius = (W.base.radius + 7 * (ow.lv - 1)) * (evolved ? 1.25 : 1);
        const spin = W.base.spin * (evolved ? 1.6 : 1);
        const dmg = (W.base.dmg + 3 * (ow.lv - 1)) * player.dmgMul * (evolved ? 1.5 : 1);
        orbitAngle += spin * dt;
        ow.hitT = (ow.hitT || 0) - dt;
        for (let i = 0; i < count; i++) {
            const a = orbitAngle + (i / count) * Math.PI * 2;
            const bx = player.x + Math.cos(a) * radius;
            const by = player.y + Math.sin(a) * radius;
            gridNear(bx, by, 30, (e) => {
                const dd = (e.x - bx) ** 2 + (e.y - by) ** 2;
                if (dd < (e.r + 13) ** 2 && (e.orbitT || 0) <= player.time) {
                    e.orbitT = player.time + 0.35;   /* per-enemy orbit hit cooldown */
                    hurtEnemy(e, dmg, Math.cos(a) * 10, Math.sin(a) * 10);
                }
            });
        }
    }

    /* --- shots --- */
    for (const s of shots) {
        if (!s.on) continue;
        s.life -= dt;
        if (s.life <= 0) { s.on = false; continue; }
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        let hitSomething = false;
        gridNear(s.x, s.y, s.r + 26, (e) => {
            if (hitSomething) return true;
            const dd = (e.x - s.x) ** 2 + (e.y - s.y) ** 2;
            if (dd < (e.r + s.r) ** 2) {
                hurtEnemy(e, s.dmg, s.vx * 0.02, s.vy * 0.02);
                hitSomething = true;
                if (s.kind === 1) {
                    /* disc: bounce to the next nearest enemy */
                    if (s.bounces-- > 0) {
                        const nxt = nearestEnemy(s.x, s.y, 420);
                        if (nxt && nxt.on) {
                            const a = Math.atan2(nxt.y - s.y, nxt.x - s.x);
                            const sp = Math.hypot(s.vx, s.vy);
                            s.vx = Math.cos(a) * sp;
                            s.vy = Math.sin(a) * sp;
                        } else { s.on = false; }
                    } else s.on = false;
                } else {
                    if (s.pierce-- <= 0) s.on = false;
                }
                return true;
            }
        });
    }

    /* --- rings (expanding pulses) --- */
    for (const rg of rings) {
        if (!rg.on) continue;
        rg.t += dt;
        const prevR = rg.r;
        rg.r += 480 * dt;
        if (rg.r >= rg.maxR) { rg.on = false; continue; }
        /* damage enemies crossing the ring band this frame */
        gridNear(rg.x, rg.y, rg.r + 40, (e) => {
            const d = Math.hypot(e.x - rg.x, e.y - rg.y);
            if (d > prevR - e.r && d <= rg.r + e.r) {
                const a = Math.atan2(e.y - rg.y, e.x - rg.x);
                hurtEnemy(e, rg.dmg, Math.cos(a) * rg.push * dt * 8, Math.sin(a) * rg.push * dt * 8);
            }
        });
    }

    /* --- puddles --- */
    for (const pd of puddles) {
        if (!pd.on) continue;
        pd.life -= dt;
        if (pd.life <= 0) { pd.on = false; continue; }
        pd.tick -= dt;
        if (pd.tick <= 0) {
            pd.tick = 0.5;
            gridNear(pd.x, pd.y, pd.r + 24, (e) => {
                const dd = (e.x - pd.x) ** 2 + (e.y - pd.y) ** 2;
                if (dd < (pd.r + e.r * 0.5) ** 2) hurtEnemy(e, pd.dmg);
            });
        }
    }

    /* --- gems: magnet + collect --- */
    for (const g of gems) {
        if (!g.on) continue;
        const dx = player.x - g.x, dy = player.y - g.y;
        const d = Math.hypot(dx, dy) || 0.001;
        if (!g.suck && d < player.magnetR) g.suck = true;
        if (g.suck) {
            const sp = Math.min(760, 260 + (player.magnetR / Math.max(d, 20)) * 260);
            g.x += (dx / d) * sp * dt;
            g.y += (dy / d) * sp * dt;
        }
        if (d < player.r + 12) {
            g.on = false;
            gemCombo++; gemComboT = 0.9;
            sfxGem();
            gainXp(g.v);
        }
    }

    stepParts(dt);

    /* damage numbers */
    for (const d of dnums) {
        if (!d.on) continue;
        d.t += dt;
        if (d.t > 0.7) d.on = false;
    }

    /* HUD */
    const remain = bossSpawned ? 0 : Math.max(0, RUN_LENGTH - player.time);
    hudTimeEl.textContent = bossSpawned ? 'BOSS!' : fmtClock(remain);
    hudSubEl.innerHTML = 'LV ' + player.level + ' &nbsp;•&nbsp; ' + player.kills + ' BOPS';
    if (boss && boss.on) {
        bossbarEl.style.width = Math.max(0, (boss.hp / boss.maxHp) * 100) + '%';
    }
}
function stepParts(dt) {
    for (const p of parts) {
        if (!p.on) continue;
        p.t += dt;
        if (p.t >= p.life) { p.on = false; continue; }
        p.vy += 500 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
    }
}

/* ================= Render ================= */
const hudTimeEl = document.getElementById('hudTime');
const hudSubEl = document.getElementById('hudSub');
const xpbarEl = document.getElementById('xpbar');
const bossbarEl = document.getElementById('bossbar');

function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    /* arena: deep navy with soft grid dots that scroll with the world */
    ctx.fillStyle = '#2B2350';
    ctx.fillRect(0, 0, cw, ch);

    const shakeK = trauma * trauma;
    const sx = (Math.random() * 2 - 1) * 10 * shakeK;
    const sy = (Math.random() * 2 - 1) * 10 * shakeK;
    const camX = player.x - cw / 2 + sx;
    const camY = player.y - ch / 2 + sy;
    ctx.translate(-camX, -camY);

    /* dot grid */
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    const step = 90;
    const gx0 = Math.floor(camX / step) * step;
    const gy0 = Math.floor(camY / step) * step;
    for (let x = gx0; x < camX + cw + step; x += step) {
        for (let y = gy0; y < camY + ch + step; y += step) {
            ctx.fillRect(x, y, 4, 4);
        }
    }

    /* puddles under everything */
    for (const pd of puddles) {
        if (!pd.on) continue;
        const k = Math.min(1, pd.life);
        ctx.globalAlpha = 0.4 * k;
        ctx.fillStyle = '#4DFFDF';
        ctx.beginPath(); ctx.arc(pd.x, pd.y, pd.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 0.7 * k;
        ctx.strokeStyle = '#4DFFDF';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(pd.x, pd.y, pd.r * (0.7 + Math.sin(performance.now() / 300) * 0.06), 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 1;
    }

    /* gems */
    for (const g of gems) {
        if (!g.on) continue;
        const tw = Math.sin(performance.now() / 200 + g.x) * 0.25 + 1;
        ctx.fillStyle = g.v > 1 ? '#FF5FA2' : '#4DFFDF';
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-5 * tw, -5 * tw, 10 * tw, 10 * tw);
        ctx.restore();
    }

    /* enemies */
    for (const e of enemies) {
        if (!e.on) continue;
        const K = KINDS[e.kind];
        const wob = 1 + Math.sin(e.wob) * 0.08;
        const r = e.r * wob;
        ctx.fillStyle = e.flash > 0 ? '#FFFFFF' : (e.boss ? '#B25CFF' : K.col);
        ctx.beginPath();
        ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
        ctx.fill();
        /* belly */
        if (e.flash <= 0) {
            ctx.fillStyle = e.boss ? '#9B3FE8' : K.col2;
            ctx.beginPath();
            ctx.arc(e.x, e.y + r * 0.32, r * 0.62, 0, Math.PI * 2);
            ctx.fill();
        }
        /* googly eyes */
        const ex = (player.x - e.x), ey = (player.y - e.y);
        const ed = Math.hypot(ex, ey) || 1;
        const lx = (ex / ed) * r * 0.14, ly = (ey / ed) * r * 0.14;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(e.x - r * 0.3, e.y - r * 0.2, r * 0.26, 0, Math.PI * 2);
        ctx.arc(e.x + r * 0.3, e.y - r * 0.2, r * 0.26, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(e.x - r * 0.3 + lx, e.y - r * 0.2 + ly, r * 0.11, 0, Math.PI * 2);
        ctx.arc(e.x + r * 0.3 + lx, e.y - r * 0.2 + ly, r * 0.11, 0, Math.PI * 2);
        ctx.fill();
        if (e.elite || e.boss) {
            /* tiny crown */
            ctx.fillStyle = '#FFE14D';
            const cwn = r * 0.5;
            ctx.beginPath();
            ctx.moveTo(e.x - cwn, e.y - r - 2);
            ctx.lineTo(e.x - cwn * 0.5, e.y - r - cwn * 0.8);
            ctx.lineTo(e.x, e.y - r - 2);
            ctx.lineTo(e.x + cwn * 0.5, e.y - r - cwn * 0.8);
            ctx.lineTo(e.x + cwn, e.y - r - 2);
            ctx.closePath();
            ctx.fill();
        }
    }

    /* rings */
    for (const rg of rings) {
        if (!rg.on) continue;
        const k = 1 - rg.r / rg.maxR;
        ctx.globalAlpha = 0.7 * k + 0.15;
        ctx.strokeStyle = '#FFE14D';
        ctx.lineWidth = 8 * k + 3;
        ctx.beginPath();
        ctx.arc(rg.x, rg.y, Math.max(1, rg.r), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    /* shots */
    for (const s of shots) {
        if (!s.on) continue;
        ctx.fillStyle = s.kind === 1 ? '#4FC3F7' : '#FF5FA2';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(s.x - s.r * 0.3, s.y - s.r * 0.3, s.r * 0.35, 0, Math.PI * 2);
        ctx.fill();
    }

    /* orbit buddies */
    const ow2 = weaponOf('orbit');
    if (ow2 && state !== State.MENU) {
        const W = WEAPONS.orbit;
        const evolved = ow2.lv > W.maxLv;
        const count = (evolved ? 5 : W.base.count + Math.floor((ow2.lv - 1) / 2));
        const radius = (W.base.radius + 7 * (ow2.lv - 1)) * (evolved ? 1.25 : 1);
        for (let i = 0; i < count; i++) {
            const a = orbitAngle + (i / count) * Math.PI * 2;
            const bx = player.x + Math.cos(a) * radius;
            const by = player.y + Math.sin(a) * radius;
            ctx.fillStyle = evolved ? '#B25CFF' : '#FFE14D';
            ctx.beginPath(); ctx.arc(bx, by, 13, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#2B2350';
            ctx.beginPath();
            ctx.arc(bx - 3, by - 2, 2.2, 0, Math.PI * 2);
            ctx.arc(bx + 3, by - 2, 2.2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    /* player */
    drawPlayer();

    /* particles */
    for (const p of parts) {
        if (!p.on) continue;
        const k = 1 - p.t / p.life;
        ctx.globalAlpha = k;
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * k + 1, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* damage numbers */
    ctx.textAlign = 'center';
    for (const d of dnums) {
        if (!d.on) continue;
        const k = 1 - d.t / 0.7;
        ctx.globalAlpha = k;
        ctx.font = '800 ' + (d.crit ? 24 : 17) + 'px Nunito, sans-serif';
        ctx.fillStyle = d.crit ? '#FFE14D' : '#FFFFFF';
        ctx.fillText(d.v, d.x, d.y - (1 - k) * 34);
    }
    ctx.globalAlpha = 1;

    /* joystick */
    if (joyOn && state === State.PLAYING) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(joyBx, joyBy, 52, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.arc(joyBx + joyDx * 0.6, joyBy + joyDy * 0.6, 24, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    /* MEGA WOOP: golden edge glow while giant + a punchy banner on trigger */
    if (isGiant()) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const gp = 0.12 + Math.sin(performance.now() / 130) * 0.06;
        const vg = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.4, cw / 2, ch / 2, Math.max(cw, ch) * 0.72);
        vg.addColorStop(0, 'rgba(255,225,77,0)');
        vg.addColorStop(1, 'rgba(255,225,77,' + gp + ')');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, cw, ch);
    }
    if (giantBannerT > 0) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const k = Math.min(1, giantBannerT * 2);
        const pop = 1 + (1 - Math.min(1, giantBannerT / 1.8)) * 0.15;
        ctx.globalAlpha = k;
        ctx.textAlign = 'center';
        ctx.save();
        ctx.translate(cw / 2, ch * 0.34);
        ctx.scale(pop, pop);
        ctx.font = '800 ' + Math.min(cw * 0.11, 60) + 'px Nunito, sans-serif';
        ctx.lineWidth = 6; ctx.strokeStyle = '#2B2350'; ctx.strokeText('MEGA WOOP!', 0, 0);
        ctx.fillStyle = '#FFE14D'; ctx.fillText('MEGA WOOP!', 0, 0);
        ctx.font = '800 ' + Math.min(cw * 0.045, 22) + 'px Nunito, sans-serif';
        ctx.lineWidth = 4; ctx.strokeStyle = '#2B2350'; ctx.strokeText('EAT THE SWARM! 😋', 0, Math.min(cw * 0.08, 42));
        ctx.fillStyle = '#FFFFFF'; ctx.fillText('EAT THE SWARM! 😋', 0, Math.min(cw * 0.08, 42));
        ctx.restore();
        ctx.globalAlpha = 1;
    }

    /* low HP vignette */
    if (state === State.PLAYING && player.hp < player.maxHp * 0.3) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const pulse = 0.18 + Math.sin(performance.now() / 220) * 0.08;
        const vg = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.35, cw / 2, ch / 2, Math.max(cw, ch) * 0.7);
        vg.addColorStop(0, 'rgba(255,60,90,0)');
        vg.addColorStop(1, 'rgba(255,60,90,' + pulse + ')');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, cw, ch);
    }
}
function drawPlayer() {
    const hurt = player.hurtT > 0 && Math.floor(performance.now() / 80) % 2 === 0;
    const [mx, my] = state === State.PLAYING ? moveInput() : [0, 0];
    const moving = mx !== 0 || my !== 0;
    const bob = moving ? Math.sin(performance.now() / 90) * 2.5 : Math.sin(performance.now() / 400) * 1.5;
    const px = player.x, py = player.y + bob;
    const giant = isGiant();
    const scale = giant ? GIANT_SCALE : 1;

    ctx.save();
    if (giant) {
        /* pulsing golden aura + a wobble to sell the bigness */
        const pulse = 1 + Math.sin(performance.now() / 90) * 0.05;
        ctx.translate(px, py); ctx.scale(scale * pulse, scale * pulse); ctx.translate(-px, -py);
        ctx.globalAlpha = 0.35 + Math.sin(performance.now() / 120) * 0.12;
        ctx.fillStyle = '#FFE14D';
        ctx.beginPath(); ctx.arc(px, py, player.r + 12, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
    }

    ctx.globalAlpha = hurt ? 0.45 : 1;
    /* body */
    ctx.fillStyle = giant ? '#B79CFF' : '#8F7BFF';
    ctx.beginPath(); ctx.arc(px, py, player.r + 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = giant ? '#CDBBFF' : '#A794FF';
    ctx.beginPath(); ctx.arc(px - 3, py - 4, player.r - 4, 0, Math.PI * 2); ctx.fill();
    /* face */
    const lx = mx * 3, ly = my * 3;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(px - 5, py - 4, 5.6, 0, Math.PI * 2);
    ctx.arc(px + 5, py - 4, 5.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2B2350';
    ctx.beginPath();
    ctx.arc(px - 5 + lx, py - 4 + ly, 2.7, 0, Math.PI * 2);
    ctx.arc(px + 5 + lx, py - 4 + ly, 2.7, 0, Math.PI * 2);
    ctx.fill();
    if (giant) {
        /* big chompy open mouth */
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(px, py + 5, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FF5FA2';
        ctx.beginPath();
        ctx.arc(px, py + 7.5, 3, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.strokeStyle = '#2B2350';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.arc(px, py + 5, 4.5, 0.15 * Math.PI, 0.85 * Math.PI);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    /* HP bar above the player (hidden during the invincible rampage) */
    if (!giant && (state === State.PLAYING || state === State.LEVELUP)) {
        const w = 46, hpk = clamp(player.hp / player.maxHp, 0, 1);
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(px - w / 2, py - player.r - 16, w, 7);
        ctx.fillStyle = hpk > 0.5 ? '#7ED957' : (hpk > 0.25 ? '#FFE14D' : '#FF5FA2');
        ctx.fillRect(px - w / 2, py - player.r - 16, w * hpk, 7);
    }
}

/* ================= Pause / panels ================= */
function pauseGame() {
    if (state !== State.PLAYING) return;
    state = State.PAUSED;
    document.getElementById('pausePanel').classList.add('show');
}
function resumeGame() {
    if (state !== State.PAUSED) return;
    state = State.PLAYING;
    document.getElementById('pausePanel').classList.remove('show');
}
document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.addEventListener('visibilitychange', () => {
    if (document.hidden && state === State.PLAYING) pauseGame();
});
document.getElementById('playBtn').addEventListener('click', startRun);
document.getElementById('againBtn').addEventListener('click', startRun);

const muteBtn = document.getElementById('muteBtn');
function refreshMute() { muteBtn.textContent = data.muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', () => {
    ensureAudio();
    data.muted = !data.muted;
    saveData();
    refreshMute();
});
refreshMute();

/* ================= Boot + main loop ================= */
function showMenu() {
    state = State.MENU;
    document.getElementById('startPanel').classList.add('show');
    document.getElementById('bestLine').textContent = data.highScore > 0
        ? '⭐ Best: ' + data.highScore + ' bops' + (data.wins > 0 ? ' • 🏆 Mega-Goober bopped ×' + data.wins : '')
        : 'Survive 6 minutes to meet the Mega-Goober!';
}
showMenu();

let last = performance.now();
function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= WoopKid High Score Leaderboard (verbatim contract module) =================
   Per-device top-10 board shared with the Hall of Fame page.
   Hooks WoopProfile.reportRun so every finished run is recorded under the
   current player name. Storage: 'woopkid_leaderboard' = { slug: [{n,s,d},...] },
   'woopkid_player_name' = current player. No network, everything stays local. */
(function () {
'use strict';
var LB = { slug: 'woop-swarm', title: 'WOOP SWARM', unit: 'bops' };
var LB_KEY = 'woopkid_leaderboard';
var NAME_KEY = 'woopkid_player_name';
var LB_MAX = 10;

function lbLoadAll() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || {}; } catch (e) { return {}; } }
function lbSaveAll(all) { try { localStorage.setItem(LB_KEY, JSON.stringify(all)); } catch (e) {} }
function lbBoard() { return lbLoadAll()[LB.slug] || []; }
function lbName() {
    try { var n = localStorage.getItem(NAME_KEY); return (n && n.trim()) ? n.trim().slice(0, 10).toUpperCase() : 'WOOP'; }
    catch (e) { return 'WOOP'; }
}
function lbSetName(n) { try { localStorage.setItem(NAME_KEY, n); } catch (e) {} }
function lbToday() { var d = new Date(); return d.toISOString().slice(0, 10); }
function lbFmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function lbRankOf(list, name) {
    for (var i = 0; i < list.length; i++) if (list[i].n === name) return i + 1;
    return 0;
}

/* Record a finished run. One row per player name; only improvements count. */
function lbRecord(score, quiet) {
    score = Math.floor(Number(score) || 0);
    if (score <= 0) return;
    var all = lbLoadAll();
    var list = all[LB.slug] || (all[LB.slug] = []);
    var name = lbName();
    var prevRank = lbRankOf(list, name);
    var mine = prevRank ? list[prevRank - 1] : null;
    if (mine) {
        if (score <= mine.s) return;
        mine.s = score; mine.d = lbToday();
    } else {
        list.push({ n: name, s: score, d: lbToday() });
    }
    list.sort(function (a, b) { return b.s - a.s; });
    if (list.length > LB_MAX) list.length = LB_MAX;
    lbSaveAll(all);
    var newRank = lbRankOf(list, name);
    if (!quiet && newRank && (!prevRank || newRank < prevRank)) lbToast(newRank);
    if (lbPanelEl && lbPanelEl.classList.contains('wklb-show')) lbRenderRows();
}

/* Hook the shared profile module: every reported run also hits the board. */
if (typeof WoopProfile !== 'undefined' && WoopProfile && typeof WoopProfile.reportRun === 'function') {
    var lbOrigReport = WoopProfile.reportRun;
    WoopProfile.reportRun = function (slug, score, thresholds) {
        try { lbRecord(score); } catch (e) {}
        return lbOrigReport.call(WoopProfile, slug, score, thresholds);
    };
    /* Seed an empty board from this device's existing personal best. */
    try {
        if (lbBoard().length === 0) {
            var p = WoopProfile.load();
            var g = p && p.games && p.games[LB.slug];
            if (g && g.best > 0) lbRecord(g.best, true);
        }
    } catch (e) {}
}

/* ================= UI ================= */
var lbCSS = [
'#wklbBtn{position:fixed;top:74px;left:14px;width:48px;height:48px;border-radius:16px;border:none;',
'background:rgba(255,255,255,.92);box-shadow:0 3px 0 rgba(30,20,60,.25);display:flex;align-items:center;',
'justify-content:center;font-size:24px;cursor:pointer;z-index:40;padding:0;line-height:1;',
'-webkit-tap-highlight-color:transparent;touch-action:manipulation}',
'#wklbBtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(30,20,60,.25)}',
'#wklbScrim{position:fixed;inset:0;background:rgba(15,10,35,.62);z-index:9000;display:none;',
'-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}',
'#wklbScrim.wklb-show{display:block}',
'#wklbPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);opacity:0;',
'width:min(340px,calc(100vw - 32px));max-height:min(560px,calc(100vh - 40px));overflow-y:auto;z-index:9001;',
'background:#241d4d;border:3px solid rgba(255,255,255,.18);border-radius:22px;padding:18px 16px 14px;',
'box-shadow:0 14px 40px rgba(0,0,0,.45);display:none;color:#fff;',
"font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;",
'transition:transform .18s cubic-bezier(.2,1.6,.4,1),opacity .15s}',
'#wklbPanel.wklb-show{display:block}',
'#wklbPanel.wklb-in{transform:translate(-50%,-50%) scale(1);opacity:1}',
'#wklbPanel h2{font-size:21px;font-weight:800;margin:2px 0 0;letter-spacing:.5px}',
'#wklbPanel .wklb-sub{font-size:12px;font-weight:700;opacity:.65;margin:2px 0 12px;text-transform:uppercase;letter-spacing:1px}',
'#wklbClose{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:12px;border:none;',
'background:rgba(255,255,255,.12);color:#fff;font-size:17px;cursor:pointer;line-height:1}',
'.wklb-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:12px;margin-bottom:4px;',
'background:rgba(255,255,255,.06);font-weight:800;font-size:15px}',
'.wklb-row.wklb-me{background:rgba(255,210,63,.18);box-shadow:inset 0 0 0 2px rgba(255,210,63,.55)}',
'.wklb-row.wklb-empty{opacity:.35;font-weight:700}',
'.wklb-rank{flex:0 0 30px;text-align:center;font-size:16px}',
'.wklb-name{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px}',
'.wklb-score{flex:0 0 auto;font-variant-numeric:tabular-nums}',
'.wklb-zero{padding:18px 6px;font-weight:800;font-size:15px;opacity:.8}',
'#wklbNameRow{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;',
'padding-top:12px;border-top:2px dashed rgba(255,255,255,.15);font-weight:800;font-size:14px;flex-wrap:wrap}',
'#wklbNameRow .wklb-who{opacity:.65;font-size:12px;text-transform:uppercase;letter-spacing:1px}',
'#wklbCurName{color:#FFD23F}',
'#wklbEditBtn,#wklbSaveBtn{border:none;border-radius:10px;padding:7px 12px;font-weight:800;font-size:13px;',
'cursor:pointer;background:rgba(255,255,255,.14);color:#fff;',
"font-family:'Nunito',-apple-system,sans-serif}",
'#wklbSaveBtn{background:#FFD23F;color:#241d4d}',
'#wklbNameInput{width:120px;border:none;border-radius:10px;padding:7px 10px;font-weight:800;font-size:14px;',
'text-transform:uppercase;text-align:center;background:#fff;color:#241d4d;outline:none;',
"font-family:'Nunito',-apple-system,sans-serif}",
'#wklbToast{position:fixed;top:16px;left:50%;transform:translate(-50%,-72px);z-index:9100;',
'background:#FFD23F;color:#241d4d;font-weight:800;font-size:16px;padding:12px 20px;border-radius:999px;',
'box-shadow:0 6px 20px rgba(0,0,0,.35);white-space:nowrap;pointer-events:none;',
"font-family:'Nunito',-apple-system,sans-serif;transition:transform .3s cubic-bezier(.2,1.6,.4,1)}",
'#wklbToast.wklb-show{transform:translate(-50%,0)}'
].join('');

var lbPanelEl = null, lbScrimEl = null, lbBtnEl = null, lbToastEl = null, lbToastT = null, lbEditing = false;

function lbStop(e) { e.stopPropagation(); }
function lbGuard(el) {
    ['pointerdown', 'touchstart', 'touchend', 'mousedown', 'mouseup', 'click', 'keydown'].forEach(function (t) {
        el.addEventListener(t, lbStop);
    });
}

function lbBuildUI() {
    var st = document.createElement('style');
    st.textContent = lbCSS;
    document.head.appendChild(st);

    lbBtnEl = document.createElement('button');
    lbBtnEl.id = 'wklbBtn';
    lbBtnEl.type = 'button';
    lbBtnEl.setAttribute('aria-label', 'High scores');
    lbBtnEl.textContent = '🏆';
    lbGuard(lbBtnEl);
    lbBtnEl.addEventListener('click', lbToggle);
    document.body.appendChild(lbBtnEl);

    lbScrimEl = document.createElement('div');
    lbScrimEl.id = 'wklbScrim';
    lbGuard(lbScrimEl);
    lbScrimEl.addEventListener('click', lbClose);
    document.body.appendChild(lbScrimEl);

    lbPanelEl = document.createElement('div');
    lbPanelEl.id = 'wklbPanel';
    lbPanelEl.setAttribute('role', 'dialog');
    lbPanelEl.setAttribute('aria-label', 'High score leaderboard');
    lbGuard(lbPanelEl);
    document.body.appendChild(lbPanelEl);

    lbToastEl = document.createElement('div');
    lbToastEl.id = 'wklbToast';
    document.body.appendChild(lbToastEl);

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lbPanelEl.classList.contains('wklb-show')) lbClose();
    });
}

function lbRenderRows() {
    var list = lbBoard();
    var me = lbName();
    var medals = ['🥇', '🥈', '🥉'];
    var html = '<button id="wklbClose" type="button" aria-label="Close">✕</button>' +
        '<h2>🏆 HIGH SCORES</h2>' +
        '<div class="wklb-sub">' + LB.title + ' · best ' + LB.unit + '</div>';
    if (list.length === 0) {
        html += '<div class="wklb-zero">No scores yet.<br>Finish a run and be #1!</div>';
    } else {
        for (var i = 0; i < LB_MAX; i++) {
            var e = list[i];
            if (e) {
                html += '<div class="wklb-row' + (e.n === me ? ' wklb-me' : '') + '">' +
                    '<span class="wklb-rank">' + (i < 3 ? medals[i] : (i + 1)) + '</span>' +
                    '<span class="wklb-name"></span>' +
                    '<span class="wklb-score">' + lbFmt(e.s) + '</span></div>';
            } else {
                html += '<div class="wklb-row wklb-empty"><span class="wklb-rank">' + (i + 1) +
                    '</span><span class="wklb-name">- - -</span><span class="wklb-score">·</span></div>';
            }
        }
    }
    html += '<div id="wklbNameRow"><span class="wklb-who">Who’s playing?</span>';
    if (lbEditing) {
        html += '<input id="wklbNameInput" maxlength="10" autocomplete="off" spellcheck="false">' +
            '<button id="wklbSaveBtn" type="button">SAVE</button>';
    } else {
        html += '<span id="wklbCurName"></span><button id="wklbEditBtn" type="button">CHANGE</button>';
    }
    html += '</div>';
    lbPanelEl.innerHTML = html;

    /* names go in via textContent so typed characters can never become markup */
    var nameEls = lbPanelEl.querySelectorAll('.wklb-row:not(.wklb-empty) .wklb-name');
    for (var j = 0; j < nameEls.length; j++) nameEls[j].textContent = list[j].n;

    lbPanelEl.querySelector('#wklbClose').addEventListener('click', lbClose);
    if (lbEditing) {
        var inp = lbPanelEl.querySelector('#wklbNameInput');
        inp.value = me;
        var save = function () {
            var v = inp.value.replace(/[^\w !\-À-ɏ֐-׿]/g, '').trim().slice(0, 10).toUpperCase();
            if (v) lbSetName(v);
            lbEditing = false;
            lbRenderRows();
        };
        lbPanelEl.querySelector('#wklbSaveBtn').addEventListener('click', save);
        inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') save(); });
        setTimeout(function () { inp.focus(); inp.select(); }, 50);
    } else {
        lbPanelEl.querySelector('#wklbCurName').textContent = me;
        lbPanelEl.querySelector('#wklbEditBtn').addEventListener('click', function () {
            lbEditing = true;
            lbRenderRows();
            });
    }
}

function lbOpen() {
    lbEditing = false;
    lbRenderRows();
    lbScrimEl.classList.add('wklb-show');
    lbPanelEl.classList.add('wklb-show');
    requestAnimationFrame(function () { lbPanelEl.classList.add('wklb-in'); });
}
function lbClose() {
    lbScrimEl.classList.remove('wklb-show');
    lbPanelEl.classList.remove('wklb-show', 'wklb-in');
}
function lbToggle() {
    if (lbPanelEl.classList.contains('wklb-show')) lbClose(); else lbOpen();
}
function lbToast(rank) {
    if (!lbToastEl) return;
    var tag = rank === 1 ? '👑 #1 HIGH SCORE!' : '🏆 #' + rank + ' ON THE BOARD!';
    lbToastEl.textContent = lbName() + ' — ' + tag;
    lbToastEl.classList.add('wklb-show');
    clearTimeout(lbToastT);
    lbToastT = setTimeout(function () { lbToastEl.classList.remove('wklb-show'); }, 2600);
}

if (document.body) lbBuildUI();
else document.addEventListener('DOMContentLoaded', lbBuildUI);

/* tiny debug/automation handle (used by the QA harness) */
try {
    window.WKLB = { slug: LB.slug, record: lbRecord, open: lbOpen, close: lbClose, board: lbBoard, name: lbName, hooked: typeof lbOrigReport === 'function' };
} catch (e) {}
})();

</script>

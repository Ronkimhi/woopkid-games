<script>
'use strict';

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_woop-swarm';
var defaultData = {
    highScore: 0,          /* best survival seconds */
    totalPlays: 0,
    totalCoins: 0,         /* lifetime earned */
    unlocks: [],
    muted: false,
    lastPlayed: null,
    coins: 0,              /* spendable */
    meta: {},              /* shop levels by id */
    bestKills: 0,
    bossBeaten: false
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function fmtTime(s) {
    s = Math.floor(s);
    return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); }
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}
function tone(freq, dur, type, vol, sweepTo, delay) {
    if (!canPlay()) return;
    activeVoices++;
    var t0 = audioCtx.currentTime + (delay || 0);
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.type = type || 'triangle';
    osc.frequency.setValueAtTime(freq * pitchVar(), t0);
    if (sweepTo) osc.frequency.exponentialRampToValueAtTime(Math.max(30, sweepTo), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

var CELL = 72;
var grid = new Map();
function gridKey(cx, cy) { return cx * 100000 + cy; }
function rebuildGrid() {
    grid.clear();
    for (var i = 0; i < MAXE; i++) {
        var e = enemies[i];
        if (!e.on) continue;
        var k = gridKey(Math.floor(e.x / CELL), Math.floor(e.y / CELL));
        var cell = grid.get(k);
        if (cell) cell.push(i); else grid.set(k, [i]);
    }
}
function eachNear(x, y, r, fn) {
    var c0x = Math.floor((x - r) / CELL), c1x = Math.floor((x + r) / CELL);
    var c0y = Math.floor((y - r) / CELL), c1y = Math.floor((y + r) / CELL);
    for (var cx = c0x; cx <= c1x; cx++) {
        for (var cy = c0y; cy <= c1y; cy++) {
            var cell = grid.get(gridKey(cx, cy));
            if (!cell) continue;
            for (var j = 0; j < cell.length; j++) {
                if (fn(enemies[cell[j]], cell[j]) === true) return;
            }
        }
    }
}

/* ================= Level ups ================= */
function passiveVal(id) { return passives[id] || 0; }
function fireRateMul() { return Math.pow(0.92, passiveVal('whistle')); }
function areaMul() { return Math.pow(1.12, passiveVal('gum')); }
function extraProj() { return passiveVal('mittens'); }

function buildOffers() {
    var offers = [];
    var wids = Object.keys(build);
    /* evolutions first: guaranteed gold card when eligible */
    for (var i = 0; i < wids.length; i++) {
        var id = wids[i], w = WEAPONS[id], b = build[id];
        if (!b.evolved && b.lvl >= w.maxLvl && passiveVal(w.partner) > 0) {
            offers.push({ kind: 'evo', id: id });
        }
    }
    var pool = [];
    for (i = 0; i < wids.length; i++) {
        if (!build[wids[i]].evolved && build[wids[i]].lvl < WEAPONS[wids[i]].maxLvl) pool.push({ kind: 'wup', id: wids[i] });
    }
    if (wids.length < 4) {
        Object.keys(WEAPONS).forEach(function (id2) { if (!build[id2]) pool.push({ kind: 'wnew', id: id2 }); });
    }
    Object.keys(PASSIVES).forEach(function (id2) {
        if (passiveVal(id2) < PASSIVES[id2].maxLvl) {
            pool.push({ kind: 'pas', id: id2 });
            /* bias: partner passives of owned max-level weapons show up more */
            for (var j = 0; j < wids.length; j++) {
                if (WEAPONS[wids[j]].partner === id2 && build[wids[j]].lvl >= 5) pool.push({ kind: 'pas', id: id2 });
            }
        }
    });
    var want = 3 + metaLvl('luck');
    while (offers.length < want && pool.length) {
        var k = Math.floor(Math.random() * pool.length);
        var o = pool.splice(k, 1)[0];
        var dup = offers.some(function (q) { return q.kind === o.kind && q.id === o.id; });
        if (!dup) offers.push(o);
    }
    return offers.slice(0, want);
}

function cardHtml(o) {
    if (o.kind === 'evo') {
        var w = WEAPONS[o.id];
        return { gold: true, ico: w.evoIco, nm: w.evoName, lv: 'EVOLUTION!', ds: w.name + ' transforms into a super-toy!' };
    }
    if (o.kind === 'wup') {
        var w2 = WEAPONS[o.id];
        return { gold: false, ico: w2.ico, nm: w2.name, lv: 'LV ' + build[o.id].lvl + ' → ' + (build[o.id].lvl + 1), ds: w2.desc };
    }
    if (o.kind === 'wnew') {
        var w3 = WEAPONS[o.id];
        return { gold: false, ico: w3.ico, nm: w3.name, lv: 'NEW TOY!', ds: w3.desc };
    }
    var p = PASSIVES[o.id];
    return { gold: false, ico: p.ico, nm: p.name, lv: passiveVal(o.id) ? 'LV ' + passiveVal(o.id) + ' → ' + (passiveVal(o.id) + 1) : 'NEW CHARM!', ds: p.desc };
}

function applyOffer(o) {
    if (o.kind === 'evo') {
        build[o.id].evolved = true;
        evolvedCount++;
        sfxEvolve();
        showBanner(WEAPONS[o.id].evoIco + ' ' + WEAPONS[o.id].evoName + '!');
        trauma = Math.min(1, trauma + 0.4);
        burst(player.x, player.y, 40, '#FFE14D', 380, 9);
    } else if (o.kind === 'wup') {
        build[o.id].lvl++;
    } else if (o.kind === 'wnew') {
        build[o.id] = { lvl: 1, cdT: 0.2, evolved: false };
    } else {
        passives[o.id] = passiveVal(o.id) + 1;
        if (o.id === 'shoes') player.speed *= 1.08;
        if (o.id === 'magnetp') player.magnet *= 1.3;
        if (o.id === 'heart') { player.maxHp += 15; player.hp = Math.min(player.maxHp, player.hp + 15); }
    }
}

function openLevelUp(fromChest) {
    var offers = buildOffers();
    if (!offers.length) { /* everything maxed: heal instead */
        player.hp = Math.min(player.maxHp, player.hp + 25);
        return;
    }
    state = State.LEVELUP;
    sfxLevelUp();
    el.levelUp.querySelector('h2').textContent = fromChest ? '🎁 TREASURE!' : 'LEVEL UP!';
    el.cards.innerHTML = '';
    offers.forEach(function (o) {
        var c = cardHtml(o);
        var btn = document.createElement('button');

            a = Math.atan2(tgt.y - player.y, tgt.x - player.x);
            p.x = player.x; p.y = player.y;
            p.vx = Math.cos(a) * s.speed; p.vy = Math.sin(a) * s.speed;
            p.life = 2.2; p.dmg = dmg; p.r = s.r * area;
            p.kind = id === 'disc' ? 2 : (evo ? 1 : 0);
            p.pierce = evo && id === 'bopper' ? 3 : 0;
            p.chain = id === 'disc' ? (s.chain + (evo ? 4 : 0)) : 0;
            p.angle = 0;

        for (i = 0; i < count; i++) {

            if (!p) return;

            p.x = player.x; p.y = player.y;
            p.vx = Math.cos(a) * s.speed; p.vy = Math.sin(a) * s.speed;
            p.life = 1.4; p.dmg = dmg; p.r = s.r * area;
            p.kind = 3; p.pierce = evo ? 1 : 0; p.chain = 0;
        }
    } else if (id === 'ring') {
        p = alloc(projs);
        if (!p) return;
        p.x = player.x; p.y = player.y;
        p.vx = 0; p.vy = 0;
        p.life = 0.55; p.dmg = dmg; p.r = 10;
        p.kind = 4; p.pierce = 9999; p.chain = 0;

            else { z.x = player.x + rand(-140, 140); z.y = player.y + rand(-140, 140); }

/* ================= Update ================= */
var STEP = 1 / 60;
var acc = 0;
function update(dt) {
    acc += dt;
    var n = 0;
    while (acc >= STEP && n < 4) { step(STEP); acc -= STEP; n++; }
    if (n === 4) acc = 0;
}
function step(dt) {
    runT += dt;
    if (bossDead) overtime += dt;
    popT -= dt; pingT -= dt;
    if (pingT <= -0.4) pingChain = 0;
    hurtT = Math.max(0, hurtT - dt);

    /* movement */
    var mx = 0, my = 0;
    if (keys.ArrowLeft || keys.a || keys.A) mx -= 1;
    if (keys.ArrowRight || keys.d || keys.D) mx += 1;
    if (keys.ArrowUp || keys.w || keys.W) my -= 1;
    if (keys.ArrowDown || keys.s || keys.S) my += 1;
    if (joyOn) { mx = joyDX; my = joyDY; }
    var ml = Math.sqrt(mx * mx + my * my);
    if (ml > 1) { mx /= ml; my /= ml; }
    player.x += mx * player.speed * dt;
    player.y += my * player.speed * dt;
    player.mvx = mx; player.mvy = my;
    if (ml < 0.2) campT += dt; else campT = Math.max(0, campT - 3 * dt);
    if (mx !== 0) player.face = mx > 0 ? 1 : -1;
    player.bob += dt * (ml > 0.1 ? 9 : 3);
    player.iT = Math.max(0, player.iT - dt);

    /* director + grid */
    director(dt);
    rebuildGrid();

    /* enemies seek player */
    var contact = 0;
    for (var i = 0; i < MAXE; i++) {
        var e = enemies[i];
        if (!e.on) continue;
        var t = ETYPES[e.type];
        var dx = player.x - e.x, dy = player.y - e.y;
        var d = Math.sqrt(dx * dx + dy * dy) || 1;
        var spd = (e.boss ? 46 : t.speed) * Math.min(3.8, 1 + Math.min(0.5, runT / 600) + (runT > BOSS_TIME ? (runT - BOSS_TIME) / 60 * 0.3 : 0));
        if (campT > 6) spd *= 1.3;
        if (e.slow > 0) { spd *= 0.55; e.slow -= dt; }
        if (e.wobP !== undefined && t.wob) e.wobP += dt * 5;
        var wob = t.wob ? Math.sin(e.wobP) * 0.8 : 0;
        var nx = dx / d, ny = dy / d;
        if (e.boss) {
            e.dashT -= dt;

                e.dashT = 5;
                e.dashX = nx * 300; e.dashY = ny * 300;
                for (var s2 = 0; s2 < 4; s2++) spawnEnemy('goober');
            }
            if (e.dashT > 3.8) { e.x += e.dashX * dt; e.y += e.dashY * dt; }
        }
        e.x += (nx - ny * wob) * spd * dt;
        e.y += (ny + nx * wob) * spd * dt;
        e.flash = Math.max(0, e.flash - dt);

        if ((i & 7) === (frame & 7)) {
            _sepE = e;
            eachNear(e.x, e.y, e.r, sepCb);
        }
        /* MEGA WOOP eats the swarm on contact; boss gets chomped for damage */
        if (isGiant() && d < e.r + playerR()) {
            if (e.boss) {
                if (e.hitT <= runT) { e.hitT = runT + 0.35; hurtEnemy(e, 45, nx * -14, ny * -14); }
            } else {

        }
    }

    /* particles + dmg numbers */
    for (i = 0; i < MAXPART; i++) {
        var pt = parts[i];
        if (!pt.on) continue;
        pt.life -= dt;
        if (pt.life <= 0) { pt.on = false; continue; }
        pt.x += pt.vx * dt; pt.y += pt.vy * dt;
        pt.vx *= 0.94; pt.vy *= 0.94;
    }
    for (i = 0; i < MAXD; i++) {
        var dn = dnums[i];
        if (!dn.on) continue;
        dn.life -= dt;
        if (dn.life <= 0) { dn.on = false; continue; }
        dn.y -= dn.v * dt;
    }

    /* HUD clock */
    if ((frame % 20) === 0) el.clock.textContent = fmtTime(runT);
    trauma = Math.max(0, trauma - dt * 1.8);

    /* camera */
    camX = lerp(camX, player.x, Math.min(1, dt * 6));
    camY = lerp(camY, player.y, Math.min(1, dt * 6));
}

/* ================= Render ================= */
var frame = 0;
function wx(x) { return x - camX + W / 2; }
function wy(y) { return y - camY + H / 2; }

function render() {
    frame++;
    var shX = 0, shY = 0;
    if (trauma > 0) { var sh = trauma * trauma * 9; shX = rand(-sh, sh); shY = rand(-sh, sh); }
    ctx.save();
    ctx.translate(shX, shY);

    /* bg */
    ctx.fillStyle = hurtT > 0 ? '#2E1A2E' : '#1A1A2E';
    ctx.fillRect(-12, -12, W + 24, H + 24);
    /* dot grid */
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    var gs = 90;
    var ox = -((camX % gs) + gs) % gs, oy = -((camY % gs) + gs) % gs;
    for (var gx = ox; gx < W; gx += gs) {
        for (var gy = oy; gy < H; gy += gs) {
            ctx.fillRect(gx | 0, gy | 0, 3, 3);
        }
    }

    if (state === State.MENU) {
        renderMenu();
        ctx.restore();
        return;
    }

    var i;
    /* goo zones under everything */
    for (i = 0; i < MAXZ; i++) {
        var z = zones[i];
        if (!z.on) continue;
        ctx.fillStyle = z.evo ? 'rgba(255,110,60,0.3)' : 'rgba(126,217,87,0.28)';
        ctx.beginPath();
        ctx.arc(wx(z.x) | 0, wy(z.y) | 0, z.r * (0.9 + Math.sin(frame * 0.1 + i) * 0.06), 0, Math.PI * 2);
        ctx.fill();
    }

    /* gems */
    ctx.fillStyle = '#4FC3F7';
    for (i = 0; i < MAXG; i++) {
        var g = gems[i];
        if (!g.on) continue;
        var px = wx(g.x), py = wy(g.y);
        if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;
        var gr = g.v > 3 ? 8 : g.v > 1 ? 6.5 : 5;
        if (g.v > 3) ctx.fillStyle = '#FFE14D';
        else if (g.v > 1) ctx.fillStyle = '#B183FF';
        ctx.beginPath();
        ctx.moveTo(px, py - gr);
        ctx.lineTo(px + gr * 0.8, py);
        ctx.lineTo(px, py + gr);
        ctx.lineTo(px - gr * 0.8, py);
        ctx.closePath();
        ctx.fill();
        if (g.v > 1) ctx.fillStyle = '#4FC3F7';
    }

    /* pickups */
    for (i = 0; i < MAXPU; i++) {
        var pu = pickups[i];
        if (!pu.on) continue;
        var ux = wx(pu.x), uy = wy(pu.y) + Math.sin(frame * 0.08 + i) * 3;
        ctx.font = '22px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pu.kind === 1 ? '🎁' : pu.kind === 2 ? '❤️' : '🪙', ux, uy);
    }

    /* enemies */
    for (i = 0; i < MAXE; i++) {
        var e = enemies[i];
        if (!e.on) continue;
        var ex = wx(e.x), ey = wy(e.y);
        if (ex < -80 || ex > W + 80 || ey < -80 || ey > H + 80) continue;
        var t = ETYPES[e.type];
        var wobble = 1 + Math.sin(frame * 0.14 + i * 1.7) * 0.07;
        var rr = e.r * wobble;
        ctx.fillStyle = e.flash > 0 ? '#FFFFFF' : (e.boss ? '#FF5C5C' : (e.elite ? '#FFE14D' : t.color));
        ctx.beginPath();
        ctx.arc(ex | 0, ey | 0, rr, 0, Math.PI * 2);
        ctx.fill();
        if (e.elite || e.boss) {
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        /* face (skip when swarm is huge for perf) */
        if (e.r > 9) {
            ctx.fillStyle = '#2B2350';
            var eo = rr * 0.34;
            ctx.beginPath();
            ctx.arc(ex - eo, ey - rr * 0.15, rr * 0.14, 0, Math.PI * 2);
            ctx.arc(ex + eo, ey - rr * 0.15, rr * 0.14, 0, Math.PI * 2);
            ctx.fill();
        }
        if (e.boss) {
            /* boss hp bar */
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(ex - 60, ey - e.r - 22, 120, 10);
            ctx.fillStyle = '#FF5C5C';
            ctx.fillRect(ex - 60, ey - e.r - 22, 120 * clamp(e.hp / e.maxhp, 0, 1), 10);
        }
    }

    /* projectiles */
    for (i = 0; i < MAXP; i++) {
        var p = projs[i];
        if (!p.on) continue;
        var px2 = wx(p.x), py2 = wy(p.y);
        if (p.kind === 4) {
            ctx.strokeStyle = 'rgba(126,231,255,0.75)';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(px2, py2, p.r, 0, Math.PI * 2);
            ctx.stroke();
            continue;
        }
        if (px2 < -30 || px2 > W + 30 || py2 < -30 || py2 > H + 30) continue;
        if (p.kind === 3) {
            ctx.fillStyle = '#FFE14D';
            ctx.save();
            ctx.translate(px2, py2);
            ctx.rotate(p.angle);
            ctx.beginPath();
            for (var st2 = 0; st2 < 10; st2++) {
                var sr = st2 % 2 === 0 ? p.r : p.r * 0.5;
                var sa = st2 * Math.PI / 5 - Math.PI / 2;
                if (st2 === 0) ctx.moveTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
                else ctx.lineTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        } else if (p.kind === 2) {
            ctx.fillStyle = '#C77DFF';
            ctx.beginPath();
            ctx.arc(px2, py2, p.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(px2 - p.r * 0.7, py2 - 1.5, p.r * 1.4, 3);
        } else {
            ctx.fillStyle = p.kind === 1 ? '#FF8A3D' : '#FF6B6B';
            ctx.beginPath();
            ctx.arc(px2, py2, p.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    /* orbit buddies */
    if (state !== State.MENU && build.orbit) {
        var ob = build.orbit;
        var os = WEAPONS.orbit.stats(ob.lvl);
        var ocount = os.count + (ob.evolved ? 1 : 0);
        var orad = (78 + os.r) * areaMul() * (ob.evolved ? 1.25 : 1);
        var ospd = os.speed * (ob.evolved ? 1.5 : 1);
        for (var oi2 = 0; oi2 < ocount; oi2++) {
            var oa2 = orbitAngle * ospd / 2.4 + oi2 * Math.PI * 2 / ocount;
            var bx = wx(player.x + Math.cos(oa2) * orad);
            var by = wy(player.y + Math.sin(oa2) * orad);
            ctx.fillStyle = ob.evolved ? '#FFE14D' : '#FF8FC7';
            ctx.beginPath();
            ctx.arc(bx, by, os.r * areaMul(), 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2B2350';
            ctx.beginPath();
            ctx.arc(bx - 4, by - 2, 2.4, 0, Math.PI * 2);
            ctx.arc(bx + 4, by - 2, 2.4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    /* player */
    if (isGiant()) {
        var gr = playerR();
        ctx.fillStyle = 'rgba(255, 225, 77, ' + (0.18 + Math.sin(frame * 0.25) * 0.07) + ')';
        ctx.beginPath();
        ctx.arc(wx(player.x), wy(player.y), gr * 1.45, 0, Math.PI * 2);
        ctx.fill();
    }
    renderWoop(wx(player.x), wy(player.y), playerR(), player.face, !isGiant() && player.iT > 0 && (frame & 4));

    /* particles */
    for (i = 0; i < MAXPART; i++) {
        var pt = parts[i];
        if (!pt.on) continue;
        var a2 = clamp(pt.life / pt.maxLife, 0, 1);
        ctx.globalAlpha = a2;
        ctx.fillStyle = pt.color;
        ctx.beginPath();
        ctx.arc(wx(pt.x) | 0, wy(pt.y) | 0, Math.max(0.5, pt.size * a2), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* damage numbers */
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (i = 0; i < MAXD; i++) {
        var dn = dnums[i];
        if (!dn.on) continue;
        ctx.globalAlpha = clamp(dn.life * 2.2, 0, 1);
        ctx.fillStyle = dn.big ? '#FFE14D' : '#FFFFFF';
        ctx.font = '800 ' + (dn.big ? 22 : 15) + 'px Nunito, sans-serif';
        ctx.fillText(dn.txt, wx(dn.x) | 0, wy(dn.y) | 0);
    }
    ctx.globalAlpha = 1;

    /* joystick */
    if (joyOn) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(joyX, joyY, 52, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(joyX + joyDX * 40, joyY + joyDY * 40, 22, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}
function renderWoop(x, y, r, face, blink) {
    if (blink) return;
    var bob = Math.sin(player.bob) * 2;
    y += bob;
    ctx.fillStyle = '#FF8A3D';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2B2350';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(x - r * 0.32 * face + (face > 0 ? 0 : 0), y - r * 0.15, r * 0.24, 0, Math.PI * 2);
    ctx.arc(x + r * 0.36 * face, y - r * 0.15, r * 0.24, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2B2350';
    ctx.beginPath();
    ctx.arc(x - r * 0.32 * face + r * 0.08 * face, y - r * 0.13, r * 0.12, 0, Math.PI * 2);
    ctx.arc(x + r * 0.36 * face + r * 0.08 * face, y - r * 0.13, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    if (isGiant()) {
        /* chomp mouth: big hungry open-close */
        var chomp = 0.35 + Math.abs(Math.sin(frame * 0.35)) * 0.5;
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.ellipse(x, y + r * 0.35, r * 0.42, r * 0.42 * chomp, 0, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.strokeStyle = '#2B2350';
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        ctx.arc(x, y + r * 0.25, r * 0.4, 0.15 * Math.PI, 0.85 * Math.PI);
        ctx.stroke();
    }
}
var menuT = 0;
function renderMenu() {
    menuT += 0.016;
    /* a little demo woop surrounded by orbiting buddies and wandering goobers */
    var cx = W / 2, cy = H * 0.52;
    for (var i = 0; i < 7; i++) {
        var a = menuT * 0.5 + i * Math.PI * 2 / 7;
        var d = 130 + Math.sin(menuT * 1.3 + i) * 24;
        var gx = cx + Math.cos(a) * d, gy = cy + Math.sin(a) * d * 0.6;
        ctx.fillStyle = ['#7ED957', '#FF8FC7', '#B183FF', '#4FC3F7'][i % 4];
        var rr = 13 + (i % 3) * 4;
        ctx.beginPath();
        ctx.arc(gx, gy, rr * (1 + Math.sin(menuT * 4 + i) * 0.08), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(gx - rr * 0.3, gy - 2, rr * 0.14, 0, Math.PI * 2);
        ctx.arc(gx + rr * 0.3, gy - 2, rr * 0.14, 0, Math.PI * 2);
        ctx.fill();
    }
    for (i = 0; i < 3; i++) {
        var oa = menuT * 2.2 + i * Math.PI * 2 / 3;
        ctx.fillStyle = '#FF8FC7';
        ctx.beginPath();
        ctx.arc(cx + Math.cos(oa) * 60, cy + Math.sin(oa) * 60, 11, 0, Math.PI * 2);
        ctx.fill();
    }
    player.bob = menuT * 4;
    renderWoop(cx, cy, 24, 1, false);
}

/* ================= Input ================= */
var keys = {};
var joyOn = false, joyX = 0, joyY = 0, joyDX = 0, joyDY = 0, joyId = null;

window.addEventListener('keydown', function (e) {
    ensureAudio();
    keys[e.key] = true;
    if (e.key === 'm' || e.key === 'M') { data.muted = !data.muted; saveData(); updateMuteIcon(); return; }
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
        if (state === State.PLAYING || state === State.PAUSED) togglePause();
        return;
    }
    if (state === State.MENU && (e.key === ' ' || e.key === 'Enter')) startRun();
    else if (state === State.OVER && panelShown && (e.key === ' ' || e.key === 'Enter')) startRun();
    else if (state === State.LEVELUP && e.key >= '1' && e.key <= '4') {
        var btns = el.cards.querySelectorAll('.card');
        var idx = +e.key - 1;
        if (btns[idx]) btns[idx].click();
    }
});
window.addEventListener('keyup', function (e) { keys[e.key] = false; });

function canvasPoint(e) {
    var t = e.changedTouches ? e.changedTouches[0] : e;
    return { x: t.clientX, y: t.clientY, id: e.changedTouches ? t.identifier : 'mouse' };
}
function inputDown(e) {
    e.preventDefault();
    ensureAudio();
    if (state === State.MENU) { sfxClick(); startRun(); return; }
    if (state === State.PAUSED) { togglePause(); return; }
    if (state !== State.PLAYING) return;
    var pt = canvasPoint(e);
    joyOn = true;
    joyX = pt.x; joyY = pt.y; joyDX = 0; joyDY = 0; joyId = pt.id;
}
function inputMove(e) {
    if (!joyOn) return;
    e.preventDefault();
    var pt = null;
    if (e.changedTouches) {
        for (var i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joyId) { pt = { x: e.changedTouches[i].clientX, y: e.changedTouches[i].clientY }; break; }
        }
        if (!pt) return;
    } else pt = { x: e.clientX, y: e.clientY };
    var dx = pt.x - joyX, dy = pt.y - joyY;
    var d = Math.sqrt(dx * dx + dy * dy);
    var dead = 8;
    if (d < dead) { joyDX = 0; joyDY = 0; return; }
    var m = Math.min(1, d / 56);
    joyDX = dx / d * m;
    joyDY = dy / d * m;
}
function inputUp(e) {
    if (e && e.changedTouches) {
        var still = false;
        for (var i = 0; i < e.changedTouches.length; i++) if (e.changedTouches[i].identifier === joyId) still = true;
        if (!still) return;
    }
    joyOn = false; joyDX = 0; joyDY = 0;
}
canvas.addEventListener('touchstart', inputDown, { passive: false });
canvas.addEventListener('touchmove', inputMove, { passive: false });
canvas.addEventListener('touchend', inputUp, { passive: false });
canvas.addEventListener('mousedown', inputDown);
window.addEventListener('mousemove', inputMove);
window.addEventListener('mouseup', inputUp);
el.pauseOverlay.addEventListener('touchstart', function (e) { e.preventDefault(); togglePause(); }, { passive: false });
el.pauseOverlay.addEventListener('mousedown', function () { togglePause(); });

el.playBtn.addEventListener('click', function () { ensureAudio(); sfxClick(); startRun(); });
el.muteBtn.addEventListener('click', function () {
    ensureAudio();
    data.muted = !data.muted;
    saveData();
    updateMuteIcon();
    if (!data.muted) sfxClick();
});
el.pauseBtn.addEventListener('click', function () { ensureAudio(); togglePause(); });
function togglePause() {
    if (state === State.PLAYING) {
        state = State.PAUSED;
        el.pauseOverlay.style.display = 'flex';
    } else if (state === State.PAUSED) {
        state = State.PLAYING;
        el.pauseOverlay.style.display = 'none';
        last = performance.now();
    }
}
document.addEventListener('visibilitychange', function () {
    if (document.hidden && state === State.PLAYING) togglePause();
});

/* ================= Shop ================= */
function openShop() {
    el.shopCoins.textContent = data.coins + ' coins';
    el.shopItems.innerHTML = '';
    SHOP.forEach(function (item) {
        var lvl = metaLvl(item.id);
        var row = document.createElement('div');
        row.className = 'shopItem';
        var maxed = lvl >= item.max;
        var cost = maxed ? 0 : item.costs[lvl];
        row.innerHTML = '<span class="ico">' + item.ico + '</span><span class="tx"><div class="nm">' + item.name +
            ' ' + (item.max > 1 ? '(' + lvl + '/' + item.max + ')' : (lvl ? '(owned)' : '')) +
            '</div><div class="ds">' + item.desc + '</div></span>';
        var btn = document.createElement('button');
        btn.textContent = maxed ? 'MAX' : '🪙 ' + cost;
        btn.disabled = maxed || data.coins < cost;
        btn.addEventListener('click', function () {
            if (data.coins < cost) return;
            data.coins -= cost;
            data.meta[item.id] = lvl + 1;
            saveData();
            sfxBuy();
            openShop();
        });
        row.appendChild(btn);
        el.shopItems.appendChild(row);
    });
    el.shopPanel.classList.add('show');
}
el.shopBtnMenu.addEventListener('click', function () { ensureAudio(); sfxClick(); openShop(); });
el.shopBtnOver.addEventListener('click', function () { ensureAudio(); sfxClick(); el.overPanel.classList.remove('show'); openShop(); });
el.shopClose.addEventListener('click', function () {
    ensureAudio();
    sfxClick();
    el.shopPanel.classList.remove('show');
    if (state === State.OVER) el.overPanel.classList.add('show');
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state === State.PLAYING) update(dt);
    else if (state === State.OVER) {
        overTimer += dt;
        update(0); /* let particles settle via render only */
        for (var i = 0; i < MAXPART; i++) {
            var pt = parts[i];
            if (!pt.on) continue;
            pt.life -= dt;
            if (pt.life <= 0) { pt.on = false; continue; }
            pt.x += pt.vx * dt; pt.y += pt.vy * dt;
        }
        if (overTimer > 0.9 && !panelShown) showPanel();
    }
    render();
    requestAnimationFrame(loop);
}
resize();
el.tapHint.style.display = 'block';
el.shopBtnMenu.style.display = 'block';
requestAnimationFrame(loop);
</script>
</body>

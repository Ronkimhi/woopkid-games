<style>
:root{
  --cream:#FFF6E9; --ink:#2B2350; --orange:#FF8A3D;
  --ember:#FF5757; --tide:#4CC9F0; --bloom:#6FDB6F; --spark:#FFD93D;
  --frost:#9BD5FF; --stone:#C9A87C; --gloom:#8B7FD4; --gleam:#FFC2E2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nunito',system-ui,sans-serif;font-weight:800;color:var(--ink);
  background:
    radial-gradient(circle at 20% 10%, #FFE9C9 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, #E6D9FF 0%, transparent 45%),
    linear-gradient(180deg,#FFFBF2,#FFEEDA);
  height:100dvh;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);max-width:560px;margin:0 auto;}
button{font:inherit;color:inherit;cursor:pointer;}

/* top bar */
#topbar{display:flex;align-items:center;gap:6px;padding:9px 10px;flex:0 0 auto;}
.chip{background:var(--ink);color:#fff;border-radius:999px;padding:5px 12px;font-size:13.5px;white-space:nowrap;
  box-shadow:0 2px 0 rgba(43,35,80,.3);}
#backbtn,#mutebtn{width:36px;height:36px;border-radius:12px;border:none;background:var(--ink);color:#fff;font-size:16px;}
#mutebtn{margin-left:auto;}

/* hint */
#hint{text-align:center;font-size:14px;min-height:24px;padding:2px 14px;color:var(--ink);}
#hint b{color:#C2451E;}

/* board */
#board{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 12px;
  align-content:center;justify-items:center;min-height:0;}
.cslot{width:100%;max-width:128px;aspect-ratio:3/4.1;border-radius:16px;position:relative;}
.cslot.empty{border:3px dashed rgba(43,35,80,.25);}

/* THE CARD */
.wcard{
  position:absolute;inset:0;border-radius:16px;cursor:pointer;
  padding:5px;display:flex;flex-direction:column;
  border:3px solid var(--ink);
  box-shadow:0 5px 0 rgba(43,35,80,.32), inset 0 0 0 2px rgba(255,255,255,.55);
  transition:transform .16s cubic-bezier(.34,1.56,.64,1), box-shadow .16s;
  overflow:hidden;
}
.wcard .face{flex:1;background:radial-gradient(circle at 50% 30%, #FFFFFF 0%, #FFF4E2 90%);
  border-radius:10px;border:2px solid rgba(43,35,80,.5);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.wcard .face svg{width:92%;height:92%;}
.wcard .nm{
  text-align:center;font-size:11px;line-height:1.15;padding:3px 2px 1px;color:#fff;
  text-shadow:0 1.5px 0 rgba(43,35,80,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wcard .stats{display:flex;justify-content:space-between;padding:0 3px 2px;font-size:11.5px;color:#fff;
  text-shadow:0 1.5px 0 rgba(43,35,80,.8);}
.wcard .stars{position:absolute;top:7px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:-1px;
  filter:drop-shadow(0 1px 0 rgba(43,35,80,.6));z-index:3;}
.wcard .ebadge{position:absolute;top:6px;right:6px;font-size:13px;z-index:3;
  filter:drop-shadow(0 1px 0 #fff);}
.wcard .fxtag{position:absolute;top:6px;left:6px;font-size:11px;z-index:3;}
/* element frames */
.f-ember{background:linear-gradient(160deg,#FF8A5C,#E63946);}
.f-tide{background:linear-gradient(160deg,#7FDBFF,#2196C9);}
.f-bloom{background:linear-gradient(160deg,#9BE86F,#3E9E4F);}
.f-spark{background:linear-gradient(160deg,#FFE277,#E9A800);}
.f-frost{background:linear-gradient(160deg,#C9E9FF,#5FA8D9);}
.f-stone{background:linear-gradient(160deg,#E0C494,#9C7A4E);}
.f-gloom{background:linear-gradient(160deg,#B0A6EE,#5F4FB8);}
.f-gleam{background:linear-gradient(160deg,#FFD9EC,#E77FB2);}
/* level shine */
.wcard.lv3 .face::after,.wcard.lv4 .face::after,.wcard.lv5 .face::after{
  content:'';position:absolute;top:-60%;left:-60%;width:60%;height:220%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.75),transparent);
  transform:rotate(18deg);animation:shine 3s ease-in-out infinite;}
@keyframes shine{0%,60%,100%{left:-60%}30%{left:120%}}
.wcard.lv5{box-shadow:0 5px 0 rgba(43,35,80,.32), 0 0 14px 3px rgba(255,200,60,.65), inset 0 0 0 2px rgba(255,255,255,.55);}
/* selection */
.wcard.sel{transform:translateY(-10px) scale(1.06) rotate(-2deg);
  box-shadow:0 12px 0 rgba(43,35,80,.28), 0 0 0 4px var(--orange), 0 0 18px 4px rgba(255,138,61,.55);z-index:5;}
.wcard.dealt{animation:dealin .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes dealin{from{transform:translateY(60px) rotate(8deg) scale(.4);opacity:0}to{transform:none;opacity:1}}
.wcard.mergeflash{animation:mflash .55s cubic-bezier(.34,1.56,.64,1);}
@keyframes mflash{0%{transform:scale(.4);filter:brightness(3)}60%{transform:scale(1.18)}100%{transform:scale(1)}}

/* bottom buttons */
#ctl{display:flex;gap:10px;padding:10px 14px calc(12px + env(safe-area-inset-bottom));flex:0 0 auto;}
.bigbtn{flex:1;border:3px solid var(--ink);border-radius:18px;font-size:16.5px;font-weight:800;padding:14px 6px;
  box-shadow:0 5px 0 var(--ink);transition:transform .08s;line-height:1.2;}
.bigbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ink);}
.bigbtn:disabled{opacity:.45;box-shadow:0 5px 0 var(--ink);transform:none;}
#dealbtn{background:linear-gradient(160deg,#FFE277,#FFB13D);}
#fightbtn{background:linear-gradient(160deg,#FF8A5C,#E63946);color:#fff;text-shadow:0 1.5px 0 rgba(43,35,80,.6);}
.bigbtn.pulse{animation:pulse 1.1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}

/* battle overlay */
#battleOv{position:absolute;inset:0;display:none;flex-direction:column;z-index:30;
  background:
    radial-gradient(circle at 50% 0%, #FFD9A8 0%, transparent 55%),
    linear-gradient(180deg,#CDEFFF 0%,#E8FFE0 62%,#D8C9A8 63%,#E8DCC0 100%);}
#battleOv.on{display:flex;}
#bbanner{text-align:center;font-size:17px;padding:12px 10px 2px;min-height:34px;z-index:9;}
#brow-e,#brow-p{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 10px;
  transition:opacity .4s;}
#brow-e.gone,#brow-p.gone{opacity:0;pointer-events:none;}
.bcard{width:104px;aspect-ratio:3/4.1;position:relative;flex:0 0 auto;transition:transform .55s cubic-bezier(.5,0,.5,1), opacity .3s;}
.bcard .wcard{cursor:default;}
.bcard.flying{z-index:7;}
.bcard.spent{opacity:0;}
#vsflash{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);font-size:44px;opacity:.18;pointer-events:none;}
/* arena creatures */
.critter{position:absolute;width:132px;height:132px;z-index:6;
  transition:transform .18s ease, opacity .4s, filter .5s;}
.critter .cin{width:100%;height:100%;animation:bob 1.5s ease-in-out infinite;}
.critter svg{width:100%;height:100%;filter:drop-shadow(0 6px 4px rgba(43,35,80,.22));}
.critter.enemy svg{transform:scaleX(-1);}
.critter.pop .cin{animation:cpop .45s cubic-bezier(.34,1.56,.64,1), bob 1.5s ease-in-out .45s infinite;}
@keyframes cpop{from{transform:scale(.2) rotate(-14deg);opacity:0}to{transform:scale(1);opacity:1}}
.critter.ko{transform:rotate(82deg) translate(8px,20px);filter:grayscale(.9);opacity:.8;
  transition:transform .55s cubic-bezier(.34,1.56,.64,1), filter .55s, opacity .55s;}
.critter.ko .cin{animation:none;}
.critter.winner .cin{animation:hopwin .55s ease-in-out infinite;}
@keyframes hopwin{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px) rotate(-4deg)}}
.boom{position:absolute;font-size:38px;z-index:8;animation:boomz .5s ease-out forwards;pointer-events:none;
  filter:drop-shadow(0 2px 0 rgba(43,35,80,.4));}
@keyframes boomz{from{transform:scale(.3) rotate(-20deg);opacity:1}to{transform:scale(1.7) rotate(10deg);opacity:0}}
.dizzy{position:absolute;font-size:24px;z-index:9;animation:dizz 1.4s ease-in-out infinite;pointer-events:none;}
@keyframes dizz{0%,100%{transform:rotate(-14deg) translateY(0)}50%{transform:rotate(14deg) translateY(-6px)}}
#finishflash{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:10;
  font-size:44px;font-weight:800;color:#fff;-webkit-text-stroke:2px var(--ink);text-shadow:0 4px 0 rgba(43,35,80,.35);
  pointer-events:none;}
#finishflash.on{display:flex;animation:finpop .7s cubic-bezier(.34,1.56,.64,1);}
@keyframes finpop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
.dmg{position:absolute;font-weight:800;color:#E63946;text-shadow:0 2px 0 #fff;z-index:40;
  animation:rise .85s ease-out forwards;pointer-events:none;font-size:17px;}
.dmg.pow{color:#fff;-webkit-text-stroke:1.5px var(--ink);font-size:24px;}
@keyframes rise{from{transform:translateY(0)}to{transform:translateY(-52px) scale(1.3);opacity:0}}

/* generic overlay + card reveal */
.overlay{position:absolute;inset:0;background:rgba(43,35,80,.88);display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:50;color:#fff;text-align:center;padding:18px;}
.overlay.on{display:flex;}
.ocard{background:var(--cream);color:var(--ink);border:4px solid var(--ink);border-radius:22px;
  padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:330px;width:100%;
  animation:popin .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.bigtitle{font-size:20px;color:#FFD93D;text-shadow:0 2px 0 rgba(43,35,80,.8);letter-spacing:.5px;}
#revealslot{width:150px;aspect-ratio:3/4.1;position:relative;}
.namechips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.namechip{border:3px solid var(--ink);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:800;}
.namechip.sel{background:var(--orange);color:#fff;}
.okbtn{border:3px solid var(--ink);background:var(--bloom);border-radius:15px;font-size:16px;font-weight:800;
  padding:11px 30px;box-shadow:0 4px 0 var(--ink);}
.okbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
.subtxt{font-size:12.5px;opacity:.85;}
.shakeit{animation:shake .12s linear infinite;}
@keyframes shake{0%{transform:translate(1px,-1px)}50%{transform:translate(2px,2px)}100%{transform:translate(-1px,1px)}}
.confetti{position:absolute;width:9px;height:9px;border-radius:2px;z-index:80;pointer-events:none;}
@keyframes confall{from{transform:translateY(-8px) rotate(0);opacity:1}to{transform:translateY(150px) rotate(540deg);opacity:0}}
@media (prefers-reduced-motion:reduce){
  .wcard.lv3 .face::after,.wcard.lv4 .face::after,.wcard.lv5 .face::after{animation:none;}
  .shakeit{animation:none;}
}
@media (orientation:landscape) and (max-height:500px){
  #board{grid-template-columns:repeat(5,1fr);}
  #app{max-width:900px;}
}
</style>

<script>
'use strict';
/* =====================================================================
   WoopBeasts v2 "CARDS": one screen. Tap two cards to merge.
   Same card = level up. Different cards = brand-new fused species.
   Then BATTLE. Design: docs/research/woopbeasts/ (simplified per Ron).
   ===================================================================== */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const INK='#2B2350';

/* ---------- WoopProfile (shared contract, verbatim) ---------- */
const WoopProfile={
  KEY:'woopkid_profile',
  load(){try{return JSON.parse(localStorage.getItem(this.KEY))||this._blank();}catch{return this._blank();}},
  _blank(){return {totalPlays:0,games:{},stickers:[],streak:{current:0,best:0,lastDay:null}};},
  save(p){try{localStorage.setItem(this.KEY,JSON.stringify(p));}catch{}},
  reportRun(slug,score,th){
    const p=this.load();p.totalPlays++;
    const g=p.games[slug]||(p.games[slug]={best:0,plays:0,lastPlayed:null});
    g.plays++;g.lastPlayed=new Date().toISOString().slice(0,10);
    if(score>g.best)g.best=score;
    const earned=[];
    for(const t of ['bronze','silver','gold']){const id=slug+'-'+t;
      if(score>=th[t]&&!p.stickers.includes(id)){p.stickers.push(id);earned.push(t);}}
    const today=new Date().toISOString().slice(0,10);
    if(p.streak.lastDay!==today){const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
      p.streak.current=(p.streak.lastDay===y)?p.streak.current+1:1;
      if(p.streak.current>p.streak.best)p.streak.best=p.streak.current;p.streak.lastDay=today;}
    this.save(p);return earned;
  }
};

/* ---------- data ---------- */
const EL={
  ember:{c:'#FF5757',i:'🔥'},tide:{c:'#4CC9F0',i:'🌊'},bloom:{c:'#6FDB6F',i:'🌿'},spark:{c:'#FFD93D',i:'⚡'},
  frost:{c:'#9BD5FF',i:'❄️'},stone:{c:'#C9A87C',i:'🪨'},gloom:{c:'#8B7FD4',i:'🌑'},gleam:{c:'#FFC2E2',i:'✨'}
};
const CHART={ember:{bloom:2,frost:2,tide:.5,stone:.5},tide:{ember:2,stone:2,bloom:.5,spark:.5},
  bloom:{tide:2,stone:2,ember:.5,frost:.5},spark:{tide:2,gleam:2,stone:.5,gloom:.5},
  frost:{bloom:2,gloom:2,ember:.5,gleam:.5},stone:{ember:2,spark:2,tide:.5,bloom:.5},
  gloom:{spark:2,gleam:2,frost:.5},gleam:{gloom:2,frost:2,spark:.5}};
/* species: [key, name, element, visual kit, atk, hp]. Unlock order = array order. */
const ROSTER=[
  ['emberling','Emberling','ember',{p:'bruiser',hg:'horn',eye:'angry',cw:'seams',aw:'fists',lg:'power',tl:'plasma'},14,42],
  ['tidepup','Tidepup','tide',{p:'tank',hg:'ears',eye:'hero',cw:'core',lg:'power',tl:'cable'},10,58],
  ['sproutle','Sproutle','bloom',{p:'tank',hg:'horn',eye:'hero',cw:'armor',lg:'power',tl:'stub'},9,62],
  ['zapling','Zapling','spark',{p:'sprinter',hg:'antenna',eye:'hero',cw:'seams',bw:'jet',lg:'hover',tl:'cable'},16,36],
  ['frostfin','Frostfin','frost',{p:'tank',eye:'visor',cw:'armor',bw:'fins',lg:'power',tl:'blade'},11,56],
  ['boulderox','Boulderox','stone',{p:'bruiser',hg:'horn',eye:'angry',cw:'armor',aw:'fists',lg:'power'},17,44],
  ['shadewisp','Shadewisp','gloom',{p:'sprinter',eye:'shades',cw:'seams',bw:'wings',lg:'hover',tl:'cable'},18,34],
  ['voltibit','Voltibit','spark',{p:'sprinter',eye:'cyber',cw:'core',aw:'mech',lg:'hover',tl:'cable'},15,40],
  ['petalpuff','Petalpuff','bloom',{p:'sprinter',hg:'antenna',eye:'star',cw:'seams',bw:'wings',lg:'hover'},12,48],
  ['charbit','Charbit','ember',{p:'sprinter',hg:'mohawk',eye:'hero',bw:'jet',lg:'hover',tl:'plasma'},15,38],
  ['glacigon','Glacigon','frost',{p:'tank',hg:'horn',eye:'hero',cw:'armor',bw:'fins',aw:'fists',lg:'power'},12,54],
  ['lumibit','Lumibit','gleam',{p:'sprinter',hg:'antenna',eye:'star',cw:'core',bw:'wings',lg:'hover'},13,46]
];
const SP={}; ROSTER.forEach(r=>SP[r[0]]={key:r[0],n:r[1],e:r[2],kit:r[3],atk:r[4],hp:r[5]});
const PREFIX={ember:['Char','Pyro','Blaze'],tide:['Aqua','Bub','Wave'],bloom:['Sprout','Fern','Petal'],
  spark:['Zap','Volt','Jolt'],frost:['Chill','Glaci','Snow'],stone:['Peb','Crag','Rock'],
  gloom:['Shade','Grim','Spook'],gleam:['Lumi','Shine','Glow']};
const SUFFIX=['ox','ling','bit','gon','pup','wisp','rex','tron','bot'];

/* ---------- save ---------- */
const KEY='woopkid_woop-beasts';
function fresh(){return {v:2,coins:40,wins:0,board:[],dex:{},nextId:1,muted:false,dealt:0,lastSeen:null};}
let S;
try{S=JSON.parse(localStorage.getItem(KEY));}catch{S=null;}
if(!S||S.v!==2) S=fresh();
function save(){S.lastSeen=Date.now();try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}

/* ---------- audio ---------- */
let AC=null,voices=0;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch{}}
  if(AC&&AC.state==='suspended')AC.resume();return AC;}
function note(f,d,dur,type,vol){
  if(S.muted||!ac()||voices>5)return;
  try{voices++;const t=AC.currentTime+d,o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=f*(0.95+Math.random()*0.1);
  g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.15,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur+0.02);o.onended=()=>{voices--;};}catch{voices--;}
}
const sfx={
  tap:()=>note(660,0,0.06,'square',0.06),
  deal:()=>{[440,660].forEach((f,i)=>note(f,i*0.06,0.12,'triangle',0.12));},
  levelup:t=>{[523,659,784].forEach((f,i)=>note(f*(1+t*0.08),i*0.07,0.16,'triangle',0.14));},
  discover:()=>{[523,659,784,1047,1319].forEach((f,i)=>note(f,i*0.09,0.22,'triangle',0.16));},
  hit:()=>note(220+Math.random()*60,0,0.07,'triangle',0.09),

/* ---------- creature SVG (procedural CreatureFactory, compact) ---------- */
function beastSVG(c){
  const seed=c.seed||1,r=mulberry32(seed);
  const P=EL[c.e].c, G=c.e2?EL[c.e2].c:'#FFD93D', STEEL='#98A2B8', DARK='#5C6678';
  const k=c.kit||{};
  const mus=clamp(0.85+c.lv*0.09,0.85,1.3), fr=clamp(0.9+(c.hp0||45)/300,0.9,1.12);
  const PH={tank:{sh:25,wa:16,th:28,leg:11,arm:7,hd:12},sprinter:{sh:20,wa:11,th:24,leg:17,arm:5.5,hd:11},
    bruiser:{sh:22,wa:14,th:24,leg:11,arm:9,hd:11}}[k.p]||{sh:23,wa:14,th:26,leg:12,arm:7,hd:11};
  const sh=PH.sh*fr,wa=PH.wa*fr,th=PH.th,leg=PH.leg,arm=PH.arm*mus,hd=PH.hd;

  s+=`<ellipse cx="50" cy="${FY+7}" rx="${sh+6}" ry="3.5" fill="${INK}" opacity="0.12"/>`;

  if(k.bw==='wings') s+=`<path d="M ${50-sh+2} ${TY+6} q -24 -14 -28 8 q 15 -3 28 7 z" fill="${G}" opacity="0.38" stroke="${G}" stroke-width="2"/><path d="M ${50+sh-2} ${TY+6} q 24 -14 28 8 q -15 -3 -28 7 z" fill="${G}" opacity="0.38" stroke="${G}" stroke-width="2"/>`;
  if(k.bw==='fins'){for(let i=-1;i<=1;i++)s+=`<path d="M ${50+i*sh*0.55} ${TY-1} l -4 -8 l 8 0 z" fill="${G}" stroke="${INK}" stroke-width="2.5"/>`;}
  const tx=50+wa*0.9,tyy=BY-3;
  if(k.tl==='plasma') s+=`<path d="M ${tx} ${tyy} q 14 -2 12 -14 q 3 7 8 5 q -2 12 -14 14 z" fill="#FF8A3D" stroke="${INK}" stroke-width="3"/>`;
  if(k.tl==='cable'){for(let i=0;i<3;i++)s+=`<circle cx="${tx+6+i*6.5}" cy="${tyy-i*4}" r="${5-i*1.1}" fill="${STEEL}" stroke="${INK}" stroke-width="2.5"/>`;s+=`<circle cx="${tx+19}" cy="${tyy-8}" r="1.6" fill="${G}"/>`;}
  if(k.tl==='blade') s+=`<path d="M ${tx} ${tyy} l 13 -4 l -2 -7 l 8 6 l -4 9 z" fill="${STEEL}" stroke="${INK}" stroke-width="2.5"/>`;
  if(k.tl==='stub') s+=`<circle cx="${tx+4}" cy="${tyy}" r="4.5" fill="${P}" stroke="${INK}" stroke-width="3"/>`;

  const pd=5+mus*3;

  if(k.cw==='core'){const cr=5+c.lv;s+=`<circle cx="50" cy="${cy2}" r="${cr+3}" fill="${G}" opacity="0.3"/><circle cx="50" cy="${cy2}" r="${cr}" fill="${G}" stroke="${INK}" stroke-width="3"/><circle cx="50" cy="${cy2}" r="${cr*0.42}" fill="#fff" opacity="0.95"/>`;}
  if(k.cw==='armor'){s+=`<rect x="${50-wa*0.95}" y="${TY+5}" width="${wa*1.9}" height="${th*0.48}" rx="5" fill="${STEEL}" stroke="${INK}" stroke-width="3"/>`;for(const rx of [-0.6,0,0.6])s+=`<circle cx="${50+rx*wa*0.8}" cy="${TY+5+th*0.24}" r="1.7" fill="${INK}" opacity="0.6"/>`;}

  if(k.hg==='antenna')for(const d of [-0.5,0.5])s+=`<line x1="${50+d*hd}" y1="${HY-hd*0.8}" x2="${50+d*hd*1.4}" y2="${HY-hd*1.7}" stroke="${INK}" stroke-width="2.5"/><circle cx="${50+d*hd*1.4}" cy="${HY-hd*1.7}" r="3" fill="${G}" stroke="${INK}" stroke-width="2.5"/>`;
  if(k.hg==='ears')for(const d of [-1,1])s+=`<ellipse cx="${50+d*hd*0.62}" cy="${HY-hd*0.95}" rx="4.5" ry="8.5" fill="${P}" stroke="${INK}" stroke-width="3"/>`;
  if(k.hg==='mohawk')s+=`<path d="M ${50-hd*0.55} ${HY-hd*0.7} q ${hd*0.55} ${-hd*1.1} ${hd*1.1} 0 z" fill="${G}" stroke="${INK}" stroke-width="3"/>`;
  const exo=hd*0.42,eyo=HY-1;
  if(k.eye==='visor'){s+=`<rect x="${50-hd*0.78}" y="${eyo-4.5}" width="${hd*1.56}" height="9" rx="4.5" fill="${G}" stroke="${INK}" stroke-width="3"/><rect x="${50-hd*0.45}" y="${eyo-2}" width="6" height="3.5" rx="1.5" fill="#fff"/><rect x="${50+hd*0.12}" y="${eyo-2}" width="6" height="3.5" rx="1.5" fill="#fff"/>`;}
  else if(k.eye==='shades'){s+=`<rect x="${50-hd*0.8}" y="${eyo-4}" width="${hd*1.6}" height="8" rx="4" fill="${INK}"/><line x1="${50-hd*0.5}" y1="${eyo-2}" x2="${50-hd*0.15}" y2="${eyo-2}" stroke="${G}" stroke-width="2"/>`;}
  else if(k.eye==='cyber'){s+=`<ellipse cx="${50-exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/><circle cx="${50-exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/><rect x="${50+exo-5}" y="${eyo-4.5}" width="10" height="8.5" rx="2.5" fill="${G}" stroke="${INK}" stroke-width="2.5"/><circle cx="${50+exo}" cy="${eyo-0.5}" r="2" fill="#fff"/>`;}
  else if(k.eye==='star'){for(const d of [-1,1])s+=`<path d="M ${50+d*exo} ${eyo-4.5} l 1.4 3 l 3.2 .4 l -2.3 2.2 l .6 3.2 l -2.9 -1.6 l -2.9 1.6 l .6 -3.2 l -2.3 -2.2 l 3.2 -.4 z" fill="${INK}"/>`;}
  else{s+=`<ellipse cx="${50-exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/><ellipse cx="${50+exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/><circle cx="${50-exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/><circle cx="${50+exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/>`;
    if(k.eye==='angry')s+=`<line x1="${50-exo-4}" y1="${eyo-6.5}" x2="${50-exo+3}" y2="${eyo-4.5}" stroke="${INK}" stroke-width="2.8" stroke-linecap="round"/><line x1="${50+exo+4}" y1="${eyo-6.5}" x2="${50+exo-3}" y2="${eyo-4.5}" stroke="${INK}" stroke-width="2.8" stroke-linecap="round"/>`;}

/* ---------- cards ---------- */
const BOARD_SIZE=9;
function newCard(spKey){
  const sp=SP[spKey];
  return {id:S.nextId++, sp:spKey, name:sp.n, e:sp.e, e2:null, lv:1,
    atk:sp.atk, hp:sp.hp, hp0:sp.hp, kit:sp.kit, seed:(Math.random()*1e9)|0, fused:false};
}
function poolSize(){ return clamp(4+Math.floor(S.wins/2),4,ROSTER.length); }
function dealCost(){ return 25+Math.floor(S.dealt/4)*10; }
function cardPower(c){ return c.atk*2+c.hp; }
function registerDex(c,name){
  const k=c.fused?('fx_'+c.sp):c.sp;
  if(!S.dex[k]){ S.dex[k]=name||c.name; return true; }
  return false;
}
function dexCount(){ return Object.keys(S.dex).length; }

/* card HTML */
function cardHTML(c,extra){
  const stars='⭐'.repeat(c.lv);
  return `<div class="wcard f-${c.e} lv${c.lv} ${extra||''}" data-cid="${c.id}">
    <div class="stars">${stars}</div>
    ${c.fused?'<div class="fxtag">🧬</div>':''}
    <div class="ebadge">${EL[c.e].i}${c.e2?EL[c.e2].i:''}</div>
    <div class="face">${beastSVG(c)}</div>
    <div class="nm">${c.name}</div>
    <div class="stats"><span>⚔️${c.atk}</span><span>❤️${c.hp}</span></div>
  </div>`;
}

/* ---------- board render + merge interaction ---------- */
let selId=null;
function renderBoard(dealtId){
  const b=$('board');
  let html='';
  for(let i=0;i<BOARD_SIZE;i++){
    const c=S.board[i];
    html+=`<div class="cslot ${c?'':'empty'}">${c?cardHTML(c,(c.id===dealtId?'dealt ':'')+(c.id===selId?'sel':'')):''}</div>`;
  }
  b.innerHTML=html;
  b.querySelectorAll('.wcard').forEach(el=>el.addEventListener('click',()=>tapCard(+el.dataset.cid)));
  $('hudCoins').textContent=S.coins;
  $('hudWins').textContent=S.wins;
  $('hudDex').textContent=dexCount();
  $('mutebtn').textContent=S.muted?'🔇':'🔊';
  const full=S.board.length>=BOARD_SIZE;
  $('dealbtn').disabled=full||S.coins<dealCost();
  $('dealbtn').innerHTML=`🃏 NEW CARD<br><span style="font-size:12px">${full?'BOARD FULL':dealCost()+' 🪙'}</span>`;
  $('fightbtn').disabled=S.board.length===0;
  $('dealbtn').classList.remove('pulse');$('fightbtn').classList.remove('pulse');
  if(!full&&S.coins>=dealCost()&&S.board.length<3) $('dealbtn').classList.add('pulse');
  else if(S.board.length) $('fightbtn').classList.add('pulse');
}
function hint(t){$('hint').innerHTML=t;}
function tapCard(id){
  sfx.tap();
  const c=S.board.find(x=>x.id===id);
  if(!c) return;
  if(selId===null){ selId=id; renderBoard(); hint('Now tap a <b>second card</b>: same = LEVEL UP, different = NEW BEAST! 🧬'); return; }
  if(selId===id){ selId=null; renderBoard(); hint('Tap two cards to merge them!'); return; }
  const a=S.board.find(x=>x.id===selId);
  selId=null;
  mergeCards(a,c);
}
function mergeCards(a,b){
  const sameSpecies=a.sp===b.sp&&a.fused===b.fused;
  if(sameSpecies){
    if(a.lv!==b.lv){ hint('Match the <b>star levels</b> to level up! (Different beasts always fuse)'); sfx.no(); renderBoard(); return; }
    if(a.lv>=5){ hint('MAX LEVEL! Merge it with a <b>different</b> beast to fuse 🧬'); sfx.no(); renderBoard(); return; }
    const nc={...a, id:S.nextId++, lv:a.lv+1,
      atk:Math.round(a.atk*1.5), hp:Math.round(a.hp*1.5), hp0:Math.round(a.hp*1.5)};
    S.board=S.board.filter(x=>x.id!==a.id&&x.id!==b.id);
    S.board.push(nc);
    sfx.levelup(nc.lv); confetti(16); shake(160);
    save(); renderBoard();
    const el=document.querySelector(`.wcard[data-cid="${nc.id}"]`);
    if(el) el.classList.add('mergeflash');
    hint(`⭐ ${nc.name} is now <b>Level ${nc.lv}</b>! Stronger and shinier!`);
  } else {
    /* FUSION: first tap = head (face + element), second = body (build + widgets) */
    const key=a.sp+'__'+b.sp;
    const ak=a.kit||{}, bk=b.kit||{};
    const kit={p:bk.p, hg:ak.hg, eye:ak.eye, cw:bk.cw, bw:bk.bw, aw:bk.aw, lg:bk.lg, tl:bk.tl};
    const nc={id:S.nextId++, sp:key, name:'???', e:a.e, e2:b.e!==a.e?b.e:(b.e2&&b.e2!==a.e?b.e2:null),
      lv:Math.max(a.lv,b.lv),
      atk:Math.round((a.atk+b.atk)*0.65), hp:Math.round((a.hp+b.hp)*0.65), hp0:Math.round((a.hp+b.hp)*0.65),
      kit, seed:(a.seed^b.seed)>>>0||7, fused:true};
    S.board=S.board.filter(x=>x.id!==a.id&&x.id!==b.id);
    const dexKey='fx_'+key;
    const isNew=!S.dex[dexKey];
    if(!isNew) nc.name=S.dex[dexKey];
    pendingCard=nc;
    if(isNew){
      const r=mulberry32(nc.atk+nc.hp);
      const port=(a.name.slice(0,Math.ceil(a.name.length/2))+b.name.slice(Math.floor(b.name.length/2)).toLowerCase()).slice(0,12);
      const ideas=[port,
        PREFIX[nc.e][(r()*3)|0]+SUFFIX[(r()*SUFFIX.length)|0],
        PREFIX[nc.e2||nc.e][(r()*3)|0]+SUFFIX[(r()*SUFFIX.length)|0]];
      nc.name=ideas[0];
      $('revealTitle').textContent='✨ NEW BEAST CREATED! ✨';
      $('revealSub').textContent='Pick a name:';
      $('namechips').style.display='flex';
      $('namechips').innerHTML=ideas.map((n,i)=>`<button class="namechip${i===0?' sel':''}">${n}</button>`).join('');
      $('namechips').querySelectorAll('.namechip').forEach(ch=>ch.addEventListener('click',()=>{
        $('namechips').querySelectorAll('.namechip').forEach(x=>x.classList.remove('sel'));
        ch.classList.add('sel'); pendingCard.name=ch.textContent;
        $('revealslot').innerHTML=cardHTML(pendingCard);
      }));
      sfx.discover();
    } else {
      $('revealTitle').textContent='🧬 FUSED!';
      $('revealSub').textContent='';
      $('namechips').style.display='none';
      sfx.levelup(3);
    }
    $('revealslot').innerHTML=cardHTML(nc,'mergeflash');
    confetti(24); shake(220);
    $('revealOv').classList.add('on');
    save(); renderBoard();
  }
}
let pendingCard=null;
$('revealOk').addEventListener('click',()=>{
  if(!pendingCard) return;
  const isNew=registerDex(pendingCard,pendingCard.name);
  S.board.push(pendingCard);
  pendingCard=null;
  $('revealOv').classList.remove('on');
  if(isNew) stickerCheck();
  save(); renderBoard();
  hint('Your new beast is on the board! <b>BATTLE</b> time? ⚔️');
});

/* ---------- deal ---------- */
$('dealbtn').addEventListener('click',()=>{
  if(S.board.length>=BOARD_SIZE||S.coins<dealCost()) return;
  S.coins-=dealCost(); S.dealt++;
  /* pity: 55% deal a species already on board so pairs keep forming */
  const pool=ROSTER.slice(0,poolSize()).map(r=>r[0]);
  const owned=[...new Set(S.board.filter(c=>!c.fused).map(c=>c.sp))].filter(k=>pool.includes(k));
  const key=(owned.length&&Math.random()<0.55)?owned[(Math.random()*owned.length)|0]:pool[(Math.random()*pool.length)|0];
  const c=newCard(key);
  S.board.push(c);
  if(registerDex(c)) stickerCheck();
  sfx.deal();
  save(); renderBoard(c.id);
  const same=S.board.filter(x=>x.sp===c.sp&&!x.fused&&x.lv===c.lv).length;
  hint(same>=2?`${c.name}! You have a pair: <b>tap both to LEVEL UP!</b> ⭐`:`${c.name} joined! Merge two <b>different</b> cards to invent a new beast 🧬`);
});

/* ---------- battle: 3 acts. Cards fly to the arena, BECOME creatures,
   brawl ~15s with no scoreboard, then the winner is revealed. ---------- */
let bat=null;
const PSLOTS=[[0.28,0.55],[0.14,0.68],[0.42,0.70]];   // my side (fractions of overlay)
const ESLOTS=[[0.72,0.55],[0.86,0.68],[0.58,0.70]];   // enemy side
function makeFoes(team){
  const target=team.reduce((s,f)=>s+cardPower(f.c),0)*(S.wins===0?0.55:clamp(0.8+S.wins*0.03,0.8,1.15));
  const per=target/3;
  const pool=ROSTER.slice(0,poolSize());
  const foes=[];
  for(let i=0;i<3;i++){
    const r=pool[(Math.random()*pool.length)|0];
    const base=SP[r[0]], ratio=Math.max(0.4,per/(base.atk*2+base.hp));
    const c={id:9000+i, sp:r[0], name:base.n, e:base.e, e2:null,
      lv:clamp(Math.round(ratio),1,5),
      atk:Math.max(4,Math.round(base.atk*ratio)), hp:Math.max(12,Math.round(base.hp*ratio)),
      hp0:base.hp, kit:base.kit, seed:777+S.wins*13+i, fused:false};
    foes.push({c,hp:c.hp,max:c.hp});
  }
  return foes;
}
/* silent pre-sim: decides the winner up front and records every hit for the choreography */
function presim(team,foes){
  const T=team.map(f=>({...f})), F=foes.map(f=>({...f}));
  const hits=[]; let turn=0;
  while(turn<400){
    const Ta=T.filter(f=>f.hp>0), Fa=F.filter(f=>f.hp>0);
    if(!Ta.length||!Fa.length) break;
    const my=turn%2===0;
    const att=(my?Ta:Fa)[0], def=(my?Fa:Ta)[0];
    const m=(CHART[att.c.e]||{})[def.c.e]||1;
    const dmg=Math.max(Math.ceil(att.c.atk*0.5), Math.round(att.c.atk*m - def.c.atk*0.15));
    def.hp-=dmg;
    hits.push({side:my?'p':'e', ai:(my?T:F).indexOf(my?att:att), di:(my?F:T).indexOf(def), dmg, pow:m>=2});
    turn++;
  }
  return {hits, won:T.some(f=>f.hp>0)};
}
function bT(ms,fn){ bat.timers.push(setTimeout(()=>{ if(bat) fn(); },ms)); }
$('fightbtn').addEventListener('click',()=>{
  if(!S.board.length||bat) return;
  sfx.tap();
  const team=[...S.board].sort((x,y)=>cardPower(y)-cardPower(x)).slice(0,3)
    .map(c=>({c,hp:c.hp,max:c.hp}));
  const foes=makeFoes(team);
  bat={team,foes,sim:presim(team,foes),critters:{},timers:[],over:false};
  $('brow-p').classList.remove('gone'); $('brow-e').classList.remove('gone');
  $('brow-p').style.display=''; $('brow-e').style.display='';
  $('brow-p').innerHTML=team.map((f,i)=>`<div class="bcard" data-b="p${i}">${cardHTML(f.c)}</div>`).join('');
  $('brow-e').innerHTML=foes.map((f,i)=>`<div class="bcard" data-b="e${i}">${cardHTML(f.c)}</div>`).join('');
  $('bbanner').textContent='⚔️ Battle '+(S.wins+1);
  $('bdone').style.display='none';
  $('finishflash').classList.remove('on');
  $('battleOv').classList.add('on');
  bT(900,flyIn);
});
/* ACT 1: cards fly to the arena and burst into creatures */
function flyIn(){
  const ov=$('battleOv'); let ovr=ov.getBoundingClientRect();
  if(ovr.width<50||ovr.height<50){ // never-painted tab safety: fall back to viewport
    const ar=$('app').getBoundingClientRect();
    ovr=(ar.width>50)?ar:{left:0,top:0,width:window.innerWidth,height:window.innerHeight};
  }
  if(!(ovr.width>50)) ovr={left:0,top:0,width:390,height:700}; // absolute floor
  const CS=Math.min(140,ovr.width*0.30); // creature size
  bat.slotPx={p:[],e:[]};
  const doSide=(side,fighters,slots)=>{
    fighters.forEach((f,i)=>{
      const cardEl=document.querySelector(`.bcard[data-b="${side}${i}"]`);
      const cx=ovr.width*slots[i][0], cy=ovr.height*slots[i][1];
      bat.slotPx[side][i]=[cx,cy];
      if(cardEl){
        const r=cardEl.getBoundingClientRect();
        const dx=(ovr.left+cx)-(r.left+r.width/2), dy=(ovr.top+cy)-(r.top+r.height/2);
        cardEl.classList.add('flying');
        cardEl.style.transform=`translate(${dx}px,${dy}px) rotate(${side==='p'?360:-360}deg) scale(.45)`;
      }
      bT(620,()=>{
        if(cardEl) cardEl.classList.add('spent');
        const d=document.createElement('div');
        d.className='critter pop'+(side==='e'?' enemy':'');
        d.style.width=d.style.height=CS+'px';
        d.style.left=(cx-CS/2)+'px'; d.style.top=(cy-CS/2)+'px';
        d.innerHTML=`<div class="cin">${beastSVG(f.c)}</div>`;
        ov.appendChild(d);
        bat.critters[side+i]=d;
        boom(cx,cy-10,'✨');
        bT(650,()=>d.classList.remove('pop')); // un-stick if animations were throttled
      });
    });
  };
  doSide('p',bat.team,PSLOTS);
  doSide('e',bat.foes,ESLOTS);
  sfx.deal();
  bT(1300,()=>{
    $('brow-p').classList.add('gone'); $('brow-e').classList.add('gone');
    $('bbanner').textContent='FIGHT!';
    sfx.pow(); shake(180);
    bT(400,choreo);
  });
  bT(1900,()=>{ $('brow-p').style.display='none'; $('brow-e').style.display='none'; }); // hard-hide (fade can freeze on throttled tabs)
}
/* ACT 2: ~10.5s of exchanges, both directions, NO scoreboard, no KOs yet */
function choreo(){
  let hits=bat.sim.hits.slice();
  if(hits.length>24){ const step=hits.length/24, out=[]; for(let i=0;i<24;i++) out.push(hits[Math.floor(i*step)]); hits=out; }
  while(hits.length<14) hits.push(hits[(Math.random()*hits.length)|0]);
  const iv=10500/hits.length;
  hits.forEach((h,idx)=>bT(600+idx*iv,()=>playHit(h)));
  bT(4200,()=>{ $('bbanner').textContent='What a fight!! 😮'; });
  bT(8200,()=>{ $('bbanner').textContent='It could go either way…!'; });
  bT(600+10500+300,finale);
}
function boom(x,y,txt){
  const b=document.createElement('div');
  b.className='boom'; b.textContent=txt;
  b.style.left=(x-19)+'px'; b.style.top=(y-19)+'px';
  $('battleOv').appendChild(b); setTimeout(()=>b.remove(),520);
}
function playHit(h){
  const attKey=h.side+h.ai, defKey=(h.side==='p'?'e':'p')+h.di;
  const att=bat.critters[attKey], def=bat.critters[defKey];
  const aPos=bat.slotPx[h.side][h.ai], dPos=bat.slotPx[h.side==='p'?'e':'p'][h.di];
  if(!att||!def||!aPos||!dPos) return;
  const dx=(dPos[0]-aPos[0])*0.55, dy=(dPos[1]-aPos[1])*0.55;
  att.style.transform=`translate(${dx}px,${dy}px) scale(1.08)`;
  setTimeout(()=>{ att.style.transform=''; },190);
  setTimeout(()=>{
    boom(dPos[0],dPos[1],h.pow?'💥':'⭐');
    def.style.transform=`translate(${(Math.random()*14-7)|0}px,${(Math.random()*10-5)|0}px) rotate(${(Math.random()*10-5)|0}deg)`;
    setTimeout(()=>{ def.style.transform=''; },200);
    const d=document.createElement('div');
    d.className='dmg'+(h.pow?' pow':''); d.textContent=(h.pow?'POW! ':'')+h.dmg;
    d.style.left=(dPos[0]-14)+'px'; d.style.top=(dPos[1]-46)+'px';
    $('battleOv').appendChild(d); setTimeout(()=>d.remove(),880);
    if(h.pow) sfx.pow(); else sfx.hit();
  },170);
}
/* ACT 3: the dramatic reveal */
function finale(){
  const won=bat.sim.won;
  $('bbanner').textContent='';
  $('finishflash').textContent='⚡ FINISH! ⚡';
  $('finishflash').classList.add('on');
  sfx.pow(); shake(260);
  bT(950,()=>{
    $('finishflash').classList.remove('on');
    const losers=won?'e':'p', winners=won?'p':'e';
    for(let i=0;i<3;i++){
      const L=bat.critters[losers+i];
      if(L){ L.classList.add('ko');
        const z=document.createElement('div'); z.className='dizzy'; z.textContent='😵';
        const pos=bat.slotPx[losers][i];
        z.style.left=(pos[0]-12)+'px'; z.style.top=(pos[1]-70)+'px';
        $('battleOv').appendChild(z); bat.fxEls=(bat.fxEls||[]).concat(z);
      }
      const W=bat.critters[winners+i];
      if(W) W.classList.add('winner');
    }
    if(won){ confetti(26); sfx.win(); } else sfx.lose();
    bT(1500,()=>battleEnd(won));
  });
}
function battleEnd(won){
  if(!bat||bat.over) return;
  bat.over=true;
  const before=poolSize();
  const reward=won?30+10*S.wins:12;
  S.coins+=reward;
  if(won) S.wins++;
  const unlockedNew=won&&poolSize()>before;
  $('bbanner').innerHTML=won
    ?`🎉 VICTORY! +${reward} 🪙${unlockedNew?' · <b>NEW beast joined the deck!</b>':''}`
    :`💪 SO CLOSE! +${reward} 🪙 · Level up your cards!`;
  $('bdone').style.display='block';
  stickerCheck();
  save();
}
$('bdone').addEventListener('click',()=>{
  if(bat){ bat.timers.forEach(clearTimeout); (bat.fxEls||[]).forEach(e=>e.remove()); }
  document.querySelectorAll('#battleOv .critter').forEach(e=>e.remove());
  $('battleOv').classList.remove('on');
  bat=null;
  renderBoard();
  hint(S.coins>=dealCost()&&S.board.length<BOARD_SIZE?'Grab a <b>NEW CARD</b> and keep merging! 🃏':'Merge your cards, then battle again! ⚔️');
});

/* ---------- stickers (WoopProfile; score = beasts discovered) ---------- */
function stickerCheck(){
  const earned=WoopProfile.reportRun('woop-beasts',dexCount(),{bronze:10,silver:30,gold:75});
  earned.forEach((t,i)=>setTimeout(()=>{ confetti(20); hint(`🏅 <b>${t.toUpperCase()} sticker</b> earned! ${dexCount()} beasts discovered!`); },i*900));
}

/* ---------- fx ---------- */
function confetti(n){
  const C=['#FF8A3D','#FFD93D','#6FDB6F','#4CC9F0','#FF5FA2','#B388FF'];
  for(let i=0;i<Math.min(n,26);i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.background=C[i%6];c.style.left=(15+Math.random()*70)+'%';c.style.top=(20+Math.random()*30)+'%';
    c.style.animation=`confall ${0.8+Math.random()*0.6}s ease-in ${Math.random()*0.25}s forwards`;
    $('app').appendChild(c);setTimeout(()=>c.remove(),1800);
  }
}
function shake(ms){$('app').classList.add('shakeit');setTimeout(()=>$('app').classList.remove('shakeit'),ms||200);}

/* ---------- chrome ---------- */
$('backbtn').addEventListener('click',()=>{save();location.href='../../index.html';});
$('mutebtn').addEventListener('click',()=>{S.muted=!S.muted;save();renderBoard();});
document.addEventListener('click',()=>ac(),{once:true});
window.addEventListener('pagehide',save);
window.addEventListener('visibilitychange',()=>{if(document.hidden)save();});

/* ---------- boot: first session deals a guaranteed pair ---------- */
if(S.board.length===0&&S.wins===0&&S.dealt===0){
  ['emberling','emberling','tidepup'].forEach(k=>{const c=newCard(k);S.board.push(c);registerDex(c);});
  save();
  hint('Two Emberlings! <b>Tap one, then the other</b> to LEVEL UP! ⭐');
} else {
  hint('Tap two cards to merge them!');
}
renderBoard();

/* ================= WoopKid High Score Leaderboard (verbatim contract module) =================
   Per-device top-10 board shared with the Hall of Fame page.
   Hooks WoopProfile.reportRun so every finished run is recorded under the
   current player name. Storage: 'woopkid_leaderboard' = { slug: [{n,s,d},...] },
   'woopkid_player_name' = current player. No network, everything stays local. */
(function () {
'use strict';
var LB = { slug: 'woop-beasts', title: 'WOOPBEASTS', unit: 'beasts' };
var LB_KEY = 'woopkid_leaderboard';
var NAME_KEY = 'woopkid_player_name';
var LB_MAX = 10;

function lbLoadAll() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || {}; } catch (e) { return {}; } }
function lbSaveAll(all) { try { localStorage.setItem(LB_KEY, JSON.stringify(all)); } catch (e) {} }
function lbBoard() { return lbLoadAll()[LB.slug] || []; }
function lbName() {
    try { var n = localStorage.getItem(NAME_KEY); return (n && n.trim()) ? n.trim().slice(0, 10).toUpperCase() : 'WOOP'; }
    catch (e) { return 'WOOP'; }
}
function lbSetName(n) { try { localStorage.setItem(NAME_KEY, n); } catch (e) {} }
function lbToday() { var d = new Date(); return d.toISOString().slice(0, 10); }
function lbFmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function lbRankOf(list, name) {
    for (var i = 0; i < list.length; i++) if (list[i].n === name) return i + 1;
    return 0;
}

/* Record a finished run. One row per player name; only improvements count. */
function lbRecord(score, quiet) {
    score = Math.floor(Number(score) || 0);
    if (score <= 0) return;
    var all = lbLoadAll();
    var list = all[LB.slug] || (all[LB.slug] = []);
    var name = lbName();
    var prevRank = lbRankOf(list, name);
    var mine = prevRank ? list[prevRank - 1] : null;
    if (mine) {
        if (score <= mine.s) return;
        mine.s = score; mine.d = lbToday();
    } else {
        list.push({ n: name, s: score, d: lbToday() });
    }
    list.sort(function (a, b) { return b.s - a.s; });
    if (list.length > LB_MAX) list.length = LB_MAX;
    lbSaveAll(all);
    var newRank = lbRankOf(list, name);
    if (!quiet && newRank && (!prevRank || newRank < prevRank)) lbToast(newRank);
    if (lbPanelEl && lbPanelEl.classList.contains('wklb-show')) lbRenderRows();
}

/* Hook the shared profile module: every reported run also hits the board. */
if (typeof WoopProfile !== 'undefined' && WoopProfile && typeof WoopProfile.reportRun === 'function') {
    var lbOrigReport = WoopProfile.reportRun;
    WoopProfile.reportRun = function (slug, score, thresholds) {
        try { lbRecord(score); } catch (e) {}
        return lbOrigReport.call(WoopProfile, slug, score, thresholds);
    };
    /* Seed an empty board from this device's existing personal best. */
    try {
        if (lbBoard().length === 0) {
            var p = WoopProfile.load();
            var g = p && p.games && p.games[LB.slug];
            if (g && g.best > 0) lbRecord(g.best, true);
        }
    } catch (e) {}
}

/* ================= UI ================= */
var lbCSS = [
'#wklbBtn{position:fixed;top:74px;left:14px;width:48px;height:48px;border-radius:16px;border:none;',
'background:rgba(255,255,255,.92);box-shadow:0 3px 0 rgba(30,20,60,.25);display:flex;align-items:center;',
'justify-content:center;font-size:24px;cursor:pointer;z-index:40;padding:0;line-height:1;',
'-webkit-tap-highlight-color:transparent;touch-action:manipulation}',
'#wklbBtn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(30,20,60,.25)}',
'#wklbScrim{position:fixed;inset:0;background:rgba(15,10,35,.62);z-index:9000;display:none;',
'-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}',
'#wklbScrim.wklb-show{display:block}',
'#wklbPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);opacity:0;',
'width:min(340px,calc(100vw - 32px));max-height:min(560px,calc(100vh - 40px));overflow-y:auto;z-index:9001;',
'background:#241d4d;border:3px solid rgba(255,255,255,.18);border-radius:22px;padding:18px 16px 14px;',
'box-shadow:0 14px 40px rgba(0,0,0,.45);display:none;color:#fff;',
"font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-align:center;",
'transition:transform .18s cubic-bezier(.2,1.6,.4,1),opacity .15s}',
'#wklbPanel.wklb-show{display:block}',
'#wklbPanel.wklb-in{transform:translate(-50%,-50%) scale(1);opacity:1}',
'#wklbPanel h2{font-size:21px;font-weight:800;margin:2px 0 0;letter-spacing:.5px}',
'#wklbPanel .wklb-sub{font-size:12px;font-weight:700;opacity:.65;margin:2px 0 12px;text-transform:uppercase;letter-spacing:1px}',
'#wklbClose{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:12px;border:none;',
'background:rgba(255,255,255,.12);color:#fff;font-size:17px;cursor:pointer;line-height:1}',
'.wklb-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:12px;margin-bottom:4px;',
'background:rgba(255,255,255,.06);font-weight:800;font-size:15px}',
'.wklb-row.wklb-me{background:rgba(255,210,63,.18);box-shadow:inset 0 0 0 2px rgba(255,210,63,.55)}',
'.wklb-row.wklb-empty{opacity:.35;font-weight:700}',
'.wklb-rank{flex:0 0 30px;text-align:center;font-size:16px}',
'.wklb-name{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px}',
'.wklb-score{flex:0 0 auto;font-variant-numeric:tabular-nums}',
'.wklb-zero{padding:18px 6px;font-weight:800;font-size:15px;opacity:.8}',
'#wklbNameRow{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;',
'padding-top:12px;border-top:2px dashed rgba(255,255,255,.15);font-weight:800;font-size:14px;flex-wrap:wrap}',
'#wklbNameRow .wklb-who{opacity:.65;font-size:12px;text-transform:uppercase;letter-spacing:1px}',
'#wklbCurName{color:#FFD23F}',
'#wklbEditBtn,#wklbSaveBtn{border:none;border-radius:10px;padding:7px 12px;font-weight:800;font-size:13px;',
'cursor:pointer;background:rgba(255,255,255,.14);color:#fff;',
"font-family:'Nunito',-apple-system,sans-serif}",
'#wklbSaveBtn{background:#FFD23F;color:#241d4d}',
'#wklbNameInput{width:120px;border:none;border-radius:10px;padding:7px 10px;font-weight:800;font-size:14px;',
'text-transform:uppercase;text-align:center;background:#fff;color:#241d4d;outline:none;',
"font-family:'Nunito',-apple-system,sans-serif}",
'#wklbToast{position:fixed;top:16px;left:50%;transform:translate(-50%,-72px);z-index:9100;',
'background:#FFD23F;color:#241d4d;font-weight:800;font-size:16px;padding:12px 20px;border-radius:999px;',
'box-shadow:0 6px 20px rgba(0,0,0,.35);white-space:nowrap;pointer-events:none;',
"font-family:'Nunito',-apple-system,sans-serif;transition:transform .3s cubic-bezier(.2,1.6,.4,1)}",
'#wklbToast.wklb-show{transform:translate(-50%,0)}'
].join('');

var lbPanelEl = null, lbScrimEl = null, lbBtnEl = null, lbToastEl = null, lbToastT = null, lbEditing = false;

function lbStop(e) { e.stopPropagation(); }
function lbGuard(el) {
    ['pointerdown', 'touchstart', 'touchend', 'mousedown', 'mouseup', 'click', 'keydown'].forEach(function (t) {
        el.addEventListener(t, lbStop);
    });
}

function lbBuildUI() {
    var st = document.createElement('style');
    st.textContent = lbCSS;
    document.head.appendChild(st);

    lbBtnEl = document.createElement('button');
    lbBtnEl.id = 'wklbBtn';
    lbBtnEl.type = 'button';
    lbBtnEl.setAttribute('aria-label', 'High scores');
    lbBtnEl.textContent = '🏆';
    lbGuard(lbBtnEl);
    lbBtnEl.addEventListener('click', lbToggle);
    document.body.appendChild(lbBtnEl);

    lbScrimEl = document.createElement('div');
    lbScrimEl.id = 'wklbScrim';
    lbGuard(lbScrimEl);
    lbScrimEl.addEventListener('click', lbClose);
    document.body.appendChild(lbScrimEl);

    lbPanelEl = document.createElement('div');
    lbPanelEl.id = 'wklbPanel';
    lbPanelEl.setAttribute('role', 'dialog');
    lbPanelEl.setAttribute('aria-label', 'High score leaderboard');
    lbGuard(lbPanelEl);
    document.body.appendChild(lbPanelEl);

    lbToastEl = document.createElement('div');
    lbToastEl.id = 'wklbToast';
    document.body.appendChild(lbToastEl);

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lbPanelEl.classList.contains('wklb-show')) lbClose();
    });
}

function lbRenderRows() {
    var list = lbBoard();
    var me = lbName();
    var medals = ['🥇', '🥈', '🥉'];
    var html = '<button id="wklbClose" type="button" aria-label="Close">✕</button>' +
        '<h2>🏆 HIGH SCORES</h2>' +
        '<div class="wklb-sub">' + LB.title + ' · best ' + LB.unit + '</div>';
    if (list.length === 0) {
        html += '<div class="wklb-zero">No scores yet.<br>Finish a run and be #1!</div>';
    } else {
        for (var i = 0; i < LB_MAX; i++) {
            var e = list[i];
            if (e) {
                html += '<div class="wklb-row' + (e.n === me ? ' wklb-me' : '') + '">' +
                    '<span class="wklb-rank">' + (i < 3 ? medals[i] : (i + 1)) + '</span>' +
                    '<span class="wklb-name"></span>' +
                    '<span class="wklb-score">' + lbFmt(e.s) + '</span></div>';
            } else {
                html += '<div class="wklb-row wklb-empty"><span class="wklb-rank">' + (i + 1) +
                    '</span><span class="wklb-name">- - -</span><span class="wklb-score">·</span></div>';
            }
        }
    }
    html += '<div id="wklbNameRow"><span class="wklb-who">Who’s playing?</span>';
    if (lbEditing) {
        html += '<input id="wklbNameInput" maxlength="10" autocomplete="off" spellcheck="false">' +
            '<button id="wklbSaveBtn" type="button">SAVE</button>';
    } else {
        html += '<span id="wklbCurName"></span><button id="wklbEditBtn" type="button">CHANGE</button>';
    }
    html += '</div>';
    lbPanelEl.innerHTML = html;

    /* names go in via textContent so typed characters can never become markup */
    var nameEls = lbPanelEl.querySelectorAll('.wklb-row:not(.wklb-empty) .wklb-name');
    for (var j = 0; j < nameEls.length; j++) nameEls[j].textContent = list[j].n;

    lbPanelEl.querySelector('#wklbClose').addEventListener('click', lbClose);
    if (lbEditing) {
        var inp = lbPanelEl.querySelector('#wklbNameInput');
        inp.value = me;
        var save = function () {
            var v = inp.value.replace(/[^\w !\-À-ɏ֐-׿]/g, '').trim().slice(0, 10).toUpperCase();
            if (v) lbSetName(v);
            lbEditing = false;
            lbRenderRows();
        };
        lbPanelEl.querySelector('#wklbSaveBtn').addEventListener('click', save);
        inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') save(); });
        setTimeout(function () { inp.focus(); inp.select(); }, 50);
    } else {
        lbPanelEl.querySelector('#wklbCurName').textContent = me;
        lbPanelEl.querySelector('#wklbEditBtn').addEventListener('click', function () {
            lbEditing = true;
            lbRenderRows();
            });
    }
}

function lbOpen() {
    lbEditing = false;
    lbRenderRows();
    lbScrimEl.classList.add('wklb-show');
    lbPanelEl.classList.add('wklb-show');
    requestAnimationFrame(function () { lbPanelEl.classList.add('wklb-in'); });
}
function lbClose() {
    lbScrimEl.classList.remove('wklb-show');
    lbPanelEl.classList.remove('wklb-show', 'wklb-in');
}
function lbToggle() {
    if (lbPanelEl.classList.contains('wklb-show')) lbClose(); else lbOpen();
}
function lbToast(rank) {
    if (!lbToastEl) return;
    var tag = rank === 1 ? '👑 #1 HIGH SCORE!' : '🏆 #' + rank + ' ON THE BOARD!';
    lbToastEl.textContent = lbName() + ' — ' + tag;
    lbToastEl.classList.add('wklb-show');
    clearTimeout(lbToastT);
    lbToastT = setTimeout(function () { lbToastEl.classList.remove('wklb-show'); }, 2600);
}

if (document.body) lbBuildUI();
else document.addEventListener('DOMContentLoaded', lbBuildUI);

/* tiny debug/automation handle (used by the QA harness) */
try {
    window.WKLB = { slug: LB.slug, record: lbRecord, open: lbOpen, close: lbClose, board: lbBoard, name: lbName, hooked: typeof lbOrigReport === 'function' };
} catch (e) {}
})();

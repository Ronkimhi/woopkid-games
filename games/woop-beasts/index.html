<style>
/* ============ WoopBeasts, design: docs/research/woopbeasts/ ============ */
:root{
  --cream:#FFF6E9; --ink:#2B2350; --orange:#FF8A3D; --panel:#FFE9C9;
  --ember:#FF5757; --tide:#4CC9F0; --bloom:#6FDB6F; --spark:#FFD93D;
  --frost:#9BD5FF; --stone:#C9A87C; --gloom:#8B7FD4; --gleam:#FFC2E2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  font-family:'Nunito',system-ui,sans-serif;font-weight:700;color:var(--ink);
  background:linear-gradient(180deg,#FFFBF2,#FFF1DC);
  height:100dvh;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
#app{height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
button{font:inherit;color:inherit;cursor:pointer;}
/* top bar */
#topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--ink);color:#fff;
  font-size:13px;font-weight:800;flex:0 0 auto;z-index:5;}
#topbar .chip{background:rgba(255,255,255,.14);border-radius:999px;padding:3px 9px;white-space:nowrap;}
#topbar .chip.dex{margin-left:auto;background:var(--orange);color:var(--ink);cursor:pointer;}
#backbtn{width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,.14);
  color:#fff;font-size:17px;font-weight:800;flex:0 0 auto;}
#mutebtn{width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,.14);color:#fff;font-size:15px;}
#hintbar{text-align:center;font-size:12.5px;padding:7px 12px;background:var(--panel);
  border-bottom:3px solid var(--ink);font-weight:800;flex:0 0 auto;min-height:32px;z-index:4;}
/* screens */
.screen{flex:1;overflow:hidden auto;display:none;flex-direction:column;position:relative;}
.screen.on{display:flex;}
/* dock */
#dock{display:flex;gap:6px;padding:8px;background:var(--panel);border-top:3px solid var(--ink);flex:0 0 auto;z-index:5;}
.dockbtn{flex:1;border:3px solid var(--ink);border-radius:14px;background:#fff;font-weight:800;
  font-size:12px;padding:9px 2px;box-shadow:0 3px 0 var(--ink);transition:transform .08s;line-height:1.25;}
.dockbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
.dockbtn.on{background:var(--orange);color:#fff;}
.dockbtn.pulse{animation:pulse 1.1s infinite;}
.dockbtn .di{display:block;font-size:17px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
/* ranch grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(102px,1fr));gap:9px;padding:11px;align-content:start;}
.slot{background:#fff;border:3px solid var(--ink);border-radius:16px;padding:6px 3px 5px;
  display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer;
  box-shadow:0 3px 0 rgba(43,35,80,.25);transition:transform .1s;}
.slot:active{transform:scale(.95);}
.slot .nm{font-size:10.5px;font-weight:800;margin-top:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot .el{font-size:9.5px;opacity:.85;}
.slot.mergeready{outline:4px solid var(--bloom);outline-offset:-2px;animation:pulse 1.1s infinite;}
.slot.empty{opacity:.35;border-style:dashed;box-shadow:none;cursor:default;}
.bsvg{width:66px;height:66px;pointer-events:none;}
.slot .bsvg{animation:bob 2.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
/* hatchery */
.eggrow{display:flex;flex-direction:column;gap:10px;padding:12px;}
.eggcard{display:flex;align-items:center;gap:12px;background:#fff;border:3px solid var(--ink);
  border-radius:18px;padding:10px 14px;box-shadow:0 3px 0 rgba(43,35,80,.25);}
.eggcard.locked{opacity:.55;background:#F4EBDD;}
.eggface{font-size:40px;line-height:1;flex:0 0 auto;transition:transform .1s;}
.eggface.crack1{transform:rotate(-8deg) scale(1.05);}
.eggface.crack2{transform:rotate(8deg) scale(1.12);}
.egginfo{flex:1;min-width:0;}
.egginfo .t{font-weight:800;font-size:15px;}
.egginfo .d{font-size:11px;opacity:.75;}
.eggbtn{border:3px solid var(--ink);border-radius:12px;background:var(--bloom);font-weight:800;
  font-size:13px;padding:9px 13px;box-shadow:0 3px 0 var(--ink);white-space:nowrap;}
.eggbtn.buy{background:var(--spark);}
.eggbtn:disabled{opacity:.45;box-shadow:none;}
.eggbtn:not(:disabled):active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
/* lab */
#lab{padding:10px;gap:8px;}
.pods{display:flex;align-items:center;justify-content:center;gap:8px;}
.podcol{display:flex;flex-direction:column;gap:8px;align-items:center;}
.pod{width:104px;height:104px;border:3px dashed var(--ink);border-radius:18px;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.pod.filled{border-style:solid;box-shadow:0 3px 0 rgba(43,35,80,.25);}
.pod.picking{outline:4px solid var(--orange);outline-offset:-1px;}
.pod .lbl{position:absolute;top:-11px;background:var(--ink);color:#fff;font-size:9.5px;font-weight:800;border-radius:999px;padding:2px 9px;}
.pod .bsvg{width:64px;height:64px;}
.pod .pnm{font-size:9.5px;font-weight:800;}
#swapbtn{border:3px solid var(--ink);background:#fff;border-radius:999px;width:44px;height:44px;font-size:19px;box-shadow:0 3px 0 var(--ink);}
.preview{border:3px solid var(--ink);border-radius:18px;background:#fff;padding:9px;flex:1;
  display:flex;gap:10px;align-items:center;min-height:126px;}
.preview .bsvg{width:92px;height:92px;flex:0 0 auto;}
.silh{filter:brightness(0) opacity(.72);}
.stats{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.stat{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;}
.stat .bar{flex:1;height:9px;background:#EFE6D8;border-radius:99px;border:2px solid var(--ink);overflow:hidden;}
.stat .fill{height:100%;background:var(--orange);border-radius:99px;transition:width .4s cubic-bezier(.34,1.56,.64,1);}
#fusebtn{border:3px solid var(--ink);border-radius:16px;background:var(--gloom);color:#fff;font-weight:800;
  font-size:17px;padding:12px;box-shadow:0 4px 0 var(--ink);}
#fusebtn:disabled{opacity:.4;}
#fusebtn:not(:disabled):active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink);}
.shelf{display:flex;gap:7px;overflow-x:auto;padding:6px 2px;flex:0 0 auto;}
.shelf .slot{flex:0 0 82px;}
.shelf .bsvg{width:52px;height:52px;animation:none;}
/* battle */
#battle{overflow:hidden;}
#arena{flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#CDEFFF 0%,#E8FFE0 68%,#D8C9A8 69%,#E8DCC0 100%);}
#banner{position:absolute;top:8px;left:0;right:0;text-align:center;font-weight:800;font-size:14px;z-index:10;}
.vs{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:800;opacity:.22;}
.fighter{position:absolute;display:flex;flex-direction:column;align-items:center;width:86px;margin-left:-43px;
  transition:transform .16s cubic-bezier(.34,1.56,.64,1);}
.fighter .bsvg{width:72px;height:72px;}
.fighter.enemy .bsvg{transform:scaleX(-1);}
.fighter.ko{opacity:.22;filter:grayscale(1);}
.hpbar{width:66px;height:8px;border:2px solid var(--ink);border-radius:99px;background:#fff;overflow:hidden;margin-top:1px;}
.hpfill{height:100%;background:var(--bloom);border-radius:99px;transition:width .2s,background .2s;}
.abring{width:66px;height:4px;border-radius:99px;background:#fff;border:1.5px solid var(--ink);overflow:hidden;margin-top:2px;}
.abfill{height:100%;background:var(--gloom);width:0%;}
.fnm{font-size:8.5px;font-weight:800;background:#fff;border:2px solid var(--ink);border-radius:99px;padding:0 6px;margin-top:2px;white-space:nowrap;max-width:84px;overflow:hidden;text-overflow:ellipsis;}
.dmg{position:absolute;font-weight:800;color:var(--ember);text-shadow:0 2px 0 #fff;z-index:20;
  animation:rise .9s ease-out forwards;pointer-events:none;}
.dmg.pow{color:#fff;-webkit-text-stroke:1.5px var(--ink);}
.dmg.heal{color:#2f9e44;}
@keyframes rise{from{transform:translateY(0) scale(1);opacity:1}to{transform:translateY(-44px) scale(1.25);opacity:0}}
#battlectl{padding:8px 10px;display:flex;gap:8px;background:var(--panel);border-top:3px solid var(--ink);flex:0 0 auto;align-items:stretch;}
#fightbtn{flex:1;border:3px solid var(--ink);border-radius:14px;background:var(--ember);color:#fff;
  font-weight:800;font-size:16px;padding:11px;box-shadow:0 3px 0 var(--ink);}
#fightbtn:disabled{opacity:.45;}
#speedbtn{border:3px solid var(--ink);border-radius:14px;background:#fff;font-weight:800;font-size:13px;padding:0 13px;box-shadow:0 3px 0 var(--ink);}
#speedbtn.on{background:var(--spark);}
#squadrow{display:flex;gap:7px;padding:8px 10px;background:#FFF3DE;border-top:3px solid var(--ink);flex:0 0 auto;overflow-x:auto;}
#squadrow .sq{flex:0 0 76px;background:#fff;border:3px solid var(--ink);border-radius:13px;padding:4px 2px;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;}
#squadrow .sq .bsvg{width:44px;height:44px;animation:none;}
#squadrow .sq .fn{font-size:8.5px;font-weight:800;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#squadrow .sq.empty{opacity:.4;border-style:dashed;justify-content:center;font-size:20px;min-height:66px;}
#squadrow .lblv{flex:0 0 auto;display:flex;align-items:center;font-size:10px;font-weight:800;opacity:.7;writing-mode:vertical-rl;transform:rotate(180deg);}
/* dex */
#dex .grid{grid-template-columns:repeat(auto-fill,minmax(94px,1fr));}
.dexslot{background:#fff;border:3px solid var(--ink);border-radius:14px;padding:6px 3px;display:flex;flex-direction:column;align-items:center;}
.dexslot.unknown{opacity:.5;background:#F4EBDD;}
.dexslot .bsvg{width:56px;height:56px;animation:none;}
.dexslot .nm{font-size:9.5px;font-weight:800;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dexslot .ct{font-size:8.5px;opacity:.7;}
/* overlays */
.overlay{position:absolute;inset:0;background:rgba(43,35,80,.88);display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;z-index:40;color:#fff;text-align:center;padding:16px;}
.overlay.on{display:flex;}
.card{background:var(--cream);color:var(--ink);border:4px solid var(--ink);border-radius:22px;
  padding:16px 18px;display:flex;flex-direction:column;align-items:center;gap:7px;max-width:340px;width:100%;
  animation:popin .45s cubic-bezier(.34,1.56,.64,1);max-height:82dvh;overflow:auto;}
@keyframes popin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.bigtitle{font-weight:800;font-size:19px;color:var(--orange);letter-spacing:.5px;}
.card .bsvg{width:130px;height:130px;}
.namechips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.namechip{border:3px solid var(--ink);background:#fff;border-radius:999px;padding:6px 12px;font-weight:800;font-size:12.5px;}
.namechip.sel{background:var(--orange);color:#fff;}
#nameinput{border:3px solid var(--ink);border-radius:12px;padding:8px 10px;font:inherit;font-weight:800;
  font-size:13px;width:100%;text-align:center;background:#fff;color:var(--ink);}
.okbtn{border:3px solid var(--ink);background:var(--bloom);border-radius:14px;font-weight:800;
  font-size:15px;padding:10px 26px;box-shadow:0 3px 0 var(--ink);}
.okbtn.alt{background:#fff;}
.okbtn.warn{background:var(--ember);color:#fff;}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.subtxt{font-size:12px;opacity:.8;}
.statline{font-size:12px;font-weight:800;}
/* fx */
.shakeit{animation:shake .12s linear infinite;}
@keyframes shake{0%{transform:translate(1px,-1px)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,2px)}75%{transform:translate(-1px,-2px)}100%{transform:translate(1px,1px)}}
.confetti{position:absolute;width:9px;height:9px;border-radius:2px;z-index:60;pointer-events:none;}
@keyframes confall{from{transform:translateY(-8px) rotate(0);opacity:1}to{transform:translateY(140px) rotate(540deg);opacity:0}}
.toast{position:absolute;left:50%;transform:translateX(-50%);bottom:86px;background:var(--ink);color:#fff;
  border-radius:999px;padding:8px 16px;font-size:12.5px;font-weight:800;z-index:70;animation:toastin 2.4s ease forwards;pointer-events:none;white-space:nowrap;}
@keyframes toastin{0%{opacity:0;transform:translate(-50%,10px)}10%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-8px)}}
@media (prefers-reduced-motion: reduce){
  .slot .bsvg,.dockbtn.pulse,.slot.mergeready{animation:none;}
  .shakeit{animation:none;}
}
@media (orientation:landscape) and (max-height:520px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr));}
  #dock .dockbtn{padding:5px 2px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="backbtn" aria-label="Back to WoopKid">←</button>
    <span class="chip">🪙 <span id="hudWoops">0</span></span>

    <div style="display:flex;flex-direction:column;gap:8px;padding:10px;flex:1;min-height:0;">

<script>
'use strict';
/* =====================================================================
   WoopBeasts v1. Design source of truth: docs/research/woopbeasts/
   Build notes:
   - DOM screens + inline-SVG creatures + pooled DOM FX (same hybrid
     pattern as pets-clicker). Battle sim runs in the shared rAF loop,
     delta-time clamped per standards.
   - CreatureFactory here is the procedural backend from doc 06.
     requestArt/getArt are v1 no-ops per doc 09 ship order (offline pure).
   ===================================================================== */

/* ---------- helpers ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const fmt=n=>{n=Math.floor(n);return n<1000?String(n):n<1e6?(Math.floor(n/100)/10)+'K':(Math.floor(n/1e5)/10)+'M';};
const $=id=>document.getElementById(id);
const INK='#2B2350';

/* ---------- WoopProfile shared module (contract, copied verbatim) ---------- */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned;
  }
};

/* ---------- audio: procedural Web Audio (standards §6) ---------- */
let AC=null, voices=0;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch{} }
  if(AC && AC.state==='suspended') AC.resume(); return AC; }
function note(freq,delay,dur,type,vol){
  if(S.muted||!ac()||voices>5) return;
  try{
    voices++;
    const t=AC.currentTime+delay, o=AC.createOscillator(), g=AC.createGain();
    o.type=type||'sine'; o.frequency.value=freq*(0.95+Math.random()*0.1); // ±5% pitch variance
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol||0.16,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.02);
    o.onended=()=>{voices--;};
  }catch{ voices--; }
}

    <path d="M ${50+hd*0.55} ${HY-hd*0.55} L ${50+hd} ${HY-hd*1.45} L ${50+hd*0.2} ${HY-hd*0.85} Z" fill="${G}" stroke="${INK}" stroke-width="3"/>`;
  if(spec.hg==='antenna') for(const d of [-0.5,0.5]) s+=`<line x1="${50+d*hd}" y1="${HY-hd*0.8}" x2="${50+d*hd*1.4}" y2="${HY-hd*1.7}" stroke="${INK}" stroke-width="2.5"/>
    <circle cx="${50+d*hd*1.4}" cy="${HY-hd*1.7}" r="3" fill="${G}" stroke="${INK}" stroke-width="2.5"/>`;
  if(spec.hg==='ears') for(const d of [-1,1]) s+=`<ellipse cx="${50+d*hd*0.62}" cy="${HY-hd*0.95}" rx="4.5" ry="8.5" fill="${P}" stroke="${INK}" stroke-width="3"/>`;
  if(spec.hg==='mohawk') s+=`<path d="M ${50-hd*0.55} ${HY-hd*0.7} q ${hd*0.55} ${-hd*1.1} ${hd*1.1} 0 z" fill="${G}" stroke="${INK}" stroke-width="3"/>`;
  const exo=hd*0.42, eyo=HY-1;
  if(spec.eye==='visor'){
    s+=`<rect x="${50-hd*0.78}" y="${eyo-4.5}" width="${hd*1.56}" height="9" rx="4.5" fill="${G}" stroke="${INK}" stroke-width="3"/>
        <rect x="${50-hd*0.45}" y="${eyo-2}" width="6" height="3.5" rx="1.5" fill="#fff" opacity="0.95"/>
        <rect x="${50+hd*0.12}" y="${eyo-2}" width="6" height="3.5" rx="1.5" fill="#fff" opacity="0.95"/>`;
  } else if(spec.eye==='shades'){
    s+=`<rect x="${50-hd*0.8}" y="${eyo-4}" width="${hd*1.6}" height="8" rx="4" fill="${INK}"/>
        <line x1="${50-hd*0.5}" y1="${eyo-2}" x2="${50-hd*0.15}" y2="${eyo-2}" stroke="${G}" stroke-width="2"/>`;
  } else if(spec.eye==='cyber'){
    s+=`<ellipse cx="${50-exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/><circle cx="${50-exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/>
        <rect x="${50+exo-5}" y="${eyo-4.5}" width="10" height="8.5" rx="2.5" fill="${G}" stroke="${INK}" stroke-width="2.5"/>
        <circle cx="${50+exo}" cy="${eyo-0.5}" r="2" fill="#fff"/>`;
  } else if(spec.eye==='star'){
    for(const d of [-1,1]) s+=`<path d="M ${50+d*exo} ${eyo-4.5} l 1.4 3 l 3.2 .4 l -2.3 2.2 l .6 3.2 l -2.9 -1.6 l -2.9 1.6 l .6 -3.2 l -2.3 -2.2 l 3.2 -.4 z" fill="${INK}"/>`;
  } else {
    s+=`<ellipse cx="${50-exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/><ellipse cx="${50+exo}" cy="${eyo}" rx="3.6" ry="4.6" fill="${INK}"/>
        <circle cx="${50-exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/><circle cx="${50+exo+1.2}" cy="${eyo-1.4}" r="1.4" fill="#fff"/>`;
    if(spec.eye==='angry') s+=`<line x1="${50-exo-4}" y1="${eyo-6.5}" x2="${50-exo+3}" y2="${eyo-4.5}" stroke="${INK}" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="${50+exo+4}" y1="${eyo-6.5}" x2="${50+exo-3}" y2="${eyo-4.5}" stroke="${INK}" stroke-width="2.8" stroke-linecap="round"/>`;
    else s+=`<line x1="${50-exo-3.5}" y1="${eyo-6.5}" x2="${50-exo+3}" y2="${eyo-6.8}" stroke="${INK}" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
      <line x1="${50+exo+3.5}" y1="${eyo-6.5}" x2="${50+exo-3}" y2="${eyo-6.8}" stroke="${INK}" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>`;
  }
  s+=`<path d="M ${50-3} ${HY+6.5} q 4 3.2 7.5 0.5" fill="none" stroke="${INK}" stroke-width="2.6" stroke-linecap="round"/>`;
  const scl=1+0.07*((spec.tier||1)-1);
  // seed jitter: whole-figure micro variation
  const rot=(r()-0.5)*3;
  return `<svg class="${cls||'bsvg'}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><g transform="translate(50,52) scale(${scl}) rotate(${rot.toFixed(1)}) translate(-50,-52)">${s}</g></svg>`;
}

/* ---------- beast ops (docs 03 + 04) ---------- */
function makeBeast(spKey){
  const sp=SPECIES[spKey], seed=(Math.random()*1e9)|0, r=mulberry32(seed);
  const stats=sp.s.map(v=>Math.round(v*(0.9+0.2*r()))); // ±10% hatch jitter
  return { id:'b'+(S.nextId++), name:sp.n, species:spKey, el:[sp.e],
    tier:1, level:1, xp:0, s:stats, p:sp.p,
    hg:sp.hg||null, eye:sp.eye||'hero', cw:sp.cw||null, bw:sp.bw||null,
    aw:sp.aw||null, lg:sp.lg||'power', tl:sp.tl||null,
    seed, gen:0, lineage:null };
}
function fuseBeasts(h,b){
  const st=[ // body biases physical, head biases HP/SPC, ×1.10 (doc 04 canonical)
    Math.round((0.6*h.s[0]+0.4*b.s[0])*1.1),
    Math.round((0.6*b.s[1]+0.4*h.s[1])*1.1),
    Math.round((0.6*b.s[2]+0.4*h.s[2])*1.1),
    Math.round((0.6*b.s[3]+0.4*h.s[3])*1.1),
    Math.round((0.6*h.s[4]+0.4*b.s[4])*1.1)
  ].map(v=>clamp(v,1,999));
  const el=[h.el[0]];
  const second = b.el[0]!==h.el[0]? b.el[0] : (b.el[1]&&b.el[1]!==h.el[0]? b.el[1] : null);
  if(second) el.push(second);
  return { id:'b'+(S.nextId++),
    name:'???', species:'fx_'+h.species+'__'+b.species,
    el, tier:Math.max(h.tier,b.tier), level:Math.max(1,Math.round((h.level+b.level)/2)), xp:0,
    s:st, p:b.p, hg:h.hg, eye:h.eye, cw:b.cw, bw:b.bw, aw:b.aw, lg:b.lg, tl:b.tl,
    seed:(h.seed^b.seed)>>>0 || 7, gen:Math.max(h.gen,b.gen)+1,
    lineage:{head:JSON.parse(JSON.stringify(h)), body:JSON.parse(JSON.stringify(b))} };
}
function xpNext(L){ return Math.round(20*Math.pow(L,1.5)); }
function grantXp(bst,amt){
  if(bst.level>=10) return false;
  bst.xp+=amt; let up=false;
  while(bst.level<10 && bst.xp>=xpNext(bst.level)){
    bst.xp-=xpNext(bst.level); bst.level++;
    bst.s=bst.s.map(v=>clamp(Math.round(v*1.04),1,999)); up=true;
  }
  return up;
}
const power=b=>b.s.reduce((a,v)=>a+v,0);
const dexCount=()=>Object.keys(S.dex).length;

function registerDex(bst,customName){
  const k=bst.species;
  if(!S.dex[k]){
    S.dex[k]={name:customName||bst.name, first:Date.now(), count:1,
      el:bst.el.slice(), snap:{p:bst.p,hg:bst.hg,eye:bst.eye,cw:bst.cw,bw:bst.bw,aw:bst.aw,lg:bst.lg,tl:bst.tl,s:bst.s.slice(),el:bst.el.slice(),tier:1,seed:bst.seed}};
    return true; // NEW SPECIES
  }
  S.dex[k].count++;
  if(S.dex[k].name && bst.species.startsWith('fx_')) bst.name=S.dex[k].name;
  return false;
}

/* ---------- FX ---------- */
const app=$('app');
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  app.appendChild(t); setTimeout(()=>t.remove(),2450); }
function confetti(n,x,y){
  const CONF=['#FF8A3D','#FFD93D','#6FDB6F','#4CC9F0','#FF5FA2','#B388FF'];
  for(let i=0;i<Math.min(n,26);i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.background=CONF[i%6];
    c.style.left=(x??(20+Math.random()*60))+'%';
    c.style.top=(y??30)+'%';
    c.style.animation=`confall ${0.8+Math.random()*0.6}s ease-in ${Math.random()*0.3}s forwards`;
    app.appendChild(c); setTimeout(()=>c.remove(),1800);
  }
}
function shake(ms){ app.classList.add('shakeit'); setTimeout(()=>app.classList.remove('shakeit'),ms||220); }

/* ---------- Ranch ---------- */
function findTrios(){
  const g={};
  S.ranch.forEach((b,i)=>{const k=b.species+'_'+b.tier;(g[k]=g[k]||[]).push(i);});
  return Object.values(g).filter(x=>x.length>=3);
}
function renderRanch(){
  const grid=$('ranchgrid');
  const trios=findTrios();
  const trioIdx=new Set(); trios.forEach(t=>t.slice(0,Math.min(t.length>=5?5:3,t.length)).forEach(i=>trioIdx.add(i)));
  let html=S.ranch.map((b,i)=>{
    const mr=trioIdx.has(i)?' mergeready':'';
    const tc=b.tier>1?`⭐T${b.tier} `:'';
    return `<div class="slot${mr}" data-i="${i}">${beastSVG(b)}<span class="nm">${b.name}</span><span class="el">${tc}${b.el.map(e=>EL[e].i).join('')} Lv.${b.level}</span></div>`;
  }).join('');
  for(let i=S.ranch.length;i<20;i++) html+='<div class="slot empty">&nbsp;<div style="font-size:22px;opacity:.5">·</div>&nbsp;</div>';
  grid.innerHTML=html;
  grid.querySelectorAll('.slot[data-i]').forEach(el=>{
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();
      const i=+el.dataset.i;
      if(el.classList.contains('mergeready')) doMerge(S.ranch[i]);
      else openDetail(i);
    });
  });
  if(trios.length) hint('3 of a kind! Tap a glowing beast to MERGE! 💥');
  else if(S.ranch.length===0) hint('Hatch your first beast! 🥚');
  else hint(`Your Ranch: ${S.ranch.length}/20 beasts. Tap one for details.`);
}
function doMerge(sample){
  const idx=S.ranch.map((b,i)=>({b,i})).filter(x=>x.b.species===sample.species&&x.b.tier===sample.tier).map(x=>x.i);
  if(idx.length<3) return;
  const five=idx.length>=5; // merge-5 bonus: 5 → TWO results (doc 04)
  const take=five?idx.slice(0,5):idx.slice(0,3);
  const src=take.map(i=>S.ranch[i]);
  const maxLvl=Math.max(...src.map(b=>b.level));
  const results=[];
  for(let k=0;k<(five?2:1);k++){
    const base=src[k];
    const nb=JSON.parse(JSON.stringify(base));
    nb.id='b'+(S.nextId++); nb.tier=base.tier+1; nb.level=maxLvl;
    nb.s=base.s.map(v=>clamp(Math.round(v*1.8),1,999));
    results.push(nb);
  }
  take.sort((a,b)=>b-a).forEach(i=>S.ranch.splice(i,1));
  results.forEach(nb=>S.ranch.push(nb));
  // squad ids may have vanished
  S.squad=S.squad.filter(id=>S.ranch.some(b=>b.id===id));
  sfx.merge(results[0].tier); shake(200); confetti(20);
  save(); renderRanch(); hud();
  hint(`💥 MERGE${five?'-5! TWO':'!'} ${results[0].name} evolved to T${results[0].tier}!`);
}

/* ---------- Hatchery ---------- */
let crackState={}; // type → taps
function renderHatchery(){
  const row=$('eggrow');
  row.innerHTML=Object.entries(EGGS).map(([k,e])=>{
    const unlocked=S.unlocked.includes(k);
    const owned=S.eggInv[k]||0;
    const cost=k==='basic'?eggCost():Math.round(eggCost()*1.5);
    if(!unlocked) return `<div class="eggcard locked"><div class="eggface">❔</div>
      <div class="egginfo"><div class="t">${e.n}</div><div class="d">Unlocks at battle ${e.rung} ⚔️</div></div></div>`;
    const taps=crackState[k]||0;
    const face=taps===0?e.i==='🥚'?'🥚':e.i:taps<3?'🥚':'🐣';
    return `<div class="eggcard" data-k="${k}">
      <div class="eggface ${taps===1?'crack1':taps===2?'crack2':''}" data-egg="${k}">${owned>0?(taps<2?'🥚':'🐣'):e.i}</div>
      <div class="egginfo"><div class="t">${e.n} ${owned>0?'×'+owned:''}</div><div class="d">${e.d}</div></div>
      ${owned>0? `<button class="eggbtn" data-hatch="${k}">TAP 3× ${taps>0?'('+taps+'/3)':''}</button>`
               : `<button class="eggbtn buy" data-buy="${k}" ${S.woops<cost?'disabled':''}>BUY ${cost} 🪙</button>`}
    </div>`;
  }).join('');
  row.querySelectorAll('[data-buy]').forEach(b=>b.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const k=b.dataset.buy, cost=k==='basic'?eggCost():Math.round(eggCost()*1.5);
    if(S.woops<cost) return;
    S.woops-=cost; S.eggsBought++; S.eggInv[k]=(S.eggInv[k]||0)+1;
    sfx.coin(); save(); renderHatchery(); hud();
  }));
  const tapH=k=>{
    if(S.ranch.length>=20){ toast('Ranch full! Merge or fuse to make room 🏡'); return; }
    crackState[k]=(crackState[k]||0)+1;
    sfx.crack(crackState[k]);
    if(crackState[k]>=3){
      crackState[k]=0; S.eggInv[k]--;
      hatch(k);
    }
    renderHatchery();
  };
  row.querySelectorAll('[data-hatch]').forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();tapH(b.dataset.hatch);}));
  row.querySelectorAll('.eggface[data-egg]').forEach(f=>f.addEventListener('pointerdown',e=>{
    e.preventDefault(); const k=f.dataset.egg; if((S.eggInv[k]||0)>0) tapH(k);
  }));
  hint(totalEggs()>0?'Tap an egg 3 times to hatch! 🐣':'Buy eggs with Woops from battles! 🪙');
}
function hatch(type){
  let spKey;
  if(S.rig && S.rig.length){ spKey=S.rig.shift(); if(!S.rig.length) S.rig=null; }
  else {
    const pool=EGGS[type].pool;
    // pity weighting (README open q5): 45% prefer species owned 1-2 of
    const near=pool.filter(k=>{const c=S.ranch.filter(b=>b.species===k&&b.tier===1).length;return c===1||c===2;});
    spKey=(near.length&&Math.random()<0.45)?near[(Math.random()*near.length)|0]:pool[(Math.random()*pool.length)|0];
  }
  const b=makeBeast(spKey);
  S.ranch.push(b);
  const isNew=registerDex(b);
  sfx.hatch(); confetti(18); shake(150);
  const cnt=S.ranch.filter(x=>x.species===b.species&&x.tier===1).length;
  if(isNew){ stickerCheck(); toast(`🎉 NEW! ${b.name} joined the Woopdex!`); }
  save(); hud();
  if(cnt>=3) show('ranch');
  hint(`🎉 ${b.name} hatched! ${cnt>=3?'MERGE READY! Tap a glowing beast! 💥':cnt===2?'2/3 for a merge!':''}`);
}

/* ---------- Fusion Lab ---------- */
let podH=null,podB=null,picking=null;
function renderLab(){
  const pods=[[podH,'podHc','podH'],[podB,'podBc','podB']];
  pods.forEach(([b,cid,pid])=>{
    $(cid).innerHTML=b?beastSVG(b)+`<span class="pnm">${b.name}</span>`:'➕';
    $(pid).classList.toggle('filled',!!b);
    $(pid).classList.toggle('picking',picking===pid);
  });
  const f=(podH&&podB&&podH.id!==podB.id)?fuseBeasts(podH,podB):null;
  if(f){ S.nextId--; } // preview shouldn't consume ids
  const SN=['HP','ATK','DEF','SPD','SPC'];
  if(f){
    $('prevsvg').innerHTML=beastSVG(f);
    $('prevstats').innerHTML=f.s.map((v,k)=>`<div class="stat"><span style="width:30px">${SN[k]}</span><div class="bar"><div class="fill" style="width:${Math.min(100,v/6)}%"></div></div><span>${v}</span></div>`).join('')
      +`<div style="font-size:12px">${f.el.map(e=>EL[e].i).join(' ')} <b style="font-size:10.5px">mystery beast…</b></div>`;
    const blocked=Math.max(podH.gen,podB.gen)>=3;
    $('fusebtn').disabled=S.cores<1||blocked;
    hint(blocked?'Chimera limit! Gen-3 beasts are maxed out 🧬':S.cores<1?'Win battles to find Fusion Cores 💠':'SWAP flips head & body. Smash FUSE!');
  } else {
    $('prevsvg').innerHTML='';
    $('prevstats').innerHTML='<div style="font-size:11.5px;opacity:.55">Pick a HEAD and a BODY beast to preview the fusion…</div>';
    $('fusebtn').disabled=true;
    hint('Tap a pod, then pick a beast 👇');
  }
  $('labshelf').innerHTML=S.ranch.map((b,i)=>
    `<div class="slot" data-i="${i}">${beastSVG(b)}<span class="nm">${b.name}</span><span class="el">${b.tier>1?'⭐T'+b.tier+' ':''}${b.el.map(e=>EL[e].i).join('')}</span></div>`).join('');
  $('labshelf').querySelectorAll('.slot').forEach(el=>el.addEventListener('pointerdown',e=>{
    e.preventDefault(); sfx.click();
    const b=S.ranch[+el.dataset.i];
    if(picking==='podB'){ if(podH&&b.id===podH.id) podH=null; podB=b; picking='podH'; }
    else { if(podB&&b.id===podB.id) podB=null; podH=b; picking='podB'; }
    renderLab();
  }));
}

/* ---------- stickers (WoopProfile) ---------- */
function stickerCheck(){
  const earned=WoopProfile.reportRun(SLUG,dexCount(),STICKERS);

/* ---------- Battle (doc 05) ---------- */
const UNLOCK_LADDER=[[5,'ember'],[10,'tide'],[15,'bloom'],[20,'spark'],[25,'frost'],[30,'stone'],[40,'gloom'],[50,'gleam']];
function nextUnlock(){ for(const [r,k] of UNLOCK_LADDER) if(!S.unlocked.includes(k)) return {r,k}; return null; }
function rungMult(r){ return r<=1?0.6:r===2?0.75:r===3?0.9:Math.min(1.35,0.95+0.05*(r-4)); }
function autoSquad(){
  S.squad=S.squad.filter(id=>S.ranch.some(b=>b.id===id));
  const inSquad=new Set(S.squad);
  const rest=S.ranch.filter(b=>!inSquad.has(b.id)).sort((a,b)=>power(b)-power(a));
  while(S.squad.length<4&&rest.length) S.squad.push(rest.shift().id);
}
let foes=[]; // generated per rung
function genFoes(){
  const squad=S.squad.map(id=>S.ranch.find(b=>b.id===id)).filter(Boolean);
  const pp=squad.reduce((a,b)=>a+power(b),0)||400;
  const isBoss=S.rung%5===0;
  const target=pp*rungMult(S.rung);
  const keys=Object.keys(SPECIES);
  foes=[];
  const n=isBoss?1:4;
  for(let i=0;i<n;i++){
    let k=keys[(Math.random()*keys.length)|0];
    if(S.rung<8){ // early: avoid hard counters vs player's primary elements
      const mine=squad.map(b=>b.el[0]);
      for(let t=0;t<6;t++){ const bad=mine.some(m=>(CHART[SPECIES[k].e]||{})[m]===2); if(!bad) break; k=keys[(Math.random()*keys.length)|0]; }
    }
    const sp=SPECIES[k];
    const shape=sp.s, shapeSum=shape.reduce((a,v)=>a+v,0);
    const budget=(target/n)*(isBoss?1:0.9+Math.random()*0.2);
    const st=shape.map(v=>clamp(Math.round(v/shapeSum*budget),1,999));
    if(isBoss) st[0]=clamp(Math.round(st[0]*3),1,999); // boss: 3x HP wall
    foes.push({ id:'e'+i, name:isBoss?'BOSS '+sp.n:sp.n, species:k, el:[sp.e],
      tier:isBoss?Math.min(5,1+Math.floor(S.rung/10)):1, level:S.rung, s:st, p:sp.p,
      hg:sp.hg||null, eye:sp.eye||'hero', cw:sp.cw||null, bw:sp.bw||null, aw:sp.aw||null, lg:sp.lg||'power', tl:sp.tl||null,
      seed:1000+S.rung*7+i, gen:0 });
  }
}
function renderBattlePre(){
  autoSquad(); genFoes();
  const arena=$('arena');
  arena.querySelectorAll('.fighter').forEach(f=>f.remove());
  $('banner').textContent=(S.rung%5===0?'👑 BOSS BATTLE ':'⚔️ Battle ')+S.rung;
  // enemy preview: silhouettes + element badges (doc 08)
  foes.forEach((f,i)=>{
    const d=document.createElement('div');
    d.className='fighter enemy';
    d.style.left=(66+(i%2)*18)+'%'; d.style.top=(6+i*13)+'%';
    d.innerHTML=`<span class="silh">${beastSVG(f)}</span><div class="fnm">${f.el.map(e=>EL[e].i).join('')} ???</div>`;
    if(foes.length===1){ d.style.left='62%'; d.style.top='16%'; d.querySelector('.bsvg').style.cssText='width:130px;height:130px'; }
    arena.appendChild(d);
  });
  renderSquadRow();
  $('speedbtn').style.display=S.spd2Unlocked?'':'none';
  $('speedbtn').classList.toggle('on',S.speed2x);
  $('fightbtn').disabled=S.squad.length===0;
  const counters=S.squad.map(id=>S.ranch.find(b=>b.id===id)).filter(Boolean)
    .some(b=>foes.some(f=>(CHART[b.el[0]]||{})[f.el[0]]===2||(b.el[1]&&(CHART[b.el[1]]||{})[f.el[0]]===2)));
  hint(S.squad.length?counters?'Your squad has POW! advantage ⚡ FIGHT!':'Tap FIGHT when ready! ⚔️':'Hatch a beast first! 🥚');
}
function renderSquadRow(){
  const row=$('squadrow');
  let html='<div class="lblv">SQUAD</div>';
  for(let i=0;i<4;i++){
    const b=S.ranch.find(x=>x.id===S.squad[i]);
    html+=b?`<div class="sq" data-si="${i}">${beastSVG(b)}<span class="fn">${b.name}</span></div>`
           :`<div class="sq empty" data-si="${i}">➕</div>`;
  }
  row.innerHTML=html;
  row.querySelectorAll('.sq').forEach(el=>el.addEventListener('pointerdown',e=>{
    e.preventDefault(); if(bat.active) return; openPick(+el.dataset.si);
  }));
}
function openPick(slot){
  const pg=$('pickgrid');
  pg.innerHTML=S.ranch.map((b,i)=>{
    const inS=S.squad.includes(b.id);
    return `<div class="slot" data-i="${i}" style="${inS?'opacity:.45':''}">${beastSVG(b)}<span class="nm">${b.name}</span><span class="el">${b.tier>1?'⭐T'+b.tier+' ':''}P:${power(b)}</span></div>`;
  }).join('');
  pg.querySelectorAll('.slot').forEach(el=>el.addEventListener('pointerdown',e=>{
    e.preventDefault(); sfx.click();
    const b=S.ranch[+el.dataset.i];
    const old=S.squad.indexOf(b.id);
    if(old>=0) S.squad[old]=S.squad[slot]; // swap if already in squad
    S.squad[slot]=b.id;
    S.squad=S.squad.filter(Boolean);
    $('pickOv').classList.remove('on');
    save(); renderBattlePre();
  }));
  $('pickOv').classList.add('on');
}
$('pickClose').addEventListener('click',()=>$('pickOv').classList.remove('on'));
$('speedbtn').addEventListener('click',()=>{ S.speed2x=!S.speed2x; $('speedbtn').classList.toggle('on',S.speed2x); save(); });

/* battle sim */
const bat={active:false,f:[],t:0,ramp:1};
function startBattle(){
  if(bat.active||!S.squad.length) return;
  genFoes();
  const arena=$('arena');
  arena.querySelectorAll('.fighter').forEach(f=>f.remove());
  bat.f=[]; bat.t=0; bat.ramp=1; bat.active=true;
  $('fightbtn').disabled=true;
  $('banner').textContent='FIGHT!';
  const mkF=(b,enemy,i,solo)=>{
    const d=document.createElement('div');
    d.className='fighter'+(enemy?' enemy':'');
    if(solo){ d.style.left='68%'; d.style.top='18%'; }
    else { d.style.left=(enemy?66+(i%2)*18:16+(i%2)*18)+'%'; d.style.top=(enemy?6+i*13:42+i*12)+'%'; }
    const maxhp=60+b.s[0]*2;
    d.innerHTML=`${beastSVG(b)}<div class="hpbar"><div class="hpfill" style="width:100%"></div></div><div class="abring"><div class="abfill"></div></div><div class="fnm">${b.name}</div>`;
    if(solo) d.querySelector('.bsvg').style.cssText='width:120px;height:120px';
    arena.appendChild(d);
    bat.f.push({el:d,b,enemy,hp:maxhp,maxhp,cd:Math.random()*0.8,ab:Math.random()*30,
      slow:0,haste:0,stun:0,weak:0,rally:0,shield:0,combo:0,lastT:null});
  };
  S.squad.map(id=>S.ranch.find(b=>b.id===id)).filter(Boolean).forEach((b,i)=>mkF(b,false,i));
  foes.forEach((f,i)=>mkF(f,true,i,foes.length===1));
}
$('fightbtn').addEventListener('pointerdown',e=>{e.preventDefault();sfx.click();startBattle();});
function dmgFloat(t,txt,cls){
  const d=document.createElement('div');
  d.className='dmg'+(cls?' '+cls:''); d.textContent=txt;
  d.style.left=t.el.style.left; d.style.top=t.el.style.top;
  d.style.fontSize=cls==='pow'?'21px':'14px';
  $('arena').appendChild(d); setTimeout(()=>d.remove(),900);
}
function typeMult(att,def){
  let m=1;
  for(const de of def.b.el){ m*=((CHART[att.b.el[0]]||{})[de])||1; }
  return clamp(m,0.25,4);
}
function battleTick(dt){
  bat.t+=dt;
  if(bat.t>45) bat.ramp=1.5*Math.pow(1.5,Math.floor((bat.t-45)/5)); // Sudden Woop (doc 05)
  if(bat.t>45&&Math.floor(bat.t*2)%8===0) $('banner').textContent='⚡ SUDDEN WOOP! ⚡';
  const alive=en=>bat.f.filter(x=>x.hp>0&&x.enemy===en);
  const mine=alive(false), theirs=alive(true);
  if(!mine.length||!theirs.length){ endBattle(!!mine.length); return; }
  for(const f of bat.f){
    if(f.hp<=0){ f.el.classList.add('ko'); continue; }
    // status timers
    for(const k of ['slow','haste','stun','weak','rally']) if(f[k]>0) f[k]-=dt;
    if(f.stun>0) continue;
    // ability charge: (4 + SPC/999*8)%/s, dual-element 15% faster (doc 05)
    const abRate=(4+(f.b.s[4]/999)*8)*(f.b.el.length>1?1.15:1);
    f.ab=Math.min(100,f.ab+abRate*dt);
    f.el.querySelector('.abfill').style.width=f.ab+'%';
    // attack timer
    let iv=2.2-(f.b.s[3]/999)*1.4;
    if(f.slow>0) iv*=1.5;
    if(f.haste>0) iv*=0.6;
    f.cd-=dt;
    if(f.ab>=100){ f.ab=0; castAbility(f,mine,theirs); continue; }
    if(f.cd<=0){
      f.cd=iv;
      const targets=f.enemy?mine:theirs;
      if(!targets.length) continue;
      const t=targets.reduce((a,b)=>a.hp<b.hp?a:b); // finish-him focus
      f.combo=(f.lastT===t)?Math.min(5,f.combo+1):0; f.lastT=t;
      const tm=typeMult(f,t);
      const comboMult=1+0.1*f.combo;
      let atk=f.b.s[1]*(f.rally>0?1.2:1)*(f.weak>0?0.7:1);
      let dmg=Math.max(Math.ceil(atk*0.08),Math.round((atk*tm*comboMult-t.b.s[2]*0.5)*bat.ramp)); // chip floor
      if(t.shield>0){ const ab=Math.min(t.shield,dmg); t.shield-=ab; dmg-=ab; if(dmg<=0){ dmgFloat(t,'🛡️'); continue; } }
      t.hp-=dmg;
      const pct=Math.max(0,t.hp/t.maxhp);
      t.el.querySelector('.hpfill').style.width=(pct*100)+'%';
      t.el.querySelector('.hpfill').style.background=pct>0.5?'#6FDB6F':pct>0.25?'#FFD93D':'#FF5757';
      f.el.style.transform=`translateX(${f.enemy?-13:13}px)`;
      setTimeout(()=>{f.el.style.transform='';},140);
      if(tm>=2){ dmgFloat(t,'POW! '+dmg,'pow'); sfx.pow(); }
      else { dmgFloat(t,tm<1?dmg+' meh':String(dmg)); sfx.hit(f.b.el[0]); }
    }
  }
}
function castAbility(f,mine,theirs){
  const allies=f.enemy?theirs:mine, foesA=f.enemy?mine:theirs;
  if(!foesA.length) return;
  const e=f.b.el[0];
  sfx.abil();
  $('banner').textContent=`${f.b.name}: ${ABIL[e].n}!`;
  f.el.style.transform='scale(1.25)'; setTimeout(()=>{f.el.style.transform='';},220);
  const hitOne=(t,mult)=>{
    const dmg=Math.max(1,Math.round(f.b.s[1]*mult*bat.ramp));
    if(t.shield>0){ const ab=Math.min(t.shield,dmg); t.shield-=ab; if(dmg-ab<=0){dmgFloat(t,'🛡️');return;} t.hp-=dmg-ab; }
    else t.hp-=dmg;
    const pct=Math.max(0,t.hp/t.maxhp);
    t.el.querySelector('.hpfill').style.width=(pct*100)+'%';
    dmgFloat(t,'✦'+dmg,'pow');
  };
  if(e==='ember') foesA.forEach(t=>hitOne(t,0.6));
  if(e==='tide'){ const t=allies.reduce((a,b)=>a.hp/a.maxhp<b.hp/b.maxhp?a:b); t.hp=Math.min(t.maxhp,t.hp+t.maxhp*0.25);
    t.el.querySelector('.hpfill').style.width=(t.hp/t.maxhp*100)+'%'; dmgFloat(t,'+'+Math.round(t.maxhp*0.25),'heal'); }
  if(e==='bloom'){ const t=foesA[0]; t.slow=4; dmgFloat(t,'🌿slow'); }
  if(e==='spark'){ f.haste=4; dmgFloat(f,'⚡fast!','heal'); }
  if(e==='frost'){ const t=allies.reduce((a,b)=>a.hp/a.maxhp<b.hp/b.maxhp?a:b); t.shield=Math.round(f.b.s[4]*0.8); dmgFloat(t,'🛡️+'+t.shield,'heal'); }
  if(e==='stone'){ const t=foesA.reduce((a,b)=>a.hp<b.hp?a:b); hitOne(t,2.2); t.stun=1.5; }
  if(e==='gloom'){ const t=foesA.reduce((a,b)=>a.b.s[1]>b.b.s[1]?a:b); t.weak=4; dmgFloat(t,'🌑weak'); }
  if(e==='gleam'){ allies.forEach(a=>{a.rally=4;}); dmgFloat(f,'✨RALLY!','heal'); }
}
function endBattle(won){
  bat.active=false;
  $('fightbtn').disabled=false;
  const isBoss=S.rung%5===0;
  const base=20+8*S.rung;
  const coins=won?base:Math.round(base*0.4);
  S.woops+=coins;
  let lootTxt=`+${coins} 🪙`;
  let eggDrop=null, coreDrop=false;
  if(won){
    sfx.win(); confetti(26); shake(180);
    if(isBoss||Math.random()<0.35){
      const opts=S.unlocked; eggDrop=opts[(Math.random()*opts.length)|0];
      S.eggInv[eggDrop]=(S.eggInv[eggDrop]||0)+1;
      lootTxt+=`  +1 ${EGGS[eggDrop].i}${EGGS[eggDrop].n}`;
    }
    if(isBoss||Math.random()<0.4){ S.cores++; coreDrop=true; lootTxt+='  +1 💠'; }
    S.wins++; S.rung++;
    if(!S.spd2Unlocked&&S.rung>=8){ S.spd2Unlocked=true; toast('⚡ 2× battle speed unlocked!'); }
    // egg-type unlocks
    for(const [r,k] of UNLOCK_LADDER){
      if(S.rung>=r&&!S.unlocked.includes(k)){ S.unlocked.push(k); confetti(20); toast(`🎉 ${EGGS[k].n}s unlocked!`); }
    }
  } else { sfx.lose(); }
  // XP
  const xpAmt=won?25+5*(S.rung-1):10+2*S.rung;
  let ups=[];
  S.squad.map(id=>S.ranch.find(b=>b.id===id)).filter(Boolean).forEach(b=>{
    if(grantXp(b,xpAmt)) ups.push(b.name+' Lv.'+b.level);
  });
  if(ups.length){ sfx.lvl(); }
  $('resTitle').textContent=won?(isBoss?'👑 BOSS DOWN!':'🎉 VICTORY!'):nearMiss()?'😮 SO CLOSE!':'💪 GOOD TRY!';
  $('resLoot').textContent=lootTxt;
  $('resXp').textContent=`+${xpAmt} XP each${ups.length?' · LEVEL UP: '+ups.join(', ')+'!':''}`;
  const nu=nextUnlock();
  $('resNext').textContent=won?(nu?`${nu.r-S.rung<=0?'':nu.r-S.rung+' more wins → '+EGGS[nu.k].n+'s '+EGGS[nu.k].i}`:''):tipVsFoes();
  $('resultsOv').classList.add('on');
  stickerCheck();
  save(); hud();
}
function nearMiss(){ const t=bat.f.filter(x=>x.enemy); const left=t.reduce((a,x)=>a+Math.max(0,x.hp),0), max=t.reduce((a,x)=>a+x.maxhp,0); return left/max<0.2; }
function tipVsFoes(){
  const fe=foes[0]?foes[0].el[0]:null; if(!fe) return '';
  const counter=Object.keys(CHART).find(k=>(CHART[k]||{})[fe]===2);
  return counter?`Tip: ${EL[counter].i} ${EL[counter].n} beasts hit POW! against ${EL[fe].i} ${EL[fe].n}`:'';
}
$('resAgain').addEventListener('click',()=>{ $('resultsOv').classList.remove('on'); renderBattlePre(); });
$('resRanch').addEventListener('click',()=>{ $('resultsOv').classList.remove('on'); show('ranch'); });

/* ---------- Woopdex ---------- */
function renderDex(){
  const g=$('dexgrid');
  const baseKeys=Object.keys(SPECIES);
  let html='';
  for(const k of baseKeys){
    const d=S.dex[k];
    if(d) html+=`<div class="dexslot">${beastSVG(d.snap)}<span class="nm">${d.name}</span><span class="ct">×${d.count} ${d.el.map(e=>EL[e].i).join('')}</span></div>`;
    else html+=`<div class="dexslot unknown"><div style="font-size:34px;padding:11px 0">❔</div><span class="nm">???</span><span class="ct">${EL[SPECIES[k].e].i}</span></div>`;
  }
  for(const k of Object.keys(S.dex)) if(k.startsWith('fx_')){
    const d=S.dex[k];
    html+=`<div class="dexslot" style="outline:3px solid ${EL[d.el[0]].c}66">${beastSVG(d.snap)}<span class="nm">${d.name}</span><span class="ct">🧬×${d.count} ${d.el.map(e=>EL[e].i).join('')}</span></div>`;
  }
  html+=`<div class="dexslot unknown"><div style="font-size:34px;padding:11px 0">∞</div><span class="nm">Fuse more!</span><span class="ct">endless species</span></div>`;
  g.innerHTML=html;
  hint(`Woopdex: ${dexCount()} species discovered! Stickers at 10 / 30 / 75 🏅`);
}

/* ---------- daily chest + idle return (doc 07) ---------- */
function welcome(){
  const today=new Date().toISOString().slice(0,10);
  let body=[], icon='🎁', title='Daily Streak Chest!';
  let any=false;
  if(S.lastChestDay!==today && S.wins>0){
    S.lastChestDay=today;
    S.woops+=40; S.cores++; S.eggInv.basic=(S.eggInv.basic||0)+1;
    body.push('+40 🪙  +1 🥚  +1 💠'); any=true;
  }
  if(S.lastSeen){
    const hrs=(Date.now()-S.lastSeen)/36e5;
    if(hrs>0.5){
      const idle=Math.round(Math.min(hrs,12)*(5+S.rung));
      S.woops+=idle;
      body.push(`Your beasts trained hard: +${idle} 🪙`);
      title='Welcome back!'; icon='💪'; any=true;
    }
  }
  if(any){
    $('chestIcon').textContent=icon; $('chestTitle').textContent=title;
    $('chestBody').innerHTML=body.join('<br>');
    $('chestOv').classList.add('on');
    save();
  }
}
$('chestOk').addEventListener('click',()=>{ $('chestOv').classList.remove('on'); sfx.coin(); confetti(18); hud(); });

/* ---------- main loop (standards §5) ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);
  last=now;
  if(bat.active) battleTick(dt*(S.speed2x?2:1));
  requestAnimationFrame(loop);
}

/* ---------- boot ---------- */
load();
window.addEventListener('visibilitychange',()=>{ if(document.hidden) save(); });
window.addEventListener('pagehide',save);
document.addEventListener('pointerdown',()=>ac(),{once:true});
hud();
show('ranch');
if(S.ranch.length===0 && totalEggs()>0){ show('hatchery'); hint('Tap the egg 3 times to hatch your first beast! 🐣'); }
welcome();
requestAnimationFrame(loop);

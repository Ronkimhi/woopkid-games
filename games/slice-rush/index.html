<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var heartsEl = document.getElementById('hearts');
var comboEl = document.getElementById('combo');
var comboTxtEl = document.getElementById('comboTxt');
var comboBarEl = document.getElementById('comboBar');
var powerEl = document.getElementById('power');
var powerTxtEl = document.getElementById('powerTxt');
var powerBarEl = document.getElementById('powerBar');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelGateEl = document.getElementById('panelGate');
var panelBestEl = document.getElementById('panelBest');
var panelSlicesEl = document.getElementById('panelSlices');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game, same key + shape as before) ================= */
var STORAGE_KEY = 'woopkid_slice-rush';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, k) { return a + (b - a) * k; }
function easeOutCubic(k) { var u = 1 - k; return 1 - u * u * u; }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Slice: juicy swish plus a pling whose pitch climbs with the streak */
function sfxSlice(streak) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 2.2;
    bp.frequency.setValueAtTime(2800 * p, t);
    bp.frequency.exponentialRampToValueAtTime(650 * p, t + 0.08);
    var ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, t);
    ng.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
    src.connect(bp); bp.connect(ng); ng.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.12);

    var f = 460 * Math.pow(1.05, Math.min(streak, 16)) * p;
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * 1.33, t + 0.045);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.17);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t);
    o.stop(t + 0.19);
}

/* Multi-slice combo: bright ascending arpeggio */
function sfxCombo(n) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    var base = 523 * p;
    o.frequency.setValueAtTime(base, t);
    o.frequency.setValueAtTime(base * 1.25, t + 0.07);
    o.frequency.setValueAtTime(base * 1.5, t + 0.14);
    o.frequency.setValueAtTime(base * 2, t + 0.21);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.015);
    g.gain.setValueAtTime(0.16, t + 0.24);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.44);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.46);
}

/* Power fruit: quick rising party arp */
function sfxPower() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.setValueAtTime(523 * p, t + 0.06);
    o.frequency.setValueAtTime(659 * p, t + 0.12);
    o.frequency.setValueAtTime(880 * p, t + 0.18);
    o.frequency.setValueAtTime(1175 * p, t + 0.24);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.1, t + 0.015);
    g.gain.setValueAtTime(0.1, t + 0.28);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.52);
}

/* Stink bomb: silly deflating wah plus hiss - never scary */
function sfxStink() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(300 * p, t);
    o.frequency.exponentialRampToValueAtTime(80 * p, t + 0.4);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(900, t);
    lp.frequency.linearRampToValueAtTime(300, t + 0.4);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.44);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.46);

    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 0.8;
    bp.frequency.setValueAtTime(700, t);
    bp.frequency.linearRampToValueAtTime(250, t + 0.3);
    var ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, t);
    ng.gain.exponentialRampToValueAtTime(0.08, t + 0.02);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    src.connect(bp); bp.connect(ng); ng.connect(audioCtx.destination);
    src.start(t);
    src.stop(t + 0.32);
}

/* Fanfare for new best or sticker */

/* ================= Constants ================= */
var H = 720;                 /* logical world height, width derived from aspect */
var G = 1050;                /* gravity for thrown fruit */
var TRAIL_TTL = 0.22;
var TRAIL_W = 11;
var SLICE_PAD = 10;          /* extra blade thickness for hits */
var GESTURE_WINDOW = 0.19;   /* multi-slice combo window */
var HEARTS_MAX = 3;

/* sticker thresholds for the shared profile */
var THRESHOLDS = { bronze: 150, silver: 500, gold: 1200 };

/* fruit types */
var T_MELON = 0, T_ORANGE = 1, T_APPLE = 2, T_KIWI = 3, T_BERRY = 4, T_LEMON = 5;
var T_STAR = 6, T_CHILL = 7, T_RAINBOW = 8, T_BOMB = 9;
var TYPE_R = [42, 30, 29, 27, 28, 27, 30, 28, 28, 30];
var TYPE_PTS = [15, 10, 10, 12, 12, 12, 25, 25, 25, 0];
var JUICE = [
    ['#FF6B81', '#FF98A8', '#5BD36A'],
    ['#FFA53D', '#FFC46B', '#FFE0A8'],
    ['#FF8A8A', '#FFF3DD', '#FFB3B3'],
    ['#A8E05F', '#C8F08F', '#7FBF3F'],
    ['#FF5FA2', '#FF9CC5', '#FFD1E3'],
    ['#FFE04A', '#FFF0A0', '#FFD93D'],
    ['#FFD93D', '#FFF3B0', '#FFAB2E'],
    ['#6FD3FF', '#B7E9FF', '#FFFFFF'],
    ['#FF5FA2', '#FFD93D', '#4FC3F7'],
    ['#B4D95A', '#8FBF3F', '#D5EE8E']
];
var MULT_STEPS = [0, 6, 14, 24, 36];    /* streak needed for x1..x5 */
var COMBO_WORDS = ['TRIPLE!', 'QUAD!', 'MEGA!', 'ULTRA!', 'LEGEND!'];
var TRAIL_HUES = ['#7BE0FF', '#FFD93D', '#FF9C55', '#FF5FA2', '#C79BFF'];
var RAINBOW = ['#FF5FA2', '#FF8A3D', '#FFD93D', '#58C990', '#4FC3F7', '#B388FF'];

var State = {
    MENU: 'menu',
    PLAYING: 'playing',
    PAUSED: 'paused',
    ENDING: 'ending',
    GAME_OVER: 'gameOver'
};
var currentState = State.MENU;

/* ================= Canvas sizing + prerendered sprites ================= */
var S = 1;      /* device pixels per logical unit */
var VW = 400;   /* logical view width */
var bgSpr = null, glowSpr = null;
var vigBlue = null, vigGold = null, vigGreen = null;
var SPR_W = [], SPR_A = [], SPR_B = [], SPR_PAD = 12;

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function makeVignette(rgb) {
    var v = makeCanvas(256, 256);
    var c = v.getContext('2d');
    var g = c.createRadialGradient(128, 128, 60, 128, 128, 185);
    g.addColorStop(0, 'rgba(' + rgb + ',0)');
    g.addColorStop(1, 'rgba(' + rgb + ',0.55)');
    c.fillStyle = g;
    c.fillRect(0, 0, 256, 256);
    return v;
}

function sheen(c, r) {
    c.fillStyle = 'rgba(255,255,255,0.35)';
    c.beginPath();
    c.ellipse(-r * 0.34, -r * 0.4, r * 0.3, r * 0.17, -0.6, 0, Math.PI * 2);
    c.fill();
}
var INK = '#1D1440';

function drawFruitBody(c, t, r) {
    var i;
    c.lineWidth = 3.5;
    c.strokeStyle = INK;
    if (t === T_MELON) {
        c.fillStyle = '#3FBF57';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill();
        c.save();
        c.beginPath(); c.arc(0, 0, r - 1.5, 0, Math.PI * 2); c.clip();
        c.strokeStyle = '#2E8F3C';
        c.lineWidth = 7;
        for (i = -2; i <= 2; i++) {
            c.beginPath();
            c.moveTo(i * 15, -r);
            c.quadraticCurveTo(i * 15 + 8, 0, i * 15, r);
            c.stroke();
        }
        c.restore();
        c.lineWidth = 3.5;
        c.strokeStyle = INK;
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.stroke();
        sheen(c, r);
    } else if (t === T_ORANGE) {
        c.fillStyle = '#FFA53D';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill(); c.stroke();
        c.fillStyle = 'rgba(232,138,42,0.65)';
        c.beginPath();
        c.arc(-8, 8, 2.2, 0, Math.PI * 2);
        c.arc(9, 4, 2, 0, Math.PI * 2);
        c.arc(2, 14, 2, 0, Math.PI * 2);
        c.arc(11, -9, 1.8, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#58C990';
        c.beginPath(); c.ellipse(6, -r + 1, 9, 5, 0.5, 0, Math.PI * 2); c.fill();
        c.lineWidth = 2.5; c.stroke();
        sheen(c, r);
    } else if (t === T_APPLE) {
        c.fillStyle = '#FF5A5A';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill(); c.stroke();
        /* stem + leaf */
        c.strokeStyle = '#8A5A2B';
        c.lineWidth = 4;
        c.beginPath(); c.moveTo(0, -r + 2); c.quadraticCurveTo(3, -r - 7, 8, -r - 9); c.stroke();
        c.fillStyle = '#58C990';
        c.beginPath(); c.ellipse(-8, -r - 2, 8, 4.5, -0.5, 0, Math.PI * 2); c.fill();
        c.lineWidth = 2.5; c.strokeStyle = INK; c.stroke();
        /* cute face */
        c.fillStyle = INK;
        c.beginPath();
        c.arc(-8, -1, 2.6, 0, Math.PI * 2);
        c.arc(8, -1, 2.6, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = INK; c.lineWidth = 2.4;
        c.beginPath(); c.arc(0, 4, 5, 0.3, Math.PI - 0.3); c.stroke();
        c.fillStyle = 'rgba(255,255,255,0.4)';
        c.beginPath(); c.arc(-14, 6, 3, 0, Math.PI * 2); c.arc(14, 6, 3, 0, Math.PI * 2); c.fill();
        sheen(c, r);
    } else if (t === T_KIWI) {
        c.fillStyle = '#9C7B4F';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill(); c.stroke();
        /* fuzz */
        c.strokeStyle = 'rgba(120,90,55,0.9)';
        c.lineWidth = 1.6;
        c.beginPath();
        for (i = 0; i < 12; i++) {
            var fa = i / 12 * Math.PI * 2;
            c.moveTo(Math.cos(fa) * (r - 1), Math.sin(fa) * (r - 1));
            c.lineTo(Math.cos(fa) * (r + 3), Math.sin(fa) * (r + 3));
        }
        c.stroke();
        sheen(c, r);
    } else if (t === T_BERRY) {
        /* strawberry */
        c.save();
        c.scale(1, 1.08);
        c.fillStyle = '#FF4F79';
        c.beginPath(); c.arc(0, 0, r * 0.94, 0, Math.PI * 2); c.fill();
        c.lineWidth = 3.5; c.strokeStyle = INK; c.stroke();
        c.restore();
        c.fillStyle = '#FFE08A';
        c.beginPath();
        c.arc(-10, 2, 1.7, 0, Math.PI * 2);
        c.arc(0, 10, 1.7, 0, Math.PI * 2);
        c.arc(10, 2, 1.7, 0, Math.PI * 2);
        c.arc(-5, 16, 1.7, 0, Math.PI * 2);
        c.arc(6, 18, 1.7, 0, Math.PI * 2);
        c.fill();
        /* crown */
        c.fillStyle = '#4CC463';
        c.beginPath();
        c.moveTo(-14, -r * 0.86);
        c.lineTo(-6, -r * 1.24); c.lineTo(-2, -r * 0.9);
        c.lineTo(3, -r * 1.3); c.lineTo(7, -r * 0.9);
        c.lineTo(15, -r * 1.14); c.lineTo(12, -r * 0.78);
        c.closePath(); c.fill();
        c.lineWidth = 2.5; c.strokeStyle = INK; c.stroke();
        /* face */
        c.fillStyle = INK;
        c.beginPath(); c.arc(-8, -4, 2.4, 0, Math.PI * 2); c.arc(8, -4, 2.4, 0, Math.PI * 2); c.fill();
        c.strokeStyle = INK; c.lineWidth = 2.2;
        c.beginPath(); c.arc(0, 0, 4.5, 0.3, Math.PI - 0.3); c.stroke();
        sheen(c, r);
    } else if (t === T_LEMON) {
        c.save();
        c.scale(1.18, 0.9);
        c.fillStyle = '#FFE04A';
        c.beginPath(); c.arc(0, 0, r * 0.92, 0, Math.PI * 2); c.fill();
        c.lineWidth = 3.5; c.strokeStyle = INK; c.stroke();
        c.restore();
        c.fillStyle = '#FFE04A';
        c.beginPath(); c.arc(-r * 1.05, 0, 5, 0, Math.PI * 2); c.arc(r * 1.05, 0, 5, 0, Math.PI * 2); c.fill();
        c.lineWidth = 3; c.strokeStyle = INK;
        c.beginPath(); c.arc(-r * 1.05, 0, 5, 0, Math.PI * 2); c.stroke();
        c.beginPath(); c.arc(r * 1.05, 0, 5, 0, Math.PI * 2); c.stroke();
        sheen(c, r);
    } else if (t === T_STAR) {
        /* golden frenzy star with baked glow */
        var gg = c.createRadialGradient(0, 0, 4, 0, 0, r + SPR_PAD - 1);
        gg.addColorStop(0, 'rgba(255,217,61,0.55)');
        gg.addColorStop(1, 'rgba(255,217,61,0)');
        c.fillStyle = gg;
        c.beginPath(); c.arc(0, 0, r + SPR_PAD - 1, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#FFD93D';
        c.beginPath();
        for (i = 0; i < 10; i++) {
            var sr = i % 2 === 0 ? r : r * 0.46;
            var sa = -Math.PI / 2 + i * Math.PI / 5;
            if (i === 0) c.moveTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
            else c.lineTo(Math.cos(sa) * sr, Math.sin(sa) * sr);
        }
        c.closePath(); c.fill();
        c.lineWidth = 3.5; c.strokeStyle = INK; c.stroke();
        c.fillStyle = INK;
        c.beginPath(); c.arc(-6, -2, 2.3, 0, Math.PI * 2); c.arc(6, -2, 2.3, 0, Math.PI * 2); c.fill();
        c.lineWidth = 2.2; c.strokeStyle = INK;
        c.beginPath(); c.arc(0, 3, 4, 0.3, Math.PI - 0.3); c.stroke();
    } else if (t === T_CHILL) {
        c.fillStyle = '#6FD3FF';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill(); c.stroke();
        /* snowflake */
        c.strokeStyle = 'rgba(255,255,255,0.95)';
        c.lineWidth = 3;
        c.beginPath();
        for (i = 0; i < 3; i++) {
            var na = i * Math.PI / 3;
            c.moveTo(Math.cos(na) * r * 0.62, Math.sin(na) * r * 0.62);
            c.lineTo(-Math.cos(na) * r * 0.62, -Math.sin(na) * r * 0.62);
        }
        c.stroke();
        c.beginPath(); c.arc(0, 0, r * 0.24, 0, Math.PI * 2); c.stroke();
        sheen(c, r);
    } else if (t === T_RAINBOW) {
        c.save();
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.clip();
        for (i = 0; i < 6; i++) {
            c.fillStyle = RAINBOW[i];
            c.fillRect(-r, -r + i * (r * 2 / 6), r * 2, r * 2 / 6 + 1);
        }
        c.restore();
        c.lineWidth = 3.5; c.strokeStyle = INK;
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.stroke();
        c.fillStyle = 'rgba(255,255,255,0.85)';
        c.beginPath();
        c.arc(-9, -9, 2, 0, Math.PI * 2);
        c.arc(10, 5, 1.7, 0, Math.PI * 2);
        c.arc(-4, 11, 1.7, 0, Math.PI * 2);
        c.fill();
        sheen(c, r);
    } else {
        /* stink bomb: grumpy wobbly green ball with stink squiggles */
        c.fillStyle = '#9DBE4F';
        c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.fill(); c.stroke();
        c.fillStyle = 'rgba(122,154,56,0.8)';
        c.beginPath();
        c.arc(-10, 8, 4.5, 0, Math.PI * 2);
        c.arc(11, 10, 3.6, 0, Math.PI * 2);
        c.arc(12, -8, 3, 0, Math.PI * 2);
        c.fill();
        /* stink squiggles above */
        c.strokeStyle = '#C7E86B';
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(-10, -r - 4); c.quadraticCurveTo(-14, -r - 10, -10, -r - 15);
        c.moveTo(0, -r - 5); c.quadraticCurveTo(4, -r - 12, 0, -r - 18);
        c.moveTo(10, -r - 4); c.quadraticCurveTo(6, -r - 10, 10, -r - 15);
        c.stroke();
        /* grumpy face */
        c.strokeStyle = INK;
        c.lineWidth = 3;
        c.beginPath();
        c.moveTo(-13, -8); c.lineTo(-4, -4);
        c.moveTo(13, -8); c.lineTo(4, -4);
        c.stroke();
        c.fillStyle = INK;
        c.beginPath(); c.arc(-8, 0, 2.6, 0, Math.PI * 2); c.arc(8, 0, 2.6, 0, Math.PI * 2); c.fill();
        c.lineWidth = 2.6;
        c.beginPath(); c.arc(0, 12, 5, Math.PI + 0.35, Math.PI * 2 - 0.35); c.stroke();
    }
}

function drawCutFace(c, t, r, top) {
    var fw = r * 0.96;
    var y0 = top ? -9 : 0;
    var band, inner;
    if (t === T_MELON) { band = '#FF6B81'; inner = '#FFB3C0'; }
    else if (t === T_ORANGE) { band = '#FFC46B'; inner = '#FFE0A8'; }
    else if (t === T_APPLE) { band = '#FFF3DD'; inner = '#FFFFFF'; }
    else if (t === T_KIWI) { band = '#B6E86B'; inner = '#F2FFDD'; }
    else if (t === T_BERRY) { band = '#FFB9CE'; inner = '#FFE4EE'; }
    else { band = '#FFF3B0'; inner = '#FFFDE0'; }
    c.fillStyle = band;
    rr(c, -fw, y0, fw * 2, 9, 4);
    c.fill();
    /* inner detail */
    c.fillStyle = inner;
    if (t === T_ORANGE || t === T_LEMON) {
        var i;
        for (i = -2; i <= 2; i++) {
            c.fillRect(i * fw * 0.36 - 2, y0 + 2, 4, 5);
        }
    } else if (t === T_KIWI) {
        rr(c, -fw * 0.3, y0 + 2.5, fw * 0.6, 4, 2);
        c.fill();
        c.fillStyle = INK;
        c.fillRect(-fw * 0.5, top ? -5 : 3, 2.5, 2);
        c.fillRect(fw * 0.45, top ? -5 : 3, 2.5, 2);
        c.fillRect(-2, top ? -7 : 5, 2.5, 2);
    } else if (t === T_MELON) {
        c.fillStyle = INK;
        var sy = top ? -4.5 : 4.5;
        c.beginPath();
        c.ellipse(-r * 0.45, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
        c.ellipse(r * 0.05, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
        c.ellipse(r * 0.5, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
        c.fill();
    } else {
        rr(c, -fw * 0.55, y0 + 3, fw * 1.1, 2.5, 1.5);
        c.fill();
    }
    /* dark cut line on the edge */
    c.strokeStyle = INK;
    c.lineWidth = 2.5;
    c.beginPath();
    c.moveTo(-fw, top ? 0 : 0);
    c.lineTo(fw, top ? 0 : 0);
    c.stroke();
}

function buildFruitSprites() {
    var t, sz, cnv, c;
    for (t = 0; t <= 9; t++) {
        var r = TYPE_R[t];
        sz = (r + SPR_PAD) * 2;
        /* whole */
        cnv = makeCanvas(sz * S, sz * S);
        c = cnv.getContext('2d');
        c.scale(S, S);
        c.translate(r + SPR_PAD, r + SPR_PAD);
        drawFruitBody(c, t, r);
        SPR_W[t] = cnv;
        if (t <= 5) {
            /* top half */
            cnv = makeCanvas(sz * S, sz * S);
            c = cnv.getContext('2d');
            c.scale(S, S);
            c.translate(r + SPR_PAD, r + SPR_PAD);
            c.save();
            c.beginPath(); c.rect(-r - SPR_PAD, -r - SPR_PAD, sz, r + SPR_PAD); c.clip();
            drawFruitBody(c, t, r);
            c.restore();
            drawCutFace(c, t, r, true);
            SPR_A[t] = cnv;
            /* bottom half */
            cnv = makeCanvas(sz * S, sz * S);
            c = cnv.getContext('2d');
            c.scale(S, S);
            c.translate(r + SPR_PAD, r + SPR_PAD);
            c.save();
            c.beginPath(); c.rect(-r - SPR_PAD, 0, sz, r + SPR_PAD); c.clip();
            drawFruitBody(c, t, r);
            c.restore();
            drawCutFace(c, t, r, false);
            SPR_B[t] = cnv;
        }
    }
}

function buildBackground() {
    var w = canvas.width, h = canvas.height;
    var m = Math.ceil(16 * S); /* shake margin */
    bgSpr = makeCanvas(w + m * 2, h + m * 2);
    var c = bgSpr.getContext('2d');
    var W = bgSpr.width, Hh = bgSpr.height;
    /* deep berry-night kitchen gradient */
    var g = c.createLinearGradient(0, 0, 0, Hh);
    g.addColorStop(0, '#1C1240');
    g.addColorStop(0.45, '#2E2058');
    g.addColorStop(0.8, '#472E63');
    g.addColorStop(1, '#5A3A6E');
    c.fillStyle = g;
    c.fillRect(0, 0, W, Hh);
    /* warm moonlight bloom top center */
    var rg = c.createRadialGradient(W * 0.5, Hh * 0.16, 10, W * 0.5, Hh * 0.16, W * 0.75);
    rg.addColorStop(0, 'rgba(255,205,130,0.14)');
    rg.addColorStop(0.5, 'rgba(255,150,120,0.05)');
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = rg;
    c.fillRect(0, 0, W, Hh);
    /* big soft colored bloom orbs for depth */
    var ORBS = [
        [0.16, 0.3, 0.32, '255,95,162', 0.1],
        [0.85, 0.2, 0.26, '79,195,247', 0.09],
        [0.72, 0.62, 0.3, '179,136,255', 0.1],
        [0.22, 0.72, 0.24, '255,171,46', 0.08]
    ];
    var i;
    for (i = 0; i < ORBS.length; i++) {
        var ob = ORBS[i];
        var og = c.createRadialGradient(W * ob[0], Hh * ob[1], 4, W * ob[0], Hh * ob[1], W * ob[2]);
        og.addColorStop(0, 'rgba(' + ob[3] + ',' + ob[4] + ')');
        og.addColorStop(1, 'rgba(' + ob[3] + ',0)');
        c.fillStyle = og;
        c.fillRect(0, 0, W, Hh);
    }
    /* bokeh sparkle dots */
    for (i = 0; i < 60; i++) {
        var bx = Math.random() * W, by = Math.random() * Hh * 0.85;
        var br = Math.random() * 2.6 * S + 0.6 * S;
        c.fillStyle = 'rgba(255,240,220,' + (0.05 + Math.random() * 0.12).toFixed(3) + ')';
        c.beginPath(); c.arc(bx, by, br, 0, Math.PI * 2); c.fill();
    }
    /* kitchen counter silhouettes along the bottom */
    var base = Hh - 0.16 * Hh;
    var u = Hh / 720;
    var cg = c.createLinearGradient(0, base + 22 * u, 0, Hh);
    cg.addColorStop(0, 'rgba(38,24,74,0.85)');
    cg.addColorStop(1, 'rgba(14,8,34,0.9)');
    c.fillStyle = cg;
    c.fillRect(0, base + 22 * u, W, Hh - base);
    /* warm rim light along the counter edge */
    c.fillStyle = 'rgba(255,190,140,0.18)';
    c.fillRect(0, base + 22 * u, W, 3 * u);
    function jar(x, jw, jh) {
        rr(c, x, base + 22 * u - jh, jw, jh, 8 * u); c.fill();
        rr(c, x + jw * 0.22, base + 12 * u - jh, jw * 0.56, 12 * u, 4 * u); c.fill();
    }
    c.fillStyle = 'rgba(16,10,38,0.5)';
    var step = Math.max(340 * u, W / 6);
    for (var sx = 20 * u; sx < W; sx += step) {
        jar(sx, 46 * u, 84 * u);
        jar(sx + 70 * u, 36 * u, 58 * u);
        /* pot */
        rr(c, sx + 130 * u, base + 22 * u - 62 * u, 96 * u, 62 * u, 10 * u); c.fill();
        rr(c, sx + 150 * u, base + 22 * u - 76 * u, 56 * u, 14 * u, 6 * u); c.fill();
        /* standing spoon */
        rr(c, sx + 250 * u, base + 22 * u - 70 * u, 8 * u, 70 * u, 4 * u); c.fill();
        c.beginPath();
        c.ellipse(sx + 254 * u, base + 22 * u - 80 * u, 11 * u, 15 * u, 0, 0, Math.PI * 2);
        c.fill();
    }
    /* soft vignette */
    var vg = c.createRadialGradient(W / 2, Hh * 0.45, Hh * 0.3, W / 2, Hh * 0.45, Hh * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(10,6,28,0.42)');
    c.fillStyle = vg;
    c.fillRect(0, 0, W, Hh);
}

function buildSprites() {
    /* soft round glow used by trail, motes and sparkles */
    glowSpr = makeCanvas(64, 64);
    var glc = glowSpr.getContext('2d');
    var gg = glc.createRadialGradient(32, 32, 2, 32, 32, 32);
    gg.addColorStop(0, 'rgba(255,255,255,0.9)');
    gg.addColorStop(0.4, 'rgba(255,255,255,0.32)');
    gg.addColorStop(1, 'rgba(255,255,255,0)');
    glc.fillStyle = gg;
    glc.fillRect(0, 0, 64, 64);
    vigBlue = makeVignette('80,170,255');
    vigGold = makeVignette('255,190,60');
    vigGreen = makeVignette('140,190,60');

}

/* particle kinds: 1 juice drop, 2 star glint, 3 confetti, 4 stink puff */
function spawnPart(kind, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.kind = kind;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, Math.PI * 2);
            p.vr = rand(-7, 7);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;
            p.seed = rand(0, 10);
            return;
        }
    }
}

function spawnPop(x, y, txt, size, color) {
    for (var i = 0; i < pops.length; i++) {
        var p = pops[i];
        if (!p.active) {
            p.active = true;
            p.x = clamp(x, 85, VW - 85); p.y = clamp(y, 60, H - 30); p.txt = txt;
            p.life = 0; p.ttl = 0.9; p.size = size; p.color = color;
            return;
        }
    }
}

function spawnRing(x, y, r1, color, rays, ttl, w) {
    for (var i = 0; i < rings.length; i++) {
        var rg = rings[i];
        if (!rg.active) {
            rg.active = true;
            rg.x = x; rg.y = y;
            rg.life = 0; rg.ttl = ttl || 0.45;
            rg.r0 = 12; rg.r1 = r1;
            rg.w = w || 9;
            rg.color = color;
            rg.rays = !!rays;
            return;
        }
    }
}

function spawnSplat(x, y, color, scale) {
    for (var i = 0; i < splats.length; i++) {
        var sp = splats[i];
        if (!sp.active) {
            sp.active = true;
            sp.x = x; sp.y = y; sp.color = color;
            sp.life = 0; sp.ttl = 3.2; sp.scale = scale;
            for (var b = 0; b < 5; b++) {
                var a = rand(0, Math.PI * 2), d = rand(0, 22);
                sp.ox[b] = Math.cos(a) * d;
                sp.oy[b] = Math.sin(a) * d * 0.8;
                sp.or_[b] = rand(7, 17);
            }
            return;
        }
    }
}

function burstJuice(x, y, type, big) {
    var cols = JUICE[type];
    var n = big ? 12 : 8;
    for (var i = 0; i < n; i++) {
        var a = rand(0, Math.PI * 2);
        var sp = rand(90, big ? 380 : 300);
        spawnPart(1, x, y, Math.cos(a) * sp, Math.sin(a) * sp - 80, rand(0.4, 0.8), rand(3.5, 7), cols[i % cols.length]);
    }
    for (i = 0; i < 3; i++) {
        spawnPart(2, x + rand(-14, 14), y + rand(-14, 14), rand(-50, 50), rand(-90, -20), rand(0.3, 0.5), rand(4, 7), '#FFFFFF');
    }
}
function burstStink(x, y) {
    for (var i = 0; i < 12; i++) {
        var a = rand(0, Math.PI * 2);
        var sp = rand(30, 150);
        spawnPart(4, x + rand(-10, 10), y + rand(-10, 10), Math.cos(a) * sp, Math.sin(a) * sp - 40, rand(0.6, 1.1), rand(9, 18), i % 2 ? '#9DBE4F' : '#C7E86B');
    }
}
var CONFETTI_COLORS = ['#FF8A3D', '#7ED957', '#4FC3F7', '#FFD93D', '#FF5FA2', '#B388FF'];
function burstConfetti(x, y) {

/* ================= Spawning / throw director ================= */
function enqueue(delay, type, x, vx, vy) {
    for (var i = 0; i < queue.length; i++) {
        var q = queue[i];
        if (!q.active) {
            q.active = true;
            q.delay = delay; q.type = type;
            q.x = x; q.vx = vx; q.vy = vy;
            return;
        }
    }
}

function fireFruit(type, x, vx, vy) {
    for (var i = 0; i < fruits.length; i++) {
        var f = fruits[i];
        if (!f.active) {
            f.active = true;
            f.type = type;
            f.r = TYPE_R[type];
            f.x = x; f.y = H + f.r + 12;
            f.vx = vx; f.vy = vy;
            f.rot = rand(0, Math.PI * 2);
            f.vr = rand(-3.2, 3.2);
            f.wob = rand(0, 6.28);
            return;
        }
    }
}

/* lob math: choose launch x, target x and apex height -> initial velocity */
function lob(delay, type, x0, tx, apexY) {
    var vy = -Math.sqrt(2 * G * Math.max(120, H + 40 - apexY));
    var tApex = -vy / G;
    var vx = (tx - x0) / tApex;
    enqueue(delay, type, x0, vx, vy);
}

function pickFruit(d) {
    if (d < 0.25) {
        var easy = [T_MELON, T_MELON, T_ORANGE, T_APPLE, T_BERRY, T_LEMON];
        return easy[(Math.random() * easy.length) | 0];
    }
    return (Math.random() * 6) | 0;
}

function bombify(type, chance, state) {
    if (state.bombs < 2 && Math.random() < chance) { state.bombs++; return T_BOMB; }
    return type;
}

function spawnPattern() {
    var d = clamp(runT / 150, 0, 1);
    var bombChance = runT < 22 ? 0 : lerp(0.07, 0.2, clamp((runT - 22) / 120, 0, 1));
    var apexHi = lerp(210, 100, d);   /* higher throws later */
    var apexLo = lerp(340, 260, d);
    var bs = { bombs: 0 };
    var tier = runT < 20 ? 0 : (runT < 45 ? 1 : (runT < 90 ? 2 : 3));
    var pats;
    if (tier === 0) pats = [0, 0, 0, 1, 1];
    else if (tier === 1) pats = [0, 1, 1, 2, 2, 5];
    else if (tier === 2) pats = [1, 2, 2, 3, 4, 4, 5];
    else pats = [2, 3, 3, 4, 6, 7, 8, 8];
    var p = pats[(Math.random() * pats.length) | 0];
    var i, n, x0, cx;
    var mL = 70, mR = VW - 70;
    if (p === 0) {
        /* single lob */
        x0 = rand(mL, mR);
        lob(0, bombify(pickFruit(d), bombChance * 0.5, bs), x0, clamp(x0 + rand(-120, 120), mL, mR), rand(apexHi, apexLo));
    } else if (p === 1) {
        /* double */
        for (i = 0; i < 2; i++) {
            x0 = rand(mL, mR);
            lob(i * 0.14, bombify(pickFruit(d), bombChance * 0.7, bs), x0, clamp(x0 + rand(-140, 140), mL, mR), rand(apexHi, apexLo));
        }
    } else if (p === 2 || p === 3 || p === 6) {
        /* fan of 3 / 5 / 6 from bottom center */
        n = p === 2 ? 3 : (p === 3 ? 5 : 6);
        cx = VW / 2 + rand(-VW * 0.12, VW * 0.12);
        for (i = 0; i < n; i++) {
            var tx = lerp(VW * 0.16, VW * 0.84, n === 1 ? 0.5 : i / (n - 1)) + rand(-20, 20);
            lob(i * 0.06, bombify(pickFruit(d), bombChance, bs), cx + rand(-40, 40), tx, rand(apexHi, apexHi + 90));
        }
    } else if (p === 4 || p === 7) {
        /* crisscross from both sides */
        n = p === 4 ? 4 : 6;
        for (i = 0; i < n; i++) {
            var left = i % 2 === 0;
            x0 = left ? rand(30, 90) : rand(VW - 90, VW - 30);
            var tx2 = left ? rand(VW * 0.55, VW * 0.85) : rand(VW * 0.15, VW * 0.45);
            lob(i * 0.13, bombify(pickFruit(d), bombChance, bs), x0, tx2, rand(apexHi, apexHi + 70));
        }
    } else if (p === 5) {
        /* high lob pair */
        for (i = 0; i < 2; i++) {
            x0 = rand(mL, mR);
            lob(i * 0.1, bombify(pickFruit(d), bombChance * 0.6, bs), x0, clamp(x0 + rand(-80, 80), mL, mR), rand(90, 150));
        }
    } else {
        /* fast triple lob, tier 3 only */
        for (i = 0; i < 3; i++) {
            x0 = rand(mL, mR);
            lob(i * 0.08, bombify(pickFruit(d), bombChance, bs), x0, clamp(x0 + rand(-160, 160), mL, mR), rand(85, 170));
        }
    }
}

function maybeSpecial(dt) {
    specialT -= dt;
    if (specialT > 0) return;
    if (frenzyT > 0 || slowT > 0 || dblT > 0) return;
    specialT = rand(16, 26);
    var roll = Math.random();
    var type = roll < 0.34 ? T_STAR : (roll < 0.67 ? T_CHILL : T_RAINBOW);
    var x0 = rand(90, VW - 90);
    lob(0, type, x0, clamp(x0 + rand(-90, 90), 70, VW - 70), rand(140, 240));
}

var HEART_ON = '❤️', HEART_OFF = '🤍';
function refreshHearts(pop) {

function multForStreak(s) {
    var m = 1;
    for (var i = 1; i < MULT_STEPS.length; i++) if (s >= MULT_STEPS[i]) m = i + 1;
    return m;
}

function refreshComboUI() {
    if (streak >= 3 || mult > 1) {
        comboTxtEl.textContent = mult > 1 ? 'x' + mult + ' STREAK' : 'STREAK ' + streak;
        comboEl.style.display = 'block';
        var lo = MULT_STEPS[mult - 1];
        var hi = mult < 5 ? MULT_STEPS[mult] : MULT_STEPS[4] + 12;
        comboBarEl.style.width = (clamp((streak - lo) / (hi - lo), 0, 1) * 100) + '%';
    } else {
        comboEl.style.display = 'none';
    }
}

function popCombo() {
    comboTxtEl.classList.remove('pop');
    void comboTxtEl.offsetWidth;
    comboTxtEl.classList.add('pop');
}

/* ================= Slicing ================= */
function sliceFruit(f, ang, scoring) {
    f.active = false;
    var big = f.type === T_MELON;
    burstJuice(f.x, f.y, f.type, big);
    if (f.type <= 5) {
        spawnSplat(f.x, f.y, JUICE[f.type][0], big ? 1.5 : 1);
        /* two halves flying apart with spin, cut along the swipe angle */
        var sn = Math.sin(ang), cs = Math.cos(ang);
        for (var s = 0; s < 2; s++) {
            for (var i = 0; i < halves.length; i++) {
                var hv = halves[i];
                if (hv.active) continue;
                var side = s === 0 ? -1 : 1;   /* -1: top half pushed up-perp */
                hv.active = true;
                hv.type = f.type;
                hv.half = s;
                hv.r = f.r;
                var push = rand(120, 200);
                hv.x = f.x + -sn * side * 5;
                hv.y = f.y + cs * side * 5;
                hv.vx = f.vx * 0.55 + -sn * side * push;
                hv.vy = f.vy * 0.45 + cs * side * push - 60;
                hv.rot = ang;
                hv.vr = side * rand(2.5, 7);
                hv.life = 0;
                hv.ttl = 1.6;
                break;
            }
        }
    }
    if (!scoring) { sfxSlice(2); return; }

    totalSlices++;
    if (f.type === T_BOMB) { hitBomb(f); return; }

    streak++;
    if (streak > bestStreak) bestStreak = streak;
    var newMult = multForStreak(streak);
    if (newMult > mult) {
        mult = newMult;
        spawnPop(f.x, clamp(f.y - 60, 60, H), 'MULTIPLIER x' + mult + '!', 30, '#FFD93D');
        spawnRing(f.x, f.y, 130, '#FFD93D', true, 0.5, 10);
        trauma = Math.min(0.4, trauma + 0.18);
        sfxCombo(3);
        /* streak milestones win a heart back - earned through play */
        if ((mult === 3 || mult === 5) && hearts < HEARTS_MAX) {
            hearts++;
            refreshHearts(true);
            spawnPop(f.x, clamp(f.y - 96, 60, H), '+1 ❤', 26, '#FF5FA2');
        }
        logEvent({ t: 'mult', mult: mult });
    }
    refreshComboUI();

    var dbl = dblT > 0 ? 2 : 1;
    var pts = TYPE_PTS[f.type] * mult * dbl;
    score += pts;
    refreshScore();
    var col = mult >= 3 ? '#FF5FA2' : (mult === 2 || dbl === 2 ? '#FFD93D' : '#FFFFFF');
    spawnPop(f.x, f.y - f.r - 12, '+' + pts, 24, col);
    trauma = Math.min(0.4, trauma + 0.03);
    sfxSlice(streak);

    if (f.type >= T_STAR && f.type <= T_RAINBOW) activatePower(f);

    /* multi-slice gesture window */
    gestureN++;
    gestureX = f.x; gestureY = f.y;
    gestureT = GESTURE_WINDOW;

    logEvent({ t: 'slice', type: f.type, streak: streak, pts: pts, score: score });
}

function activatePower(f) {
    if (f.type === T_STAR) {
        frenzyT = 5;
        frenzySpawnT = 0;
        powerTxtEl.textContent = 'FRUIT FRENZY!';
        powerTxtEl.style.color = '#FFD93D';
        powerBarEl.style.background = '#FFD93D';
        spawnPop(f.x, clamp(f.y - 70, 60, H), 'FRENZY!!', 40, '#FFD93D');
        spawnRing(f.x, f.y, 190, '#FFD93D', true, 0.6, 12);
        goldFlashT = 0.5;
        trauma = Math.min(0.45, trauma + 0.25);
    } else if (f.type === T_CHILL) {
        slowT = 5;
        powerTxtEl.textContent = 'SLOW-MO!';
        powerTxtEl.style.color = '#6FD3FF';
        powerBarEl.style.background = '#6FD3FF';
        spawnPop(f.x, clamp(f.y - 70, 60, H), 'SLOW-MO!', 36, '#6FD3FF');
        spawnRing(f.x, f.y, 170, '#6FD3FF', false, 0.6, 10);
    } else {
        dblT = 8;
        powerTxtEl.textContent = 'DOUBLE POINTS!';
        powerTxtEl.style.color = '#FF5FA2';
        powerBarEl.style.background = '#FF5FA2';
        spawnPop(f.x, clamp(f.y - 70, 60, H), 'x2 POINTS!', 36, '#FF5FA2');
        spawnRing(f.x, f.y, 170, '#FF5FA2', true, 0.6, 10);
    }
    powerEl.style.display = 'block';
    sfxPower();
    logEvent({ t: 'power', type: f.type });
}

function hitBomb(f) {
    burstStink(f.x, f.y);
    spawnSplat(f.x, f.y, '#9DBE4F', 1.6);
    spawnPop(f.x, clamp(f.y - 50, 60, H), 'PEE-YEW!', 32, '#C7E86B');
    bombFlashT = 0.55;
    trauma = 0.55;
    freezeT = Math.max(freezeT, 0.05);
    streak = 0;
    mult = 1;
    refreshComboUI();
    sfxStink();
    logEvent({ t: 'bomb' });
    loseHeart('bomb');
}

function loseHeart(why) {
    if (currentState !== State.PLAYING) return;
    if (invulnT > 0) return;
    invulnT = 0.9;
    hearts--;
    refreshHearts(true);
    if (why === 'miss') {
        trauma = Math.max(trauma, 0.22);
        sfxMiss();
    }
    logEvent({ t: 'heart', left: hearts, why: why });
    if (hearts <= 0) beginGameOver(why);
}

function resolveGesture() {
    if (gestureN >= 3) {
        var n = gestureN;
        if (n > bestBurst) bestBurst = n;
        var dbl = dblT > 0 ? 2 : 1;
        var bonus = n * 15 * mult * dbl;
        score += bonus;
        refreshScore();
        var word = COMBO_WORDS[clamp(n - 3, 0, COMBO_WORDS.length - 1)];
        spawnPop(gestureX, clamp(gestureY - 50, 70, H - 40), word, 38, '#FFD93D');
        spawnPop(gestureX, clamp(gestureY - 12, 70, H - 40), '+' + bonus, 28, '#FF5FA2');
        spawnRing(gestureX, gestureY, 150 + n * 18, '#FFFFFF', true, 0.55, 11);
        spawnRing(gestureX, gestureY, 90 + n * 12, '#FFD93D', false, 0.4, 8);
        freezeT = Math.max(freezeT, n >= 5 ? 0.11 : (n === 4 ? 0.09 : 0.07));
        trauma = Math.min(0.5, trauma + 0.12 + n * 0.03);
        popCombo();
        sfxCombo(n);
        logEvent({ t: 'burst', n: n, bonus: bonus });
    }
    gestureN = 0;
    gestureT = 0;
}

/* segment vs every active fruit; the whole swipe path cuts */
function sliceSegment(x1, y1, x2, y2, scoring) {
    var dx = x2 - x1, dy = y2 - y1;
    var len2 = dx * dx + dy * dy;
    if (len2 < 9) return;
    var ang = Math.atan2(dy, dx);
    for (var i = 0; i < fruits.length; i++) {
        var f = fruits[i];
        if (!f.active) continue;
        var t = ((f.x - x1) * dx + (f.y - y1) * dy) / len2;
        t = clamp(t, 0, 1);
        var cx = x1 + dx * t - f.x;
        var cy = y1 + dy * t - f.y;
        var rr2 = f.r + SLICE_PAD;
        if (cx * cx + cy * cy < rr2 * rr2) sliceFruit(f, ang, scoring);
    }
}

/* ================= Run control ================= */
function resetRun() {
    var i;
    for (i = 0; i < fruits.length; i++) fruits[i].active = false;
    for (i = 0; i < halves.length; i++) halves[i].active = false;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    for (i = 0; i < rings.length; i++) rings[i].active = false;
    for (i = 0; i < splats.length; i++) splats[i].active = false;
    for (i = 0; i < pops.length; i++) pops[i].active = false;
    for (i = 0; i < queue.length; i++) queue[i].active = false;
    events.length = 0;
    runT = 0;
    score = 0;
    totalSlices = 0;
    streak = 0;
    bestStreak = 0;

    hearts = HEARTS_MAX;

    spawnT = 0.8;
    specialT = rand(10, 16);

function finalizeRun() {

/* ================= Blade trail (ring buffer, zero alloc) ================= */
var MAXT = 26;
var trailX = new Float32Array(MAXT);
var trailY = new Float32Array(MAXT);
var trailT_ = new Float32Array(MAXT);
var trailN = 0;
/* scratch buffers for the ribbon */
var ribX = new Float32Array(MAXT), ribY = new Float32Array(MAXT), ribA = new Float32Array(MAXT);
var polyLX = new Float32Array(MAXT), polyLY = new Float32Array(MAXT);
var polyRX = new Float32Array(MAXT), polyRY = new Float32Array(MAXT);

function addTrailPoint(x, y) {
    if (trailN > 0) {
        var lx = trailX[trailN - 1], ly = trailY[trailN - 1];
        var dx = x - lx, dy = y - ly;
        if (dx * dx + dy * dy < 9) { trailT_[trailN - 1] = time; return; }
    }
    if (trailN >= MAXT) {
        for (var i = 0; i < MAXT - 1; i++) { trailX[i] = trailX[i + 1]; trailY[i] = trailY[i + 1]; trailT_[i] = trailT_[i + 1]; }
        trailN = MAXT - 1;
    }
    trailX[trailN] = x; trailY[trailN] = y; trailT_[trailN] = time;
    trailN++;
}

function pruneTrail() {
    var drop = 0;
    while (drop < trailN && time - trailT_[drop] > TRAIL_TTL) drop++;
    if (drop > 0) {
        for (var i = drop; i < trailN; i++) {
            trailX[i - drop] = trailX[i];
            trailY[i - drop] = trailY[i];
            trailT_[i - drop] = trailT_[i];
        }
        trailN -= drop;
    }
}

function trailColor() {
    if (frenzyT > 0) return RAINBOW[((time * 12) | 0) % 6];
    return TRAIL_HUES[clamp(mult - 1, 0, TRAIL_HUES.length - 1)];
}

function drawTrail() {
    if (trailN < 2) return;
    var n = 0, i;
    for (i = 0; i < trailN; i++) {
        var age = (time - trailT_[i]) / TRAIL_TTL;
        if (age >= 1) continue;
        ribX[n] = trailX[i]; ribY[n] = trailY[i]; ribA[n] = 1 - age;
        n++;
    }
    if (n < 2) return;
    var col = trailColor();
    /* glow pass with prerendered sprite, additive */
    ctx.globalCompositeOperation = 'lighter';
    for (i = 0; i < n; i += 2) {
        var gsz = TRAIL_W * 5 * (0.35 + 0.65 * (i / n)) * ribA[i];
        ctx.globalAlpha = 0.22 * ribA[i];
        ctx.drawImage(glowSpr, (ribX[i] - gsz / 2) | 0, (ribY[i] - gsz / 2) | 0, gsz | 0, gsz | 0);
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    /* tapered ribbon polygon */
    for (i = 0; i < n; i++) {
        var i0 = i > 0 ? i - 1 : 0;
        var i1 = i < n - 1 ? i + 1 : n - 1;
        var dx = ribX[i1] - ribX[i0], dy = ribY[i1] - ribY[i0];
        var dl = Math.sqrt(dx * dx + dy * dy) || 1;
        var w = TRAIL_W * Math.pow(i / (n - 1), 0.65) * ribA[i] + 0.6;
        var nx = -dy / dl * w, ny = dx / dl * w;
        polyLX[i] = ribX[i] + nx; polyLY[i] = ribY[i] + ny;
        polyRX[i] = ribX[i] - nx; polyRY[i] = ribY[i] - ny;
    }
    ctx.beginPath();
    ctx.moveTo(polyLX[0], polyLY[0]);
    for (i = 1; i < n; i++) ctx.lineTo(polyLX[i], polyLY[i]);
    for (i = n - 1; i >= 0; i--) ctx.lineTo(polyRX[i], polyRY[i]);
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    /* white hot core */
    for (i = 0; i < n; i++) {
        var wc = (TRAIL_W * Math.pow(i / (n - 1), 0.65) * ribA[i]) * 0.45 + 0.3;
        var i0b = i > 0 ? i - 1 : 0;
        var i1b = i < n - 1 ? i + 1 : n - 1;
        var dxb = ribX[i1b] - ribX[i0b], dyb = ribY[i1b] - ribY[i0b];
        var dlb = Math.sqrt(dxb * dxb + dyb * dyb) || 1;
        polyLX[i] = ribX[i] + -dyb / dlb * wc; polyLY[i] = ribY[i] + dxb / dlb * wc;
        polyRX[i] = ribX[i] - -dyb / dlb * wc; polyRY[i] = ribY[i] - dxb / dlb * wc;
    }
    ctx.beginPath();
    ctx.moveTo(polyLX[0], polyLY[0]);
    for (i = 1; i < n; i++) ctx.lineTo(polyLX[i], polyLY[i]);
    for (i = n - 1; i >= 0; i--) ctx.lineTo(polyRX[i], polyRY[i]);
    ctx.closePath();
    ctx.fillStyle = '#FFFFFF';
    ctx.globalAlpha = 0.95;
    ctx.fill();
    ctx.globalAlpha = 1;
    /* tip glint */
    var tx = ribX[n - 1], ty = ribY[n - 1];
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(tx, ty - 7);
    ctx.lineTo(tx + 2.4, ty - 2.4);
    ctx.lineTo(tx + 7, ty);
    ctx.lineTo(tx + 2.4, ty + 2.4);
    ctx.lineTo(tx, ty + 7);
    ctx.lineTo(tx - 2.4, ty + 2.4);
    ctx.lineTo(tx - 7, ty);
    ctx.lineTo(tx - 2.4, ty - 2.4);
    ctx.closePath();
    ctx.fill();
}

/* ================= Update ================= */
function updateFruits(wdt) {
    for (var i = 0; i < fruits.length; i++) {
        var f = fruits[i];
        if (!f.active) continue;
        f.vy += G * wdt;
        f.x += f.vx * wdt;
        f.y += f.vy * wdt;
        f.rot += f.vr * wdt;
        if (f.vy > 0 && f.y > H + f.r * 2 + 20) {
            f.active = false;
            if (currentState === State.PLAYING && f.type <= 5 && frenzyT <= 0) {
                streak = 0;
                mult = 1;
                refreshComboUI();
                if (runT < 10) {
                    /* warm-up grace: the first 10 seconds never cost hearts */
                    spawnPop(f.x, H - 46, 'MISS!', 22, '#C9BFF0');
                } else {
                    spawnPop(f.x, H - 46, 'MISSED!', 22, '#C9BFF0');
                    loseHeart('miss');
                }
            }
        }
    }
}

function updateHalves(dt) {
    for (var i = 0; i < halves.length; i++) {
        var h = halves[i];
        if (!h.active) continue;
        h.life += dt;
        if (h.life >= h.ttl || h.y > H + 120) { h.active = false; continue; }
        h.vy = Math.min(1300, h.vy + G * 1.15 * dt);
        h.x += h.vx * dt;
        h.y += h.vy * dt;
        h.rot += h.vr * dt;
    }
}

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.kind === 1) {
            p.vy = Math.min(800, p.vy + 1000 * dt);
        } else if (p.kind === 2) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else if (p.kind === 3) {
            p.vy = Math.min(240, p.vy + 300 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        } else {
            p.vx *= (1 - Math.min(1, 2 * dt));
            p.vy *= (1 - Math.min(1, 2 * dt));
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

function updateRings(dt) {
    for (var i = 0; i < rings.length; i++) {
        var r = rings[i];
        if (!r.active) continue;
        r.life += dt;
        if (r.life >= r.ttl) r.active = false;
    }
}

function updateSplats(dt) {
    for (var i = 0; i < splats.length; i++) {
        var s = splats[i];
        if (!s.active) continue;
        s.life += dt;
        if (s.life >= s.ttl) s.active = false;
    }
}

function updatePops(dt) {
    for (var i = 0; i < pops.length; i++) {
        var p = pops[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        p.y -= 55 * dt;
    }
}

function updateQueue(wdt) {
    for (var i = 0; i < queue.length; i++) {
        var q = queue[i];
        if (!q.active) continue;
        q.delay -= wdt;
        if (q.delay <= 0) {
            q.active = false;
            fireFruit(q.type, q.x, q.vx, q.vy);
        }
    }
}

function updateMenu(dt) {
    /* self-playing demo: a ghost blade sweeps a lissajous path and slices gentle lobs */
    demoT += dt;
    menuSpawnT -= dt;
    if (menuSpawnT <= 0) {
        menuSpawnT = rand(1.2, 1.9);
        var x0 = rand(VW * 0.25, VW * 0.75);
        lob(0, (Math.random() * 6) | 0, x0, clamp(x0 + rand(-80, 80), 60, VW - 60), rand(240, 360));
    }
    var px = VW / 2 + Math.sin(demoT * 1.35) * VW * 0.3;
    var py = H * 0.46 + Math.sin(demoT * 2.3 + 1.2) * 100;
    var lx = trailN > 0 ? trailX[trailN - 1] : px;
    var ly = trailN > 0 ? trailY[trailN - 1] : py;
    addTrailPoint(px, py);
    sliceSegment(lx, ly, px, py, false);
    updateQueue(dt);
    updateFruits(dt);
}

function updatePlaying(dt) {
    var ts = slowT > 0 ? 0.45 : 1;
    var wdt = freezeT > 0 ? 0 : dt * ts;
    runT += wdt;

    /* timers on real time */
    if (invulnT > 0) invulnT -= dt;
    if (slowT > 0) { slowT -= dt; if (slowT <= 0) powerEl.style.display = 'none'; }
    if (dblT > 0) { dblT -= dt; if (dblT <= 0) powerEl.style.display = 'none'; }
    if (frenzyT > 0) { frenzyT -= dt; if (frenzyT <= 0) powerEl.style.display = 'none'; }
    if (gestureT > 0) { gestureT -= dt; if (gestureT <= 0) resolveGesture(); }

    /* power bar */
    if (frenzyT > 0) powerBarEl.style.width = (frenzyT / 5 * 100) + '%';
    else if (slowT > 0) powerBarEl.style.width = (slowT / 5 * 100) + '%';
    else if (dblT > 0) powerBarEl.style.width = (dblT / 8 * 100) + '%';

    /* spawn director */
    if (frenzyT > 0) {
        frenzySpawnT -= wdt;
        if (frenzySpawnT <= 0) {
            frenzySpawnT = 0.14;
            var fx = rand(60, VW - 60);
            lob(0, (Math.random() * 6) | 0, fx, clamp(fx + rand(-100, 100), 60, VW - 60), rand(110, 300));
        }
    } else {
        spawnT -= wdt;
        if (spawnT <= 0) {
            var d = clamp(runT / 150, 0, 1);
            spawnT = lerp(1.55, 0.62, easeOutCubic(d)) * rand(0.85, 1.15);
            if (runT > 170) spawnT *= 0.88;
            spawnPattern();
        }
        maybeSpecial(wdt);
    }

    updateQueue(wdt);
    updateFruits(wdt);
}

function updateEnding(dt) {
    endT += dt;
    /* dramatic slow beat, then the panel */
    var wdt = dt * 0.3;
    updateQueue(wdt);
    updateFruits(wdt);
    if (endT > 0.9) showPanel();
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    if (freezeT > 0) freezeT -= dt;
    if (bombFlashT > 0) bombFlashT -= dt;
    if (goldFlashT > 0) goldFlashT -= dt;
    pruneTrail();
    updateHalves(dt);
    updateParticles(dt);
    updateRings(dt);
    updateSplats(dt);
    updatePops(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updatePlaying(dt); break;
        case State.ENDING: updateEnding(dt); break;
        case State.PAUSED: break;
        case State.GAME_OVER: break;
    }
}

/* ================= Render ================= */
function drawMotes() {
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < motes.length; i++) {
        var m = motes[i];
        var mx = (m.x + Math.sin(time * 0.4 + m.ph) * 26) % (VW + 80) - 40;
        if (mx < -40) mx += VW + 80;
        var my = (m.y - time * m.spd) % (H + 80);
        if (my < -40) my += H + 80;
        ctx.globalAlpha = m.a * (0.7 + 0.3 * Math.sin(time * 1.3 + m.ph));
        ctx.drawImage(glowSpr, mx | 0, my | 0, m.sz | 0, m.sz | 0);
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
}

function drawSplats() {
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < splats.length; i++) {
        var s = splats[i];
        if (!s.active) continue;
        var k = s.life / s.ttl;
        var grow = s.life < 0.15 ? easeOutCubic(s.life / 0.15) : 1;
        ctx.globalAlpha = 0.16 * (1 - k);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        for (var b = 0; b < 5; b++) {
            var bx = s.x + s.ox[b] * s.scale * grow;
            var by = s.y + s.oy[b] * s.scale * grow;
            ctx.moveTo(bx + s.or_[b] * s.scale * grow, by);
            ctx.arc(bx, by, s.or_[b] * s.scale * grow, 0, Math.PI * 2);
        }
        ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
}

function drawFruits() {
    for (var i = 0; i < fruits.length; i++) {
        var f = fruits[i];
        if (!f.active) continue;
        var sz = (f.r + SPR_PAD) * 2;
        ctx.save();
        ctx.translate(f.x | 0, f.y | 0);
        ctx.rotate(f.rot);
        /* subtle stretch along velocity when moving fast */
        var sp2 = f.vx * f.vx + f.vy * f.vy;
        if (sp2 > 260000) {
            var st = clamp(1 + (Math.sqrt(sp2) - 510) / 2400, 1, 1.14);
            ctx.scale(st, 2 - st);
        }
        ctx.drawImage(SPR_W[f.type], -sz / 2, -sz / 2, sz, sz);
        ctx.restore();
    }
}

function drawHalves() {
    for (var i = 0; i < halves.length; i++) {
        var h = halves[i];
        if (!h.active) continue;
        var a = clamp(2.5 * (1 - h.life / h.ttl), 0, 1);
        var sz = (h.r + SPR_PAD) * 2;
        ctx.globalAlpha = a;
        ctx.save();
        ctx.translate(h.x | 0, h.y | 0);
        ctx.rotate(h.rot);
        ctx.drawImage(h.half === 0 ? SPR_A[h.type] : SPR_B[h.type], -sz / 2, -sz / 2, sz, sz);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawRings() {
    for (var i = 0; i < rings.length; i++) {
        var r = rings[i];
        if (!r.active) continue;
        var k = r.life / r.ttl;
        var e = easeOutCubic(k);
        var rad = r.r0 + (r.r1 - r.r0) * e;
        ctx.globalAlpha = (1 - k) * 0.9;
        ctx.strokeStyle = r.color;
        ctx.lineWidth = Math.max(1.5, r.w * (1 - k));
        ctx.beginPath();
        ctx.arc(r.x, r.y, rad, 0, Math.PI * 2);
        ctx.stroke();
        if (r.rays) {
            ctx.lineWidth = Math.max(1.5, 4 * (1 - k));
            ctx.beginPath();
            for (var j = 0; j < 8; j++) {
                var a = j * Math.PI / 4 + 0.4;
                var r0 = rad * 1.05, r1 = rad * 1.05 + 26 * (1 - k) + 8;
                ctx.moveTo(r.x + Math.cos(a) * r0, r.y + Math.sin(a) * r0);
                ctx.lineTo(r.x + Math.cos(a) * r1, r.y + Math.sin(a) * r1);
            }
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1;
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = p.kind === 4 ? a * 0.55 : a;
        ctx.fillStyle = p.color;
        if (p.kind === 1) {
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, p.size * 0.72, p.size, p.rot, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.kind === 2) {
            /* 4-point star glint */
            var s = p.size * a;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s * 0.3, -s * 0.3);
            ctx.lineTo(s, 0);
            ctx.lineTo(s * 0.3, s * 0.3);
            ctx.lineTo(0, s);
            ctx.lineTo(-s * 0.3, s * 0.3);
            ctx.lineTo(-s, 0);
            ctx.lineTo(-s * 0.3, -s * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        } else if (p.kind === 3) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.5 + 0.9 * p.life / p.ttl), 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawPops() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < pops.length; i++) {
        var p = pops[i];
        if (!p.active) continue;
        var k = p.life / p.ttl;
        var sc = k < 0.2 ? 0.5 + 2.5 * k : 1;
        ctx.globalAlpha = clamp(2.2 * (1 - k), 0, 1);
        ctx.font = '800 ' + Math.round(p.size * sc) + 'px Nunito, sans-serif';
        ctx.strokeStyle = 'rgba(18,10,44,0.85)';
        ctx.lineWidth = 5;
        ctx.strokeText(p.txt, p.x, p.y);
        ctx.fillStyle = p.color;
        ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 11;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    /* background in device space with shake offset (bg has 16px logical margin) */
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(bgSpr, ((ox - 16) * S) | 0, ((oy - 16) * S) | 0);
    /* world in logical space */
    ctx.setTransform(S, 0, 0, S, ox * S, oy * S);
    drawMotes();
    drawSplats();
    drawHalves();
    drawFruits();
    drawRings();
    drawParticles();
    drawTrail();
    drawPops();
    /* power tints (drawn over world, under DOM hud) */
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    if (slowT > 0) {
        ctx.globalAlpha = clamp(slowT / 0.6, 0, 1) * 0.85;
        ctx.drawImage(vigBlue, 0, 0, canvas.width, canvas.height);
    }
    if (frenzyT > 0) {
        ctx.globalAlpha = (0.5 + 0.3 * Math.sin(time * 8)) * clamp(frenzyT / 0.6, 0, 1);
        ctx.drawImage(vigGold, 0, 0, canvas.width, canvas.height);
    }
    if (goldFlashT > 0) {
        ctx.globalAlpha = goldFlashT * 0.5;
        ctx.fillStyle = '#FFD93D';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    if (bombFlashT > 0) {
        ctx.globalAlpha = clamp(bombFlashT / 0.55, 0, 1) * 0.9;
        ctx.drawImage(vigGreen, 0, 0, canvas.width, canvas.height);
    }
    ctx.globalAlpha = 1;
}

/* ================= Input ================= */
var swiping = false;
var lastPX = 0, lastPY = 0;

function toLogical(cx, cy) {
    var k = H / window.innerHeight;
    return [cx * k, cy * k];
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    ensureAudio();
    if (currentState === State.MENU) { startRun(); return; }
    if (currentState !== State.PLAYING) return;
    var p = toLogical(e.clientX, e.clientY);
    swiping = true;
    lastPX = p[0]; lastPY = p[1];
    trailN = 0;
    addTrailPoint(p[0], p[1]);
});

window.addEventListener('pointermove', function (e) {
    if (!swiping || currentState !== State.PLAYING) return;
    e.preventDefault();
    var p = toLogical(e.clientX, e.clientY);
    addTrailPoint(p[0], p[1]);
    sliceSegment(lastPX, lastPY, p[0], p[1], true);
    lastPX = p[0]; lastPY = p[1];
}, { passive: false });

function endSwipe() {
    swiping = false;
    if (gestureN > 0) resolveGesture();
}
window.addEventListener('pointerup', endSwipe);
window.addEventListener('pointercancel', endSwipe);

/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

/* keyboard: arrow / WASD power slashes across the screen */
var KB_T = 0.1;
var kb = { active: false, t: 0, x1: 0, y1: 0, x2: 0, y2: 0, px: 0, py: 0 };
function kbSlash(dx, dy) {
    if (currentState !== State.PLAYING) return;
    var cx = VW / 2, cy = H * 0.45;
    var len = Math.max(VW, H) * 0.42;
    kb.active = true;
    kb.t = 0;
    kb.x1 = cx - dx * len + (dy !== 0 ? rand(-VW * 0.22, VW * 0.22) : 0);
    kb.y1 = cy - dy * len + (dx !== 0 ? rand(-90, 90) : 0);
    kb.x2 = kb.x1 + dx * len * 2;
    kb.y2 = kb.y1 + dy * len * 2;
    kb.px = kb.x1; kb.py = kb.y1;
    trailN = 0;
}
function updateKb(dt) {
    if (!kb.active) return;
    kb.t += dt;
    var k = clamp(kb.t / KB_T, 0, 1);
    var e = easeOutCubic(k);
    var nx = lerp(kb.x1, kb.x2, e);
    var ny = lerp(kb.y1, kb.y2, e);
    addTrailPoint(nx, ny);
    if (currentState === State.PLAYING) sliceSegment(kb.px, kb.py, nx, ny, true);
    kb.px = nx; kb.py = ny;
    if (k >= 1) {
        kb.active = false;
        if (gestureN > 0 && !swiping) resolveGesture();
    }
}

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        ensureAudio();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        if (currentState === State.MENU) { startRun(); return; }
    } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        e.preventDefault(); ensureAudio(); kbSlash(-1, 0);
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        e.preventDefault(); ensureAudio(); kbSlash(1, 0);
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault(); ensureAudio(); kbSlash(0, -1);
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        e.preventDefault(); ensureAudio(); kbSlash(0, 1);
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    /* instant: straight back into a fresh run */
    startRun();
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    updateKb(dt);
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

/* ================= Headless test hook (inert in normal play) ================= */
window.__SR = {
    State: State,
    events: events,
    get state() { return currentState; },
    get score() { return score; },
    get hearts() { return hearts; },
    get streak() { return streak; },
    get mult() { return mult; },
    get slices() { return totalSlices; },
    get bestBurst() { return bestBurst; },
    get runT() { return runT; },
    get activeFruits() { var n = 0; for (var i = 0; i < fruits.length; i++) if (fruits[i].active) n++; return n; },
    profileKey: WoopProfile.KEY,
    storageKey: STORAGE_KEY,
    start: startRun,
    getData: function () { return data; },
    debug: {
        slice: function (x1, y1, x2, y2) { sliceSegment(x1, y1, x2, y2, true); },
        drainHearts: function () { hearts = 1; invulnT = 0; },
        spawn: function (type, x) { fireFruit(type, x || VW / 2, 0, -900); },
        vw: function () { return VW; }
    }
};

})();
</script>
</body>

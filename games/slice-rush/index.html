<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var comboEl = document.getElementById('combo');
var comboTxtEl = document.getElementById('comboTxt');
var comboBarEl = document.getElementById('comboBar');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelGateEl = document.getElementById('panelGate');
var panelBestEl = document.getElementById('panelBest');
var panelSlicesEl = document.getElementById('panelSlices');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_slice-rush';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Hop: soft whoosh, bandpassed noise sweeping up */
function sfxHop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.3;
    bp.frequency.setValueAtTime(500 * p, t);
    bp.frequency.exponentialRampToValueAtTime(1500 * p, t + 0.09);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.15);
}

/* Slice: juicy swish plus a ping whose pitch climbs with the combo */
function sfxSlice(combo) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 2.2;
    bp.frequency.setValueAtTime(2600 * p, t);
    bp.frequency.exponentialRampToValueAtTime(700 * p, t + 0.09);
    var ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, t);
    ng.gain.exponentialRampToValueAtTime(0.17, t + 0.012);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
    src.connect(bp); bp.connect(ng); ng.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.13);

    var f = 440 * Math.pow(1.06, Math.min(combo, 14)) * p;
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * 1.33, t + 0.05);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.13, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.19);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t);
    o.stop(t + 0.21);
}

/* Bounce: quiet rubbery boing */
function sfxBounce() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(200 * p, t);
    o.frequency.exponentialRampToValueAtTime(110 * p, t + 0.1);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.07, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.15);
}

/* Clank: bright metallic hit against the pink stone */
function sfxClank() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(620 * p, t);
    o.frequency.exponentialRampToValueAtTime(180 * p, t + 0.09);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.14, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.18);

    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 2200;
    var ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.0001, t);
    ng.gain.exponentialRampToValueAtTime(0.1, t + 0.006);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    src.connect(hp); hp.connect(ng); ng.connect(audioCtx.destination);
    src.start(t);
    src.stop(t + 0.08);
}

/* Gate: quick rising two note party blip */
function sfxGate() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(659 * p, t);
    o.frequency.setValueAtTime(880 * p, t + 0.08);
    o.frequency.setValueAtTime(1319 * p, t + 0.16);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.015);
    g.gain.setValueAtTime(0.16, t + 0.2);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.42);
}

/* Tired: descending sad trombone style blip, gentle, never scary */
function sfxTired() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.13);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.26);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.58);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.55);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.62);
}

/* Fanfare for new best or sticker */
function sfxFanfare() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(659 * p, t + 0.1);
    o.frequency.setValueAtTime(784 * p, t + 0.2);
    o.frequency.setValueAtTime(1047 * p, t + 0.3);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.32);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.64);
}

/* ================= Canvas sizing + prerendered sprites ================= */
var S = 1;    /* device pixels per logical unit */
var VW = 400; /* logical view width */
var plankSpr = null, backdropSpr = null, glowSpr = null;

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildSprites() {
    var ts = S;

    /* Wooden counter plank tile */
    var TW = 140;
    plankSpr = makeCanvas(TW * ts, FLOOR_H * ts);
    var pc = plankSpr.getContext('2d');
    pc.scale(ts, ts);
    pc.fillStyle = '#DFA968';
    pc.fillRect(0, 0, TW, FLOOR_H);
    /* front edge highlight strip */
    pc.fillStyle = '#F2C98F';
    pc.fillRect(0, 0, TW, 14);
    /* plank seams */
    pc.fillStyle = '#C98D4A';
    pc.fillRect(46, 14, 5, FLOOR_H - 14);
    pc.fillRect(116, 14, 5, FLOOR_H - 14);
    /* soft grain lines */
    pc.strokeStyle = 'rgba(160,100,40,0.35)';
    pc.lineWidth = 3;
    pc.lineCap = 'round';
    pc.beginPath();
    pc.moveTo(8, 42); pc.quadraticCurveTo(26, 38, 40, 44);
    pc.moveTo(60, 78); pc.quadraticCurveTo(82, 72, 106, 80);
    pc.moveTo(14, 100); pc.quadraticCurveTo(28, 96, 40, 102);
    pc.stroke();
    /* wood knot */
    pc.strokeStyle = 'rgba(160,100,40,0.5)';
    pc.beginPath();
    pc.arc(86, 46, 6, 0, Math.PI * 2);
    pc.stroke();
    /* chunky ink outline along the counter top */
    pc.fillStyle = '#2B2350';
    pc.fillRect(0, 0, TW, 5);

    /* Faint kitchen backdrop: jars, a pot and a spoon silhouette strip */
    var BW = 480, BH = 180;
    backdropSpr = makeCanvas(BW * ts, BH * ts);
    var bc = backdropSpr.getContext('2d');
    bc.scale(ts, ts);
    bc.fillStyle = 'rgba(43,35,80,0.055)';
    /* jar 1 */
    rr(bc, 30, 70, 56, 110, 12); bc.fill();
    rr(bc, 40, 56, 36, 18, 6); bc.fill();
    /* jar 2, shorter */
    rr(bc, 110, 100, 46, 80, 10); bc.fill();
    rr(bc, 118, 88, 30, 15, 5); bc.fill();
    /* pot with handles */
    rr(bc, 210, 90, 110, 90, 14); bc.fill();
    rr(bc, 196, 108, 18, 12, 6); bc.fill();
    rr(bc, 316, 108, 18, 12, 6); bc.fill();
    rr(bc, 230, 76, 70, 16, 8); bc.fill();
    /* standing spoon */
    rr(bc, 380, 96, 12, 84, 6); bc.fill();
    bc.beginPath();
    bc.ellipse(386, 84, 16, 22, 0, 0, Math.PI * 2);
    bc.fill();

    /* Soft round glow for sparkles */
    glowSpr = makeCanvas(64 * ts, 64 * ts);
    var glc = glowSpr.getContext('2d');
    glc.scale(ts, ts);
    var gg = glc.createRadialGradient(32, 32, 2, 32, 32, 32);
    gg.addColorStop(0, 'rgba(255,255,255,0.85)');
    gg.addColorStop(0.5, 'rgba(255,255,255,0.25)');
    gg.addColorStop(1, 'rgba(255,255,255,0)');
    glc.fillStyle = gg;
    glc.fillRect(0, 0, 64, 64);
}

function resize() {
    var dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    S = canvas.height / H;
    VW = canvas.width / S;
    buildSprites();
}

function spawnPart(kind, x, y, vx, vy, ttl, size, color) {

/* ================= Level chunks (handcrafted patterns) ================= */
/* item kinds: 0 floor, 1 low shelf, 2 pedestal, 3 high shelf */
var SHELF1 = 170, SHELF2 = 260, PED = 105;
var CHUNKS = [
    { w: 760, it: [[100, 0], [240, 0], [380, 0], [520, 0], [660, 2]] },
    { w: 820, it: [[120, 0], [290, 0], [440, 1], [580, 1], [730, 0]] },
    { w: 800, it: [[140, 2], [390, 2], [640, 2]] },
    { w: 860, it: [[120, 0], [260, 0], [640, 0], [770, 0]], st: [[430, 64, 64]] },
    { w: 900, it: [[160, 3], [320, 3], [480, 3], [640, 3], [810, 0]] },
    { w: 760, it: [[110, 0], [240, 0], [380, 1], [520, 2], [660, 0]] },
    { w: 920, it: [[130, 0], [300, 1], [470, 3], [640, 1], [810, 0]] },
    { w: 880, it: [[150, 0], [280, 0], [700, 0], [810, 1]], st: [[470, 64, 128]] },
    { w: 820, it: [[140, 1], [320, 3], [500, 1], [700, 0]], st: [[610, 56, 56]] }
];
var WALL_CHUNK = { w: 1000, it: [[140, 0], [300, 0], [760, 0], [880, 0]], wall: 520 };

function itemY(kind, r) {
    if (kind === 1) return FLOOR_Y - SHELF1 - r;
    if (kind === 2) return FLOOR_Y - PED - r;
    if (kind === 3) return FLOOR_Y - SHELF2 - r;
    return FLOOR_Y - r;
}

function spawnItem(x, kind) {
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (!it.active) {
            var type = (Math.random() * 7) | 0;
            it.active = true;
            it.type = type;
            it.r = TYPE_R[type];
            it.x = x;
            it.y = itemY(kind, it.r);
            it.sup = kind;
            it.phase = rand(0, Math.PI * 2);
            return;
        }
    }
}

function spawnStone(x, w, h) {
    for (var i = 0; i < stones.length; i++) {
        var st = stones[i];
        if (!st.active) {
            st.active = true;
            st.x = x; st.w = w; st.h = h;
            st.y = FLOOR_Y - h;
            st.cool = 0;
            return;
        }
    }
}

function spawnWall(x) {
    for (var i = 0; i < walls.length; i++) {
        var w = walls[i];
        if (!w.active) {
            w.active = true;
            w.x = x; w.w = 46; w.h = 190;
            w.y = FLOOR_Y - w.h;
            return;
        }
    }
}

function fillLevel() {
    while (genX < camX + VW + 900 && genX < levelEndX - 260) {
        var chunk;
        /* the tired wall is rare: at most one per stretch, never early */
        if (genX > START_X + RUN_SPEED * 14 && genX - lastWallX > 5200 && Math.random() < 0.16) {
            chunk = WALL_CHUNK;
            lastWallX = genX;
        } else {
            chunk = CHUNKS[(Math.random() * CHUNKS.length) | 0];
        }
        var i;
        for (i = 0; i < chunk.it.length; i++) {
            var d = chunk.it[i];
            if (genX + d[0] < levelEndX - 260) spawnItem(genX + d[0], d[1]);
        }
        if (chunk.st) {
            for (i = 0; i < chunk.st.length; i++) {
                var s = chunk.st[i];
                if (genX + s[0] < levelEndX - 320) spawnStone(genX + s[0] - s[1] / 2, s[1], s[2]);
            }
        }
        if (chunk.wall && genX + chunk.wall < levelEndX - 500) spawnWall(genX + chunk.wall);
        genX += chunk.w;
    }
}

function despawn() {
    var i;
    for (i = 0; i < items.length; i++) if (items[i].active && items[i].x < camX - 300) items[i].active = false;
    for (i = 0; i < stones.length; i++) if (stones[i].active && stones[i].x + stones[i].w < camX - 300) stones[i].active = false;
    for (i = 0; i < walls.length; i++) if (walls[i].active && walls[i].x + walls[i].w < camX - 300) walls[i].active = false;
}

function hop() {
    /* big hop off the counter, up to two smaller hops in the air;
       after that a tap only adds spin, so spamming never pins the ceiling */
    var grounded = blade.y > FLOOR_Y - BLADE_R - 44;
    if (grounded) {
        blade.vy = HOP_VY;
        blade.airHops = 0;
    } else if (blade.airHops < 2) {
        blade.vy = AIR_HOP_VY;
        blade.airHops++;
    }
    blade.angVel = Math.min(SPIN_MAX, blade.angVel + SPIN_TAP);
    blade.squash = 0.7;
    sfxHop();
}

function updateComboUI() {
    if (combo >= 2) {
        comboTxtEl.textContent = 'COMBO x' + combo;
        comboEl.style.display = 'block';
        comboTxtEl.classList.remove('pop');
        void comboTxtEl.offsetWidth;
        comboTxtEl.classList.add('pop');
    } else if (combo === 0) {
        comboEl.style.display = 'none';
    }
}

function breakCombo(clank) {
    if (combo > 0) logEvent({ t: 'comboBreak', clank: !!clank, was: combo });
    combo = 0;
    sliceGapT = 0;
    touchedGround = false;
    comboEl.style.display = 'none';
}

function sliceItem(it) {
    it.active = false;
    combo++;
    if (combo > bestCombo) bestCombo = combo;
    sliceGapT = 0;
    touchedGround = false;
    var pts = slicePoints(combo);
    baseScore += pts;
    totalSlices++;
    scoreEl.textContent = baseScore;
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
    updateComboUI();
    blade.vy -= 35; /* juicy little lift on every cut */

    /* two physics halves split along the blade angle */
    var cut = blade.angle;
    var perp = cut + Math.PI / 2;
    var made = 0;
    for (var i = 0; i < halves.length && made < 2; i++) {
        var h = halves[i];
        if (h.active) continue;
        var side = made === 0 ? 1 : -1;
        h.active = true;
        h.type = it.type;
        h.r = it.r;
        h.side = side;
        h.x = it.x + Math.cos(perp) * side * 4;
        h.y = it.y + Math.sin(perp) * side * 4;
        h.vx = RUN_SPEED * 0.4 + Math.cos(perp) * side * rand(90, 170);
        h.vy = Math.sin(perp) * side * rand(90, 170) - 140;
        h.rot = cut;
        h.vr = side * rand(3, 8);
        h.life = 0;
        h.ttl = it.type === T_BALLOON ? 0.7 : 1.4;
        h.bounced = false;
        made++;
    }

    burstJuice(it.x, it.y, it.type);
    spawnPop(it.x, it.y - it.r - 14, '+' + pts, 24, combo >= 5 ? '#FF5FA2' : '#2B2350');
    if (combo >= 5 && combo % 5 === 0) spawnPop(blade.x, blade.y - 70, 'COMBO x' + combo + '!', 30, '#FF5FA2');
    sfxSlice(combo);
    logEvent({ t: 'slice', type: it.type, combo: combo, points: pts, total: baseScore });
}

function enterBonus() {
    bonusEntered = true;
    currentState = State.BONUS;
    var spin = Math.min(Math.abs(blade.angVel), 22);
    bonusV = 360 + spin * 46;
    bonusGates = [
        { x: levelEndX + 420, mult: 2, hit: false },
        { x: levelEndX + 900, mult: 3, hit: false },
        { x: levelEndX + 1650, mult: 5, hit: false }
    ];
    comboEl.style.display = 'none';
    spawnPop(blade.x + 60, blade.y - 90, 'BONUS ZONE!', 34, '#7B4FC9');
    sfxGate();
    logEvent({ t: 'bonus', launch: bonusV });
}

function finalizeRun(reason) {
    if (finalized) return;
    finalized = true;
    if (reason === 'tired') multiplier = 1;
    finalScore = baseScore * multiplier;
    newBest = finalScore > prevBest;
    data.totalPlays++;
    if (finalScore > data.highScore) data.highScore = finalScore;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('slice-rush', finalScore, THRESHOLDS);
    logEvent({ t: 'end', reason: reason, base: baseScore, mult: multiplier, final: finalScore });
}

function enterEnding(reason) {
    if (currentState === State.ENDING || currentState === State.GAME_OVER) return;
    endReason = reason;
    endT = 0;
    currentState = State.ENDING;
    pauseBtn.style.display = 'none';
    if (reason === 'tired') {
        trauma = 0.3;
        blade.angVel = 0;
        blade.vy = Math.min(blade.vy, 0);
        burstDust(blade.x, FLOOR_Y);
        sfxTired();
    }
    finalizeRun(reason);
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };

    if (!newBest && prevBest >= 50 && finalScore < prevBest && diff <= prevBest * 0.2) {

        nearMissEl.style.display = 'block';
    } else {

        stickerBanner.style.display = 'block';

    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti(blade.x, blade.y - 60);
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

/* ================= Physics helpers ================= */
function circleRectHit(cx, cy, r, rx, ry, rw, rh) {
    var nx = clamp(cx, rx, rx + rw);
    var ny = clamp(cy, ry, ry + rh);
    var dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
}

function bounceFloor() {
    blade.y = FLOOR_Y - BLADE_R;
    if (blade.vy > 0) {
        var v = Math.abs(blade.vy);
        blade.vy = -Math.max(v * 0.5, 170); /* springy, never dead */
        blade.angVel *= 0.93;
        blade.squash = 1;
        blade.airHops = 0;
        touchedGround = true;
        burstDust(blade.x, FLOOR_Y);
        if (time - lastBounceSfx > 0.18) { lastBounceSfx = time; sfxBounce(); }
    }
}

/* ================= Update ================= */
function updateBladeCosmetics(dt) {
    if (blade.squash > 0) blade.squash = Math.max(0, blade.squash - blade.squash * 8 * dt - 0.5 * dt);
    if (blade.blinkT > 0) {
        blade.blinkT -= dt;
    } else {
        blade.blinkIn -= dt;
        if (blade.blinkIn <= 0) {
            blade.blinkT = 0.12;
            blade.blinkIn = rand(1.6, 4.5);
        }
    }
}

function updateMenu(dt) {
    blade.y = FLOOR_Y - 74 + Math.sin(time * 2.2) * 14;
    blade.vy = 0;
    blade.angle += 2.2 * dt;
    updateBladeCosmetics(dt);
    camX = blade.x - VW * 0.34;
}

function updatePlaying(dt) {
    /* auto advance and spin */
    blade.x += RUN_SPEED * dt;
    blade.vy = Math.min(MAX_FALL, blade.vy + GRAV * dt);
    blade.y += blade.vy * dt;
    blade.angle += blade.angVel * dt;
    blade.angVel -= blade.angVel * 0.2 * dt; /* slow air decay: keep tapping to keep cutting */
    if (blade.y < 50) { blade.y = 50; blade.vy = Math.max(blade.vy, 0); }
    if (blade.y >= FLOOR_Y - BLADE_R) bounceFloor();
    updateBladeCosmetics(dt);

    /* combo grace: 2s on the ground without slicing breaks the chain */
    if (combo > 0 && touchedGround) {
        sliceGapT += dt;
        comboBarEl.style.width = (clamp(1 - sliceGapT / COMBO_GRACE, 0, 1) * 100) + '%';
        if (sliceGapT >= COMBO_GRACE) breakCombo(false);
    } else {
        comboBarEl.style.width = '100%';
    }

    var i;

    /* slicing: the edge cuts anything it touches while spinning fast enough */
    var spinning = Math.abs(blade.angVel) >= SLICE_MIN;
    for (i = 0; i < items.length; i++) {
        var it = items[i];
        if (!it.active) continue;
        var dx = blade.x - it.x, dy = blade.y - it.y;
        var rad = SLICE_REACH + it.r;
        if (dx * dx + dy * dy < rad * rad && spinning) sliceItem(it);
    }

    /* pink stones: clank, shake, combo break */
    for (i = 0; i < stones.length; i++) {
        var st = stones[i];
        if (!st.active) continue;
        if (st.cool > 0) st.cool -= dt;
        if (!circleRectHit(blade.x, blade.y, BLADE_R, st.x, st.y, st.w, st.h)) continue;
        if (blade.y < st.y && blade.vy > 0) {
            /* landed on top: bounce off */
            blade.y = st.y - BLADE_R;
            blade.vy = -Math.max(Math.abs(blade.vy) * 0.5, 320);
            blade.airHops = 0;
        } else {
            /* smacked the side: pop up and over */
            blade.x = Math.min(blade.x, st.x - BLADE_R + 2);
            blade.vy = -430;
        }
        if (st.cool <= 0) {
            st.cool = 0.5;
            trauma = 0.42;
            breakCombo(true);
            burstDust(blade.x, blade.y + BLADE_R);
            spawnPop(blade.x, st.y - 26, 'CLANK!', 26, '#D45C8E');
            sfxClank();
            logEvent({ t: 'clank' });
        }
    }

    /* the rare wall: hit it flat and the knife is tired */
    for (i = 0; i < walls.length; i++) {
        var w = walls[i];
        if (!w.active) continue;
        if (!circleRectHit(blade.x, blade.y, BLADE_R, w.x, w.y, w.w, w.h)) continue;
        if (blade.y <= w.y + 8) {
            /* skimmed the top: bounce along it */
            blade.y = w.y - BLADE_R;
            if (blade.vy > 0) blade.vy = -Math.max(Math.abs(blade.vy) * 0.5, 260);
            blade.airHops = 0;
        } else {
            blade.x = w.x - BLADE_R + 2;
            enterEnding('tired');
            return;
        }
    }

    /* sparkle trail when the combo is hot */
    if (combo >= 5) {
        trailT += dt;
        if (trailT > 0.07) {
            trailT = 0;
            spawnPart(2, blade.x + rand(-10, 10), blade.y + rand(-10, 10), rand(-40, 40), rand(-60, 10), 0.4, rand(2.5, 4.5), '#FFD93D');
        }
    }

    camX = blade.x - VW * 0.34;
    fillLevel();
    despawn();

    /* the level ends at the bonus corridor */
    if (blade.x >= levelEndX) enterBonus();
}

function updateBonus(dt) {
    /* the final flip momentum carries the blade through the gates */
    var grounded = blade.y >= FLOOR_Y - BLADE_R - 3;
    bonusV -= (grounded ? 420 : 55) * dt;
    if (bonusV < 0) bonusV = 0;
    blade.x += bonusV * dt;
    blade.vy = Math.min(MAX_FALL, blade.vy + GRAV * dt);
    blade.y += blade.vy * dt;
    blade.angle += (blade.angVel + bonusV / 30) * dt;
    blade.angVel -= blade.angVel * 0.9 * dt;
    if (blade.y >= FLOOR_Y - BLADE_R) {
        blade.y = FLOOR_Y - BLADE_R;
        if (blade.vy > 0) {
            blade.vy = Math.abs(blade.vy) > 90 ? -Math.abs(blade.vy) * 0.45 : 0;
            blade.squash = 1;
            if (Math.abs(blade.vy) > 60) burstDust(blade.x, FLOOR_Y);
        }
    }
    updateBladeCosmetics(dt);

    for (var i = 0; i < bonusGates.length; i++) {
        var g = bonusGates[i];
        if (!g.hit && blade.x > g.x) {
            g.hit = true;
            multiplier = g.mult;
            scoreEl.textContent = baseScore + ' x' + multiplier;
            burstConfetti(g.x, FLOOR_Y - 220);
            spawnPop(g.x, FLOOR_Y - 280, 'x' + g.mult + '!', 40, '#7B4FC9');
            trauma = 0.22;
            sfxGate();
            logEvent({ t: 'gate', mult: g.mult });
        }
    }

    camX = blade.x - VW * 0.34;

    if (bonusV <= 30 && grounded) enterEnding('done');
}

function updateEnding(dt) {
    endT += dt;
    /* settle gently on the counter */
    blade.vy = Math.min(MAX_FALL, blade.vy + GRAV * dt);
    blade.y += blade.vy * dt;
    if (blade.y >= FLOOR_Y - BLADE_R) {
        blade.y = FLOOR_Y - BLADE_R;
        blade.vy = 0;
    }
    blade.angle += blade.angVel * dt;
    blade.angVel -= blade.angVel * 3 * dt;
    /* rest flat so the face reads */
    var flat = Math.round(blade.angle / Math.PI) * Math.PI;
    if (Math.abs(blade.angVel) < 1.2) blade.angle += (flat - blade.angle) * Math.min(1, 8 * dt);
    updateBladeCosmetics(dt);
    if (endReason === 'tired' && endT > 0.5 && endT % 0.7 < dt) {
        spawnPop(blade.x + 30, blade.y - 50, 'z', 20, '#6B6394');
    }
    if (endT > 1.1) showPanel();
}

function updateHalves(dt) {
    for (var i = 0; i < halves.length; i++) {
        var h = halves[i];
        if (!h.active) continue;
        h.life += dt;
        if (h.life >= h.ttl) { h.active = false; continue; }
        h.vy = Math.min(1100, h.vy + GRAV * dt);
        h.x += h.vx * dt;
        h.y += h.vy * dt;
        h.rot += h.vr * dt;
        if (h.y > FLOOR_Y - h.r * 0.4 && h.vy > 0 && !h.bounced) {
            h.bounced = true;
            h.vy = -h.vy * 0.35;
            h.vx *= 0.6;
        } else if (h.y > FLOOR_Y - h.r * 0.3 && h.vy > 0) {
            h.vy = 0;
            h.vx *= (1 - Math.min(1, 6 * dt));
        }
    }
}

function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.kind === 1) {
            p.vy = Math.min(700, p.vy + 900 * dt);
        } else if (p.kind === 2) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else if (p.kind === 3) {
            p.vy = Math.min(240, p.vy + 300 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        } else {
            p.vy *= (1 - Math.min(1, 3 * dt));
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}

function updatePops(dt) {
    for (var i = 0; i < pops.length; i++) {
        var p = pops[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        p.y -= 55 * dt;
    }
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    updateHalves(dt);
    updateParticles(dt);
    updatePops(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updatePlaying(dt); break;
        case State.BONUS: updateBonus(dt); break;
        case State.ENDING: updateEnding(dt); break;
        case State.PAUSED: break;
        case State.GAME_OVER: break;
    }
}

/* ================= Render ================= */
function drawItemBody(t, r) {
    var i;
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = '#2B2350';
    if (t === T_MELON) {
        ctx.fillStyle = '#43B94E';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.save();
        ctx.beginPath();
        ctx.arc(0, 0, r - 1.5, 0, Math.PI * 2);
        ctx.clip();
        ctx.strokeStyle = '#2E8F3C';
        ctx.lineWidth = 6;
        for (i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 14, -r);
            ctx.quadraticCurveTo(i * 14 + 7, 0, i * 14, r);
            ctx.stroke();
        }
        ctx.restore();
        ctx.lineWidth = 3.5;
        ctx.strokeStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
    } else if (t === T_ORANGE) {
        ctx.fillStyle = '#FFA53D';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#58C990';
        ctx.beginPath();
        ctx.ellipse(6, -r + 1, 8, 4.5, 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(-r * 0.35, -r * 0.35, r * 0.22, 0, Math.PI * 2);
        ctx.fill();
    } else if (t === T_CAKE) {
        ctx.fillStyle = '#F6E3C6';
        rr(ctx, -r, -r * 0.28, r * 2, r * 1.08, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#FF8FB8';
        rr(ctx, -r, -r * 0.86, r * 2, r * 0.78, 10);
        ctx.fill();
        ctx.stroke();
        /* frosting drips */
        ctx.fillStyle = '#FF8FB8';
        ctx.beginPath();
        ctx.arc(-r * 0.5, -r * 0.08, 5, 0, Math.PI * 2);
        ctx.arc(r * 0.1, -r * 0.02, 6, 0, Math.PI * 2);
        ctx.arc(r * 0.62, -r * 0.1, 4.5, 0, Math.PI * 2);
        ctx.fill();
        /* cherry */
        ctx.fillStyle = '#E14D5F';
        ctx.beginPath();
        ctx.arc(0, -r * 1.05, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.stroke();
    } else if (t === T_JELLY) {
        ctx.fillStyle = '#6FDB6F';
        rr(ctx, -r, -r * 0.78, r * 2, r * 1.62, 14);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.ellipse(-r * 0.35, -r * 0.34, r * 0.3, r * 0.18, -0.4, 0, Math.PI * 2);
        ctx.fill();
    } else if (t === T_PENCIL) {
        /* body */
        ctx.fillStyle = '#FFD93D';
        rr(ctx, -r * 2.1, -8, r * 3.6, 16, 3);
        ctx.fill();
        ctx.stroke();
        /* eraser and ferrule */
        ctx.fillStyle = '#FF8FB8';
        rr(ctx, -r * 2.7, -8, r * 0.62, 16, 5);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#C9CFDB';
        rr(ctx, -r * 2.14, -8, r * 0.36, 16, 2);
        ctx.fill();
        /* wooden tip */
        ctx.fillStyle = '#F2C98F';
        ctx.beginPath();
        ctx.moveTo(r * 1.5, -8);
        ctx.lineTo(r * 2.55, 0);
        ctx.lineTo(r * 1.5, 8);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#6B6394';
        ctx.beginPath();
        ctx.moveTo(r * 2.2, -2.6);
        ctx.lineTo(r * 2.55, 0);
        ctx.lineTo(r * 2.2, 2.6);
        ctx.closePath();
        ctx.fill();
    } else if (t === T_SPONGE) {
        ctx.fillStyle = '#FFE066';
        rr(ctx, -r * 1.3, -r * 0.62, r * 2.6, r * 1.3, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#58C990';
        rr(ctx, -r * 1.3, -r * 0.62, r * 2.6, r * 0.44, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#E8C34A';
        ctx.beginPath();
        ctx.arc(-r * 0.6, r * 0.22, 3, 0, Math.PI * 2);
        ctx.arc(r * 0.1, r * 0.4, 2.5, 0, Math.PI * 2);
        ctx.arc(r * 0.7, r * 0.18, 3, 0, Math.PI * 2);
        ctx.fill();
    } else {
        /* water balloon */
        ctx.fillStyle = '#5BC8FF';
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.beginPath();
        ctx.ellipse(-r * 0.35, -r * 0.35, r * 0.28, r * 0.16, -0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3FA9E0';
        ctx.beginPath();
        ctx.moveTo(-4, r - 3);
        ctx.lineTo(4, r - 3);
        ctx.lineTo(0, r + 6);
        ctx.closePath();
        ctx.fill();
    }
}

function drawShadow(x, y, w, alpha) {
    ctx.fillStyle = 'rgba(43,35,80,' + alpha + ')';
    ctx.beginPath();
    ctx.ellipse(x, y, w, w * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
}

function drawSupports() {
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (!it.active || it.sup === 0) continue;
        var topY = it.y + it.r;
        if (it.sup === 2) {
            /* pedestal column */
            ctx.fillStyle = '#F3D9AC';
            rr(ctx, it.x - 17, topY, 34, FLOOR_Y - topY, 6);
            ctx.fill();
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#2B2350';
            ctx.stroke();
            ctx.fillStyle = '#E6C48E';
            rr(ctx, it.x - 24, topY - 4, 48, 10, 5);
            ctx.fill();
            ctx.stroke();
        } else {
            /* floating shelf board */
            ctx.fillStyle = '#D9A05B';
            rr(ctx, it.x - 54, topY, 108, 13, 6);
            ctx.fill();
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#2B2350';
            ctx.stroke();
            ctx.fillStyle = '#B9834A';
            ctx.beginPath();
            ctx.moveTo(it.x - 40, topY + 13);
            ctx.lineTo(it.x - 30, topY + 30);
            ctx.lineTo(it.x - 24, topY + 13);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(it.x + 40, topY + 13);
            ctx.lineTo(it.x + 30, topY + 30);
            ctx.lineTo(it.x + 24, topY + 13);
            ctx.closePath();
            ctx.fill();
        }
    }
}

function drawItems() {
    for (var i = 0; i < items.length; i++) {
        var it = items[i];
        if (!it.active) continue;
        drawShadow(it.x, it.y + it.r + 6, it.r * 0.95, 0.08);
        ctx.save();
        ctx.translate(it.x, it.y);
        if (it.type === T_JELLY) {
            var wob = 1 + Math.sin(time * 4 + it.phase) * 0.04;
            ctx.scale(wob, 2 - wob);
        }
        drawItemBody(it.type, it.r);
        ctx.restore();
    }
}

function drawHalves() {
    for (var i = 0; i < halves.length; i++) {
        var h = halves[i];
        if (!h.active) continue;
        var a = clamp(2.5 * (1 - h.life / h.ttl), 0, 1);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(h.x, h.y);
        ctx.rotate(h.rot);
        ctx.beginPath();
        var ext = h.r * 3;
        ctx.rect(-ext, h.side > 0 ? 0 : -ext, ext * 2, ext);
        ctx.clip();
        drawItemBody(h.type, h.r);
        /* the cut face */
        ctx.fillStyle = CUT_COLOR[h.type];
        ctx.fillRect(-h.r * 0.92, h.side > 0 ? 0 : -9, h.r * 1.84, 9);
        if (h.type === T_MELON) {
            ctx.fillStyle = '#2B2350';
            var sy = h.side > 0 ? 4.5 : -4.5;
            ctx.beginPath();
            ctx.ellipse(-h.r * 0.45, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
            ctx.ellipse(h.r * 0.05, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
            ctx.ellipse(h.r * 0.5, sy, 2.4, 1.6, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawStones() {
    for (var i = 0; i < stones.length; i++) {
        var st = stones[i];
        if (!st.active) continue;
        ctx.fillStyle = '#F7A8C4';
        rr(ctx, st.x, st.y, st.w, st.h, 10);
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#2B2350';
        ctx.stroke();
        /* cracks and a grumpy little face */
        ctx.strokeStyle = '#E387AA';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(st.x + 10, st.y + 12);
        ctx.lineTo(st.x + 22, st.y + 24);
        ctx.moveTo(st.x + st.w - 12, st.y + st.h - 14);
        ctx.lineTo(st.x + st.w - 24, st.y + st.h - 26);
        ctx.stroke();
        var fx = st.x + st.w / 2, fy = st.y + Math.min(st.h / 2, 36);
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(fx - 9, fy, 3, 0, Math.PI * 2);
        ctx.arc(fx + 9, fy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#2B2350';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(fx - 7, fy + 11);
        ctx.lineTo(fx + 7, fy + 11);
        ctx.stroke();
    }
}

function drawWalls() {
    for (var i = 0; i < walls.length; i++) {
        var w = walls[i];
        if (!w.active) continue;
        ctx.fillStyle = '#EF8FB4';
        rr(ctx, w.x, w.y, w.w, w.h, 10);
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#2B2350';
        ctx.stroke();
        /* brick lines */
        ctx.strokeStyle = '#D9739D';
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (var b = 1; b < 5; b++) {
            ctx.moveTo(w.x + 4, w.y + b * w.h / 5);
            ctx.lineTo(w.x + w.w - 4, w.y + b * w.h / 5);
        }
        ctx.stroke();
        /* sleepy moon face on top brick */
        ctx.fillStyle = '#2B2350';
        var fx = w.x + w.w / 2;
        ctx.beginPath();
        ctx.arc(fx - 8, w.y + 18, 2.5, 0, Math.PI * 2);
        ctx.arc(fx + 8, w.y + 18, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(fx, w.y + 26, 5, 0.2, Math.PI - 0.2);
        ctx.stroke();
    }
}

function drawGateArch() {
    if (levelEndX - camX > VW + 200) return;
    var x = levelEndX;
    ctx.fillStyle = '#B388FF';
    rr(ctx, x - 10, FLOOR_Y - 300, 20, 300, 8);
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#2B2350';
    ctx.stroke();
    ctx.fillStyle = '#7B4FC9';
    rr(ctx, x - 120, FLOOR_Y - 330, 240, 46, 14);

    ctx.stroke();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '800 26px Nunito, sans-serif';
    ctx.textAlign = 'center';

}

var GATE_COLORS = { 2: '#4FC3F7', 3: '#B388FF', 5: '#FF5FA2' };
function drawGates() {
    if (!bonusEntered) return;
    for (var i = 0; i < bonusGates.length; i++) {
        var g = bonusGates[i];
        if (g.x - camX > VW + 200 || g.x - camX < -200) continue;
        var col = GATE_COLORS[g.mult];
        var pop = g.hit ? 1 + 0.12 * Math.sin(time * 9) : 1;
        /* pillar */
        ctx.fillStyle = col;
        rr(ctx, g.x - 12, FLOOR_Y - 250, 24, 250, 9);
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#2B2350';
        ctx.stroke();
        /* flag */
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(g.x + 12, FLOOR_Y - 246);
        ctx.lineTo(g.x + 62, FLOOR_Y - 232);
        ctx.lineTo(g.x + 12, FLOOR_Y - 218);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        /* multiplier sign */
        ctx.save();
        ctx.translate(g.x, FLOOR_Y - 160);
        ctx.scale(pop, pop);
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(0, 0, 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#2B2350';
        ctx.stroke();
        ctx.fillStyle = col;
        ctx.font = '800 30px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('x' + g.mult, 0, 1);
        ctx.restore();
    }
}

function drawKnife() {
    var b = blade;
    var hFloor = clamp(1 - (FLOOR_Y - b.y) / 420, 0.25, 1);
    drawShadow(b.x, FLOOR_Y + 10, 42 * hFloor, 0.1);
    ctx.save();
    ctx.translate(b.x, b.y);
    var s = 1 + 0.1 * b.squash;
    ctx.scale(s, 2 - s);
    ctx.rotate(b.angle);

    /* blade */
    ctx.beginPath();
    ctx.moveTo(-4, -11);
    ctx.lineTo(48, -11);
    ctx.quadraticCurveTo(58, -10, 58, -3);
    ctx.quadraticCurveTo(48, 11, 8, 11);
    ctx.lineTo(-4, 11);
    ctx.closePath();
    ctx.fillStyle = '#EDF1F8';
    ctx.fill();
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = '#2B2350';
    ctx.stroke();
    /* cutting edge highlight */
    ctx.strokeStyle = '#C7D0E2';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(52, -1);
    ctx.quadraticCurveTo(44, 7.5, 10, 8);
    ctx.stroke();
    /* shine */
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(8, -6);
    ctx.lineTo(38, -6);
    ctx.stroke();

    /* round friendly handle */
    ctx.fillStyle = '#FF8A3D';
    rr(ctx, -48, -10, 46, 20, 10);
    ctx.fill();
    ctx.lineWidth = 3.5;
    ctx.strokeStyle = '#2B2350';
    ctx.stroke();
    /* pommel bump */
    ctx.fillStyle = '#FFB169';
    ctx.beginPath();
    ctx.arc(-46, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.stroke();

    /* big cartoon eyes on the handle */
    var tired = endReason === 'tired' && (currentState === State.ENDING || currentState === State.GAME_OVER);
    var blinking = blade.blinkT > 0;
    if (tired || blinking) {
        ctx.strokeStyle = '#2B2350';
        ctx.lineWidth = 2.6;
        ctx.beginPath();
        ctx.arc(-31, -1, 4.5, 0.15, Math.PI - 0.15);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(-15, -1, 4.5, 0.15, Math.PI - 0.15);
        ctx.stroke();
    } else {
        var lean = clamp(blade.angVel / SPIN_MAX, 0, 1) * 1.8;
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(-31, -1, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-15, -1, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2B2350';
        ctx.beginPath();
        ctx.arc(-31 + lean, -1, 2.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-15 + lean, -1, 2.9, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(-30 + lean, -2.4, 1.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-14 + lean, -2.4, 1.1, 0, Math.PI * 2);
        ctx.fill();
    }
    /* smile and blush */
    ctx.strokeStyle = '#2B2350';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    if (tired) {
        ctx.arc(-23, 8, 3, Math.PI + 0.3, Math.PI * 2 - 0.3);
    } else {
        ctx.arc(-23, 4, 4, 0.3, Math.PI - 0.3);
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,110,110,0.5)';
    ctx.beginPath();
    ctx.arc(-38, 3, 2.6, 0, Math.PI * 2);
    ctx.arc(-8, 3, 2.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.kind === 1) {
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, p.size * 0.72, p.size, p.rot, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.kind === 2) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.kind === 3) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (0.6 + 0.8 * p.life / p.ttl), 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawPops() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < pops.length; i++) {
        var p = pops[i];
        if (!p.active) continue;
        var k = p.life / p.ttl;
        var sc = k < 0.2 ? 0.5 + 2.5 * k : 1;
        ctx.globalAlpha = clamp(2.2 * (1 - k), 0, 1);
        ctx.font = '800 ' + Math.round(p.size * sc) + 'px Nunito, sans-serif';
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 5;
        ctx.strokeText(p.txt, p.x, p.y);
        ctx.fillStyle = p.color;
        ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.globalAlpha = 1;
}

function render() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 9;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(S, 0, 0, S, ox * S, oy * S);

    /* cream and butter kitchen */
    ctx.fillStyle = '#FFF6E9';
    ctx.fillRect(-10, -10, VW + 20, H + 20);
    ctx.fillStyle = '#FBEAD1';
    ctx.fillRect(-10, FLOOR_Y - 240, VW + 20, 240);

    /* faint backdrop silhouettes, slow parallax */
    var BW = 480;
    var bx = -(((camX * 0.35) % BW) + BW) % BW;
    for (var b = bx - BW; b < VW + BW; b += BW) {
        ctx.drawImage(backdropSpr, b | 0, (FLOOR_Y - 200) | 0, BW, 180);
    }

    /* world space */
    ctx.translate(-camX, 0);

    /* wooden counter planks */
    var TW = 140;
    var startTile = Math.floor((camX - 20) / TW) * TW;
    for (var gx = startTile; gx < camX + VW + TW; gx += TW) {
        ctx.drawImage(plankSpr, gx | 0, FLOOR_Y, TW, FLOOR_H);
    }

    drawGateArch();
    drawGates();
    drawSupports();
    drawStones();
    drawWalls();
    drawItems();
    drawHalves();
    drawKnife();
    drawParticles();
    drawPops();
}

/* ================= Input ================= */
function primaryAction() {
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
    } else if (currentState === State.PLAYING) {
        hop();
    }
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    primaryAction();
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        primaryAction();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING || currentState === State.BONUS) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING && currentState !== State.BONUS) return;
    pausedFrom = currentState;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = pausedFrom;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING || currentState === State.BONUS) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && (currentState === State.PLAYING || currentState === State.BONUS)) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    /* instant: straight back into a fresh run */
    resetRun();
    startRun();
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

/* ================= Headless test hook (inert in normal play) ================= */
window.__SR = {
    State: State,
    events: events,
    get state() { return currentState; },
    get blade() { return blade; },
    get baseScore() { return baseScore; },
    get finalScore() { return finalScore; },
    get combo() { return combo; },
    get multiplier() { return multiplier; },
    get slices() { return totalSlices; },
    get levelEndX() { return levelEndX; },
    profileKey: WoopProfile.KEY,
    storageKey: STORAGE_KEY,
    tap: primaryAction,
    step: function (dt) { update(dt); },
    getData: function () { return data; },
    debug: {
        setLevelEnd: function (x) { levelEndX = x; },
        setSpin: function (v) { blade.angVel = v; },
        placeStone: function (dx) { spawnStone(blade.x + dx - 32, 64, 64); },
        clearWalls: function () { for (var i = 0; i < walls.length; i++) walls[i].active = false; }
    }
};

})();
</script>

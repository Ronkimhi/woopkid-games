<script>
'use strict';

/* ============================================================
   WoopProfile shared module (contract, copied verbatim)
   ============================================================ */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};
const STICKER_THRESHOLDS = { bronze: 10000, silver: 2500000, gold: 1000000000 };

/* ============================================================
   Constants and helpers
   ============================================================ */
const TAU = Math.PI * 2;
const INK = '#2B2350';
const CONF = ['#FF8A3D', '#FFD93D', '#6FDB6F', '#4CC9F0', '#FF5FA2', '#B388FF'];

function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }
function easeOutBack(x) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2); }
function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}
function fmt(n) {
  n = Math.floor(n);
  if (n < 1000) return String(n);
  const units = [[1e12, 'T'], [1e9, 'B'], [1e6, 'M'], [1e3, 'K']];
  for (const [v, s] of units) {
    if (n >= v) {
      const x = n / v;
      const str = x >= 100 ? String(Math.floor(x)) : (Math.floor(x * 10) / 10).toFixed(1).replace(/\.0$/, '');
      return str + s;
    }
  }
  return String(n);
}
function fmtHud(n) {
  n = Math.floor(n);
  return n < 1000000 ? n.toLocaleString('en-US') : fmt(n);
}

/* ============================================================
   Persistent state, key: woopkid_pets-clicker
   ============================================================ */
const STORAGE_KEY = 'woopkid_pets-clicker';
function defaultState() {
  return {
    woops: 0,
    totalEarned: 0,
    ups: { tap: 0, paw: 0, feeder: 0, star: 0, machine: 0, cannon: 0, rocket: 0 },
    unlocked: ['blobby'],
    active: 'blobby',
    muted: false,
    lastSeen: null,
    golden: 0,
    bestCombo: 1

/* ============================================================
   Sound: procedural Web Audio, pitch randomized
   ============================================================ */
const Sound = {
  ctx: null,
  muted: !!state.muted,
  active: 0,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  note(freq, delay, dur, wave, vol, slide) {
    if (this.muted || !this.ctx || this.active > 6) return;
    const c = this.ctx;
    const o = c.createOscillator();
    const g = c.createGain();
    const t0 = c.currentTime + (delay || 0);
    const f = freq * (0.95 + Math.random() * 0.1); /* plus or minus 5 percent */
    o.type = wave || 'sine';
    o.frequency.setValueAtTime(f, t0);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, f * slide), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g);
    g.connect(c.destination);
    o.start(t0);
    o.stop(t0 + dur + 0.03);
    this.active++;
    o.onended = () => { this.active = Math.max(0, this.active - 1); };
  },
  boing(pet, tier) {
    this.note(pet.pitch * 1.9 * (1 + (tier - 1) * 0.16), 0, 0.16, pet.wave, 0.16, 0.34);
  },
  buy() { this.note(620, 0, 0.08, 'triangle', 0.14, 1.4); this.note(930, 0.07, 0.12, 'triangle', 0.12); },

  poof() { this.note(160, 0, 0.14, 'triangle', 0.1, 0.4); },
  claim() { [660, 830, 1050].forEach((f, i) => this.note(f, i * 0.08, 0.1, 'triangle', 0.13)); },
  golden() { [880, 1175, 1568].forEach((f, i) => this.note(f, i * 0.11, 0.22, 'sine', 0.1)); },
  goldenGet() { [523, 784, 1047, 1568, 2093].forEach((f, i) => this.note(f, i * 0.055, 0.14, 'triangle', 0.13)); },

/* ============================================================

   ============================================================ */
let bgCv = null;
let cloudCvs = [];
let goldenCv = null;
function frac(x) { return x - Math.floor(x); }
function buildBG() {
  bgCv = document.createElement('canvas');
  bgCv.width = Math.max(1, W * DPR);
  bgCv.height = Math.max(1, H * DPR);
  const b = bgCv.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);
  const horizon = H * 0.62;
  /* sky */
  const sky = b.createLinearGradient(0, 0, 0, horizon);
  sky.addColorStop(0, '#A8E0FF');
  sky.addColorStop(0.6, '#D8F1FF');
  sky.addColorStop(1, '#FFF3DE');
  b.fillStyle = sky;
  b.fillRect(0, 0, W, horizon + 2);
  /* sun with baked glow + rays */
  const sx = W * 0.84, sy0 = H * 0.1, sr = Math.min(W, H) * 0.075;
  const glow = b.createRadialGradient(sx, sy0, sr * 0.4, sx, sy0, sr * 3.4);
  glow.addColorStop(0, 'rgba(255,226,130,0.85)');
  glow.addColorStop(0.45, 'rgba(255,226,130,0.25)');
  glow.addColorStop(1, 'rgba(255,226,130,0)');
  b.fillStyle = glow;
  b.fillRect(sx - sr * 3.4, sy0 - sr * 3.4, sr * 6.8, sr * 6.8);
  b.strokeStyle = 'rgba(255,205,90,0.85)';
  b.lineWidth = 4;
  b.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * TAU + 0.35;
    b.beginPath();
    b.moveTo(sx + Math.cos(a) * sr * 1.35, sy0 + Math.sin(a) * sr * 1.35);
    b.lineTo(sx + Math.cos(a) * sr * 1.8, sy0 + Math.sin(a) * sr * 1.8);
    b.stroke();
  }
  b.beginPath(); b.arc(sx, sy0, sr, 0, TAU);
  b.fillStyle = '#FFDD66'; b.fill();
  b.lineWidth = 4; b.strokeStyle = '#F5B93C'; b.stroke();
  /* far hills */
  b.fillStyle = '#CDEBBB';
  b.beginPath();
  b.ellipse(W * 0.18, horizon + H * 0.06, W * 0.5, H * 0.12, 0, 0, TAU);
  b.ellipse(W * 0.86, horizon + H * 0.07, W * 0.44, H * 0.1, 0, 0, TAU);
  b.fill();
  /* meadow */
  const gg = b.createLinearGradient(0, horizon, 0, H);
  gg.addColorStop(0, '#BEE79B');
  gg.addColorStop(1, '#9CD877');
  b.fillStyle = gg;
  b.beginPath();
  b.moveTo(0, horizon + H * 0.05);
  b.quadraticCurveTo(W * 0.5, horizon - H * 0.035, W, horizon + H * 0.05);
  b.lineTo(W, H); b.lineTo(0, H);
  b.closePath();
  b.fill();
  /* winding path under the pet */
  b.fillStyle = 'rgba(255,246,233,0.55)';
  b.beginPath();
  b.ellipse(W * 0.5, H * 0.86, W * 0.34, H * 0.085, 0, 0, TAU);
  b.fill();
  /* flowers + grass tufts (deterministic scatter) */
  const petCols = ['#FF9ECD', '#FFD93D', '#FFFFFF', '#B388FF', '#FF8A6B'];
  for (let i = 0; i < 26; i++) {
    const px = frac(i * 0.618034 + 0.17) * W;
    const py = horizon + H * 0.055 + frac(i * 0.377 + 0.41) * (H - horizon - H * 0.07);
    const inPath = Math.abs(px - W * 0.5) < W * 0.3 && Math.abs(py - H * 0.86) < H * 0.07;
    const k = 0.75 + frac(i * 0.789) * 0.6;
    if (inPath && i % 3 !== 0) continue;
    if (i % 2 === 0) {
      /* flower */
      b.strokeStyle = '#7CBF57'; b.lineWidth = 2.5;
      b.beginPath(); b.moveTo(px, py); b.lineTo(px, py - 9 * k); b.stroke();
      b.fillStyle = petCols[i % petCols.length];
      for (let pI = 0; pI < 5; pI++) {
        const a = pI / 5 * TAU;
        b.beginPath();
        b.arc(px + Math.cos(a) * 4 * k, py - 9 * k + Math.sin(a) * 4 * k, 2.6 * k, 0, TAU);
        b.fill();
      }
      b.fillStyle = '#FFB703';
      b.beginPath(); b.arc(px, py - 9 * k, 2.2 * k, 0, TAU); b.fill();
    } else {
      /* grass tuft */
      b.strokeStyle = 'rgba(97,166,72,0.9)'; b.lineWidth = 2.5; b.lineCap = 'round';
      b.beginPath();
      b.moveTo(px - 4 * k, py); b.quadraticCurveTo(px - 6 * k, py - 7 * k, px - 7 * k, py - 10 * k);
      b.moveTo(px, py); b.lineTo(px, py - 11 * k);
      b.moveTo(px + 4 * k, py); b.quadraticCurveTo(px + 6 * k, py - 7 * k, px + 7 * k, py - 10 * k);
      b.stroke();
    }
  }
  /* clouds: three puffy sprites, built once */
  if (!cloudCvs.length) {
    for (let ci = 0; ci < 3; ci++) {
      const cw = 190, ch = 100;
      const cv = document.createElement('canvas');
      cv.width = cw; cv.height = ch;
      const cc = cv.getContext('2d');
      const puffs = [[50, 62, 26], [92, 48, 34], [136, 62, 26], [72, 68, 22], [112, 70, 22]];
      cc.fillStyle = 'rgba(190,222,244,0.9)';
      cc.beginPath();
      for (const p of puffs) { cc.moveTo(p[0] + p[2] + 3, p[1] + 4); cc.arc(p[0], p[1] + 4, p[2] + 3, 0, TAU); }
      cc.fill();
      cc.fillStyle = '#FFFFFF';
      cc.beginPath();
      for (const p of puffs) { cc.moveTo(p[0] + p[2], p[1]); cc.arc(p[0], p[1], p[2], 0, TAU); }

    const gs = 148;

    goldenCv.width = gs; goldenCv.height = gs;

    rad.addColorStop(0, 'rgba(255,240,150,0.95)');
    rad.addColorStop(0.4, 'rgba(255,214,80,0.45)');
    rad.addColorStop(1, 'rgba(255,214,80,0)');
    g.fillStyle = rad;
    g.fillRect(0, 0, gs, gs);
    g.translate(half, half);
    g.beginPath();
    for (let i = 0; i < 10; i++) {
      const a = i / 10 * TAU - Math.PI / 2;
      const r = i % 2 === 0 ? 42 : 19;
      const px = Math.cos(a) * r, py = Math.sin(a) * r;
      if (i === 0) g.moveTo(px, py); else g.lineTo(px, py);
    }
    g.closePath();
    g.fillStyle = '#FFD93D';
    g.fill();
    g.lineWidth = 5;
    g.lineJoin = 'round';
    g.strokeStyle = '#E8960C';
    g.stroke();
    /* happy face on the star */
    g.fillStyle = INK;
    g.beginPath(); g.arc(-9, -4, 3.4, 0, TAU); g.arc(9, -4, 3.4, 0, TAU); g.fill();
    g.beginPath(); g.arc(0, 3, 8, 0.3, Math.PI - 0.3);
    g.lineWidth = 3.4; g.lineCap = 'round'; g.strokeStyle = INK; g.stroke();
  }
}

/* ============================================================
   Draw helpers
   ============================================================ */
function rr(c, x, y, w, h, r) {
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function box(c, x, y, w, h, r, fill, sw) {
  c.beginPath();
  rr(c, x, y, w, h, r);
  if (fill) { c.fillStyle = fill; c.fill(); }
  if (sw) { c.lineWidth = sw; c.strokeStyle = INK; c.stroke(); }
}
function ell(c, x, y, rx, ry, fill, sw) {
  c.beginPath();
  c.ellipse(x, y, rx, ry, 0, 0, TAU);

  if (sw) { c.lineWidth = sw; c.strokeStyle = INK; c.stroke(); }
}
function eye(c, x, y, r, P) {
  c.beginPath();
  c.ellipse(x, y, r, Math.max(0.5, r * (1 - 0.9 * P.blink)), 0, 0, TAU);
  c.fillStyle = '#FFFFFF';
  c.fill();
  c.lineWidth = Math.max(3, r * 0.3);
  c.strokeStyle = INK;
  c.stroke();
  if (P.blink < 0.6) {
    const px = x + P.lx * r * 0.38, py = y + P.ly * r * 0.34;
    c.beginPath(); c.arc(px, py, r * 0.46, 0, TAU); c.fillStyle = INK; c.fill();
    c.beginPath(); c.arc(px - r * 0.15, py - r * 0.17, r * 0.15, 0, TAU); c.fillStyle = '#FFFFFF'; c.fill();
  }
}
function smile(c, x, y, r, a0, a1) {
  c.beginPath();
  c.arc(x, y, r, a0, a1);
  c.lineWidth = 6;
  c.lineCap = 'round';
  c.strokeStyle = INK;
  c.stroke();
}
function blush(c, x, y) {
  c.globalAlpha = 0.45;
  ell(c, x, y, 10, 6, '#FF7BAC');
  c.globalAlpha = 1;
}
function star(c, x, y, r, col) {
  c.fillStyle = col;
  c.beginPath();
  c.moveTo(x, y - r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.quadraticCurveTo(x, y, x, y + r);
  c.quadraticCurveTo(x, y, x - r, y);
  c.quadraticCurveTo(x, y, x, y - r);
  c.fill();
}
function stache(c, x, y, sgn) {
  c.save();
  c.translate(x, y);
  c.scale(sgn, 1);
  c.beginPath();
  c.moveTo(0, 0);
  c.bezierCurveTo(-14, -4, -26, 0, -32, 10);
  c.bezierCurveTo(-36, 16, -32, 22, -26, 20);
  c.bezierCurveTo(-20, 18, -10, 12, 0, 10);
  c.closePath();
  c.fillStyle = '#6B3B1F';
  c.fill();
  c.lineWidth = 3;
  c.strokeStyle = INK;
  c.stroke();
  c.restore();
}
function stalk(c, x1, y1, x2, y2, col) {
  c.lineCap = 'round';
  c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2);
  c.lineWidth = 11; c.strokeStyle = INK; c.stroke();
  c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2);
  c.lineWidth = 6; c.strokeStyle = col; c.stroke();

/* ============================================================
   Object pools: particles, floating texts, confetti
   ============================================================ */
const parts = [];
for (let i = 0; i < 120; i++) parts.push({ on: false, x: 0, y: 0, vx: 0, vy: 0, sz: 0, rot: 0, vr: 0, life: 0, max: 0, col: '#fff', shape: 0, grav: 750 });
/* shape: 0 square, 1 circle, 2 heart, 3 star glint */
function spawnPart(x, y, col, opts) {
  opts = opts || {};
  for (const p of parts) {
    if (p.on) continue;
    p.on = true;
    p.x = x; p.y = y;
    const a = Math.random() * TAU, sp = (opts.speed || 260) * (0.4 + Math.random() * 0.9);
    p.vx = Math.cos(a) * sp;
    p.vy = Math.sin(a) * sp - (opts.up || 120);
    p.sz = (opts.sz || 5) + Math.random() * 7;
    p.rot = Math.random() * TAU;
    p.vr = (Math.random() - 0.5) * 12;
    p.max = p.life = (opts.life || 0.55) + Math.random() * 0.35;
    p.col = col;
    p.shape = opts.shape === undefined ? (Math.random() < 0.6 ? 0 : 1) : opts.shape;
    p.grav = opts.grav === undefined ? 750 : opts.grav;
    return;
  }
}
function drawHeart(c, s) {
  c.beginPath();
  c.arc(-s * 0.35, -s * 0.28, s * 0.42, 0, TAU);
  c.arc(s * 0.35, -s * 0.28, s * 0.42, 0, TAU);
  c.moveTo(-s * 0.7, -s * 0.05);
  c.lineTo(0, s * 0.75);
  c.lineTo(s * 0.7, -s * 0.05);

}
/* expanding rings (shockwaves) */
const rings = [];
for (let i = 0; i < 14; i++) rings.push({ on: false, x: 0, y: 0, r: 0, vr: 0, life: 0, max: 0, col: '#fff', lw: 4 });
function spawnRing(x, y, col, r0, vr, lw, life) {
  for (const g of rings) {
    if (g.on) continue;
    g.on = true;
    g.x = x; g.y = y;
    g.r = r0 || 8;
    g.vr = vr || 320;
    g.lw = lw || 5;
    g.max = g.life = life || 0.42;
    g.col = col;
    return;
  }
}
const floats = [];
for (let i = 0; i < 30; i++) floats.push({ on: false, x: 0, y: 0, txt: '', life: 0, max: 0, size: 20, col: INK });
function spawnFloat(x, y, txt, size, col) {
  for (const f of floats) {
    if (f.on) continue;
    f.on = true;
    f.x = x + (Math.random() - 0.5) * 18;
    f.y = y;
    f.txt = txt;
    f.size = size;
    f.col = col;
    f.max = f.life = 1.1;

}
const confs = [];
for (let i = 0; i < 170; i++) confs.push({ on: false, x: 0, y: 0, vx: 0, vy: 0, w: 0, h: 0, rot: 0, vr: 0, life: 0, col: '#fff' });
let confettiActive = 0;
function confettiBurst(x, y, n) {
  for (const p of confs) {
    if (n <= 0) break;
    if (p.on) continue;
    p.on = true; confettiActive++;
    const a = Math.random() * TAU, sp = 180 + Math.random() * 380;
    p.x = x; p.y = y;
    p.vx = Math.cos(a) * sp;
    p.vy = Math.sin(a) * sp - 220;
    p.w = 7 + Math.random() * 6;
    p.h = 4 + Math.random() * 5;
    p.rot = Math.random() * TAU;
    p.vr = (Math.random() - 0.5) * 14;
    p.life = 1.4 + Math.random() * 0.8;
    p.col = CONF[(Math.random() * CONF.length) | 0];
    n--;
  }
}
let rainT = 0;
function confettiRain(dur) { rainT = Math.max(rainT, dur); }
function spawnRainDrop() {
  for (const p of confs) {
    if (p.on) continue;
    p.on = true; confettiActive++;
    p.x = Math.random() * FW;
    p.y = -14;

}

/* combo heat: builds while tapping rhythmically, cools when you stop */
let heat = 0, comboMult = 1, comboGrace = 0;
const COMBO_TIERS = [[0.96, 8], [0.7, 5], [0.42, 3], [0.18, 2]];
function comboFromHeat() { for (const t of COMBO_TIERS) if (heat >= t[0]) return t[1]; return 1; }
/* golden woop event */

/* economy */
const UPS = [
  { id: 'tap',     name: 'Tap Power',    icon: '\u{1F446}', desc: '+1 Woop per tap',           base: 15,      growth: 1.6,  rate: 0 },
  { id: 'paw',     name: 'Auto-Paw',     icon: '\u{1F43E}', desc: '+1 Woop per second',        base: 100,     growth: 1.7,  rate: 1 },
  { id: 'feeder',  name: 'Pet Feeder',   icon: '\u{1F356}', desc: '+8 Woops per second',       base: 1200,    growth: 1.75, rate: 8 },
  { id: 'star',    name: 'Star Charm',   icon: '⭐',    desc: 'x2 tap Woops (stacks!)',    base: 6000,    growth: 7,    rate: 0 },
  { id: 'machine', name: 'Woop Machine', icon: '⚙️', desc: '+50 Woops per second',      base: 15000,   growth: 1.8,  rate: 50 },
  { id: 'cannon',  name: 'Party Cannon', icon: '\u{1F389}', desc: '+300 Woops per second',     base: 200000,  growth: 1.85, rate: 300 },
  { id: 'rocket',  name: 'Woop Rocket',  icon: '\u{1F680}', desc: '+2,000 Woops per second',   base: 3000000, growth: 1.9,  rate: 2000 }
];
function costOf(u) { return Math.floor(u.base * Math.pow(u.growth, state.ups[u.id])); }
function petAb(k) {
  const ab = activePet().ab;
  let v = ab.k === k ? ab.v : 0;
  if (ab.k === 'all') v += ab.v;
  return v;
}
function tapPower() {
  return Math.max(1, Math.round((1 + state.ups.tap) * Math.pow(2, state.ups.star) * (1 + petAb('tap'))));
}
function idleRateBase() {
  let r = 0;
  for (const u of UPS) r += u.rate * state.ups[u.id];
  return Math.round(r * (1 + petAb('idle')));
}
function idleRate() { return idleRateBase() * (frenzyT > 0 ? FRENZY_MULT : 1); }

/* ============================================================
   Pet stage position and switching
   ============================================================ */
function stageScale() { return clamp(Math.min(W, H * 0.92) / 260, 0.7, 2.4); }
function petPos() {
  const s = stageScale();
  const entX = (1 - easeOutCubic(enterT)) * W * 0.7;
  const hop = enterT < 1 ? -Math.abs(Math.sin(enterT * Math.PI * 3)) * 26 * (1 - enterT) : 0;
  return {
    x: W / 2 + entX + anim.tpX * s,
    y: H * 0.52 + Math.sin(gt * 2) * 4 * s + hop + anim.tpY * s,
    s: s
  };
}
function setActivePet(id, entrance) {
  state.active = id;
  const pet = petById(id);
  setAccent(pet.accent);
  petNameEl.textContent = pet.name;
  petAbilityEl.textContent = '★ ' + pet.ab.txt;
  petNameEl.classList.remove('pop');
  void petNameEl.offsetWidth;
  petNameEl.classList.add('pop');
  anim.tpX = 0; anim.tpY = 0; anim.tpT = 4 + Math.random() * 3;
  if (entrance) { enterT = 0; } else { qv -= 5; }
  refreshGallery();
}

const TIER_IDX = { 1: 1, 2: 2, 3: 3, 5: 4, 8: 5 };
function tierUpFX() {
  const pp = petPos();
  Sound.tierUp(TIER_IDX[comboMult]);
  spawnRing(pp.x, pp.y, hexA(activePet().accent, 0.8), 30 * pp.s, 420, 6, 0.45);

  if (comboMult === 8) {
    Sound.fever();

    spawnRing(pp.x, pp.y, 'rgba(255,95,162,0.85)', 20, 620, 8, 0.55);
    for (let i = 0; i < 10; i++) spawnPart(pp.x, pp.y - 60 * pp.s, i % 2 ? '#FFD93D' : '#FF5FA2', { shape: 3, speed: 380, up: 200, sz: 8 });
    confettiBurst(FW / 2, FH * 0.45, 26);

}
function startFrenzy() {

function collectGolden() {
  golden.on = false;
  goldenTimer = (26 + Math.random() * 18) * (1 - petAb('golden'));
  state.golden++;
  const pay = Math.round(Math.max(120, tapPower() * comboMult * 30 + idleRateBase() * 25) * (1 + petAb('gpay')));
  state.woops += pay;
  state.totalEarned += pay;
  Sound.goldenGet();
  spawnFloat(golden.x, golden.y - 26, '+' + fmt(pay) + '!', 34, '#E8960C');
  spawnRing(golden.x, golden.y, 'rgba(255,217,61,0.9)', 14, 560, 7, 0.5);
  spawnRing(golden.x, golden.y, 'rgba(255,255,255,0.8)', 8, 380, 4, 0.4);
  for (let i = 0; i < 14; i++) spawnPart(golden.x, golden.y, i % 3 ? '#FFD93D' : '#FFFFFF', { shape: 3, speed: 360, up: 160, sz: 7 });
  startFrenzy();
  checkUnlocks();
}
function doTap(x, y) {
  Sound.init();
  if (currentState === State.UNLOCK) return;
  /* golden woop steals the tap (generous radius for small fingers) */
  if (golden.on && Math.hypot(x - golden.x, y - golden.y) < 58) { collectGolden(); return; }
  const woke = asleep;
  sinceTap = 0;
  /* build combo heat: fast ramp at the start, tiers at x2/x3/x5/x8 */
  heat = Math.min(1, heat + 0.075 + (heat < 0.18 ? 0.05 : 0));
  comboGrace = 0.5;
  const prev = comboMult;
  comboMult = comboFromHeat();
  if (comboMult > prev) tierUpFX();
  if (comboMult > state.bestCombo) state.bestCombo = comboMult;
  const fMult = frenzyT > 0 ? FRENZY_MULT : 1;
  const earn = tapPower() * comboMult * fMult;
  state.woops += earn;
  state.totalEarned += earn;
  const pet = activePet();
  /* look at the tap */
  const pp = petPos();
  lookTX = clamp((x - pp.x) / (110 * pp.s), -1, 1);
  lookTY = clamp((y - pp.y) / (110 * pp.s), -1, 1);
  lookHold = 1.6;
  /* squash + giggle wiggle toward the tap */
  qv -= 6.4 + comboMult * 0.35;
  rqv += (x < pp.x ? -1 : 1) * (2.2 + comboMult * 0.25);
  /* layered juice: confetti bits + hearts, escalating with combo */
  const tI = TIER_IDX[comboMult];
  const n = 6 + ((Math.random() * 4) | 0) + tI * 2 + (fMult > 1 ? 4 : 0);
  for (let i = 0; i < n; i++) spawnPart(x, y, pet.colors[(Math.random() * pet.colors.length) | 0]);
  const hearts = 1 + (tI >= 3 ? 1 : 0) + (tI >= 5 ? 1 : 0);
  for (let i = 0; i < hearts; i++) spawnPart(x, y - 8, '#FF7BAC', { shape: 2, speed: 130, up: 230, grav: 420, sz: 7, life: 0.7 });
  if (tI >= 4) spawnPart(x, y, '#FFFFFF', { shape: 3, speed: 200, up: 180, sz: 8 });
  if (tI >= 4 || fMult > 1) spawnRing(x, y, hexA(pet.accent, 0.6), 10, 300, 4, 0.32);
  spawnFloat(x, y - 14, '+' + fmt(earn), 19 + tI * 2.6 + (fMult > 1 ? 4 : 0), fMult > 1 ? '#E8960C' : pet.accent);
  Sound.boing(pet, tI);
  if (woke) {
    Sound.wake();
    spawnFloat(pp.x, pp.y - 120 * pp.s, '!', 30, pet.accent);
    for (let i = 0; i < 5; i++) spawnPart(pp.x, pp.y - 90 * pp.s, '#FF7BAC', { shape: 2, speed: 150, up: 200, grav: 380, sz: 7 });
  }
  if (tapHintEl.style.display !== 'none') tapHintEl.style.display = 'none';
  checkUnlocks();
}
stage.addEventListener('touchstart', e => {
  e.preventDefault();
  const t0 = e.touches[0];

function buildShop() {
  shopListEl.innerHTML = '';
  for (const u of UPS) {
    const row = document.createElement('div');
    row.className = 'urow';
    row.id = 'row-' + u.id;
    row.innerHTML =
      '<div class="uicon">' + u.icon + '</div>' +
      '<div class="uinfo"><div class="uname">' + u.name + '</div>' +
      '<div class="udesc">' + u.desc + '</div>' +
      '<div class="uown">Owned: 0</div></div>' +
      '<button class="buy" data-id="' + u.id + '"><span class="bnum">0</span><span class="blab">WOOPS</span></button>';
    row.querySelector('.buy').addEventListener('click', () => tryBuy(u));
    shopListEl.appendChild(row);
  }
  refreshShop();
}
function refreshShop() {
  for (const u of UPS) {
    const row = el('row-' + u.id);
    if (!row) continue;
    const cost = costOf(u);
    row.querySelector('.bnum').textContent = fmt(cost);
    row.querySelector('.uown').textContent = 'Owned: ' + state.ups[u.id];
    const can = state.woops >= cost;
    row.classList.toggle('buyable', can);
    row.classList.toggle('dim', !can);
  }
}
function tryBuy(u) {
  Sound.init();
  const cost = costOf(u);
  if (state.woops < cost) return;
  state.woops -= cost;
  state.ups[u.id]++;
  Sound.buy();
  const pp = petPos();
  spawnFloat(pp.x, pp.y - 130 * pp.s, u.name.toUpperCase() + '!', 18, activePet().accent);
  qv -= 4; /* pet celebrates the new toy */
  spawnRing(pp.x, pp.y, hexA(activePet().accent, 0.7), 24 * pp.s, 360, 5, 0.4);
  const lvl = state.ups[u.id];
  if (lvl === 1 && u.id !== 'tap' && u.id !== 'star') {
    toast(u.icon + ' ' + u.name + ' joined the meadow!');
    confettiBurst(FW / 2, FH * 0.55, 30);
  } else if (lvl % 10 === 0) {
    toast(u.name + ' Lv ' + lvl + '! AMAZING!');
    Sound.tierUp(3);
    confettiBurst(FW / 2, FH * 0.55, 40);
  }
  refreshShop();
  updateRateRow(true);
  save();
}
function openShop(open) {
  shopEl.classList.toggle('open', open);
  scrimEl.classList.toggle('open', open);
  if (open) refreshShop();
}

function drawMini(cv, pet, silhouette) {
  const size = 88;
  cv.width = size;
  cv.height = size;
  const c = cv.getContext('2d');
  c.save();
  c.translate(size / 2, size / 2 + 3);
  c.scale(size / 300, size / 300);
  DRAW[pet.id](c, 1.3, { lx: 0, ly: 0, blink: 0 });
  c.restore();
  if (silhouette) {
    c.globalCompositeOperation = 'source-in';
    c.fillStyle = INK;
    c.fillRect(0, 0, size, size);
    c.globalCompositeOperation = 'source-over';
  }
}
function buildGallery() {
  galleryEl.innerHTML = '';
  for (const pet of PETS) {
    const cell = document.createElement('button');
    cell.className = 'pcell';
    cell.id = 'cell-' + pet.id;
    cell.setAttribute('aria-label', pet.name);
    const cv = document.createElement('canvas');
    const lab = document.createElement('span');
    lab.className = 'plabel';
    cell.appendChild(cv);
    cell.appendChild(lab);
    cell.addEventListener('click', () => {
      Sound.init();
      if (!state.unlocked.includes(pet.id)) {
        Sound.note(140, 0, 0.1, 'triangle', 0.08);
        cell.style.animation = 'none';
        return;
      }
      if (state.active !== pet.id) {
        setActivePet(pet.id, false);
        Sound.boing(pet, 1);
        save();
      }
    });
    galleryEl.appendChild(cell);
  }
  refreshGallery();
}
function refreshGallery() {
  for (const pet of PETS) {
    const cell = el('cell-' + pet.id);
    if (!cell) continue;
    const unlocked = state.unlocked.includes(pet.id);
    const cv = cell.querySelector('canvas');
    const lab = cell.querySelector('.plabel');
    drawMini(cv, pet, !unlocked);
    cell.classList.toggle('locked', !unlocked);
    cell.classList.toggle('active', state.active === pet.id);
    lab.textContent = unlocked ? pet.name.split(' ')[0] : '\u{1F512} ' + fmt(pet.need);
  }
}

/* ============================================================
   Unlocks
   ============================================================ */
function checkUnlocks() {
  for (const pet of PETS) {
    if (state.totalEarned >= pet.need && !state.unlocked.includes(pet.id) && !unlockQueue.includes(pet.id)) {
      unlockQueue.push(pet.id);
    }
  }
  processUnlockQueue();
}
function processUnlockQueue() {
  if (currentState === State.UNLOCK || !unlockQueue.length) return;
  const id = unlockQueue.shift();
  const pet = petById(id);
  state.unlocked.push(id);
  currentState = State.UNLOCK;
  setActivePet(id, true);
  save();
  const earned = WoopProfile.reportRun('pets-clicker', Math.floor(state.totalEarned), STICKER_THRESHOLDS);
  el('unlockName').textContent = pet.name;
  el('unlockName').style.color = pet.accent;
  el('unlockTag').textContent = pet.tag;
  el('unlockAb').textContent = '★ POWER: ' + pet.ab.txt;
  el('unlockOv').classList.add('open');
  Sound.fanfare();
  confettiRain(1.6);
  confettiBurst(FW / 2, FH * 0.4, 50);
  if (earned.length) {
    setTimeout(() => toast(earned[earned.length - 1].toUpperCase() + ' STICKER EARNED!'), 1300);
  }
}
el('unlockGo').addEventListener('click', () => {
  el('unlockOv').classList.remove('open');
  currentState = State.PLAYING;
  Sound.claim();
  processUnlockQueue();
});

let awayGain = 0;
function checkOffline() {
  if (!state.lastSeen) return;
  const elapsed = (Date.now() - state.lastSeen) / 1000;
  const rate = idleRateBase();
  if (elapsed > 90 && rate > 0) {
    awayGain = rate * Math.min(elapsed, 8 * 3600);
    el('awayAmt').textContent = '+' + fmt(awayGain) + ' WOOPS';
    el('awayOv').classList.add('open');
  }
}
el('awayClaim').addEventListener('click', () => {

  state.woops += awayGain;
  state.totalEarned += awayGain;
  awayGain = 0;
  el('awayOv').classList.remove('open');
  Sound.claim();
  confettiBurst(FW / 2, FH / 2, 70);
  save();
  checkUnlocks();
});

  if (force || txt !== lastRateTxt) {
    rateRowEl.textContent = txt;

/* ============================================================
   Update
   ============================================================ */
function update(dt, now) {
  gt += dt;
  /* idle income */
  const ir = idleRate();
  if (ir > 0) {
    const g = ir * dt;
    state.woops += g;
    state.totalEarned += g;
    idleDrip += dt;
    if (idleDrip > 3) {
      idleDrip = 0;
      const pp = petPos();
      spawnFloat(pp.x + (Math.random() - 0.5) * 120 * pp.s, pp.y - 90 * pp.s, '+' + fmt(ir * 3), 15, 'rgba(43,35,80,0.55)');
    }
  }
  unlockCheckT += dt;
  if (unlockCheckT > 0.4) { unlockCheckT = 0; checkUnlocks(); }
  /* combo heat cools when you stop tapping */
  comboGrace -= dt;
  if (comboGrace <= 0 && heat > 0) {
    heat = Math.max(0, heat - dt * (0.12 + heat * 0.08) * (1 - petAb('combo')));
    comboMult = comboFromHeat();
  }
  comboFillEl.style.width = (clamp(heat, 0, 1) * 100) + '%';
  comboLabelEl.textContent = 'x' + comboMult;
  comboLabelEl.classList.toggle('hot', comboMult > 1);
  comboLabelEl.classList.toggle('fever', comboMult >= 8);
  /* golden woop event */
  if (currentState === State.PLAYING && !document.hidden) {
    if (!golden.on) {
      goldenTimer -= dt;
      if (goldenTimer <= 0) {
        golden.on = true;
        const fromLeft = Math.random() < 0.5;
        golden.x = fromLeft ? -50 : W + 50;
        golden.vx = (fromLeft ? 1 : -1) * (W * 0.085 + 34);
        golden.baseY = H * (0.14 + Math.random() * 0.26);
        golden.life = 11;
        golden.trail = 0;
        Sound.golden();
        if (state.golden === 0) toast('✨ TAP THE GOLDEN WOOP! ✨');
      }
    } else {
      golden.x += golden.vx * dt;
      golden.y = golden.baseY + Math.sin(gt * 2.4) * 16;
      golden.life -= dt;
      golden.trail -= dt;
      if (golden.trail <= 0) {
        golden.trail = 0.14;
        spawnPart(golden.x - Math.sign(golden.vx) * 20, golden.y + 8, '#FFD93D', { shape: 3, speed: 30, up: -20, grav: 60, sz: 5, life: 0.4 });
      }
      if (golden.life <= 0 || golden.x < -70 || golden.x > W + 70) {
        golden.on = false;
        goldenTimer = (26 + Math.random() * 18) * (1 - petAb('golden'));
      }
    }
  }
  /* frenzy countdown */
  if (frenzyT > 0) {
    frenzyT -= dt;
    frenzyTxtT -= dt;
    if (frenzyTxtT <= 0) {
      frenzyTxtT = 0.25;
      frenzyEl.textContent = '⭐ WOOP FRENZY x' + FRENZY_MULT + ' · ' + Math.ceil(frenzyT) + 's ⭐';
    }
    frenzySparkT -= dt;
    if (frenzySparkT <= 0) {
      frenzySparkT = 0.22;
      spawnPart(Math.random() * W, -6, CONF[(Math.random() * CONF.length) | 0], { speed: 20, up: -60, grav: 300, sz: 6, life: 0.9 });
    }
    if (frenzyT <= 0) frenzyEl.classList.remove('on');
  }
  /* sleepy pet: dozes off if ignored (idle income still flows) */
  sinceTap += dt;
  const wasAsleep = asleep;
  asleep = sinceTap > 22 && currentState === State.PLAYING;
  if (asleep) {
    zzzT -= dt;
    if (zzzT <= 0) {
      zzzT = 1.7;
      const pp = petPos();
      spawnFloat(pp.x + 60 * pp.s, pp.y - 100 * pp.s, 'z', 16 + Math.random() * 8, 'rgba(43,35,80,0.5)');
    }
  } else if (wasAsleep) { zzzT = 0; }
  /* squash spring */
  qv += (-q * 180 - qv * 10) * dt;
  q = clamp(q + qv * dt, -0.42, 0.42);
  /* wiggle spring */
  rqv += (-rq * 260 - rqv * 9) * dt;
  rq = clamp(rq + rqv * dt, -3, 3);
  /* look */
  lookHold -= dt;
  if (lookHold <= 0) { lookTX = 0; lookTY = 0; }
  lookX += (lookTX - lookX) * Math.min(1, dt * 8);
  lookY += (lookTY - lookY) * Math.min(1, dt * 8);
  /* blink */
  blinkTimer -= dt;
  if (blinkTimer < -0.13) blinkTimer = 2 + Math.random() * 3.5;
  /* entrance */
  if (enterT < 1) enterT = Math.min(1, enterT + dt / 0.9);
  /* ninja teleport */
  if (state.active === 'ninja' && currentState === State.PLAYING) {
    anim.tpT -= dt;
    if (anim.tpT <= 0) {
      const pp = petPos();
      for (let i = 0; i < 9; i++) spawnPart(pp.x, pp.y, '#C9CFD9', { speed: 140, up: 40, grav: -60 });
      anim.tpX = (Math.random() * 2 - 1) * Math.min(70, W * 0.14);
      anim.tpY = (Math.random() * 2 - 1) * 16;
      const pp2 = petPos();
      for (let i = 0; i < 9; i++) spawnPart(pp2.x, pp2.y, '#C9CFD9', { speed: 140, up: 40, grav: -60 });
      Sound.poof();
      anim.tpT = 4 + Math.random() * 3;
    }
  }
  /* pools */
  for (const p of parts) {
    if (!p.on) continue;
    p.life -= dt;
    if (p.life <= 0) { p.on = false; continue; }
    p.vy += p.grav * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vr * dt;
  }
  for (const f of floats) {
    if (!f.on) continue;
    f.life -= dt;
    if (f.life <= 0) { f.on = false; continue; }
    f.y -= 58 * dt;
  }
  for (const g of rings) {
    if (!g.on) continue;
    g.life -= dt;
    if (g.life <= 0) { g.on = false; continue; }
    g.r += g.vr * dt;
  }
  /* scene props do their thing */
  if (state.ups.cannon > 0) {
    cannonT -= dt;
    cannonK = Math.max(0, cannonK - dt * 3);
    if (cannonT <= 0) {
      cannonT = 6.5;
      cannonK = 1;
      const cx = W * 0.9, cy = H * 0.9;
      for (let i = 0; i < 7; i++) spawnPart(cx - 18, cy - 26, CONF[(Math.random() * CONF.length) | 0], { speed: 200, up: 320, sz: 6 });
      Sound.note(300, 0, 0.1, 'triangle', 0.07, 1.8);
    }
  }
  if (state.ups.rocket > 0) {
    rocketT += dt;
    if (rocketT > 10) rocketT = -3 - Math.random() * 4;
  }
  if (state.ups.paw > 0) {
    pawStomp -= dt;
    if (pawStomp <= 0) pawStomp = 3;
  }
  if (rainT > 0) {
    rainT -= dt;
    for (let i = 0; i < 4; i++) spawnRainDrop();
  }
  for (const p of confs) {
    if (!p.on) continue;
    p.life -= dt;
    if (p.life <= 0 || p.y > FH + 30) { p.on = false; confettiActive = Math.max(0, confettiActive - 1); continue; }
    p.vy += 620 * dt;
    p.vx *= (1 - 1.6 * dt);
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vr * dt;
  }
  /* HUD tick-up */
  const diff = state.woops - dispWoops;
  dispWoops += diff * Math.min(1, dt * 9);
  if (Math.abs(state.woops - dispWoops) < 1) dispWoops = state.woops;
  const wtxt = fmtHud(dispWoops);
  if (wtxt !== lastWoopsTxt) {
    woopsNumEl.textContent = wtxt;
    lastWoopsTxt = wtxt;
  }
  updateRateRow(false);
}

/* ============================================================
   Render
   ============================================================ */
function drawProps(c) {
  const s = clamp(stageScale() * 0.52, 0.42, 1);
  /* Auto-Paw bot: hovers and stomps in rhythm with the income drip */
  if (state.ups.paw > 0) {
    const px = W * 0.11, py = H * 0.73;
    const press = pawStomp < 0.4 ? (0.4 - pawStomp) / 0.4 : 0;
    const bob = Math.sin(gt * 2.2) * 4 * s + press * 10 * s;
    c.save();
    c.translate(px, py + bob);
    c.scale(s, s);
    ell(c, 0, 34 - bob / s, 22, 5, 'rgba(43,35,80,0.12)');
    box(c, -16, -6, 32, 26, 12, '#FFB7A0', 4);
    ell(c, -12, -14, 7, 8, '#FFB7A0', 3.5);
    ell(c, 0, -17, 7, 8, '#FFB7A0', 3.5);
    ell(c, 12, -14, 7, 8, '#FFB7A0', 3.5);
    ell(c, 0, 7, 9, 7, '#FF8A6B');
    c.restore();
  }
  /* Pet Feeder: bowl of kibble */
  if (state.ups.feeder > 0) {
    const px = W * 0.13, py = H * 0.9;
    c.save();
    c.translate(px, py);
    c.scale(s, s);
    c.beginPath();
    c.moveTo(-28, -6); c.quadraticCurveTo(0, -14, 28, -6);
    c.lineTo(22, 14); c.quadraticCurveTo(0, 20, -22, 14);
    c.closePath();
    c.fillStyle = '#FF5757'; c.fill();
    c.lineWidth = 4; c.strokeStyle = INK; c.stroke();
    c.fillStyle = '#C98A4B';
    for (let i = 0; i < 5; i++) {
      c.beginPath(); c.arc(-16 + i * 8, -7 + (i % 2) * 3, 4, 0, TAU); c.fill();
    }
    c.lineWidth = 2.5; c.strokeStyle = INK;
    c.beginPath(); c.arc(-12, -6, 4.5, 0, TAU); c.arc(4, -5, 4.5, 0, TAU); c.stroke();
    c.fillStyle = '#FFFFFF'; c.font = '900 11px Nunito, sans-serif';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('WOOP', 0, 7);
    c.restore();
  }
  /* Woop Machine: chugging box with a spinning gear */
  if (state.ups.machine > 0) {
    const px = W * 0.89, py = H * 0.74;
    const chug = Math.sin(gt * 6) * 1.5 * s;
    c.save();
    c.translate(px, py + chug);
    c.scale(s, s);
    ell(c, 0, 30 - chug / s, 26, 5, 'rgba(43,35,80,0.12)');
    box(c, -24, -18, 48, 44, 10, '#8FA3FF', 4);
    box(c, -16, -8, 20, 16, 5, '#DCE4FF', 3);
    c.save();
    c.translate(12, 6);
    c.rotate(gt * 2.4);
    c.fillStyle = '#FFD93D';
    c.fillRect(-8, -8, 16, 16);
    c.rotate(Math.PI / 4);
    c.fillRect(-8, -8, 16, 16);
    c.beginPath(); c.arc(0, 0, 5, 0, TAU); c.fillStyle = INK; c.fill();
    c.restore();
    c.globalAlpha = Math.sin(gt * 4) > 0 ? 1 : 0.3;
    ell(c, -14, -26, 4, 4, '#6FDB6F', 3);
    c.globalAlpha = 1;
    box(c, 6, -30, 12, 14, 4, '#7A8BD9', 3);
    c.restore();
  }
  /* Party Cannon: fires confetti on its own */
  if (state.ups.cannon > 0) {
    const px = W * 0.9, py = H * 0.9;
    c.save();
    c.translate(px, py);
    c.scale(s, s);
    c.rotate(-0.6 + cannonK * 0.25);
    c.beginPath();
    c.moveTo(-12, 18); c.lineTo(12, 18); c.lineTo(20, -26); c.lineTo(-20, -26);
    c.closePath();
    c.fillStyle = '#FF5FA2'; c.fill();
    c.lineWidth = 4; c.strokeStyle = INK; c.stroke();
    c.fillStyle = '#FFD93D';
    c.beginPath(); c.moveTo(-16, -4); c.lineTo(16, -4); c.lineTo(14, 6); c.lineTo(-14, 6); c.closePath(); c.fill();
    ell(c, 0, -26, 20, 6, '#B23A72', 4);
    c.restore();
  }
  /* Woop Rocket: zips across the sky trailing sparkle */
  if (state.ups.rocket > 0 && rocketT >= 0 && rocketT <= 3) {
    const k = rocketT / 3;
    const rx = -50 + k * (W + 100);
    const ry = H * 0.17 - Math.sin(k * Math.PI) * H * 0.07;
    c.save();
    c.translate(rx, ry);
    c.rotate(0.12 - Math.sin(k * Math.PI) * 0.24);
    c.scale(s, s);
    const fl = 0.7 + Math.random() * 0.6;
    c.fillStyle = '#FFB703';
    c.beginPath(); c.moveTo(-16, -6); c.lineTo(-16 - 18 * fl, 0); c.lineTo(-16, 6); c.closePath(); c.fill();
    c.beginPath();
    c.moveTo(-16, -9); c.quadraticCurveTo(10, -13, 24, 0); c.quadraticCurveTo(10, 13, -16, 9);
    c.closePath();
    c.fillStyle = '#E8ECF4'; c.fill();
    c.lineWidth = 4; c.strokeStyle = INK; c.stroke();
    ell(c, 6, 0, 5, 5, '#4CC9F0', 3);
    c.beginPath(); c.moveTo(-16, -9); c.lineTo(-24, -16); c.lineTo(-20, -2); c.closePath();
    c.moveTo(-16, 9);
    c.beginPath(); c.moveTo(-16, 9); c.lineTo(-24, 16); c.lineTo(-20, 2); c.closePath();
    c.fillStyle = '#FF5757'; c.fill();
    c.restore();
  }
}
function render() {
  const c = sctx;
  /* pre-rendered cozy meadow */
  if (bgCv) c.drawImage(bgCv, 0, 0, W, H);
  else { c.fillStyle = '#FFF6E9'; c.fillRect(0, 0, W, H); }
  /* drifting clouds */
  for (let i = 0; i < cloudCvs.length; i++) {
    const sc = 0.55 + i * 0.28;
    const span = W + 260;
    const cx = ((i * 230 + gt * (8 + i * 5)) % span) - 220;
    c.drawImage(cloudCvs[i], cx, H * (0.04 + i * 0.09), 190 * sc, 100 * sc);
  }
  /* butterflies */
  for (let i = 0; i < 2; i++) {
    const bx = W * (0.5 + 0.4 * Math.sin(gt * 0.17 + i * 2.6));
    const by = H * (0.33 + 0.14 * Math.sin(gt * 0.26 + i * 1.8)) - 8 * Math.sin(gt * 3 + i * 4);
    const flap = Math.abs(Math.cos(gt * 11 + i * 2));
    const col = i === 0 ? '#FF9ECD' : '#4CC9F0';
    c.save();
    c.translate(bx, by);
    c.rotate(Math.sin(gt * 0.9 + i) * 0.3);
    c.fillStyle = col;
    c.save(); c.scale(Math.max(0.25, flap), 1);
    c.beginPath(); c.ellipse(-6, -2, 6, 8, 0.4, 0, TAU); c.ellipse(6, -2, 6, 8, -0.4, 0, TAU); c.fill();
    c.restore();
    c.fillStyle = INK;
    c.beginPath(); c.ellipse(0, 0, 2, 6, 0, 0, TAU); c.fill();
    c.restore();
  }
  /* upgrade props living in the meadow */
  drawProps(c);
  /* pet */
  const pet = activePet();
  const pp = petPos();
  const sleepSag = asleep ? 0.06 : 0;
  const sy = 1 + q - sleepSag, sx = 1 - q * 0.8 + sleepSag;
  c.fillStyle = 'rgba(43,35,80,0.14)';
  c.beginPath();
  c.ellipse(pp.x, H * 0.52 + 108 * pp.s, 80 * pp.s * sx, 16 * pp.s, 0, 0, TAU);
  c.fill();
  c.save();
  c.translate(pp.x, pp.y);
  if (enterT < 1) c.rotate(Math.sin(enterT * 22) * 0.12 * (1 - enterT));
  c.rotate(rq * 0.045);
  c.scale(pp.s * sx, pp.s * sy);
  const P = { lx: lookX, ly: lookY, blink: asleep ? 1 : (blinkTimer < 0 ? 1 : 0) };
  DRAW[pet.id](c, asleep ? gt * 0.35 : gt, P);
  c.restore();
  /* golden woop (drawn on top so it is always spottable) */
  if (golden.on) {
    const pulse = 1 + Math.sin(gt * 7) * 0.1;
    const gsz = 118 * pulse;
    const fadeIn = Math.min(1, (11 - golden.life) * 3);
    c.save();
    c.translate(golden.x, golden.y);
    c.rotate(Math.sin(gt * 3) * 0.25);
    c.globalAlpha = golden.life < 1 ? Math.max(0, golden.life) * fadeIn : fadeIn;
    c.drawImage(goldenCv, -gsz / 2, -gsz / 2, gsz, gsz);
    c.restore();
    c.globalAlpha = 1;
  }
  /* shockwave rings */
  for (const g of rings) {
    if (!g.on) continue;
    const k = g.life / g.max;
    c.globalAlpha = k;
    c.lineWidth = g.lw * k + 1;
    c.strokeStyle = g.col;
    c.beginPath();
    c.arc(g.x, g.y, g.r, 0, TAU);
    c.stroke();
  }
  c.globalAlpha = 1;
  /* particles */
  for (const p of parts) {
    if (!p.on) continue;
    const k = p.life / p.max;
    c.save();
    c.translate(p.x, p.y);
    c.rotate(p.rot);
    c.globalAlpha = Math.min(1, k * 2);
    c.fillStyle = p.col;
    const s2 = p.sz * (0.5 + k * 0.5);
    if (p.shape === 0) c.fillRect(-s2 / 2, -s2 / 2, s2, s2);
    else if (p.shape === 1) { c.beginPath(); c.arc(0, 0, s2 / 2, 0, TAU); c.fill(); }
    else if (p.shape === 2) drawHeart(c, s2 * 0.75);
    else star(c, 0, 0, s2 * 0.9, p.col);
    c.restore();
  }
  c.globalAlpha = 1;
  /* floating texts */
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  for (const f of floats) {
    if (!f.on) continue;
    const age = f.max - f.life;
    const pop = easeOutBack(Math.min(1, age * 3.2));
    c.globalAlpha = Math.min(1, f.life * 2.4);
    c.font = '800 ' + Math.round(f.size * pop) + 'px Nunito, sans-serif';
    c.lineWidth = 4;
    c.strokeStyle = '#FFF6E9';
    c.strokeText(f.txt, f.x, f.y);
    c.fillStyle = f.col;
    c.fillText(f.txt, f.x, f.y);
  }
  c.globalAlpha = 1;
  /* confetti overlay */
  fctx.clearRect(0, 0, FW, FH);
  if (confettiActive > 0) {
    for (const p of confs) {
      if (!p.on) continue;
      fctx.save();
      fctx.translate(p.x, p.y);
      fctx.rotate(p.rot);
      fctx.globalAlpha = Math.min(1, p.life * 1.6);
      fctx.fillStyle = p.col;
      fctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      fctx.restore();
    }
  }
}

/* ============================================================
   Main loop, 60fps, dt clamped
   ============================================================ */
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt, now);
  render();
  requestAnimationFrame(loop);
}

/* ============================================================
   Autosave + profile reporting + visibility
   ============================================================ */
setInterval(save, 5000);
setInterval(() => {
  if (state.totalEarned > 0) {
    WoopProfile.reportRun('pets-clicker', Math.floor(state.totalEarned), STICKER_THRESHOLDS);
  }
}, 60000);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    hiddenAt = Date.now();
    save();
  } else if (hiddenAt) {
    const elapsed = (Date.now() - hiddenAt) / 1000;
    hiddenAt = 0;
    const rate = idleRateBase();
    if (elapsed > 2 && rate > 0) {
      const g = rate * Math.min(elapsed, 8 * 3600);
      state.woops += g;
      state.totalEarned += g;
      checkUnlocks();
    }
  }
});
window.addEventListener('pagehide', save);

/* ============================================================
   Init
   ============================================================ */
function init() {
  resize();
  Sound.muted = !!state.muted;
  refreshMute();
  buildShop();
  buildGallery();
  setActivePet(state.active, false);
  q = 0; qv = 0;
  if (state.totalEarned > 0) tapHintEl.style.display = 'none';
  checkOffline();
  checkUnlocks();
  updateRateRow(true);
  save();
  requestAnimationFrame(loop);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => refreshGallery());
  }
}
init();
/* read-only debug/test hook */
window.__wk = { state: state, golden: golden, get heat() { return heat; }, get comboMult() { return comboMult; }, get frenzyT() { return frenzyT; }, get asleep() { return asleep; } };
</script>

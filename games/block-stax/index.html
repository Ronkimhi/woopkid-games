<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var gestureHintEl = document.getElementById('gestureHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var holdBtn = document.getElementById('holdBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelTitleEl = document.getElementById('panelTitle');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var panelStatsEl = document.getElementById('panelStats');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_block-stax';
var defaultData = {
    highScore: 0,
    highLevel: 1,
    totalPlays: 0,
    totalLines: 0,
    totalQuads: 0,
    hintShown: false,
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function rr(c, x, y, w, h, r) {
    if (w <= 0 || h <= 0) { c.beginPath(); return; }
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}
function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
function easeOutBack(t) {
    var s = 1.70158;
    return 1 + (s + 1) * Math.pow(t - 1, 3) + s * Math.pow(t - 1, 2);
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var activeVoices = 0;
var MAX_VOICES = 8;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */

function tone(freq, dur, gain, type, delay) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime + (delay || 0);
    var o = audioCtx.createOscillator();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq * pitchVar(), t);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.12, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + dur + 0.04);
}

function sfxMove() { tone(250, 0.04, 0.035, 'square'); }
function sfxRotate() { tone(440, 0.05, 0.05, 'triangle'); }
function sfxLock() { tone(110, 0.1, 0.13, 'sine'); tone(220, 0.05, 0.045, 'square'); }
function sfxHardDrop() { tone(80, 0.13, 0.18, 'sine'); tone(160, 0.07, 0.08, 'square'); tone(55, 0.16, 0.1, 'sine', 0.02); }
function sfxHold() { tone(520, 0.07, 0.06, 'triangle'); tone(720, 0.07, 0.05, 'triangle', 0.06); }
function sfxTwirl() {
    var run = [660, 880, 1100, 880, 1320];
    for (var i = 0; i < run.length; i++) tone(run[i], 0.09, 0.07, 'triangle', i * 0.045);
}

/* Rising arpeggio, one note as each column of the row pops */
var ARP_NOTES = [523, 587, 659, 784, 880, 1047];
function sfxArpeggio(nRows) {
    if (!canPlay()) return;
    var mult = nRows >= 3 ? 1.19 : 1;
    for (var i = 0; i < ARP_NOTES.length; i++) {
        tone(ARP_NOTES[i] * mult, 0.12, 0.08, 'triangle', i * 0.055);
    }
}
function sfxQuad() {
    var chord = [262, 330, 392, 523, 659];
    for (var i = 0; i < chord.length; i++) tone(chord[i], 0.34, 0.1, 'triangle', i * 0.05);
    tone(1047, 0.4, 0.07, 'sine', 0.28);
    tone(1319, 0.36, 0.05, 'sine', 0.38);
}
function sfxLevelUp() {
    var run = [420, 530, 650, 840, 1050];
    for (var i = 0; i < run.length; i++) tone(run[i], 0.16, 0.09, 'triangle', i * 0.07);
}
function sfxFanfare() {
    var run = [523, 659, 784, 1047];
    for (var i = 0; i < run.length; i++) tone(run[i], 0.2, 0.1, 'triangle', i * 0.1);
}

/* Sad trombone slump: descending saw with a droop, never harsh */
function sfxTrombone() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.16);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.32);
    o.frequency.linearRampToValueAtTime(233 * p, t + 0.48);
    o.frequency.exponentialRampToValueAtTime(110 * p, t + 0.85);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(380, t + 0.8);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    o.connect(lp);
    lp.connect(g);
    g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.92);
}

/* ================= Constants ================= */
var COLS = 10;
var ROWS = 40;       /* total grid rows, row 0 = bottom */
var VISIBLE = 20;    /* visible rows */
var LOCK_DELAY = 0.5;
var MAX_LOCK_RESETS = 15;
var DAS_DELAY = 0.15;
var ARR_RATE = 0.04;
var SOFT_RATE = 0.04;
var DANGER_ROW = 15; /* stack at or above this row = danger */
var LINES_PER_LEVEL = 8;
var MAX_LEVEL = 18;

var TYPES = ['I', 'J', 'L', 'O', 'S', 'Z', 'T'];
/* Saturated palette on deep navy: fill, dark edge, light bevel */
var PCOL = {
    I: { f: '#3FD4FF', d: '#0E8FC4', l: '#C9F3FF' },
    J: { f: '#5A7BFF', d: '#2A46C8', l: '#C0CDFF' },
    L: { f: '#FF9440', d: '#C85E14', l: '#FFD4AB' },
    O: { f: '#FFD53F', d: '#C79A08', l: '#FFF0A8' },
    S: { f: '#38DFC8', d: '#0F9C8A', l: '#B4F5EC' },
    Z: { f: '#FF6270', d: '#C42B3E', l: '#FFBCC2' },
    T: { f: '#A566FF', d: '#6B2FD6', l: '#DCC4FF' }
};
var INK = '#10102A';
var NAVY = '#12122B';
var CARD = '#20204A';
var CARD_EDGE = '#454590';
var FIELD = '#161638';
var TXT_DIM = '#9F9FD6';
var LEVEL_TINTS = ['#7B4DFF', '#3FD4FF', '#38DFC8', '#FFD53F', '#FF9440', '#FF5FA2'];

/* Piece cell tables: 4 rotation states, offsets are [rowUp, col] from piece origin */
var PIECES = {

/* Which cell of each rotation wears the face: the one nearest the centroid */
var FACE_IDX = {};
(function () {
    for (var ti = 0; ti < TYPES.length; ti++) {
        var t = TYPES[ti];
        FACE_IDX[t] = [];
        for (var r = 0; r < 4; r++) {
            var cs = PIECES[t][r];
            var mr = 0, mc = 0, i;
            for (i = 0; i < 4; i++) { mr += cs[i][0] / 4; mc += cs[i][1] / 4; }
            var best = 0, bd = 1e9;
            for (i = 0; i < 4; i++) {
                var d = (cs[i][0] - mr) * (cs[i][0] - mr) + (cs[i][1] - mc) * (cs[i][1] - mc);
                if (d < bd) { bd = d; best = i; }
            }
            FACE_IDX[t][r] = best;
        }
    }
})();

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildBlockSprite(t, ghost) {
    var s = makeCanvas(cell * dpr, cell * dpr);
    var c = s.getContext('2d');
    c.scale(dpr, dpr);
    var col = PCOL[t];
    var inset = Math.max(1, cell * 0.05);
    var rad = cell * 0.24;
    var lw = Math.max(2, cell * 0.09);
    if (ghost) {
        c.globalAlpha = 0.13;
        rr(c, inset, inset, cell - inset * 2, cell - inset * 2, rad);
        c.fillStyle = col.f;
        c.fill();
        c.globalAlpha = 0.75;
        rr(c, inset + lw / 2, inset + lw / 2, cell - inset * 2 - lw, cell - inset * 2 - lw, rad * 0.85);
        c.lineWidth = lw * 0.7;
        c.strokeStyle = col.f;
        c.stroke();
        c.globalAlpha = 1;
        return s;
    }
    /* body */
    rr(c, inset, inset, cell - inset * 2, cell - inset * 2, rad);
    c.fillStyle = col.f;
    c.fill();
    /* bottom shade */
    rr(c, inset + cell * 0.07, cell * 0.52, cell - inset * 2 - cell * 0.14, cell * 0.38, rad * 0.6);
    c.fillStyle = col.d;
    c.globalAlpha = 0.5;
    c.fill();
    c.globalAlpha = 1;
    /* glossy top bevel */
    rr(c, inset + cell * 0.09, inset + cell * 0.06, cell - inset * 2 - cell * 0.18, cell * 0.3, rad * 0.7);
    c.fillStyle = col.l;
    c.globalAlpha = 0.85;
    c.fill();
    c.globalAlpha = 1;
    /* shine dot */
    c.fillStyle = '#FFFFFF';
    c.globalAlpha = 0.9;
    c.beginPath();
    c.arc(inset + cell * 0.24, inset + cell * 0.22, cell * 0.07, 0, Math.PI * 2);
    c.fill();
    c.globalAlpha = 1;
    /* ink outline */
    rr(c, inset + lw / 2, inset + lw / 2, cell - inset * 2 - lw, cell - inset * 2 - lw, rad * 0.85);
    c.lineWidth = lw;
    c.strokeStyle = INK;
    c.stroke();
    return s;
}

function buildBoardSprite() {
    var pad = 12; /* card border around the field */
    boardSprPad = pad + 10;
    var w = board.w + boardSprPad * 2;
    var h = board.h + boardSprPad * 2;
    boardSpr = makeCanvas(w * dpr, h * dpr);
    var c = boardSpr.getContext('2d');
    c.scale(dpr, dpr);
    var cx = boardSprPad - pad;
    var cy = boardSprPad - pad;
    var cw = board.w + pad * 2;
    var chh = board.h + pad * 2;
    var i;
    /* baked outer glow rings (cheap: strokes, not shadowBlur) */
    for (i = 5; i >= 1; i--) {
        rr(c, cx - i * 1.6, cy - i * 1.6, cw + i * 3.2, chh + i * 3.2, 22 + i * 1.6);
        c.lineWidth = 2.2;
        c.strokeStyle = 'rgba(123,77,255,' + (0.05 + (5 - i) * 0.018) + ')';
        c.stroke();
    }
    /* card */
    rr(c, cx, cy, cw, chh, 20);
    c.fillStyle = CARD;
    c.fill();
    rr(c, cx + 2, cy + 2, cw - 4, chh - 4, 18);
    c.lineWidth = 4;
    c.strokeStyle = CARD_EDGE;
    c.stroke();
    rr(c, cx + 5.5, cy + 5.5, cw - 11, chh - 11, 15);
    c.lineWidth = 1.5;
    c.strokeStyle = 'rgba(255,255,255,0.10)';
    c.stroke();
    /* field inset with subtle vertical falloff */
    rr(c, boardSprPad - 3, boardSprPad - 3, board.w + 6, board.h + 6, 10);
    c.fillStyle = FIELD;
    c.fill();
    var vg = c.createLinearGradient(0, boardSprPad, 0, boardSprPad + board.h);
    vg.addColorStop(0, 'rgba(123,77,255,0.10)');
    vg.addColorStop(0.5, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.28)');
    rr(c, boardSprPad - 3, boardSprPad - 3, board.w + 6, board.h + 6, 10);
    c.fillStyle = vg;
    c.fill();
    rr(c, boardSprPad - 3, boardSprPad - 3, board.w + 6, board.h + 6, 10);
    c.lineWidth = 2;
    c.strokeStyle = 'rgba(0,0,0,0.4)';
    c.stroke();
    /* glowing grid */
    c.strokeStyle = 'rgba(130,140,255,0.10)';
    c.lineWidth = 1;
    for (i = 1; i < COLS; i++) {
        c.beginPath();
        c.moveTo(boardSprPad + i * cell, boardSprPad);
        c.lineTo(boardSprPad + i * cell, boardSprPad + board.h);
        c.stroke();
    }
    for (i = 1; i < VISIBLE; i++) {
        c.beginPath();
        c.moveTo(boardSprPad, boardSprPad + i * cell);
        c.lineTo(boardSprPad + board.w, boardSprPad + i * cell);
        c.stroke();
    }
    /* faint grid node dots */
    c.fillStyle = 'rgba(150,160,255,0.13)';
    for (var gx = 1; gx < COLS; gx++) {
        for (var gy = 1; gy < VISIBLE; gy++) {
            c.fillRect(boardSprPad + gx * cell - 1, boardSprPad + gy * cell - 1, 2, 2);
        }
    }
}

function buildBackground() {
    bgSpr = makeCanvas(W * dpr, H * dpr);
    var c = bgSpr.getContext('2d');
    c.scale(dpr, dpr);
    /* deep navy vertical wash */
    var g = c.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1B1B40');
    g.addColorStop(0.55, '#14142F');
    g.addColorStop(1, '#0C0C22');
    c.fillStyle = g;
    c.fillRect(0, 0, W, H);
    /* soft nebula blobs (baked, never per-frame) */
    var blobs = [
        { x: W * 0.18, y: H * 0.2, r: Math.max(W, H) * 0.4, col: '123,77,255', a: 0.10 },
        { x: W * 0.85, y: H * 0.35, r: Math.max(W, H) * 0.35, col: '63,212,255', a: 0.07 },
        { x: W * 0.5, y: H * 0.92, r: Math.max(W, H) * 0.45, col: '255,95,162', a: 0.06 },
        { x: W * 0.9, y: H * 0.85, r: Math.max(W, H) * 0.3, col: '56,223,200', a: 0.05 }
    ];
    for (var i = 0; i < blobs.length; i++) {
        var b = blobs[i];
        var rg = c.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        rg.addColorStop(0, 'rgba(' + b.col + ',' + b.a + ')');
        rg.addColorStop(1, 'rgba(' + b.col + ',0)');
        c.fillStyle = rg;
        c.fillRect(0, 0, W, H);
    }
    /* static distant dust dots */
    c.fillStyle = 'rgba(200,205,255,0.14)';
    for (i = 0; i < 60; i++) {
        c.fillRect((Math.random() * W) | 0, (Math.random() * H) | 0, 1, 1);
    }
    /* vignette */
    var vg = c.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.35, W / 2, H / 2, Math.max(W, H) * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.34)');
    c.fillStyle = vg;
    c.fillRect(0, 0, W, H);
    /* twinkling star field (drawn per frame, positions rebuilt on resize) */
    stars = [];
    var n = Math.min(70, Math.floor(W * H / 12000));
    for (i = 0; i < n; i++) {
        stars.push({
            x: (Math.random() * W) | 0,
            y: (Math.random() * H) | 0,
            s: Math.random() < 0.8 ? 2 : 3,
            ph: rand(0, Math.PI * 2),
            sp: rand(0.7, 2.1)
        });
    }
}

function resize() {
    dpr = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var side = W >= 720 ? 132 : 78;
    var top = 78;
    var bottom = 20;
    cell = Math.floor(clamp(Math.min((H - top - bottom) / VISIBLE, (W - side * 2 - 36) / COLS), 13, 32));
    board.w = cell * COLS;
    board.h = cell * VISIBLE;
    board.x = Math.floor(W / 2 - board.w / 2);
    board.y = Math.floor(top + Math.max(0, (H - top - bottom - board.h) / 2));
    for (var i = 0; i < TYPES.length; i++) {
        blockSpr[TYPES[i]] = buildBlockSprite(TYPES[i], false);
        ghostSpr[TYPES[i]] = buildBlockSprite(TYPES[i], true);
    }
    buildBoardSprite();
    buildBackground();
}

function spawnPart(kind, x, y, vx, vy, ttl, size, color, color2, grav) {

    p.color = color;
    p.color2 = color2 || color;

function updateParticles(dt) {
    for (var i = 0; i < PART_CAP; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        p.vy = Math.min(360, p.vy + p.grav * dt);
        p.x += p.vx * dt + (p.kind === 'conf' ? Math.sin(p.life * 5 + p.seed) * 24 * dt : 0);
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
    for (i = 0; i < RING_CAP; i++) {
        var r = rings[i];
        if (!r.active) continue;
        r.t += dt;
        if (r.t >= r.ttl) r.active = false;
    }
    for (i = 0; i < LABEL_CAP; i++) {
        var l = labels[i];
        if (!l.active) continue;
        l.t += dt;
        if (l.t >= l.ttl) l.active = false;
    }
}

/* ================= Bag / queue / spawn ================= */
function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}
function refillBag(first) {
    bag = shuffle(TYPES.slice());
    if (first && (bag[0] === 'S' || bag[0] === 'Z' || bag[0] === 'O')) {
        for (var i = 1; i < bag.length; i++) {
            if (bag[i] === 'I' || bag[i] === 'J' || bag[i] === 'L' || bag[i] === 'T') {
                var tmp = bag[0]; bag[0] = bag[i]; bag[i] = tmp;
                break;
            }
        }
    }
}
function drawFromBag() {
    if (!bag.length) refillBag(false);
    return bag.pop();
}
function fillQueue(first) {
    if (!bag.length) refillBag(first);
    while (next.length < 4) next.push(drawFromBag());
}

function cellsOf(p, x, y, r) {
    var def = PIECES[p.type][r];
    var out = [];
    for (var i = 0; i < 4; i++) out.push({ x: x + def[i][1], y: y + def[i][0] });
    return out;
}
function collides(x, y, r, p) {
    p = p || piece;
    var cs = cellsOf(p, x, y, r);
    for (var i = 0; i < 4; i++) {
        var c = cs[i];
        if (c.x < 0 || c.x >= COLS || c.y < 0) return true;
        if (c.y < ROWS && grid[c.y][c.x]) return true;
    }
    return false;
}

/* ================= Update ================= */
function updateDAS(dt) {
    var dir = keys.left ? -1 : (keys.right ? 1 : 0);
    if (!dir) { das.dir = 0; return; }
    if (das.dir !== dir) {
        das.dir = dir;
        das.delay = DAS_DELAY;
        das.arr = ARR_RATE;
        if (dir < 0) moveLeft(); else moveRight();
        return;
    }
    das.delay -= dt;
    if (das.delay <= 0) {
        das.arr -= dt;
        if (das.arr <= 0) {
            if (dir < 0) moveLeft(); else moveRight();
            das.arr = ARR_RATE;
        }
    }
}

function updateGame(dt) {
    updateDAS(dt);
    if (keys.soft) {
        softTimer -= dt;
        if (softTimer <= 0) { softDrop(); softTimer = SOFT_RATE; }
    }
    dropAcc += dt;
    var interval = getDropInterval();
    while (dropAcc >= interval) {
        dropAcc -= interval;
        if (!tryMove(0, -1, false)) break;
    }
    if (piece && grounded()) {
        lockTimer += dt;
        if (lockTimer >= LOCK_DELAY) lockPiece(false);
    } else {
        lockTimer = 0;
    }
}

function updateClear(dt) {
    clearT += dt;
    /* pop columns left to right, shards + glints per cell */
    for (var x = 0; x < COLS; x++) {
        if (!clearPopped[x] && clearT >= x * CLEAR_STAGGER) {
            clearPopped[x] = true;
            for (var i = 0; i < clearRows.length; i++) {
                var y = clearRows[i];
                if (y < VISIBLE && grid[y][x]) {
                    var px = board.x + x * cell + cell / 2;
                    var py = board.y + (VISIBLE - 1 - y) * cell + cell / 2;
                    cellClearBurst(px, py, grid[y][x], clearIsQuad);
                }
            }
        }
    }
    for (var f = 0; f < rowFlash.length; f++) rowFlash[f].t += dt;
    if (clearT >= clearTotal) finishClear();
}

function updateDying(dt) {
    slumpT += dt;
    if (slumpT > 1.15) showPanel();
}

function updateMenu(dt) {
    for (var i = 0; i < floaters.length; i++) {
        var f = floaters[i];
        f.y += f.vy * dt;
        f.rot += f.vr * dt;
        if (f.y > 1.15) { f.y = -0.15; f.x = Math.random(); }
    }
}

function updateCosmetics(dt) {
    if (touchSoftT > 0) touchSoftT -= dt;
    if (hardFlashT > 0) hardFlashT -= dt;
    if (levelFlashT > 0) levelFlashT -= dt;
    if (lockFx.t < 10) lockFx.t += dt;
    if (trailFx.t < 10) trailFx.t += dt;
    if (squashFx.t < 10) squashFx.t += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.4 * dt);
    lean += (leanTarget - lean) * Math.min(1, 4 * dt);
    if (hintT > 0) { hintT -= dt; if (hintT <= 0) hideGestureHint(); }
    if (blinkT > 0) {
        blinkT -= dt;
    } else {
        blinkIn -= dt;
        if (blinkIn <= 0) { blinkT = 0.12; blinkIn = rand(1.6, 4.5); }
    }
    if (score !== lastScoreShown) {
        lastScoreShown = score;
        scoreEl.textContent = score.toLocaleString();
    }
}

function update(dt) {
    time += dt;
    updateCosmetics(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.LINE_CLEAR: updateClear(dt); break;
        case State.DYING: updateDying(dt); break;
    }
    updateParticles(dt);
}

/* ================= Faces ================= */
function drawFace(cx, cy, s, mood) {

            ctx.arc(sx, ey + er * 0.4, er, Math.PI, Math.PI * 2);

        }

        for (i = 0; i < 2; i++) {
            sx = i === 0 ? -ex : ex;
            ctx.beginPath();
            ctx.moveTo(sx - er, ey);
            ctx.lineTo(sx + er, ey);
            ctx.stroke();
        }
    } else {
        var wr = mood === 'panic' ? er * 1.35 : er;
        for (i = 0; i < 2; i++) {
            sx = i === 0 ? -ex : ex;
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(sx, ey, wr, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = Math.max(1, s * 0.035);
            ctx.strokeStyle = INK;
            ctx.stroke();
            ctx.fillStyle = INK;
            var pr = mood === 'panic' ? wr * 0.32 : wr * 0.5;
            var poy = mood === 'nervous' ? wr * 0.4 : (mood === 'sad' ? wr * 0.45 : wr * 0.15);
            ctx.beginPath();
            ctx.arc(sx, ey + poy, pr, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.lineWidth = lw;
        if (mood === 'nervous') {
            /* worried brows */
            for (i = 0; i < 2; i++) {
                sx = i === 0 ? -ex : ex;
                var flip = i === 0 ? 1 : -1;
                ctx.beginPath();
                ctx.moveTo(sx - er * flip, ey - er * 1.5);
                ctx.lineTo(sx + er * flip, ey - er * 1.05);
                ctx.stroke();
            }
        }
    }
    /* mouth */
    var my = s * 0.17;
    ctx.strokeStyle = INK;
    ctx.lineWidth = lw;
    if (mood === 'panic') {
        ctx.fillStyle = INK;
        ctx.beginPath();
        ctx.ellipse(0, my, s * 0.09, s * 0.12, 0, 0, Math.PI * 2);
        ctx.fill();
        /* sweat drop */
        ctx.fillStyle = '#3FD4FF';
        ctx.beginPath();
        ctx.ellipse(s * 0.34, -s * 0.2, s * 0.05, s * 0.08, 0.3, 0, Math.PI * 2);
        ctx.fill();
    } else if (mood === 'nervous') {
        ctx.beginPath();
        ctx.moveTo(-s * 0.14, my);
        ctx.quadraticCurveTo(-s * 0.07, my + s * 0.05, 0, my);
        ctx.quadraticCurveTo(s * 0.07, my - s * 0.05, s * 0.14, my);
        ctx.stroke();
    } else if (mood === 'sad') {
        ctx.beginPath();
        ctx.arc(0, my + s * 0.12, s * 0.12, Math.PI * 1.2, Math.PI * 1.8);
        ctx.stroke();
    } else if (mood === 'relieved') {
        ctx.beginPath();
        ctx.arc(0, my - s * 0.04, s * 0.13, 0.25, Math.PI - 0.25);
        ctx.stroke();
    } else if (mood === 'sleep') {
        ctx.beginPath();
        ctx.moveTo(-s * 0.07, my);
        ctx.lineTo(s * 0.07, my);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.arc(0, my - s * 0.03, s * 0.1, 0.3, Math.PI - 0.3);
        ctx.stroke();
    }
    ctx.restore();
}

function activeMood() {
    if (hardFlashT > 0) return 'panic';
    if (inDanger()) return 'panic';
    if (keys.soft || touchSoftT > 0) return 'nervous';
    if (blinkT > 0) return 'blink';
    return 'normal';
}

/* ================= Render ================= */
function cellPx(x) { return board.x + x * cell; }
function cellPy(y) { return board.y + (VISIBLE - 1 - y) * cell; }

function drawBlockAt(px, py, t) {
    ctx.drawImage(blockSpr[t], px | 0, py | 0, cell, cell);
}

function drawBackground() {
    ctx.drawImage(bgSpr, 0, 0, W, H);
    /* level tint wash (single cheap rect) */
    if (currentState !== State.MENU && level > 1) {
        ctx.globalAlpha = 0.055;
        ctx.fillStyle = tintFor(level);
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }
    /* twinkling stars */
    ctx.fillStyle = '#DDE2FF';
    for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        var a = 0.25 + 0.55 * (0.5 + 0.5 * Math.sin(time * s.sp + s.ph));
        ctx.globalAlpha = a;
        ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;
}

function inSquash(x, y) {
    if (squashFx.t >= 0.14) return false;
    var key = y * COLS + x;
    for (var i = 0; i < squashFx.cells.length; i++) {
        if (squashFx.cells[i] === key) return true;
    }
    return false;
}

function drawGridBlocks() {
    var slumpE = 0;
    if (currentState === State.DYING || currentState === State.GAME_OVER) {
        slumpE = easeOutQuad(clamp(slumpT / 0.8, 0, 1));
    }
    var k = 1 - 0.2 * slumpE;
    var squashActive = squashFx.t < 0.14;
    var sqk = squashActive ? squashFx.t / 0.14 : 1;
    /* squash: start 22 percent shorter, spring back */
    var sqScale = squashActive ? (0.78 + 0.22 * easeOutBack(sqk)) : 1;
    for (var y = 0; y < VISIBLE; y++) {
        for (var x = 0; x < COLS; x++) {
            var t = grid[y][x];
            if (!t) continue;
            if (currentState === State.LINE_CLEAR && clearRows.indexOf(y) !== -1) {
                /* popping cell, staggered left to right */
                var pt = (clearT - x * CLEAR_STAGGER) / POP_DUR;
                if (pt >= 1) continue;
                var px0 = cellPx(x), py0 = cellPy(y);
                if (pt <= 0) {
                    drawBlockAt(px0, py0, t);
                } else {
                    var sc = 1 + 0.45 * Math.sin(pt * Math.PI);
                    ctx.save();
                    ctx.globalAlpha = 1 - pt;
                    ctx.translate(px0 + cell / 2, py0 + cell / 2);
                    ctx.rotate(pt * 0.6);
                    ctx.scale(sc, sc);
                    ctx.drawImage(blockSpr[t], -cell / 2, -cell / 2, cell, cell);
                    ctx.restore();
                }
                continue;
            }
            if (slumpE > 0) {
                var ch = cell * k;
                var spx = cellPx(x) + Math.sin(x * 1.7 + y * 2.3) * 2.5 * slumpE;
                var spy = board.y + board.h - (y + 1) * ch;
                ctx.drawImage(blockSpr[t], spx | 0, spy | 0, cell, Math.ceil(ch));
            } else if (squashActive && inSquash(x, y)) {
                var sh = cell * sqScale;
                ctx.drawImage(blockSpr[t], cellPx(x) | 0, (cellPy(y) + cell - sh) | 0, cell, Math.ceil(sh));
            } else {
                drawBlockAt(cellPx(x), cellPy(y), t);
            }
        }
    }
    /* one sad face on top of the slumped stack */
    if (slumpE > 0.25) {
        var hy = highestBlock();
        if (hy >= 0 && hy < VISIBLE) {
            for (var hx = 0; hx < COLS; hx++) {
                if (grid[hy][hx]) {
                    var fh = cell * k;
                    drawFace(cellPx(hx) + cell / 2, board.y + board.h - (hy + 1) * fh + fh / 2, cell * k, 'sad');
                    break;
                }
            }
        }
    }
}

function drawRowFlashes() {
    /* local bright flash on clearing rows, fades fast */
    for (var i = 0; i < rowFlash.length; i++) {
        var f = rowFlash[i];
        if (f.t > 0.3) continue;
        var a = (1 - f.t / 0.3);
        var py = cellPy(f.y);
        ctx.globalAlpha = a * 0.55;
        ctx.fillStyle = clearIsQuad ? '#FFEBA0' : '#FFFFFF';
        rr(ctx, board.x - 2, py + 1, board.w + 4, cell - 2, 6);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function drawTrail() {
    if (trailFx.t >= 0.18) return;
    var a = (1 - trailFx.t / 0.18) * 0.3;
    ctx.globalAlpha = a;
    ctx.fillStyle = PCOL[trailFx.type].f;
    for (var i = 0; i < trailFx.segs.length; i++) {
        var s = trailFx.segs[i];
        var yTop = clamp(s.yTop, 0, VISIBLE - 1);
        var yBot = clamp(s.yBot, 0, VISIBLE - 1);
        var py1 = cellPy(yTop);
        var py2 = cellPy(yBot) + cell;
        rr(ctx, cellPx(s.x) + cell * 0.18, py1, cell * 0.64, py2 - py1, cell * 0.3);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawPieceBlocks(p, y, ghost, mood) {
    if (!p) return;
    var cs = cellsOf(p, p.x, y == null ? p.y : y, p.r);
    var fi = FACE_IDX[p.type][p.r];
    for (var i = 0; i < 4; i++) {
        var c = cs[i];
        if (c.y < 0 || c.y >= VISIBLE) continue;
        ctx.drawImage(ghost ? ghostSpr[p.type] : blockSpr[p.type], cellPx(c.x) | 0, cellPy(c.y) | 0, cell, cell);
    }
    if (!ghost && mood) {
        /* if the face cell is above the visible rim, borrow the first visible cell */
        var fc = cs[fi];
        if (fc.y < 0 || fc.y >= VISIBLE) {
            for (var j = 0; j < 4; j++) {
                if (cs[j].y >= 0 && cs[j].y < VISIBLE) { fc = cs[j]; break; }
            }
        }
        if (fc.y >= 0 && fc.y < VISIBLE) {
            drawFace(cellPx(fc.x) + cell / 2, cellPy(fc.y) + cell / 2, cell, mood);
        }
    }
}

function drawMiniPiece(x, y, t, s, alpha, mood) {
    var def = PIECES[t][0];
    var minR = 9, maxR = -9, minC = 9, maxC = -9, i;
    for (i = 0; i < 4; i++) {
        if (def[i][0] < minR) minR = def[i][0];
        if (def[i][0] > maxR) maxR = def[i][0];
        if (def[i][1] < minC) minC = def[i][1];
        if (def[i][1] > maxC) maxC = def[i][1];
    }
    var pw = (maxC - minC + 1) * s;
    var ph = (maxR - minR + 1) * s;
    var ox = x - pw / 2;
    var oy = y - ph / 2;
    ctx.globalAlpha = alpha;
    for (i = 0; i < 4; i++) {
        ctx.drawImage(blockSpr[t], (ox + (def[i][1] - minC) * s) | 0, (oy + (maxR - def[i][0]) * s) | 0, Math.ceil(s), Math.ceil(s));
    }
    if (mood) {
        var fi = FACE_IDX[t][0];
        drawFace(ox + (def[fi][1] - minC) * s + s / 2, oy + (maxR - def[fi][0]) * s + s / 2, s, mood);
    }
    ctx.globalAlpha = 1;
}

function drawSideCard(x, y, w, h, label) {
    rr(ctx, x, y + 4, w, h, 14);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();
    rr(ctx, x, y, w, h, 14);
    ctx.fillStyle = CARD;
    ctx.fill();
    rr(ctx, x + 1.5, y + 1.5, w - 3, h - 3, 12);
    ctx.lineWidth = 3;
    ctx.strokeStyle = CARD_EDGE;
    ctx.stroke();
    if (label) {
        ctx.fillStyle = TXT_DIM;
        ctx.font = '800 ' + Math.max(11, cell * 0.5) + 'px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(label, x + w / 2, y + Math.max(15, cell * 0.72));
    }
}

function drawPanels() {
    var boxW = cell * 3.2;
    var gap = Math.max(10, cell * 0.5);
    var leftX = board.x - boxW - gap - 6;
    var rightX = board.x + board.w + gap + 8;
    var topY = board.y;
    var mini = cell * 0.52;

    /* HOLD */
    drawSideCard(leftX, topY, boxW, cell * 3.4, 'HOLD');
    if (hold) drawMiniPiece(leftX + boxW / 2, topY + cell * 2.1, hold, mini, holdUsed ? 0.4 : 1, holdUsed ? 'sleep' : 'normal');

    /* stats */
    var statY = topY + cell * 3.4 + 14;
    drawSideCard(leftX, statY, boxW, cell * 5.4, null);
    ctx.fillStyle = TXT_DIM;
    ctx.font = '800 ' + Math.max(10, cell * 0.44) + 'px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL', leftX + boxW / 2, statY + cell * 0.85);
    ctx.fillStyle = levelFlashT > 0 ? tintFor(level) : '#FFFFFF';
    ctx.font = '800 ' + Math.max(15, cell * 0.85) + 'px Nunito, sans-serif';
    ctx.fillText(level, leftX + boxW / 2, statY + cell * 1.8);
    ctx.fillStyle = TXT_DIM;
    ctx.font = '800 ' + Math.max(10, cell * 0.44) + 'px Nunito, sans-serif';
    ctx.fillText('LINES', leftX + boxW / 2, statY + cell * 2.9);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '800 ' + Math.max(15, cell * 0.85) + 'px Nunito, sans-serif';
    ctx.fillText(lines, leftX + boxW / 2, statY + cell * 3.85);
    /* progress to next level */
    var frac = level >= MAX_LEVEL ? 1 : (lines % LINES_PER_LEVEL) / LINES_PER_LEVEL;
    var barX = leftX + cell * 0.4;
    var barW = boxW - cell * 0.8;
    var barY = statY + cell * 4.45;
    var barH = Math.max(6, cell * 0.32);
    rr(ctx, barX, barY, barW, barH, barH / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fill();
    if (frac > 0.02) {
        rr(ctx, barX + 1, barY + 1, Math.max(barH - 2, (barW - 2) * frac), barH - 2, (barH - 2) / 2);
        ctx.fillStyle = tintFor(level + 1);
        ctx.fill();
    }

    /* NEXT x3 */
    drawSideCard(rightX, topY, boxW, cell * 8.6, 'NEXT');
    for (var i = 0; i < 3 && i < next.length; i++) {
        drawMiniPiece(rightX + boxW / 2, topY + cell * (2.1 + i * 2.4), next[i], i === 0 ? mini : mini * 0.85, 1 - i * 0.25, i === 0 ? 'normal' : null);
    }
}

function drawRings() {
    for (var i = 0; i < RING_CAP; i++) {
        var r = rings[i];
        if (!r.active) continue;
        var k = r.t / r.ttl;
        var rad = r.r0 + (r.r1 - r.r0) * easeOutQuad(k);
        ctx.globalAlpha = (1 - k) * 0.8;
        ctx.lineWidth = r.lw * (1 - k * 0.6);
        ctx.strokeStyle = r.color;
        ctx.beginPath();
        ctx.arc(r.x, r.y, rad, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawLabels() {
    for (var i = 0; i < LABEL_CAP; i++) {
        var l = labels[i];
        if (!l.active) continue;
        var k = l.t / l.ttl;
        var sc = k < 0.28 ? easeOutBack(k / 0.28) : 1;
        var rise = easeOutQuad(k) * cell * 1.2;
        ctx.save();
        ctx.translate(l.x, l.y - rise);
        ctx.rotate(Math.sin(time * 9 + i) * l.wobble);
        ctx.scale(sc, sc);
        ctx.globalAlpha = k > 0.7 ? (1 - k) / 0.3 : 1;
        ctx.font = '800 ' + l.size + 'px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.lineWidth = Math.max(5, l.size * 0.16);
        ctx.lineJoin = 'round';
        ctx.strokeStyle = INK;
        ctx.strokeText(l.text, 0, 0);
        ctx.fillStyle = l.color;
        ctx.fillText(l.text, 0, 0);
        if (l.sub) {
            ctx.font = '800 ' + Math.round(l.size * 0.5) + 'px Nunito, sans-serif';
            ctx.lineWidth = Math.max(3, l.size * 0.09);
            ctx.strokeText(l.sub, 0, l.size * 0.75);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(l.sub, 0, l.size * 0.75);
        }
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawGlint(p, k) {
    /* 4-point star */
    var s = p.size * (0.4 + 0.6 * Math.sin(k * Math.PI));
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot + k * 1.5);
    ctx.globalAlpha = 1 - k;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.quadraticCurveTo(s * 0.16, -s * 0.16, s, 0);
    ctx.quadraticCurveTo(s * 0.16, s * 0.16, 0, s);
    ctx.quadraticCurveTo(-s * 0.16, s * 0.16, -s, 0);
    ctx.quadraticCurveTo(-s * 0.16, -s * 0.16, 0, -s);
    ctx.fill();
    ctx.restore();
}

function drawParticles() {
    for (var i = 0; i < PART_CAP; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var k = p.life / p.ttl;
        if (p.kind === 'glint') {
            drawGlint(p, k);
            continue;
        }
        if (p.kind === 'dust') {
            ctx.globalAlpha = (1 - k) * 0.4;
            ctx.fillStyle = p.color + '1)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size + k * 14, 0, Math.PI * 2);
            ctx.fill();
            continue;
        }
        ctx.globalAlpha = 1 - k;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        if (p.kind === 'shard') {
            /* chunky block shard with a darker edge */
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.fillStyle = p.color2;
            ctx.fillRect(-p.size / 2, p.size * 0.1, p.size, p.size * 0.4);
        } else {
            /* conf / spark */
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size * 0.7, p.size, p.size * 1.4);
        }
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawMenuFloaters() {
    for (var i = 0; i < floaters.length; i++) {
        var f = floaters[i];
        ctx.save();
        ctx.translate(f.x * W, f.y * H);
        ctx.rotate(f.rot);
        ctx.globalAlpha = 0.4;
        drawMiniPiece(0, 0, f.t, cell * f.s, 0.4, null);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawBackground();

    if (currentState === State.MENU) drawMenuFloaters();

    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 9;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.translate(ox, oy);

    /* board group leans slightly in danger */
    var pivX = board.x + board.w / 2;
    var pivY = board.y + board.h + 14;
    ctx.save();
    if (Math.abs(lean) > 0.0004) {
        ctx.translate(pivX, pivY);
        ctx.rotate(lean);
        ctx.translate(-pivX, -pivY);
    }
    ctx.drawImage(boardSpr, (board.x - boardSprPad) | 0, (board.y - boardSprPad) | 0,
        boardSpr.width / dpr, boardSpr.height / dpr);

    /* level-up pulse on the board edge */
    if (levelFlashT > 0) {
        ctx.globalAlpha = clamp(levelFlashT, 0, 1) * (0.35 + 0.2 * Math.sin(time * 14));
        ctx.lineWidth = 5;
        ctx.strokeStyle = tintFor(level);
        rr(ctx, board.x - 8, board.y - 8, board.w + 16, board.h + 16, 16);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    if (grid) {
        drawGridBlocks();
        drawRowFlashes();
        if (currentState === State.MENU) {
            for (var i = 0; i < MENU_DECOR.length; i++) {
                var m = MENU_DECOR[i];
                drawBlockAt(cellPx(m.x), cellPy(m.y), m.t);
            }
            drawFace(cellPx(1) + cell / 2, cellPy(1) + cell / 2, cell, 'normal');
            drawFace(cellPx(8) + cell / 2, cellPy(1) + cell / 2, cell, 'sleep');
        }
    }
    drawTrail();
    if (piece && (currentState === State.PLAYING || currentState === State.PAUSED)) {
        drawPieceBlocks(piece, ghostY(), true, null);
        drawPieceBlocks(piece, null, false, activeMood());
    }
    /* relieved face lingers where the piece locked */
    if (lockFx.t < 0.42 && lockFx.row >= 0 && lockFx.row < VISIBLE && grid && grid[lockFx.row][lockFx.col]) {
        ctx.globalAlpha = 1 - lockFx.t / 0.42;
        drawFace(cellPx(lockFx.col) + cell / 2, cellPy(lockFx.row) + cell / 2, cell, 'relieved');
        ctx.globalAlpha = 1;
    }
    /* danger tint on the top rows */
    if ((currentState === State.PLAYING || currentState === State.LINE_CLEAR) && inDanger()) {
        ctx.fillStyle = 'rgba(255,92,110,' + (0.07 + 0.05 * Math.sin(time * 5)) + ')';
        rr(ctx, board.x, board.y, board.w, cell * 4, 8);
        ctx.fill();
    }
    ctx.restore();

    if (currentState !== State.MENU) drawPanels();
    drawRings();
    drawParticles();
    drawLabels();
}

/* ================= Input: keyboard ================= */
window.addEventListener('keydown', function (e) {
    if (e.code === 'KeyM') { toggleMute(); return; }
    if (e.code === 'Escape' || e.code === 'KeyP') {
        if (currentState === State.PLAYING || currentState === State.LINE_CLEAR) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
        return;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
        if (currentState === State.MENU) { e.preventDefault(); ensureAudio(); hideGestureHint(); startGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { e.preventDefault(); ensureAudio(); startGame(); return; }
        if (currentState === State.PAUSED) { e.preventDefault(); resumeGame(); return; }
    }
    if (currentState !== State.PLAYING) return;
    ensureAudio();
    if (e.code === 'ArrowLeft') {
        e.preventDefault();
        /* move immediately on keydown (sub-frame response), then let DAS repeat */
        if (!keys.left) { keys.left = true; moveLeft(); das.dir = -1; das.delay = DAS_DELAY; das.arr = ARR_RATE; }
        hideGestureHint();
    }
    else if (e.code === 'ArrowRight') {
        e.preventDefault();
        if (!keys.right) { keys.right = true; moveRight(); das.dir = 1; das.delay = DAS_DELAY; das.arr = ARR_RATE; }
        hideGestureHint();
    }
    else if (e.code === 'ArrowDown') { e.preventDefault(); if (!keys.soft) { keys.soft = true; softDrop(); softTimer = SOFT_RATE; } }
    else if ((e.code === 'ArrowUp' || e.code === 'KeyX') && !e.repeat) { e.preventDefault(); rotate(1); }
    else if (e.code === 'KeyZ' && !e.repeat) rotate(-1);
    else if (e.code === 'Space' && !e.repeat) { e.preventDefault(); hideGestureHint(); hardDrop(); }
    else if ((e.code === 'KeyC' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') && !e.repeat) holdPiece();
});
window.addEventListener('keyup', function (e) {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'ArrowDown') keys.soft = false;
});

/* ================= Input: touch gestures on the canvas ================= */
/* horizontal drag = piece column tracks the finger, slow drag down = soft drop,
   fast swipe down = hard drop, tap = spin, swipe up = hold */
var touchS = { active: false, sx: 0, sy: 0, lx: 0, ly: 0, lt: 0, startT: 0, axis: 0, ay: 0, moved: false, done: false, baseX: 0, baseClientX: 0, pieceRef: null };

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    ensureAudio();
    if (currentState === State.MENU) { startGame(); return; }
    if (currentState === State.GAME_OVER) return;
    if (currentState !== State.PLAYING && currentState !== State.LINE_CLEAR) return;
    touchS.active = true;
    touchS.done = false;
    touchS.moved = false;
    touchS.axis = 0;
    touchS.ay = 0;
    touchS.sx = touchS.lx = e.clientX;
    touchS.sy = touchS.ly = e.clientY;
    touchS.startT = touchS.lt = performance.now();
    touchS.pieceRef = piece;
    touchS.baseX = piece ? piece.x : 0;
    touchS.baseClientX = e.clientX;
});
window.addEventListener('pointermove', function (e) {
    if (!touchS.active || touchS.done) return;
    var now = performance.now();
    var dy = e.clientY - touchS.ly;
    var tx = e.clientX - touchS.sx;
    var ty = e.clientY - touchS.sy;
    if (touchS.axis === 0 && (Math.abs(tx) > 12 || Math.abs(ty) > 12)) {
        touchS.axis = Math.abs(tx) > Math.abs(ty) ? 1 : 2;
        hideGestureHint();
        if (touchS.axis === 1 && piece) {
            touchS.pieceRef = piece;
            touchS.baseX = piece.x;
            touchS.baseClientX = e.clientX;
        }
    }
    if (touchS.axis === 1) {
        /* column tracking: the piece follows the finger's column offset */
        if (piece && piece !== touchS.pieceRef) {
            touchS.pieceRef = piece;
            touchS.baseX = piece.x;
            touchS.baseClientX = e.clientX;
        }
        if (piece) {
            var target = touchS.baseX + Math.round((e.clientX - touchS.baseClientX) / (cell * 0.9));
            var guard = 0;
            while (piece && piece.x < target && guard++ < COLS) {
                if (!moveRight()) break;
                touchS.moved = true;
            }
            while (piece && piece.x > target && guard++ < COLS * 2) {
                if (!moveLeft()) break;
                touchS.moved = true;
            }
        }
    } else if (touchS.axis === 2) {
        if (ty < -50) {
            holdPiece();
            touchS.done = true;
        } else if (dy > 0) {
            var v = dy / Math.max(1, now - touchS.lt); /* px per ms */
            if (v > 1.05 && ty > cell * 1.3) {
                hardDrop();
                touchS.done = true;
            } else {
                touchS.ay += dy;
                while (touchS.ay >= cell) {
                    if (softDrop()) touchSoftT = 0.2;
                    touchS.ay -= cell;
                    touchS.moved = true;
                }
            }
        }
    }
    touchS.lx = e.clientX;
    touchS.ly = e.clientY;
    touchS.lt = now;
});
window.addEventListener('pointerup', function (e) {
    if (!touchS.active) return;
    var dur = performance.now() - touchS.startT;
    var dist = Math.abs(e.clientX - touchS.sx) + Math.abs(e.clientY - touchS.sy);
    if (!touchS.done && !touchS.moved && dist < 14 && dur < 400 && currentState === State.PLAYING) {
        rotate(1); /* tap = spin */
    }
    touchS.active = false;
});
window.addEventListener('pointercancel', function () { touchS.active = false; });
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

/* ================= Buttons / pause / mute ================= */
function pauseGame() {
    if (currentState !== State.PLAYING && currentState !== State.LINE_CLEAR) return;
    pauseOverlay.style.display = 'flex';
    currentState = State.PAUSED;
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && (currentState === State.PLAYING || currentState === State.LINE_CLEAR)) pauseGame();
});
holdBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    holdPiece();
    if (navigator.vibrate) navigator.vibrate(8);
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    startGame(); /* instant restart */
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (currentState !== State.PAUSED) update(dt);
    render();
    requestAnimationFrame(loop);
}

/* ================= Test hook (drives the real game logic) ================= */
window.__blockStaxTest = {
    start: startGame,
    stateName: function () { return currentState; },
    grid: function () { return grid; },
    piece: function () { return piece; },
    next: function () { return next.slice(); },
    hold: function () { return hold; },
    holdUsed: function () { return holdUsed; },
    score: function () { return score; },
    lines: function () { return lines; },
    level: function () { return level; },
    twirls: function () { return twirls; },
    moveLeft: moveLeft,
    moveRight: moveRight,
    rotate: rotate,
    softDrop: softDrop,
    hardDrop: hardDrop,
    holdPiece: holdPiece,
    spawn: function (t) { return spawnPiece(t); },
    setCell: function (x, y, t) { grid[y][x] = t; },
    step: function (secs) {
        var leftT = secs;
        while (leftT > 0) {
            var dt = Math.min(0.05, leftT);
            update(dt);
            leftT -= dt;
        }
    },
    dataStore: function () { return data; },
    profile: function () { return WoopProfile.load(); }
};

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

})();
</script>

<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var comboEl = document.getElementById('combo');
var stageBanner = document.getElementById('stageBanner');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBannerEl = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelStageEl = document.getElementById('panelStage');
var panelBestEl = document.getElementById('panelBest');
var panelComboEl = document.getElementById('panelCombo');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game, same key + shape as before) ================= */
var STORAGE_KEY = 'woopkid_sky-stack';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function easeOutBack(t) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Solid block landing thud: low sine drop plus a soft noise tap */
function sfxDrop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(210 * p, t);
    o.frequency.exponentialRampToValueAtTime(88 * p, t + 0.11);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.26, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.18);
}

/* Overhang slice: short bandpassed noise swish sweeping down */
function sfxSlice() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(2400 * p, t);
    bp.frequency.exponentialRampToValueAtTime(500 * p, t + 0.12);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.17);
}

/* Perfect drop chime: rises in pitch with every consecutive perfect */
function sfxPerfect(comboN) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    /* two semitones up per combo step, capped so it stays sweet */
    var mult = Math.pow(1.1225, Math.min(comboN - 1, 12));
    var f = 740 * mult * p;
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * 1.335, t + 0.08);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.3);
}

/* Block grows back: quick rising sparkle arpeggio */
function sfxGrow() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1047 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.06);
    o.frequency.setValueAtTime(1568 * p, t + 0.12);
    o.frequency.setValueAtTime(2093 * p, t + 0.18);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.015);
    g.gain.setValueAtTime(0.15, t + 0.19);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.38);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.4);
}

/* Death: descending sad trombone style blip, never harsh */
function sfxDeath() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.13);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.26);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.58);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.55);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.62);
}

/* Little fanfare for milestones, new best or sticker */
function sfxFanfare() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);

            shoot.x = rand(VW * 0.25, VW * 0.95);
            shoot.y = rand(24, H * 0.32);
            shoot.vx = -rand(280, 430);
            shoot.vy = rand(90, 150);
            shoot.life = 0;
            shootTimer = rand(4, 9);
        }
    } else {
        shoot.life += dt;
        shoot.x += shoot.vx * dt;
        shoot.y += shoot.vy * dt;
        if (shoot.life > shoot.ttl) shoot.active = false;
    }
}

/* ================= Run control ================= */
function camTargetFor(len) { return H * TOP_ANCHOR + len * BH; }

function resetRun() {
    var i;
    for (i = 0; i < chunks.length; i++) chunks[i].active = false;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    for (i = 0; i < rings.length; i++) rings[i].active = false;
    for (i = 0; i < rays.length; i++) rays[i].active = false;
    for (i = 0; i < labels.length; i++) labels[i].active = false;
    score = 0;
    combo = 0;
    maxCombo = 0;
    perfects = 0;
    newBest = false;
    bestPassed = false;
    earnedTiers = [];
    panelShown = false;
    trauma = 0;
    hitStop = 0;
    zoomPunch = 0;
    deathT = 0;
    flash.t = 0;
    skyF = 0;
    zoom = 1;
    viewTx = 0;
    startW = Math.min(250, VW * 0.62);
    tower.length = 0;
    tower.push({ x: (VW - startW) / 2, w: startW, cols: colorFor(0), seed: (Math.random() * 997) | 0, age: 1 });
    cam = camTargetFor(1);
    viewTy = cam;
    spawnSlider();
    scoreEl.textContent = '0';
    comboEl.style.display = 'none';
    stageBanner.classList.remove('show');
}

function pickTurn() {
    var base = slider.baseAmp;
    if (!slider.randTurn) return base;
    var lo = Math.max(base * 0.55, slider.w * 0.5 + 34);
    return rand(lo, base + slider.turnExtra);
}

function spawnSlider() {
    var prev = tower[tower.length - 1];
    var f = score;
    slider.w = prev.w;
    slider.alignX = prev.x;
    slider.baseAmp = prev.w / 2 + 84;
    slider.randTurn = f >= 14;
    slider.turnExtra = f >= 14 ? Math.min(90, (f - 14) * 4.5) : 0;
    slider.minX = slider.alignX - pickTurn();
    slider.maxX = slider.alignX + pickTurn();
    slider.dir = f >= 20 ? (Math.random() < 0.5 ? 1 : -1) : (tower.length % 2 === 0 ? -1 : 1);
    slider.x = slider.dir > 0 ? slider.minX : slider.maxX;
    slider.speed = speedFor(f);
    slider.pulse = pulseAmtFor(f);
    slider.phase = rand(0, Math.PI * 2);
    slider.cols = colorFor(tower.length);
    slider.seed = (Math.random() * 997) | 0;
    slider.active = true;
}

function updateSlider(dt) {
    if (!slider.active) return;
    var mult = 1 + slider.pulse * Math.sin(time * 4.6 + slider.phase);
    slider.x += slider.dir * slider.speed * mult * dt;
    if (slider.dir > 0 && slider.x >= slider.maxX) {
        slider.x = slider.maxX - (slider.x - slider.maxX);
        slider.dir = -1;
        slider.minX = slider.alignX - pickTurn();   /* next turn point is a surprise */
    } else if (slider.dir < 0 && slider.x <= slider.minX) {
        slider.x = slider.minX + (slider.minX - slider.x);
        slider.dir = 1;
        slider.maxX = slider.alignX + pickTurn();
    }
    slider.x = clamp(slider.x, slider.minX, slider.maxX);
}

function showMenu() {
    currentState = State.MENU;
    resetRun();
    titleEl.style.display = 'block';
    tapHintEl.style.display = 'block';
    scoreEl.style.display = 'none';
    pauseBtn.style.display = 'none';
    overPanel.classList.remove('show');
    if (data.highScore > 0) {
        menuBestEl.textContent = 'BEST: ' + data.highScore + ' FLOORS';
        menuBestEl.style.display = 'inline-block';
    }
}

function startRun() {
    currentState = State.PLAYING;
    prevBest = data.highScore;
    titleEl.style.display = 'none';
    tapHintEl.style.display = 'none';
    scoreEl.style.display = 'block';
    pauseBtn.style.display = 'flex';
    overPanel.classList.remove('show');
}

function bumpScoreUI() {
    scoreEl.textContent = score;
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
}
function bumpComboUI() {
    if (combo > 1) {
        comboEl.textContent = 'STREAK x' + combo + ' 🔥';
        comboEl.style.display = 'block';
        comboEl.classList.remove('pop');
        void comboEl.offsetWidth;
        comboEl.classList.add('pop');
    } else {
        comboEl.style.display = 'none';
    }
}
function showBanner(text) {
    stageBanner.textContent = text;
    stageBanner.classList.remove('show');
    void stageBanner.offsetWidth;
    stageBanner.classList.add('show');
}

/* ================= Layered perfect-drop celebration ================= */
function celebratePerfect(nx, yTop, nw, streak) {
    var cx = nx + nw / 2, cy = yTop + BH / 2;
    hitStop = Math.min(0.04 + streak * 0.012, 0.11);
    zoomPunch = Math.min(0.055, 0.018 + streak * 0.005);
    flash.t = 1;
    flash.x = nx; flash.y = yTop; flash.w = nw;

    /* layer 1: expanding rings, more + bigger with streak */
    spawnRing(cx, cy, nw * 0.28, nw * 0.72 + 30, '#FFFFFF', 0.32, 5);
    if (streak >= 2) spawnRing(cx, cy, nw * 0.34, nw * 0.9 + 62, '#FFE14D', 0.46, 6);
    if (streak >= 4) spawnRing(cx, cy, nw * 0.4, nw * 1.15 + 92, '#FF5FA2', 0.58, 7);

    /* layer 2: radial rays from streak 2 */
    if (streak >= 2) spawnRays(cx, cy, 8 + Math.min(6, streak), 44 + Math.min(40, streak * 6), streak >= 6 ? '#FF5FA2' : '#FFE14D');

    /* layer 3: edge sparks always */
    burstSparks(nx, cy, 5 + Math.min(7, streak * 2));
    burstSparks(nx + nw, cy, 5 + Math.min(7, streak * 2));

    /* layer 4: star glints from streak 3 */
    if (streak >= 3) burstGlints(cx, cy, Math.min(7, streak), nw * 0.6 + 30);

    /* layer 5: floating label, escalating color */
    var col = streak <= 1 ? '#FFFFFF' : (streak <= 3 ? '#FFE14D' : (streak <= 6 ? '#FFB347' : '#FF5FA2'));
    var txt = streak > 1 ? 'PERFECT x' + streak + '!' : 'PERFECT!';
    spawnLabel(cx, yTop - 14, txt, 24 + Math.min(14, streak * 2), col);

    /* layer 6: streak milestone every 5 */
    if (streak > 0 && streak % 5 === 0) {
        spawnLabel(cx, yTop - 52, streak >= 10 ? 'LEGENDARY!' : 'ON FIRE!', 30, '#FF5FA2', 1.15);
        burstMiniConfetti(cx, yTop - 10);
        sfxFanfare();
    }
}

/* ================= The drop (core mechanic) ================= */
function drop() {
    if (currentState !== State.PLAYING || !slider.active) return;
    var prev = tower[tower.length - 1];
    var yTop = -(tower.length + 1) * BH;   /* worldY of the layer being filled */
    var left = Math.max(slider.x, prev.x);
    var right = Math.min(slider.x + slider.w, prev.x + prev.w);
    var overlap = right - left;

    if (overlap <= 0) {
        missDeath(yTop);
        return;
    }

    var offset = slider.x - prev.x;
    var pw = perfectWindowFor(score);
    var isPerfect = Math.abs(offset) <= pw;
    var nx, nw;
    var grew = false;

    if (isPerfect) {
        /* PERFECT: snap aligned, keep width; streaks grow it back toward full */
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        perfects++;
        nx = prev.x;
        nw = prev.w;
        if (combo >= 2) {
            var g = Math.min(8 + 2 * Math.min(combo, 6), startW - nw);
            if (g > 0) {
                nw += g;
                nx -= g / 2;
                grew = true;
            }
        }
        celebratePerfect(nx, yTop, nw, combo);
        sfxPerfect(combo);
        sfxDrop();
        if (grew) {
            burstGrow(nx, yTop, nw);
            sfxGrow();
        }
    } else {
        /* SLICE: keep the overlap, drop the overhang as tumbling chunks */
        combo = 0;
        nx = left;
        nw = overlap;
        var cutFrac = 1 - overlap / slider.w;
        if (slider.x < left - 0.01) {
            spawnChunk(slider.x, yTop, left - slider.x, slider.cols, -rand(60, 150));
            burstDust(left, yTop + BH, 3, -1);
        }
        if (slider.x + slider.w > right + 0.01) {
            spawnChunk(right, yTop, slider.x + slider.w - right, slider.cols, rand(60, 150));
            burstDust(right, yTop + BH, 3, 1);
        }
        if (cutFrac < 0.06) {
            spawnLabel(nx + nw / 2, yTop - 12, 'SO CLOSE!', 18, '#FFFFFF', 0.7);
        }
        sfxSlice();
        sfxDrop();
        /* sloppier landings shake harder (trauma system, still subtle) */
        trauma = Math.max(trauma, 0.12 + 0.3 * cutFrac);
    }

    tower.push({ x: nx, w: nw, cols: slider.cols, seed: slider.seed, age: 0 });
    score = tower.length - 1;
    bumpScoreUI();
    bumpComboUI();
    checkMilestones();
    cam = camTargetFor(tower.length); /* camera target, eased in update */
    spawnSlider();
}

/* ---- Height milestones: palette shift is continuous, fanfare marks the moment ---- */
function checkMilestones() {
    if (!bestPassed && prevBest >= 3 && score > prevBest) {
        bestPassed = true;
        showBanner('🏆 NEW BEST!');
        sfxFanfare();
        var tp = -(tower.length) * BH;
        burstGlints(tower[tower.length - 1].x + tower[tower.length - 1].w / 2, tp - 20, 6, 90);
        return;
    }
    for (var i = 1; i < STAGES.length; i++) {
        if (STAGES[i].at === score) {
            showBanner(STAGES[i].emoji + ' ' + STAGES[i].name + ' · ' + score + ' FLOORS');
            sfxFanfare();
            var b = tower[tower.length - 1];
            burstGlints(b.x + b.w / 2, -(tower.length) * BH - 24, 6, 110);
            return;
        }
    }
    if (score > 40 && score % 10 === 0) {
        showBanner('🚀 ' + score + ' FLOORS · KEEP CLIMBING!');
        sfxFanfare();
    }
}

/* ================= Death + zoom out flourish ================= */
function missDeath(yTop) {
    currentState = State.DYING;
    deathT = 0;
    trauma = 0.45;
    combo = 0;
    hitStop = 0;
    zoomPunch = 0;
    comboEl.style.display = 'none';
    stageBanner.classList.remove('show');
    slider.active = false;
    /* the missed block tumbles away */
    spawnChunk(slider.x, yTop, slider.w, slider.cols, slider.dir * rand(130, 210));
    sfxDeath();
    pauseBtn.style.display = 'none';

    /* record the run immediately */
    newBest = score > prevBest;
    data.totalPlays++;
    data.totalCoins += perfects;
    if (score > data.highScore) data.highScore = score;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('sky-stack', score, { bronze: 15, silver: 40, gold: 80 });

    /* camera pulls back to show the whole tower */
    var towerH = tower.length * BH;
    var base = tower[0];
    var tz = Math.min(1, (H * 0.86) / (towerH + 280));
    tz = Math.max(tz, (VW * 0.5) / (VW + 40)); /* never absurdly tiny on short towers */
    dyingFrom.ty = viewTy;
    dyingTo.z = tz;
    dyingTo.ty = H * 0.52 + tz * towerH / 2;
    dyingTo.tx = VW / 2 - tz * (base.x + base.w / 2);
}

function updateDying(dt) {
    deathT += dt;
    var p = clamp((deathT - 0.35) / 1.3, 0, 1);
    var e = easeInOut(p);
    zoom = lerp(1, dyingTo.z, e);
    viewTx = lerp(0, dyingTo.tx, e);
    viewTy = lerp(dyingFrom.ty, dyingTo.ty, e);
    updateChunks(dt);
    updateParticles(dt);
    updateFx(dt);
    if (deathT > 2.15) showPanel();
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };
function showPanel() {
    if (panelShown) return;
    panelShown = true;
    currentState = State.GAME_OVER;
    scoreEl.style.display = 'none';
    panelScoreEl.textContent = score;
    panelBestEl.textContent = data.highScore;
    newBestEl.style.display = newBest ? 'block' : 'none';
    var st = stageFor(score);
    panelStageEl.textContent = st.emoji + ' You reached ' + st.name + '!';
    document.getElementById('panelTitle').textContent =
        newBest ? 'NEW RECORD!' : (score >= 40 ? 'OUT OF THIS WORLD!' : (score >= 16 ? 'NICE TOWER!' : 'GOOD TRY!'));
    if (maxCombo >= 2) {
        panelComboEl.textContent = '✨ Best streak: ' + maxCombo + ' perfect drops';
        panelComboEl.style.display = 'block';
    } else {
        panelComboEl.style.display = 'none';
    }
    var diff = prevBest - score;
    if (!newBest && prevBest >= 5 && score < prevBest && diff <= prevBest * 0.25) {
        nearMissEl.textContent = 'SO CLOSE! ' + diff + ' floor' + (diff === 1 ? '' : 's') + ' from your best';
        nearMissEl.style.display = 'block';
    } else {
        nearMissEl.style.display = 'none';
    }
    if (earnedTiers.length > 0) {
        var lab = [];
        for (var i = 0; i < earnedTiers.length; i++) lab.push(TIER_LABELS[earnedTiers[i]]);
        stickerBannerEl.textContent = 'STICKER EARNED! ' + lab.join(' + ');
        stickerBannerEl.style.display = 'block';
    } else {
        stickerBannerEl.style.display = 'none';
    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti(60);
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

/* ================= Update ================= */
function updateMenu(dt) {
    updateSlider(dt);
    updateParticles(dt);
    updateFx(dt);
}

function updateGame(dt) {
    updateSlider(dt);
    viewTy += (cam - viewTy) * Math.min(1, 8 * dt);
    var tb = tower[tower.length - 1];
    if (tb.age < 1) tb.age += dt;
    updateChunks(dt);
    updateParticles(dt);
    updateFx(dt);
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    if (flash.t > 0) flash.t = Math.max(0, flash.t - 3.2 * dt);
    if (zoomPunch > 0) zoomPunch = Math.max(0, zoomPunch - zoomPunch * 9 * dt - 0.001 * dt);
    skyF += (score - skyF) * Math.min(1, 1.6 * dt);
    computeSky();
    updateCloudLayer(farClouds, dt);
    updateCloudLayer(nearClouds, dt);
    updateShoot(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateChunks(dt); updateParticles(dt); updateFx(dt); break;
    }
}

/* ================= Render ================= */
function drawBlockShape(x, y, w, cols, seed) {
    var xi = x | 0, yi = y | 0, wi = Math.max(1, w | 0);
    /* body */
    ctx.fillStyle = cols.body;
    ctx.fillRect(xi, yi, wi, BH);
    /* subtle top face 3D bevel */
    ctx.fillStyle = cols.top;
    ctx.fillRect(xi, yi, wi, 7);
    /* bottom shade */
    ctx.fillStyle = cols.dark;
    ctx.fillRect(xi, yi + BH - 5, wi, 5);
    /* right edge shade for a hint of depth */
    if (wi > 10) {
        ctx.fillRect(xi + wi - 3, yi + 7, 3, BH - 12);
    }
    /* tiny lit windows fade in at night */
    if (nightA > 0.05 && wi > 30) {
        ctx.globalAlpha = nightA * 0.92;
        ctx.fillStyle = '#FFE9A0';
        var n = Math.min(9, ((wi - 16) / 24) | 0);
        for (var j = 0; j < n; j++) {
            if (((seed + j * 37) % 5) < 3) {
                ctx.fillRect(xi + 10 + j * 24, yi + 15, 8, 13);
            }
        }
        ctx.globalAlpha = 1;
    }
}

function drawSkyAndBackdrop() {
    ctx.setTransform(S, 0, 0, S, 0, 0);
    /* cached gradient strip: rebuilt only when the palette actually changes */
    var key = skyTopC[0] + ',' + skyTopC[1] + ',' + skyTopC[2] + '|' + skyBotC[0] + ',' + skyBotC[1] + ',' + skyBotC[2];
    if (key !== skyStripKey) {
        skyStripKey = key;
        var g = skyStripCtx.createLinearGradient(0, 0, 0, 180);
        g.addColorStop(0, 'rgb(' + skyTopC[0] + ',' + skyTopC[1] + ',' + skyTopC[2] + ')');
        g.addColorStop(1, 'rgb(' + skyBotC[0] + ',' + skyBotC[1] + ',' + skyBotC[2] + ')');
        skyStripCtx.fillStyle = g;
        skyStripCtx.fillRect(0, 0, 2, 180);
    }
    ctx.drawImage(skyStrip, 0, 0, 2, 180, 0, 0, VW + 1, H + 1);

    /* stars twinkle in as night falls, drift slowly with height (parallax) */
    if (nightA > 0.02) {
        ctx.fillStyle = '#FFFFFF';
        for (var i = 0; i < skyStars.length; i++) {
            var st = skyStars[i];
            var sy = (st.y + viewTy * 0.05) % H;
            if (sy < 0) sy += H;
            var tw = 0.55 + 0.45 * Math.sin(time * 2 + st.ph);
            ctx.globalAlpha = nightA * tw;
            ctx.fillRect(st.x | 0, sy | 0, st.r, st.r);
        }
        ctx.globalAlpha = 1;
    }

    /* occasional shooting star at night */
    if (shoot.active) {
        var sa = 1 - shoot.life / shoot.ttl;
        ctx.globalAlpha = sa * nightA;
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(shoot.x | 0, shoot.y | 0);
        ctx.lineTo((shoot.x - shoot.vx * 0.1) | 0, (shoot.y - shoot.vy * 0.1) | 0);
        ctx.stroke();
        ctx.fillStyle = '#FFF3B0';
        ctx.fillRect((shoot.x - 1.5) | 0, (shoot.y - 1.5) | 0, 3, 3);
        ctx.globalAlpha = 1;
    }

    /* sun sinks slowly as you climb; moon and planet take over */
    if (sunA > 0.02) {
        ctx.globalAlpha = sunA;
        ctx.drawImage(sunSpr, (VW - 205) | 0, (26 + viewTy * 0.02) | 0, 180, 180);
    }
    if (moonA > 0.02) {
        ctx.globalAlpha = moonA;
        ctx.drawImage(moonSpr, (VW - 185) | 0, 34, 150, 150);
    }
    if (spaceA > 0.02) {
        ctx.globalAlpha = spaceA;
        ctx.drawImage(planetSpr, (VW * 0.06) | 0, (H * 0.12 + Math.sin(time * 0.5) * 6) | 0, 180, 140);
    }
    ctx.globalAlpha = 1;
}

function applyWorldTransform() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 9;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    /* zoom punch scales around a point near the tower top so perfects "thump" */
    var k = 1 + zoomPunch;
    var cx = VW / 2, cy = H * 0.55;
    var tx = k * (viewTx + ox) + cx * (1 - k);
    var ty = k * (viewTy + oy) + cy * (1 - k);
    ctx.setTransform(S * zoom * k, 0, 0, S * zoom * k, tx * S, ty * S);
}

function drawGround() {
    var leftW = (0 - viewTx) / zoom - 60;
    var rightW = (VW - viewTx) / zoom + 60;
    var botW = (H - viewTy) / zoom + 60;
    if (botW < 0) return; /* ground far below the view */
    /* distant hills */
    var hillCol = lerpRGB([169, 231, 127], [58, 88, 92], nightA * 0.75);
    ctx.fillStyle = hillCol;
    var hw = 300;
    ctx.beginPath();
    ctx.moveTo(leftW, 0);
    for (var x = Math.floor(leftW / hw) * hw; x < rightW + hw; x += hw) {
        ctx.quadraticCurveTo(x + hw / 2, -40, x + hw, 0);
    }
    ctx.lineTo(rightW, 4);
    ctx.lineTo(leftW, 4);
    ctx.closePath();
    ctx.fill();
    /* ground slab */
    ctx.fillStyle = lerpRGB([126, 217, 87], [42, 74, 66], nightA * 0.75);
    ctx.fillRect(leftW | 0, 0, (rightW - leftW) | 0, Math.max(1, botW | 0));
    ctx.fillStyle = lerpRGB([95, 191, 63], [30, 56, 52], nightA * 0.75);
    ctx.fillRect(leftW | 0, 0, (rightW - leftW) | 0, 8);
    /* launch pad under the tower base */
    var base = tower[0];
    if (base) {
        ctx.fillStyle = lerpRGB([197, 160, 118], [86, 76, 92], nightA * 0.7);
        ctx.fillRect((base.x - 18) | 0, 0, (base.w + 36) | 0, 14);
    }
}

/* Dashed "personal best" line hovering at your record height */
function drawBestLine() {
    if (currentState !== State.PLAYING || prevBest < 3) return;
    var y = -(prevBest + 1) * BH;
    var sy = zoom * y + viewTy;
    if (sy < -30 || sy > H + 30) return;
    var leftW = (0 - viewTx) / zoom;
    var rightW = (VW - viewTx) / zoom;
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = bestPassed ? '#FFE14D' : '#FFFFFF';
    for (var x = leftW + 6; x < rightW; x += 30) {
        ctx.fillRect(x | 0, y | 0, 16, 3);
    }
    ctx.font = '800 15px Nunito, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText((bestPassed ? '⭐ ' : '') + 'BEST ' + prevBest, leftW + 8, y - 7);
    ctx.globalAlpha = 1;
}

function drawTower() {
    for (var i = 0; i < tower.length; i++) {
        var b = tower[i];
        var yTop = -(i + 1) * BH;
        /* skip blocks fully outside the view */
        var sy = zoom * yTop + viewTy;
        if (sy > H + BH || sy + BH * zoom < -BH) continue;
        if (b.age < 0.34) {
            /* squash & stretch on landing, pivot at block base */
            var t = b.age / 0.34;
            var e = easeOutBack(t);
            var sY = 0.68 + 0.32 * e;
            var sX = 1 + (1 - sY) * 0.85;
            ctx.save();
            ctx.translate(b.x + b.w / 2, yTop + BH);
            ctx.scale(sX, sY);
            drawBlockShape(-b.w / 2, -BH, b.w, b.cols, b.seed);
            ctx.restore();
        } else {
            drawBlockShape(b.x, yTop, b.w, b.cols, b.seed);
        }
    }
}

function drawSlider() {
    if (!slider.active) return;
    var yTop = -(tower.length + 1) * BH;
    /* faint motion ghosts trailing the moving block */
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = slider.cols.body;
    ctx.fillRect((slider.x - slider.dir * slider.speed * 0.055) | 0, yTop | 0, Math.max(1, slider.w | 0), BH);
    ctx.globalAlpha = 0.2;
    ctx.fillRect((slider.x - slider.dir * slider.speed * 0.026) | 0, yTop | 0, Math.max(1, slider.w | 0), BH);
    ctx.globalAlpha = 1;
    drawBlockShape(slider.x, yTop, slider.w, slider.cols, slider.seed);
}

function drawChunks() {
    for (var i = 0; i < chunks.length; i++) {
        var c = chunks[i];
        if (!c.active) continue;
        var a = 1 - (c.life / c.ttl) * (c.life / c.ttl);
        ctx.globalAlpha = a;
        ctx.save();
        ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
        ctx.rotate(c.rot);
        ctx.fillStyle = c.cols.body;
        ctx.fillRect((-c.w / 2) | 0, (-c.h / 2) | 0, Math.max(1, c.w | 0), c.h);
        ctx.fillStyle = c.cols.top;
        ctx.fillRect((-c.w / 2) | 0, (-c.h / 2) | 0, Math.max(1, c.w | 0), 6);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawFlash() {
    if (flash.t <= 0) return;
    ctx.globalAlpha = flash.t * 0.85;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(flash.x | 0, flash.y | 0, Math.max(1, flash.w | 0), BH);
    /* thin expanding halo bar */
    ctx.globalAlpha = flash.t * 0.5;
    var grow = (1 - flash.t) * 14;
    ctx.fillRect((flash.x - grow) | 0, (flash.y - grow / 2) | 0, Math.max(1, (flash.w + grow * 2) | 0), 3);
    ctx.globalAlpha = 1;
}

function drawRings() {
    for (var i = 0; i < rings.length; i++) {
        var r = rings[i];
        if (!r.active) continue;
        var t = r.life / r.ttl;
        var e = 1 - (1 - t) * (1 - t);
        ctx.globalAlpha = (1 - t) * 0.9;
        ctx.strokeStyle = r.color;
        ctx.lineWidth = Math.max(1, r.lw * (1 - t));
        ctx.beginPath();
        ctx.arc(r.x, r.y, lerp(r.r0, r.r1, e), 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawRays() {
    for (var i = 0; i < rays.length; i++) {
        var r = rays[i];
        if (!r.active) continue;
        var t = r.life / r.ttl;
        var e = 1 - (1 - t) * (1 - t);
        var inner = 14 + e * r.len * 0.85;
        var outer = 20 + e * r.len;
        ctx.globalAlpha = 1 - t;
        ctx.strokeStyle = r.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (var j = 0; j < r.n; j++) {
            var a = r.rot + j * Math.PI * 2 / r.n;
            var ca = Math.cos(a), sa = Math.sin(a);
            ctx.moveTo(r.x + ca * inner, r.y + sa * inner);
            ctx.lineTo(r.x + ca * outer, r.y + sa * outer);
        }
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 2) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 4) {
            /* 4-point star glint: thin cross that scales up then down */
            var s = p.size * Math.sin(Math.PI * Math.min(1, p.life / p.ttl));
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-s, -s * 0.16, 2 * s, s * 0.32);
            ctx.fillRect(-s * 0.16, -s, s * 0.32, 2 * s);
            ctx.restore();
        } else {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;
}

function drawLabels() {
    for (var i = 0; i < labels.length; i++) {
        var l = labels[i];
        if (!l.active) continue;
        var t = l.life / l.ttl;
        var pop = 1 + 0.55 * Math.max(0, 1 - l.life * 8); /* punchy entrance */
        var sz = (l.size * pop) | 0;
        ctx.globalAlpha = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
        ctx.font = '800 ' + sz + 'px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(43,35,80,0.55)';
        ctx.fillText(l.text, (l.x | 0) + 2, (l.y | 0) + 3);
        ctx.fillStyle = l.color;
        ctx.fillText(l.text, l.x | 0, l.y | 0);
    }
    ctx.globalAlpha = 1;
}

function render() {
    drawSkyAndBackdrop();
    drawCloudLayer(farClouds);   /* parallax layers in screen space */
    drawCloudLayer(nearClouds);
    applyWorldTransform();
    drawGround();
    drawBestLine();
    drawTower();
    drawChunks();
    drawSlider();
    drawFlash();
    drawRings();
    drawRays();
    drawParticles();
    drawLabels();
}

/* ================= Input ================= */
function primaryAction() {
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
    } else if (currentState === State.PLAYING) {
        drop();
    }
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    primaryAction();
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'Enter') {
        e.preventDefault();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        primaryAction();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    /* instant: straight back into a fresh run */
    resetRun();
    startRun();
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Main loop (with hit-stop) ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (hitStop > 0) {
        /* brief freeze frame on perfect drops: world holds, then snaps forward */
        hitStop -= dt;
        render();
        requestAnimationFrame(loop);
        return;
    }
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

/* ================= Test hooks (headless harness only) ================= */
if (window.__WOOP_TEST__) {
    window.__skyStackHooks = {
        State: State,
        getState: function () { return currentState; },
        startRun: startRun,
        drop: drop,
        update: update,
        setSliderX: function (x) { slider.x = x; },
        getSlider: function () { return slider; },
        getTower: function () { return tower; },
        getCombo: function () { return combo; },
        getMaxCombo: function () { return maxCombo; },
        getFloors: function () { return score; },
        getStartW: function () { return startW; },
        getPerfectWindow: function () { return perfectWindowFor(score); },
        isPanelShown: function () { return panelShown; },
        activeChunks: function () {
            var n = 0;
            for (var i = 0; i < chunks.length; i++) if (chunks[i].active) n++;
            return n;
        }
    };
}

})();
</script>
</body>

<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var comboEl = document.getElementById('combo');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var panelComboEl = document.getElementById('panelCombo');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_sky-stack';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalCoins: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var noiseBuf = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */
function getNoise() {
    if (!noiseBuf) {
        var len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        var ch = noiseBuf.getChannelData(0);
        for (var i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Solid block landing thud: low sine drop plus a soft noise tap */
function sfxDrop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(210 * p, t);
    o.frequency.exponentialRampToValueAtTime(88 * p, t + 0.11);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.26, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.18);
}

/* Overhang slice: short bandpassed noise swish sweeping down */
function sfxSlice() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(2400 * p, t);
    bp.frequency.exponentialRampToValueAtTime(500 * p, t + 0.12);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t);
    src.stop(t + 0.17);
}

/* Perfect drop chime: rises in pitch with every consecutive perfect */
function sfxPerfect(comboN) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    /* two semitones up per combo step, capped so it stays sweet */
    var mult = Math.pow(1.1225, Math.min(comboN - 1, 12));
    var f = 740 * mult * p;
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(f, t);
    o.frequency.setValueAtTime(f * 1.335, t + 0.08);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.3);
}

/* Block grows back: quick rising sparkle arpeggio */
function sfxGrow() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1047 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.06);
    o.frequency.setValueAtTime(1568 * p, t + 0.12);
    o.frequency.setValueAtTime(2093 * p, t + 0.18);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.15, t + 0.015);
    g.gain.setValueAtTime(0.15, t + 0.19);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.38);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.4);
}

/* Death: descending sad trombone style blip, never harsh */
function sfxDeath() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(392 * p, t);
    o.frequency.linearRampToValueAtTime(330 * p, t + 0.13);
    o.frequency.linearRampToValueAtTime(277 * p, t + 0.26);
    o.frequency.exponentialRampToValueAtTime(120 * p, t + 0.58);
    var lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(1100, t);
    lp.frequency.linearRampToValueAtTime(420, t + 0.55);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    o.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.62);
}

/* Little fanfare for new best or sticker */
function sfxFanfare() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523 * p, t);
    o.frequency.setValueAtTime(659 * p, t + 0.1);
    o.frequency.setValueAtTime(784 * p, t + 0.2);
    o.frequency.setValueAtTime(1047 * p, t + 0.3);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.32);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.64);
}

/* ================= Constants ================= */
var H = 720;                 /* logical world height */
var BH = 44;                 /* block height */
var PERFECT_PX = 6;          /* perfect drop tolerance */
var GROW_PX = 12;            /* width gained back on every 3rd consecutive perfect */
var BASE_SPEED = 240;        /* slider px/s at floor 0 */
var SPEED_PER_FLOOR = 6;
var MAX_SPEED = 520;
var CHUNK_GRAVITY = 1500;
var TOP_ANCHOR = 0.62;       /* tower top sits at this fraction of screen height */

var State = {
    MENU: 'menu',
    PLAYING: 'playing',
    PAUSED: 'paused',
    DYING: 'dying',
    GAME_OVER: 'gameOver'
};
var currentState = State.MENU;

/* ================= Canvas sizing + prerendered sprites ================= */
var S = 1;    /* device pixels per logical unit */
var VW = 400; /* logical view width */
var cloudSprs = [], sunSpr = null, moonSpr = null;

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function buildSprites() {
    var ts = S;

    /* Clouds: three puffy variants, shaded once */
    var variants = [
        [[38, 46, 24], [72, 32, 28], [108, 44, 24], [72, 50, 32]],
        [[32, 48, 20], [62, 36, 26], [96, 34, 22], [124, 46, 18], [78, 50, 30]],
        [[42, 44, 26], [84, 38, 30], [120, 48, 20]]
    ];
    cloudSprs = [];
    for (var v = 0; v < variants.length; v++) {
        var cs = makeCanvas(170 * ts, 80 * ts);
        var cctx = cs.getContext('2d');
        cctx.scale(ts, ts);
        var puffs = variants[v];
        var j;
        cctx.fillStyle = '#DCEFFB';
        for (j = 0; j < puffs.length; j++) {
            cctx.beginPath();
            cctx.arc(puffs[j][0], puffs[j][1] + 6, puffs[j][2], 0, Math.PI * 2);
            cctx.fill();
        }
        cctx.fillStyle = '#FFFFFF';
        for (j = 0; j < puffs.length; j++) {
            cctx.beginPath();
            cctx.arc(puffs[j][0], puffs[j][1], puffs[j][2], 0, Math.PI * 2);
            cctx.fill();
        }
        cloudSprs.push(cs);
    }

    /* Sun */
    sunSpr = makeCanvas(200 * ts, 200 * ts);
    var sc = sunSpr.getContext('2d');

    /* Moon with soft glow and craters */
    moonSpr = makeCanvas(160 * ts, 160 * ts);

    mg.addColorStop(0, 'rgba(226,236,255,0.8)');
    mg.addColorStop(0.4, 'rgba(206,222,255,0.3)');

    mc.fillStyle = mg;
    mc.fillRect(0, 0, 160, 160);

    mc.fill();
    mc.fillStyle = '#CBD6F2';
    mc.beginPath(); mc.arc(70, 72, 6, 0, Math.PI * 2); mc.fill();
    mc.beginPath(); mc.arc(88, 88, 4.5, 0, Math.PI * 2); mc.fill();
    mc.beginPath(); mc.arc(90, 68, 3, 0, Math.PI * 2); mc.fill();
}

/* Static star field, screen space */
var skyStars = [];

/* ================= World state =================
   World coords: ground top at worldY = 0, tower grows upward (negative y).
   Floor i occupies worldY from -(i+1)*BH to -i*BH.
   Screen: screenY = zoom * worldY + viewTy, screenX = zoom * worldX + viewTx. */
var time = 0;
var score = 0;         /* floors stacked (base excluded) */
var combo = 0;         /* consecutive perfect drops */
var maxCombo = 0;
var startW = 250;      /* run start block width, growth cap */
var prevBest = 0;
var newBest = false;
var earnedTiers = [];
var panelShown = false;
var trauma = 0;
var cam = 0;           /* viewTy target while playing */
var zoom = 1;
var viewTx = 0, viewTy = 0;
var skyF = 0;          /* smoothed floor count driving the sky palette */
var nightA = 0;        /* how deep into night we are, 0..1 */
var deathT = 0;
var dyingFrom = { ty: 0 };
var dyingTo = { z: 1, tx: 0, ty: 0 };
var flash = { t: 0, x: 0, y: 0, w: 0 };

var tower = [];        /* placed blocks: {x, w, cols, seed} indexed by floor */
var slider = { active: false, x: 0, w: 0, dir: 1, speed: BASE_SPEED, minX: 0, maxX: 0, cols: null, seed: 0 };

function colorFor(i) {
    var h = (18 + i * 9) % 360;
    return {
        body: 'hsl(' + h + ', 72%, 63%)',
        top: 'hsl(' + h + ', 78%, 77%)',
        dark: 'hsl(' + h + ', 58%, 46%)'
    };
}

/* ---- Chunk pool (sliced overhangs + the missed block) ---- */
var chunks = [];
for (var ci = 0; ci < 24; ci++) {
    chunks.push({ active: false, x: 0, y: 0, w: 0, h: BH, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1.5, cols: null });
}
function spawnChunk(x, y, w, cols, vx) {
    for (var i = 0; i < chunks.length; i++) {
        var c = chunks[i];
        if (!c.active) {
            c.active = true;
            c.x = x; c.y = y; c.w = w; c.h = BH;
            c.vx = vx;
            c.vy = rand(-90, -30);
            c.rot = 0;
            c.vr = (vx >= 0 ? 1 : -1) * rand(1.6, 4.2);
            c.life = 0;
            c.ttl = rand(1.3, 1.7);
            c.cols = cols;
            return;
        }
    }
}
function updateChunks(dt) {
    for (var i = 0; i < chunks.length; i++) {
        var c = chunks[i];
        if (!c.active) continue;
        c.life += dt;
        if (c.life >= c.ttl) { c.active = false; continue; }
        c.vy += CHUNK_GRAVITY * dt;
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.rot += c.vr * dt;
    }
}

/* ---- Particle pool: 2 spark, 3 confetti (world coords) ---- */
var parts = [];
for (var qi = 0; qi < 140; qi++) {
    parts.push({ active: false, type: 0, x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, life: 0, ttl: 1, size: 4, color: '#fff', seed: 0 });
}
function spawnPart(type, x, y, vx, vy, ttl, size, color) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) {
            p.active = true;
            p.type = type;
            p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.rot = rand(0, Math.PI * 2);
            p.vr = rand(-7, 7);
            p.life = 0; p.ttl = ttl; p.size = size; p.color = color;
            p.seed = rand(0, 10);
            return;
        }
    }
}
function updateParticles(dt) {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 2) {
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else {
            p.vy = Math.min(240, p.vy + 220 * dt);
            p.x += Math.sin(p.life * 5 + p.seed) * 26 * dt;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
}
var SPARK_COLORS = ['#FFFFFF', '#FFF3B0', '#FFE14D'];
function burstSparks(x, y, n) {
    for (var i = 0; i < n; i++) {
        var a = rand(0, Math.PI * 2);
        var sp = rand(40, 230);
        spawnPart(2, x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.35, 0.7), rand(2.5, 5), SPARK_COLORS[i % SPARK_COLORS.length]);
    }
}
var GOLD_COLORS = ['#FFE14D', '#FFD93D', '#FFF3B0', '#FFC61A'];
function burstGrow(x, y, w) {
    for (var i = 0; i < 18; i++) {
        spawnPart(2, x + rand(0, w), y + rand(-4, BH), rand(-60, 60), rand(-160, -40), rand(0.4, 0.8), rand(2.5, 5), GOLD_COLORS[i % GOLD_COLORS.length]);
    }
}
var CONFETTI_COLORS = ['#FF8A3D', '#7ED957', '#4FC3F7', '#FFD93D', '#FF5FA2', '#B388FF'];
function burstConfetti() {
    /* spawn in world coords across the visible top of the view */
    var leftW = (0 - viewTx) / zoom;
    var rightW = (VW - viewTx) / zoom;
    var topW = (0 - viewTy) / zoom;
    for (var i = 0; i < 70; i++) {
        spawnPart(3, rand(leftW + (rightW - leftW) * 0.1, rightW - (rightW - leftW) * 0.1), topW + rand(-60, -10), rand(-70, 70), rand(50, 190), rand(2, 3.2), rand(5, 9) / zoom, CONFETTI_COLORS[i % CONFETTI_COLORS.length]);
    }
}

/* ---- Clouds drifting behind the tower, world space ---- */
var clouds = [];
function initClouds() {
    clouds = [];
    for (var i = 0; i < 7; i++) {
        clouds.push({ x: rand(-40, VW), y: rand(-H * 1.2, H * 0.4) - (viewTy - camTargetFor(1)), s: rand(0.5, 1.15), spr: i % 3, a: rand(0.5, 0.85) });
    }
}
function updateClouds(dt) {
    var leftW = (0 - viewTx) / zoom - 200;
    var rightW = (VW - viewTx) / zoom + 200;
    var topW = (0 - viewTy) / zoom - 120;
    var botW = (H - viewTy) / zoom + 120;
    for (var i = 0; i < clouds.length; i++) {
        var c = clouds[i];
        c.x -= (10 + 16 * c.s) * dt;
        if (c.x < leftW - 200 * c.s) {
            c.x = rightW + rand(0, 160);
            c.y = rand(topW, botW - 100);
        }
        /* keep clouds roughly within the vertical view band as the camera rises */
        if (c.y > botW + 120 || c.y < topW - 320) {
            c.y = rand(topW, botW - 100);
            c.x = rand(leftW, rightW);
        }
    }
}

/* ================= Sky palette journey =================
   Cycles every 20 floors: dawn peach, day blue, sunset orange, night navy, back to dawn. */
var PAL = [
    [[255, 178, 125], [255, 227, 194]],  /* dawn peach */
    [[94, 185, 242], [189, 232, 255]],   /* day blue */
    [[255, 122, 92], [255, 207, 138]],   /* sunset orange */
    [[20, 27, 77], [58, 74, 140]]        /* night navy */
];
function lerpRGB(a, b, t) {
    return 'rgb(' + ((a[0] + (b[0] - a[0]) * t) | 0) + ',' + ((a[1] + (b[1] - a[1]) * t) | 0) + ',' + ((a[2] + (b[2] - a[2]) * t) | 0) + ')';
}
function skyColors() {
    var pos = skyF / 20;
    var k = Math.floor(pos) % 4;
    var f = pos - Math.floor(pos);
    var k2 = (k + 1) % 4;
    nightA = (k === 3 ? 1 - f : 0) + (k2 === 3 ? f : 0);
    return {
        top: lerpRGB(PAL[k][0], PAL[k2][0], f),
        bot: lerpRGB(PAL[k][1], PAL[k2][1], f)
    };
}

/* ================= Run control ================= */
function camTargetFor(len) { return H * TOP_ANCHOR + len * BH; }

function resetRun() {
    var i;
    for (i = 0; i < chunks.length; i++) chunks[i].active = false;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    score = 0;
    combo = 0;
    maxCombo = 0;
    newBest = false;
    earnedTiers = [];
    panelShown = false;
    trauma = 0;
    deathT = 0;
    flash.t = 0;
    skyF = 0;
    zoom = 1;
    viewTx = 0;
    startW = Math.min(250, VW * 0.62);
    tower.length = 0;
    tower.push({ x: (VW - startW) / 2, w: startW, cols: colorFor(0), seed: (Math.random() * 997) | 0 });
    cam = camTargetFor(1);
    viewTy = cam;
    spawnSlider();
    scoreEl.textContent = '0';
    comboEl.style.display = 'none';
}

function spawnSlider() {
    var prev = tower[tower.length - 1];
    var w = prev.w;
    var pcx = prev.x + prev.w / 2;
    var amp = prev.w / 2 + 84;   /* block center travels this far each side of the tower */
    slider.w = w;
    slider.minX = pcx - amp - w / 2;
    slider.maxX = pcx + amp - w / 2;
    slider.dir = (tower.length % 2 === 0) ? -1 : 1;
    slider.x = slider.dir > 0 ? slider.minX : slider.maxX;
    slider.speed = Math.min(MAX_SPEED, BASE_SPEED + SPEED_PER_FLOOR * score);
    slider.cols = colorFor(tower.length);
    slider.seed = (Math.random() * 997) | 0;
    slider.active = true;
}

function updateSlider(dt) {
    if (!slider.active) return;
    slider.x += slider.dir * slider.speed * dt;
    if (slider.x > slider.maxX) {
        slider.x = slider.maxX - (slider.x - slider.maxX);
        slider.dir = -1;
    } else if (slider.x < slider.minX) {
        slider.x = slider.minX + (slider.minX - slider.x);
        slider.dir = 1;
    }
}

function showMenu() {
    currentState = State.MENU;
    resetRun();
    titleEl.style.display = 'block';
    tapHintEl.style.display = 'block';
    scoreEl.style.display = 'none';
    pauseBtn.style.display = 'none';
    overPanel.classList.remove('show');
    if (data.highScore > 0) {
        menuBestEl.textContent = 'BEST: ' + data.highScore + ' FLOORS';
        menuBestEl.style.display = 'inline-block';
    }
}

function startRun() {
    currentState = State.PLAYING;
    prevBest = data.highScore;
    titleEl.style.display = 'none';
    tapHintEl.style.display = 'none';
    scoreEl.style.display = 'block';
    pauseBtn.style.display = 'flex';
    overPanel.classList.remove('show');
}

function bumpScoreUI() {
    scoreEl.textContent = score;
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
}
function bumpComboUI() {
    if (combo > 0) {
        comboEl.textContent = 'PERFECT x' + combo;
        comboEl.style.display = 'block';
        comboEl.classList.remove('pop');
        void comboEl.offsetWidth;
        comboEl.classList.add('pop');
    } else {
        comboEl.style.display = 'none';
    }
}

/* ================= The drop (core mechanic) ================= */
function drop() {
    if (currentState !== State.PLAYING || !slider.active) return;
    var prev = tower[tower.length - 1];
    var yTop = -(tower.length + 1) * BH;   /* worldY of the layer being filled */
    var left = Math.max(slider.x, prev.x);
    var right = Math.min(slider.x + slider.w, prev.x + prev.w);
    var overlap = right - left;

    if (overlap <= 0) {
        missDeath(yTop);
        return;
    }

    var offset = slider.x - prev.x;
    var nx, nw;
    var grew = false;

    if (Math.abs(offset) <= PERFECT_PX) {
        /* PERFECT: snap to aligned, keep full width */
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        nx = prev.x;
        nw = prev.w;
        if (combo % 3 === 0) {
            /* every 3rd consecutive perfect grows the block back, up to start width */
            var g = Math.min(GROW_PX, startW - nw);
            if (g > 0) {
                nw += g;
                nx -= g / 2;
                grew = true;
            }
        }
        flash.t = 1;
        flash.x = nx; flash.y = yTop; flash.w = nw;
        burstSparks(nx, yTop + BH / 2, 7);
        burstSparks(nx + nw, yTop + BH / 2, 7);
        sfxPerfect(combo);
        if (grew) {
            burstGrow(nx, yTop, nw);
            sfxGrow();
        }
    } else {
        /* SLICE: keep the overlap, drop the overhang as tumbling chunks */
        combo = 0;
        nx = left;
        nw = overlap;
        if (slider.x < left - 0.01) {
            spawnChunk(slider.x, yTop, left - slider.x, slider.cols, -rand(60, 150));
        }
        if (slider.x + slider.w > right + 0.01) {
            spawnChunk(right, yTop, slider.x + slider.w - right, slider.cols, rand(60, 150));
        }
        sfxSlice();
        sfxDrop();
        trauma = Math.max(trauma, 0.18);
    }

    tower.push({ x: nx, w: nw, cols: slider.cols, seed: slider.seed });
    score = tower.length - 1;
    if (!(Math.abs(offset) <= PERFECT_PX)) { /* thud already played on slice path */ } else { sfxDrop(); }
    bumpScoreUI();
    bumpComboUI();
    cam = camTargetFor(tower.length); /* camera target, eased in update */
    spawnSlider();
}

/* ================= Death + zoom out flourish ================= */
function missDeath(yTop) {
    currentState = State.DYING;
    deathT = 0;
    trauma = 0.45;
    combo = 0;
    comboEl.style.display = 'none';
    slider.active = false;
    /* the missed block tumbles away */
    spawnChunk(slider.x, yTop, slider.w, slider.cols, slider.dir * rand(130, 210));
    sfxDeath();
    pauseBtn.style.display = 'none';

    /* record the run immediately */
    newBest = score > prevBest;
    data.totalPlays++;
    if (score > data.highScore) data.highScore = score;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('sky-stack', score, { bronze: 15, silver: 40, gold: 80 });

    /* camera pulls back to show the whole tower */
    var towerH = tower.length * BH;
    var base = tower[0];
    var tz = Math.min(1, (H * 0.86) / (towerH + 280));
    tz = Math.max(tz, (VW * 0.5) / (VW + 40)); /* never absurdly tiny on short towers */
    dyingFrom.ty = viewTy;
    dyingTo.z = tz;
    dyingTo.ty = H * 0.52 + tz * towerH / 2;
    dyingTo.tx = VW / 2 - tz * (base.x + base.w / 2);
}

function updateDying(dt) {
    deathT += dt;
    var p = clamp((deathT - 0.35) / 1.3, 0, 1);
    var e = easeInOut(p);
    zoom = lerp(1, dyingTo.z, e);
    viewTx = lerp(0, dyingTo.tx, e);
    viewTy = lerp(dyingFrom.ty, dyingTo.ty, e);
    updateChunks(dt);
    updateParticles(dt);
    if (deathT > 2.15) showPanel();
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };
function showPanel() {
    if (panelShown) return;
    panelShown = true;
    currentState = State.GAME_OVER;
    scoreEl.style.display = 'none';
    panelScoreEl.textContent = score;
    panelBestEl.textContent = data.highScore;
    newBestEl.style.display = newBest ? 'block' : 'none';
    document.getElementById('panelTitle').textContent = newBest ? 'AMAZING!' : 'NICE TOWER!';
    if (maxCombo >= 2) {
        panelComboEl.textContent = '✨ Best streak: ' + maxCombo + ' perfect drops';
        panelComboEl.style.display = 'block';
    } else {
        panelComboEl.style.display = 'none';
    }
    var diff = prevBest - score;
    if (!newBest && prevBest >= 5 && score < prevBest && diff <= prevBest * 0.2) {
        nearMissEl.textContent = 'SO CLOSE! ' + diff + ' floor' + (diff === 1 ? '' : 's') + ' from your best';
        nearMissEl.style.display = 'block';
    } else {
        nearMissEl.style.display = 'none';
    }
    if (earnedTiers.length > 0) {
        var labels = [];
        for (var i = 0; i < earnedTiers.length; i++) labels.push(TIER_LABELS[earnedTiers[i]]);
        stickerBanner.textContent = 'STICKER EARNED! ' + labels.join(' + ');
        stickerBanner.style.display = 'block';
    } else {
        stickerBanner.style.display = 'none';
    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti();
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

/* ================= Update ================= */
function updateMenu(dt) {
    updateSlider(dt);
    updateParticles(dt);
}

function updateGame(dt) {
    updateSlider(dt);
    viewTy += (cam - viewTy) * Math.min(1, 8 * dt);
    updateChunks(dt);
    updateParticles(dt);
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    if (flash.t > 0) flash.t = Math.max(0, flash.t - 3.2 * dt);
    skyF += (score - skyF) * Math.min(1, 1.6 * dt);
    updateClouds(dt);
    switch (currentState) {
        case State.MENU: updateMenu(dt); break;
        case State.PLAYING: updateGame(dt); break;
        case State.PAUSED: break;
        case State.DYING: updateDying(dt); break;
        case State.GAME_OVER: updateChunks(dt); updateParticles(dt); break;
    }
}

/* ================= Render ================= */
function drawBlockShape(x, y, w, cols, seed) {
    var xi = x | 0, yi = y | 0, wi = Math.max(1, w | 0);
    /* body */
    ctx.fillStyle = cols.body;
    ctx.fillRect(xi, yi, wi, BH);
    /* subtle top face 3D bevel */
    ctx.fillStyle = cols.top;
    ctx.fillRect(xi, yi, wi, 7);
    /* bottom shade */
    ctx.fillStyle = cols.dark;
    ctx.fillRect(xi, yi + BH - 5, wi, 5);
    /* right edge shade for a hint of depth */
    if (wi > 10) {
        ctx.fillRect(xi + wi - 3, yi + 7, 3, BH - 12);
    }
    /* tiny lit windows fade in at night */
    if (nightA > 0.05 && wi > 30) {
        ctx.globalAlpha = nightA * 0.92;
        ctx.fillStyle = '#FFE9A0';
        var n = Math.min(9, ((wi - 16) / 24) | 0);
        for (var j = 0; j < n; j++) {
            if (((seed + j * 37) % 5) < 3) {
                ctx.fillRect(xi + 10 + j * 24, yi + 15, 8, 13);
            }
        }
        ctx.globalAlpha = 1;
    }
}

function drawSkyAndBackdrop() {
    ctx.setTransform(S, 0, 0, S, 0, 0);
    var cols = skyColors();
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, cols.top);
    g.addColorStop(1, cols.bot);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW + 1, H + 1);

    /* stars twinkle in as night falls */
    if (nightA > 0.02) {
        ctx.fillStyle = '#FFFFFF';
        for (var i = 0; i < skyStars.length; i++) {
            var st = skyStars[i];
            var tw = 0.55 + 0.45 * Math.sin(time * 2 + st.ph);
            ctx.globalAlpha = nightA * tw;
            ctx.fillRect(st.x | 0, st.y | 0, st.r, st.r);
        }
        ctx.globalAlpha = 1;
    }

    /* sun by day, moon by night, fixed in the sky */
    var sunA = clamp(1 - nightA * 1.5, 0, 1);
    if (sunA > 0.02) {
        ctx.globalAlpha = sunA;
        ctx.drawImage(sunSpr, (VW - 205) | 0, 26, 180, 180);
    }
    if (nightA > 0.1) {
        ctx.globalAlpha = clamp(nightA * 1.2 - 0.2, 0, 1);
        ctx.drawImage(moonSpr, (VW - 185) | 0, 34, 150, 150);
    }
    ctx.globalAlpha = 1;
}

function applyWorldTransform() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 9;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(S * zoom, 0, 0, S * zoom, (viewTx + ox) * S, (viewTy + oy) * S);
}

function drawClouds() {
    for (var i = 0; i < clouds.length; i++) {
        var c = clouds[i];
        ctx.globalAlpha = c.a;
        ctx.drawImage(cloudSprs[c.spr], c.x | 0, c.y | 0, 170 * c.s, 80 * c.s);
    }
    ctx.globalAlpha = 1;
}

function drawGround() {
    var leftW = (0 - viewTx) / zoom - 60;
    var rightW = (VW - viewTx) / zoom + 60;
    var botW = (H - viewTy) / zoom + 60;
    if (botW < 0) return; /* ground far below the view */
    /* distant hills */
    var hillCol = lerpRGB([169, 231, 127], [58, 88, 92], nightA * 0.75);
    ctx.fillStyle = hillCol;
    var hw = 300;
    ctx.beginPath();
    ctx.moveTo(leftW, 0);
    for (var x = Math.floor(leftW / hw) * hw; x < rightW + hw; x += hw) {
        ctx.quadraticCurveTo(x + hw / 2, -40, x + hw, 0);
    }
    ctx.lineTo(rightW, 4);
    ctx.lineTo(leftW, 4);
    ctx.closePath();
    ctx.fill();
    /* ground slab */
    ctx.fillStyle = lerpRGB([126, 217, 87], [42, 74, 66], nightA * 0.75);
    ctx.fillRect(leftW | 0, 0, (rightW - leftW) | 0, Math.max(1, botW | 0));
    ctx.fillStyle = lerpRGB([95, 191, 63], [30, 56, 52], nightA * 0.75);
    ctx.fillRect(leftW | 0, 0, (rightW - leftW) | 0, 8);
    /* launch pad under the tower base */
    var base = tower[0];
    if (base) {
        ctx.fillStyle = lerpRGB([197, 160, 118], [86, 76, 92], nightA * 0.7);
        ctx.fillRect((base.x - 18) | 0, 0, (base.w + 36) | 0, 14);
    }
}

function drawTower() {
    for (var i = 0; i < tower.length; i++) {
        var b = tower[i];
        var yTop = -(i + 1) * BH;
        /* skip blocks fully outside the view */
        var sy = zoom * yTop + viewTy;
        if (sy > H + BH || sy + BH * zoom < -BH) continue;
        drawBlockShape(b.x, yTop, b.w, b.cols, b.seed);
    }
}

function drawSlider() {
    if (!slider.active) return;
    var yTop = -(tower.length + 1) * BH;
    drawBlockShape(slider.x, yTop, slider.w, slider.cols, slider.seed);
}

function drawChunks() {
    for (var i = 0; i < chunks.length; i++) {
        var c = chunks[i];
        if (!c.active) continue;
        var a = 1 - (c.life / c.ttl) * (c.life / c.ttl);
        ctx.globalAlpha = a;
        ctx.save();
        ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
        ctx.rotate(c.rot);
        ctx.fillStyle = c.cols.body;
        ctx.fillRect((-c.w / 2) | 0, (-c.h / 2) | 0, Math.max(1, c.w | 0), c.h);
        ctx.fillStyle = c.cols.top;
        ctx.fillRect((-c.w / 2) | 0, (-c.h / 2) | 0, Math.max(1, c.w | 0), 6);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawFlash() {
    if (flash.t <= 0) return;
    ctx.globalAlpha = flash.t * 0.85;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(flash.x | 0, flash.y | 0, Math.max(1, flash.w | 0), BH);
    /* thin expanding halo */
    ctx.globalAlpha = flash.t * 0.5;
    var grow = (1 - flash.t) * 14;
    ctx.fillRect((flash.x - grow) | 0, (flash.y - grow / 2) | 0, Math.max(1, (flash.w + grow * 2) | 0), 3);
    ctx.globalAlpha = 1;
}

function drawParticles() {
    for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        if (!p.active) continue;
        var a = 1 - p.life / p.ttl;
        ctx.globalAlpha = a;
        ctx.fillStyle = p.color;
        if (p.type === 2) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size * 0.75, p.size, p.size * 1.5);
            ctx.restore();
        }
    }
    ctx.globalAlpha = 1;
}

function render() {
    drawSkyAndBackdrop();
    applyWorldTransform();
    drawClouds();
    drawGround();
    drawTower();
    drawChunks();
    drawSlider();
    drawFlash();
    drawParticles();
}

/* ================= Input ================= */
function primaryAction() {
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
    } else if (currentState === State.PLAYING) {
        drop();
    }
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    primaryAction();
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'Enter') {
        e.preventDefault();
        if (currentState === State.PAUSED) { resumeGame(); return; }
        if (currentState === State.GAME_OVER && panelShown) { restart(); return; }
        primaryAction();
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

function restart() {
    /* instant: straight back into a fresh run */
    resetRun();
    startRun();
}
playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    restart();
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

/* ================= Test hooks (headless harness only) ================= */
if (window.__WOOP_TEST__) {
    window.__skyStackHooks = {
        State: State,
        getState: function () { return currentState; },
        startRun: startRun,
        drop: drop,
        update: update,
        setSliderX: function (x) { slider.x = x; },
        getSlider: function () { return slider; },
        getTower: function () { return tower; },
        getCombo: function () { return combo; },
        getMaxCombo: function () { return maxCombo; },
        getFloors: function () { return score; },
        getStartW: function () { return startW; },
        isPanelShown: function () { return panelShown; },
        activeChunks: function () {
            var n = 0;
            for (var i = 0; i < chunks.length; i++) if (chunks[i].active) n++;
            return n;
        }
    };
}

})();
</script>

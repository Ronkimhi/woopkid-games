<script>
'use strict';

/* =====================================================================
   ROPE RUSH — one-button swing & fly momentum game
   The whole game lives or dies on one mechanic: the pendulum swing and
   the tangential launch on release. Physics runs on a fixed 120Hz step
   so the swing is deterministic and butter-smooth at any frame rate.
   ===================================================================== */

/* ================= Storage ================= */
const STORAGE_KEY = 'woopkid_rope-rush';
const defaultData = {
    highScore: 0,          /* total stars banked across all levels */
    totalPlays: 0,
    unlocked: 1,           /* highest level reachable (1-based) */
    bestTimes: {},         /* level -> seconds */
    stars: {},             /* level -> [bool,bool,bool] banked stars */
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) { /* fail silently */ }
}
const data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned;
  }
};
const SLUG = 'rope-rush';
const STICKER_THRESHOLDS = { bronze: 6, silver: 24, gold: 45 }; /* total banked stars (max 60) */

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(a, b) { return a + Math.random() * (b - a); }
function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }
/* Seeded PRNG so every player gets the exact same 20 levels */
function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}
function rr(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
}
function fmtTime(s) {
    if (s >= 60) {
        const m = Math.floor(s / 60);
        return m + ':' + (s - m * 60).toFixed(1).padStart(4, '0');
    }
    return s.toFixed(1);
}

/* ================= Audio (procedural, Web Audio only) ================= */
let audioCtx = null;
let noiseBuf = null;
let activeVoices = 0;
const MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); }
function getNoise() {
    if (!noiseBuf) {
        const len = Math.floor(audioCtx.sampleRate * 0.3);
        noiseBuf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const ch = noiseBuf.getChannelData(0);
        for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    }
    return noiseBuf;
}

/* Rope attach: springy twang */
function sfxAttach() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(520 * p, t);
    o.frequency.exponentialRampToValueAtTime(310 * p, t + 0.05);
    o.frequency.exponentialRampToValueAtTime(430 * p, t + 0.1);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.18);
}
/* Release: airy whip whoosh, pitch scales with speed */
function sfxRelease(speed) {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime;
    const k = clamp(speed / 1300, 0.3, 1);
    const src = audioCtx.createBufferSource();
    src.buffer = getNoise();
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.Q.value = 1.1;
    bp.frequency.setValueAtTime(500 + 500 * k, t);
    bp.frequency.exponentialRampToValueAtTime(1600 + 1400 * k, t + 0.12);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.13 + 0.1 * k, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    src.onended = voiceDone;
    src.start(t); src.stop(t + 0.22);
}
/* Star pickup: rising sparkle chime */
function sfxStar(n) {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar() * (1 + 0.12 * n);
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1047 * p, t);
    o.frequency.setValueAtTime(1319 * p, t + 0.06);
    o.frequency.setValueAtTime(1568 * p, t + 0.12);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.34);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.36);
}
/* Bounce pad: cartoon boing */
function sfxBoing() {
    if (!canPlay()) return;
    activeVoices++;
    const t = audioCtx.currentTime, p = pitchVar();
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(180 * p, t);
    o.frequency.exponentialRampToValueAtTime(640 * p, t + 0.14);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);

/* ================= Level generation =================
   Seeded + parametric: every player gets the same 20 levels.
   Difficulty knobs ramp with the level index; the first levels are
   hand-tamed (wide gaps, no hazards) so a 6-year-old gets flying fast,
   and the late levels demand real momentum-carry to survive.        */
let level = null;   /* current built level */
let curLevel = 1;   /* 1-based */

function buildLevel(idx) {
    /* idx is 1-based */
    const rnd = mulberry32(77000 + idx * 7919);
    const t = (idx - 1) / (LEVEL_COUNT - 1);   /* 0..1 difficulty ramp */
    const hookCount = Math.round(lerp(7, 16, t));
    const gapMin = lerp(215, 285, t);
    const gapMax = lerp(275, 372, t);   /* stays under grab range with margin */
    const yMin = lerp(160, 90, t);
    const yMax = lerp(300, 430, t);
    const sawChance = idx <= 2 ? 0 : lerp(0.16, 0.72, t);
    const movingSaws = idx >= 7;
    /* early levels: a pad under every saw-less gap — falling is funny, not fatal.
       Later levels earn the scarcity that makes momentum-carry mandatory. */
    const padChance = idx <= 6 ? 1 : lerp(0.7, 0.18, t);
    const ringChance = idx >= 4 ? 0.22 : 0;
    /* late-game variety knobs. All new rnd() calls below are gated behind
       these flags so levels 1-8 keep their exact original geometry. */
    const movingAnchors = idx >= 9;     /* hooks that bob on a vertical track */
    const windLevels = idx >= 11;       /* updraft columns (pure assist) */
    const crumbleLevels = idx >= 13;    /* one-use hooks that break on release */

    const anchors = [];   /* {x,y,baseY,amp,spd,ph,crumble,broken} */
    const saws = [];      /* {x,y,r,amp,spd,ph} amp=0 → static */
    const pads = [];      /* {x,y,w} */
    const rings = [];     /* {x,y,r} */
    const winds = [];     /* {x,w,str} updraft columns */
    const stars = [];     /* {x,y} — exactly 3 */

    /* home pad under the spawn: hesitating at the start bounces you,
       it never kills you. Danger lives in the middle of the level. */
    pads.push({ x: 20, y: 620, w: 340 });

    let x = 430;
    for (let i = 0; i < hookCount; i++) {
        let y = lerp(yMin, yMax, rnd());
        /* reachability invariant: the next hook is always ropeable from the
           previous one's neighborhood (euclidean gap stays under grab range) */
        if (i > 0) {
            const prev = anchors[i - 1];
            const gapX = x - prev.x;
            const maxDy = Math.sqrt(Math.max(0, 370 * 370 - gapX * gapX));
            y = clamp(y, prev.y - maxDy, prev.y + maxDy);
        }
        anchors.push({ x, y, baseY: y, amp: 0, spd: 0, ph: 0, crumble: false, broken: false });
        /* moving anchors: vertical bob on a track. Never the first or last
           hook — the opener and the flag fling stay dependable. */
        if (movingAnchors && i > 0 && i < hookCount - 1 && rnd() < lerp(0.25, 0.5, t)) {
            const ma = anchors[i];
            ma.amp = Math.min(lerp(36, 80, rnd()), Math.max(0, ma.baseY - 64));
            ma.spd = lerp(0.9, 1.7, rnd());
            ma.ph = rnd() * Math.PI * 2;
        }
        const gap = lerp(gapMin, gapMax, rnd());

        if (i > 0 && i < hookCount - 1) {
            const midX = x + gap * 0.5;
            /* Hazards live in the gaps between hooks */
            if (rnd() < sawChance) {
                const high = rnd() < lerp(0.2, 0.5, t);   /* high saws (harshest) stay rare early */
                const sy = high ? lerp(60, 170, rnd()) : lerp(480, 620, rnd());
                const moving = movingSaws && rnd() < 0.5;
                saws.push({
                    x: midX, y: sy,
                    r: lerp(26, 40, rnd()) + t * 14,   /* smaller blades early, chunkier late */
                    amp: moving ? lerp(60, 150, rnd()) : 0,
                    spd: lerp(1.2, 2.4, rnd()),
                    ph: rnd() * Math.PI * 2
                });
            } else if (rnd() < padChance) {
                pads.push({ x: midX - 70, y: lerp(600, 680, rnd()), w: 140 });
            } else if (windLevels && rnd() < 0.45) {
                /* updraft column in an empty gap: a gentle rescue, pure assist */
                winds.push({ x: midX - 80, w: 160, str: lerp(620, 900, rnd()) });
            }
            if (rnd() < ringChance) {
                rings.push({ x: midX, y: lerp(180, 380, rnd()), r: 46 });
            }
        }
        x += gap;
    }
    /* crumble pass: some mid-level hooks break after one use. Never the
       first or last hook, never two in a row (a fallback always exists),
       and never a moving hook (one gimmick per anchor). */
    if (crumbleLevels) {
        for (let i = 1; i < anchors.length - 1; i++) {
            if (anchors[i - 1].crumble || anchors[i].amp) continue;
            if (rnd() < lerp(0.22, 0.4, t)) anchors[i].crumble = true;
        }
    }
    /* geometry invariant (binding): worst-case hook gap — base distance plus
       both bob amplitudes — must stay comfortably under GRAB_RANGE so every
       hook is always ropeable from its neighbor at any point in its travel. */
    for (let i = 1; i < anchors.length; i++) {
        const pv = anchors[i - 1], cu = anchors[i];
        const bd = Math.hypot(cu.x - pv.x, cu.baseY - pv.baseY);
        const budget = 385 - bd;
        const need = pv.amp + cu.amp;
        if (need > budget) {
            const k = Math.max(0, budget) / (need || 1);
            pv.amp *= k; cu.amp *= k;
        }
        if (pv.amp < 22) pv.amp = 0;
        if (cu.amp < 22) cu.amp = 0;
    }
    /* x has already advanced one gap past the last hook — anchor the flag
       to the last hook itself so the final fling is a fair, tuned distance */
    const lastHook = anchors[anchors.length - 1];
    const finishX = lastHook.x + lerp(430, 560, t);
    /* forgiving runway: a bounce pad under the final fling, wide early and
       narrow late — a weak last release bounces you home instead of dunking
       you at the flag. Completion stays kind; mastery is stars and times. */
    const runW = lerp(210, 120, t);
    pads.push({ x: lastHook.x + 130, y: 665, w: runW });

    /* --- Stars: one per zone of the level, on the skill line --- */
    const a = anchors;
    const third = Math.max(1, Math.floor(a.length / 3));
    /* Star 1: high above an early gap — needs a well-timed upward release */
    const s1a = a[Math.min(1, a.length - 1)];
    const s1b = a[Math.min(2, a.length - 1)];
    stars.push({ x: (s1a.x + s1b.x) / 2, y: Math.min(s1a.y, s1b.y) - lerp(90, 150, rnd()) });
    /* Star 2: low dip in the middle — dive under the line, near the goo */
    const s2a = a[Math.min(third + 1, a.length - 2)];
    const s2b = a[Math.min(third + 2, a.length - 1)];
    stars.push({ x: (s2a.x + s2b.x) / 2, y: lerp(520, 600, rnd()) });
    /* Star 3: the long fling — past the last hook, before the flag */
    const last = a[a.length - 1];
    stars.push({ x: lerp(last.x + 130, finishX - 60, rnd()), y: lerp(200, 330, rnd()) });

    /* par time: the 3-star "beat this" goal shown before the level starts */
    const par = Math.max(6, Math.round((finishX / 400) * 2) / 2);

    return { idx, anchors, saws, pads, rings, winds, stars, finishX, len: finishX + 300, par };
}
/* Cache par times once so panels can show goals without rebuilding levels */

};

/* Ragdoll: pure decoration driven by Verlet points hanging off the body.
   4 limbs + a scarf tail. Each limb is one point constrained to a mount
   on the body; gravity + inertia makes them trail and flail naturally. */
const LIMBS = 5;
const rag = [];
for (let i = 0; i < LIMBS; i++) rag.push({ x: 0, y: 0, px: 0, py: 0 });
function ragReset() {
    for (const p of rag) { p.x = p.px = player.x; p.y = p.py = player.y + 10; }
}
function ragStep(dt) {
    /* mounts rotate with travel direction */
    const sp = Math.hypot(player.vx, player.vy);
    const dirX = sp > 1 ? player.vx / sp : 1;
    const dirY = sp > 1 ? player.vy / sp : 0;
    /* limb mount offsets: 2 arms up-back, 2 legs down-back, 1 scarf top */
    const mounts = [
        { ox: -dirX * 8 - dirY * 8, oy: -dirY * 8 + dirX * 8, len: 16 },   /* arm 1 */
        { ox: -dirX * 8 + dirY * 8, oy: -dirY * 8 - dirX * 8, len: 16 },   /* arm 2 */
        { ox: -dirX * 12 - dirY * 5, oy: -dirY * 12 + dirX * 5, len: 20 }, /* leg 1 */
        { ox: -dirX * 12 + dirY * 5, oy: -dirY * 12 - dirX * 5, len: 20 }, /* leg 2 */
        { ox: -dirX * 14, oy: -dirY * 14 - 6, len: 26 }                    /* scarf */
    ];
    for (let i = 0; i < LIMBS; i++) {
        const p = rag[i], m = mounts[i];
        /* verlet integrate with damping */
        const nx = p.x + (p.x - p.px) * 0.86;
        const ny = p.y + (p.y - p.py) * 0.86 + 620 * dt * dt;
        p.px = p.x; p.py = p.y;
        p.x = nx; p.y = ny;
        /* constrain to mount */
        const mx = player.x + m.ox, my = player.y + m.oy;
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.hypot(dx, dy) || 0.001;
        if (d > m.len) {
            const k = m.len / d;
            p.x = mx + dx * k;
            p.y = my + dy * k;
        }
    }
}

/* ================= Camera ================= */
const cam = { x: 0, y: 300, zoom: 1 };
let zoomPunch = 0;   /* brief extra zoom-out on a perfect launch */
function camStep(dt) {
    zoomPunch = Math.max(0, zoomPunch - dt * 0.32);
    const sp = Math.hypot(player.vx, player.vy);
    const tx = player.x + player.vx * 0.22;
    /* slight vertical lead in the direction of travel */
    const ty = clamp(player.y * 0.55 + 140 + clamp(player.vy * 0.045, -34, 50), 175, 475);
    const tz = clamp(1.05 - sp / 4200, 0.82, 1.05) - zoomPunch;
    const k = 1 - Math.pow(0.0018, dt);   /* smooth, framerate-independent */
    cam.x = lerp(cam.x, tx, k);
    cam.y = lerp(cam.y, ty, k);
    cam.zoom = lerp(cam.zoom, tz, k * 0.6);
}
function camSnap() {
    cam.x = player.x + 120;
    cam.y = clamp(player.y * 0.55 + 140, 180, 470);
    cam.zoom = 1.0;
}

/* ================= Particles (pooled) ================= */
const POOL = 140;
const parts = [];
for (let i = 0; i < POOL; i++) parts.push({ on: false, x: 0, y: 0, vx: 0, vy: 0, t: 0, life: 1, r: 3, col: '#fff', grav: 1, sh: 0, rot: 0, vr: 0 });
function spawnPart(x, y, vx, vy, life, r, col, grav, sh) {
    for (let i = 0; i < POOL; i++) {
        const p = parts[i];
        if (!p.on) {
            p.on = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
            p.t = 0; p.life = life; p.r = r; p.col = col; p.grav = grav === undefined ? 1 : grav;
            p.sh = sh || 0;
            p.rot = p.sh ? rand(0, Math.PI * 2) : 0;
            p.vr = p.sh ? rand(-8, 8) : 0;
            return;
        }
    }
}
function burst(x, y, n, cols, speed, life, grav) {
    for (let i = 0; i < n; i++) {
        const a = rand(0, Math.PI * 2), s = rand(speed * 0.3, speed);
        spawnPart(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(life * 0.6, life), rand(2.5, 6), cols[(Math.random() * cols.length) | 0], grav);
    }
}
/* confetti: chunky spinning rectangles fanned upward */
function confetti(x, y, n) {
    const cols = ['#FFE14D', '#FF5FA2', '#4FC3F7', '#7ED957', '#FFFFFF', '#FFB13D'];
    for (let i = 0; i < n; i++) {
        const a = rand(-Math.PI * 0.95, -Math.PI * 0.05), s = rand(260, 680);
        spawnPart(x + rand(-30, 30), y + rand(-20, 20), Math.cos(a) * s, Math.sin(a) * s,
            rand(0.9, 1.5), rand(3.2, 6), cols[(Math.random() * cols.length) | 0], 0.9, 1);
    }
}
function partsStep(dt) {
    for (let i = 0; i < POOL; i++) {
        const p = parts[i];
        if (!p.on) continue;
        p.t += dt;
        if (p.t >= p.life) { p.on = false; continue; }
        p.vy += 900 * p.grav * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if (p.sh) { p.rot += p.vr * dt; p.vx *= (1 - 1.4 * dt); }
    }
}

/* Layered celebration FX: expanding rings, radial rays, star glints.
   Small capped list — cheap strokes only, no gradients or filters. */
const fxList = [];
function addFx(type, x, y, delay, life) {
    if (fxList.length > 26) fxList.shift();
    fxList.push({ type, x, y, t: 0, delay: delay || 0, life: life || 0.7 });
}
function fxStep(dt) {
    for (let i = fxList.length - 1; i >= 0; i--) {
        const f = fxList[i];
        f.t += dt;
        if (f.t - f.delay > f.life) fxList.splice(i, 1);
    }
}
function celebrate(x, y) {
    addFx('ring', x, y, 0, 0.7);
    addFx('ring', x, y, 0.13, 0.7);
    addFx('ring', x, y, 0.26, 0.7);
    addFx('rays', x, y, 0.05, 0.9);
    for (let i = 0; i < 7; i++) addFx('glint', x + rand(-150, 150), y + rand(-130, 90), rand(0, 0.55), 0.6);
    confetti(x, y - 20, 36);
}

/* Trail ribbon */
const TRAIL_N = 22;
const trail = [];
for (let i = 0; i < TRAIL_N; i++) trail.push({ x: 0, y: 0, on: false });
let trailHead = 0, trailTick = 0;
function trailStep(dt) {
    trailTick += dt;
    if (trailTick < 0.016) return;
    trailTick = 0;
    const sp = Math.hypot(player.vx, player.vy);
    const p = trail[trailHead];
    p.x = player.x; p.y = player.y;
    p.on = sp > 420 && !player.dead;
    trailHead = (trailHead + 1) % TRAIL_N;
}
function trailClear() { for (const p of trail) p.on = false; }

function startAttempt(resetTimer) {

    player.hooked = false; player.anchor = null;
    player.lastAnchor = null; player.regrabT = 0;
    player.dead = false; player.deadT = 0;
    player.squash = 0;
    player.airT = 0;
    slowmo = 0;
    if (resetTimer !== false) {
        player.time = 0;
        player.starsGot = [false, false, false];
    }
    player.ringsUsed = level.rings.map(() => false);
    /* crumbled hooks regrow on every attempt */
    for (const a of level.anchors) { a.broken = false; if (a.amp) a.y = a.baseY; }
    ragReset();
    trailClear();
    camSnap();
    updateHudStars();
}
function loadLevel(n) {
    curLevel = clamp(n, 1, LEVEL_COUNT);
    level = buildLevel(curLevel);
    pal = palForLevel(curLevel);
    levelDeaths = 0;
    document.getElementById('hudLevel').textContent = 'LEVEL ' + curLevel;
    const bt = data.bestTimes[curLevel];
    document.getElementById('hudBest').textContent =
        (bt ? 'BEST ' + fmtTime(bt) + 's • ' : '') + '⚡ GOAL ' + fmtTime(level.par) + 's';
    startAttempt(true);
}

let nearMissTimer = 0;
function showNearMiss(msg) {
    const el = document.getElementById('nearMiss');
    el.textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth;   /* restart the pop animation */
    el.classList.add('show');
    clearTimeout(nearMissTimer);
    nearMissTimer = setTimeout(() => el.classList.remove('show'), 1500);
}
function die() {
    if (player.dead) return;
    player.dead = true;
    player.deadT = 0;
    player.hooked = false;
    levelDeaths++;
    sfxSplat();
    addTrauma(0.45);
    burst(player.x, player.y, 26, ['#8F7BFF', '#FFE14D', '#FFFFFF', pal.goo], 460, 0.7, 1);
    /* near-miss psychology: show how close they got */
    const pct = clamp(Math.round(player.x / level.finishX * 100), 0, 99);
    if (pct >= 90) showNearMiss('SO CLOSE! ' + pct + '% there!');
    else if (pct >= 55) showNearMiss(pct + '% there — go again!');
    state = State.DEAD;
}

function clearLevel() {
    state = State.CLEAR;
    sfxFanfare();
    addTrauma(0.2);
    /* layered celebration: confetti + rings + rays + glints at the flag */
    const fsp = Math.hypot(player.vx, player.vy);
    burst(player.x, player.y, 24, ['#FFE14D', '#FF5FA2', '#4FC3F7', '#7ED957', '#FFFFFF'], 520, 1.1, 0.5);
    celebrate(player.x, player.y);
    if (fsp > 900) addFloat(player.x, player.y - 80, 'SUPER SPEED!', '#4DFFDF');

    const t = Math.round(player.time * 10) / 10;
    const prevBest = data.bestTimes[curLevel];
    const isNewBest = !prevBest || t < prevBest;
    if (isNewBest) data.bestTimes[curLevel] = t;

    /* bank stars (union with previously earned) */
    const banked = data.stars[curLevel] || [false, false, false];
    const newStars = [];
    for (let i = 0; i < 3; i++) {
        if (player.starsGot[i] && !banked[i]) newStars.push(i);
        banked[i] = banked[i] || player.starsGot[i];
    }
    data.stars[curLevel] = banked;

    /* unlock next */
    if (curLevel < LEVEL_COUNT) data.unlocked = Math.max(data.unlocked, curLevel + 1);
    data.totalPlays++;
    data.lastPlayed = new Date().toISOString().slice(0, 10);

    const totalStars = countTotalStars();
    data.highScore = Math.max(data.highScore, totalStars);
    saveData();

    /* shared profile: score = total banked stars */
    const earned = WoopProfile.reportRun(SLUG, totalStars, STICKER_THRESHOLDS);
    if (earned.length) showStickerToast(earned);

    /* fill the clear panel */
    document.getElementById('clearTitle').textContent =
        curLevel === LEVEL_COUNT ? 'ALL 20 CLEAR! 🎉' : 'LEVEL ' + curLevel + ' CLEAR!';
    const starEls = document.getElementById('clearStars').children;
    for (let i = 0; i < 3; i++) {
        starEls[i].className = banked[i] ? (newStars.includes(i) ? 'earn' : '') : 'off';
        starEls[i].style.animationDelay = (0.15 + i * 0.18) + 's';
    }
    document.getElementById('clearTime').textContent = fmtTime(t) + 's';
    document.getElementById('clearBest').textContent = 'Best: ' + fmtTime(data.bestTimes[curLevel]) + 's';
    const goalEl = document.getElementById('clearGoal');
    const beatPar = t <= level.par;
    goalEl.textContent = beatPar ? '⚡ Goal ' + fmtTime(level.par) + 's — BEATEN!' : '⚡ Goal: ' + fmtTime(level.par) + 's';
    goalEl.className = beatPar ? 'beat' : '';
    document.getElementById('flawless').style.display = levelDeaths === 0 ? 'block' : 'none';
    document.getElementById('newBest').style.display = isNewBest && prevBest ? 'block' : 'none';
    document.getElementById('nextBtn').textContent = curLevel === LEVEL_COUNT ? 'PLAY AGAIN ↻' : 'NEXT ▶';
    document.getElementById('clearPanel').classList.add('show');
    document.getElementById('hud').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'none';
}
function countTotalStars() {
    let n = 0;
    for (const k in data.stars) for (const b of data.stars[k]) if (b) n++;
    return n;
}
function showStickerToast(tiers) {
    const names = { bronze: '🥉 Bronze', silver: '🥈 Silver', gold: '🥇 Gold' };
    const el = document.getElementById('stickerToast');
    el.textContent = 'Sticker earned: ' + tiers.map(t => names[t]).join(' + ') + '!';
    el.classList.add('show');

}

/* ================= The rope: targeting + physics ================= */
function findTarget() {
    /* Best anchor: ahead-ish, in range, scored by distance + how far behind it is.
       Generous on purpose — the skill is WHEN you release, not aiming. */
    let best = null, bestScore = Infinity;
    for (const a of level.anchors) {
        if (a.broken) continue;   /* crumbled hooks are gone this attempt */
        if (player.regrabT > 0 && a === player.lastAnchor) continue;
        const dx = a.x - player.x, dy = a.y - player.y;
        if (dx < -60) continue;               /* don't grab behind you */
        if (dy > 40) continue;                /* only hooks above-ish */
        const d = Math.hypot(dx, dy);
        if (d > GRAB_RANGE || d < 40) continue;
        const score = d + Math.max(0, -dx) * 2.2;
        if (score < bestScore) { bestScore = score; best = a; }
    }
    return best;
}

let holding = false;
function tryHook() {
    if (state !== State.PLAYING || player.dead || player.hooked) return;
    const a = findTarget();
    if (!a) return;
    player.hooked = true;
    player.anchor = a;
    player.ropeLen = Math.hypot(a.x - player.x, a.y - player.y);
    player.squash = 1;
    if (player.airT > 1.6) addFloat(player.x, player.y - 50, 'BIG AIR!', '#FFFFFF');
    player.airT = 0;
    sfxAttach();
    burst(a.x, a.y, 6, [pal.anchor, '#FFFFFF'], 200, 0.4, 0.4);
    if (hintStage === 0 && curLevel === 1) { hintStage = 1; hintEl.textContent = 'RELEASE to fly!'; }
}
function unhook() {
    if (!player.hooked) return;
    const ax = player.anchor.x, ay = player.anchor.y;
    player.lastAnchor = player.anchor;
    player.regrabT = 0.4;
    player.hooked = false;
    player.anchor = null;
    const sp = Math.hypot(player.vx, player.vy);
    sfxRelease(sp);
    /* crumble hooks break the moment you let go of them */
    if (player.lastAnchor.crumble && !player.lastAnchor.broken) {
        player.lastAnchor.broken = true;
        sfxCrack();
        burst(ax, ay, 10, ['#FFB13D', '#2B2350', '#FFFFFF'], 300, 0.6, 1);
    }
    /* perfect launch: brief time-dilation + camera zoom punch */
    if (sp > 1020) {
        slowmo = 0.18;
        zoomPunch = 0.07;
        burst(player.x, player.y, 5, ['#FFFFFF'], 220, 0.35, 0);
    }
    if (hintStage === 1) { hintStage = 2; hintEl.style.display = 'none'; }
}

/* ================= Physics (fixed 120Hz steps) ================= */
function physStep(dt) {
    if (player.dead) return;
    if (player.regrabT > 0) player.regrabT -= dt;

    /* moving anchors bob on their vertical track (amp pre-clamped so the
       worst-case hook gap always stays under grab range) */
    for (const a of level.anchors) {
        if (a.amp) a.y = a.baseY + Math.sin(player.time * a.spd + a.ph) * a.amp;
    }

    /* gravity + drag */
    player.vy += GRAVITY * dt;
    const drag = 1 - AIR_DRAG * dt;
    player.vx *= drag;
    player.vy *= drag;

    /* wind columns: gentle updraft, pure assist (capped so it can't fling) */
    for (const w of level.winds) {
        if (player.x > w.x && player.x < w.x + w.w && player.y > 40 && player.vy > -640) {
            player.vy -= w.str * dt;
        }
    }

    /* integrate */
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    if (!player.hooked) player.airT += dt;

    /* rope constraint: one-sided (rope, not rod) + slow reel-in for energy */
    if (player.hooked) {
        const a = player.anchor;
        player.ropeLen = Math.max(MIN_ROPE, player.ropeLen - REEL_RATE * dt);
        const dx = player.x - a.x, dy = player.y - a.y;
        const d = Math.hypot(dx, dy) || 0.001;
        {
            /* auto-pump: amplify the current swing (energy always grows);
               from a dead hang, push toward the +x tangent to get going */
            const nx0 = dx / d, ny0 = dy / d;
            const tx = -ny0, ty = nx0;
            const tSpeed = player.vx * tx + player.vy * ty;
            const dir = Math.abs(tSpeed) < 120 ? (tx >= 0 ? 1 : -1) : Math.sign(tSpeed);
            /* pump only up to a hooked speed cap: swings always build from a
               dead hang, but holding forever can't wind up runaway loops */
            if (Math.abs(tSpeed) < 950) {
                player.vx += tx * SWING_PUMP * dt * dir;
                player.vy += ty * SWING_PUMP * dt * dir;
            }
        }
        if (d > player.ropeLen) {
            const nx = dx / d, ny = dy / d;
            player.x = a.x + nx * player.ropeLen;
            player.y = a.y + ny * player.ropeLen;
            /* kill outward radial velocity, keep tangential (the swing) */
            const vr = player.vx * nx + player.vy * ny;
            if (vr > 0) {
                player.vx -= nx * vr;
                player.vy -= ny * vr;
            }
        }
    }

    /* speed cap */
    const sp = Math.hypot(player.vx, player.vy);
    if (sp > MAX_SPEED) {
        const k = MAX_SPEED / sp;
        player.vx *= k; player.vy *= k;
    }

    /* --- collisions --- */
    /* bounce pads */
    for (const pad of level.pads) {
        if (player.vy > 0 &&
            player.x > pad.x - 8 && player.x < pad.x + pad.w + 8 &&
            player.y + PLAYER_R > pad.y && player.y + PLAYER_R < pad.y + 42) {
            player.y = pad.y - PLAYER_R;
            player.vy = -Math.max(Math.abs(player.vy) * 0.88, 560);
            player.vx += 40;   /* nudge toward the flag */
            if (player.airT > 1.6) addFloat(player.x, player.y - 50, 'BIG AIR!', '#FFFFFF');
            player.airT = 0;
            player.squash = 1;
            pad.hit = 0.001;   /* squash animation timer */
            sfxBoing();
            burst(player.x, pad.y, 8, ['#FFFFFF', pal.anchor], 260, 0.5, 1);
        }
    }
    /* saws */
    const tNow = player.time;
    for (const s of level.saws) {
        const sy = s.y + (s.amp ? Math.sin(tNow * s.spd + s.ph) * s.amp : 0);
        if (dist2(player.x, player.y, s.x, sy) < (s.r + PLAYER_R - 3) * (s.r + PLAYER_R - 3)) {
            die();
            return;
        }
    }
    /* stars */
    for (let i = 0; i < 3; i++) {
        if (player.starsGot[i]) continue;
        const st = level.stars[i];
        if (dist2(player.x, player.y, st.x, st.y) < 34 * 34) {
            player.starsGot[i] = true;
            sfxStar(player.starsGot.filter(Boolean).length);
            burst(st.x, st.y, 14, ['#FFE14D', '#FFFFFF', '#FFB13D'], 320, 0.7, 0.3);
            addFloat(st.x, st.y - 40, '⭐', '#FFE14D');
            updateHudStars();
        }
    }
    /* boost rings */
    for (let i = 0; i < level.rings.length; i++) {
        if (player.ringsUsed[i]) continue;
        const rg = level.rings[i];
        if (dist2(player.x, player.y, rg.x, rg.y) < rg.r * rg.r) {
            player.ringsUsed[i] = true;
            const s2 = Math.hypot(player.vx, player.vy) || 1;
            const boost = Math.max(s2 * 1.18, 980);
            player.vx = (player.vx / s2) * boost;
            player.vy = (player.vy / s2) * boost - 60;
            sfxRing();
            addTrauma(0.15);
            burst(rg.x, rg.y, 12, ['#4DFFDF', '#FFFFFF', pal.anchor], 380, 0.6, 0.2);
        }
    }
    /* goo (kill plane) */
    if (player.y > GOO_Y - PLAYER_R) {
        player.y = GOO_Y - PLAYER_R;
        die();
        return;
    }
    /* soft ceiling so flings can't leave the world */
    if (player.y < -160) { player.y = -160; if (player.vy < 0) player.vy = 0; }
    /* left wall */
    if (player.x < PLAYER_R + 8) { player.x = PLAYER_R + 8; if (player.vx < 0) player.vx = Math.abs(player.vx) * 0.4; }

    /* finish line */
    if (player.x >= level.finishX) {
        clearLevel();
    }
}

/* ================= Update ================= */
let phys_acc = 0;
let rushT = 0;   /* air-rush particle spawn throttle */
function update(dt) {
    trauma = Math.max(0, trauma - dt * 1.7);

    if (state === State.PLAYING) {
        player.time += dt;
        player.squash = Math.max(0, player.squash - dt * 4);
        /* time-dilation after a perfect launch: physics (and ragdoll) run at
           45% for a beat — the attempt timer keeps counting real time. */
        const tdt = slowmo > 0 ? dt * 0.45 : dt;
        slowmo = Math.max(0, slowmo - dt);
        phys_acc += tdt;
        let steps = 0;
        while (phys_acc >= PHYS_STEP && steps < 8) {
            physStep(PHYS_STEP);
            phys_acc -= PHYS_STEP;
            steps++;
            if (state !== State.PLAYING) break;   /* died or cleared mid-step */
        }
        ragStep(tdt);
        trailStep(tdt);
        camStep(dt);
        /* air-rush streaks behind the body at high speed */
        rushT += dt;
        const rsp = Math.hypot(player.vx, player.vy);
        if (rsp > 1000 && rushT > 0.05) {
            rushT = 0;
            const rdx = player.vx / rsp, rdy = player.vy / rsp;
            spawnPart(player.x - rdx * 22 + rand(-9, 9), player.y - rdy * 22 + rand(-9, 9),
                -rdx * 170 + rand(-40, 40), -rdy * 170 + rand(-40, 40), 0.3, 2.6, '#FFFFFF', 0);
        }
        /* HUD timer */
        hudTimeEl.textContent = fmtTime(Math.round(player.time * 10) / 10);
        /* pad squash timers */
        for (const pad of level.pads) if (pad.hit) { pad.hit += dt; if (pad.hit > 0.3) pad.hit = 0; }
    } else if (state === State.DEAD) {
        player.deadT += dt;
        ragStep(dt);
        if (player.deadT >= RESPAWN_DELAY) {
            startAttempt(true);
            state = State.PLAYING;
        }
    } else if (state === State.MENU) {
        /* attract mode: gentle idle swing on the title screen */
        menuT += dt;
        camStep(dt);
    }
    partsStep(dt);
    fxStep(dt);
    for (let i = floats.length - 1; i >= 0; i--) {
        floats[i].t += dt;
        if (floats[i].t > 1) floats.splice(i, 1);
    }
}

/* ================= Render ================= */
let menuT = 0;
const hudTimeEl = document.getElementById('hudTime');

function worldTransform() {
    const s = (ch / VIEW_H) * cam.zoom;
    const shakeK = trauma * trauma;
    const sx = (Math.random() * 2 - 1) * 9 * shakeK;
    const sy = (Math.random() * 2 - 1) * 9 * shakeK;
    ctx.setTransform(s * dpr, 0, 0, s * dpr, (cw * 0.38 - cam.x * s + sx) * dpr, (ch * 0.5 - cam.y * s + sy) * dpr);
    return s;
}

/* sky gradient is cached — rebuilt only when the palette or height changes,
   never inside the frame loop */
let skyGrad = null, skyGradKey = '';
function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    /* sky */
    const skyKey = pal.skyTop + '|' + pal.skyBot + '|' + ch;
    if (skyKey !== skyGradKey) {
        skyGrad = ctx.createLinearGradient(0, 0, 0, ch);
        skyGrad.addColorStop(0, pal.skyTop);
        skyGrad.addColorStop(1, pal.skyBot);
        skyGradKey = skyKey;
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, cw, ch);

    /* parallax clouds + hills (screen space, offset by camera) */
    drawBackdrop();

    const s = worldTransform();
    const viewL = cam.x - cw * 0.38 / s - 80;
    const viewR = cam.x + cw * 0.62 / s + 80;

    /* drifting atmosphere motes: world-anchored, tiled — fills the sky band
       with depth. Tile index via Math.floor (safe on negative coords). */
    {
        const mt = performance.now() / 1000;
        const P = 1600;
        ctx.fillStyle = 'rgba(255,255,255,0.28)';
        for (let i = 0; i < 10; i++) {
            const ox = (i * 431) % P;
            const oy = 80 + (i * 173) % 460;
            const bob = Math.sin(mt * 0.5 + i * 1.3) * 12;
            for (let kk = Math.floor((viewL - ox) / P); ox + kk * P <= viewR; kk++) {
                ctx.beginPath();
                ctx.arc(ox + kk * P, oy + bob, 2.2 + (i % 3), 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    drawGoo(viewL, viewR);
    drawFinish();
    drawWinds(viewL, viewR);

    /* bounce pads */
    for (const pad of level.pads) {
        if (pad.x + pad.w < viewL || pad.x > viewR) continue;
        const sq = pad.hit ? Math.sin((pad.hit / 0.3) * Math.PI) : 0;
        const py = pad.y + sq * 8;
        ctx.fillStyle = '#2B2350';
        rr(ctx, pad.x, py + 10, pad.w, 16, 8); ctx.fill();
        ctx.fillStyle = '#FF5FA2';
        rr(ctx, pad.x - 4, py - 4 + sq * 4, pad.w + 8, 18 - sq * 6, 9); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        rr(ctx, pad.x + 8, py - 1 + sq * 4, pad.w - 16, 5, 3); ctx.fill();
    }

    /* boost rings */
    for (let i = 0; i < level.rings.length; i++) {
        const rg = level.rings[i];
        if (rg.x < viewL || rg.x > viewR) continue;
        const used = player.ringsUsed[i];
        const pulse = 1 + Math.sin(performance.now() / 240 + i) * 0.06;
        ctx.lineWidth = used ? 5 : 10;
        ctx.strokeStyle = used ? 'rgba(255,255,255,0.25)' : '#4DFFDF';
        ctx.beginPath();
        ctx.arc(rg.x, rg.y, rg.r * pulse, 0, Math.PI * 2);
        ctx.stroke();
        if (!used) {
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.arc(rg.x, rg.y, rg.r * pulse - 9, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    /* saws */
    const tNow = player.time;
    for (const sw of level.saws) {
        if (sw.x < viewL || sw.x > viewR) continue;
        const sy = sw.y + (sw.amp ? Math.sin(tNow * sw.spd + sw.ph) * sw.amp : 0);
        drawSaw(sw.x, sy, sw.r);
    }

    /* stars */
    for (let i = 0; i < 3; i++) {
        if (player.starsGot[i]) continue;
        const st = level.stars[i];
        if (st.x < viewL || st.x > viewR) continue;
        const bob = Math.sin(performance.now() / 300 + i * 2) * 6;
        drawStar(st.x, st.y + bob, 20, '#FFE14D', '#E8A400');
    }

    /* anchors (hooks) + target highlight */
    const target = (state === State.PLAYING && !player.hooked && !player.dead) ? findTarget() : null;
    for (const a of level.anchors) {
        if (a.x < viewL || a.x > viewR) continue;
        /* moving hooks show their track so the bob reads as intentional */
        if (a.amp) {
            ctx.strokeStyle = 'rgba(43,35,80,0.28)';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(a.x, a.baseY - a.amp - 6);
            ctx.lineTo(a.x, a.baseY + a.amp + 6);
            ctx.stroke();
        }
        if (a.broken) {
            /* crumbled stub — clearly not grabbable */
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = '#5A5470';
            ctx.beginPath(); ctx.arc(a.x, a.y, 9, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            continue;
        }
        const isT = a === target;
        const isH = player.hooked && a === player.anchor;
        /* pin */
        ctx.fillStyle = '#2B2350';
        ctx.beginPath(); ctx.arc(a.x, a.y, 16, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = isH ? '#FFFFFF' : (a.crumble ? '#FFB13D' : pal.anchor);
        ctx.beginPath(); ctx.arc(a.x, a.y, 10, 0, Math.PI * 2); ctx.fill();
        if (a.crumble) {
            /* crack marks: one-use hooks read as fragile at a glance */
            ctx.strokeStyle = '#2B2350';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(a.x - 6, a.y - 3); ctx.lineTo(a.x - 1, a.y); ctx.lineTo(a.x - 5, a.y + 6);
            ctx.moveTo(a.x + 6, a.y - 5); ctx.lineTo(a.x + 3, a.y + 1);
            ctx.stroke();
        }
        if (isT) {
            const pu = 1 + Math.sin(performance.now() / 160) * 0.14;
            ctx.lineWidth = 5;
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.beginPath(); ctx.arc(a.x, a.y, 27 * pu, 0, Math.PI * 2); ctx.stroke();
        }
    }

    /* trail ribbon */
    drawTrail();

    /* rope */
    if (player.hooked) {
        const a = player.anchor;
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#2B2350';
        ctx.lineCap = 'round';
        const d = Math.hypot(player.x - a.x, player.y - a.y);
        const slack = Math.max(0, player.ropeLen - d);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        if (slack > 4) {
            /* saggy rope when slack */
            const mx = (a.x + player.x) / 2, my = (a.y + player.y) / 2 + slack * 0.8;
            ctx.quadraticCurveTo(mx, my, player.x, player.y);
        } else {
            ctx.lineTo(player.x, player.y);
        }
        ctx.stroke();
        /* bright core so the rope reads taut and shiny */
        ctx.lineWidth = 1.6;
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.stroke();
    }

    /* player */
    if (!(state === State.DEAD && player.deadT > 0.1)) drawPlayer();

    /* particles (circles + spinning confetti rects) */
    for (let i = 0; i < POOL; i++) {
        const p = parts[i];
        if (!p.on) continue;
        const k = 1 - p.t / p.life;
        ctx.globalAlpha = k;
        ctx.fillStyle = p.col;
        if (p.sh) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.r, -p.r * 0.6, p.r * 2, p.r * 1.2);
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r * k + 1, 0, Math.PI * 2); ctx.fill();
        }
    }
    ctx.globalAlpha = 1;

    /* celebration fx layer (rings / rays / glints) */
    drawFx();

    /* floating texts */
    ctx.textAlign = 'center';
    ctx.font = '800 34px Nunito, sans-serif';
    for (const f of floats) {
        ctx.globalAlpha = 1 - f.t;
        ctx.fillStyle = f.col;
        ctx.fillText(f.txt, f.x, f.y - f.t * 50);
    }
    ctx.globalAlpha = 1;

    /* speed lines (screen space) */
    drawSpeedLines();
    /* level intro banner: level number + goal time, first 2 seconds */
    drawIntro();
}

function drawBackdrop() {
    /* sun / moon (fixed sky position, subtle glow ring — no shadowBlur) */
    ctx.fillStyle = pal.sun;
    const sunX = (cw * 0.8) | 0, sunY = (ch * 0.15) | 0;
    ctx.globalAlpha = 0.22;
    ctx.beginPath(); ctx.arc(sunX, sunY, 56, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(sunX, sunY, 34, 0, Math.PI * 2); ctx.fill();
    if (pal.night) {
        /* crescent bite + twinkling stars */
        ctx.fillStyle = pal.skyTop;
        ctx.beginPath(); ctx.arc(sunX + 13, sunY - 8, 27, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        const tw = performance.now() / 700;
        for (let i = 0; i < 14; i++) {
            const sx = (((i * 379 - cam.x * 0.08) % cw) + cw) % cw;
            const sy2 = 24 + (i * 131) % ((ch * 0.5) | 0);
            const a = 0.35 + 0.4 * Math.abs(Math.sin(tw + i * 1.7));
            ctx.globalAlpha = a;
            ctx.fillRect(sx | 0, sy2 | 0, 3, 3);
        }
        ctx.globalAlpha = 1;
    }
    /* clouds */
    ctx.fillStyle = pal.cloud;
    const cx0 = cam.x * 0.25;
    for (let i = 0; i < 5; i++) {
        const wx = ((i * 467 - cx0) % (cw + 300) + cw + 300) % (cw + 300) - 150;
        const wy = 60 + (i * 97) % 180;
        ctx.beginPath();
        ctx.arc(wx, wy, 32, 0, Math.PI * 2);
        ctx.arc(wx + 34, wy + 8, 24, 0, Math.PI * 2);
        ctx.arc(wx - 32, wy + 10, 22, 0, Math.PI * 2);
        ctx.fill();
    }
    /* distant ridge — slowest parallax layer for depth */
    const fx0 = cam.x * 0.28;
    ctx.fillStyle = pal.far;
    ctx.beginPath();
    ctx.moveTo(0, ch);
    for (let x = 0; x <= cw + 60; x += 60) {
        ctx.lineTo(x, ch * 0.66 + Math.sin((x + fx0) / 340) * 52 + Math.sin((x + fx0) / 90) * 9);
    }
    ctx.lineTo(cw, ch);
    ctx.closePath();
    ctx.fill();
    /* far hills */
    const hx = cam.x * 0.45;
    ctx.fillStyle = pal.hillA;
    ctx.beginPath();
    ctx.moveTo(0, ch);
    for (let x = 0; x <= cw + 40; x += 40) {
        ctx.lineTo(x, ch * 0.78 + Math.sin((x + hx) / 210) * 44);
    }
    ctx.lineTo(cw, ch);
    ctx.closePath();
    ctx.fill();
    /* near hills */
    const hx2 = cam.x * 0.65;
    ctx.fillStyle = pal.hillB;
    ctx.beginPath();
    ctx.moveTo(0, ch);
    for (let x = 0; x <= cw + 40; x += 40) {
        ctx.lineTo(x, ch * 0.88 + Math.sin((x + hx2) / 150 + 2) * 34);
    }
    ctx.lineTo(cw, ch);
    ctx.closePath();
    ctx.fill();
}

function drawGoo(viewL, viewR) {
    const t = performance.now() / 500;
    ctx.fillStyle = pal.goo;
    ctx.beginPath();
    ctx.moveTo(viewL, GOO_Y + 400);
    for (let x = viewL; x <= viewR; x += 34) {
        ctx.lineTo(x, GOO_Y + Math.sin(x / 70 + t) * 8);
    }
    ctx.lineTo(viewR, GOO_Y + 400);
    ctx.closePath();
    ctx.fill();
    /* darker underlayer bubbles */
    ctx.fillStyle = pal.gooDark;
    for (let x = Math.floor(viewL / 120) * 120; x <= viewR; x += 120) {
        const ix = Math.abs(x / 120);
        const by = GOO_Y + 30 + (ix % 3) * 14;
        const br = 8 + (ix % 4) * 3;
        ctx.beginPath();
        ctx.arc(x + Math.sin(t + x) * 8, by, br, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawWinds(viewL, viewR) {
    if (!level.winds || !level.winds.length) return;
    const now = performance.now();
    for (let wi = 0; wi < level.winds.length; wi++) {
        const w = level.winds[wi];
        if (w.x + w.w < viewL || w.x > viewR) continue;
        /* soft column */
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.fillRect(w.x | 0, 40, w.w | 0, GOO_Y - 70);
        /* rising streaks — all modulo inputs kept positive (abs-guarded) */
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        const span = Math.max(1, (w.w - 28) | 0);
        for (let j = 0; j < 6; j++) {
            const colX = w.x + 14 + Math.abs((j * 97 + wi * 41) % span);
            const yy = GOO_Y - 40 - Math.abs((now * (0.2 + (j % 3) * 0.07) + j * 173 + wi * 311) % 600);
            const ln = 24 + (j % 3) * 12;
            ctx.globalAlpha = 0.2 + 0.18 * (j % 3);
            ctx.beginPath();
            ctx.moveTo(colX, yy + ln);
            ctx.lineTo(colX, yy);
            /* arrow tip */
            ctx.moveTo(colX - 5, yy + 7);
            ctx.lineTo(colX, yy);
            ctx.lineTo(colX + 5, yy + 7);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }
}

function drawFinish() {
    const fx = level.finishX;
    /* pole */
    ctx.fillStyle = '#2B2350';
    rr(ctx, fx - 5, 60, 10, GOO_Y - 60, 5); ctx.fill();
    /* waving flag */
    const wv = Math.sin(performance.now() / 260) * 8;
    ctx.fillStyle = '#FFE14D';
    ctx.beginPath();
    ctx.moveTo(fx + 5, 70);
    ctx.quadraticCurveTo(fx + 60, 84 + wv, fx + 96, 74 + wv);
    ctx.lineTo(fx + 96, 118 + wv);
    ctx.quadraticCurveTo(fx + 60, 128 + wv, fx + 5, 114);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#2B2350';
    ctx.font = '800 30px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏁', fx + 48, 106 + wv);
}

function drawSaw(x, y, r) {
    const rot = performance.now() / 130;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    /* teeth */
    ctx.fillStyle = '#C9CFE8';
    ctx.beginPath();
    const teeth = 10;
    for (let i = 0; i < teeth; i++) {
        const a1 = (i / teeth) * Math.PI * 2;
        const a2 = ((i + 0.5) / teeth) * Math.PI * 2;
        const a3 = ((i + 1) / teeth) * Math.PI * 2;
        ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
        ctx.lineTo(Math.cos(a2) * (r + 10), Math.sin(a2) * (r + 10));
        ctx.lineTo(Math.cos(a3) * r, Math.sin(a3) * r);
    }
    ctx.closePath();
    ctx.fill();
    /* body */
    ctx.fillStyle = '#8E97BD';
    ctx.beginPath(); ctx.arc(0, 0, r - 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2B2350';
    ctx.beginPath(); ctx.arc(0, 0, r * 0.36, 0, Math.PI * 2); ctx.fill();
    /* cartoon grumpy eyes so it reads as a character, not gore */
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath(); ctx.arc(-6, -4, 5, 0, Math.PI * 2); ctx.arc(6, -4, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2B2350';
    ctx.beginPath(); ctx.arc(-6, -4, 2.4, 0, Math.PI * 2); ctx.arc(6, -4, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawStar(x, y, r, fill, edge) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(performance.now() / 400) * 0.14);
    ctx.fillStyle = fill;
    ctx.strokeStyle = edge;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
        const rr2 = i % 2 === 0 ? r : r * 0.46;
        const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        ctx.lineTo(Math.cos(a) * rr2, Math.sin(a) * rr2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
}

function drawTrail() {
    ctx.lineCap = 'round';
    for (let i = 0; i < TRAIL_N - 1; i++) {
        const a = trail[(trailHead + i) % TRAIL_N];
        const b = trail[(trailHead + i + 1) % TRAIL_N];
        if (!a.on || !b.on) continue;
        const k = i / TRAIL_N;
        ctx.globalAlpha = k * 0.5;
        ctx.lineWidth = 2 + k * 9;
        ctx.strokeStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

function drawFx() {
    for (const f of fxList) {
        const t = f.t - f.delay;
        if (t < 0) continue;
        const k = clamp(t / f.life, 0, 1);
        if (f.type === 'ring') {
            const r = Math.max(1, 22 + k * 200);
            ctx.globalAlpha = (1 - k) * 0.85;
            ctx.lineWidth = 2 + 9 * (1 - k);
            ctx.strokeStyle = '#FFFFFF';
            ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2); ctx.stroke();
        } else if (f.type === 'rays') {
            ctx.globalAlpha = (1 - k) * 0.7;
            ctx.strokeStyle = '#FFE14D';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            for (let i = 0; i < 10; i++) {
                const a = (i / 10) * Math.PI * 2 + k * 0.7;
                const r1 = 34 + k * 160;
                const r2 = r1 + 12 + 48 * (1 - k);
                ctx.beginPath();
                ctx.moveTo(f.x + Math.cos(a) * r1, f.y + Math.sin(a) * r1);
                ctx.lineTo(f.x + Math.cos(a) * r2, f.y + Math.sin(a) * r2);
                ctx.stroke();
            }
        } else if (f.type === 'glint') {
            /* 4-point sparkle that scales in and out */
            const r = Math.max(0.5, Math.sin(k * Math.PI) * 15);
            ctx.globalAlpha = 0.95;
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.moveTo(f.x, f.y - r * 1.8);
            ctx.quadraticCurveTo(f.x + r * 0.35, f.y - r * 0.35, f.x + r * 1.8, f.y);
            ctx.quadraticCurveTo(f.x + r * 0.35, f.y + r * 0.35, f.x, f.y + r * 1.8);
            ctx.quadraticCurveTo(f.x - r * 0.35, f.y + r * 0.35, f.x - r * 1.8, f.y);
            ctx.quadraticCurveTo(f.x - r * 0.35, f.y - r * 0.35, f.x, f.y - r * 1.8);
            ctx.closePath();
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
}

function drawPlayer() {
    const sp = Math.hypot(player.vx, player.vy);
    const dirX = sp > 1 ? player.vx / sp : 1;
    const dirY = sp > 1 ? player.vy / sp : 0;

    /* ragdoll limbs behind the body */
    ctx.lineCap = 'round';
    for (let i = 0; i < LIMBS; i++) {
        const p = rag[i];
        const isScarf = i === 4;
        ctx.lineWidth = isScarf ? 8 : 7;
        ctx.strokeStyle = isScarf ? '#FF5FA2' : '#6B54E8';
        ctx.beginPath();
        ctx.moveTo(player.x - dirX * 4, player.y - dirY * 4);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        if (!isScarf) {
            ctx.fillStyle = '#FFE14D';   /* little mitts/boots */
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
        }
    }

    /* squash & stretch along velocity */
    const stretch = clamp(sp / MAX_SPEED, 0, 1) * 0.35 + player.squash * -0.25;
    const ang = Math.atan2(dirY, dirX);
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(ang);
    ctx.scale(1 + stretch, 1 - stretch * 0.6);
    ctx.rotate(-ang);

    /* body */
    ctx.fillStyle = '#8F7BFF';
    ctx.beginPath(); ctx.arc(0, 0, PLAYER_R + 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#A794FF';
    ctx.beginPath(); ctx.arc(-3, -4, PLAYER_R - 4, 0, Math.PI * 2); ctx.fill();

    /* face looks where you're going; expression tracks the moment:
       worried when plummeting, joy-squint at top speed, grin when fast */
    const fx = dirX * 4, fy = dirY * 4;
    const worried = !player.hooked && !player.dead && player.vy > 640;
    const thrilled = sp > 1150 && !worried;
    if (thrilled) {
        /* happy closed eyes (upside-down arcs) */
        ctx.strokeStyle = '#2B2350';
        ctx.lineWidth = 2.6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(fx - 4, fy - 2, 4.4, 1.1 * Math.PI, 1.9 * Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(fx + 5, fy - 2, 4.4, 1.1 * Math.PI, 1.9 * Math.PI);
        ctx.stroke();
    } else {
        ctx.fillStyle = '#FFFFFF';
        const er = worried ? 6.4 : 5.4;
        ctx.beginPath();
        ctx.arc(fx - 4, fy - 3, er, 0, Math.PI * 2);
        ctx.arc(fx + 5, fy - 3, er, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2B2350';
        const look = player.hooked ? 1.6 : 2.2;
        const pr = worried ? 1.9 : 2.6;
        const pdy = worried ? 2.4 : dirY * look;
        const pdx = worried ? 0 : dirX * look;
        ctx.beginPath();
        ctx.arc(fx - 4 + pdx, fy - 3 + pdy, pr, 0, Math.PI * 2);
        ctx.arc(fx + 5 + pdx, fy - 3 + pdy, pr, 0, Math.PI * 2);
        ctx.fill();
    }
    /* rosy cheeks at speed */
    if (sp > 620 && !worried) {
        ctx.fillStyle = 'rgba(255,95,162,0.5)';
        ctx.beginPath();
        ctx.arc(fx - 9, fy + 3, 2.6, 0, Math.PI * 2);
        ctx.arc(fx + 10, fy + 3, 2.6, 0, Math.PI * 2);
        ctx.fill();
    }
    /* mouth: big grin when fast, wobbly o when worried, small o when slow */
    ctx.strokeStyle = '#2B2350';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    if (worried) {
        const wob = Math.sin(performance.now() / 60) * 0.8;
        ctx.arc(fx, fy + 6 + wob, 3.4, 0, Math.PI * 2);
    } else if (sp > 620) {
        ctx.arc(fx, fy + 5, thrilled ? 6 : 5, 0.15 * Math.PI, 0.85 * Math.PI);
    } else {
        ctx.arc(fx, fy + 6, 2.6, 0, Math.PI * 2);
    }
    ctx.stroke();
    ctx.restore();
}

function drawSpeedLines() {
    const sp = Math.hypot(player.vx, player.vy);
    if (state !== State.PLAYING || sp < 880) return;
    const k = clamp((sp - 880) / (MAX_SPEED - 880), 0, 1);
    /* streaks aligned with the travel direction, denser toward screen edges
       so the middle stays readable. All modulo inputs are non-negative. */
    const ang = Math.atan2(player.vy, player.vx);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.save();
    ctx.translate((cw / 2) | 0, (ch / 2) | 0);
    ctx.rotate(ang);
    const diag = Math.max(1, Math.hypot(cw, ch));
    const n = (4 + k * 6) | 0;
    const now = performance.now();
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineCap = 'round';
    for (let i = 0; i < n; i++) {
        const off = Math.abs((i * 379 + 131) % (diag | 0)) - diag / 2;
        const edge = clamp(Math.abs(off) / (diag * 0.5), 0, 1);
        ctx.globalAlpha = (0.07 + 0.3 * edge) * k;
        ctx.lineWidth = 2 + edge * 3;
        const len = 70 + k * 160 + edge * 60;
        const x = diag / 2 - Math.abs((now * (0.9 + i * 0.14)) % (diag + len));
        ctx.beginPath();
        ctx.moveTo(x, off);
        ctx.lineTo(x - len, off);
        ctx.stroke();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
}

function drawIntro() {
    if (state !== State.PLAYING || player.time > 2.1) return;
    const t = player.time;
    const aIn = clamp(t / 0.22, 0, 1);
    const aOut = clamp((2.1 - t) / 0.4, 0, 1);
    const a = Math.min(aIn, aOut);
    if (a <= 0) return;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.textAlign = 'center';
    ctx.globalAlpha = a;
    const y = (ch * 0.3 - (1 - aIn) * 26) | 0;
    const big = Math.min(44, cw * 0.1) | 0;
    ctx.font = '800 ' + big + 'px Nunito, sans-serif';
    ctx.fillStyle = 'rgba(43,35,80,0.35)';
    ctx.fillText('LEVEL ' + curLevel, (cw / 2) | 0, y + 3);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText('LEVEL ' + curLevel, (cw / 2) | 0, y);
    ctx.font = '800 ' + ((big * 0.48) | 0) + 'px Nunito, sans-serif';
    ctx.fillStyle = '#FFE14D';
    ctx.fillText('⚡ BEAT ' + fmtTime(level.par) + 's', (cw / 2) | 0, y + big * 0.85);
    ctx.globalAlpha = 1;
}

/* ================= HUD / panels ================= */
function updateHudStars() {
    const el = document.getElementById('hudStars').children;
    for (let i = 0; i < 3; i++) el[i].className = player.starsGot[i] ? '' : 'off';
}
function refreshStartPanel() {
    /* keep the menu backdrop in sync with the picked level's world */
    if (level.idx !== curLevel) {
        level = buildLevel(curLevel);
        pal = palForLevel(curLevel);
        startAttempt(true);
        camSnap();
    }
    const lbl = document.getElementById('lvlLabel');
    const st = data.stars[curLevel] || [false, false, false];
    lbl.querySelector('.n').textContent = 'LEVEL ' + curLevel;
    lbl.querySelector('.s').innerHTML = st.map(b => '<span class="' + (b ? '' : 'off') + '">⭐</span>').join('');
    const bt = data.bestTimes[curLevel];
    const beat = bt && bt <= PARS[curLevel];
    lbl.querySelector('.t').textContent =
        (bt ? 'Best ' + fmtTime(bt) + 's • ' : '') + '⚡ Goal ' + fmtTime(PARS[curLevel]) + 's' + (beat ? ' ✔' : '');
    document.getElementById('worldLine').textContent = palForLevel(curLevel).name;
    document.getElementById('lvlPrev').disabled = curLevel <= 1;
    document.getElementById('lvlNext').disabled = curLevel >= Math.min(data.unlocked, LEVEL_COUNT);
    document.getElementById('totalStarsLine').textContent = '⭐ ' + countTotalStars() + ' / ' + (LEVEL_COUNT * 3) + ' stars collected';
}
function showMenu() {
    state = State.MENU;
    document.getElementById('startPanel').classList.add('show');
    document.getElementById('clearPanel').classList.remove('show');
    document.getElementById('pausePanel').classList.remove('show');
    document.getElementById('hud').style.display = 'none';
    document.getElementById('pauseBtn').style.display = 'none';
    hintEl.style.display = 'none';
    refreshStartPanel();
}
function startPlay() {
    ensureAudio();
    document.getElementById('startPanel').classList.remove('show');
    document.getElementById('clearPanel').classList.remove('show');
    document.getElementById('pausePanel').classList.remove('show');
    document.getElementById('hud').style.display = 'block';
    document.getElementById('pauseBtn').style.display = 'flex';
    loadLevel(curLevel);
    state = State.PLAYING;
    if (curLevel === 1 && hintStage < 2) {
        hintStage = 0;
        hintEl.textContent = 'HOLD to hook!';
        hintEl.style.display = 'block';
    } else {
        hintEl.style.display = 'none';
    }
}

/* ================= Input ================= */
function pressStart(e) {
    if (e.target.closest && e.target.closest('.btn, .bigbtn, .arrowbtn, a')) return;
    if (e.cancelable) e.preventDefault();
    ensureAudio();
    if (state === State.PLAYING) {
        holding = true;
        tryHook();
    }
}
function pressEnd(e) {
    holding = false;
    if (state === State.PLAYING) unhook();
}
canvas.addEventListener('touchstart', pressStart, { passive: false });
canvas.addEventListener('touchend', pressEnd, { passive: false });
canvas.addEventListener('touchcancel', pressEnd, { passive: false });
canvas.addEventListener('mousedown', pressStart);
window.addEventListener('mouseup', pressEnd);
window.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        ensureAudio();
        if (state === State.MENU) { startPlay(); return; }
        if (state === State.CLEAR) { nextFromClear(); return; }
        if (state === State.PAUSED) { resumeGame(); return; }
        if (state === State.PLAYING) { holding = true; tryHook(); }
    }
    if (e.code === 'KeyP' || e.code === 'Escape') {
        if (state === State.PLAYING) pauseGame();
        else if (state === State.PAUSED) resumeGame();
    }
    if (e.code === 'KeyR' && state === State.CLEAR) { ensureAudio(); startPlay(); }
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        holding = false;
        if (state === State.PLAYING) unhook();
    }
});
/* If still holding when we respawn or a new hook becomes reachable, hook it.
   This is the "input buffering" that makes it feel generous. */
setInterval(() => {
    if (holding && state === State.PLAYING && !player.hooked && !player.dead) tryHook();
}, 50);

/* ================= Buttons ================= */
document.getElementById('playBtn').addEventListener('click', startPlay);
document.getElementById('lvlPrev').addEventListener('click', () => {
    ensureAudio();
    curLevel = Math.max(1, curLevel - 1);
    refreshStartPanel();
});
document.getElementById('lvlNext').addEventListener('click', () => {
    ensureAudio();
    curLevel = Math.min(Math.min(data.unlocked, LEVEL_COUNT), curLevel + 1);
    refreshStartPanel();
});
function nextFromClear() {
    if (curLevel === LEVEL_COUNT) {
        curLevel = 1;
        showMenu();
        return;
    }
    curLevel++;
    startPlay();
}
document.getElementById('nextBtn').addEventListener('click', nextFromClear);
/* instant retry from the clear panel — chase the goal time and the stars */
document.getElementById('retryBtn').addEventListener('click', () => { ensureAudio(); startPlay(); });

function pauseGame() {
    if (state !== State.PLAYING) return;
    state = State.PAUSED;
    document.getElementById('pausePanel').classList.add('show');
}
function resumeGame() {
    if (state !== State.PAUSED) return;
    state = State.PLAYING;
    holding = false;
    document.getElementById('pausePanel').classList.remove('show');
}
document.getElementById('pauseBtn').addEventListener('click', pauseGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.addEventListener('visibilitychange', () => {
    if (document.hidden && state === State.PLAYING) pauseGame();
});

const muteBtn = document.getElementById('muteBtn');
function refreshMute() { muteBtn.textContent = data.muted ? '🔇' : '🔊'; }
muteBtn.addEventListener('click', () => {
    ensureAudio();
    data.muted = !data.muted;
    saveData();
    refreshMute();
});
refreshMute();

/* ================= Boot + main loop ================= */
curLevel = clamp(data.unlocked, 1, LEVEL_COUNT);
level = buildLevel(curLevel);
pal = palForLevel(curLevel);
startAttempt(true);
camSnap();
showMenu();

/* Read-only test hooks (enabled only when a harness sets __RR_TEST__) */
if (window.__RR_TEST__) {
    window.__rr = {
        get state() { return state; },
        player,
        get level() { return level; },
        get curLevel() { return curLevel; },
        get deaths() { return levelDeaths; },
        buildLevel, findTarget,
        LEVEL_COUNT, GRAB_RANGE, GOO_Y, PARS
    };
}

let last = performance.now();
function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>

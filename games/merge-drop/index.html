<script>
(function () {
'use strict';

/* ================= DOM ================= */
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d', { alpha: false });
var scoreEl = document.getElementById('score');
var titleEl = document.getElementById('title');
var menuBestEl = document.getElementById('menuBest');
var tapHintEl = document.getElementById('tapHint');
var pauseBtn = document.getElementById('pauseBtn');
var muteBtn = document.getElementById('muteBtn');
var pauseOverlay = document.getElementById('pauseOverlay');
var overPanel = document.getElementById('overPanel');
var stickerBanner = document.getElementById('stickerBanner');
var newBestEl = document.getElementById('newBest');
var panelTitleEl = document.getElementById('panelTitle');
var panelScoreEl = document.getElementById('panelScore');
var panelBestEl = document.getElementById('panelBest');
var panelBiggestEl = document.getElementById('panelBiggest');
var panelChainEl = document.getElementById('panelChain');
var panelSavesEl = document.getElementById('panelSaves');
var nearMissEl = document.getElementById('nearMiss');
var playBtn = document.getElementById('playBtn');
var unicornBannerEl = document.getElementById('unicornBanner');
var overToastEl = document.getElementById('overToast');

/* ================= Storage (per game) ================= */
var STORAGE_KEY = 'woopkid_merge-drop';
var defaultData = {
    highScore: 0,
    totalPlays: 0,
    totalMerges: 0,
    biggestTier: 0,
    unlocks: [],
    muted: false,
    lastPlayed: null
};
function loadData() {
    try {
        var d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return d ? Object.assign({}, defaultData, d) : Object.assign({}, defaultData);
    } catch (e) {
        return Object.assign({}, defaultData);
    }
}
function saveData() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
        /* localStorage full or unavailable, fail silently */
    }
}
var data = loadData();

/* ================= Shared profile (verbatim contract module) ================= */
const WoopProfile = {
  KEY: 'woopkid_profile',
  load() {
    try { return JSON.parse(localStorage.getItem(this.KEY)) || this._blank(); }
    catch { return this._blank(); }
  },
  _blank() {
    return { totalPlays: 0, games: {}, stickers: [], streak: { current: 0, best: 0, lastDay: null } };
  },
  save(p) { try { localStorage.setItem(this.KEY, JSON.stringify(p)); } catch {} },
  // Call once per finished run. slug: game slug. score: the run's primary number.
  // thresholds: {bronze, silver, gold} score values for stickers.
  reportRun(slug, score, thresholds) {
    const p = this.load();
    p.totalPlays++;
    const g = p.games[slug] || (p.games[slug] = { best: 0, plays: 0, lastPlayed: null });
    g.plays++;
    g.lastPlayed = new Date().toISOString().slice(0, 10);
    if (score > g.best) g.best = score;
    const earned = [];
    for (const tier of ['bronze', 'silver', 'gold']) {
      const id = slug + '-' + tier;
      if (score >= thresholds[tier] && !p.stickers.includes(id)) { p.stickers.push(id); earned.push(tier); }
    }
    const today = new Date().toISOString().slice(0, 10);
    if (p.streak.lastDay !== today) {
      const y = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      p.streak.current = (p.streak.lastDay === y) ? p.streak.current + 1 : 1;
      if (p.streak.current > p.streak.best) p.streak.best = p.streak.current;
      p.streak.lastDay = today;
    }
    this.save(p);
    return earned; // array of tier names newly earned this run, show celebration per tier
  }
};

/* ================= Helpers ================= */
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
function rand(a, b) { return a + Math.random() * (b - a); }
function easeOutBack(t) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

/* ================= Audio (procedural, Web Audio only) ================= */
var audioCtx = null;
var activeVoices = 0;
var MAX_VOICES = 6;

function ensureAudio() {
    if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function canPlay() { return !!audioCtx && !data.muted && activeVoices < MAX_VOICES; }
function voiceDone() { activeVoices = Math.max(0, activeVoices - 1); }
function pitchVar() { return rand(0.95, 1.05); } /* plus or minus 5 percent */

/* Soft plop when a piece is released */
function sfxDrop() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(210 * p, t);
    o.frequency.exponentialRampToValueAtTime(85 * p, t + 0.11);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.17);
}

/* Merge pop: pitch rises with the tier that was just created, chains push it higher */
var MERGE_FREQ = [262, 294, 330, 392, 440, 523, 587, 659, 784, 880];
function sfxMerge(tier, chain) {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var f = MERGE_FREQ[clamp(tier - 1, 0, 9)] * pitchVar();
    if (chain > 1) f *= Math.pow(1.0595, Math.min(chain - 1, 7));
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(f * 0.82, t);
    o.frequency.exponentialRampToValueAtTime(f, t + 0.035);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    var o2 = audioCtx.createOscillator();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(f * 2, t);
    var g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.0001, t);
    g2.gain.exponentialRampToValueAtTime(0.06, t + 0.012);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t); o.stop(t + 0.32);
    o2.start(t); o2.stop(t + 0.2);
}

/* Soft landing thud */
function sfxThud() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(140 * p, t);
    o.frequency.exponentialRampToValueAtTime(70 * p, t + 0.07);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.08, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.11);
}

/* Gentle warning pulse while the jar is nearly full */
function sfxWarn() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(196, t);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.06, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.27);
}

/* Gentle jar too full sound, sympathetic and soft */
function sfxOver() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var p = pitchVar();
    var o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(262 * p, t);
    o.frequency.setValueAtTime(220 * p, t + 0.2);
    o.frequency.setValueAtTime(175 * p, t + 0.4);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.02);
    g.gain.setValueAtTime(0.16, t + 0.42);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.72);
}

/* Unicorn fanfare: ascending arpeggio plus sparkle chimes */
function sfxUnicorn() {
    if (!canPlay()) return;
    activeVoices++;
    var t = audioCtx.currentTime;
    var o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(523, t);
    o.frequency.setValueAtTime(659, t + 0.11);
    o.frequency.setValueAtTime(784, t + 0.22);
    o.frequency.setValueAtTime(1047, t + 0.33);
    o.frequency.setValueAtTime(1319, t + 0.46);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
    g.gain.setValueAtTime(0.2, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.95);
    o.connect(g); g.connect(audioCtx.destination);
    o.onended = voiceDone;
    o.start(t);
    o.stop(t + 0.97);
    if (activeVoices < MAX_VOICES) {
        activeVoices++;
        var s = audioCtx.createOscillator();
        s.type = 'sine';
        s.frequency.setValueAtTime(2093, t + 0.4);
        s.frequency.setValueAtTime(2637, t + 0.52);

        s.connect(sg); sg.connect(audioCtx.destination);
        s.onended = voiceDone;

}

/* Little fanfare for new best or sticker */
function sfxFanfare() {

/* ================= Canvas sizing + prerendered sprites ================= */
var dpr = 1;
var scaleCss = 1;   /* css px per logical unit */
var S = 1;          /* device px per logical unit */
var LVW = 480, LVH = 800;
var jarX = 20, jarY = 90;

function makeCanvas(w, h) {
    var c = document.createElement('canvas');
    c.width = Math.max(1, Math.ceil(w));
    c.height = Math.max(1, Math.ceil(h));
    return c;
}

function ellipsePath(c, x, y, rx, ry, rot) {
    c.beginPath();
    c.ellipse(x, y, rx, ry, rot || 0, 0, Math.PI * 2);
}

/* Build the chunky animal body sprite for one tier. Faces are drawn live. */
function buildSprite(tier) {
    var t = TIERS[tier];
    var r = t.r;
    var pad = r * PADS[tier] + 10;
    var half = r + pad;
    var cnv = makeCanvas(half * 2 * S, half * 2 * S);
    var c = cnv.getContext('2d');
    c.scale(S, S);
    c.translate(half, half);
    c.lineJoin = 'round';
    c.lineCap = 'round';
    var lw = Math.max(3, r * 0.1);
    c.lineWidth = lw;
    c.strokeStyle = INK;

    /* features behind the body */
    if (tier === 0) { /* ant antennae */
        c.lineWidth = Math.max(2.5, r * 0.09);
        c.beginPath();
        c.moveTo(-r * 0.25, -r * 0.7);
        c.quadraticCurveTo(-r * 0.55, -r * 1.15, -r * 0.62, -r * 1.28);
        c.moveTo(r * 0.25, -r * 0.7);
        c.quadraticCurveTo(r * 0.55, -r * 1.15, r * 0.62, -r * 1.28);
        c.stroke();
        c.fillStyle = t.d;
        ellipsePath(c, -r * 0.62, -r * 1.3, r * 0.16, r * 0.16); c.fill(); c.stroke();
        ellipsePath(c, r * 0.62, -r * 1.3, r * 0.16, r * 0.16); c.fill(); c.stroke();
        c.lineWidth = lw;
    } else if (tier === 1) { /* mouse ears */
        c.fillStyle = t.c;
        ellipsePath(c, -r * 0.6, -r * 0.66, r * 0.42, r * 0.42); c.fill(); c.stroke();
        ellipsePath(c, r * 0.6, -r * 0.66, r * 0.42, r * 0.42); c.fill(); c.stroke();
        c.fillStyle = '#FFC9DE';
        ellipsePath(c, -r * 0.6, -r * 0.66, r * 0.22, r * 0.22); c.fill();
        ellipsePath(c, r * 0.6, -r * 0.66, r * 0.22, r * 0.22); c.fill();
    } else if (tier === 2) { /* chick crest */
        c.fillStyle = '#FFC61A';
        ellipsePath(c, -r * 0.24, -r * 0.98, r * 0.13, r * 0.3, -0.35); c.fill(); c.stroke();
        ellipsePath(c, r * 0.18, -r * 1.0, r * 0.12, r * 0.28, 0.3); c.fill(); c.stroke();
        ellipsePath(c, -r * 0.03, -r * 1.06, r * 0.13, r * 0.32, 0); c.fill(); c.stroke();
    } else if (tier === 3) { /* bunny ears */
        c.fillStyle = t.c;
        ellipsePath(c, -r * 0.38, -r * 1.02, r * 0.24, r * 0.62, -0.16); c.fill(); c.stroke();
        ellipsePath(c, r * 0.38, -r * 1.02, r * 0.24, r * 0.62, 0.16); c.fill(); c.stroke();
        c.fillStyle = '#FFE1EE';
        ellipsePath(c, -r * 0.38, -r * 0.98, r * 0.11, r * 0.4, -0.16); c.fill();
        ellipsePath(c, r * 0.38, -r * 0.98, r * 0.11, r * 0.4, 0.16); c.fill();
    } else if (tier === 4) { /* fox ears */
        c.fillStyle = t.c;
        c.beginPath();
        c.moveTo(-r * 0.85, -r * 0.4);
        c.lineTo(-r * 0.62, -r * 1.18);
        c.lineTo(-r * 0.15, -r * 0.82);
        c.closePath(); c.fill(); c.stroke();
        c.beginPath();
        c.moveTo(r * 0.85, -r * 0.4);
        c.lineTo(r * 0.62, -r * 1.18);
        c.lineTo(r * 0.15, -r * 0.82);
        c.closePath(); c.fill(); c.stroke();
        c.fillStyle = '#FFE3C7';
        c.beginPath();
        c.moveTo(-r * 0.66, -r * 0.55);
        c.lineTo(-r * 0.58, -r * 0.98);
        c.lineTo(-r * 0.32, -r * 0.76);
        c.closePath(); c.fill();
        c.beginPath();
        c.moveTo(r * 0.66, -r * 0.55);
        c.lineTo(r * 0.58, -r * 0.98);
        c.lineTo(r * 0.32, -r * 0.76);
        c.closePath(); c.fill();
    } else if (tier === 5) { /* panda ears */
        c.fillStyle = '#3A3454';
        ellipsePath(c, -r * 0.58, -r * 0.64, r * 0.32, r * 0.32); c.fill(); c.stroke();
        ellipsePath(c, r * 0.58, -r * 0.64, r * 0.32, r * 0.32); c.fill(); c.stroke();
    } else if (tier === 6) { /* lion mane */
        var puffs = 12;
        c.fillStyle = '#F09A2E';
        for (var i = 0; i < puffs; i++) {
            var a = (i / puffs) * Math.PI * 2;
            ellipsePath(c, Math.cos(a) * r * 1.02, Math.sin(a) * r * 1.02, r * 0.38, r * 0.38);
            c.fill(); c.stroke();
        }
    } else if (tier === 7) { /* hippo ears */
        c.fillStyle = t.c;
        ellipsePath(c, -r * 0.55, -r * 0.72, r * 0.24, r * 0.24); c.fill(); c.stroke();
        ellipsePath(c, r * 0.55, -r * 0.72, r * 0.24, r * 0.24); c.fill(); c.stroke();
        c.fillStyle = '#FFC9DE';
        ellipsePath(c, -r * 0.55, -r * 0.72, r * 0.11, r * 0.11); c.fill();
        ellipsePath(c, r * 0.55, -r * 0.72, r * 0.11, r * 0.11); c.fill();
    } else if (tier === 8) { /* elephant ears */
        c.fillStyle = t.c;
        ellipsePath(c, -r * 0.82, -r * 0.05, r * 0.42, r * 0.56, -0.15); c.fill(); c.stroke();
        ellipsePath(c, r * 0.82, -r * 0.05, r * 0.42, r * 0.56, 0.15); c.fill(); c.stroke();
        c.fillStyle = '#6E93D2';
        ellipsePath(c, -r * 0.85, -r * 0.05, r * 0.24, r * 0.36, -0.15); c.fill();
        ellipsePath(c, r * 0.85, -r * 0.05, r * 0.24, r * 0.36, 0.15); c.fill();
    } else if (tier === 9) { /* whale spout */
        c.lineWidth = Math.max(2.5, r * 0.05);
        c.strokeStyle = '#2E9FDB';
        c.beginPath();
        c.moveTo(0, -r * 0.96);
        c.quadraticCurveTo(-r * 0.16, -r * 1.2, -r * 0.3, -r * 1.28);
        c.moveTo(0, -r * 0.96);
        c.quadraticCurveTo(r * 0.16, -r * 1.2, r * 0.3, -r * 1.28);
        c.moveTo(0, -r * 0.96);
        c.lineTo(0, -r * 1.32);
        c.stroke();
        c.fillStyle = '#AEE6FF';
        ellipsePath(c, -r * 0.3, -r * 1.34, r * 0.08, r * 0.11); c.fill();
        ellipsePath(c, r * 0.3, -r * 1.34, r * 0.08, r * 0.11); c.fill();
        ellipsePath(c, 0, -r * 1.42, r * 0.09, r * 0.12); c.fill();
        c.strokeStyle = INK;
        c.lineWidth = lw;
    } else if (tier === 10) { /* unicorn horn, ears and rainbow mane */
        c.fillStyle = '#FFD93D';
        c.beginPath();
        c.moveTo(-r * 0.16, -r * 0.78);
        c.lineTo(0, -r * 1.5);
        c.lineTo(r * 0.16, -r * 0.78);
        c.closePath(); c.fill(); c.stroke();
        c.lineWidth = Math.max(2, r * 0.03);
        c.beginPath();
        c.moveTo(-r * 0.11, -r * 1.05); c.lineTo(r * 0.1, -r * 0.95);
        c.moveTo(-r * 0.07, -r * 1.25); c.lineTo(r * 0.06, -r * 1.17);
        c.stroke();
        c.lineWidth = lw;
        c.fillStyle = t.c;
        ellipsePath(c, -r * 0.55, -r * 0.72, r * 0.2, r * 0.28, -0.35); c.fill(); c.stroke();
        ellipsePath(c, r * 0.55, -r * 0.72, r * 0.2, r * 0.28, 0.35); c.fill(); c.stroke();
        for (var m = 0; m < 6; m++) {
            var ma = -2.4 + m * 0.32;
            c.fillStyle = RAINBOW[m];
            ellipsePath(c, Math.cos(ma) * r * 0.92, Math.sin(ma) * r * 0.92, r * 0.2, r * 0.2);
            c.fill(); c.stroke();
        }
    }

    /* body */
    c.fillStyle = t.c;
    ellipsePath(c, 0, 0, r, r);
    c.fill();
    c.stroke();

    /* soft belly highlight */
    c.fillStyle = 'rgba(255,255,255,0.35)';
    ellipsePath(c, 0, r * 0.38, r * 0.55, r * 0.38);
    c.fill();

    /* features on the body */
    if (tier === 2) { /* chick beak */
        c.fillStyle = '#FF8A3D';
        c.beginPath();
        c.moveTo(-r * 0.16, r * 0.14);
        c.lineTo(0, r * 0.34);
        c.lineTo(r * 0.16, r * 0.14);
        c.lineTo(0, r * 0.02);
        c.closePath(); c.fill();
        c.lineWidth = Math.max(2, r * 0.05);
        c.stroke();
        c.lineWidth = lw;
    } else if (tier === 1) { /* mouse nose and whiskers */
        c.fillStyle = '#FF9EC4';
        ellipsePath(c, 0, r * 0.2, r * 0.1, r * 0.08); c.fill();
        c.lineWidth = Math.max(1.5, r * 0.04);
        c.globalAlpha = 0.55;
        c.beginPath();
        c.moveTo(-r * 0.3, r * 0.18); c.lineTo(-r * 0.78, r * 0.08);
        c.moveTo(-r * 0.3, r * 0.26); c.lineTo(-r * 0.78, r * 0.32);
        c.moveTo(r * 0.3, r * 0.18); c.lineTo(r * 0.78, r * 0.08);
        c.moveTo(r * 0.3, r * 0.26); c.lineTo(r * 0.78, r * 0.32);
        c.stroke();
        c.globalAlpha = 1;
        c.lineWidth = lw;
    } else if (tier === 3) { /* bunny teeth */
        c.fillStyle = '#FFFFFF';
        c.lineWidth = Math.max(1.5, r * 0.04);
        c.fillRect(-r * 0.14, r * 0.36, r * 0.14, r * 0.16);
        c.strokeRect(-r * 0.14, r * 0.36, r * 0.14, r * 0.16);
        c.fillRect(0, r * 0.36, r * 0.14, r * 0.16);
        c.strokeRect(0, r * 0.36, r * 0.14, r * 0.16);
        c.lineWidth = lw;
    } else if (tier === 4) { /* fox muzzle */
        c.fillStyle = '#FFF4E6';
        ellipsePath(c, 0, r * 0.34, r * 0.4, r * 0.3); c.fill();
        c.fillStyle = INK;
        ellipsePath(c, 0, r * 0.16, r * 0.1, r * 0.075); c.fill();
    } else if (tier === 5) { /* panda eye patches */
        c.fillStyle = '#3A3454';
        ellipsePath(c, -r * 0.34, -r * 0.08, r * 0.22, r * 0.27, -0.28); c.fill();
        ellipsePath(c, r * 0.34, -r * 0.08, r * 0.22, r * 0.27, 0.28); c.fill();
    } else if (tier === 7) { /* hippo nostrils */
        c.fillStyle = '#8A67C9';
        ellipsePath(c, -r * 0.16, r * 0.26, r * 0.08, r * 0.1); c.fill();
        ellipsePath(c, r * 0.16, r * 0.26, r * 0.08, r * 0.1); c.fill();
    } else if (tier === 8) { /* elephant trunk */
        c.strokeStyle = INK;
        c.lineWidth = r * 0.3 + Math.max(3, r * 0.06);
        c.beginPath();
        c.moveTo(0, r * 0.08);
        c.quadraticCurveTo(-r * 0.04, r * 0.5, r * 0.13, r * 0.78);
        c.stroke();
        c.strokeStyle = t.c;
        c.lineWidth = r * 0.3;
        c.beginPath();
        c.moveTo(0, r * 0.08);
        c.quadraticCurveTo(-r * 0.04, r * 0.5, r * 0.13, r * 0.78);
        c.stroke();
        c.strokeStyle = INK;
        c.lineWidth = lw;
    } else if (tier === 9) { /* whale belly */
        c.save();
        ellipsePath(c, 0, 0, r, r);
        c.clip();
        c.fillStyle = '#C9EFFF';
        ellipsePath(c, 0, r * 0.72, r * 0.85, r * 0.42); c.fill();
        c.lineWidth = Math.max(1.5, r * 0.03);
        c.globalAlpha = 0.4;
        c.beginPath();
        c.moveTo(-r * 0.6, r * 0.62); c.quadraticCurveTo(0, r * 0.52, r * 0.6, r * 0.62);
        c.moveTo(-r * 0.5, r * 0.78); c.quadraticCurveTo(0, r * 0.68, r * 0.5, r * 0.78);
        c.stroke();
        c.globalAlpha = 1;
        c.restore();
        c.lineWidth = lw;
    } else if (tier === 10) { /* unicorn sparkles */
        c.fillStyle = '#FFD93D';
        drawStarPath(c, -r * 0.55, r * 0.3, r * 0.1);
        c.fill();
        drawStarPath(c, r * 0.5, -r * 0.28, r * 0.08);
        c.fill();
    }

    /* blush cheeks, everyone gets them */
    c.fillStyle = 'rgba(255,120,140,0.4)';
    ellipsePath(c, -r * 0.56, r * 0.22, r * 0.14, r * 0.1); c.fill();
    ellipsePath(c, r * 0.56, r * 0.22, r * 0.14, r * 0.1); c.fill();

    return { cnv: cnv, half: half };
}

function drawStarPath(c, x, y, r) {
    c.beginPath();
    for (var i = 0; i < 10; i++) {
        var a = i * Math.PI / 5 - Math.PI / 2;
        var rr = (i % 2 === 0) ? r : r * 0.45;
        var px = x + Math.cos(a) * rr;
        var py = y + Math.sin(a) * rr;
        if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath();
}

function buildSprites() {
    sprites = [];
    for (var i = 0; i < TIERS.length; i++) sprites.push(buildSprite(i));
}

function buildBg() {
    /* deep navy night sky: gradient, aurora blobs, starfield, all baked once */
    bgSpr = makeCanvas(canvas.width, canvas.height);
    var c = bgSpr.getContext('2d');
    var w = bgSpr.width, h = bgSpr.height;
    var grad = c.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#232258');
    grad.addColorStop(0.45, '#191945');
    grad.addColorStop(1, '#0F0E2C');
    c.fillStyle = grad;
    c.fillRect(0, 0, w, h);
    /* soft baked aurora glows */
    var blobs = [
        [0.15, 0.12, 0.5, 'rgba(179,136,255,0.10)'],
        [0.88, 0.28, 0.42, 'rgba(79,195,247,0.09)'],
        [0.5, 0.95, 0.62, 'rgba(255,95,162,0.07)'],
        [0.1, 0.7, 0.4, 'rgba(126,217,87,0.05)']
    ];
    for (var bi = 0; bi < blobs.length; bi++) {
        var B = blobs[bi];
        var rg = c.createRadialGradient(B[0] * w, B[1] * h, 0, B[0] * w, B[1] * h, B[2] * h);
        rg.addColorStop(0, B[3]);
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        c.fillStyle = rg;
        c.fillRect(0, 0, w, h);
    }
    /* starfield */
    var i, sx, sy;
    for (i = 0; i < 90; i++) {
        sx = Math.random() * w; sy = Math.random() * h;
        c.globalAlpha = 0.12 + Math.random() * 0.3;
        c.fillStyle = Math.random() < 0.25 ? '#B9E3FF' : '#FFFFFF';
        c.beginPath();
        c.arc(sx, sy, (0.6 + Math.random() * 1.3) * S, 0, Math.PI * 2);
        c.fill();
    }
    /* a few bigger cross sparkles */
    c.strokeStyle = '#FFFFFF';
    c.lineCap = 'round';
    for (i = 0; i < 8; i++) {
        sx = Math.random() * w; sy = Math.random() * h * 0.55;
        var sr = (3 + Math.random() * 4) * S;
        c.globalAlpha = 0.16 + Math.random() * 0.18;
        c.lineWidth = 1.4 * S;
        c.beginPath();
        c.moveTo(sx - sr, sy); c.lineTo(sx + sr, sy);
        c.moveTo(sx, sy - sr); c.lineTo(sx, sy + sr);
        c.stroke();
    }
    c.globalAlpha = 1;
    /* corner vignette */
    var vg = c.createRadialGradient(w / 2, h * 0.45, h * 0.35, w / 2, h * 0.5, h * 0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(5,4,20,0.5)');
    c.fillStyle = vg;
    c.fillRect(0, 0, w, h);

    /* red warning vignette, drawn with variable alpha when the jar is crowded */
    vinSpr = makeCanvas(w, h);
    var vc = vinSpr.getContext('2d');
    var vv = vc.createRadialGradient(w / 2, h * 0.5, h * 0.3, w / 2, h * 0.5, h * 0.75);
    vv.addColorStop(0, 'rgba(255,70,95,0)');
    vv.addColorStop(1, 'rgba(255,70,95,0.4)');
    vc.fillStyle = vv;
    vc.fillRect(0, 0, w, h);

    /* danger zone gradient strip (jar coords, drawn with drawImage, never per-frame gradients) */
    dangerSpr = makeCanvas((JAR_W + 12) * S, (DANGER_Y + 52) * S);
    var dc = dangerSpr.getContext('2d');
    var dg = dc.createLinearGradient(0, 0, 0, dangerSpr.height);
    dg.addColorStop(0, 'rgba(255,90,110,0.22)');
    dg.addColorStop(1, 'rgba(255,90,110,0)');
    dc.fillStyle = dg;
    dc.fillRect(0, 0, dangerSpr.width, dangerSpr.height);

    /* combo meter rainbow strip */
    comboGradSpr = makeCanvas(220 * S, 16 * S);
    var cc = comboGradSpr.getContext('2d');
    var cg = cc.createLinearGradient(0, 0, comboGradSpr.width, 0);
    for (i = 0; i < RAINBOW.length; i++) cg.addColorStop(i / (RAINBOW.length - 1), RAINBOW[i]);
    cc.fillStyle = cg;
    cc.fillRect(0, 0, comboGradSpr.width, comboGradSpr.height);
}

function buildWildSprite() {
    var r = WILD_R;
    var half = r + 16;
    var cnv = makeCanvas(half * 2 * S, half * 2 * S);
    var c = cnv.getContext('2d');
    c.scale(S, S);
    c.translate(half, half);
    c.lineJoin = 'round';
    c.lineCap = 'round';
    /* rainbow pie */
    var n = RAINBOW.length;
    for (var i = 0; i < n; i++) {
        c.fillStyle = RAINBOW[i];
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, r, (i / n) * Math.PI * 2 - Math.PI / 2, ((i + 1) / n) * Math.PI * 2 - Math.PI / 2);
        c.closePath();
        c.fill();
    }
    c.strokeStyle = INK;
    c.lineWidth = Math.max(3, r * 0.1);
    c.beginPath();
    c.arc(0, 0, r, 0, Math.PI * 2);
    c.stroke();
    /* white core + star */
    c.fillStyle = '#FFFFFF';
    c.beginPath();
    c.arc(0, 0, r * 0.58, 0, Math.PI * 2);
    c.fill();
    c.stroke();
    c.fillStyle = '#FFD93D';
    drawStarPath(c, 0, 0, r * 0.38);
    c.fill();
    c.lineWidth = Math.max(2, r * 0.06);
    c.stroke();
    /* tiny sparkles */
    c.fillStyle = '#FFFFFF';
    drawStarPath(c, -r * 0.75, -r * 0.75, r * 0.16); c.fill();
    drawStarPath(c, r * 0.8, r * 0.6, r * 0.13); c.fill();
    wildSpr = { cnv: cnv, half: half };
}

function resize() {

    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    scaleCss = Math.min(window.innerWidth / (JAR_W + 36), window.innerHeight / (JAR_H + 170));

function spawnBall(tier, x, y, vx, vy) {
    var t = TIERS[tier];
    var b = {
        id: idSeq++,
        tier: tier,
        r: t.r,
        m: (t.r * t.r) / 324,
        x: x, y: y,
        vx: vx || 0, vy: vy || 0,
        rot: rand(-0.25, 0.25), omega: 0,
        scaleT: 0,
        squash: 0,
        blinkIn: rand(1.2, 5), blinkT: 0,
        gaze: 0, gx: 0, gy: -1,
        worry: 0, sad: false,
        contact: false, onFloor: false, hasContacted: false,
        dangerT: 0, merging: false, wild: false,
        seed: rand(0, 9)
    };
    balls.push(b);
    return b;
}

function pickTier() {
    /* strong bias toward tiers already in the jar so chains stay reachable;
       prefer tiers with an ODD count (completing a pair = instant merge chance).
       The helping hand fades as the run escalates - late game you earn your own luck. */
    if (balls.length > 0 && Math.random() < 0.5 - 0.28 * phase) {
        var counts = [0, 0, 0, 0, 0];
        for (var i = 0; i < balls.length; i++) {
            var t = balls[i].tier;
            if (t <= 4 && !balls[i].wild) counts[t]++;
        }
        var cands = [];
        for (var k = 0; k <= 4; k++) {
            if (counts[k] > 0) {
                var w = counts[k] + (counts[k] % 2 === 1 ? 2 : 0);
                for (var j = 0; j < w; j++) cands.push(k);
            }
        }
        if (cands.length) return cands[(Math.random() * cands.length) | 0];
    }
    /* escalating spawn table: bigger animals show up more as the run goes on */
    var roll = Math.random();
    var acc2 = 0;
    for (var n = 0; n < 5; n++) {
        acc2 += W_START[n] + (W_END[n] - W_START[n]) * phase;
        if (roll < acc2) return n;
    }
    return 4;
}

/* Local merge pop, layered Candy-Crush style: soft halo + double shockwave ring
   + radial rays + chunky shards + star glints + floating score, all together.
   Bigger tiers and chains get bigger celebrations. No full screen flashes. */
function spawnMergeFX(x, y, tier, chain, pts, wild) {
    var t = TIERS[tier];
    var newR = t.r;
    var i, a, sp, p;
    /* 1. soft halo bloom (pre-rendered glow sprite) */
    p = spawnPart(6, x, y, 0, 0, 0.42, newR * (1.5 + tier * 0.06), tier >= 6 || wild ? 'gold' : 'white');
    /* 2. expanding shockwave rings */
    spawnRing(x, y, newR * 0.5, newR * (1.9 + tier * 0.06), 0.4, '#FFFFFF', 7);
    spawnRing(x, y, newR * 0.35, newR * 1.4, 0.32, wild ? RAINBOW[(Math.random() * 6) | 0] : t.c, 5);
    if (tier >= 6 || chain >= 3 || wild) {
        spawnRing(x, y, newR * 0.7, newR * 2.5, 0.5, '#FFE14D', 4);
    }
    /* 3. radial rays */
    for (i = 0; i < 10; i++) {
        a = (i / 10) * Math.PI * 2 + rand(-0.15, 0.15);
        p = spawnPart(2, x, y, 0, 0, 0.3, newR * 0.42, '#FFFFFF');
        if (p) { p.a = a; p.d = newR * 0.7; p.len = newR * 0.4; }
    }
    /* 4. chunky shards in the animal's colors */
    var shards = 8 + tier * 2;
    for (i = 0; i < shards; i++) {
        a = rand(0, Math.PI * 2);
        sp = rand(90, 260) * (1 + tier * 0.06);
        spawnPart(1, x, y, Math.cos(a) * sp, Math.sin(a) * sp - 60, rand(0.4, 0.75), rand(4, 8) + tier * 0.5, wild ? RAINBOW[i % 6] : (i % 3 === 0 ? t.d : t.c));
    }
    /* 5. spark dots */
    for (i = 0; i < 8; i++) {
        a = rand(0, Math.PI * 2);
        sp = rand(50, 180);
        spawnPart(4, x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(0.25, 0.5), rand(2.5, 4.5), i % 2 === 0 ? '#FFFFFF' : '#FFE14D');
    }
    /* 6. star glints, more for bigger merges */
    var glints = 2 + (tier >> 1) + (chain >= 2 ? 2 : 0);
    for (i = 0; i < glints; i++) {
        a = rand(0, Math.PI * 2);
        sp = rand(40, 150);
        spawnPart(3, x + Math.cos(a) * newR * 0.5, y + Math.sin(a) * newR * 0.5,
            Math.cos(a) * sp, Math.sin(a) * sp - 90, rand(0.35, 0.6), rand(4, 7), i % 2 === 0 ? '#FFE14D' : '#FFFFFF');
    }
    /* 7. floating score label */
    spawnText(x, y - newR * 0.4, '+' + pts, 16 + tier * 2, '#FFFFFF', false);
    if (chain >= 2) {
        var cc = chain >= 4 ? '#B388FF' : (chain === 3 ? '#FF5FA2' : '#FFB53D');
        spawnText(x, y - newR - 16, 'CHAIN x' + chain + '!', 20 + Math.min(chain, 6) * 3, cc, true);
    }
    /* squash and nudge the neighbors, local shockwave */
    for (i = 0; i < balls.length; i++) {
        var b = balls[i];
        var dx = b.x - x, dy = b.y - y;
        var d = Math.sqrt(dx * dx + dy * dy);
        var range = newR + b.r + 34;
        if (d > 0.01 && d < range) {
            var k = (1 - d / range) * 130;
            b.vx += (dx / d) * k;
            b.vy += (dy / d) * k * 0.6;
            b.squash = Math.max(b.squash, 0.55 * (1 - d / range) + 0.2);
        }
    }
    trauma = Math.min(1, trauma + 0.1 + tier * 0.028 + (chain >= 2 ? 0.05 : 0));
}

/* ================= Physics ================= */
function integrate(b, dt) {
    b.vy += GRAVITY * dt;
    if (b.onFloor) b.vx *= Math.pow(0.9, dt * 60);
    else if (b.contact) b.vx *= Math.pow(0.975, dt * 60);
    var sp = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (sp > MAX_VEL) {
        var k = MAX_VEL / sp;
        b.vx *= k; b.vy *= k;
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.onFloor) b.omega += ((b.vx / b.r) - b.omega) * Math.min(1, 12 * dt);
    else b.omega *= Math.pow(0.96, dt * 60);
    b.rot += b.omega * dt;
}

function resolveWalls(b) {
    if (b.x - b.r < 0) {
        b.x = b.r;
        if (b.vx < 0) b.vx = -b.vx * WALL_REST;
        b.contact = true; b.hasContacted = true;
    }
    if (b.x + b.r > JAR_W) {
        b.x = JAR_W - b.r;
        if (b.vx > 0) b.vx = -b.vx * WALL_REST;
        b.contact = true; b.hasContacted = true;
    }
    if (b.y + b.r > JAR_H) {
        b.y = JAR_H - b.r;
        if (b.vy > 0) {
            if (b.vy > 150) { b.squash = Math.max(b.squash, Math.min(1, b.vy / 620)); sfxThudMaybe(b.vy); }
            b.vy = -b.vy * WALL_REST;
        }
        b.onFloor = true; b.contact = true; b.hasContacted = true;
    }
}

var lastThud = 0;
function sfxThudMaybe(v) {
    if (time - lastThud > 0.09 && v > 170 && currentState !== State.MENU) {
        lastThud = time;
        sfxThud();
    }
}

function resolvePair(a, b) {
    var dx = b.x - a.x, dy = b.y - a.y;
    var minD = a.r + b.r;
    var distSq = dx * dx + dy * dy;
    if (distSq >= minD * minD) return;
    var dist = Math.sqrt(distSq);
    var nx, ny;
    if (dist < 0.01) { dist = 0.01; nx = 1; ny = 0; }
    else { nx = dx / dist; ny = dy / dist; }
    var overlap = minD - dist;

    /* merge check: same tier below the top tier, or a wild touching anything */
    if (!a.merging && !b.merging && overlap > MERGE_OVERLAP && currentState !== State.GAME_OVER) {
        var wildPair = (a.wild || b.wild) && !(a.wild && b.wild);
        if (wildPair || (!a.wild && !b.wild && a.tier === b.tier && a.tier < TOP_TIER)) {
            a.merging = true; b.merging = true;
            mergeQ.push([a, b]);
        }
    }

    /* positional correction with slop, weighted by inverse mass */
    var invA = 1 / a.m, invB = 1 / b.m, inv = invA + invB;
    var push = Math.max(overlap - 0.4, 0) * 0.8;
    a.x -= nx * push * (invA / inv);
    a.y -= ny * push * (invA / inv);
    b.x += nx * push * (invB / inv);
    b.y += ny * push * (invB / inv);

    /* impulse, only when closing */
    var rel = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
    if (rel < 0) {
        var rest = currentState === State.DYING ? 0.02 : REST;
        var j = -(1 + rest) * rel / inv;
        a.vx -= j * nx * invA;
        a.vy -= j * ny * invA;
        b.vx += j * nx * invB;
        b.vy += j * ny * invB;
        if (-rel > 180) {
            var q = Math.min(1, -rel / 700);
            a.squash = Math.max(a.squash, q);
            b.squash = Math.max(b.squash, q);
            sfxThudMaybe(-rel);
        }
    }
    a.contact = true; b.contact = true;
    a.hasContacted = true; b.hasContacted = true;
    if (ny > 0.55) b.onFloor = b.onFloor || a.onFloor;
    if (ny < -0.55) a.onFloor = a.onFloor || b.onFloor;
}

function physicsStep(dt) {
    var sub = dt / SUBSTEPS;
    var i, j, s, it;
    for (s = 0; s < SUBSTEPS; s++) {
        for (i = 0; i < balls.length; i++) {
            balls[i].contact = false;
            balls[i].onFloor = false;
            integrate(balls[i], sub);
        }
        for (it = 0; it < POS_ITERS; it++) {
            for (i = 0; i < balls.length; i++) {
                for (j = i + 1; j < balls.length; j++) {
                    resolvePair(balls[i], balls[j]);
                }
            }
            for (i = 0; i < balls.length; i++) resolveWalls(balls[i]);
        }
        /* sleep: settled slow balls stop jittering */
        for (i = 0; i < balls.length; i++) {
            var b = balls[i];
            if (b.contact && Math.abs(b.vx) < SLEEP_VEL && Math.abs(b.vy) < SLEEP_VEL) {
                b.vx = 0; b.vy = 0;
            }
        }
    }
    executeMerges();
}

function executeMerges() {
    if (!mergeQ.length) return;
    for (var k = 0; k < mergeQ.length; k++) {
        var a = mergeQ[k][0], b = mergeQ[k][1];
        var ia = balls.indexOf(a), ib = balls.indexOf(b);
        if (ia < 0 || ib < 0) continue;
        var isWild = a.wild || b.wild;
        var newTier, x, y, vx, vy;
        if (isWild) {
            /* the wild upgrades whatever it touched, in place */
            var host = a.wild ? b : a;
            newTier = Math.min(host.tier + 1, TOP_TIER);
            x = host.x; y = host.y;
            vx = host.vx; vy = host.vy - 40;
        } else {
            newTier = a.tier + 1;
            x = (a.x + b.x) / 2;
            y = (a.y + b.y) / 2;
            vx = (a.vx + b.vx) / 2;
            vy = (a.vy + b.vy) / 2 - 40;
        }
        /* danger-line rescue: merging away a ball that was about to overflow */
        var rescued = (a.hasContacted && a.y - a.r < DANGER_Y + 26) ||
                      (b.hasContacted && b.y - b.r < DANGER_Y + 26);
        balls.splice(balls.indexOf(a), 1);
        balls.splice(balls.indexOf(b), 1);
        var nb = spawnBall(newTier, x, y, vx, vy);
        nb.hasContacted = a.hasContacted || b.hasContacted;

        chainCount = (time - lastMergeT < 1.1) ? chainCount + 1 : 1;
        lastMergeT = time;
        if (chainCount > bestChain) bestChain = chainCount;
        var pts = TIERS[newTier].value;
        if (isWild) pts *= 2;
        if (chainCount > 1) pts = Math.round(pts * (1 + 0.5 * (chainCount - 1)));
        if (rescued && !isWild) {
            pts = Math.round(pts * 1.5);
            saves++;
            spawnText(x, y - TIERS[newTier].r - 40, 'NICE SAVE!', 21, '#4FC3F7', true);
        }
        if (currentState === State.PLAYING || currentState === State.DYING) {
            score += pts;
            totalMerges++;
            if (newTier > biggestTier) biggestTier = newTier;
            /* combo meter charges with every merge, chains charge it faster */
            if (currentState === State.PLAYING && !heldWild) {
                comboMeter += 0.15 + Math.min(chainCount, 5) * 0.03 + (isWild ? -0.12 : 0);
                if (comboMeter >= 1) {
                    comboMeter = 0;
                    heldWild = true;
                    spawnText(JAR_W / 2, 40, 'WILD READY!', 30, '#FFD93D', true);
                    sfxWild();
                }
            }
            scoreEl.textContent = score.toLocaleString();
            scoreEl.classList.remove('pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('pop');
        }
        spawnMergeFX(x, y, newTier, chainCount, pts, isWild);
        sfxMerge(newTier, chainCount);
        /* hit-stop: a tiny freeze frame sells the biggest moments */
        if (newTier >= 7 || chainCount >= 4 || isWild) {
            hitStop = Math.max(hitStop, 0.04 + newTier * 0.007 + (chainCount >= 4 ? 0.03 : 0));
        }
        if (newTier === TOP_TIER) unicornMoment(x, y);
    }
    mergeQ.length = 0;
}

/* ================= Danger + game over ================= */
function overflowGrace() {
    return OVERFLOW_MAX + (OVERFLOW_MIN - OVERFLOW_MAX) * phase;
}

function updateDanger(dt) {
    warnLevel = 0;
    var grace = overflowGrace();
    for (var i = 0; i < balls.length; i++) {
        var b = balls[i];
        var crowd = b.hasContacted ? clamp(1 - (b.y - b.r - DANGER_Y) / 44, 0, 1) : 0;
        if (crowd > warnLevel) warnLevel = crowd;
        if (b.hasContacted && b.y < DANGER_Y) {
            b.dangerT += dt;
            if (b.dangerT >= grace) { gameOver(); return; }
        } else {
            b.dangerT = Math.max(0, b.dangerT - dt * 2);
        }
    }
    if (warnLevel > 0.65 && time - lastWarnSfx > 0.8) {
        lastWarnSfx = time;
        sfxWarn();
    }
}

function gameOver() {
    if (currentState !== State.PLAYING) return;
    currentState = State.DYING;
    dieT = 0;
    panelShown = false;
    pauseBtn.style.display = 'none';
    /* the tower slumps gently */
    for (var i = 0; i < balls.length; i++) {
        balls[i].sad = true;
        balls[i].vx += rand(-70, 70);
    }
    sfxOver();
    overToastEl.classList.add('show');

    /* record the run immediately */
    newBest = score > prevBest;
    data.totalPlays++;
    data.totalMerges += totalMerges;
    if (score > data.highScore) data.highScore = score;
    if (biggestTier > data.biggestTier) data.biggestTier = biggestTier;
    data.lastPlayed = new Date().toISOString();
    saveData();
    earnedTiers = WoopProfile.reportRun('merge-drop', score, { bronze: 1500, silver: 5000, gold: 15000 });
}

var TIER_LABELS = { bronze: '🥉 BRONZE', silver: '🥈 SILVER', gold: '🥇 GOLD' };
function showPanel() {
    if (panelShown) return;
    panelShown = true;
    currentState = State.GAME_OVER;
    overToastEl.classList.remove('show');
    scoreEl.style.display = 'none';
    panelScoreEl.textContent = score.toLocaleString();
    panelBestEl.textContent = data.highScore.toLocaleString();
    panelBiggestEl.textContent = TIERS[biggestTier].name;
    panelBiggestEl.style.background = TIERS[biggestTier].c;
    panelChainEl.textContent = 'x' + bestChain;
    panelSavesEl.textContent = String(saves);
    newBestEl.style.display = newBest ? 'block' : 'none';
    panelTitleEl.textContent = newBest ? 'AMAZING!' : 'JAR TOO FULL!';
    var diff = prevBest - score;
    if (!newBest && prevBest >= 300 && score < prevBest && diff <= prevBest * 0.2) {
        nearMissEl.textContent = 'SO CLOSE! ' + diff.toLocaleString() + ' away from your best';
        nearMissEl.style.display = 'block';
    } else {
        nearMissEl.style.display = 'none';
    }
    if (earnedTiers.length > 0) {
        var labels = [];
        for (var i = 0; i < earnedTiers.length; i++) labels.push(TIER_LABELS[earnedTiers[i]]);
        stickerBanner.textContent = 'STICKER EARNED! ' + labels.join(' + ');
        stickerBanner.style.display = 'block';
    } else {
        stickerBanner.style.display = 'none';
    }
    if (earnedTiers.length > 0 || newBest) {
        burstConfetti();
        sfxFanfare();
    }
    overPanel.classList.add('show');
}

/* ================= Run control ================= */
function resetRun() {
    balls.length = 0;
    mergeQ.length = 0;
    var i;
    for (i = 0; i < parts.length; i++) parts[i].active = false;
    for (i = 0; i < rings.length; i++) rings[i].active = false;
    for (i = 0; i < popTexts.length; i++) popTexts[i].active = false;
    score = 0;
    totalMerges = 0;
    biggestTier = 0;
    chainCount = 0;
    lastMergeT = -10;
    cooldown = 0;
    trauma = 0;
    runT = 0;
    phase = 0;
    curLvl = 1;
    comboMeter = 0;
    heldWild = false;
    hitStop = 0;
    bestChain = 1;
    saves = 0;
    warnLevel = 0;
    celebT = 0;
    dieT = 0;
    panelShown = false;
    newBest = false;
    earnedTiers = [];
    acc = 0;
    aimX = JAR_W / 2;
    currentTier = pickTier();
    nextTier = pickTier();
    heldScaleT = 1;
    scoreEl.textContent = '0';
}

function showMenu() {
    currentState = State.MENU;
    resetRun();
    /* a few friends tumble into the jar so the charm is visible on the menu */
    for (var i = 0; i < 6; i++) {
        var t = (Math.random() * 4) | 0;
        spawnBall(t, rand(60, JAR_W - 60), -60 - i * 110, rand(-30, 30), 0);
    }
    titleEl.style.display = 'block';
    tapHintEl.style.display = 'block';
    scoreEl.style.display = 'none';
    pauseBtn.style.display = 'none';
    overPanel.classList.remove('show');
    overToastEl.classList.remove('show');
    if (data.highScore > 0) {
        menuBestEl.textContent = 'BEST: ' + data.highScore.toLocaleString();
        menuBestEl.style.display = 'inline-block';
    }
}

function startRun() {
    resetRun();
    currentState = State.PLAYING;
    prevBest = data.highScore;
    titleEl.style.display = 'none';
    tapHintEl.style.display = 'none';
    scoreEl.style.display = 'block';
    scoreEl.textContent = '0';
    pauseBtn.style.display = 'flex';
    overPanel.classList.remove('show');
}

function dropCurrent(force) {
    if (currentState !== State.PLAYING) return;
    if (!force && cooldown > 0) return;
    var r = heldWild ? WILD_R : TIERS[currentTier].r;
    var x = clamp(aimX, r + 2, JAR_W - r - 2);
    if (heldWild) {
        var wb = spawnBall(2, x, DROP_Y, 0, 60);
        wb.wild = true;
        wb.r = WILD_R;
        wb.m = (WILD_R * WILD_R) / 324;
        wb.omega = 3;
        heldWild = false;
        /* wild does not advance the queue: your planned piece is still next */
    } else {
        spawnBall(currentTier, x, DROP_Y, 0, 60);
        currentTier = nextTier;
        nextTier = pickTier();
    }
    sfxDrop();
    cooldown = DROP_COOLDOWN;
    heldScaleT = 0;
    held.blinkIn = rand(1, 4);
    held.blinkT = 0;
}

/* ================= Update ================= */
function updateCosmetics(dt) {
    var i, b;
    for (i = 0; i < balls.length; i++) {
        b = balls[i];
        if (b.scaleT < 1) b.scaleT = Math.min(1, b.scaleT + dt / 0.28);
        if (b.squash > 0) b.squash = Math.max(0, b.squash - (b.squash * 8 + 0.5) * dt);
        if (b.blinkT > 0) b.blinkT -= dt;
        else {
            b.blinkIn -= dt;
            if (b.blinkIn <= 0) { b.blinkT = 0.12; b.blinkIn = rand(1.4, 5); }
        }
        /* worry near the danger line */
        var wTarget = (currentState === State.DYING || (b.hasContacted && b.y - b.r < DANGER_Y + 22)) ? 1 : 0;
        b.worry += (wTarget - b.worry) * Math.min(1, 5 * dt);
        /* look at the nearest same tier friend with big hopeful eyes */
        var bestD = b.r * 4.5;
        var fx = 0, fy = 0, found = false;
        for (var j = 0; j < balls.length; j++) {
            if (j === i) continue;
            var o = balls[j];
            if (o.tier !== b.tier) continue;
            var dx = o.x - b.x, dy = o.y - b.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < bestD) { bestD = d; fx = dx / (d || 1); fy = dy / (d || 1); found = true; }
        }
        var gTarget = found ? 1 : 0;
        b.gaze += (gTarget - b.gaze) * Math.min(1, 4 * dt);
        if (found) { b.gx = fx; b.gy = fy; }
    }
    /* held piece blink */
    if (held.blinkT > 0) held.blinkT -= dt;
    else {
        held.blinkIn -= dt;
        if (held.blinkIn <= 0) { held.blinkT = 0.12; held.blinkIn = rand(1.2, 4); }
    }
    if (heldScaleT < 1) heldScaleT = Math.min(1, heldScaleT + dt / 0.24);
}

function updateFX(dt) {
    var i, p;
    for (i = 0; i < parts.length; i++) {
        p = parts[i];
        if (!p.active) continue;
        p.life += dt;
        if (p.life >= p.ttl) { p.active = false; continue; }
        if (p.type === 1) {          /* shard: chunky, gravity */
            p.vy += 620 * dt;
            p.vx *= (1 - Math.min(1, 2 * dt));
        } else if (p.type === 2) {   /* ray: expands outward */
            p.d += p.size * 9 * dt;
        } else if (p.type === 3) {   /* star confetti: flutter down */
            p.vy = Math.min(230, p.vy + 190 * dt);
            p.x += Math.sin(p.life * 5 + p.rot) * 24 * dt;
        } else if (p.type === 4) {   /* spark dot */
            p.vx *= (1 - Math.min(1, 4 * dt));
            p.vy *= (1 - Math.min(1, 4 * dt));
        } else if (p.type === 5) {   /* rainbow fountain drop */
            p.vy += 780 * dt;
        }
        /* type 6 halo: stays put, just blooms and fades */
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
    }
    for (i = 0; i < rings.length; i++) {
        var g = rings[i];
        if (!g.active) continue;
        g.life += dt;
        if (g.life >= g.ttl) g.active = false;
    }
    for (i = 0; i < popTexts.length; i++) {
        var pt = popTexts[i];
        if (!pt.active) continue;
        pt.life += dt;
        pt.y -= 42 * dt;
        if (pt.life >= pt.ttl) pt.active = false;
    }
    /* unicorn rainbow fountain */
    if (celebT > 0) {
        celebT -= dt;
        var n = Math.min(4, Math.ceil(240 * dt));
        for (i = 0; i < n; i++) {
            spawnPart(5, celebX + rand(-14, 14), celebY - TIERS[TOP_TIER].r * 0.6,
                rand(-150, 150), rand(-620, -300), rand(0.8, 1.4), rand(4, 7),
                RAINBOW[(Math.random() * RAINBOW.length) | 0]);
        }
        if (Math.random() < 8 * dt) {
            spawnPart(3, celebX + rand(-60, 60), celebY - 80, rand(-40, 40), rand(-260, -120), rand(1, 1.8), rand(6, 10), RAINBOW[(Math.random() * RAINBOW.length) | 0]);
        }
    }
}

function stepPhysics(dt) {
    acc += dt;
    while (acc >= FIXED_DT) {
        physicsStep(FIXED_DT);
        acc -= FIXED_DT;
    }
}

function update(dt) {
    time += dt;
    if (trauma > 0) trauma = Math.max(0, trauma - 2.2 * dt);
    /* hit-stop: freeze the world for a beat on huge merges, FX run in slow-mo */
    if (hitStop > 0 && (currentState === State.PLAYING || currentState === State.DYING)) {
        hitStop -= dt;
        updateFX(dt * 0.25);
        return;
    }
    switch (currentState) {
        case State.MENU:
            stepPhysics(dt);
            updateCosmetics(dt);
            break;
        case State.PLAYING:
            cooldown = Math.max(0, cooldown - dt);
            runT += dt;
            phase = clamp(runT / PHASE_TIME, 0, 1);
            var lvl = 1 + Math.min(5, Math.floor(runT / 30));
            if (lvl > curLvl) {
                curLvl = lvl;
                spawnText(JAR_W / 2, 150, 'SPEED UP! LV ' + curLvl, 27, '#FFD93D', true);
                sfxFanfare();
            }
            if (!heldWild) comboMeter = Math.max(0, comboMeter - dt * 0.075);
            stepPhysics(dt);
            updateDanger(dt);
            updateCosmetics(dt);
            break;
        case State.PAUSED:
            return;
        case State.DYING:
            stepPhysics(dt);
            updateCosmetics(dt);
            dieT += dt;
            if (dieT > 1.6) showPanel();
            break;
        case State.GAME_OVER:
            stepPhysics(dt);
            updateCosmetics(dt);
            break;
    }
    updateFX(dt);
}

/* ================= Render ================= */
function worldTransform() {
    var ox = 0, oy = 0;
    if (trauma > 0) {
        var amp = trauma * trauma * 6;
        ox = (Math.random() * 2 - 1) * amp;
        oy = (Math.random() * 2 - 1) * amp;
    }
    ctx.setTransform(S, 0, 0, S, (jarX + ox) * S, (jarY + oy) * S);
}

function drawJarBack() {
    /* glass body */
    ctx.beginPath();
    ctx.moveTo(-8, -10);
    ctx.lineTo(-8, JAR_H - 20);
    ctx.quadraticCurveTo(-8, JAR_H + 7, 18, JAR_H + 7);
    ctx.lineTo(JAR_W - 18, JAR_H + 7);
    ctx.quadraticCurveTo(JAR_W + 8, JAR_H + 7, JAR_W + 8, JAR_H - 20);
    ctx.lineTo(JAR_W + 8, -10);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.fill();
    ctx.fillStyle = 'rgba(150,205,255,0.07)';
    ctx.fill();

    /* danger line, pulses gently when the jar is crowded */
    var pulse = warnLevel > 0.05
        ? 0.45 + 0.4 * warnLevel * (0.5 + 0.5 * Math.sin(time * (3 + warnLevel * 5)))
        : 0.3;
    if (warnLevel > 0.4) {
        ctx.globalAlpha = clamp(warnLevel, 0, 1);
        ctx.drawImage(dangerSpr, -6, -8, JAR_W + 12, DANGER_Y + 52);
        ctx.globalAlpha = 1;
    }
    ctx.strokeStyle = 'rgba(255,80,100,' + pulse.toFixed(3) + ')';
    ctx.lineWidth = 2.5 + warnLevel * 1.5;
    ctx.setLineDash([10, 10]);
    ctx.lineDashOffset = -time * 20;
    ctx.beginPath();
    ctx.moveTo(2, DANGER_Y);
    ctx.lineTo(JAR_W - 2, DANGER_Y);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawJarFront() {
    ctx.strokeStyle = '#7C74C9';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(-11.5, -14);
    ctx.lineTo(-11.5, JAR_H - 20);
    ctx.quadraticCurveTo(-11.5, JAR_H + 10.5, 18, JAR_H + 10.5);
    ctx.lineTo(JAR_W - 18, JAR_H + 10.5);
    ctx.quadraticCurveTo(JAR_W + 11.5, JAR_H + 10.5, JAR_W + 11.5, JAR_H - 20);
    ctx.lineTo(JAR_W + 11.5, -14);
    ctx.stroke();
    /* rim flare */
    ctx.beginPath();
    ctx.moveTo(-11.5, -14);
    ctx.lineTo(-22, -20);
    ctx.moveTo(JAR_W + 11.5, -14);
    ctx.lineTo(JAR_W + 22, -20);
    ctx.stroke();
    /* glass highlight */
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    if (ctx.roundRect) {
        ctx.roundRect(10, 26, 13, 180, 7);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(10, 220, 13, 36, 7);
        ctx.fill();
    } else {
        ctx.fillRect(10, 26, 13, 180);
        ctx.fillRect(10, 220, 13, 36);
    }
}

/* the expressive face, drawn live in the ball's local rotated space */
function drawFace(b) {
    var r = b.r;
    var panda = b.tier === 5;
    var ex = r * 0.34;
    var ey = -r * 0.1;
    var eyeR = (panda ? r * 0.105 : r * 0.16) * (1 + 0.35 * b.gaze);
    var lw = Math.max(2, r * 0.06);

    /* pupils look toward the friend, in local space */
    var lx = 0, ly = 0.25;
    if (b.gaze > 0.05) {
        var cs = Math.cos(-b.rot), sn = Math.sin(-b.rot);
        lx = (cs * b.gx - sn * b.gy) * b.gaze;
        ly = (sn * b.gx + cs * b.gy) * b.gaze;
    }
    var po = eyeR * 0.42;

    var closed = b.blinkT > 0 || b.sad;
    var side;
    for (side = -1; side <= 1; side += 2) {
        var x = ex * side;
        if (closed) {
            ctx.strokeStyle = INK;
            ctx.lineWidth = lw;
            ctx.beginPath();
            if (b.sad) ctx.arc(x, ey + eyeR * 0.5, eyeR * 0.8, Math.PI * 1.15, Math.PI * 1.85);
            else ctx.arc(x, ey - eyeR * 0.3, eyeR * 0.8, Math.PI * 0.15, Math.PI * 0.85);
            ctx.stroke();
        } else {
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x, ey, eyeR, 0, Math.PI * 2);
            ctx.fill();
            if (!panda) {
                ctx.strokeStyle = INK;
                ctx.lineWidth = Math.max(1.5, r * 0.035);
                ctx.stroke();
            }
            ctx.fillStyle = INK;
            ctx.beginPath();
            ctx.arc(x + lx * po, ey + ly * po, eyeR * 0.52, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.arc(x + lx * po + eyeR * 0.18, ey + ly * po - eyeR * 0.2, eyeR * (b.gaze > 0.6 ? 0.24 : 0.16), 0, Math.PI * 2);
            ctx.fill();
        }
        /* worried brows */
        if (b.worry > 0.35 && !b.sad) {
            ctx.strokeStyle = INK;
            ctx.lineWidth = lw;
            ctx.globalAlpha = b.worry;
            ctx.beginPath();
            ctx.moveTo(x - eyeR * 0.9 * side, ey - eyeR * 1.7);
            ctx.lineTo(x + eyeR * 0.5 * side, ey - eyeR * 2.15);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }

    /* mouth: chick has a beak, elephant has a trunk */
    var noMouth = b.tier === 2 || b.tier === 8;
    if (!noMouth) {
        ctx.strokeStyle = INK;
        ctx.lineWidth = lw;
        ctx.beginPath();
        if (b.sad) {
            ctx.arc(0, r * 0.42, r * 0.14, Math.PI * 1.15, Math.PI * 1.85);
        } else if (b.worry > 0.5) {
            var mw = r * 0.16;
            ctx.moveTo(-mw, r * 0.3);
            ctx.quadraticCurveTo(-mw * 0.5, r * 0.3 - r * 0.05, 0, r * 0.3);
            ctx.quadraticCurveTo(mw * 0.5, r * 0.3 + r * 0.05, mw, r * 0.3);
        } else if (b.gaze > 0.55) {
            ctx.arc(0, r * 0.24, r * 0.15, Math.PI * 0.1, Math.PI * 0.9);
            ctx.stroke();
            ctx.fillStyle = '#FF9EC4';
            ctx.beginPath();
            ctx.arc(0, r * 0.31, r * 0.07, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
        } else {
            ctx.arc(0, r * 0.22, r * 0.13, Math.PI * 0.15, Math.PI * 0.85);
        }
        ctx.stroke();
    }

    /* sweat drop when worried */
    if (b.worry > 0.4) {
        var slide = (time * 1.4 + b.seed) % 1;
        var sy = -r * 0.5 + slide * r * 0.28;
        ctx.globalAlpha = b.worry * (1 - slide * 0.4);
        ctx.fillStyle = '#8FD9F9';
        ctx.beginPath();
        ctx.moveTo(r * 0.62, sy - r * 0.12);
        ctx.quadraticCurveTo(r * 0.72, sy + r * 0.05, r * 0.62, sy + r * 0.09);
        ctx.quadraticCurveTo(r * 0.52, sy + r * 0.05, r * 0.62, sy - r * 0.12);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function drawBall(b) {
    var spr = b.wild ? wildSpr : sprites[b.tier];
    var t = clamp(b.scaleT, 0.001, 1);
    var sc = t < 1 ? easeOutBack(t) : 1;
    var breathe = 1 + 0.013 * Math.sin(time * 2 + b.seed);
    var sx = (1 + 0.22 * b.squash) * sc * breathe;
    var sy = (1 - 0.26 * b.squash) * sc * breathe;
    if (b.wild) {
        /* glow aura behind the wild ball */
        var gr = b.r * 2.6 + Math.sin(time * 5) * 4;
        ctx.globalAlpha = 0.55;
        ctx.drawImage(glowGoldSpr, b.x - gr, b.y - gr, gr * 2, gr * 2);
        ctx.globalAlpha = 1;
    }
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot);
    ctx.scale(sx, sy);
    ctx.drawImage(spr.cnv, -spr.half, -spr.half, spr.half * 2, spr.half * 2);
    if (!b.wild) drawFace(b);
    ctx.restore();
    /* fair-warning countdown ring on a ball that is overflowing */
    if (b.dangerT > 0.2 && currentState === State.PLAYING) {
        var frac = clamp(b.dangerT / overflowGrace(), 0, 1);
        ctx.strokeStyle = 'rgba(255,80,100,' + (0.5 + 0.5 * frac).toFixed(2) + ')';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r + 8, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
        ctx.stroke();
    }
}

function landingYFor(x, r) {
    var y = JAR_H - r;
    for (var i = 0; i < balls.length; i++) {
        var b = balls[i];
        var dx = b.x - x;
        var rr = r + b.r;
        if (dx > -rr && dx < rr) {
            var cy = b.y - Math.sqrt(rr * rr - dx * dx);
            if (cy < y) y = cy;
        }
    }
    return y;
}

function drawAim() {
    var r = heldWild ? WILD_R : TIERS[currentTier].r;
    var x = clamp(aimX, r + 2, JAR_W - r - 2);
    var landY = landingYFor(x, r);
    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([6, 9]);
    ctx.lineDashOffset = -time * 30;
    ctx.beginPath();
    ctx.moveTo(x, DROP_Y + r + 6);
    ctx.lineTo(x, landY - r * 0.2);
    ctx.stroke();
    /* landing ghost */
    ctx.beginPath();
    ctx.arc(x, landY, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
}

function drawHeld() {
    var r = heldWild ? WILD_R : TIERS[currentTier].r;
    var x = clamp(aimX, r + 2, JAR_W - r - 2);
    var bob = Math.sin(time * 2.4) * 3;
    var sc = easeOutBack(clamp(heldScaleT, 0.001, 1));
    if (heldWild) {
        /* pulsing golden aura + slow spin for the wild piece */
        var gr = r * 2.8 + Math.sin(time * 5) * 5;
        ctx.globalAlpha = 0.7;
        ctx.drawImage(glowGoldSpr, x - gr, (DROP_Y + bob) - gr, gr * 2, gr * 2);
        ctx.globalAlpha = 1;
        ctx.save();
        ctx.translate(x, DROP_Y + bob);
        ctx.rotate(time * 0.9);
        ctx.scale(sc, sc);
        ctx.drawImage(wildSpr.cnv, -wildSpr.half, -wildSpr.half, wildSpr.half * 2, wildSpr.half * 2);
        ctx.restore();
        return;
    }
    var fake = {
        tier: currentTier, r: r, rot: 0,
        squash: 0, scaleT: 1, seed: 3,
        blinkT: held.blinkT, sad: false,
        worry: 0, gaze: 0.7, gx: 0, gy: 1
    };
    ctx.save();
    ctx.translate(x, DROP_Y + bob);
    ctx.scale(sc, sc);
    ctx.drawImage(sprites[currentTier].cnv, -sprites[currentTier].half, -sprites[currentTier].half, sprites[currentTier].half * 2, sprites[currentTier].half * 2);
    ctx.translate(-x, -(DROP_Y + bob));
    ctx.translate(x, DROP_Y + bob);
    fake.rot = 0;
    drawFace(fake);
    ctx.restore();
}

function drawNextBubble() {
    /* while the wild is held, the queued piece is what comes next */
    var showTier = heldWild ? currentTier : nextTier;
    var bx = JAR_W - 96, by = JAR_H + 16, bw = 96, bh = 52;
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = INK;
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 14);
    else ctx.rect(bx, by, bw, bh);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = INK;
    ctx.font = '800 12px Nunito, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('NEXT', bx + 10, by + bh / 2 - 12);
    ctx.font = '800 13px Nunito, sans-serif';
    ctx.fillText(TIERS[showTier].name, bx + 10, by + bh / 2 + 10);
    var spr = sprites[showTier];
    var k = 16 / TIERS[showTier].r;
    var cx = bx + bw - 24, cy = by + bh / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(k, k);
    ctx.drawImage(spr.cnv, -spr.half, -spr.half, spr.half * 2, spr.half * 2);
    var rr = TIERS[showTier].r;
    ctx.fillStyle = INK;
    ctx.beginPath();
    ctx.arc(-rr * 0.3, -rr * 0.1, rr * 0.1, 0, Math.PI * 2);
    ctx.arc(rr * 0.34, -rr * 0.1, rr * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawFX() {
    var i, p, k;
    for (i = 0; i < rings.length; i++) {
        var g = rings[i];
        if (!g.active) continue;
        k = g.life / g.ttl;
        ctx.globalAlpha = 1 - k;
        ctx.strokeStyle = g.color;
        ctx.lineWidth = g.lw * (1 - k) + 1.5;
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.r0 + (g.r1 - g.r0) * (1 - Math.pow(1 - k, 2.2)), 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    for (i = 0; i < parts.length; i++) {
        p = parts[i];
        if (!p.active) continue;
        k = 1 - p.life / p.ttl;
        ctx.globalAlpha = k;
        ctx.fillStyle = p.color;
        if (p.type === 1) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.strokeStyle = 'rgba(43,35,80,0.35)';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
        } else if (p.type === 2) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3 * k + 1;
            ctx.beginPath();
            ctx.moveTo(p.x + Math.cos(p.a) * p.d, p.y + Math.sin(p.a) * p.d);
            ctx.lineTo(p.x + Math.cos(p.a) * (p.d + p.len * k), p.y + Math.sin(p.a) * (p.d + p.len * k));
            ctx.stroke();
        } else if (p.type === 3) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            drawStarPath(ctx, 0, 0, p.size);
            ctx.fill();
            ctx.restore();
        } else if (p.type === 6) {   /* halo bloom, pre-rendered glow sprite */
            ctx.globalAlpha = k * 0.85;
            var hs = p.size * (1 + (1 - k) * 1.2);
            ctx.drawImage(p.color === 'gold' ? glowGoldSpr : glowSpr, p.x - hs, p.y - hs, hs * 2, hs * 2);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * k + 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (i = 0; i < popTexts.length; i++) {
        var pt = popTexts[i];
        if (!pt.active) continue;
        k = 1 - pt.life / pt.ttl;
        ctx.globalAlpha = Math.min(1, k * 2);
        ctx.save();
        ctx.translate(pt.x, pt.y);
        if (pt.wob) {
            ctx.rotate(Math.sin(pt.life * 12) * 0.09);
            ctx.scale(1 + 0.14 * Math.sin(pt.life * 9), 1 + 0.14 * Math.sin(pt.life * 9));
        }
        ctx.font = '800 ' + pt.size + 'px Nunito, sans-serif';
        ctx.lineWidth = 5;
        ctx.strokeStyle = 'rgba(16,14,42,0.88)';
        ctx.strokeText(pt.text, 0, 0);
        ctx.fillStyle = pt.color;
        ctx.fillText(pt.text, 0, 0);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

/* Ambient background life: drifting glow orbs, rising bubbles, twinkles.
   Everything is a pre-rendered sprite or a couple of cheap arcs. */
function drawAmbient() {
    var w = canvas.width, h = canvas.height;
    var i;
    for (i = 0; i < 4; i++) {
        var gx = w * (0.5 + 0.42 * Math.sin(time * (0.05 + i * 0.013) + i * 2.4));
        var gy = h * (0.5 + 0.4 * Math.sin(time * (0.04 + i * 0.011) + i * 1.7 + 2));
        var gr = h * (0.1 + 0.03 * i);
        ctx.globalAlpha = 0.055;
        ctx.drawImage(i % 2 ? glowGoldSpr : glowSpr, (gx - gr) | 0, (gy - gr) | 0, (gr * 2) | 0, (gr * 2) | 0);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = Math.max(1, 1.2 * S);
    ctx.globalAlpha = 0.55;
    for (i = 0; i < 7; i++) {
        var spd = (18 + (i * 7) % 20) * S;
        var by = h - ((time * spd + i * 137 * S) % (h + 80 * S)) + 40 * S;
        var bx = ((i * 0.137 + 0.05) % 1) * w + Math.sin(time * 0.8 + i) * 14 * S;
        ctx.beginPath();
        ctx.arc(bx | 0, by | 0, (3 + (i % 4) * 2) * S, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.fillStyle = '#FFFFFF';
    for (i = 0; i < 6; i++) {
        var tw = 0.5 + 0.5 * Math.sin(time * (1.3 + i * 0.37) + i * 2.1);
        ctx.globalAlpha = tw * 0.32;
        drawStarPath(ctx, ((i * 0.171 + 0.09) % 1) * w, ((i * 0.293 + 0.12) % 1) * h * 0.7, (3 + i % 3) * S * (0.7 + tw * 0.5));
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

/* Combo meter + speed level, drawn under the jar */
function drawComboMeter() {
    var mx = 4, my = JAR_H + 22, mw = 150, mh = 16;
    ctx.fillStyle = 'rgba(255,255,255,0.10)';
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(mx, my, mw, mh, 8);
    else ctx.rect(mx, my, mw, mh);
    ctx.fill();
    ctx.stroke();
    var f = heldWild ? 1 : comboMeter;
    if (f > 0.02) {
        var fw = (mw - 4) * f;
        ctx.drawImage(comboGradSpr, 0, 0, comboGradSpr.width * f, comboGradSpr.height, mx + 2, my + 2, fw, mh - 4);
    }
    /* star cap, lights up when the wild is ready */
    var pulse = heldWild ? 1 + 0.2 * Math.sin(time * 8) : 1;
    if (heldWild) {
        var gr = 26;
        ctx.globalAlpha = 0.8;
        ctx.drawImage(glowGoldSpr, mx + mw + 16 - gr, my + mh / 2 - gr, gr * 2, gr * 2);
        ctx.globalAlpha = 1;
    }
    ctx.fillStyle = heldWild ? '#FFD93D' : 'rgba(255,255,255,0.4)';
    drawStarPath(ctx, mx + mw + 16, my + mh / 2, 11 * pulse);
    ctx.fill();
    ctx.font = '800 13px Nunito, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = heldWild ? '#FFD93D' : 'rgba(255,255,255,0.6)';
    ctx.fillText(heldWild ? 'WILD READY! DROP IT!' : 'WILD METER', mx + 2, my + mh + 14);
    /* speed level, centered between meter and the NEXT bubble */
    ctx.textAlign = 'center';
    ctx.fillStyle = curLvl >= 4 ? '#FF8A6B' : 'rgba(255,255,255,0.6)';
    ctx.fillText('SPEED', (mx + mw + 30 + JAR_W - 96) / 2, my + 1);
    ctx.font = '800 17px Nunito, sans-serif';
    ctx.fillText('LV ' + curLvl, (mx + mw + 30 + JAR_W - 96) / 2, my + 20);
    ctx.textAlign = 'left';
}

function render() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    if (bgSpr) ctx.drawImage(bgSpr, 0, 0);
    drawAmbient();
    /* pulsing red edges when the jar is dangerously full */
    if (warnLevel > 0.35 && (currentState === State.PLAYING || currentState === State.DYING)) {
        ctx.globalAlpha = Math.min(1, (warnLevel - 0.35) / 0.65) * (0.55 + 0.25 * Math.sin(time * 6));
        ctx.drawImage(vinSpr, 0, 0);
        ctx.globalAlpha = 1;
    }
    worldTransform();
    drawJarBack();
    if (currentState === State.PLAYING) drawAim();
    for (var i = 0; i < balls.length; i++) drawBall(balls[i]);
    drawFX();
    drawJarFront();
    if (currentState === State.PLAYING) {
        drawHeld();
        drawNextBubble();
        drawComboMeter();
    }
}

/* ================= Input ================= */
function aimFromClient(clientX) {
    return clientX / scaleCss - jarX;
}

canvas.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    ensureAudio();
    if (currentState === State.MENU) {
        startRun();
        return;
    }
    if (currentState === State.PAUSED) { resumeGame(); return; }
    if (currentState === State.PLAYING) {
        pointerHeld = true;
        aimX = aimFromClient(e.clientX);
    }
});
canvas.addEventListener('pointermove', function (e) {
    if (currentState !== State.PLAYING) return;
    e.preventDefault();
    aimX = aimFromClient(e.clientX);
});
window.addEventListener('pointerup', function (e) {
    if (currentState === State.PLAYING && pointerHeld) {
        aimX = aimFromClient(e.clientX);
        dropCurrent(false);
    }
    pointerHeld = false;
});
/* block scrolling and double tap zoom on mobile */
document.addEventListener('touchstart', function (e) { if (e.target === canvas) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });

window.addEventListener('keydown', function (e) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        if (currentState === State.PLAYING) { e.preventDefault(); aimX = clamp(aimX - 16, 0, JAR_W); }
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        if (currentState === State.PLAYING) { e.preventDefault(); aimX = clamp(aimX + 16, 0, JAR_W); }
    } else if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'KeyS') {
        e.preventDefault();
        ensureAudio();
        if (currentState === State.MENU) startRun();
        else if (currentState === State.PAUSED) resumeGame();
        else if (currentState === State.GAME_OVER && panelShown) startRun();
        else if (currentState === State.PLAYING) dropCurrent(false);
    } else if (e.code === 'KeyP' || e.code === 'Escape') {
        if (currentState === State.PLAYING) pauseGame();
        else if (currentState === State.PAUSED) resumeGame();
    } else if (e.code === 'KeyM') {
        toggleMute();
    }
});

function pauseGame() {
    if (currentState !== State.PLAYING) return;
    currentState = State.PAUSED;
    pauseOverlay.style.display = 'flex';
}
function resumeGame() {
    if (currentState !== State.PAUSED) return;
    currentState = State.PLAYING;
    pauseOverlay.style.display = 'none';
}
pauseBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    if (currentState === State.PLAYING) pauseGame();
});
pauseOverlay.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    resumeGame();
});
document.addEventListener('visibilitychange', function () {
    if (document.hidden && currentState === State.PLAYING) pauseGame();
});

function toggleMute() {
    data.muted = !data.muted;
    saveData();
    setMuteIcon();
}
function setMuteIcon() {
    muteBtn.textContent = data.muted ? '🔇' : '🔊';
}
muteBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    toggleMute();
});

playBtn.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    startRun(); /* instant: back in the jar within one frame */
});

/* ================= Main loop ================= */
var last = performance.now();
function loop(now) {
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

resize();
setMuteIcon();
showMenu();
requestAnimationFrame(loop);

/* ================= Headless test hook (harmless in production) ================= */
window.__mergeTest = {
    startRun: startRun,
    update: update,
    setAim: function (x) { aimX = x; },
    drop: function (force) { dropCurrent(force !== false); },
    spawn: function (tier, x, y) { return spawnBall(tier, x, y, 0, 0); },
    step: function (seconds) {
        var t = 0;
        while (t < seconds) { update(1 / 60); t += 1 / 60; }
    },
    pickTier: pickTier,
    forceWild: function () { heldWild = true; },
    fastForward: function (seconds) { runT += seconds; },
    get: function () {
        return {
            state: currentState, score: score, merges: totalMerges,
            biggest: biggestTier, balls: balls, panelShown: panelShown,
            JAR_W: JAR_W, JAR_H: JAR_H, DANGER_Y: DANGER_Y,
            combo: comboMeter, heldWild: heldWild, phase: phase,
            level: curLvl, bestChain: bestChain, saves: saves, hitStop: hitStop
        };
    }
};

})();
</script>

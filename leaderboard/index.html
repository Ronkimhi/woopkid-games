<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hall of Fame — High Scores | WoopKid World</title>
<meta name="description" content="The WoopKid Hall of Fame: top 10 high score leaderboards for every WoopKid game. Scores live on your device only — no accounts, no tracking, no ads.">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFF6E9">
<link rel="canonical" href="https://woopkid.com/leaderboard/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2272%22 font-size=%2270%22 text-anchor=%22middle%22>🏆</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2B2350;
  --cream:#FFF6E9;
  --paper:#FFFDF7;
  --sun:#FFD23F;
  --coral:#FF5C5C;
  --sky:#4FC3F7;
  --grape:#7B4DFF;
  --mint:#2EC4B6;
  --bubble:#FF5FA2;
  --shadow:6px 6px 0 rgba(43,35,80,.16);
  --shadow-press:2px 2px 0 rgba(43,35,80,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;background:var(--cream);color:var(--ink);
  font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow-x:hidden;
}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;opacity:.5;filter:blur(60px)}
.blob.b1{width:420px;height:420px;background:#FFE3B3;top:-120px;left:-100px}
.blob.b2{width:380px;height:380px;background:#FFD9EC;top:30%;right:-140px}
.blob.b3{width:460px;height:460px;background:#D9F2FF;bottom:-160px;left:18%}
.wrap{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:20px 18px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
.brandmini{display:flex;align-items:center;gap:8px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:19px;color:var(--ink);text-decoration:none}
.brandmini .dot{width:30px;height:30px;border-radius:50%;background:#FF8A3D;border:3px solid var(--ink);display:inline-block}
.pill{
  display:flex;align-items:center;gap:6px;background:var(--paper);border:3px solid var(--ink);
  border-radius:999px;padding:7px 13px;font-weight:900;font-size:14px;box-shadow:var(--shadow-press);
}
.pill .big{font-size:17px}
header.hero{text-align:center;padding:30px 0 8px}
.pagetitle{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(38px,8.5vw,68px);line-height:1;letter-spacing:-1px}
.tagline{margin:12px auto 0;font-size:clamp(15px,3.4vw,19px);font-weight:900;opacity:.75;max-width:560px}
.playerRow{display:flex;justify-content:center;margin:18px 0 6px}
.backline{text-align:center;margin:20px 0 4px}
.backline a{
  display:inline-block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;
  background:var(--ink);color:#fff;border-radius:999px;padding:11px 22px;text-decoration:none;
  box-shadow:var(--shadow-press);
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:26px}
.card{
  position:relative;display:flex;flex-direction:column;background:var(--paper);
  border:3px solid var(--ink);border-radius:22px;padding:16px 16px 14px;box-shadow:var(--shadow);
}
.cardhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.icon-ring{
  width:46px;height:46px;border-radius:50%;background:var(--acc,#FFD23F);
  border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:23px;flex:0 0 auto;
}
.card h2{font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;line-height:1.1}
.unit{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;opacity:.55}
.rows{display:flex;flex-direction:column;gap:5px;flex:1}
.row{
  display:flex;align-items:center;gap:8px;background:var(--cream);
  border-radius:12px;padding:6px 10px;font-weight:800;font-size:14px;
}
.row.me{background:#FFF1BF;box-shadow:inset 0 0 0 2px var(--sun)}
.row .rk{flex:0 0 26px;text-align:center;font-size:15px}
.row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.4px}
.row .sc{font-variant-numeric:tabular-nums;font-weight:900}
.zero{
  flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
  font-weight:800;font-size:14px;opacity:.55;padding:14px 6px;min-height:64px;
}
.playbtn{
  margin-top:12px;text-align:center;font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;
  background:var(--acc,#FFD23F);border:3px solid var(--ink);border-radius:999px;padding:8px 0;
  color:var(--ink);text-decoration:none;box-shadow:var(--shadow-press);
}
.playbtn:active{transform:translate(2px,2px);box-shadow:none}
footer{text-align:center;margin-top:56px}
.fine{font-size:13px;font-weight:700;opacity:.65;line-height:1.9}
.fine a{color:inherit;font-weight:900}
</style>
</head>
<body>
<div class="bg" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<div class="wrap">
  <nav class="topbar">
    <a class="brandmini" href="../"><span class="dot"></span>WoopKid</a>
    <div class="pill" title="Current player"><span class="big">😀</span><span id="playerName">WOOP</span></div>
  </nav>

  <header class="hero">
    <h1 class="pagetitle">🏆 Hall of Fame</h1>
    <p class="tagline">The top 10 board for every game — all scores live on <b>this device</b> only. Beat your family, beat your friends, beat yourself!</p>
  </header>

  <div class="backline"><a href="../">◀ Back to all games</a></div>

  <section class="grid" id="grid" aria-label="High score leaderboards"></section>

  <footer>
    <p class="fine">Scores never leave your device. No accounts, no tracking, no ads.<br>
    <a href="../">WoopKid World</a> · <a href="../privacy/">Privacy</a></p>
  </footer>
</div>

<script>
'use strict';
const GAMES = [
  { slug:'rope-rush', name:'Rope Rush', acc:'#8F7BFF', emoji:'🪀', unit:'stars' },
  { slug:'merge-squad', name:'Merge Squad', acc:'#FF8A3D', emoji:'🧸', unit:'level' },
  { slug:'pets-clicker', name:'Woop Pets Clicker', acc:'#FFB13D', emoji:'🐹', unit:'woops' },
  { slug:'trap-land', name:'Trap Land', acc:'#FF5FA2', emoji:'😜', unit:'levels' },
  { slug:'wing-it', name:'Wing It', acc:'#4FC3F7', emoji:'🐤', unit:'points' },
  { slug:'speed-slope', name:'Speed Slope', acc:'#7B4DFF', emoji:'🌀', unit:'meters' },
  { slug:'road-hopper', name:'Road Hopper', acc:'#7ED957', emoji:'🐔', unit:'hops' },
  { slug:'noodle-arena', name:'Noodle Arena', acc:'#2EC4B6', emoji:'🐍', unit:'length' },
  { slug:'sky-stack', name:'Sky Stack', acc:'#4C75FF', emoji:'🗼', unit:'floors' },
  { slug:'beat-bounce', name:'Beat Bounce', acc:'#B25CFF', emoji:'🎵', unit:'total %' },
  { slug:'slice-rush', name:'Slice Rush', acc:'#FF6B6B', emoji:'🍉', unit:'points' },
  { slug:'bubble-tank-duel', name:'Bubble Tank Duel', acc:'#40E0FF', emoji:'🫧', unit:'round wins' },
  { slug:'merge-drop', name:'Merge Drop', acc:'#FFCF3D', emoji:'🐣', unit:'points' },
  { slug:'tap-rush', name:'Tap Rush', acc:'#FF8F3D', emoji:'🦊', unit:'points' },
  { slug:'drift-collect', name:'Drift & Collect', acc:'#2EC4B6', emoji:'🚗', unit:'coins' },
  { slug:'color-pop', name:'Color Pop', acc:'#FF5FB7', emoji:'🎯', unit:'points' },
  { slug:'block-stax', name:'Block Stax', acc:'#4C75FF', emoji:'🟦', unit:'points' }
];
const MEDALS = ['🥇','🥈','🥉'];

function loadBoards() {
  try { return JSON.parse(localStorage.getItem('woopkid_leaderboard')) || {}; } catch { return {}; }
}
function loadProfile() {
  try { return JSON.parse(localStorage.getItem('woopkid_profile')) || {}; } catch { return {}; }
}
function playerName() {
  try { const n = localStorage.getItem('woopkid_player_name'); return (n && n.trim()) ? n.trim().slice(0,10).toUpperCase() : 'WOOP'; }
  catch { return 'WOOP'; }
}
function fmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

const boards = loadBoards();
const profile = loadProfile();
const me = playerName();
document.getElementById('playerName').textContent = me;

/* games the player has scores on come first, best boards up top */
const ranked = GAMES.slice().sort((a, b) => {
  const la = boards[a.slug] || [], lb = boards[b.slug] || [];
  return (lb.length ? 1 : 0) - (la.length ? 1 : 0);
});

const grid = document.getElementById('grid');
ranked.forEach(g => {
  let list = (boards[g.slug] || []).slice(0, 10);
  /* fallback: show the personal best recorded by the profile before boards existed */
  if (list.length === 0) {
    const pg = profile.games && profile.games[g.slug];
    if (pg && pg.best > 0) list = [{ n: me, s: pg.best }];
  }
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--acc', g.acc);

  let rows;
  if (list.length === 0) {
    rows = '<div class="zero">No scores yet.<br>Be the first on the board!</div>';
  } else {
    rows = '<div class="rows">' + list.map((e, i) =>
      '<div class="row' + (e.n === me ? ' me' : '') + '">' +
      '<span class="rk">' + (i < 3 ? MEDALS[i] : (i + 1)) + '</span>' +
      '<span class="nm"></span>' +
      '<span class="sc">' + fmt(e.s) + '</span></div>'
    ).join('') + '</div>';
  }

  card.innerHTML =
    '<div class="cardhead"><div class="icon-ring">' + g.emoji + '</div>' +
    '<div><h2>' + g.name + '</h2><div class="unit">best ' + g.unit + '</div></div></div>' +
    rows +
    '<a class="playbtn" href="../games/' + g.slug + '/">PLAY ▶</a>';

  /* names via textContent so stored strings can never become markup */
  card.querySelectorAll('.nm').forEach((el, i) => { el.textContent = list[i].n; });
  grid.appendChild(card);
});
</script>
</body>
</html>
